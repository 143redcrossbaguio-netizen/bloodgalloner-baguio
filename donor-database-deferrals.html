function setStatus(msg,type){
    const el = document.getElementById("statusBox");
    el.className = "status " + type;
    el.textContent = msg;
}

function setSaveButtonLoading(isLoading){
    const btn = document.getElementById("saveDeferralBtn");
    if(!btn) return;
    btn.disabled = !!isLoading;
    btn.textContent = isLoading ? "Saving..." : "Save Deferral";
}

function todayISO(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function esc(s){
    return String(s ?? "")
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
}

function norm(s){
    return String(s || "")
        .toLowerCase()
        .replace(/[^a-z0-9+ -]/g," ")
        .replace(/\s+/g," ")
        .trim();
}

function normSex(v){
    const s = String(v || "").toUpperCase().trim();
    if(s === "M" || s === "MALE") return "Male";
    if(s === "F" || s === "FEMALE") return "Female";
    return "";
}

function parseAge(v){
    if(v === null || v === undefined || v === "") return "";
    const n = Number(String(v).match(/\d{1,3}/)?.[0] || "");
    return (n >= 0 && n <= 120) ? n : "";
}

function donorName(r){
    return [r.surname, r.firstName || r.firstname, r.middleName].filter(Boolean).join(", ");
}

function isVisibleDonor(r){
    if(!r || typeof r !== "object") return false;
    if(r.isDeleted === true) return false;
    if(typeof r.deletedBatchId === "string" && r.deletedBatchId.trim() !== "") return false;
    return true;
}

function getDonorSearchText(r){
    return [
        r.serialNumber,
        r.surname,
        r.firstName,
        r.firstname,
        r.middleName,
        r.bloodType,
        r.sex,
        r.age
    ].join(" ").toLowerCase();
}

async function loadDonorIndex(){
    try{
        setStatus("Loading donor search index...","info");
        const snap = await fs.collection("donorDatabase").get();
        const arr = [];
        snap.forEach(doc => {
            const r = {id:doc.id, ...doc.data()};
            if(isVisibleDonor(r)){
                r._search = getDonorSearchText(r);
                arr.push(r);
            }
        });
        donorIndex = arr;
        setStatus(`Ready. Donor search index loaded (${donorIndex.length} donors).`,"ok");
    }catch(e){
        console.error(e);
        donorIndex = [];
        setStatus("Deferral page loaded, but donor live search failed: " + (e.message || e),"warn");
    }
}

function renderDonorSuggestions(){
    const q = norm(document.getElementById("liveSearch").value);
    const box = document.getElementById("donorSuggestBox");

    if(q.length < 2){
        box.classList.remove("open");
        box.innerHTML = "";
        return;
    }

    const words = q.split(" ").filter(Boolean);
    const matches = donorIndex
        .filter(r => words.every(w => r._search.includes(w)))
        .slice(0,10);

    if(!matches.length){
        box.innerHTML = `<div class="suggest-item"><div class="suggest-meta">No matching donor found. You can still type the details manually.</div></div>`;
        box.classList.add("open");
        return;
    }

    box.innerHTML = matches.map(r => {
        const displayName = donorName(r) || "Unnamed donor";
        const meta = [
            r.serialNumber ? "Serial: " + r.serialNumber : "",
            r.age ? "Age: " + r.age : "",
            r.sex ? "Sex: " + r.sex : "",
            r.bloodType ? "BT: " + r.bloodType : ""
        ].filter(Boolean).join(" | ");

        return `
            <div class="suggest-item" onclick="selectDonor('${esc(r.id)}')">
                <div class="suggest-name">${esc(displayName)}</div>
                <div class="suggest-meta">${esc(meta)}</div>
            </div>
        `;
    }).join("");

    box.classList.add("open");
}

window.selectDonor = function(id){
    const r = donorIndex.find(x => x.id === id);
    if(!r) return;

    selectedDonorId = r.id;
    document.getElementById("liveSearch").value = donorName(r);
    document.getElementById("surname").value = String(r.surname || "").toUpperCase();
    document.getElementById("firstName").value = String(r.firstName || r.firstname || "").toUpperCase();
    document.getElementById("age").value = parseAge(r.age);
    document.getElementById("sex").value = normSex(r.sex || "");

    document.getElementById("donorSuggestBox").classList.remove("open");
};

function deferralScore(option, query){
    const q = norm(query);
    if(!q) return 0;

    if(q === "h" && option.label === "Low Hemoglobin / Anemia") return 1000;
    if(q === "hy" && option.label === "Hypertension / High Blood Pressure") return 1000;

    const label = norm(option.label);
    const keys = option.keys.map(norm);
    const labelWords = label.split(" ");

    if(label.startsWith(q)) return 900;
    if(keys.some(k => k === q)) return 850;
    if(keys.some(k => k.startsWith(q))) return 820;
    if(labelWords.some(w => w.startsWith(q))) return 780;
    if(label.includes(q)) return 620;
    if(keys.some(k => k.includes(q))) return 600;

    return 0;
}

function findDeferralMatches(query){
    return COMMON_DEFERRALS
        .map(opt => ({...opt, score:deferralScore(opt, query)}))
        .filter(opt => opt.score > 0)
        .sort((a,b) => b.score - a.score || a.label.localeCompare(b.label))
        .slice(0,8);
}

function deferralTypeScore(option, query){
    const q = norm(query);
    if(!q) return 0;

    if(q === option.code.toLowerCase()) return 1000;

    const label = norm(option.label);
    const keys = option.keys.map(norm);

    if(label.startsWith(q)) return 900;
    if(keys.some(k => k === q)) return 850;
    if(keys.some(k => k.startsWith(q))) return 820;
    if(label.includes(q)) return 620;
    if(keys.some(k => k.includes(q))) return 600;

    return 0;
}

function findDeferralTypeMatches(query){
    return DEFERRAL_TYPES
        .map(opt => ({...opt, score:deferralTypeScore(opt, query)}))
        .filter(opt => opt.score > 0)
        .sort((a,b) => b.score - a.score || a.label.localeCompare(b.label))
        .slice(0,2);
}

function normalizeDeferralType(value){
    const q = norm(value);
    if(!q) return "";
    const exact = DEFERRAL_TYPES.find(t => norm(t.label) === q || t.code.toLowerCase() === q || t.keys.map(norm).includes(q));
    return exact ? exact.label : "";
}

function updateTypeSuggestions(){
    const input = document.getElementById("deferralType");
    const ghost = document.getElementById("typeGhost");
    const q = input.value.trim();

    if(selectedDeferralType && norm(selectedDeferralType) !== norm(q)){
        selectedDeferralType = "";
    }

    const matches = findDeferralTypeMatches(q);
    const best = matches[0];

    if(!q || !best || norm(best.label) === norm(q)){
        ghost.classList.remove("show");
        ghost.innerHTML = "";
        return;
    }

    ghost.innerHTML = `<span class="ghostKey">Predictive text:</span> <span class="ghostMain">${esc(best.label)}</span> <span class="ghostKey">— press Enter or Tab to fill</span>`;
    ghost.classList.add("show");
}

function getFormFocusables(){
    return Array.from(document.querySelectorAll("#liveSearch, #deferralDate, #surname, #firstName, #age, #sex, #deferralType, #deferralReason, button"))
        .filter(el => !el.disabled && el.offsetParent !== null);
}

function moveToNextField(current){
    const fields = getFormFocusables();
    const index = fields.indexOf(current);
    if(index >= 0 && fields[index + 1]){
        fields[index + 1].focus();
    }
}

    const chips = document.getElementById("deferralChips");
    const q = input.value.trim();

    if(selectedDeferralCanonical && norm(selectedDeferralCanonical) !== norm(q)){
        selectedDeferralCanonical = "";
    }

    const matches = findDeferralMatches(q);
    const best = matches[0];

    if(!q || !best || norm(best.label) === norm(q)){
        ghost.classList.remove("show");
        ghost.innerHTML = "";
        chips.classList.remove("open");
        chips.innerHTML = "";
        return;
    }

    ghost.innerHTML = `<span class="ghostKey">Predictive text:</span> <span class="ghostMain">${esc(best.label)}</span> <span class="ghostKey">— press Enter, Tab, or Space to fill</span>`;
    ghost.classList.add("show");

    chips.innerHTML = matches.map(m => `
        <button type="button" class="deferralChip" onclick="acceptDeferral('${esc(m.label)}')">${esc(m.label)}</button>
    `).join("");
    chips.classList.add("open");
}

window.acceptDeferral = function(label, keepFocus = true){
    document.getElementById("deferralReason").value = label;
    selectedDeferralCanonical = label;
    updateDeferralSuggestions();
    if(keepFocus) document.getElementById("deferralReason").focus();
};

window.acceptDeferralType = function(label, keepFocus = true){
    document.getElementById("deferralType").value = label;
    selectedDeferralType = label;
    updateTypeSuggestions();
    if(keepFocus) document.getElementById("deferralType").focus();
};

window.clearForm = function(){
    selectedDonorId = "";
    selectedDeferralCanonical = "";
    selectedDeferralType = "";
    document.getElementById("deferralDate").value = todayISO();
    document.getElementById("liveSearch").value = "";
    document.getElementById("surname").value = "";
    document.getElementById("firstName").value = "";
    document.getElementById("age").value = "";
    document.getElementById("sex").value = "";
    document.getElementById("deferralType").value = "";
    document.getElementById("deferralReason").value = "";
    document.getElementById("donorSuggestBox").classList.remove("open");
    updateTypeSuggestions();
    updateDeferralSuggestions();
};

window.saveDeferral = async function(){
    if(isSavingDeferral) return;

    if(!currentUser){
        setStatus("You are not logged in.","error");
        return;
    }

    const date = document.getElementById("deferralDate").value;
    const surname = document.getElementById("surname").value.trim().toUpperCase();
    const firstName = document.getElementById("firstName").value.trim().toUpperCase();
    const age = parseAge(document.getElementById("age").value);
    const sex = document.getElementById("sex").value;
    const typedType = document.getElementById("deferralType").value.trim();
    const deferralType = selectedDeferralType || normalizeDeferralType(typedType);
    const typedDeferral = document.getElementById("deferralReason").value.trim();
    const best = findDeferralMatches(typedDeferral)[0];
    const canonicalDeferral = selectedDeferralCanonical || (best ? best.label : typedDeferral);

    if(!date){
        setStatus("Please enter the deferral date.","error");
        return;
    }
    if(!surname || !firstName){
        setStatus("Please enter surname and first name.","error");
        return;
    }
    if(age === ""){
        setStatus("Please enter a valid age.","error");
        return;
    }
    if(!sex){
        setStatus("Please select sex.","error");
        return;
    }
    if(!deferralType){
        setStatus("Please enter deferral type: T for Temporary or P for Permanent.","error");
        return;
    }
    if(!typedDeferral){
        setStatus("Please enter the deferral reason.","error");
        return;
    }

    try{
        isSavingDeferral = true;
        setSaveButtonLoading(true);
        setStatus("Saving deferral...","info");

        await fs.collection("donorDeferrals").add({
            date,
            collectionYear:Number(date.slice(0,4)),
            collectionMonth:Number(date.slice(5,7)),
            collectionMonthKey:date.slice(0,7),
            liveSearchText:document.getElementById("liveSearch").value.trim(),
            linkedDonorId:selectedDonorId || "",
            surname,
            firstName,
            age:Number(age),
            sex,
            deferralType,
            deferralTypeCode:deferralType === "Temporary" ? "T" : "P",
            deferral:typedDeferral,
            deferralCanonical:canonicalDeferral,
            createdAt:firebase.firestore.FieldValue.serverTimestamp(),
            updatedAt:firebase.firestore.FieldValue.serverTimestamp(),
            createdByUid:currentUser.uid || "",
            createdByEmail:currentUser.email || ""
        });

        setStatus("Deferral saved successfully.","ok");
        clearForm();
        loadRecentDeferrals();
    }catch(e){
        console.error(e);
        setStatus("Failed to save deferral: " + (e.message || e),"error");
    }finally{
        isSavingDeferral = false;
        setSaveButtonLoading(false);
    }
};

window.loadRecentDeferrals = async function(){
    const box = document.getElementById("recentDeferrals");

    if(!currentUser){
        box.innerHTML = `<div class="empty">Please wait until login is confirmed before reloading deferrals.</div>`;
        setStatus("Please wait. Login is still being checked.","warn");
        return;
    }

    try{
        box.innerHTML = `<div class="empty">Loading recent deferrals...</div>`;

        const snap = await fs.collection("donorDeferrals")
            .orderBy("createdAt","desc")
            .limit(100)
            .get();

        const rows = [];
        snap.forEach(doc => rows.push({id:doc.id, ...doc.data()}));

        if(!rows.length){
            box.innerHTML = `<div class="empty">No deferrals recorded yet.</div>`;
            return;
        }

        box.innerHTML = `
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>DATE</th>
                            <th>SURNAME</th>
                            <th>FIRST NAME</th>
                            <th>AGE</th>
                            <th>SEX</th>
                            <th>TYPE</th>
                            <th>DEFERRAL</th>
                            <th>SMART CATEGORY</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map(r => `
                            <tr>
                                <td>${esc(r.date || "")}</td>
                                <td>${esc(r.surname || "")}</td>
                                <td>${esc(r.firstName || "")}</td>
                                <td>${esc(r.age ?? "")}</td>
                                <td>${esc(r.sex || "")}</td>
                                <td>${esc(r.deferralType || "")}</td>
                                <td>${esc(r.deferral || "")}</td>
                                <td>${esc(r.deferralCanonical || "")}</td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            </div>
        `;
    }catch(e){
        console.error(e);
        box.innerHTML = `<div class="empty">Could not load deferrals: ${esc(e.message || e)}</div>`;
    }
};

document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("deferralDate").value = todayISO();

    const saveBtn = document.getElementById("saveDeferralBtn");
    const clearBtn = document.getElementById("clearFormBtn");
    const reloadBtn = document.getElementById("reloadDeferralsBtn");

    if(saveBtn) saveBtn.addEventListener("click", saveDeferral);
    if(clearBtn) clearBtn.addEventListener("click", clearForm);
    if(reloadBtn) reloadBtn.addEventListener("click", loadRecentDeferrals);

    document.getElementById("liveSearch").addEventListener("input", renderDonorSuggestions);
    document.getElementById("deferralType").addEventListener("input", updateTypeSuggestions);
    document.getElementById("deferralType").addEventListener("keydown", e => {
        const best = findDeferralTypeMatches(e.target.value)[0];
        const acceptKey = e.key === "Tab" || e.key === "Enter";

        if(acceptKey && best && e.target.value.trim() && norm(best.label) !== norm(e.target.value)){
            if(e.key === "Tab"){
                acceptDeferralType(best.label, false);
            }else{
                e.preventDefault();
                acceptDeferralType(best.label, false);
                moveToNextField(e.target);
            }
            return;
        }

        if(e.key === "Enter"){
            e.preventDefault();
            moveToNextField(e.target);
        }
    });

    document.getElementById("deferralReason").addEventListener("input", updateDeferralSuggestions);
    document.getElementById("deferralReason").addEventListener("keydown", e => {
        const best = findDeferralMatches(e.target.value)[0];
        const acceptKey = e.key === "Tab" || e.key === "Enter" || e.key === " " || e.code === "Space";

        if(acceptKey && best && e.target.value.trim() && norm(best.label) !== norm(e.target.value)){
            if(e.key === "Tab"){
                acceptDeferral(best.label, false);
            }else{
                e.preventDefault();
                acceptDeferral(best.label);
                if(e.key === "Enter") moveToNextField(e.target);
            }
            return;
        }

        if(e.key === "Enter"){
            e.preventDefault();
            moveToNextField(e.target);
        }
    });

    ["deferralDate","surname","firstName","age","sex"].forEach(id => {
        const el = document.getElementById(id);
        el.addEventListener("keydown", e => {
            if(e.key === "Enter"){
                e.preventDefault();
                moveToNextField(e.target);
            }
        });
    });

    document.addEventListener("click", e => {
        const live = document.getElementById("liveSearch");
        const donorBox = document.getElementById("donorSuggestBox");
        if(!live.contains(e.target) && !donorBox.contains(e.target)){
            donorBox.classList.remove("open");
        }
    });

    auth.onAuthStateChanged(async user => {
        if(!user){
            window.location.href = "index.html";
            return;
        }
        currentUser = user;
        await loadDonorIndex();
        await loadRecentDeferrals();
    });
});
</script>
