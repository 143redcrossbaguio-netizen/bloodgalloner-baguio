<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Donor Database Tracking</title>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef2f6;
      color: #1f2937;
    }
    .page-wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #dbe3ec;
      border-radius: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      padding: 16px;
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 24px;
      color: #8b0000;
    }
    .controls {
      display: grid;
      grid-template-columns: 1.5fr 200px 200px 140px;
      gap: 10px;
      margin-bottom: 10px;
    }
    .field-group {
      display: flex;
      flex-direction: column;
    }
    .field-group label {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 5px;
      color: #334155;
    }
    .field-group input, .field-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      height: 42px;
    }
    button {
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      padding: 11px 14px;
      font-size: 13px;
      height: 42px;
    }
    .blue-btn { background: #1565c0; color: white; }
    .green-btn { background: #2e7d32; color: white; }
    .red-btn { background: #b30000; color: white; }
    .gray-btn { background: #64748b; color: white; }

    .status-message {
      display: none;
      margin-bottom: 12px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      background: white;
      border: 1px solid #dbe3ec;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }
    .status-success {
      display: block;
      background: #e8f7e8;
      color: #1b5e20;
      border-color: #b7dfb9;
    }
    .status-error {
      display: block;
      background: #fdeaea;
      color: #b71c1c;
      border-color: #efb7b7;
    }

    .year-group, .month-group {
      background: white;
      border: 1px solid #dbe3ec;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    }
    .year-header, .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }
    .year-header {
      background: #b30000;
      color: white;
      padding: 15px 16px;
      font-size: 17px;
    }
    .month-header {
      background: #eef4f9;
      color: #22313f;
      padding: 13px 16px;
      font-size: 14px;
      border-top: 1px solid #dbe3ec;
    }
    .group-body.hidden {
      display: none;
    }

    .table-wrap {
      overflow: auto;
      width: 100%;
      max-height: 75vh;
    }

    table {
      width: 100%;
      min-width: 2400px;
      border-collapse: collapse;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #d7d7d7;
      padding: 7px 8px;
      text-align: center;
      vertical-align: middle;
      white-space: nowrap;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: #f2f4f7;
    }

    .actions-cell {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .small-btn {
      padding: 7px 10px;
      font-size: 12px;
      height: auto;
      border-radius: 6px;
    }
    .edit-btn { background: #1565c0; color: #fff; }
    .delete-btn { background: #b30000; color: #fff; }
    .save-btn { background: #2e7d32; color: #fff; }
    .cancel-btn { background: #64748b; color: #fff; }

    .edit-input, .edit-select {
      width: 100%;
      min-width: 90px;
      padding: 6px 8px;
      border: 1px solid #bbb;
      border-radius: 5px;
      font-size: 12px;
    }

    .empty-box {
      background: white;
      border: 1px solid #dbe3ec;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.08);
      padding: 28px;
      text-align: center;
      color: #666;
      font-weight: bold;
    }

    @media (max-width: 1000px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="card">
      <h1>Donor Database Tracking</h1>

      <div class="controls">
        <div class="field-group">
          <label for="searchInput">Search</label>
          <input id="searchInput" type="text" placeholder="Search donor, serial, blood type, contact, occupation..." />
        </div>

        <div class="field-group">
          <label for="monthFilter">Month Filter</label>
          <select id="monthFilter">
            <option value="">All Months</option>
          </select>
        </div>

        <div class="field-group">
          <label for="syncMode">Google Sheets Sync</label>
          <select id="syncMode">
            <option value="on" selected>Enabled</option>
            <option value="off">Disabled</option>
          </select>
        </div>

        <button id="reloadBtn" class="blue-btn" type="button">Reload</button>
      </div>
    </div>

    <div id="statusMessage" class="status-message"></div>
    <div id="trackingContainer"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
      authDomain: "galloners-club.firebaseapp.com",
      databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "galloners-club",
      storageBucket: "galloners-club.firebasestorage.app",
      messagingSenderId: "213049860421",
      appId: "1:213049860421:web:4156aaa52b945f48711e2c",
      measurementId: "G-XYXJH9JNXJ"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    // IMPORTANT: Replace this with your deployed Apps Script Web App URL
    const GOOGLE_SHEETS_BACKUP_URL = "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL";

    const trackingContainer = document.getElementById("trackingContainer");
    const searchInput = document.getElementById("searchInput");
    const monthFilter = document.getElementById("monthFilter");
    const syncMode = document.getElementById("syncMode");
    const reloadBtn = document.getElementById("reloadBtn");
    const statusMessage = document.getElementById("statusMessage");

    let allDonors = [];
    let filteredDonors = [];
    let collapsedGroups = {};

    const SHEET_HEADERS = [
      "donorId",
      "action",
      "entryYear",
      "entryMonthNumber",
      "entryMonthName",
      "entryDate",
      "donorType",
      "mbdDetails",
      "patientDirectedDetails",
      "surname",
      "firstName",
      "middleName",
      "birthday",
      "age",
      "sex",
      "contactNumber",
      "address",
      "cityProvince",
      "occupation",
      "donorCategory",
      "numberOfDonations",
      "bloodType",
      "serialNumber",
      "amount",
      "bloodBagBrand",
      "bloodBagType",
      "timeStarted",
      "timeEnded",
      "remarks",
      "isDeleted",
      "source",
      "createdAt",
      "updatedAt",
      "deletedAt",
      "syncedAt"
    ];

    function showMessage(message, type) {
      statusMessage.textContent = message;
      statusMessage.className = "status-message";
      statusMessage.classList.add(type === "success" ? "status-success" : "status-error");
    }

    function normalizeText(value) {
      return String(value || "").trim().toLowerCase();
    }

    function normalizeMatchValue(value) {
      return normalizeText(value).replace(/[-_]+/g, " ").replace(/\s+/g, " ");
    }

    function toUpperTrim(value) {
      return String(value || "").trim().toUpperCase();
    }

    function escapeHtml(text) {
      if (text === null || text === undefined) return "";
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function parseDateFlexible(raw) {
      if (!raw) return "";

      if (typeof raw === "string") {
        const trimmed = raw.trim();

        if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return trimmed;

        if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(trimmed)) {
          const [m, d, yRaw] = trimmed.split("/");
          let y = Number(yRaw);
          if (String(yRaw).length === 2) y = y < 50 ? 2000 + y : 1900 + y;
          return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
        }

        const date = new Date(trimmed);
        if (!isNaN(date.getTime())) {
          return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
        }
      }

      if (typeof raw?.toDate === "function") {
        return parseDateFlexible(raw.toDate());
      }

      if (typeof raw === "object" && raw.seconds) {
        return parseDateFlexible(new Date(raw.seconds * 1000));
      }

      if (raw instanceof Date && !isNaN(raw.getTime())) {
        return `${raw.getFullYear()}-${String(raw.getMonth() + 1).padStart(2, "0")}-${String(raw.getDate()).padStart(2, "0")}`;
      }

      return "";
    }

    function resolveEntryDate(record) {
      return (
        parseDateFlexible(record.entryDate) ||
        parseDateFlexible(record.donationDate) ||
        parseDateFlexible(record.date) ||
        parseDateFlexible(record.bleedingDate) ||
        ""
      );
    }

    function resolveBirthday(record) {
      return parseDateFlexible(record.birthday) || String(record.birthday || "");
    }

    function resolveContactNumber(record) {
      return (
        String(record.contactNumber || "").trim() ||
        String(record.contactNo || "").trim() ||
        String(record.contact || "").trim() ||
        String(record.mobileNumber || "").trim() ||
        String(record.phoneNumber || "").trim() ||
        ""
      );
    }

    function resolveOccupation(record) {
      return (
        String(record.occupation || "").trim() ||
        String(record.job || "").trim() ||
        String(record.profession || "").trim() ||
        ""
      );
    }

    function resolveDonorType(record) {
      const rawType = normalizeMatchValue(record?.donorType);
      if (rawType === "mbd") return "MBD";
      if (rawType === "walk in") return "WALK-IN";
      if (rawType === "patient directed") return "PATIENT DIRECTED";

      if (String(record?.mbdDetails || "").trim()) return "MBD";
      if (String(record?.patientDirectedDetails || "").trim()) return "PATIENT DIRECTED";
      return "";
    }

    function getMonthName(monthNumber) {
      const names = [
        "January", "February", "March", "April", "May", "June",
        "July", "August", "September", "October", "November", "December"
      ];
      return names[monthNumber - 1] || "Unknown Month";
    }

    function getYearMonth(entryDate) {
      if (!entryDate || !/^\d{4}-\d{2}-\d{2}$/.test(entryDate)) {
        return { year: "", monthNumber: "", monthName: "", monthKey: "" };
      }

      const [year, month] = entryDate.split("-");
      const monthNumber = Number(month);
      return {
        year,
        monthNumber: String(monthNumber).padStart(2, "0"),
        monthName: getMonthName(monthNumber),
        monthKey: `${year}-${String(monthNumber).padStart(2, "0")}`
      };
    }

    function attachResolvedFields(record) {
      const entryDate = resolveEntryDate(record);
      return {
        ...record,
        donorType: resolveDonorType(record),
        contactNumber: resolveContactNumber(record),
        occupation: resolveOccupation(record),
        _resolvedEntryDate: entryDate,
        _resolvedBirthday: resolveBirthday(record),
        _yearMonth: getYearMonth(entryDate)
      };
    }

    function buildGoogleSheetsPayload(action, donorId, record) {
      const entryDate = parseDateFlexible(record.entryDate || record._resolvedEntryDate || "");
      const yearMonth = getYearMonth(entryDate);

      return {
        donorId: donorId || record.id || "",
        action: action || "upsert",
        entryYear: yearMonth.year || "",
        entryMonthNumber: yearMonth.monthNumber || "",
        entryMonthName: yearMonth.monthName || "",
        entryDate: entryDate || "",
        donorType: resolveDonorType(record),
        mbdDetails: toUpperTrim(record.mbdDetails || ""),
        patientDirectedDetails: toUpperTrim(record.patientDirectedDetails || ""),
        surname: toUpperTrim(record.surname || ""),
        firstName: toUpperTrim(record.firstName || ""),
        middleName: toUpperTrim(record.middleName || ""),
        birthday: parseDateFlexible(record.birthday || ""),
        age: record.age ?? "",
        sex: toUpperTrim(record.sex || ""),
        contactNumber: toUpperTrim(resolveContactNumber(record)),
        address: toUpperTrim(record.address || ""),
        cityProvince: toUpperTrim(record.cityProvince || ""),
        occupation: toUpperTrim(resolveOccupation(record)),
        donorCategory: toUpperTrim(record.donorCategory || ""),
        numberOfDonations: String(record.numberOfDonations ?? "").trim(),
        bloodType: toUpperTrim(record.bloodType || ""),
        serialNumber: toUpperTrim(record.serialNumber || ""),
        amount: toUpperTrim(record.amount || ""),
        bloodBagBrand: toUpperTrim(record.bloodBagBrand || ""),
        bloodBagType: toUpperTrim(record.bloodBagType || ""),
        timeStarted: record.timeStarted || "",
        timeEnded: record.timeEnded || "",
        remarks: toUpperTrim(record.remarks || ""),
        isDeleted: Boolean(record.isDeleted),
        source: "donor-tracking.html",
        createdAt: record.createdAt?.toDate ? record.createdAt.toDate().toISOString() : (record.createdAt || ""),
        updatedAt: new Date().toISOString(),
        deletedAt: record.deletedAt?.toDate ? record.deletedAt.toDate().toISOString() : (record.deletedAt || ""),
        syncedAt: new Date().toISOString(),
        headers: SHEET_HEADERS
      };
    }

    async function backupToGoogleSheets(payload) {
      if (!GOOGLE_SHEETS_BACKUP_URL || GOOGLE_SHEETS_BACKUP_URL === "YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL") {
        console.warn("Google Sheets backup URL is not set.");
        return;
      }

      if (syncMode.value === "off") return;

      try {
        const response = await fetch(GOOGLE_SHEETS_BACKUP_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify(payload)
        });

        const text = await response.text().catch(() => "");
        console.log("Google Sheets sync response:", text);
      } catch (err) {
        console.error("Google Sheets backup failed:", err);
      }
    }

    function matchesSearch(record, keyword) {
      if (!keyword) return true;

      const text = [
        record._resolvedEntryDate,
        record.serialNumber,
        record.donorType,
        record.donorCategory,
        record.patientDirectedDetails,
        record.mbdDetails,
        record.surname,
        record.firstName,
        record.middleName,
        record._resolvedBirthday,
        record.age,
        record.sex,
        record.contactNumber,
        record.address,
        record.cityProvince,
        record.occupation,
        record.numberOfDonations,
        record.bloodType,
        record.amount,
        record.bloodBagBrand,
        record.bloodBagType,
        record.timeStarted,
        record.timeEnded,
        record.remarks
      ].join(" ").toLowerCase();

      return text.includes(keyword.toLowerCase());
    }

    function matchesMonthFilter(record) {
      const selected = monthFilter.value;
      if (!selected) return true;
      return record._yearMonth.monthKey === selected;
    }

    function groupDonors(records) {
      const grouped = {};

      records.forEach(record => {
        const year = record._yearMonth.year || "No Year";
        const monthKey = record._yearMonth.monthKey || "No Month";
        const monthName = record._yearMonth.monthName || "No Month";

        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][monthKey]) grouped[year][monthKey] = {
          monthName,
          records: []
        };

        grouped[year][monthKey].records.push(record);
      });

      return grouped;
    }

    function populateMonthFilter(records) {
      const map = {};
      records.forEach(record => {
        if (record._yearMonth.monthKey) {
          map[record._yearMonth.monthKey] = `${record._yearMonth.monthName} ${record._yearMonth.year}`;
        }
      });

      const options = Object.keys(map).sort((a, b) => b.localeCompare(a));
      const current = monthFilter.value;

      monthFilter.innerHTML = `<option value="">All Months</option>` +
        options.map(key => `<option value="${key}">${map[key]}</option>`).join("");

      if (options.includes(current)) monthFilter.value = current;
    }

    function buildEditInput(value, type = "text") {
      return `<input class="edit-input" type="${type}" value="${escapeHtml(value || "")}">`;
    }

    function buildEditSelect(options, selectedValue) {
      return `
        <select class="edit-select">
          ${options.map(opt => `
            <option value="${escapeHtml(opt)}" ${String(opt) === String(selectedValue) ? "selected" : ""}>
              ${escapeHtml(opt)}
            </option>
          `).join("")}
        </select>
      `;
    }

    function renderTracking() {
      const keyword = searchInput.value.trim();

      filteredDonors = allDonors
        .filter(record => matchesSearch(record, keyword))
        .filter(record => matchesMonthFilter(record));

      if (!filteredDonors.length) {
        trackingContainer.innerHTML = `<div class="empty-box">No donor records found.</div>`;
        return;
      }

      const grouped = groupDonors(filteredDonors);
      const years = Object.keys(grouped).sort((a, b) => b.localeCompare(a));

      let html = "";

      years.forEach((year, yearIndex) => {
        const yearKey = `year-${year}`;
        const yearHidden = collapsedGroups[yearKey] === true;
        const months = Object.keys(grouped[year]).sort((a, b) => b.localeCompare(a));

        html += `
          <div class="year-group">
            <div class="year-header" onclick="toggleGroup('${yearKey}', 'year-body-${yearIndex}', 'year-icon-${yearIndex}')">
              <span>${escapeHtml(year)}</span>
              <span id="year-icon-${yearIndex}">${yearHidden ? "+" : "−"}</span>
            </div>
            <div id="year-body-${yearIndex}" class="group-body ${yearHidden ? "hidden" : ""}">
        `;

        months.forEach((monthKey, monthIndex) => {
          const monthData = grouped[year][monthKey];
          const monthGroupKey = `month-${monthKey}`;
          const monthHidden = collapsedGroups[monthGroupKey] === true;

          html += `
            <div class="month-group">
              <div class="month-header" onclick="toggleGroup('${monthGroupKey}', 'month-body-${yearIndex}-${monthIndex}', 'month-icon-${yearIndex}-${monthIndex}')">
                <span>${escapeHtml(monthData.monthName)} (${monthData.records.length})</span>
                <span id="month-icon-${yearIndex}-${monthIndex}">${monthHidden ? "+" : "−"}</span>
              </div>
              <div id="month-body-${yearIndex}-${monthIndex}" class="group-body ${monthHidden ? "hidden" : ""}">
                <div class="table-wrap">
                  <table>
                    <thead>
                      <tr>
                        <th>Entry Date</th>
                        <th>Donor Type</th>
                        <th>MBD Details</th>
                        <th>Patient Directed</th>
                        <th>Surname</th>
                        <th>First Name</th>
                        <th>Middle Name</th>
                        <th>Birthday</th>
                        <th>Age</th>
                        <th>Sex</th>
                        <th>Contact</th>
                        <th>Address</th>
                        <th>City/Province</th>
                        <th>Occupation</th>
                        <th>Donor Category</th>
                        <th># Donations</th>
                        <th>Blood Type</th>
                        <th>Serial Number</th>
                        <th>Amount</th>
                        <th>Blood Bag Brand</th>
                        <th>Blood Bag Type</th>
                        <th>Time Started</th>
                        <th>Time Ended</th>
                        <th>Remarks</th>
                        <th>Actions</th>
                      </tr>
                    </thead>
                    <tbody>
          `;

          monthData.records.forEach(record => {
            html += `
              <tr id="row-${record.id}">
                <td>${escapeHtml(record._resolvedEntryDate)}</td>
                <td>${escapeHtml(record.donorType || "")}</td>
                <td>${escapeHtml(record.mbdDetails || "")}</td>
                <td>${escapeHtml(record.patientDirectedDetails || "")}</td>
                <td>${escapeHtml(record.surname || "")}</td>
                <td>${escapeHtml(record.firstName || "")}</td>
                <td>${escapeHtml(record.middleName || "")}</td>
                <td>${escapeHtml(record._resolvedBirthday || "")}</td>
                <td>${escapeHtml(record.age || "")}</td>
                <td>${escapeHtml(record.sex || "")}</td>
                <td>${escapeHtml(record.contactNumber || "")}</td>
                <td>${escapeHtml(record.address || "")}</td>
                <td>${escapeHtml(record.cityProvince || "")}</td>
                <td>${escapeHtml(record.occupation || "")}</td>
                <td>${escapeHtml(record.donorCategory || "")}</td>
                <td>${escapeHtml(record.numberOfDonations || "")}</td>
                <td>${escapeHtml(record.bloodType || "")}</td>
                <td>${escapeHtml(record.serialNumber || "")}</td>
                <td>${escapeHtml(record.amount || "")}</td>
                <td>${escapeHtml(record.bloodBagBrand || "")}</td>
                <td>${escapeHtml(record.bloodBagType || "")}</td>
                <td>${escapeHtml(record.timeStarted || "")}</td>
                <td>${escapeHtml(record.timeEnded || "")}</td>
                <td>${escapeHtml(record.remarks || "")}</td>
                <td class="actions-cell">
                  <button class="small-btn edit-btn" onclick="startEdit('${record.id}')">Edit</button>
                  <button class="small-btn delete-btn" onclick="deleteDonor('${record.id}')">Delete</button>
                </td>
              </tr>
            `;
          });

          html += `
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          `;
        });

        html += `</div></div>`;
      });

      trackingContainer.innerHTML = html;
    }

    async function loadDonors() {
      try {
        const user = auth.currentUser;
        if (!user) {
          trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
          return;
        }

        const snapshot = await db.collection("donorDatabase").get();

        allDonors = snapshot.docs
          .map(doc => ({ id: doc.id, ...doc.data() }))
          .filter(record => record.isDeleted !== true)
          .map(attachResolvedFields)
          .sort((a, b) => (b._resolvedEntryDate || "").localeCompare(a._resolvedEntryDate || ""));

        populateMonthFilter(allDonors);
        renderTracking();
      } catch (error) {
        console.error(error);
        trackingContainer.innerHTML = `<div class="empty-box">Failed to load donor records.</div>`;
        showMessage("Failed to load donor records: " + error.message, "error");
      }
    }

    window.toggleGroup = function(groupKey, bodyId, iconId) {
      const body = document.getElementById(bodyId);
      const icon = document.getElementById(iconId);
      if (!body || !icon) return;

      const willHide = !body.classList.contains("hidden");
      if (willHide) {
        body.classList.add("hidden");
        icon.textContent = "+";
        collapsedGroups[groupKey] = true;
      } else {
        body.classList.remove("hidden");
        icon.textContent = "−";
        collapsedGroups[groupKey] = false;
      }
    };

    window.startEdit = function(id) {
      const record = allDonors.find(item => item.id === id);
      if (!record) return;

      const row = document.getElementById(`row-${id}`);
      if (!row) return;

      row.innerHTML = `
        <td>${buildEditInput(record._resolvedEntryDate || "", "date")}</td>
        <td>${buildEditSelect(["", "MBD", "WALK-IN", "PATIENT DIRECTED"], record.donorType || "")}</td>
        <td>${buildEditInput(record.mbdDetails || "")}</td>
        <td>${buildEditInput(record.patientDirectedDetails || "")}</td>
        <td>${buildEditInput(record.surname || "")}</td>
        <td>${buildEditInput(record.firstName || "")}</td>
        <td>${buildEditInput(record.middleName || "")}</td>
        <td>${buildEditInput(parseDateFlexible(record._resolvedBirthday || record.birthday || ""), "date")}</td>
        <td>${buildEditInput(record.age || "", "number")}</td>
        <td>${buildEditSelect(["", "MALE", "FEMALE"], record.sex || "")}</td>
        <td>${buildEditInput(record.contactNumber || "")}</td>
        <td>${buildEditInput(record.address || "")}</td>
        <td>${buildEditInput(record.cityProvince || "")}</td>
        <td>${buildEditInput(record.occupation || "")}</td>
        <td>${buildEditSelect(["", "NEW", "REPEAT", "LAPSE"], record.donorCategory || "")}</td>
        <td>${buildEditInput(record.numberOfDonations || "", "text")}</td>
        <td>${buildEditSelect(["", "A+","A-","B+","B-","AB+","AB-","O+","O-","UNKNOWN"], record.bloodType || "")}</td>
        <td>${buildEditInput(record.serialNumber || "")}</td>
        <td>${buildEditSelect(["", "450 ML", "QNS", "UB"], record.amount || "")}</td>
        <td>${buildEditSelect(["", "KARMI", "TERUMO"], record.bloodBagBrand || "")}</td>
        <td>${buildEditSelect(["", "SINGLE", "DOUBLE", "TRIPLE", "QUADRUPLE"], record.bloodBagType || "")}</td>
        <td>${buildEditInput(record.timeStarted || "", "time")}</td>
        <td>${buildEditInput(record.timeEnded || "", "time")}</td>
        <td>${buildEditInput(record.remarks || "")}</td>
        <td class="actions-cell">
          <button class="small-btn save-btn" onclick="saveEdit('${id}')">Save</button>
          <button class="small-btn cancel-btn" onclick="renderTracking()">Cancel</button>
        </td>
      `;
    };

    window.saveEdit = async function(id) {
      const row = document.getElementById(`row-${id}`);
      const fields = row.querySelectorAll("input, select");

      const updatedData = {
        entryDate: fields[0].value,
        donorType: fields[1].value,
        mbdDetails: toUpperTrim(fields[2].value),
        patientDirectedDetails: toUpperTrim(fields[3].value),
        surname: toUpperTrim(fields[4].value),
        firstName: toUpperTrim(fields[5].value),
        middleName: toUpperTrim(fields[6].value),
        birthday: fields[7].value,
        age: parseInt(fields[8].value || "0", 10),
        sex: fields[9].value,
        contactNumber: toUpperTrim(fields[10].value),
        address: toUpperTrim(fields[11].value),
        cityProvince: toUpperTrim(fields[12].value),
        occupation: toUpperTrim(fields[13].value),
        donorCategory: fields[14].value,
        numberOfDonations: String(fields[15].value || "").trim(),
        bloodType: fields[16].value,
        serialNumber: toUpperTrim(fields[17].value),
        amount: fields[18].value,
        bloodBagBrand: fields[19].value,
        bloodBagType: fields[20].value,
        timeStarted: fields[21].value,
        timeEnded: fields[22].value,
        remarks: toUpperTrim(fields[23].value)
      };

      try {
        await db.collection("donorDatabase").doc(id).update(updatedData);

        await backupToGoogleSheets(
          buildGoogleSheetsPayload("update", id, {
            ...updatedData,
            donorId: id,
            isDeleted: false
          })
        );

        showMessage("Record updated successfully and synced to Google Sheets.", "success");
        await loadDonors();
      } catch (error) {
        console.error(error);
        showMessage("Failed to update record: " + error.message, "error");
      }
    };

    window.deleteDonor = async function(id) {
      const confirmed = confirm("Delete this donor record?");
      if (!confirmed) return;

      try {
        const record = allDonors.find(item => item.id === id) || {};

        await db.collection("donorDatabase").doc(id).update({
          isDeleted: true,
          deletedAt: firebase.firestore.FieldValue.serverTimestamp(),
          deletedFrom: "donor-tracking.html"
        });

        await backupToGoogleSheets(
          buildGoogleSheetsPayload("soft_delete", id, {
            ...record,
            donorId: id,
            isDeleted: true,
            deletedAt: new Date().toISOString()
          })
        );

        showMessage("Record deleted successfully and synced to Google Sheets.", "success");
        await loadDonors();
      } catch (error) {
        console.error(error);
        showMessage("Failed to delete record: " + error.message, "error");
      }
    };

    reloadBtn.addEventListener("click", async function() {
      await loadDonors();
      showMessage("Tracking data reloaded.", "success");
    });

    searchInput.addEventListener("input", renderTracking);
    monthFilter.addEventListener("change", renderTracking);

    auth.onAuthStateChanged(user => {
      if (user) {
        loadDonors();
      } else {
        trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
      }
    });
  </script>
</body>
</html>
