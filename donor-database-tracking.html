<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Tracking</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f6;
            color: #1f2937;
        }

        header {
            background: linear-gradient(90deg, #8b0000, #b30000);
            color: white;
            padding: 14px 18px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0,0,0,0.18);
        }

        .page-wrap {
            display: flex;
            gap: 16px;
            padding: 16px;
            align-items: flex-start;
        }

        .left-panel {
            width: 290px;
            min-width: 290px;
            background: white;
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            padding: 16px;
            position: sticky;
            top: 16px;
        }

        .left-panel h3 {
            margin: 0 0 12px 0;
            color: #8b0000;
            font-size: 18px;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 8px;
        }

        .count-card {
            background: #fff5f5;
            border: 1px solid #efc1c1;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 12px;
        }

        .count-title {
            font-size: 12px;
            color: #64748b;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .count-value {
            font-size: 30px;
            font-weight: bold;
            color: #b30000;
        }

        .box-label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin: 14px 0 6px;
            color: #334155;
        }

        .left-panel input,
        .left-panel select {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
        }

        .left-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .main-btn {
            padding: 11px 14px;
            font-size: 13px;
        }

        .blue-btn { background: #1565c0; color: white; }
        .green-btn { background: #2e7d32; color: white; }
        .gray-btn { background: #64748b; color: white; }
        .red-btn { background: #8a1111; color: white; }
        .orange-btn { background: #c96b00; color: white; }

        .content-panel {
            flex: 1;
            min-width: 0;
        }

        .toolbar {
            background: white;
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            padding: 16px;
            margin-bottom: 16px;
        }

        .toolbar h3 {
            margin: 0 0 8px 0;
            color: #8b0000;
        }

        .status-message {
            display: none;
            margin-top: 10px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .status-success {
            display: block;
            background: #e8f7e8;
            color: #1b5e20;
            border: 1px solid #b7dfb9;
        }

        .status-error {
            display: block;
            background: #fdeaea;
            color: #b71c1c;
            border: 1px solid #efb7b7;
        }

        .year-group,
        .month-group {
            background: white;
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 14px;
        }

        .year-header,
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
        }

        .year-header {
            background: #b30000;
            color: white;
            padding: 15px 16px;
            font-size: 17px;
        }

        .month-header {
            background: #eef4f9;
            color: #22313f;
            padding: 13px 16px;
            font-size: 14px;
            border-top: 1px solid #dbe3ec;
        }

        .toggle-icon {
            font-size: 18px;
            font-weight: bold;
        }

        .group-body.hidden {
            display: none;
        }

        .month-tools {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #fafcff;
        }

        .small-btn {
            padding: 8px 10px;
            font-size: 12px;
        }

        .subtotal-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 10px 14px;
            background: #fff8f0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #7a2e00;
            font-size: 13px;
        }

        .year-subtotal {
            background: #fff1f1;
            color: #8b0000;
        }

        .table-wrap {
            overflow: auto;
            width: 100%;
            max-height: 72vh;
        }

        table {
            width: 100%;
            min-width: 2500px;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #d7d7d7;
            padding: 7px 8px;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 3;
            color: #111827;
            font-weight: bold;
        }

        th.col-mbd { background: #e7c1a7; }
        th.col-walkin { background: #b9d2f0; }
        th.col-patient { background: #bcd796; }
        th.col-normal { background: #efefef; }
        th.col-donorcat { background: #efe6ff; }
        th.col-bloodtype { background: #f4f4f4; }
        th.col-serial { background: #f0f0f0; }
        th.col-amount { background: #c9d7ff; }
        th.col-actions { background: #ececec; }

        .flag-cell {
            font-weight: bold;
        }

        .yes-cell { color: #0b7a0b; }
        .no-cell { color: #999; }

        .donation-total {
            font-weight: bold;
            color: #111827;
            display: block;
        }

        .donation-entry-note {
            display: block;
            font-size: 10px;
            color: #64748b;
            margin-top: 2px;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .edit-btn { background: #1565c0; color: white; }
        .delete-btn { background: #b30000; color: white; }
        .save-btn { background: #2e7d32; color: white; }
        .cancel-btn { background: #64748b; color: white; }

        .edit-input,
        .edit-select {
            width: 100%;
            min-width: 80px;
            padding: 6px 8px;
            border: 1px solid #bbb;
            border-radius: 5px;
            font-size: 12px;
        }

        .empty-box {
            background: white;
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            padding: 28px;
            text-align: center;
            color: #666;
            font-weight: bold;
        }

        @media print {
            body { background: white; }
            header, .left-panel, .toolbar, .month-tools, .actions-cell, th.col-actions { display: none !important; }
            .page-wrap { display: block; padding: 0; }
            .content-panel { width: 100%; }
            .year-group, .month-group, .table-wrap {
                box-shadow: none;
                border-radius: 0;
                max-height: none;
                overflow: visible;
            }
            th { position: static; }
            .group-body.hidden { display: block !important; }
        }

        @media (max-width: 1000px) {
            .page-wrap {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                min-width: 100%;
                position: static;
            }
        }
    </style>
</head>
<body>

<header>Donor Database Tracking</header>

<div class="page-wrap">
    <aside class="left-panel">
        <h3>Summary</h3>

        <div class="count-card">
            <div class="count-title">Total Entries</div>
            <div class="count-value" id="totalCount">0</div>
        </div>

        <div class="count-card">
            <div class="count-title">Displayed Entries</div>
            <div class="count-value" id="displayedCount">0</div>
        </div>

        <label class="box-label" for="searchInput">Search</label>
        <input type="text" id="searchInput" placeholder="Search donor, serial, blood type, contact">

        <label class="box-label" for="printMonthSelect">Print Selected Month</label>
        <select id="printMonthSelect">
            <option value="">Select month</option>
        </select>

        <div class="left-btns">
            <button class="main-btn gray-btn" id="printSelectedMonthBtn">Print Selected Month</button>
            <button class="main-btn green-btn" id="exportCsvBtn">Export Filtered CSV</button>
            <button class="main-btn red-btn" id="collapseAllBtn">Collapse All</button>
            <button class="main-btn blue-btn" id="expandAllBtn">Expand All</button>
        </div>
    </aside>

    <main class="content-panel">
        <div class="toolbar">
            <h3>Grouped by Year and Month</h3>
            <div>Arrangement follows your earlier screenshot. Donation total logic uses the donor's latest recorded total and does not add old totals together.</div>
            <div id="statusMessage" class="status-message"></div>
        </div>

        <div id="trackingContainer"></div>
    </main>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const trackingContainer = document.getElementById("trackingContainer");
    const totalCountEl = document.getElementById("totalCount");
    const displayedCountEl = document.getElementById("displayedCount");
    const searchInput = document.getElementById("searchInput");
    const printMonthSelect = document.getElementById("printMonthSelect");
    const printSelectedMonthBtn = document.getElementById("printSelectedMonthBtn");
    const exportCsvBtn = document.getElementById("exportCsvBtn");
    const collapseAllBtn = document.getElementById("collapseAllBtn");
    const expandAllBtn = document.getElementById("expandAllBtn");
    const statusMessage = document.getElementById("statusMessage");

    let allDonors = [];
    let filteredDonors = [];
    let collapsedGroups = {};
    let currentDonationTotals = {};

    function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status-message";
        statusMessage.classList.add(type === "success" ? "status-success" : "status-error");
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function csvEscape(value) {
        if (value === null || value === undefined) return "";
        return `"${String(value).replace(/"/g, '""')}"`;
    }

    function normalizeText(value) {
        return String(value || "").trim().toLowerCase();
    }

    function buildDonorKey(record) {
        return [
            normalizeText(record.surname),
            normalizeText(record.firstName),
            normalizeText(record.middleName),
            normalizeText(record.birthday),
            normalizeText(record.contactNumber)
        ].join("|");
    }

    function getMonthName(monthNumber) {
        const names = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];
        return names[monthNumber - 1] || "Unknown Month";
    }

    function getYearMonth(entryDate) {
        if (!entryDate) {
            return { year: "No Year", month: 0, monthName: "No Month", monthKey: "No Year-No Month" };
        }

        const parts = entryDate.split("-");
        if (parts.length !== 3) {
            return { year: "No Year", month: 0, monthName: "No Month", monthKey: "No Year-No Month" };
        }

        const year = parts[0];
        const month = parseInt(parts[1], 10);
        const monthName = getMonthName(month);

        return {
            year,
            month,
            monthName,
            monthKey: `${year}-${String(month).padStart(2, "0")}`
        };
    }

    function matchesSearch(record, keyword) {
        if (!keyword) return true;

        const text = [
            record.entryDate,
            record.serialNumber,
            record.donorType,
            record.donorCategory,
            record.patientDirectedDetails,
            record.mbdDetails,
            record.surname,
            record.firstName,
            record.middleName,
            record.birthday,
            record.age,
            record.sex,
            record.contactNumber,
            record.address,
            record.cityProvince,
            record.numberOfDonations,
            record.bloodType,
            record.amount,
            record.bloodBagBrand,
            record.bloodBagType,
            record.timeStarted,
            record.timeEnded,
            record.remarks
        ].join(" ").toLowerCase();

        return text.includes(keyword.toLowerCase());
    }

    function getGroupKey(type, a, b = "") {
        return `${type}-${a}-${b}`;
    }

    function isCollapsed(key) {
        return collapsedGroups[key] === true;
    }

    function countType(records, type) {
        return records.filter(r => r.donorType === type).length;
    }

    function countBloodType(records, bloodType) {
        return records.filter(r => r.bloodType === bloodType).length;
    }

    function computeCurrentDonationTotals(records) {
        const totals = {};
        const sorted = [...records].sort((a, b) => {
            const dateCompare = (b.entryDate || "").localeCompare(a.entryDate || "");
            if (dateCompare !== 0) return dateCompare;
            return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
        });

        sorted.forEach(record => {
            const key = buildDonorKey(record);
            if (totals[key] === undefined) {
                totals[key] = parseInt(record.numberOfDonations || "0");
            }
        });

        return totals;
    }

    function groupDonors(records) {
        const grouped = {};

        records.forEach(record => {
            const { year, month, monthName } = getYearMonth(record.entryDate);

            if (!grouped[year]) grouped[year] = {};
            if (!grouped[year][month]) {
                grouped[year][month] = {
                    monthName,
                    records: []
                };
            }

            grouped[year][month].records.push(record);
        });

        return grouped;
    }

    function populatePrintMonthOptions(records) {
        const monthMap = {};

        records.forEach(record => {
            const { year, month, monthName, monthKey } = getYearMonth(record.entryDate);
            if (!monthMap[monthKey]) {
                monthMap[monthKey] = `${monthName} ${year}`;
            }
        });

        const sortedKeys = Object.keys(monthMap).sort((a, b) => b.localeCompare(a));

        const currentValue = printMonthSelect.value;
        printMonthSelect.innerHTML = `<option value="">Select month</option>` +
            sortedKeys.map(key => `<option value="${key}">${monthMap[key]}</option>`).join("");

        if (sortedKeys.includes(currentValue)) {
            printMonthSelect.value = currentValue;
        }
    }

    function renderTracking() {
        const keyword = searchInput.value.trim();
        filteredDonors = allDonors.filter(record => matchesSearch(record, keyword));
        currentDonationTotals = computeCurrentDonationTotals(allDonors);

        totalCountEl.textContent = allDonors.length;
        displayedCountEl.textContent = filteredDonors.length;
        populatePrintMonthOptions(filteredDonors);

        if (!filteredDonors.length) {
            trackingContainer.innerHTML = `<div class="empty-box">No donor records found.</div>`;
            return;
        }

        const grouped = groupDonors(filteredDonors);
        const sortedYears = Object.keys(grouped).sort((a, b) => {
            if (a === "No Year") return 1;
            if (b === "No Year") return -1;
            return Number(b) - Number(a);
        });

        let html = "";

        sortedYears.forEach((year, yearIndex) => {
            const monthsObj = grouped[year];
            const sortedMonths = Object.keys(monthsObj).sort((a, b) => Number(b) - Number(a));
            const yearKey = getGroupKey("year", year);
            const yearCollapsed = isCollapsed(yearKey);

            let yearRecords = [];
            sortedMonths.forEach(month => {
                yearRecords = yearRecords.concat(monthsObj[month].records);
            });

            html += `
                <div class="year-group">
                    <div class="year-header" onclick="toggleGroup('${yearKey}', 'year-body-${yearIndex}', 'year-icon-${yearIndex}')">
                        <span>${escapeHtml(year)} (${yearRecords.length})</span>
                        <span id="year-icon-${yearIndex}" class="toggle-icon">${yearCollapsed ? "+" : "−"}</span>
                    </div>

                    <div id="year-body-${yearIndex}" class="group-body ${yearCollapsed ? "hidden" : ""}">
            `;

            sortedMonths.forEach((month, monthIndex) => {
                const monthBlock = monthsObj[month];
                const records = monthBlock.records;
                const monthKey = getGroupKey("month", year, month);
                const monthCollapsed = isCollapsed(monthKey);
                const monthValueForPrint = `${year}-${String(month).padStart(2, "0")}`;

                html += `
                    <div class="month-group">
                        <div class="month-header" onclick="toggleGroup('${monthKey}', 'month-body-${yearIndex}-${monthIndex}', 'month-icon-${yearIndex}-${monthIndex}')">
                            <span>${escapeHtml(monthBlock.monthName)} (${records.length})</span>
                            <span id="month-icon-${yearIndex}-${monthIndex}" class="toggle-icon">${monthCollapsed ? "+" : "−"}</span>
                        </div>

                        <div class="month-tools">
                            <button class="small-btn gray-btn" onclick="printOneMonth('${monthValueForPrint}')">Print This Month</button>
                            <button class="small-btn green-btn" onclick="exportOneMonthCsv('${monthValueForPrint}')">Export This Month CSV</button>
                        </div>

                        <div class="subtotal-bar">
                            <span>Entries: ${records.length}</span>
                            <span>MBD: ${countType(records, "MBD")}</span>
                            <span>Walk-in: ${countType(records, "Walk-in")}</span>
                            <span>Patient-Directed: ${countType(records, "Patient Directed")}</span>
                            <span>New: ${records.filter(r => r.donorCategory === "New").length}</span>
                            <span>Repeat: ${records.filter(r => r.donorCategory === "Repeat").length}</span>
                            <span>Lapse: ${records.filter(r => r.donorCategory === "Lapse").length}</span>
                            <span>O+: ${countBloodType(records, "O+")}</span>
                        </div>

                        <div id="month-body-${yearIndex}-${monthIndex}" class="group-body ${monthCollapsed ? "hidden" : ""}">
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="col-mbd">MBD</th>
                                            <th class="col-walkin">Walk-in</th>
                                            <th class="col-patient">Patient-Directed</th>
                                            <th class="col-normal">Surname</th>
                                            <th class="col-normal">Given Name</th>
                                            <th class="col-normal">Middle Name</th>
                                            <th class="col-normal">Birthday</th>
                                            <th class="col-normal">Age</th>
                                            <th class="col-normal">Sex</th>
                                            <th class="col-normal">Contact Number</th>
                                            <th class="col-normal">House Number/Purok/Street Name</th>
                                            <th class="col-normal">Barangay/City</th>
                                            <th class="col-donorcat">Type of Donor</th>
                                            <th class="col-normal"># of Donations</th>
                                            <th class="col-bloodtype">Blood Type</th>
                                            <th class="col-serial">Serial Number</th>
                                            <th class="col-amount">Amount</th>
                                            <th class="col-normal">Blood Bag Used</th>
                                            <th class="col-normal">Type of Blood Bag</th>
                                            <th class="col-normal">Time Started</th>
                                            <th class="col-normal">Time Ended</th>
                                            <th class="col-normal">Entry Date</th>
                                            <th class="col-normal">Remarks</th>
                                            <th class="col-actions">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                `;

                records.forEach(record => {
                    const isMBD = record.donorType === "MBD";
                    const isWalkIn = record.donorType === "Walk-in";
                    const isPatientDirected = record.donorType === "Patient Directed";
                    const donorKey = buildDonorKey(record);
                    const latestTotal = currentDonationTotals[donorKey] ?? parseInt(record.numberOfDonations || "0");
                    const enteredValue = parseInt(record.numberOfDonations || "0");

                    html += `
                        <tr id="row-${record.id}">
                            <td class="flag-cell ${isMBD ? 'yes-cell' : 'no-cell'}">${isMBD ? escapeHtml(record.mbdDetails || "YES") : ""}</td>
                            <td class="flag-cell ${isWalkIn ? 'yes-cell' : 'no-cell'}">${isWalkIn ? "YES" : ""}</td>
                            <td class="flag-cell ${isPatientDirected ? 'yes-cell' : 'no-cell'}">${isPatientDirected ? escapeHtml(record.patientDirectedDetails || "YES") : ""}</td>
                            <td>${escapeHtml(record.surname)}</td>
                            <td>${escapeHtml(record.firstName)}</td>
                            <td>${escapeHtml(record.middleName)}</td>
                            <td>${escapeHtml(record.birthday)}</td>
                            <td>${escapeHtml(record.age)}</td>
                            <td>${escapeHtml(record.sex)}</td>
                            <td>${escapeHtml(record.contactNumber)}</td>
                            <td>${escapeHtml(record.address)}</td>
                            <td>${escapeHtml(record.cityProvince)}</td>
                            <td>${escapeHtml(record.donorCategory || "")}</td>
                            <td title="Entered for this record: ${enteredValue}">
                                <span class="donation-total">${latestTotal}</span>
                                <span class="donation-entry-note">entry: ${enteredValue}</span>
                            </td>
                            <td>${escapeHtml(record.bloodType)}</td>
                            <td>${escapeHtml(record.serialNumber)}</td>
                            <td>${escapeHtml(record.amount)}</td>
                            <td>${escapeHtml(record.bloodBagBrand)}</td>
                            <td>${escapeHtml(record.bloodBagType)}</td>
                            <td>${escapeHtml(record.timeStarted)}</td>
                            <td>${escapeHtml(record.timeEnded)}</td>
                            <td>${escapeHtml(record.entryDate)}</td>
                            <td>${escapeHtml(record.remarks)}</td>
                            <td class="actions-cell">
                                <button class="small-btn edit-btn" onclick="startEdit('${record.id}')">Edit</button>
                                <button class="small-btn delete-btn" onclick="deleteDonor('${record.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });

                html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                        <div class="subtotal-bar year-subtotal">
                            <span>Year Total: ${yearRecords.length}</span>
                            <span>MBD: ${countType(yearRecords, "MBD")}</span>
                            <span>Walk-in: ${countType(yearRecords, "Walk-in")}</span>
                            <span>Patient-Directed: ${countType(yearRecords, "Patient Directed")}</span>
                            <span>New: ${yearRecords.filter(r => r.donorCategory === "New").length}</span>
                            <span>Repeat: ${yearRecords.filter(r => r.donorCategory === "Repeat").length}</span>
                            <span>Lapse: ${yearRecords.filter(r => r.donorCategory === "Lapse").length}</span>
                        </div>
                    </div>
                </div>
            `;
        });

        trackingContainer.innerHTML = html;
    }

    function buildEditSelect(options, selectedValue) {
        return `
            <select class="edit-select">
                ${options.map(opt => `<option value="${escapeHtml(opt)}" ${opt === selectedValue ? "selected" : ""}>${escapeHtml(opt)}</option>`).join("")}
            </select>
        `;
    }

    function buildEditInput(value, type = "text") {
        return `<input class="edit-input" type="${type}" value="${escapeHtml(value || "")}">`;
    }

    window.startEdit = function(id) {
        const record = allDonors.find(item => item.id === id);
        if (!record) return;

        const row = document.getElementById(`row-${id}`);
        if (!row) return;

        row.innerHTML = `
            <td>${buildEditInput(record.mbdDetails || "")}</td>
            <td>${buildEditSelect(["", "YES"], record.donorType === "Walk-in" ? "YES" : "")}</td>
            <td>${buildEditInput(record.patientDirectedDetails || "")}</td>
            <td>${buildEditInput(record.surname || "")}</td>
            <td>${buildEditInput(record.firstName || "")}</td>
            <td>${buildEditInput(record.middleName || "")}</td>
            <td>${buildEditInput(record.birthday || "", "date")}</td>
            <td>${buildEditInput(record.age || "", "number")}</td>
            <td>${buildEditSelect(["Male", "Female"], record.sex || "")}</td>
            <td>${buildEditInput(record.contactNumber || "")}</td>
            <td>${buildEditInput(record.address || "")}</td>
            <td>${buildEditInput(record.cityProvince || "")}</td>
            <td>${buildEditSelect(["New", "Repeat", "Lapse"], record.donorCategory || "")}</td>
            <td>${buildEditInput(record.numberOfDonations || 0, "number")}</td>
            <td>${buildEditSelect(["A+","A-","B+","B-","AB+","AB-","O+","O-","Unknown"], record.bloodType || "")}</td>
            <td>${buildEditInput(record.serialNumber || "")}</td>
            <td>${buildEditSelect(["450 ml", "QNS", "UB"], record.amount || "")}</td>
            <td>${buildEditSelect(["KARMI", "TERUMO"], record.bloodBagBrand || "")}</td>
            <td>${buildEditSelect(["Single", "Double", "Triple", "Quadruple"], record.bloodBagType || "")}</td>
            <td>${buildEditInput(record.timeStarted || "", "time")}</td>
            <td>${buildEditInput(record.timeEnded || "", "time")}</td>
            <td>${buildEditInput(record.entryDate || "", "date")}</td>
            <td>${buildEditInput(record.remarks || "")}</td>
            <td class="actions-cell">
                <button class="small-btn save-btn" onclick="saveEdit('${id}')">Save</button>
                <button class="small-btn cancel-btn" onclick="renderTracking()">Cancel</button>
            </td>
        `;
    };

    window.saveEdit = async function(id) {
        const row = document.getElementById(`row-${id}`);
        const fields = row.querySelectorAll("input, select");

        const mbdDetails = fields[0].value.trim();
        const walkInValue = fields[1].value;
        const patientDirectedDetails = fields[2].value.trim();

        let donorType = "";
        if (mbdDetails) donorType = "MBD";
        else if (patientDirectedDetails) donorType = "Patient Directed";
        else if (walkInValue === "YES") donorType = "Walk-in";

        const updatedData = {
            mbdDetails: mbdDetails,
            patientDirectedDetails: patientDirectedDetails,
            donorType: donorType,
            surname: fields[3].value.trim(),
            firstName: fields[4].value.trim(),
            middleName: fields[5].value.trim(),
            birthday: fields[6].value,
            age: parseInt(fields[7].value || "0"),
            sex: fields[8].value,
            contactNumber: fields[9].value.trim(),
            address: fields[10].value.trim(),
            cityProvince: fields[11].value.trim(),
            donorCategory: fields[12].value,
            numberOfDonations: parseInt(fields[13].value || "0"),
            bloodType: fields[14].value,
            serialNumber: fields[15].value.trim(),
            amount: fields[16].value,
            bloodBagBrand: fields[17].value,
            bloodBagType: fields[18].value,
            timeStarted: fields[19].value,
            timeEnded: fields[20].value,
            entryDate: fields[21].value,
            remarks: fields[22].value.trim()
        };

        try {
            await db.collection("donorDatabase").doc(id).update(updatedData);
            showMessage("Record updated successfully.", "success");
            loadDonors();
        } catch (error) {
            console.error(error);
            showMessage("Failed to update record: " + error.message, "error");
        }
    };

    window.deleteDonor = async function(id) {
        const confirmed = confirm("Delete this donor record?");
        if (!confirmed) return;

        try {
            await db.collection("donorDatabase").doc(id).delete();
            showMessage("Record deleted successfully.", "success");
            loadDonors();
        } catch (error) {
            console.error(error);
            showMessage("Failed to delete record: " + error.message, "error");
        }
    };

    window.toggleGroup = function(groupKey, bodyId, iconId) {
        const body = document.getElementById(bodyId);
        const icon = document.getElementById(iconId);

        if (!body || !icon) return;

        const willHide = !body.classList.contains("hidden");

        if (willHide) {
            body.classList.add("hidden");
            icon.textContent = "+";
            collapsedGroups[groupKey] = true;
        } else {
            body.classList.remove("hidden");
            icon.textContent = "−";
            collapsedGroups[groupKey] = false;
        }
    };

    function buildPrintableTable(records, monthLabel) {
        const rows = records.map(record => {
            const donorKey = buildDonorKey(record);
            const latestTotal = currentDonationTotals[donorKey] ?? parseInt(record.numberOfDonations || "0");
            const isMBD = record.donorType === "MBD";
            const isWalkIn = record.donorType === "Walk-in";
            const isPatientDirected = record.donorType === "Patient Directed";

            return `
                <tr>
                    <td>${isMBD ? escapeHtml(record.mbdDetails || "YES") : ""}</td>
                    <td>${isWalkIn ? "YES" : ""}</td>
                    <td>${isPatientDirected ? escapeHtml(record.patientDirectedDetails || "YES") : ""}</td>
                    <td>${escapeHtml(record.surname)}</td>
                    <td>${escapeHtml(record.firstName)}</td>
                    <td>${escapeHtml(record.middleName)}</td>
                    <td>${escapeHtml(record.birthday)}</td>
                    <td>${escapeHtml(record.age)}</td>
                    <td>${escapeHtml(record.sex)}</td>
                    <td>${escapeHtml(record.contactNumber)}</td>
                    <td>${escapeHtml(record.address)}</td>
                    <td>${escapeHtml(record.cityProvince)}</td>
                    <td>${escapeHtml(record.donorCategory || "")}</td>
                    <td>${escapeHtml(latestTotal)}</td>
                    <td>${escapeHtml(record.bloodType)}</td>
                    <td>${escapeHtml(record.serialNumber)}</td>
                    <td>${escapeHtml(record.amount)}</td>
                    <td>${escapeHtml(record.bloodBagBrand)}</td>
                    <td>${escapeHtml(record.bloodBagType)}</td>
                    <td>${escapeHtml(record.timeStarted)}</td>
                    <td>${escapeHtml(record.timeEnded)}</td>
                    <td>${escapeHtml(record.entryDate)}</td>
                    <td>${escapeHtml(record.remarks)}</td>
                </tr>
            `;
        }).join("");

        return `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Print ${monthLabel}</title>
                <style>
                    body { font-family: Arial, sans-serif; margin: 20px; }
                    h2 { margin: 0 0 10px 0; color: #8b0000; }
                    .sub { margin-bottom: 12px; color: #555; font-weight: bold; }
                    table { width: 100%; border-collapse: collapse; font-size: 11px; }
                    th, td { border: 1px solid #bbb; padding: 6px 7px; text-align: center; white-space: nowrap; }
                    th { background: #efefef; }
                    .mbd { background: #e7c1a7; }
                    .walk { background: #b9d2f0; }
                    .patient { background: #bcd796; }
                    .donorcat { background: #efe6ff; }
                </style>
            </head>
            <body>
                <h2>Donor Database Tracking</h2>
                <div class="sub">${monthLabel}</div>
                <table>
                    <thead>
                        <tr>
                            <th class="mbd">MBD</th>
                            <th class="walk">Walk-in</th>
                            <th class="patient">Patient-Directed</th>
                            <th>Surname</th>
                            <th>Given Name</th>
                            <th>Middle Name</th>
                            <th>Birthday</th>
                            <th>Age</th>
                            <th>Sex</th>
                            <th>Contact Number</th>
                            <th>House Number/Purok/Street Name</th>
                            <th>Barangay/City</th>
                            <th class="donorcat">Type of Donor</th>
                            <th># of Donations</th>
                            <th>Blood Type</th>
                            <th>Serial Number</th>
                            <th>Amount</th>
                            <th>Blood Bag Used</th>
                            <th>Type of Blood Bag</th>
                            <th>Time Started</th>
                            <th>Time Ended</th>
                            <th>Entry Date</th>
                            <th>Remarks</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            </body>
            </html>
        `;
    }

    function getRecordsForMonth(monthValue) {
        return filteredDonors.filter(record => {
            const { monthKey } = getYearMonth(record.entryDate);
            return monthKey === monthValue;
        });
    }

    window.printOneMonth = function(monthValue) {
        const records = getRecordsForMonth(monthValue);
        if (!records.length) {
            showMessage("No records found for that month.", "error");
            return;
        }

        const labelParts = monthValue.split("-");
        const monthLabel = `${getMonthName(parseInt(labelParts[1], 10))} ${labelParts[0]}`;

        const printWindow = window.open("", "_blank");
        printWindow.document.write(buildPrintableTable(records, monthLabel));
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
    };

    function exportCsv(records, fileLabel) {
        if (!records.length) {
            showMessage("No records to export.", "error");
            return;
        }

        const header = [
            "MBD",
            "Walk-in",
            "Patient-Directed",
            "Surname",
            "Given Name",
            "Middle Name",
            "Birthday",
            "Age",
            "Sex",
            "Contact Number",
            "House Number/Purok/Street Name",
            "Barangay/City",
            "Type of Donor",
            "# of Donations",
            "Blood Type",
            "Serial Number",
            "Amount",
            "Blood Bag Used",
            "Type of Blood Bag",
            "Time Started",
            "Time Ended",
            "Entry Date",
            "Remarks"
        ];

        const rows = records.map(record => {
            const donorKey = buildDonorKey(record);
            const latestTotal = currentDonationTotals[donorKey] ?? parseInt(record.numberOfDonations || "0");

            return [
                record.donorType === "MBD" ? (record.mbdDetails || "YES") : "",
                record.donorType === "Walk-in" ? "YES" : "",
                record.donorType === "Patient Directed" ? (record.patientDirectedDetails || "YES") : "",
                record.surname || "",
                record.firstName || "",
                record.middleName || "",
                record.birthday || "",
                record.age || "",
                record.sex || "",
                record.contactNumber || "",
                record.address || "",
                record.cityProvince || "",
                record.donorCategory || "",
                latestTotal,
                record.bloodType || "",
                record.serialNumber || "",
                record.amount || "",
                record.bloodBagBrand || "",
                record.bloodBagType || "",
                record.timeStarted || "",
                record.timeEnded || "",
                record.entryDate || "",
                record.remarks || ""
            ];
        });

        const csvContent = [
            header.map(csvEscape).join(","),
            ...rows.map(row => row.map(csvEscape).join(","))
        ].join("\n");

        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);

        link.href = url;
        link.download = fileLabel;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.exportOneMonthCsv = function(monthValue) {
        const records = getRecordsForMonth(monthValue);
        if (!records.length) {
            showMessage("No records found for that month.", "error");
            return;
        }
        exportCsv(records, `donor-tracking-${monthValue}.csv`);
        showMessage("Selected month CSV exported successfully.", "success");
    };

    async function loadDonors() {
        try {
            const user = auth.currentUser;
            if (!user) {
                trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
                totalCountEl.textContent = "0";
                displayedCountEl.textContent = "0";
                return;
            }

            const snapshot = await db.collection("donorDatabase").orderBy("entryDate", "desc").get();

            allDonors = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));

            allDonors.sort((a, b) => {
                const dateCompare = (b.entryDate || "").localeCompare(a.entryDate || "");
                if (dateCompare !== 0) return dateCompare;
                return (a.serialNumber || "").localeCompare(b.serialNumber || "");
            });

            renderTracking();
        } catch (error) {
            console.error(error);
            trackingContainer.innerHTML = `<div class="empty-box">Failed to load donor records.</div>`;
            showMessage("Failed to load donor records: " + error.message, "error");
        }
    }

    searchInput.addEventListener("input", renderTracking);

    printSelectedMonthBtn.addEventListener("click", function() {
        const value = printMonthSelect.value;
        if (!value) {
            showMessage("Please select a month to print.", "error");
            return;
        }
        window.printOneMonth(value);
    });

    exportCsvBtn.addEventListener("click", function() {
        exportCsv(filteredDonors, "donor-database-filtered.csv");
        showMessage("Filtered CSV exported successfully.", "success");
    });

    collapseAllBtn.addEventListener("click", function() {
        const grouped = groupDonors(filteredDonors);
        Object.keys(grouped).forEach(year => {
            collapsedGroups[getGroupKey("year", year)] = true;
            Object.keys(grouped[year]).forEach(month => {
                collapsedGroups[getGroupKey("month", year, month)] = true;
            });
        });
        renderTracking();
    });

    expandAllBtn.addEventListener("click", function() {
        collapsedGroups = {};
        renderTracking();
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            loadDonors();
        } else {
            trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
            totalCountEl.textContent = "0";
            displayedCountEl.textContent = "0";
        }
    });
</script>

</body>
</html>
