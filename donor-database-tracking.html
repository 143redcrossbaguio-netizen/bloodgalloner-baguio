<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Tracking</title>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f6;
            color: #1f2937;
        }

        .page-wrap {
            padding: 10px 16px 16px 16px;
        }

        .top-summary {
            background: rgba(255,255,255,0.98);
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.12);
            padding: 14px;
            margin-bottom: 16px;
        }

        .summary-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .top-controls-row {
            display: grid;
            grid-template-columns: minmax(280px, 1.5fr) 220px 110px;
            gap: 10px;
            align-items: end;
        }

        .second-controls-row {
            display: grid;
            grid-template-columns: 220px auto;
            gap: 10px;
            align-items: end;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #334155;
            line-height: 1.1;
        }

        .field-group input,
        .field-group select {
            width: 100%;
            padding: 10px 11px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            height: 42px;
        }

        button {
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .main-btn {
            padding: 11px 14px;
            font-size: 13px;
            white-space: nowrap;
            height: 42px;
        }

        .small-btn {
            padding: 8px 10px;
            font-size: 12px;
        }

        .blue-btn { background: #1565c0; color: white; }
        .green-btn { background: #2e7d32; color: white; }
        .gray-btn { background: #64748b; color: white; }
        .red-btn { background: #8a1111; color: white; }
        .purple-btn { background: #6b21a8; color: white; }
        .orange-btn { background: #ef6c00; color: white; }

        .toolbar-actions {
            display: flex;
            gap: 8px;
            flex-wrap: nowrap;
            align-items: end;
            justify-content: flex-start;
            min-width: 0;
        }

        .content-panel {
            min-width: 0;
        }

        .status-message {
            display: none;
            margin-bottom: 12px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            background: white;
            border: 1px solid #dbe3ec;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .status-success {
            display: block;
            background: #e8f7e8;
            color: #1b5e20;
            border: 1px solid #b7dfb9;
        }

        .status-error {
            display: block;
            background: #fdeaea;
            color: #b71c1c;
            border: 1px solid #efb7b7;
        }

        .duplicate-box {
            display: none;
            margin-bottom: 12px;
            padding: 14px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #dbe3ec;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
        }

        .duplicate-box.show {
            display: block;
        }

        .duplicate-title {
            font-size: 16px;
            font-weight: bold;
            color: #8b0000;
            margin-bottom: 10px;
        }

        .duplicate-note {
            font-size: 13px;
            color: #475569;
            margin-bottom: 12px;
        }

        .duplicate-wrap {
            overflow: auto;
            width: 100%;
        }

        .duplicate-table {
            width: 100%;
            min-width: 1400px;
            border-collapse: collapse;
            font-size: 12px;
        }

        .duplicate-table th,
        .duplicate-table td {
            border: 1px solid #d7d7d7;
            padding: 7px 8px;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        .duplicate-table th {
            background: #f7f7f7;
        }

        .year-group,
        .month-group {
            background: white;
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            overflow: hidden;
            margin-bottom: 14px;
        }

        .year-header,
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
        }

        .year-header {
            background: #b30000;
            color: white;
            padding: 15px 16px;
            font-size: 17px;
        }

        .month-header {
            background: #eef4f9;
            color: #22313f;
            padding: 13px 16px;
            font-size: 14px;
            border-top: 1px solid #dbe3ec;
        }

        .toggle-icon {
            font-size: 18px;
            font-weight: bold;
        }

        .group-body.hidden {
            display: none;
        }

        .month-tools {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            padding: 10px 12px;
            border-bottom: 1px solid #e5e7eb;
            background: #fafcff;
        }

        .subtotal-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            padding: 10px 14px;
            background: #fff8f0;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            color: #7a2e00;
            font-size: 13px;
        }

        .table-wrap {
            overflow: auto;
            width: 100%;
            max-height: 72vh;
        }

        table {
            width: 100%;
            min-width: 2700px;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #d7d7d7;
            padding: 7px 8px;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            position: sticky;
            top: 0;
            z-index: 3;
            color: #111827;
            font-weight: bold;
        }

        th.col-mbd { background: #e7c1a7; }
        th.col-walkin { background: #b9d2f0; }
        th.col-patient { background: #bcd796; }
        th.col-normal { background: #efefef; }
        th.col-donorcat { background: #efe6ff; }
        th.col-bloodtype { background: #f4f4f4; }
        th.col-serial { background: #f0f0f0; }
        th.col-amount { background: #c9d7ff; }
        th.col-actions { background: #ececec; }
        th.col-entrydate { background: #f9e2e2; }

        th.col-time-start,
        td.col-time-start {
            min-width: 90px;
            width: 90px;
            max-width: 90px;
        }

        th.col-time-end,
        td.col-time-end {
            min-width: 78px;
            width: 78px;
            max-width: 78px;
            padding-left: 5px;
            padding-right: 5px;
        }

        .header-filter-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .header-filter-wrap select {
            min-width: 78px;
            max-width: 110px;
            padding: 3px 5px;
            font-size: 11px;
            border: 1px solid #bfc7d4;
            border-radius: 5px;
            background: #fff;
        }

        .donation-total {
            font-weight: bold;
            color: #111827;
            display: block;
        }

        .donation-entry-note {
            display: block;
            font-size: 10px;
            color: #64748b;
            margin-top: 2px;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .edit-btn { background: #1565c0; color: white; }
        .delete-btn { background: #b30000; color: white; }
        .save-btn { background: #2e7d32; color: white; }
        .cancel-btn { background: #64748b; color: white; }

        .edit-input,
        .edit-select {
            width: 100%;
            min-width: 80px;
            padding: 6px 8px;
            border: 1px solid #bbb;
            border-radius: 5px;
            font-size: 12px;
        }

        .empty-box {
            background: white;
            border: 1px solid #dbe3ec;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            padding: 28px;
            text-align: center;
            color: #666;
            font-weight: bold;
        }

        @media print {
            body { background: white; }
            .top-summary, .month-tools, .actions-cell, th.col-actions, #statusMessage, #duplicateBox { display: none !important; }
            .page-wrap { padding: 0; }
            .year-group, .month-group, .table-wrap {
                box-shadow: none;
                border-radius: 0;
                max-height: none;
                overflow: visible;
            }
            th { position: static; }
            .group-body.hidden { display: block !important; }
        }

        @media (max-width: 1400px) {
            .top-controls-row {
                grid-template-columns: 1fr 220px 110px;
            }

            .second-controls-row {
                grid-template-columns: 220px 1fr;
            }

            .toolbar-actions {
                flex-wrap: wrap;
            }
        }

        @media (max-width: 900px) {
            .top-controls-row,
            .second-controls-row {
                grid-template-columns: 1fr;
            }

            .toolbar-actions {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>

<div class="page-wrap">
    <div class="top-summary">
        <div class="summary-grid">
            <div class="top-controls-row">
                <div class="field-group">
                    <label for="searchInput">Search</label>
                    <input type="text" id="searchInput" placeholder="Search donor, serial, blood type, contact, MBD, Walk-in, Patient Directed, organization">
                </div>

                <div class="field-group">
                    <label for="printMonthSelect">Print / Duplicate Month</label>
                    <select id="printMonthSelect">
                        <option value="">Select month</option>
                    </select>
                </div>

                <button class="main-btn blue-btn" id="reloadBtn" type="button">Reload</button>
            </div>

            <div class="second-controls-row">
                <div class="field-group">
                    <label for="groupMonthFilter">Month Filter</label>
                    <select id="groupMonthFilter">
                        <option value="">All Months</option>
                    </select>
                </div>

                <div class="toolbar-actions">
                    <button class="main-btn gray-btn" id="printSelectedMonthBtn">Print</button>
                    <button class="main-btn green-btn" id="exportCsvBtn">Export</button>
                    <button class="main-btn red-btn" id="collapseAllBtn">Collapse</button>
                    <button class="main-btn blue-btn" id="expandAllBtn">Expand</button>
                    <button class="main-btn orange-btn" id="duplicateDataBtn">Duplicate Data</button>
                </div>
            </div>
        </div>
    </div>

    <div id="statusMessage" class="status-message"></div>

    <div id="duplicateBox" class="duplicate-box">
        <div class="duplicate-title" id="duplicateTitle">Duplicate Data</div>
        <div class="duplicate-note" id="duplicateNote"></div>
        <div class="duplicate-wrap">
            <table class="duplicate-table">
                <thead>
                    <tr>
                        <th>Duplicate Group</th>
                        <th>Entry Date</th>
                        <th>Serial Number</th>
                        <th>Surname</th>
                        <th>First Name</th>
                        <th>Middle Name</th>
                        <th>Birthday</th>
                        <th>Blood Type</th>
                        <th>Donor Type</th>
                        <th>MBD / Patient Directed</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="duplicateBody">
                    <tr><td colspan="11">No duplicate data found.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <main class="content-panel">
        <div id="trackingContainer"></div>
    </main>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const trackingContainer = document.getElementById("trackingContainer");
    const searchInput = document.getElementById("searchInput");
    const groupMonthFilter = document.getElementById("groupMonthFilter");
    const printMonthSelect = document.getElementById("printMonthSelect");
    const printSelectedMonthBtn = document.getElementById("printSelectedMonthBtn");
    const exportCsvBtn = document.getElementById("exportCsvBtn");
    const collapseAllBtn = document.getElementById("collapseAllBtn");
    const expandAllBtn = document.getElementById("expandAllBtn");
    const duplicateDataBtn = document.getElementById("duplicateDataBtn");
    const reloadBtn = document.getElementById("reloadBtn");
    const statusMessage = document.getElementById("statusMessage");
    const duplicateBox = document.getElementById("duplicateBox");
    const duplicateTitle = document.getElementById("duplicateTitle");
    const duplicateNote = document.getElementById("duplicateNote");
    const duplicateBody = document.getElementById("duplicateBody");

    let allDonors = [];
    let filteredDonors = [];
    let collapsedGroups = {};
    let currentDonationTotals = {};
    let sequenceMap = {};
    let headerFilters = {
        entryDate: "",
        mbd: "",
        walkIn: "",
        patientDirected: "",
        sex: "",
        bloodType: "",
        donorCategory: "",
        amount: "",
        bloodBagType: "",
        serialSort: ""
    };

    function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status-message";
        statusMessage.classList.add(type === "success" ? "status-success" : "status-error");
    }

    function hideDuplicateBox() {
        duplicateBox.classList.remove("show");
        duplicateTitle.textContent = "Duplicate Data";
        duplicateNote.textContent = "";
        duplicateBody.innerHTML = `<tr><td colspan="11">No duplicate data found.</td></tr>`;
    }

    function showDuplicateBox(title, note, rowsHtml) {
        duplicateTitle.textContent = title;
        duplicateNote.textContent = note;
        duplicateBody.innerHTML = rowsHtml;
        duplicateBox.classList.add("show");
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function csvEscape(value) {
        if (value === null || value === undefined) return "";
        return `"${String(value).replace(/"/g, '""')}"`;
    }

    function normalizeText(value) {
        return String(value || "").trim().toLowerCase();
    }

    function normalizeMatchValue(value) {
        return normalizeText(value).replace(/[-_]+/g, " ").replace(/\s+/g, " ");
    }

    function toUpperTrim(value) {
        return String(value || "").trim().toUpperCase();
    }

    function toUpperDisplay(value) {
        if (value === null || value === undefined) return "";
        return String(value).toUpperCase();
    }

    function escapeUpperHtml(text) {
        return escapeHtml(toUpperDisplay(text));
    }

    function resolveSuffix(record) {
        return (
            String(record.suffix || "").trim() ||
            String(record.nameSuffix || "").trim() ||
            String(record.suffixName || "").trim() ||
            String(record.extensionName || "").trim() ||
            String(record.extName || "").trim() ||
            String(record.nameExtension || "").trim() ||
            ""
        );
    }

    function getSurnameWithSuffix(record) {
        return [resolveSuffix(record), String(record.surname || "").trim()].filter(Boolean).join(" ").trim();
    }

    function isDonorType(record, type) {
        return normalizeMatchValue(record?.donorType) === normalizeMatchValue(type);
    }

    function isDonorCategory(record, category) {
        return normalizeMatchValue(record?.donorCategory) === normalizeMatchValue(category);
    }

    function buildDonorKey(record) {
        return [
            normalizeText(resolveSuffix(record)),
            normalizeText(record.surname),
            normalizeText(record.firstName),
            normalizeText(record.middleName),
            normalizeText(resolveBirthday(record)),
            normalizeText(record.contactNumber)
        ].join("|");
    }

    function getMonthName(monthNumber) {
        const names = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];
        return names[monthNumber - 1] || "Unknown Month";
    }

    function parseDateFromText(text) {
        const name = String(text || "").toLowerCase().trim();

        const ymd = name.match(/(\d{4})[-_ ](\d{1,2})[-_ ](\d{1,2})/);
        if (ymd) return `${ymd[1]}-${String(ymd[2]).padStart(2, "0")}-${String(ymd[3]).padStart(2, "0")}`;

        const mdy = name.match(/(\d{1,2})[-_ ](\d{1,2})[-_ ](\d{4})/);
        if (mdy) return `${mdy[3]}-${String(mdy[1]).padStart(2, "0")}-${String(mdy[2]).padStart(2, "0")}`;

        const monthMap = {
            jan:"01", january:"01",
            feb:"02", february:"02",
            mar:"03", march:"03",
            apr:"04", april:"04",
            may:"05",
            jun:"06", june:"06",
            jul:"07", july:"07",
            aug:"08", august:"08",
            sep:"09", sept:"09", september:"09",
            oct:"10", october:"10",
            nov:"11", november:"11",
            dec:"12", december:"12"
        };

        const monthYear = name.match(/(jan|january|feb|february|mar|march|apr|april|may|jun|june|jul|july|aug|august|sep|sept|september|oct|october|nov|november|dec|december)[\s\-_]*(\d{4})/);
        if (monthYear) return `${monthYear[2]}-${monthMap[monthYear[1]]}-01`;

        const yearMonth = name.match(/(\d{4})[\s\-_]*(jan|january|feb|february|mar|march|apr|april|may|jun|june|jul|july|aug|august|sep|sept|september|oct|october|nov|november|dec|december)/);
        if (yearMonth) return `${yearMonth[1]}-${monthMap[yearMonth[2]]}-01`;

        return "";
    }

    function parseDateFlexible(raw) {
        if (!raw) return "";
        if (typeof raw === "string") {
            const trimmed = raw.trim();

            if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) return trimmed;

            if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(trimmed)) {
                const [m, d, yRaw] = trimmed.split("/");
                let y = Number(yRaw);
                if (String(yRaw).length === 2) y = y < 50 ? 2000 + y : 1900 + y;
                return `${y}-${String(m).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
            }

            const parsedText = parseDateFromText(trimmed);
            if (parsedText) return parsedText;

            const d = new Date(trimmed);
            if (!isNaN(d.getTime())) {
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
            }
            return "";
        }

        if (typeof raw?.toDate === "function") {
            const d = raw.toDate();
            if (!isNaN(d.getTime())) {
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
            }
        }

        if (typeof raw === "object" && raw.seconds) {
            const d = new Date(raw.seconds * 1000);
            if (!isNaN(d.getTime())) {
                return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
            }
        }

        if (raw instanceof Date && !isNaN(raw.getTime())) {
            return `${raw.getFullYear()}-${String(raw.getMonth()+1).padStart(2, "0")}-${String(raw.getDate()).padStart(2, "0")}`;
        }

        return "";
    }

    function parseCreatedAtDate(raw) {
        if (!raw) return "";
        if (typeof raw?.toDate === "function") return parseDateFlexible(raw.toDate());
        if (typeof raw === "object" && raw.seconds) return parseDateFlexible(new Date(raw.seconds * 1000));
        return "";
    }

    function resolveEntryDate(record) {
        return (
            parseDateFlexible(record.entryDate) ||
            parseDateFlexible(record.donationDate) ||
            parseDateFlexible(record.date) ||
            parseDateFlexible(record.bleedingDate) ||
            parseDateFromText(record?.importMeta?.sourceSheet || "") ||
            parseDateFromText(record?.importMeta?.sourceFile || "") ||
            parseCreatedAtDate(record.createdAt) ||
            ""
        );
    }

    function resolveBirthday(record) {
        return parseDateFlexible(record.birthday) || String(record.birthday || "");
    }

    function resolveContactNumber(record) {
        return (
            String(record.contactNumber || "").trim() ||
            String(record.contactNo || "").trim() ||
            String(record.contactNum || "").trim() ||
            String(record.contact || "").trim() ||
            String(record.mobileNumber || "").trim() ||
            String(record.mobileNo || "").trim() ||
            String(record.cellphoneNumber || "").trim() ||
            String(record.cellphoneNo || "").trim() ||
            String(record.phoneNumber || "").trim() ||
            String(record.phoneNo || "").trim() ||
            String(record.phone || "").trim() ||
            ""
        );
    }

    function resolveTimeStarted(record) {
        return (
            String(record.timeStarted || "").trim() ||
            String(record.startedTime || "").trim() ||
            String(record.startTime || "").trim() ||
            String(record.timeStart || "").trim() ||
            ""
        );
    }

    function resolveTimeEnded(record) {
        return (
            String(record.timeEnded || "").trim() ||
            String(record.endedTime || "").trim() ||
            String(record.endTime || "").trim() ||
            String(record.timeEnd || "").trim() ||
            ""
        );
    }

    function attachResolvedFields(record) {
        return {
            ...record,
            contactNumber: resolveContactNumber(record),
            _resolvedEntryDate: resolveEntryDate(record),
            _resolvedBirthday: resolveBirthday(record),
            _resolvedTimeStarted: resolveTimeStarted(record),
            _resolvedTimeEnded: resolveTimeEnded(record)
        };
    }

    function getYearMonth(entryDate) {
        if (!entryDate) {
            return { year: "No Year", month: 0, monthName: "No Month", monthKey: "No Year-No Month" };
        }

        const parts = entryDate.split("-");
        if (parts.length !== 3) {
            return { year: "No Year", month: 0, monthName: "No Month", monthKey: "No Year-No Month" };
        }

        const year = parts[0];
        const month = parseInt(parts[1], 10);
        const monthName = getMonthName(month);

        return {
            year,
            month,
            monthName,
            monthKey: `${year}-${String(month).padStart(2, "0")}`
        };
    }

    function getGroupLabel(record) {
        if (isDonorType(record, "MBD")) {
            return toUpperTrim(record.mbdDetails || "MBD");
        }
        if (isDonorType(record, "WALK-IN")) {
            return "WALK-IN";
        }
        if (isDonorType(record, "PATIENT DIRECTED")) {
            return toUpperTrim(record.patientDirectedDetails || "PATIENT DIRECTED") || "PATIENT DIRECTED";
        }
        return "";
    }

    function matchesUnifiedSearch(record, keyword) {
        if (!keyword) return true;

        const text = [
            record._resolvedEntryDate,
            record.serialNumber,
            record.donorType,
            record.donorCategory,
            record.patientDirectedDetails,
            record.mbdDetails,
            getGroupLabel(record),
            resolveSuffix(record),
            getSurnameWithSuffix(record),
            record.surname,
            record.firstName,
            record.middleName,
            record._resolvedBirthday,
            record.age,
            record.sex,
            record.contactNumber,
            record.address,
            record.cityProvince,
            record.numberOfDonations,
            record.bloodType,
            record.amount,
            record.bloodBagBrand,
            record.bloodBagType,
            record._resolvedTimeStarted,
            record._resolvedTimeEnded,
            record.remarks
        ].join(" ").toLowerCase();

        return text.includes(keyword.toLowerCase());
    }

    function matchesMonthFilter(record) {
        const selectedMonth = groupMonthFilter.value;
        if (!selectedMonth) return true;
        const monthKey = getYearMonth(record._resolvedEntryDate).monthKey;
        return monthKey === selectedMonth;
    }

    function matchesHeaderFilters(record) {
        if (headerFilters.entryDate && record._resolvedEntryDate !== headerFilters.entryDate) return false;
        if (headerFilters.mbd && !isDonorType(record, "MBD")) return false;
        if (headerFilters.walkIn && !isDonorType(record, "WALK-IN")) return false;
        if (headerFilters.patientDirected && !isDonorType(record, "PATIENT DIRECTED")) return false;
        if (headerFilters.sex && normalizeText(record.sex) !== normalizeText(headerFilters.sex)) return false;
        if (headerFilters.bloodType && normalizeText(record.bloodType) !== normalizeText(headerFilters.bloodType)) return false;
        if (headerFilters.donorCategory && !isDonorCategory(record, headerFilters.donorCategory)) return false;
        if (headerFilters.amount && normalizeText(record.amount) !== normalizeText(headerFilters.amount)) return false;
        if (headerFilters.bloodBagType && normalizeText(record.bloodBagType) !== normalizeText(headerFilters.bloodBagType)) return false;
        return true;
    }

    function compareSerialNumbers(a, b) {
        const serialA = String(a.serialNumber || "");
        const serialB = String(b.serialNumber || "");
        return serialA.localeCompare(serialB, undefined, { numeric: true, sensitivity: "base" });
    }

    function applySerialSort(records) {
        if (headerFilters.serialSort === "asc") {
            records.sort((a, b) => compareSerialNumbers(a, b));
        } else if (headerFilters.serialSort === "desc") {
            records.sort((a, b) => compareSerialNumbers(b, a));
        }
        return records;
    }

    function getGroupKey(type, a, b = "") {
        return `${type}-${a}-${b}`;
    }

    function isCollapsed(key) {
        return collapsedGroups[key] !== false;
    }

    function countType(records, type) {
        return records.filter(r => isDonorType(r, type)).length;
    }

    function computeCurrentDonationTotals(records) {
        const totals = {};
        const sorted = [...records].sort((a, b) => {
            const dateCompare = (b._resolvedEntryDate || "").localeCompare(a._resolvedEntryDate || "");
            if (dateCompare !== 0) return dateCompare;
            return (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
        });

        sorted.forEach(record => {
            const key = buildDonorKey(record);
            if (totals[key] === undefined) {
                totals[key] = parseInt(record.numberOfDonations || "0");
            }
        });

        return totals;
    }

    function computeSequenceMap(records) {
        const map = {};
        const grouped = {};

        records.forEach(record => {
            const date = record._resolvedEntryDate || "";
            const donorType = normalizeMatchValue(record.donorType);
            let typeGroupKey = `${date}|${donorType}`;

            if (donorType === normalizeMatchValue("MBD")) {
                typeGroupKey += `|${normalizeText(record.mbdDetails || "")}`;
            } else if (donorType === normalizeMatchValue("PATIENT DIRECTED")) {
                typeGroupKey += `|patient-directed`;
            } else if (donorType === normalizeMatchValue("WALK-IN")) {
                typeGroupKey += `|walk-in`;
            }

            if (!grouped[typeGroupKey]) grouped[typeGroupKey] = [];
            grouped[typeGroupKey].push(record);
        });

        Object.keys(grouped).forEach(groupKey => {
            grouped[groupKey].sort((a, b) => {
                const serialA = a.serialNumber || "";
                const serialB = b.serialNumber || "";
                return serialA.localeCompare(serialB, undefined, { numeric: true, sensitivity: "base" });
            });

            grouped[groupKey].forEach((record, index) => {
                map[record.id] = index + 1;
            });
        });

        return map;
    }

    function getCategoryDisplay(record) {
        const seq = sequenceMap[record.id] || "";
        if (!seq) return "";

        if (isDonorType(record, "WALK-IN")) {
            return `WALK-IN-${seq}`;
        }

        if (isDonorType(record, "MBD")) {
            return `${toUpperTrim(record.mbdDetails || "MBD")}-${seq}`;
        }

        if (isDonorType(record, "PATIENT DIRECTED")) {
            const patientName = toUpperTrim(record.patientDirectedDetails || "PATIENT DIRECTED") || "PATIENT DIRECTED";
            return `${patientName}-${seq}`;
        }

        return "";
    }

    function groupDonors(records) {
        const grouped = {};

        records.forEach(record => {
            const { year, month, monthName } = getYearMonth(record._resolvedEntryDate);

            if (!grouped[year]) grouped[year] = {};
            if (!grouped[year][month]) {
                grouped[year][month] = {
                    monthName,
                    records: []
                };
            }

            grouped[year][month].records.push(record);
        });

        Object.keys(grouped).forEach(year => {
            Object.keys(grouped[year]).forEach(month => {
                applySerialSort(grouped[year][month].records);
            });
        });

        return grouped;
    }

    function populatePrintMonthOptions(records) {
        const monthMap = {};

        records.forEach(record => {
            const { monthKey, monthName, year } = getYearMonth(record._resolvedEntryDate);
            if (!monthMap[monthKey]) {
                monthMap[monthKey] = `${monthName} ${year}`;
            }
        });

        const sortedKeys = Object.keys(monthMap).sort((a, b) => b.localeCompare(a));
        const currentValue = printMonthSelect.value;

        printMonthSelect.innerHTML = `<option value="">Select month</option>` +
            sortedKeys.map(key => `<option value="${key}">${monthMap[key]}</option>`).join("");

        if (sortedKeys.includes(currentValue)) {
            printMonthSelect.value = currentValue;
        }
    }

    function populateGroupMonthOptions(records) {
        const monthMap = {};

        records.forEach(record => {
            const { monthKey, monthName, year } = getYearMonth(record._resolvedEntryDate);
            if (!monthMap[monthKey]) {
                monthMap[monthKey] = `${monthName} ${year}`;
            }
        });

        const sortedKeys = Object.keys(monthMap).sort((a, b) => b.localeCompare(a));
        const currentValue = groupMonthFilter.value;

        groupMonthFilter.innerHTML = `<option value="">All Months</option>` +
            sortedKeys.map(key => `<option value="${key}">${monthMap[key]}</option>`).join("");

        if (sortedKeys.includes(currentValue)) {
            groupMonthFilter.value = currentValue;
        }
    }

    function renderHeaderFilterSelect(filterKey, options, selectedValue, placeholderLabel) {
        const normalizedSelected = normalizeMatchValue(selectedValue);
        return `
            <div class="header-filter-wrap">
                <span>${escapeHtml(placeholderLabel)}</span>
                <select onchange="setHeaderFilter('${filterKey}', this.value)">
                    <option value="">All</option>
                    ${options.map(opt => `<option value="${escapeHtml(opt)}" ${normalizeMatchValue(opt) === normalizedSelected ? "selected" : ""}>${escapeHtml(opt)}</option>`).join("")}
                </select>
            </div>
        `;
    }

    function getEntryDateFilterOptions(records) {
        return [...new Set(records.map(record => record._resolvedEntryDate).filter(Boolean))].sort((a, b) => b.localeCompare(a));
    }

    function buildDuplicateKey(record) {
        return [
            normalizeText(record.serialNumber),
            normalizeText(record.surname),
            normalizeText(record.firstName),
            normalizeText(record.middleName),
            normalizeText(record._resolvedBirthday)
        ].join("|");
    }

    function getDuplicateRecordsForMonth(monthValue) {
        const monthRecords = allDonors.filter(record => {
            const { monthKey } = getYearMonth(record._resolvedEntryDate);
            return monthKey === monthValue;
        });

        const grouped = {};
        monthRecords.forEach(record => {
            const key = buildDuplicateKey(record);
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push(record);
        });

        return Object.values(grouped).filter(group => group.length > 1);
    }

    function renderDuplicateMonthView(monthValue) {
        if (!monthValue) {
            showMessage("Please select a month first for Duplicate Data.", "error");
            return;
        }

        const duplicateGroups = getDuplicateRecordsForMonth(monthValue);
        const parts = monthValue.split("-");
        const monthLabel = `${getMonthName(parseInt(parts[1], 10))} ${parts[0]}`;

        if (!duplicateGroups.length) {
            showDuplicateBox(
                `Duplicate Data - ${monthLabel}`,
                "No duplicate data found for this month.",
                `<tr><td colspan="11">No duplicate data found for this month.</td></tr>`
            );
            return;
        }

        let rowsHtml = "";
        let groupCounter = 1;
        let totalRows = 0;

        duplicateGroups.forEach(group => {
            group.forEach((record, index) => {
                totalRows++;
                rowsHtml += `
                    <tr>
                        <td>${index === 0 ? `Duplicate ${groupCounter} (${group.length})` : ""}</td>
                        <td>${escapeHtml(record._resolvedEntryDate)}</td>
                        <td>${escapeUpperHtml(record.serialNumber)}</td>
                        <td>${escapeUpperHtml(getSurnameWithSuffix(record))}</td>
                        <td>${escapeUpperHtml(record.firstName)}</td>
                        <td>${escapeUpperHtml(record.middleName)}</td>
                        <td>${escapeHtml(record._resolvedBirthday)}</td>
                        <td>${escapeUpperHtml(record.bloodType)}</td>
                        <td>${escapeUpperHtml(record.donorType)}</td>
                        <td>${escapeUpperHtml(record.mbdDetails || record.patientDirectedDetails || "")}</td>
                        <td class="actions-cell">
                            <button class="small-btn edit-btn" onclick="startEdit('${record.id}')">Edit</button>
                            <button class="small-btn delete-btn" onclick="deleteDonor('${record.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });
            groupCounter++;
        });

        showDuplicateBox(
            `Duplicate Data - ${monthLabel}`,
            `Duplicate groups found: ${duplicateGroups.length} | Duplicate rows: ${totalRows}`,
            rowsHtml
        );
    }

    function renderTracking() {
        const keyword = searchInput.value.trim();
        const baseDonors = allDonors
            .filter(record => matchesUnifiedSearch(record, keyword))
            .filter(record => matchesMonthFilter(record));
        const entryDateOptions = getEntryDateFilterOptions(baseDonors);

        filteredDonors = baseDonors
            .filter(record => matchesHeaderFilters(record));

        currentDonationTotals = computeCurrentDonationTotals(allDonors);
        sequenceMap = computeSequenceMap(filteredDonors);

        populatePrintMonthOptions(filteredDonors.length ? filteredDonors : allDonors);
        populateGroupMonthOptions(allDonors);

        if (!filteredDonors.length) {
            trackingContainer.innerHTML = `<div class="empty-box">No donor records found.</div>`;
            return;
        }

        const grouped = groupDonors(filteredDonors);
        const sortedYears = Object.keys(grouped).sort((a, b) => {
            if (a === "No Year") return 1;
            if (b === "No Year") return -1;
            return Number(b) - Number(a);
        });

        let html = "";

        sortedYears.forEach((year, yearIndex) => {
            const monthsObj = grouped[year];
            const sortedMonths = Object.keys(monthsObj).sort((a, b) => Number(b) - Number(a));
            const yearKey = getGroupKey("year", year);
            const yearCollapsed = isCollapsed(yearKey);

            html += `
                <div class="year-group">
                    <div class="year-header" onclick="toggleGroup('${yearKey}', 'year-body-${yearIndex}', 'year-icon-${yearIndex}')">
                        <span>${escapeHtml(year)}</span>
                        <span id="year-icon-${yearIndex}" class="toggle-icon">${yearCollapsed ? "+" : "−"}</span>
                    </div>

                    <div id="year-body-${yearIndex}" class="group-body ${yearCollapsed ? "hidden" : ""}">
            `;

            sortedMonths.forEach((month, monthIndex) => {
                const monthBlock = monthsObj[month];
                const records = monthBlock.records;
                const monthKey = getGroupKey("month", year, month);
                const monthCollapsed = isCollapsed(monthKey);
                const monthValueForPrint = `${year}-${String(month).padStart(2, "0")}`;

                html += `
                    <div class="month-group">
                        <div class="month-header" onclick="toggleGroup('${monthKey}', 'month-body-${yearIndex}-${monthIndex}', 'month-icon-${yearIndex}-${monthIndex}')">
                            <span>${escapeHtml(monthBlock.monthName)} (${records.length})</span>
                            <span id="month-icon-${yearIndex}-${monthIndex}" class="toggle-icon">${monthCollapsed ? "+" : "−"}</span>
                        </div>

                        <div class="month-tools">
                            <button class="small-btn gray-btn" onclick="printOneMonth('${monthValueForPrint}')">Print This Month</button>
                            <button class="small-btn green-btn" onclick="exportOneMonthCsv('${monthValueForPrint}')">Export This Month CSV</button>
                            <button class="small-btn orange-btn" onclick="renderDuplicateMonthView('${monthValueForPrint}')">Show Duplicates This Month</button>
                        </div>

                        <div class="subtotal-bar">
                            <span>Entries: ${records.length}</span>
                            <span>MBD: ${countType(records, "MBD")}</span>
                            <span>Walk-in: ${countType(records, "WALK-IN")}</span>
                            <span>Patient-Directed: ${countType(records, "PATIENT DIRECTED")}</span>
                            <span>New: ${records.filter(r => isDonorCategory(r, "NEW")).length}</span>
                            <span>Repeat: ${records.filter(r => isDonorCategory(r, "REPEAT")).length}</span>
                            <span>Lapse: ${records.filter(r => isDonorCategory(r, "LAPSE")).length}</span>
                        </div>

                        <div id="month-body-${yearIndex}-${monthIndex}" class="group-body ${monthCollapsed ? "hidden" : ""}">
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="col-entrydate">
                                                ${renderHeaderFilterSelect("entryDate", entryDateOptions, headerFilters.entryDate, "Entry Date")}
                                            </th>
                                            <th class="col-mbd">
                                                ${renderHeaderFilterSelect("mbd", ["MBD"], headerFilters.mbd, "MBD")}
                                            </th>
                                            <th class="col-walkin">
                                                ${renderHeaderFilterSelect("walkIn", ["WALK-IN"], headerFilters.walkIn, "Walk-in")}
                                            </th>
                                            <th class="col-patient">
                                                ${renderHeaderFilterSelect("patientDirected", ["PATIENT DIRECTED"], headerFilters.patientDirected, "Patient-Directed")}
                                            </th>
                                            <th class="col-normal">Surname</th>
                                            <th class="col-normal">Given Name</th>
                                            <th class="col-normal">Middle Name</th>
                                            <th class="col-normal">Birthday</th>
                                            <th class="col-normal">Age</th>
                                            <th class="col-normal">
                                                ${renderHeaderFilterSelect("sex", ["MALE", "FEMALE"], headerFilters.sex, "Sex")}
                                            </th>
                                            <th class="col-normal">Contact Number</th>
                                            <th class="col-normal">House Number/Purok/Street Name</th>
                                            <th class="col-normal">Barangay/City</th>
                                            <th class="col-donorcat">
                                                ${renderHeaderFilterSelect("donorCategory", ["NEW", "REPEAT", "LAPSE"], headerFilters.donorCategory, "Type of Donor")}
                                            </th>
                                            <th class="col-normal"># of Donations</th>
                                            <th class="col-bloodtype">
                                                ${renderHeaderFilterSelect("bloodType", ["A+","A-","B+","B-","AB+","AB-","O+","O-","UNKNOWN"], headerFilters.bloodType, "Blood Type")}
                                            </th>
                                            <th class="col-serial">
                                                ${renderHeaderFilterSelect("serialSort", ["asc", "desc"], headerFilters.serialSort, "Serial Number")}
                                            </th>
                                            <th class="col-amount">
                                                ${renderHeaderFilterSelect("amount", ["450 ML", "QNS", "UB"], headerFilters.amount, "Amount")}
                                            </th>
                                            <th class="col-normal">Blood Bag Used</th>
                                            <th class="col-normal">
                                                ${renderHeaderFilterSelect("bloodBagType", ["SINGLE", "DOUBLE", "TRIPLE", "QUADRUPLE"], headerFilters.bloodBagType, "Type of Blood Bag")}
                                            </th>
                                            <th class="col-normal col-time-start">Time Started</th>
                                            <th class="col-normal col-time-end">Time Ended</th>
                                            <th class="col-normal">Remarks</th>
                                            <th class="col-actions">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                `;

                records.forEach(record => {
                    const donorKey = buildDonorKey(record);
                    const latestTotal = currentDonationTotals[donorKey] ?? parseInt(record.numberOfDonations || "0");
                    const enteredValue = parseInt(record.numberOfDonations || "0");

                    html += `
                        <tr id="row-${record.id}">
                            <td>${escapeHtml(record._resolvedEntryDate)}</td>
                            <td>${escapeUpperHtml(isDonorType(record, "MBD") ? getCategoryDisplay(record) : "")}</td>
                            <td>${escapeUpperHtml(isDonorType(record, "WALK-IN") ? getCategoryDisplay(record) : "")}</td>
                            <td>${escapeUpperHtml(isDonorType(record, "PATIENT DIRECTED") ? getCategoryDisplay(record) : "")}</td>
                            <td>${escapeUpperHtml(getSurnameWithSuffix(record))}</td>
                            <td>${escapeUpperHtml(record.firstName)}</td>
                            <td>${escapeUpperHtml(record.middleName)}</td>
                            <td>${escapeHtml(record._resolvedBirthday)}</td>
                            <td>${escapeHtml(record.age)}</td>
                            <td>${escapeUpperHtml(record.sex)}</td>
                            <td>${escapeUpperHtml(record.contactNumber)}</td>
                            <td>${escapeUpperHtml(record.address)}</td>
                            <td>${escapeUpperHtml(record.cityProvince)}</td>
                            <td>${escapeUpperHtml(record.donorCategory || "")}</td>
                            <td title="Entered for this record: ${enteredValue}">
                                <span class="donation-total">${latestTotal}</span>
                                <span class="donation-entry-note">ENTRY: ${enteredValue}</span>
                            </td>
                            <td>${escapeUpperHtml(record.bloodType)}</td>
                            <td>${escapeUpperHtml(record.serialNumber)}</td>
                            <td>${escapeUpperHtml(record.amount)}</td>
                            <td>${escapeUpperHtml(record.bloodBagBrand)}</td>
                            <td>${escapeUpperHtml(record.bloodBagType)}</td>
                            <td class="col-time-start">${escapeHtml(record._resolvedTimeStarted)}</td>
                            <td class="col-time-end">${escapeHtml(record._resolvedTimeEnded)}</td>
                            <td>${escapeUpperHtml(record.remarks)}</td>
                            <td class="actions-cell">
                                <button class="small-btn edit-btn" onclick="startEdit('${record.id}')">Edit</button>
                                <button class="small-btn delete-btn" onclick="deleteDonor('${record.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });

                html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        trackingContainer.innerHTML = html;
    }

    function buildEditSelect(options, selectedValue) {
        const normalizedSelected = normalizeMatchValue(selectedValue);
        return `
            <select class="edit-select">
                ${options.map(opt => `<option value="${escapeHtml(opt)}" ${normalizeMatchValue(opt) === normalizedSelected ? "selected" : ""}>${escapeHtml(opt ? String(opt).toUpperCase() : "")}</option>`).join("")}
            </select>
        `;
    }

    function buildEditInput(value, type = "text") {
        const isUppercaseField = type === "text";
        const safeValue = isUppercaseField ? toUpperDisplay(value || "") : (value || "");
        return `<input class="edit-input" type="${type}" value="${escapeHtml(safeValue)}"${isUppercaseField ? ' data-uppercase="true" style="text-transform: uppercase;"' : ""}>`;
    }

    function getMonthLabel(monthValue) {
        const labelParts = monthValue.split("-");
        return `${getMonthName(parseInt(labelParts[1], 10))} ${labelParts[0]}`;
    }

    function buildPrintGroupBlocks(records) {
        const donorTypeGroups = [
            { label: "MBD", type: "MBD" },
            { label: "WALK-IN", type: "WALK-IN" },
            { label: "PATIENT-DIRECTED", type: "PATIENT DIRECTED" }
        ];

        return donorTypeGroups.map(group => {
            const groupRecords = records.filter(record => isDonorType(record, group.type));
            if (!groupRecords.length) return "";

            const rows = groupRecords.map(record => {
                const donorKey = buildDonorKey(record);
                const latestTotal = currentDonationTotals[donorKey] ?? parseInt(record.numberOfDonations || "0");
                const groupDisplay = getCategoryDisplay(record);

                return `
                    <tr>
                        <td>${escapeHtml(record._resolvedEntryDate)}</td>
                        <td>${escapeUpperHtml(groupDisplay)}</td>
                        <td>${escapeUpperHtml(getSurnameWithSuffix(record))}</td>
                        <td>${escapeUpperHtml(record.firstName)}</td>
                        <td>${escapeUpperHtml(record.middleName)}</td>
                        <td>${escapeHtml(record._resolvedBirthday)}</td>
                        <td>${escapeHtml(record.age)}</td>
                        <td>${escapeUpperHtml(record.sex)}</td>
                        <td>${escapeUpperHtml(record.contactNumber)}</td>
                        <td>${escapeUpperHtml(record.address)}</td>
                        <td>${escapeUpperHtml(record.cityProvince)}</td>
                        <td>${escapeUpperHtml(record.donorCategory || "")}</td>
                        <td>${escapeHtml(latestTotal)}</td>
                        <td>${escapeUpperHtml(record.bloodType)}</td>
                        <td>${escapeUpperHtml(record.serialNumber)}</td>
                        <td>${escapeUpperHtml(record.amount)}</td>
                        <td>${escapeUpperHtml(record.bloodBagBrand)}</td>
                        <td>${escapeUpperHtml(record.bloodBagType)}</td>
                        <td>${escapeHtml(record._resolvedTimeStarted)}</td>
                        <td>${escapeHtml(record._resolvedTimeEnded)}</td>
                        <td>${escapeUpperHtml(record.remarks)}</td>
                    </tr>
                `;
            }).join("");

            return `
                <section class="print-group">
                    <div class="print-group-title">${escapeHtml(group.label)} (${groupRecords.length})</div>
                    <table>
                        <thead>
                            <tr>
                                <th>Entry Date</th>
                                <th>${escapeHtml(group.label)}</th>
                                <th>Surname</th>
                                <th>Given Name</th>
                                <th>Middle Name</th>
                                <th>Birthday</th>
                                <th>Age</th>
                                <th>Sex</th>
                                <th>Contact Number</th>
                                <th>House Number/Purok/Street Name</th>
                                <th>Barangay/City</th>
                                <th>Type of Donor</th>
                                <th># of Donations</th>
                                <th>Blood Type</th>
                                <th>Serial Number</th>
                                <th>Amount</th>
                                <th>Blood Bag Used</th>
                                <th>Type of Blood Bag</th>
                                <th>Time Started</th>
                                <th>Time Ended</th>
                                <th>Remarks</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </section>
            `;
        }).join("");
    }

    window.startEdit = function(id) {
        hideDuplicateBox();

        const record = allDonors.find(item => item.id === id);
        if (!record) return;

        const row = document.getElementById(`row-${id}`);
        if (!row) {
            showMessage("Record is not visible in the current table view. Clear filters or expand the month, then edit again.", "error");
            return;
        }

        row.innerHTML = `
            <td>${buildEditInput(record._resolvedEntryDate || "", "date")}</td>
            <td>${buildEditInput(record.mbdDetails || "")}</td>
            <td>${buildEditSelect(["", "WALK-IN"], isDonorType(record, "WALK-IN") ? "WALK-IN" : "")}</td>
            <td>${buildEditInput(record.patientDirectedDetails || "")}</td>
            <td>${buildEditInput(record.surname || "")}</td>
            <td>${buildEditInput(record.firstName || "")}</td>
            <td>${buildEditInput(record.middleName || "")}</td>
            <td>${buildEditInput(parseDateFlexible(record._resolvedBirthday || record.birthday || ""), "date")}</td>
            <td>${buildEditInput(record.age || "", "number")}</td>
            <td>${buildEditSelect(["MALE", "FEMALE"], record.sex || "")}</td>
            <td>${buildEditInput(record.contactNumber || "")}</td>
            <td>${buildEditInput(record.address || "")}</td>
            <td>${buildEditInput(record.cityProvince || "")}</td>
            <td>${buildEditSelect(["NEW", "REPEAT", "LAPSE"], record.donorCategory || "")}</td>
            <td>${buildEditInput(record.numberOfDonations || 0, "number")}</td>
            <td>${buildEditSelect(["A+","A-","B+","B-","AB+","AB-","O+","O-","UNKNOWN"], record.bloodType || "")}</td>
            <td>${buildEditInput(record.serialNumber || "")}</td>
            <td>${buildEditSelect(["450 ML", "QNS", "UB"], record.amount || "")}</td>
            <td>${buildEditSelect(["KARMI", "TERUMO"], record.bloodBagBrand || "")}</td>
            <td>${buildEditSelect(["SINGLE", "DOUBLE", "TRIPLE", "QUADRUPLE"], record.bloodBagType || "")}</td>
            <td>${buildEditInput(record._resolvedTimeStarted || "", "time")}</td>
            <td>${buildEditInput(record._resolvedTimeEnded || "", "time")}</td>
            <td>${buildEditInput(record.remarks || "")}</td>
            <td class="actions-cell">
                <button class="small-btn save-btn" onclick="saveEdit('${id}')">Save</button>
                <button class="small-btn cancel-btn" onclick="renderTracking()">Cancel</button>
            </td>
        `;
    };

    window.saveEdit = async function(id) {
        const row = document.getElementById(`row-${id}`);
        const fields = row.querySelectorAll("input, select");

        const mbdDetails = fields[1].value.trim();
        const walkInValue = fields[2].value;
        const patientDirectedDetails = fields[3].value.trim();

        let donorType = "";
        if (mbdDetails) donorType = "MBD";
        else if (patientDirectedDetails) donorType = "PATIENT DIRECTED";
        else if (normalizeMatchValue(walkInValue) === normalizeMatchValue("WALK-IN")) donorType = "WALK-IN";

        const updatedData = {
            entryDate: fields[0].value,
            mbdDetails: toUpperTrim(mbdDetails),
            patientDirectedDetails: toUpperTrim(patientDirectedDetails),
            donorType: donorType,
            surname: toUpperTrim(fields[4].value),
            firstName: toUpperTrim(fields[5].value),
            middleName: toUpperTrim(fields[6].value),
            birthday: fields[7].value,
            age: parseInt(fields[8].value || "0"),
            sex: fields[9].value,
            contactNumber: toUpperTrim(fields[10].value),
            address: toUpperTrim(fields[11].value),
            cityProvince: toUpperTrim(fields[12].value),
            donorCategory: fields[13].value,
            numberOfDonations: parseInt(fields[14].value || "0"),
            bloodType: fields[15].value,
            serialNumber: toUpperTrim(fields[16].value),
            amount: fields[17].value,
            bloodBagBrand: fields[18].value,
            bloodBagType: fields[19].value,
            timeStarted: fields[20].value,
            timeEnded: fields[21].value,
            remarks: toUpperTrim(fields[22].value)
        };

        try {
            await db.collection("donorDatabase").doc(id).update(updatedData);
            showMessage("Record updated successfully.", "success");
            await loadDonors();
        } catch (error) {
            console.error(error);
            showMessage("Failed to update record: " + error.message, "error");
        }
    };

    window.deleteDonor = async function(id) {
        const confirmed = confirm("Delete this donor record?");
        if (!confirmed) return;

        try {
            await db.collection("donorDatabase").doc(id).delete();
            showMessage("Record deleted successfully.", "success");
            await loadDonors();
        } catch (error) {
            console.error(error);
            showMessage("Failed to delete record: " + error.message, "error");
        }
    };

    window.toggleGroup = function(groupKey, bodyId, iconId) {
        const body = document.getElementById(bodyId);
        const icon = document.getElementById(iconId);

        if (!body || !icon) return;

        const willHide = !body.classList.contains("hidden");

        if (willHide) {
            body.classList.add("hidden");
            icon.textContent = "+";
            collapsedGroups[groupKey] = true;
        } else {
            body.classList.remove("hidden");
            icon.textContent = "−";
            collapsedGroups[groupKey] = false;
        }
    };

    window.setHeaderFilter = function(filterKey, value) {
        headerFilters[filterKey] = value;
        if (value && ["mbd", "walkIn", "patientDirected"].includes(filterKey)) {
            ["mbd", "walkIn", "patientDirected"].forEach(key => {
                if (key !== filterKey) headerFilters[key] = "";
            });
        }
        renderTracking();
    };

    function getRecordsForMonth(monthValue) {
        return filteredDonors.filter(record => {
            const { monthKey } = getYearMonth(record._resolvedEntryDate);
            return monthKey === monthValue;
        });
    }

    function buildPrintableTable(records, monthLabel) {
        const groupBlocks = buildPrintGroupBlocks(records);

        return `
            <!DOCTYPE html>
            <html>
            <head>
                <title>Print ${monthLabel}</title>
                <style>
                    @page {
                        size: landscape;
                        margin: 10mm;
                    }
                    * { box-sizing: border-box; }
                    body {
                        font-family: Arial, sans-serif;
                        margin: 0;
                        color: #111827;
                    }
                    .print-page {
                        page-break-after: always;
                        break-after: page;
                        min-height: 100vh;
                        padding: 10px 0;
                    }
                    .print-page:last-child {
                        page-break-after: auto;
                        break-after: auto;
                    }
                    h2 {
                        margin: 0 0 6px 0;
                        color: #8b0000;
                        font-size: 20px;
                    }
                    .sub {
                        margin-bottom: 10px;
                        color: #555;
                        font-weight: bold;
                        font-size: 13px;
                    }
                    .print-group {
                        width: 100%;
                    }
                    .print-group-title {
                        margin: 0 0 8px 0;
                        padding: 8px 10px;
                        background: #eef4f9;
                        border: 1px solid #dbe3ec;
                        font-weight: bold;
                        font-size: 13px;
                    }
                    table {
                        width: 100%;
                        border-collapse: collapse;
                        table-layout: auto;
                        font-size: 10px;
                    }
                    th, td {
                        border: 1px solid #bbb;
                        padding: 4px 5px;
                        text-align: center;
                        white-space: nowrap;
                    }
                    th {
                        background: #efefef;
                    }
                    thead {
                        display: table-header-group;
                    }
                    tfoot {
                        display: table-footer-group;
                    }
                    tr, td, th {
                        page-break-inside: avoid;
                    }
                </style>
            </head>
            <body>${groupBlocks.split("</section>").filter(Boolean).map(block => `
                <div class="print-page">
                    <h2>Donor Database Tracking</h2>
                    <div class="sub">${monthLabel}</div>
                    ${block}</section>
                </div>
            `).join("")}</body>
            </html>
        `;
    }

    function buildGroupedCsv(records) {
        const grouped = groupDonors(records);
        const sortedYears = Object.keys(grouped).sort((a, b) => {
            if (a === "No Year") return 1;
            if (b === "No Year") return -1;
            return Number(b) - Number(a);
        });

        const lines = [];

        sortedYears.forEach(year => {
            lines.push([`Year: ${year}`]);
            const sortedMonths = Object.keys(grouped[year]).sort((a, b) => Number(b) - Number(a));

            sortedMonths.forEach(month => {
                const monthBlock = grouped[year][month];
                const recordsInMonth = monthBlock.records;

                lines.push([`Month: ${monthBlock.monthName} ${year}`]);
                lines.push([
                    `Entries: ${recordsInMonth.length}`,
                    `MBD: ${countType(recordsInMonth, "MBD")}`,
                    `Walk-in: ${countType(recordsInMonth, "WALK-IN")}`,
                    `Patient-Directed: ${countType(recordsInMonth, "PATIENT DIRECTED")}`,
                    `New: ${recordsInMonth.filter(r => isDonorCategory(r, "NEW")).length}`,
                    `Repeat: ${recordsInMonth.filter(r => isDonorCategory(r, "REPEAT")).length}`,
                    `Lapse: ${recordsInMonth.filter(r => isDonorCategory(r, "LAPSE")).length}`
                ]);
                lines.push([
                    "Entry Date",
                    "MBD",
                    "Walk-in",
                    "Patient-Directed",
                    "Surname",
                    "Given Name",
                    "Middle Name",
                    "Birthday",
                    "Age",
                    "Sex",
                    "Contact Number",
                    "House Number/Purok/Street Name",
                    "Barangay/City",
                    "Type of Donor",
                    "# of Donations",
                    "Blood Type",
                    "Serial Number",
                    "Amount",
                    "Blood Bag Used",
                    "Type of Blood Bag",
                    "Time Started",
                    "Time Ended",
                    "Remarks"
                ]);

                recordsInMonth.forEach(record => {
                    const donorKey = buildDonorKey(record);
                    const latestTotal = currentDonationTotals[donorKey] ?? parseInt(record.numberOfDonations || "0");

                    lines.push([
                        record._resolvedEntryDate || "",
                        isDonorType(record, "MBD") ? getCategoryDisplay(record) : "",
                        isDonorType(record, "WALK-IN") ? getCategoryDisplay(record) : "",
                        isDonorType(record, "PATIENT DIRECTED") ? getCategoryDisplay(record) : "",
                        toUpperDisplay(getSurnameWithSuffix(record)),
                        toUpperDisplay(record.firstName || ""),
                        toUpperDisplay(record.middleName || ""),
                        record._resolvedBirthday || "",
                        record.age || "",
                        toUpperDisplay(record.sex || ""),
                        toUpperDisplay(record.contactNumber || ""),
                        toUpperDisplay(record.address || ""),
                        toUpperDisplay(record.cityProvince || ""),
                        toUpperDisplay(record.donorCategory || ""),
                        latestTotal,
                        toUpperDisplay(record.bloodType || ""),
                        toUpperDisplay(record.serialNumber || ""),
                        toUpperDisplay(record.amount || ""),
                        toUpperDisplay(record.bloodBagBrand || ""),
                        toUpperDisplay(record.bloodBagType || ""),
                        record._resolvedTimeStarted || "",
                        record._resolvedTimeEnded || "",
                        toUpperDisplay(record.remarks || "")
                    ]);
                });

                lines.push([]);
            });
        });

        return lines.map(row => row.map(csvEscape).join(",")).join("\n");
    }

    function exportCsv(records, fileLabel) {
        if (!records.length) {
            showMessage("No records to export.", "error");
            return;
        }

        const csvContent = buildGroupedCsv(records);
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);

        link.href = url;
        link.download = fileLabel;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
    }

    window.printOneMonth = function(monthValue) {
        const records = getRecordsForMonth(monthValue);
        if (!records.length) {
            showMessage("No records found for that month.", "error");
            return;
        }

        const monthLabel = getMonthLabel(monthValue);
        const printWindow = window.open("", "_blank");
        printWindow.document.write(buildPrintableTable(records, monthLabel));
        printWindow.document.close();
        printWindow.focus();
        printWindow.print();
    };

    window.exportOneMonthCsv = function(monthValue) {
        const records = getRecordsForMonth(monthValue);
        if (!records.length) {
            showMessage("No records found for that month.", "error");
            return;
        }
        exportCsv(records, `donor-tracking-${monthValue}.csv`);
        showMessage("Selected month CSV exported successfully.", "success");
    };

    async function loadDonors() {
        try {
            const user = auth.currentUser;
            if (!user) {
                trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
                return;
            }

            const snapshot = await db.collection("donorDatabase").get();

            allDonors = snapshot.docs.map(doc => attachResolvedFields({
                id: doc.id,
                ...doc.data()
            }));

            allDonors.sort((a, b) => {
                const dateCompare = (b._resolvedEntryDate || "").localeCompare(a._resolvedEntryDate || "");
                if (dateCompare !== 0) return dateCompare;
                return (a.serialNumber || "").localeCompare(b.serialNumber || "", undefined, { numeric: true, sensitivity: "base" });
            });

            populateGroupMonthOptions(allDonors);
            renderTracking();

            if (printMonthSelect.value) {
                renderDuplicateMonthView(printMonthSelect.value);
            } else {
                hideDuplicateBox();
            }
        } catch (error) {
            console.error(error);
            trackingContainer.innerHTML = `<div class="empty-box">Failed to load donor records.</div>`;
            showMessage("Failed to load donor records: " + error.message, "error");
        }
    }

    reloadBtn.addEventListener("click", async function() {
        hideDuplicateBox();
        await loadDonors();
        showMessage("Tracking data reloaded.", "success");
    });

    searchInput.addEventListener("input", function() {
        hideDuplicateBox();
        renderTracking();
    });

    groupMonthFilter.addEventListener("change", function() {
        hideDuplicateBox();
        renderTracking();
    });

    printSelectedMonthBtn.addEventListener("click", function() {
        const value = printMonthSelect.value;
        if (!value) {
            showMessage("Please select a month to print.", "error");
            return;
        }
        window.printOneMonth(value);
    });

    exportCsvBtn.addEventListener("click", function() {
        exportCsv(filteredDonors, "donor-database-filtered.csv");
        showMessage("Filtered CSV exported successfully.", "success");
    });

    collapseAllBtn.addEventListener("click", function() {
        const grouped = groupDonors(filteredDonors);
        Object.keys(grouped).forEach(year => {
            collapsedGroups[getGroupKey("year", year)] = true;
            Object.keys(grouped[year]).forEach(month => {
                collapsedGroups[getGroupKey("month", year, month)] = true;
            });
        });
        renderTracking();
    });

    expandAllBtn.addEventListener("click", function() {
        const grouped = groupDonors(filteredDonors);
        Object.keys(grouped).forEach(year => {
            collapsedGroups[getGroupKey("year", year)] = false;
            Object.keys(grouped[year]).forEach(month => {
                collapsedGroups[getGroupKey("month", year, month)] = false;
            });
        });
        renderTracking();
    });

    duplicateDataBtn.addEventListener("click", function() {
        renderDuplicateMonthView(printMonthSelect.value);
    });

    document.addEventListener("input", function(event) {
        if (!event.target.matches(".edit-input[data-uppercase='true']")) return;
        const start = event.target.selectionStart;
        const end = event.target.selectionEnd;
        event.target.value = event.target.value.toUpperCase();
        if (start !== null && end !== null) {
            event.target.setSelectionRange(start, end);
        }
    });

    auth.onAuthStateChanged(user => {
        if (user) {
            loadDonors();
        } else {
            trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
        }
    });
</script>

</body>
</html>
