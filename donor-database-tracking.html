// ─── STATE ────────────────────────────────────────────────────────────────────

// ─── STATUS ───────────────────────────────────────────────────────────────────
function showMessage(message, type) {

// ─── UTILITIES ────────────────────────────────────────────────────────────────
function escapeHtml(text) {
    if (text === null || text === undefined) return "";
    return String(text)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function csvEscape(v) {
    if (v === null || v === undefined) return "";
    const s = String(v);
    return (s.includes(",") || s.includes('"') || s.includes("\n")) ? `"${s.replace(/"/g,'""')}"` : s;
}
function normalizeText(v)  { return String(v || "").trim().toLowerCase(); }
function toUpperTrim(v)    { return String(v || "").trim().toUpperCase(); }
function toUpperDisplay(v) { if (v === null || v === undefined) return ""; return String(v).toUpperCase(); }
function escapeUpperHtml(t){ return escapeHtml(toUpperDisplay(t)); }

// ─── SUFFIX / NAME HELPERS ────────────────────────────────────────────────────
function resolveSuffix(r) {
    return (
        String(r.suffix         || "").trim() ||
        String(r.nameSuffix     || "").trim() ||
        String(r.suffixName     || "").trim() ||
        String(r.extensionName  || "").trim() ||
        String(r.extName        || "").trim() ||
        String(r.nameExtension  || "").trim() ||
        ""
    );
}
function getSurnameWithSuffix(r) {
    return [resolveSuffix(r), String(r.surname || "").trim()].filter(Boolean).join(" ").trim();
}

// ─── BLOOD TYPE NORMALIZATION ─────────────────────────────────────────────────
// This is the critical fix: imported records may store blood type in many formats.
// We normalize ALL variants to canonical display form (e.g. "O+", "AB-", "UNKNOWN").
function normalizeBloodTypeDisplay(v) {
    if (v === null || v === undefined) return "";
    let s = String(v).trim().toUpperCase();
    if (!s) return "";

    const canonical = ["O+","A+","B+","AB+","O-","A-","B-","AB-"];
    if (canonical.includes(s)) return s;
    if (s === "UNKNOWN" || s === "UNK" || s === "UN") return "UNKNOWN";

    s = s.replace(/\./g," ")
         .replace(/POSITIVE/g,"+").replace(/NEGATIVE/g,"-")
         .replace(/\bPOS\b/g,"+").replace(/\bNEG\b/g,"-")
         .replace(/PLUS/g,"+").replace(/MINUS/g,"-")
         .replace(/BLOOD\s*/g,"").replace(/TYPE\s*/g,"").replace(/GROUP\s*/g,"")
         .replace(/R\/H/g,"").replace(/\bRH\b/g,"")
         .replace(/\s+/g,"").trim();

    if (canonical.includes(s)) return s;

    const patterns = [
        [/^AB\+?POS/,"AB+"], [/^AB\-?NEG/,"AB-"],
        [/^A\+?POS/,"A+"],   [/^A\-?NEG/,"A-"],
        [/^B\+?POS/,"B+"],   [/^B\-?NEG/,"B-"],
        [/^O\+?POS/,"O+"],   [/^O\-?NEG/,"O-"],
        [/^ABPOS$/,"AB+"],   [/^ABNEG$/,"AB-"],
        [/^APOS$/,"A+"],     [/^ANEG$/,"A-"],
        [/^BPOS$/,"B+"],     [/^BNEG$/,"B-"],
        [/^OPOS$/,"O+"],     [/^ONEG$/,"O-"],
        [/^AB$/,"AB+"], [/^A$/,"A+"], [/^B$/,"B+"], [/^O$/,"O+"]
    ];
    for (const [re, val] of patterns) {
        if (re.test(s)) return val;
    }
    return String(v).trim().toUpperCase() || "";
}

// Try every possible field name a Firestore record might use for blood type.
// Records imported from different Excel formats may store it under different keys.
function resolveBloodType(r) {
    const directFields = [
        r.bloodType, r.blood_type, r.bloodtype, r.aboRh, r.abo_rh,
        r.aboRhType, r.bloodGroup, r.blood_group, r.abo, r.group,
        r.bloodTypeRh, r.bloodTyping, r.bt, r.BT, r.typeAndRh,
        r.finalBloodType, r.labBloodType, r.bloodTypeResult
    ];
    for (const val of directFields) {
        const norm = normalizeBloodTypeDisplay(val);
        if (norm) return norm;
    }
    // Scan all string/number fields whose key suggests blood type
    for (const [key, val] of Object.entries(r || {})) {
        if (typeof val !== "string" && typeof val !== "number") continue;
        if (key.startsWith("_")) continue;
        const kl = key.toLowerCase();
        if (!kl.includes("blood") && !kl.includes("abo") &&
            !kl.includes("group") && !kl.includes("rh") && kl !== "bt") continue;
        const norm = normalizeBloodTypeDisplay(val);
        if (norm) return norm;
    }
    return "";
}

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
const MONTH_TEXT_MAP = {
    jan:"01",january:"01",feb:"02",february:"02",mar:"03",march:"03",
    apr:"04",april:"04",may:"05",jun:"06",june:"06",jul:"07",july:"07",
    aug:"08",august:"08",sep:"09",sept:"09",september:"09",
    oct:"10",october:"10",nov:"11",november:"11",dec:"12",december:"12"
};

function parseDateFromText(text) {
    const s = String(text || "").toLowerCase().trim();
    if (!s) return "";
    const ymd = s.match(/(\d{4})[-_ ](\d{1,2})[-_ ](\d{1,2})/);
    if (ymd) return `${ymd[1]}-${ymd[2].padStart(2,"0")}-${ymd[3].padStart(2,"0")}`;
    const mdy = s.match(/(\d{1,2})[-_ ](\d{1,2})[-_ ](\d{4})/);
    if (mdy) return `${mdy[3]}-${mdy[1].padStart(2,"0")}-${mdy[2].padStart(2,"0")}`;
    const monthYear = s.match(/(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)[\s\-_]*(\d{4})/);
    if (monthYear) {
        const key = Object.keys(MONTH_TEXT_MAP).find(k => monthYear[1].startsWith(k));
        if (key) return `${monthYear[2]}-${MONTH_TEXT_MAP[key]}-01`;
    }
    const yearMonth = s.match(/(\d{4})[\s\-_]*(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)/);
    if (yearMonth) {
        const key = Object.keys(MONTH_TEXT_MAP).find(k => yearMonth[2].startsWith(k));
        if (key) return `${yearMonth[1]}-${MONTH_TEXT_MAP[key]}-01`;
    }
    return "";
}

function parseDateFlexible(raw) {
    if (!raw) return "";
    if (typeof raw === "string") {
        const t = raw.trim();
        if (!t) return "";
        if (/^\d{4}-\d{2}-\d{2}$/.test(t)) return t;
        if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(t)) {
            const [m,d,yR] = t.split("/");
            let y = Number(yR);
            if (String(yR).length === 2) y = y < 50 ? 2000+y : 1900+y;
            return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        }
        const pt = parseDateFromText(t);
        if (pt) return pt;
        const fd = new Date(t);
        if (!isNaN(fd.getTime())) {
            return `${fd.getFullYear()}-${String(fd.getMonth()+1).padStart(2,"0")}-${String(fd.getDate()).padStart(2,"0")}`;
        }
        return "";
    }
    if (typeof raw?.toDate === "function") {
        const d = raw.toDate();
        if (!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    if (typeof raw === "object" && raw.seconds) {
        const d = new Date(raw.seconds * 1000);
        if (!isNaN(d.getTime())) return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    }
    if (raw instanceof Date && !isNaN(raw.getTime())) {
        return `${raw.getFullYear()}-${String(raw.getMonth()+1).padStart(2,"0")}-${String(raw.getDate()).padStart(2,"0")}`;
    }
    return "";
}

function parseDayOnlyDateWithBase(value, baseIsoDate) {
    const raw = String(value ?? "").trim();
    if (!raw || !baseIsoDate || !/^\d{4}-\d{2}-\d{2}$/.test(baseIsoDate)) return "";
    const m = raw.match(/^(\d{1,2})$/);
    if (!m) return "";
    const day = Number(m[1]);
    if (!day || day < 1 || day > 31) return "";
    const [year, month] = baseIsoDate.split("-");
    const candidate = `${year}-${month}-${String(day).padStart(2,"0")}`;
    const d = new Date(candidate + "T00:00:00");
    if (isNaN(d.getTime())) return "";
    if (d.getFullYear() !== Number(year) || d.getMonth()+1 !== Number(month) || d.getDate() !== day) return "";
    return candidate;
}

function resolveDirectEntryDate(r) {
    return (
        parseDateFlexible(r.entryDate)    ||
        parseDateFlexible(r.donationDate) ||
        parseDateFlexible(r.date)         ||
        parseDateFlexible(r.bleedingDate) ||
        ""
    );
}

function resolveSourceMonthBase(r) {
    return (
        parseDateFromText(r?.importMeta?.sourceSheet || "") ||
        parseDateFromText(r?.importMeta?.sourceFile  || "") ||
        parseCreatedAtDate(r.createdAt)                     ||
        ""
    );
}

function parseCreatedAtDate(raw) {
    if (!raw) return "";
    if (typeof raw?.toDate === "function") return parseDateFlexible(raw.toDate());
    if (typeof raw === "object" && raw.seconds) return parseDateFlexible(new Date(raw.seconds * 1000));
    return "";
}

function applyImportedDateCarryForward(records) {
    const grouped = {};
    records.forEach(r => {
        const batchId   = String(r?.importMeta?.batchId     || "");
        const sourceFile= String(r?.importMeta?.sourceFile  || "");
        const sourceSheet=String(r?.importMeta?.sourceSheet || "");
        const sourceRow = Number(r?.importMeta?.sourceRowNumber || 0);
        const key = `${batchId}|${sourceFile}|${sourceSheet}`;
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push({ r, sourceRow });
    });
    Object.values(grouped).forEach(items => {
        items.sort((a, b) => a.sourceRow - b.sourceRow ||
            String(a.r.serialNumber || "").localeCompare(String(b.r.serialNumber || ""), undefined, { numeric:true, sensitivity:"base" })
        );
        let lastDate = "";
        items.forEach(({ r }) => {
            const explicit = resolveDirectEntryDate(r);
            const base     = resolveSourceMonthBase(r);
            const rawMarker= r.entryDate || r.donationDate || r.date || r.bleedingDate || "";
            const dayOnly  = parseDayOnlyDateWithBase(rawMarker, lastDate || base);
            if (explicit) {
                r._resolvedEntryDate = explicit;
                lastDate = explicit;
            } else if (dayOnly) {
                r._resolvedEntryDate = dayOnly;
                lastDate = dayOnly;
            } else if (lastDate) {
                r._resolvedEntryDate = lastDate;
            } else if (!r._resolvedEntryDate && base) {
                r._resolvedEntryDate = base;
                lastDate = base;
            } else if (r._resolvedEntryDate) {
                lastDate = r._resolvedEntryDate;
            }
        });
    });
}

function resolveEntryDate(r) {
    if (r._resolvedEntryDate) return r._resolvedEntryDate;
    const direct = resolveDirectEntryDate(r);
    if (direct) return direct;
    const base     = resolveSourceMonthBase(r);
    const rawMarker= r.entryDate || r.donationDate || r.date || r.bleedingDate || "";
    const dayOnly  = parseDayOnlyDateWithBase(rawMarker, base);
    if (dayOnly) return dayOnly;
    return base || "";
}

function resolveBirthday(r) { return parseDateFlexible(r.birthday) || String(r.birthday || ""); }

// ─── FIELD RESOLVERS ─────────────────────────────────────────────────────────
function resolveContactNumber(r) {
    return (
        String(r.contactNumber  || "").trim() ||
        String(r.contactNo      || "").trim() ||
        String(r.mobileNumber   || "").trim() ||
        String(r.phoneNumber    || "").trim() ||
        String(r.phone          || "").trim() ||
        ""
    );
}
function resolveOccupation(r) {
    return (
        String(r.occupation  || "").trim() ||
        String(r.job         || "").trim() ||
        String(r.work        || "").trim() ||
        String(r.profession  || "").trim() ||
        ""
    );
}
function resolveTimeStarted(r) {
    return (
        String(r.timeStarted   || "").trim() ||
        String(r.startTime     || "").trim() ||
        String(r.timeStart     || "").trim() ||
        ""
    );
}
function resolveTimeEnded(r) {
    return (
        String(r.timeEnded   || "").trim() ||
        String(r.endTime     || "").trim() ||
        String(r.timeEnd     || "").trim() ||
        ""
    );
}
function resolveDonationCountValue(v) {
    const t = String(v ?? "").trim();
    return t === "" ? "0" : t;
}

// ─── DONOR TYPE ───────────────────────────────────────────────────────────────
function getDonorTypes(r) {
    const rawType = String(r?.donorType || "").trim();
    const values  = [];
    const seen    = new Set();
    rawType.split(/[,|/]+/).forEach(part => {
        const s = String(part || "").trim().toLowerCase().replace(/[-_]+/g," ");
        if (s === "mbd" && !seen.has("MBD")) { seen.add("MBD"); values.push("MBD"); }
        if ((s === "walk in" || s === "walkin" || s === "walk-in") && !seen.has("WALK-IN")) { seen.add("WALK-IN"); values.push("WALK-IN"); }
        if ((s === "patient directed" || s === "patientdirected" || s === "patient-directed") && !seen.has("PATIENT DIRECTED")) { seen.add("PATIENT DIRECTED"); values.push("PATIENT DIRECTED"); }
    });
    if (String(r?.mbdDetails || "").trim() && !seen.has("MBD")) { seen.add("MBD"); values.push("MBD"); }
    if (String(r?.patientDirectedDetails || "").trim() && !seen.has("PATIENT DIRECTED")) { seen.add("PATIENT DIRECTED"); values.push("PATIENT DIRECTED"); }
    return values;
}

function resolveDonorType(r) { return getDonorTypes(r).join(", "); }
function isDonorType(r, type) { return getDonorTypes(r).includes(type); }
function isDonorCategory(r, category) {
    return String(r?.donorCategory || "").trim().toLowerCase() === String(category || "").trim().toLowerCase();
}

// ─── ATTACH RESOLVED FIELDS ───────────────────────────────────────────────────
// KEY FIX: normalizeBloodTypeDisplay() is called here so every record —
// whether manually entered OR bulk-imported — shows a proper blood type.
function attachResolvedFields(r) {
    return {
        ...r,
        donorType:                resolveDonorType(r),
        contactNumber:            resolveContactNumber(r),
        occupation:               resolveOccupation(r),
        _resolvedEntryDate:       resolveEntryDate(r),
        _resolvedBirthday:        resolveBirthday(r),
        _resolvedTimeStarted:     resolveTimeStarted(r),
        _resolvedTimeEnded:       resolveTimeEnded(r),
        _resolvedNumberOfDonations: resolveDonationCountValue(r.numberOfDonations),
        // Resolve blood type from any possible field name, then normalize
        _resolvedBloodType:       resolveBloodType(r)
    };
}

// ─── DATE / GROUPING ──────────────────────────────────────────────────────────
function getYearMonth(entryDate) {
    if (!entryDate) return { year:"No Year", month:0, monthName:"No Month", monthKey:"No Year-No Month" };
    const parts = entryDate.split("-");
    if (parts.length !== 3) return { year:"No Year", month:0, monthName:"No Month", monthKey:"No Year-No Month" };
    const year  = parts[0];
    const month = parseInt(parts[1], 10);
    return { year, month, monthName: MONTHS[month-1] || "Unknown", monthKey:`${year}-${String(month).padStart(2,"0")}` };
}

function getGroupLabel(r) {
    const labels = [];
    if (isDonorType(r,"MBD"))              labels.push(toUpperTrim(r.mbdDetails || "MBD"));
    if (isDonorType(r,"WALK-IN"))          labels.push("WALK-IN");
    if (isDonorType(r,"PATIENT DIRECTED")) labels.push(toUpperTrim(r.patientDirectedDetails || "PATIENT DIRECTED") || "PATIENT DIRECTED");
    return labels.filter(Boolean).join(" | ");
}

// ─── SEARCH ───────────────────────────────────────────────────────────────────
function matchesUnifiedSearch(r, keyword) {
    if (!keyword) return true;
    const text = [
        r._resolvedEntryDate, r.serialNumber, r.donorType, r.donorCategory,
        r.patientDirectedDetails, r.mbdDetails, getGroupLabel(r),
        resolveSuffix(r), getSurnameWithSuffix(r), r.surname, r.firstName, r.middleName,
        r._resolvedBirthday, r.age, r.sex, r.contactNumber,
        r.address, r.cityProvince, r.occupation,
        r._resolvedNumberOfDonations,
        // Use resolved blood type for search so "O+" matches "O POSITIVE" etc.
        r._resolvedBloodType,
        r.amount, r.bloodBagBrand, r.bloodBagType,
        r._resolvedTimeStarted, r._resolvedTimeEnded, r.remarks
    ].join(" ").toLowerCase();
    return text.includes(keyword.toLowerCase());
}

function matchesMonthFilter(r) {
    const sel = document.getElementById("groupMonthFilter").value;
    if (!sel) return true;
    return getYearMonth(r._resolvedEntryDate).monthKey === sel;
}

function matchesHeaderFilters(r) {
    if (headerFilters.entryDate && r._resolvedEntryDate !== headerFilters.entryDate) return false;
    if (headerFilters.mbd && !isDonorType(r,"MBD")) return false;
    if (headerFilters.walkIn && !isDonorType(r,"WALK-IN")) return false;
    if (headerFilters.patientDirected && !isDonorType(r,"PATIENT DIRECTED")) return false;
    if (headerFilters.sex && normalizeText(r.sex) !== normalizeText(headerFilters.sex)) return false;
    // Compare against resolved blood type
    if (headerFilters.bloodType && r._resolvedBloodType !== headerFilters.bloodType) return false;
    if (headerFilters.donorCategory && !isDonorCategory(r, headerFilters.donorCategory)) return false;
    if (headerFilters.amount && normalizeText(r.amount) !== normalizeText(headerFilters.amount)) return false;
    if (headerFilters.bloodBagType && normalizeText(r.bloodBagType) !== normalizeText(headerFilters.bloodBagType)) return false;
    return true;
}

// ─── SORTING ──────────────────────────────────────────────────────────────────
function compareSerialNumbers(a, b) {
    const rowA = Number(a?.importMeta?.sourceRowNumber || 0);
    const rowB = Number(b?.importMeta?.sourceRowNumber || 0);
    if (rowA !== rowB) return rowA - rowB;
    return String(a.serialNumber || "").localeCompare(String(b.serialNumber || ""), undefined, { numeric:true, sensitivity:"base" });
}
function compareByEntryDateAsc(a, b) {
    const dc = (a._resolvedEntryDate || "").localeCompare(b._resolvedEntryDate || "");
    if (dc !== 0) return dc;
    return String(a.serialNumber || "").localeCompare(String(b.serialNumber || ""), undefined, { numeric:true, sensitivity:"base" });
}
function applySerialSort(records) {
    if (headerFilters.serialSort === "asc")  records.sort((a,b) => compareSerialNumbers(a,b));
    if (headerFilters.serialSort === "desc") records.sort((a,b) => compareSerialNumbers(b,a));
    return records;
}

// ─── SEQUENCE / CATEGORY ──────────────────────────────────────────────────────
function getGroupKey(type, a, b = "") { return `${type}-${a}-${b}`; }
function isCollapsed(key) { return collapsedGroups[key] !== false; }
function countType(records, type) { return records.filter(r => isDonorType(r, type)).length; }
function getCategorizedEntryCount(records) {
    return records.filter(r => isDonorType(r,"MBD") || isDonorType(r,"WALK-IN") || isDonorType(r,"PATIENT DIRECTED")).length;
}

function computeCurrentDonationTotals(records) {
    const totals = {};
    const sorted = [...records].sort((a,b) => {
        const dc = (b._resolvedEntryDate || "").localeCompare(a._resolvedEntryDate || "");
        return dc !== 0 ? dc : (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0);
    });
    sorted.forEach(r => {
        const key = buildDonorKey(r);
        if (totals[key] === undefined) totals[key] = resolveDonationCountValue(r.numberOfDonations);
    });
    return totals;
}

function computeSequenceMap(records) {
    const map     = {};
    const grouped = {};
    records.forEach(r => {
        const date  = r._resolvedEntryDate || "";
        getDonorTypes(r).forEach(type => {
            let gk = `${date}|${type}`;
            if      (type === "MBD")              gk += `|${normalizeText(r.mbdDetails || "")}`;
            else if (type === "PATIENT DIRECTED")  gk += `|${normalizeText(r.patientDirectedDetails || "")}`;
            else if (type === "WALK-IN")            gk += `|walk-in`;
            if (!grouped[gk]) grouped[gk] = [];
            grouped[gk].push({ r, type });
        });
    });
    Object.keys(grouped).forEach(gk => {
        grouped[gk].sort((a,b) =>
            String(a.r.serialNumber || "").localeCompare(String(b.r.serialNumber || ""), undefined, { numeric:true, sensitivity:"base" })
        );
        grouped[gk].forEach((item, i) => {
            if (!map[item.r.id]) map[item.r.id] = {};
            map[item.r.id][item.type] = i + 1;
        });
    });
    return map;
}

function getCategoryDisplay(r, type) {
    const seq = (sequenceMap[r.id] || {})[type] || "";
    if (!seq) return "";
    if (type === "WALK-IN")          return `WALK-IN-${seq}`;
    if (type === "MBD")              return `${toUpperTrim(r.mbdDetails || "MBD")}-${seq}`;
    if (type === "PATIENT DIRECTED") return `${toUpperTrim(r.patientDirectedDetails || "PATIENT DIRECTED") || "PATIENT DIRECTED"}-${seq}`;
    return "";
}

function buildDonorKey(r) {
    return [
        normalizeText(resolveSuffix(r)),
        normalizeText(r.surname),
        normalizeText(r.firstName),
        normalizeText(r.middleName),
        normalizeText(r._resolvedBirthday || resolveBirthday(r)),
        normalizeText(r.contactNumber)
    ].join("|");
}

// ─── GROUPING ─────────────────────────────────────────────────────────────────
function groupDonors(records) {
    const grouped = {};
    records.forEach(r => {
        const { year, month, monthName } = getYearMonth(r._resolvedEntryDate);
        if (!grouped[year]) grouped[year] = {};
        if (!grouped[year][month]) grouped[year][month] = { monthName, records:[] };
        grouped[year][month].records.push(r);
    });
    Object.keys(grouped).forEach(y =>
        Object.keys(grouped[y]).forEach(m => applySerialSort(grouped[y][m].records))
    );
    return grouped;
}

// ─── POPULATE DROPDOWNS ───────────────────────────────────────────────────────
function populatePrintMonthOptions(records) {
    const monthMap  = {};
    records.forEach(r => {
        const { monthKey, monthName, year } = getYearMonth(r._resolvedEntryDate);
        if (!monthMap[monthKey]) monthMap[monthKey] = `${monthName} ${year}`;
    });
    const sorted      = Object.keys(monthMap).sort((a,b) => b.localeCompare(a));
    const currentVal  = document.getElementById("printMonthSelect").value;
    document.getElementById("printMonthSelect").innerHTML =
        `<option value="">Select month</option>` +
        sorted.map(k => `<option value="${k}">${monthMap[k]}</option>`).join("");
    if (sorted.includes(currentVal)) document.getElementById("printMonthSelect").value = currentVal;
}

function populateGroupMonthOptions(records) {
    const monthMap = {};
    records.forEach(r => {
        const { monthKey, monthName, year } = getYearMonth(r._resolvedEntryDate);
        if (!monthMap[monthKey]) monthMap[monthKey] = `${monthName} ${year}`;
    });
    const sorted     = Object.keys(monthMap).sort((a,b) => b.localeCompare(a));
    const currentVal = document.getElementById("groupMonthFilter").value;
    document.getElementById("groupMonthFilter").innerHTML =
        `<option value="">All Months</option>` +
        sorted.map(k => `<option value="${k}">${monthMap[k]}</option>`).join("");
    if (sorted.includes(currentVal)) document.getElementById("groupMonthFilter").value = currentVal;
}

// ─── HEADER FILTER SELECT ────────────────────────────────────────────────────
function renderHeaderFilterSelect(filterKey, options, selectedValue, placeholderLabel) {
    const normSel = normalizeText(selectedValue);
    return `
        <div class="header-filter-wrap">
            <span>${escapeHtml(placeholderLabel)}</span>
            <select onchange="setHeaderFilter('${filterKey}', this.value)">
                <option value="">All</option>
                ${options.map(opt => `<option value="${escapeHtml(opt)}" ${normalizeText(opt) === normSel ? "selected" : ""}>${escapeHtml(opt ? String(opt).toUpperCase() : "")}</option>`).join("")}
            </select>
        </div>`;
}

function getEntryDateFilterOptions(records) {
    return [...new Set(records.map(r => r._resolvedEntryDate).filter(Boolean))].sort((a,b) => b.localeCompare(a));
}

// ─── RENDER TRACKING ─────────────────────────────────────────────────────────
function renderTracking() {
    const keyword       = document.getElementById("searchInput").value.trim();
    const baseDonors    = allDonors.filter(r => matchesUnifiedSearch(r, keyword) && matchesMonthFilter(r));
    const entryDateOpts = getEntryDateFilterOptions(baseDonors);

    filteredDonors = baseDonors.filter(r => matchesHeaderFilters(r));

    currentDonationTotals = computeCurrentDonationTotals(allDonors);
    sequenceMap           = computeSequenceMap(filteredDonors);

    populatePrintMonthOptions(filteredDonors.length ? filteredDonors : allDonors);
    populateGroupMonthOptions(allDonors);

    if (!filteredDonors.length) {
        document.getElementById("trackingContainer").innerHTML = `<div class="empty-box">No donor records found.</div>`;
        return;
    }

    const grouped     = groupDonors(filteredDonors);
    const sortedYears = Object.keys(grouped).sort((a,b) => {
        if (a === "No Year") return 1;
        if (b === "No Year") return -1;
        return Number(b) - Number(a);
    });

    let html = "";
    sortedYears.forEach((year, yi) => {
        const monthsObj    = grouped[year];
        const sortedMonths = Object.keys(monthsObj).sort((a,b) => Number(b) - Number(a));
        const yearKey      = getGroupKey("year", year);
        const yearCollapsed= isCollapsed(yearKey);

        html += `
            <div class="year-group">
                <div class="year-header" onclick="toggleGroup('${yearKey}','year-body-${yi}','year-icon-${yi}')">
                    <span>${escapeHtml(year)}</span>
                    <span id="year-icon-${yi}" class="toggle-icon">${yearCollapsed ? "+" : "−"}</span>
                </div>
                <div id="year-body-${yi}" class="group-body ${yearCollapsed ? "hidden" : ""}">`;

        sortedMonths.forEach((month, mi) => {
            const monthBlock   = monthsObj[month];
            const records      = monthBlock.records;
            const monthKey     = getGroupKey("month", year, month);
            const monthCollapsed = isCollapsed(monthKey);
            const monthValue   = `${year}-${String(month).padStart(2,"0")}`;

            const mbdCount     = countType(records,"MBD");
            const walkInCount  = countType(records,"WALK-IN");
            const pdCount      = countType(records,"PATIENT DIRECTED");
            const realCount    = getCategorizedEntryCount(records);

            html += `
                <div class="month-group">
                    <div class="month-header" onclick="toggleGroup('${monthKey}','month-body-${yi}-${mi}','month-icon-${yi}-${mi}')">
                        <span>${escapeHtml(monthBlock.monthName)} (${realCount})</span>
                        <span id="month-icon-${yi}-${mi}" class="toggle-icon">${monthCollapsed ? "+" : "−"}</span>
                    </div>
                    <div id="month-body-${yi}-${mi}" class="group-body ${monthCollapsed ? "hidden" : ""}">
                        <div class="month-tools">
                            <button class="small-btn gray-btn"   onclick="printOneMonth('${monthValue}')">Print This Month</button>
                            <button class="small-btn green-btn"  onclick="exportOneMonthCsv('${monthValue}')">Export This Month CSV</button>
                            <button class="small-btn orange-btn" onclick="renderDuplicateMonthView('${monthValue}')">Show Duplicates This Month</button>
                        </div>
                        <div class="subtotal-bar">
                            <span>Entries: ${realCount}</span>
                            <span>MBD: ${mbdCount}</span>
                            <span>Walk-in: ${walkInCount}</span>
                            <span>Patient-Directed: ${pdCount}</span>
                            <span>New: ${records.filter(r => isDonorCategory(r,"new")).length}</span>
                            <span>Repeat: ${records.filter(r => isDonorCategory(r,"repeat")).length}</span>
                            <span>Lapse: ${records.filter(r => isDonorCategory(r,"lapse")).length}</span>
                        </div>
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th class="col-entrydate">${renderHeaderFilterSelect("entryDate", entryDateOpts, headerFilters.entryDate, "Entry Date")}</th>
                                        <th class="col-mbd">${renderHeaderFilterSelect("mbd", ["MBD"], headerFilters.mbd, "MBD")}</th>
                                        <th class="col-walkin">${renderHeaderFilterSelect("walkIn", ["WALK-IN"], headerFilters.walkIn, "Walk-in")}</th>
                                        <th class="col-patient">${renderHeaderFilterSelect("patientDirected", ["PATIENT DIRECTED"], headerFilters.patientDirected, "Patient-Directed")}</th>
                                        <th class="col-normal">Surname</th>
                                        <th class="col-normal">Given Name</th>
                                        <th class="col-normal">Middle Name</th>
                                        <th class="col-normal">Birthday</th>
                                        <th class="col-normal">Age</th>
                                        <th class="col-normal">${renderHeaderFilterSelect("sex", ["MALE","FEMALE"], headerFilters.sex, "Sex")}</th>
                                        <th class="col-normal">Contact Number</th>
                                        <th class="col-normal">House Number/Purok/Street Name</th>
                                        <th class="col-normal">Barangay/City</th>
                                        <th class="col-normal">Occupation</th>
                                        <th class="col-donorcat">${renderHeaderFilterSelect("donorCategory", ["New","Repeat","Lapse"], headerFilters.donorCategory, "Type of Donor")}</th>
                                        <th class="col-normal"># of Donations</th>
                                        <th class="col-bloodtype">${renderHeaderFilterSelect("bloodType", ["O+","O-","A+","A-","B+","B-","AB+","AB-","UNKNOWN"], headerFilters.bloodType, "Blood Type")}</th>
                                        <th class="col-serial">${renderHeaderFilterSelect("serialSort", ["asc","desc"], headerFilters.serialSort, "Serial Number")}</th>
                                        <th class="col-amount">${renderHeaderFilterSelect("amount", ["450 ML","QNS","UB"], headerFilters.amount, "Amount")}</th>
                                        <th class="col-normal">Blood Bag Used</th>
                                        <th class="col-normal">${renderHeaderFilterSelect("bloodBagType", ["SINGLE","DOUBLE","TRIPLE","QUADRUPLE"], headerFilters.bloodBagType, "Type of Blood Bag")}</th>
                                        <th class="col-normal col-time-start">Time Started</th>
                                        <th class="col-normal col-time-end">Time Ended</th>
                                        <th class="col-normal">Remarks</th>
                                        <th class="col-actions">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>`;

            records.forEach(r => {
                const donorKey    = buildDonorKey(r);
                const latestTotal = currentDonationTotals[donorKey] ?? resolveDonationCountValue(r.numberOfDonations);
                const enteredVal  = resolveDonationCountValue(r.numberOfDonations);

                html += `
                    <tr id="row-${r.id}">
                        <td>${escapeHtml(r._resolvedEntryDate)}</td>
                        <td>${escapeUpperHtml(isDonorType(r,"MBD")              ? getCategoryDisplay(r,"MBD")              : "")}</td>
                        <td>${escapeUpperHtml(isDonorType(r,"WALK-IN")          ? getCategoryDisplay(r,"WALK-IN")          : "")}</td>
                        <td>${escapeUpperHtml(isDonorType(r,"PATIENT DIRECTED") ? getCategoryDisplay(r,"PATIENT DIRECTED") : "")}</td>
                        <td>${escapeUpperHtml(getSurnameWithSuffix(r))}</td>
                        <td>${escapeUpperHtml(r.firstName)}</td>
                        <td>${escapeUpperHtml(r.middleName)}</td>
                        <td>${escapeHtml(r._resolvedBirthday)}</td>
                        <td>${escapeHtml(r.age)}</td>
                        <td>${escapeUpperHtml(r.sex)}</td>
                        <td>${escapeUpperHtml(r.contactNumber)}</td>
                        <td>${escapeUpperHtml(r.address)}</td>
                        <td>${escapeUpperHtml(r.cityProvince)}</td>
                        <td>${escapeUpperHtml(r.occupation)}</td>
                        <td>${escapeUpperHtml(r.donorCategory || "")}</td>
                        <td title="Entered for this record: ${escapeHtml(enteredVal)}">
                            <span class="donation-total">${escapeHtml(latestTotal)}</span>
                            <span class="donation-entry-note">ENTRY: ${escapeHtml(enteredVal)}</span>
                        </td>
                        <td>${r._resolvedBloodType
                            ? `<span style="font-weight:bold;">${escapeHtml(r._resolvedBloodType)}</span>`
                            : `<span style="color:#b30000;font-weight:bold;font-size:11px;background:#fdeaea;padding:2px 6px;border-radius:4px;cursor:pointer;" onclick="startEdit('${r.id}')" title="Blood type missing — click to edit">?</span>`
                        }</td>
                        <td>${escapeUpperHtml(r.serialNumber)}</td>
                        <td>${escapeUpperHtml(r.amount)}</td>
                        <td>${escapeUpperHtml(r.bloodBagBrand)}</td>
                        <td>${escapeUpperHtml(r.bloodBagType)}</td>
                        <td class="col-time-start">${escapeHtml(r._resolvedTimeStarted)}</td>
                        <td class="col-time-end">${escapeHtml(r._resolvedTimeEnded)}</td>
                        <td>${escapeUpperHtml(r.remarks)}</td>
                        <td class="actions-cell">
                            <button class="small-btn edit-btn"   onclick="startEdit('${r.id}')">Edit</button>
                            <button class="small-btn delete-btn" onclick="deleteDonor('${r.id}')">Delete</button>
                        </td>
                    </tr>`;
            });

            html += `</tbody></table></div></div></div>`;
        });

        html += `</div></div>`;
    });

    document.getElementById("trackingContainer").innerHTML = html;
}

// ─── LOAD DONORS ──────────────────────────────────────────────────────────────
async function loadDonors() {
    try {
        const user = auth.currentUser;
        if (!user) {
            document.getElementById("trackingContainer").innerHTML = `<div class="empty-box">Please log in first.</div>`;
            return;
        }

        const snapshot = await db.collection("donorDatabase").get();

        allDonors = snapshot.docs
            .map(doc => ({ id: doc.id, ...doc.data() }))
            .filter(r => r.isDeleted !== true)
            .map(r => attachResolvedFields(r));

        // Apply carry-forward BEFORE resolving entry dates for display
        applyImportedDateCarryForward(allDonors);
        // Re-resolve entry dates after carry-forward (since _resolvedEntryDate was just set)
        allDonors.forEach(r => { r._resolvedEntryDate = resolveEntryDate(r); });

        allDonors.sort((a, b) => {
            const dc = (b._resolvedEntryDate || "").localeCompare(a._resolvedEntryDate || "");
            return dc !== 0 ? dc : String(a.serialNumber || "").localeCompare(String(b.serialNumber || ""), undefined, { numeric:true, sensitivity:"base" });
        });

        populateGroupMonthOptions(allDonors);
        renderTracking();

        const pms = document.getElementById("printMonthSelect").value;
        if (pms) renderDuplicateMonthView(pms);
        else     hideDuplicateBox();

    } catch(e) {
        console.error(e);
        document.getElementById("trackingContainer").innerHTML = `<div class="empty-box">Failed to load donor records.</div>`;
        showMessage("Failed to load donor records: " + e.message, "error");
    }
}

// ─── EDIT ─────────────────────────────────────────────────────────────────────
function buildEditSelect(options, selectedValue) {
    const normSel = normalizeText(selectedValue);
    return `<select class="edit-select">${options.map(opt => `<option value="${escapeHtml(opt)}" ${normalizeText(opt) === normSel ? "selected" : ""}>${escapeHtml(opt ? String(opt).toUpperCase() : "")}</option>`).join("")}</select>`;
}
function buildEditInput(value, type = "text") {
    const safe = type === "text" ? toUpperDisplay(value || "") : (value || "");
    return `<input class="edit-input" type="${type}" value="${escapeHtml(safe)}"${type === "text" ? ' data-uppercase="true" style="text-transform:uppercase;"' : ""}>`;
}
function buildEditCheckbox(checked, labelText) {
    return `<label class="edit-checkbox-label"><input type="checkbox" class="edit-checkbox" ${checked ? "checked" : ""}><span>${escapeHtml(labelText)}</span></label>`;
}

function updateLocalDonorRecord(id, newData) {
    const idx = allDonors.findIndex(r => r.id === id);
    if (idx === -1) return;
    allDonors[idx] = attachResolvedFields({ ...allDonors[idx], ...newData });
    // Re-resolve blood type after edit
    allDonors[idx]._resolvedBloodType = resolveBloodType(allDonors[idx]);
}

window.startEdit = function(id) {
    hideDuplicateBox();
    const r = allDonors.find(r => r.id === id);
    if (!r) return;
    const row = document.getElementById(`row-${id}`);
    if (!row) {
        showMessage("Record is not visible in the current view. Clear filters and try again.", "error");
        return;
    }
    row.innerHTML = `
        <td>${buildEditInput(r._resolvedEntryDate || "", "date")}</td>
        <td>${buildEditInput(r.mbdDetails || "")}</td>
        <td>${buildEditCheckbox(isDonorType(r,"WALK-IN"), "WALK-IN")}</td>
        <td>${buildEditInput(r.patientDirectedDetails || "")}</td>
        <td>${buildEditInput(r.surname || "")}</td>
        <td>${buildEditInput(r.firstName || "")}</td>
        <td>${buildEditInput(r.middleName || "")}</td>
        <td>${buildEditInput(parseDateFlexible(r._resolvedBirthday || r.birthday || ""), "date")}</td>
        <td>${buildEditInput(r.age || "", "number")}</td>
        <td>${buildEditSelect(["MALE","FEMALE"], r.sex || "")}</td>
        <td>${buildEditInput(r.contactNumber || "")}</td>
        <td>${buildEditInput(r.address || "")}</td>
        <td>${buildEditInput(r.cityProvince || "")}</td>
        <td>${buildEditInput(r.occupation || "")}</td>
        <td>${buildEditSelect(["New","Repeat","Lapse"], r.donorCategory || "")}</td>
        <td>${buildEditInput(resolveDonationCountValue(r.numberOfDonations), "text")}</td>
        <td>${buildEditSelect(["O+","O-","A+","A-","B+","B-","AB+","AB-","UNKNOWN"], r._resolvedBloodType || r.bloodType || "")}</td>
        <td>${buildEditInput(r.serialNumber || "")}</td>
        <td>${buildEditSelect(["450 ML","QNS","UB"], r.amount || "")}</td>
        <td>${buildEditSelect(["KARMI","TERUMO"], r.bloodBagBrand || "")}</td>
        <td>${buildEditSelect(["SINGLE","DOUBLE","TRIPLE","QUADRUPLE"], r.bloodBagType || "")}</td>
        <td>${buildEditInput(r._resolvedTimeStarted || "", "time")}</td>
        <td>${buildEditInput(r._resolvedTimeEnded || "", "time")}</td>
        <td>${buildEditInput(r.remarks || "")}</td>
        <td class="actions-cell">
            <button class="small-btn save-btn"   onclick="saveEdit('${id}')">Save</button>
            <button class="small-btn cancel-btn" onclick="renderTracking()">Cancel</button>
        </td>`;
};

window.saveEdit = async function(id) {
    const row    = document.getElementById(`row-${id}`);
    const fields = row.querySelectorAll("input, select");

    const mbdDetails              = fields[1].value.trim();
    const walkInChecked           = fields[2].checked;
    const patientDirectedDetails  = fields[3].value.trim();

    const donorTypes = [];
    if (mbdDetails)             donorTypes.push("MBD");
    if (walkInChecked)          donorTypes.push("WALK-IN");
    if (patientDirectedDetails) donorTypes.push("PATIENT DIRECTED");

    // Blood type is fields[16] — save the canonical value from the select
    const updatedData = {
        entryDate:              fields[0].value,
        mbdDetails:             toUpperTrim(mbdDetails),
        patientDirectedDetails: toUpperTrim(patientDirectedDetails),
        donorType:              donorTypes.join(", "),
        surname:                toUpperTrim(fields[4].value),
        firstName:              toUpperTrim(fields[5].value),
        middleName:             toUpperTrim(fields[6].value),
        birthday:               fields[7].value,
        age:                    parseInt(fields[8].value || "0"),
        sex:                    fields[9].value,
        contactNumber:          toUpperTrim(fields[10].value),
        address:                toUpperTrim(fields[11].value),
        cityProvince:           toUpperTrim(fields[12].value),
        occupation:             toUpperTrim(fields[13].value),
        donorCategory:          fields[14].value,
        numberOfDonations:      fields[15].value.trim(),
        bloodType:              fields[16].value,   // already canonical from select
        serialNumber:           toUpperTrim(fields[17].value),
        amount:                 fields[18].value,
        bloodBagBrand:          fields[19].value,
        bloodBagType:           fields[20].value,
        timeStarted:            fields[21].value,
        timeEnded:              fields[22].value,
        remarks:                toUpperTrim(fields[23].value)
    };

    try {
        await db.collection("donorDatabase").doc(id).update(updatedData);

        backupToGoogleSheets({ action:"update", source:"donor-tracking.html", donorId:id, updatedAt:new Date().toISOString(), ...updatedData });

        updateLocalDonorRecord(id, updatedData);
        renderTracking();
        showMessage("Record updated successfully.", "success");
    } catch(e) {
        console.error(e);
        showMessage("Failed to update record: " + e.message, "error");
    }
};

window.deleteDonor = async function(id) {
    if (!confirm("Delete this donor record?")) return;
    try {
        await db.collection("donorDatabase").doc(id).update({
            isDeleted: true,
            deletedAt: firebase.firestore.FieldValue.serverTimestamp(),
            deletedFrom: "donor-tracking.html"
        });
        const r = allDonors.find(r => r.id === id) || {};
        backupToGoogleSheets({ action:"soft_delete", source:"donor-tracking.html", donorId:id, deletedAt:new Date().toISOString(), ...r, isDeleted:true });
        allDonors      = allDonors.filter(r => r.id !== id);
        filteredDonors = filteredDonors.filter(r => r.id !== id);
        renderTracking();
        showMessage("Record deleted successfully.", "success");
    } catch(e) {
        console.error(e);
        showMessage("Failed to delete record: " + e.message, "error");
    }
};

// ─── DUPLICATE VIEW ───────────────────────────────────────────────────────────
function buildDuplicateKey(r) {
    return [
        normalizeText(r.serialNumber),
        normalizeText(r.surname),
        normalizeText(r.firstName),
        normalizeText(r.middleName),
        normalizeText(r._resolvedBirthday)
    ].join("|");
}

function getDuplicateRecordsForMonth(monthValue) {
    const monthRecords = allDonors.filter(r => getYearMonth(r._resolvedEntryDate).monthKey === monthValue);
    const grouped = {};
    monthRecords.forEach(r => {
        const key = buildDuplicateKey(r);
        if (!grouped[key]) grouped[key] = [];
        grouped[key].push(r);
    });
    return Object.values(grouped).filter(g => g.length > 1);
}

function renderDuplicateMonthView(monthValue) {
    if (!monthValue) { showMessage("Please select a month first for Duplicate Data.", "error"); return; }
    const dupes = getDuplicateRecordsForMonth(monthValue);
    const parts = monthValue.split("-");
    const label = `${MONTHS[parseInt(parts[1],10)-1]} ${parts[0]}`;
    if (!dupes.length) {
        showDuplicateBox(`Duplicate Data - ${label}`, "No duplicate data found for this month.", `<tr><td colspan="11">No duplicate data found for this month.</td></tr>`);
        return;
    }
    let rowsHtml = ""; let grp = 1; let total = 0;
    dupes.forEach(group => {
        group.forEach((r, idx) => {
            total++;
            rowsHtml += `
                <tr>
                    <td>${idx === 0 ? `Duplicate ${grp} (${group.length})` : ""}</td>
                    <td>${escapeHtml(r._resolvedEntryDate)}</td>
                    <td>${escapeUpperHtml(r.serialNumber)}</td>
                    <td>${escapeUpperHtml(getSurnameWithSuffix(r))}</td>
                    <td>${escapeUpperHtml(r.firstName)}</td>
                    <td>${escapeUpperHtml(r.middleName)}</td>
                    <td>${escapeHtml(r._resolvedBirthday)}</td>
                    <td>${escapeHtml(r._resolvedBloodType)}</td>
                    <td>${escapeUpperHtml(resolveDonorType(r))}</td>
                    <td>${escapeUpperHtml(r.mbdDetails || r.patientDirectedDetails || "")}</td>
                    <td class="actions-cell">
                        <button class="small-btn edit-btn"   onclick="startEdit('${r.id}')">Edit</button>
                        <button class="small-btn delete-btn" onclick="deleteDonor('${r.id}')">Delete</button>
                    </td>
                </tr>`;
        });
        grp++;
    });
    showDuplicateBox(`Duplicate Data - ${label}`, `Duplicate groups: ${dupes.length} | Duplicate rows: ${total}`, rowsHtml);
}

// ─── PRINT / EXPORT ───────────────────────────────────────────────────────────
function getMonthLabel(monthValue) {
    const p = monthValue.split("-");
    return `${MONTHS[parseInt(p[1],10)-1]} ${p[0]}`;
}
function getMonthPrintDateRange(records) {
    const dates = records.map(r => r._resolvedEntryDate).filter(Boolean).sort((a,b) => a.localeCompare(b));
    if (!dates.length) return "";
    return `${formatPrintDate(dates[0])} to ${formatPrintDate(dates[dates.length-1])}`;
}
function formatPrintDate(dateText) {
    const p = parseDateFlexible(dateText);
    if (!p || !/^\d{4}-\d{2}-\d{2}$/.test(p)) return dateText || "";
    const [y,m,d] = p.split("-");
    return `${m}-${d}-${y.slice(-2)}`;
}
function abbreviateSex(v) {
    const s = normalizeText(v);
    return s === "male" ? "M" : s === "female" ? "F" : v || "";
}
function abbreviateBloodBagType(v) {
    const s = normalizeText(v);
    if (s === "single") return "S"; if (s === "double") return "D";
    if (s === "triple") return "T"; if (s === "quadruple") return "Q";
    return v || "";
}
function hasPrintableRemarks(records) { return records.some(r => String(r.remarks || "").trim() !== ""); }

function buildPrintRows(records, includeRemarks) {
    return [...records].sort(compareByEntryDateAsc).map(r => {
        const donorKey    = buildDonorKey(r);
        const latestTotal = currentDonationTotals[donorKey] ?? resolveDonationCountValue(r.numberOfDonations);
        return `
            <tr>
                <td class="col-entry-date">${escapeHtml(formatPrintDate(r._resolvedEntryDate))}</td>
                <td class="col-mbd">${escapeUpperHtml(isDonorType(r,"MBD")              ? getCategoryDisplay(r,"MBD")              : "")}</td>
                <td class="col-walkin">${escapeUpperHtml(isDonorType(r,"WALK-IN")        ? getCategoryDisplay(r,"WALK-IN")          : "")}</td>
                <td class="col-pd">${escapeUpperHtml(isDonorType(r,"PATIENT DIRECTED")   ? getCategoryDisplay(r,"PATIENT DIRECTED") : "")}</td>
                <td class="col-surname">${escapeUpperHtml(getSurnameWithSuffix(r))}</td>
                <td class="col-given print-no-wrap">${escapeUpperHtml(r.firstName)}</td>
                <td class="col-middle">${escapeUpperHtml(r.middleName)}</td>
                <td class="col-bday">${escapeHtml(formatPrintDate(r._resolvedBirthday))}</td>
                <td class="col-age">${escapeHtml(r.age)}</td>
                <td class="col-sex">${escapeHtml(abbreviateSex(r.sex))}</td>
                <td class="col-contact">${escapeUpperHtml(r.contactNumber)}</td>
                <td class="col-address print-address-cell">${escapeUpperHtml(r.address)}</td>
                <td class="col-city">${escapeUpperHtml(r.cityProvince)}</td>
                <td class="col-occ">${escapeUpperHtml(r.occupation)}</td>
                <td class="col-donor-type">${escapeUpperHtml(r.donorCategory || "")}</td>
                <td class="col-donations">${escapeHtml(latestTotal)}</td>
                <td class="col-bt">${escapeHtml(r._resolvedBloodType)}</td>
                <td class="col-serial print-no-wrap">${escapeUpperHtml(r.serialNumber)}</td>
                <td class="col-amt">${escapeUpperHtml(r.amount)}</td>
                <td class="col-bbused">${escapeUpperHtml(r.bloodBagBrand)}</td>
                <td class="col-bagtype">${escapeHtml(abbreviateBloodBagType(r.bloodBagType))}</td>
                <td class="col-ts">${escapeHtml(r._resolvedTimeStarted)}</td>
                <td class="col-te">${escapeHtml(r._resolvedTimeEnded)}</td>
                ${includeRemarks ? `<td class="col-remarks">${escapeUpperHtml(r.remarks)}</td>` : ""}
            </tr>`;
    }).join("");
}

function buildPrintableTable(records, monthLabel) {
    const dateRange    = getMonthPrintDateRange(records);
    const includeRemarks = hasPrintableRemarks(records);
    const rows         = buildPrintRows(records, includeRemarks);
    return `<!DOCTYPE html><html><head><title>Print ${monthLabel}</title>
    <style>
        @page { size: 8.5in 13in landscape; margin: 6mm; }
        * { box-sizing: border-box; }
        body { font-family: Arial, sans-serif; margin: 0; color: #111827; }
        h2 { margin: 0 0 4px 0; color: #8b0000; font-size: 15px; }
        .sub { margin-bottom: 4px; color: #555; font-weight: bold; font-size: 10px; }
        .date-range { margin-bottom: 6px; color: #7a2e00; font-weight: bold; font-size: 9px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 7px; }
        th, td { border: 1px solid #999; padding: 2px; text-align: center; vertical-align: middle; white-space: normal; word-break: break-word; line-height: 1.05; }
        th { background: #efefef; font-size: 6.8px; }
        .print-address-cell { text-align: left; }
        .print-no-wrap { white-space: nowrap !important; word-break: normal !important; }
        .col-entry-date{width:5.2%} .col-mbd{width:5.0%} .col-walkin{width:4.2%} .col-pd{width:5.4%}
        .col-surname{width:7.0%} .col-given{width:10.5%} .col-middle{width:6.4%} .col-bday{width:5.0%}
        .col-age{width:2.5%} .col-sex{width:2.0%} .col-contact{width:5.0%} .col-address{width:10.8%}
        .col-city{width:4.8%} .col-occ{width:4.5%} .col-donor-type{width:4.0%} .col-donations{width:3.0%}
        .col-bt{width:2.4%} .col-serial{width:11.0%} .col-amt{width:2.4%} .col-bbused{width:4.0%}
        .col-bagtype{width:2.6%} .col-ts{width:3.0%} .col-te{width:3.0%} .col-remarks{width:4.7%}
        thead { display: table-header-group; }
        tr, td, th { page-break-inside: avoid; }
    </style></head><body>
    <h2>Donor Database Tracking</h2>
    <div class="sub">${monthLabel}</div>
    <div class="date-range">${escapeHtml(dateRange)}</div>
    <table>
        <thead><tr>
            <th class="col-entry-date">Entry Date</th><th class="col-mbd">MBD</th>
            <th class="col-walkin">Walk-in</th><th class="col-pd">Patient-Directed</th>
            <th class="col-surname">Surname</th><th class="col-given print-no-wrap">Given Name</th>
            <th class="col-middle">Middle Name</th><th class="col-bday">Birthday</th>
            <th class="col-age">Age</th><th class="col-sex">Sex</th>
            <th class="col-contact">Contact No.</th><th class="col-address">Address</th>
            <th class="col-city">Brgy/City</th><th class="col-occ">Occupation</th>
            <th class="col-donor-type">Type</th><th class="col-donations"># of D</th>
            <th class="col-bt">BT</th><th class="col-serial print-no-wrap">Serial No.</th>
            <th class="col-amt">AMT</th><th class="col-bbused">BB USED</th>
            <th class="col-bagtype">Bag</th><th class="col-ts">TS</th><th class="col-te">TE</th>
            ${includeRemarks ? `<th class="col-remarks">Remarks</th>` : ""}
        </tr></thead>
        <tbody>${rows}</tbody>
    </table></body></html>`;
}

function getRecordsForMonth(monthValue) {
    return filteredDonors.filter(r => getYearMonth(r._resolvedEntryDate).monthKey === monthValue);
}

window.printOneMonth = function(monthValue) {
    const records = getRecordsForMonth(monthValue);
    if (!records.length) { showMessage("No records found for that month.", "error"); return; }
    const pw = window.open("", "_blank");
    pw.document.write(buildPrintableTable(records, getMonthLabel(monthValue)));
    pw.document.close(); pw.focus(); pw.print();
};

function buildGroupedCsv(records) {
    const grouped     = groupDonors(records);
    const sortedYears = Object.keys(grouped).sort((a,b) => { if (a === "No Year") return 1; if (b === "No Year") return -1; return Number(b)-Number(a); });
    const lines       = [];
    sortedYears.forEach(year => {
        lines.push([`Year: ${year}`]);
        Object.keys(grouped[year]).sort((a,b) => Number(b)-Number(a)).forEach(month => {
            const { monthName, records: recs } = grouped[year][month];
            const realCount = getCategorizedEntryCount(recs);
            lines.push([`Month: ${monthName} ${year}`]);
            lines.push([`Entries: ${realCount}`, `MBD: ${countType(recs,"MBD")}`, `Walk-in: ${countType(recs,"WALK-IN")}`, `Patient-Directed: ${countType(recs,"PATIENT DIRECTED")}`, `New: ${recs.filter(r=>isDonorCategory(r,"new")).length}`, `Repeat: ${recs.filter(r=>isDonorCategory(r,"repeat")).length}`, `Lapse: ${recs.filter(r=>isDonorCategory(r,"lapse")).length}`]);
            lines.push(["Entry Date","MBD","Walk-in","Patient-Directed","Surname","Given Name","Middle Name","Birthday","Age","Sex","Contact Number","House Number/Purok/Street Name","Barangay/City","Occupation","Type of Donor","# of Donations","Blood Type","Serial Number","Amount","Blood Bag Used","Type of Blood Bag","Time Started","Time Ended","Remarks"]);
            recs.forEach(r => {
                const donorKey    = buildDonorKey(r);
                const latestTotal = currentDonationTotals[donorKey] ?? resolveDonationCountValue(r.numberOfDonations);
                lines.push([
                    r._resolvedEntryDate || "",
                    isDonorType(r,"MBD")              ? getCategoryDisplay(r,"MBD")              : "",
                    isDonorType(r,"WALK-IN")           ? getCategoryDisplay(r,"WALK-IN")          : "",
                    isDonorType(r,"PATIENT DIRECTED")  ? getCategoryDisplay(r,"PATIENT DIRECTED") : "",
                    toUpperDisplay(getSurnameWithSuffix(r)),
                    toUpperDisplay(r.firstName || ""),
                    toUpperDisplay(r.middleName || ""),
                    r._resolvedBirthday || "",
                    r.age || "",
                    toUpperDisplay(r.sex || ""),
                    toUpperDisplay(r.contactNumber || ""),
                    toUpperDisplay(r.address || ""),
                    toUpperDisplay(r.cityProvince || ""),
                    toUpperDisplay(r.occupation || ""),
                    toUpperDisplay(r.donorCategory || ""),
                    latestTotal,
                    r._resolvedBloodType || "",
                    toUpperDisplay(r.serialNumber || ""),
                    toUpperDisplay(r.amount || ""),
                    toUpperDisplay(r.bloodBagBrand || ""),
                    toUpperDisplay(r.bloodBagType || ""),
                    r._resolvedTimeStarted || "",
                    r._resolvedTimeEnded   || "",
                    toUpperDisplay(r.remarks || "")
                ]);
            });
            lines.push([]);
        });
    });
    return lines.map(row => row.map(csvEscape).join(",")).join("\n");
}

function exportCsv(records, fileLabel) {
    if (!records.length) { showMessage("No records to export.", "error"); return; }
    const csv  = buildGroupedCsv(records);
    const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url  = URL.createObjectURL(blob);
    link.href = url; link.download = fileLabel;
    document.body.appendChild(link); link.click();
    document.body.removeChild(link); URL.revokeObjectURL(url);
}

window.exportOneMonthCsv = function(monthValue) {
    const records = getRecordsForMonth(monthValue);
    if (!records.length) { showMessage("No records found for that month.", "error"); return; }
    exportCsv(records, `donor-tracking-${monthValue}.csv`);
    showMessage("Selected month CSV exported successfully.", "success");
};

// ─── TOGGLE GROUPS ────────────────────────────────────────────────────────────
window.toggleGroup = function(groupKey, bodyId, iconId) {
    const body = document.getElementById(bodyId);
    const icon = document.getElementById(iconId);
    if (!body || !icon) return;
    const willHide = !body.classList.contains("hidden");
    if (willHide) { body.classList.add("hidden"); icon.textContent = "+"; collapsedGroups[groupKey] = true; }
    else          { body.classList.remove("hidden"); icon.textContent = "−"; collapsedGroups[groupKey] = false; }
};

window.setHeaderFilter = function(filterKey, value) {
    headerFilters[filterKey] = value;
    if (value && ["mbd","walkIn","patientDirected"].includes(filterKey)) {
        ["mbd","walkIn","patientDirected"].forEach(k => { if (k !== filterKey) headerFilters[k] = ""; });
    }
    renderTracking();
};

// ─── BUTTON HANDLERS ─────────────────────────────────────────────────────────
document.getElementById("reloadBtn").addEventListener("click", async () => {
    hideDuplicateBox();
    await loadDonors();
    showMessage("Tracking data reloaded.", "success");
});

document.getElementById("searchInput").addEventListener("input", () => { hideDuplicateBox(); renderTracking(); });
document.getElementById("groupMonthFilter").addEventListener("change", () => { hideDuplicateBox(); renderTracking(); });

document.getElementById("printSelectedMonthBtn").addEventListener("click", () => {
    const val = document.getElementById("printMonthSelect").value;
    if (!val) { showMessage("Please select a month to print.", "error"); return; }
    window.printOneMonth(val);
});

document.getElementById("exportCsvBtn").addEventListener("click", () => {
    exportCsv(filteredDonors, "donor-database-filtered.csv");
    showMessage("Filtered CSV exported successfully.", "success");
});

document.getElementById("collapseAllBtn").addEventListener("click", () => {
    const grouped = groupDonors(filteredDonors);
    Object.keys(grouped).forEach(y => {
        collapsedGroups[getGroupKey("year", y)] = true;
        Object.keys(grouped[y]).forEach(m => { collapsedGroups[getGroupKey("month", y, m)] = true; });
    });
    renderTracking();
});

document.getElementById("expandAllBtn").addEventListener("click", () => {
    const grouped = groupDonors(filteredDonors);
    Object.keys(grouped).forEach(y => {
        collapsedGroups[getGroupKey("year", y)] = false;
        Object.keys(grouped[y]).forEach(m => { collapsedGroups[getGroupKey("month", y, m)] = false; });
    });
    renderTracking();
});

document.getElementById("duplicateDataBtn").addEventListener("click", () => {
    renderDuplicateMonthView(document.getElementById("printMonthSelect").value);
});

document.addEventListener("input", e => {
    if (!e.target.matches('.edit-input[data-uppercase="true"]')) return;
    const s = e.target.selectionStart, en = e.target.selectionEnd;
    e.target.value = e.target.value.toUpperCase();
    if (s !== null) e.target.setSelectionRange(s, en);
});

// ─── AUTH ─────────────────────────────────────────────────────────────────────
auth.onAuthStateChanged(user => {
    if (user) loadDonors();
    else document.getElementById("trackingContainer").innerHTML = `<div class="empty-box">Please log in first.</div>`;
});
</script>
