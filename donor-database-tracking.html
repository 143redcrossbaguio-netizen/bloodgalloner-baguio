<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Tracking</title>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        header {
            background: #b30000;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .page-wrap {
            display: flex;
            gap: 18px;
            max-width: 100%;
            padding: 18px;
        }

        .left-panel {
            width: 250px;
            min-width: 250px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            padding: 18px;
            height: fit-content;
            position: sticky;
            top: 18px;
        }

        .left-panel h3 {
            margin-top: 0;
            color: #b30000;
            font-size: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .count-card {
            background: #fff5f5;
            border: 1px solid #efc1c1;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .count-title {
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
        }

        .count-value {
            font-size: 32px;
            font-weight: bold;
            color: #b30000;
        }

        .search-box {
            margin-top: 18px;
        }

        .search-box label {
            display: block;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .content-panel {
            flex: 1;
            min-width: 0;
        }

        .toolbar {
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            padding: 16px;
            margin-bottom: 18px;
        }

        .toolbar h3 {
            margin: 0 0 8px 0;
            color: #b30000;
        }

        .status-message {
            display: none;
            margin-top: 12px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        .status-success {
            display: block;
            background: #e8f7e8;
            color: #1b5e20;
            border: 1px solid #b7dfb9;
        }

        .status-error {
            display: block;
            background: #fdeaea;
            color: #b71c1c;
            border: 1px solid #efb7b7;
        }

        .year-group,
        .month-group {
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            margin-bottom: 14px;
            overflow: hidden;
        }

        .year-header,
        .month-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
        }

        .year-header {
            padding: 16px 18px;
            background: #b30000;
            color: white;
            font-size: 18px;
        }

        .month-header {
            padding: 14px 18px;
            background: #f8f8f8;
            color: #333;
            border-top: 1px solid #eee;
            font-size: 15px;
        }

        .toggle-icon {
            font-size: 18px;
            font-weight: bold;
        }

        .group-body {
            display: block;
        }

        .group-body.hidden {
            display: none;
        }

        .table-wrap {
            overflow-x: auto;
            width: 100%;
            background: white;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            min-width: 2100px;
            font-size: 13px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px 10px;
            text-align: center;
            vertical-align: middle;
            white-space: nowrap;
        }

        th {
            font-weight: bold;
            color: #111;
        }

        th.col-mbd { background: #e7c1a7; }
        th.col-walkin { background: #b9d2f0; }
        th.col-patient { background: #bcd796; }
        th.col-normal { background: #efefef; }
        th.col-bloodtype { background: #f8f8f8; }
        th.col-serial { background: #f3f3f3; }
        th.col-amount { background: #c9d7ff; }
        th.col-actions { background: #ececec; }

        .flag-cell {
            font-weight: bold;
        }

        .yes-cell {
            color: #0b7a0b;
        }

        .no-cell {
            color: #999;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 6px;
            padding: 7px 10px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        .edit-btn {
            background: #1976d2;
            color: white;
        }

        .delete-btn {
            background: #b30000;
            color: white;
        }

        .save-btn {
            background: #2e7d32;
            color: white;
        }

        .cancel-btn {
            background: #666;
            color: white;
        }

        .edit-input,
        .edit-select {
            width: 100%;
            min-width: 80px;
            padding: 6px 8px;
            border: 1px solid #bbb;
            border-radius: 5px;
            font-size: 12px;
        }

        .empty-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.12);
            padding: 28px;
            text-align: center;
            color: #666;
            font-weight: bold;
        }

        @media (max-width: 1000px) {
            .page-wrap {
                flex-direction: column;
            }

            .left-panel {
                width: 100%;
                min-width: 100%;
                position: static;
            }
        }
    </style>
</head>
<body>

<header>Donor Database Tracking</header>

<div class="page-wrap">
    <div class="left-panel">
        <h3>Summary</h3>

        <div class="count-card">
            <div class="count-title">Total Entries</div>
            <div class="count-value" id="totalCount">0</div>
        </div>

        <div class="count-card">
            <div class="count-title">Displayed Entries</div>
            <div class="count-value" id="displayedCount">0</div>
        </div>

        <div class="search-box">
            <label for="searchInput">Search</label>
            <input type="text" id="searchInput" placeholder="Search surname, serial, contact, blood type...">
        </div>
    </div>

    <div class="content-panel">
        <div class="toolbar">
            <h3>Grouped by Year and Month</h3>
            <div>Records are arranged in the same order as your preferred tracking sheet layout.</div>
            <div id="statusMessage" class="status-message"></div>
        </div>

        <div id="trackingContainer"></div>
    </div>
</div>

<script>
    // ==========================================
    // KEEP YOUR EXISTING FIREBASE CONFIG
    // ==========================================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const trackingContainer = document.getElementById("trackingContainer");
    const totalCountEl = document.getElementById("totalCount");
    const displayedCountEl = document.getElementById("displayedCount");
    const searchInput = document.getElementById("searchInput");
    const statusMessage = document.getElementById("statusMessage");

    let allDonors = [];
    let filteredDonors = [];

    function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status-message";
        statusMessage.classList.add(type === "success" ? "status-success" : "status-error");
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) return "";
        return String(text)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function getMonthName(monthNumber) {
        const names = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];
        return names[monthNumber - 1] || "Unknown Month";
    }

    function getYearMonth(entryDate) {
        if (!entryDate) {
            return { year: "No Year", month: 0, monthName: "No Month" };
        }

        const parts = entryDate.split("-");
        if (parts.length !== 3) {
            return { year: "No Year", month: 0, monthName: "No Month" };
        }

        const year = parts[0];
        const month = parseInt(parts[1], 10);
        return {
            year,
            month,
            monthName: getMonthName(month)
        };
    }

    function matchesSearch(donor, keyword) {
        if (!keyword) return true;

        const text = [
            donor.entryDate,
            donor.serialNumber,
            donor.donorType,
            donor.patientDirectedDetails,
            donor.mbdDetails,
            donor.surname,
            donor.firstName,
            donor.middleName,
            donor.birthday,
            donor.age,
            donor.sex,
            donor.contactNumber,
            donor.address,
            donor.cityProvince,
            donor.numberOfDonations,
            donor.bloodType,
            donor.amount,
            donor.bloodBagBrand,
            donor.bloodBagType,
            donor.timeStarted,
            donor.timeEnded
        ].join(" ").toLowerCase();

        return text.includes(keyword.toLowerCase());
    }

    function groupDonors(records) {
        const grouped = {};

        records.forEach(donor => {
            const { year, month, monthName } = getYearMonth(donor.entryDate);

            if (!grouped[year]) {
                grouped[year] = {};
            }

            if (!grouped[year][month]) {
                grouped[year][month] = {
                    monthName,
                    records: []
                };
            }

            grouped[year][month].records.push(donor);
        });

        return grouped;
    }

    function renderTracking() {
        const keyword = searchInput.value.trim();
        filteredDonors = allDonors.filter(donor => matchesSearch(donor, keyword));

        totalCountEl.textContent = allDonors.length;
        displayedCountEl.textContent = filteredDonors.length;

        if (!filteredDonors.length) {
            trackingContainer.innerHTML = `<div class="empty-box">No donor records found.</div>`;
            return;
        }

        const grouped = groupDonors(filteredDonors);

        const sortedYears = Object.keys(grouped).sort((a, b) => {
            if (a === "No Year") return 1;
            if (b === "No Year") return -1;
            return Number(b) - Number(a);
        });

        let html = "";

        sortedYears.forEach((year, yearIndex) => {
            const monthsObj = grouped[year];
            const sortedMonths = Object.keys(monthsObj).sort((a, b) => Number(b) - Number(a));

            let yearTotal = 0;
            sortedMonths.forEach(month => {
                yearTotal += monthsObj[month].records.length;
            });

            html += `
                <div class="year-group">
                    <div class="year-header" onclick="toggleGroup('year-body-${yearIndex}', 'year-icon-${yearIndex}')">
                        <span>${escapeHtml(year)} (${yearTotal})</span>
                        <span id="year-icon-${yearIndex}" class="toggle-icon">−</span>
                    </div>
                    <div id="year-body-${yearIndex}" class="group-body">
            `;

            sortedMonths.forEach((month, monthIndex) => {
                const monthBlock = monthsObj[month];
                const records = monthBlock.records;

                html += `
                    <div class="month-group">
                        <div class="month-header" onclick="toggleGroup('month-body-${yearIndex}-${monthIndex}', 'month-icon-${yearIndex}-${monthIndex}')">
                            <span>${escapeHtml(monthBlock.monthName)} (${records.length})</span>
                            <span id="month-icon-${yearIndex}-${monthIndex}" class="toggle-icon">−</span>
                        </div>
                        <div id="month-body-${yearIndex}-${monthIndex}" class="group-body">
                            <div class="table-wrap">
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="col-mbd">MBD</th>
                                            <th class="col-walkin">Walk-in</th>
                                            <th class="col-patient">Patient-Directed</th>
                                            <th class="col-normal">Surname</th>
                                            <th class="col-normal">Given Name</th>
                                            <th class="col-normal">Middle Name</th>
                                            <th class="col-normal">Birthday</th>
                                            <th class="col-normal">Age</th>
                                            <th class="col-normal">Sex</th>
                                            <th class="col-normal">Contact Number</th>
                                            <th class="col-normal">House Number/Purok/Street Name</th>
                                            <th class="col-normal">Barangay/City</th>
                                            <th class="col-normal"># of Donations</th>
                                            <th class="col-bloodtype">Blood Type</th>
                                            <th class="col-serial">Serial Number</th>
                                            <th class="col-amount">Amount</th>
                                            <th class="col-normal">Blood Bag Used</th>
                                            <th class="col-normal">Type of Blood Bag</th>
                                            <th class="col-normal">Time Started</th>
                                            <th class="col-normal">Time Ended</th>
                                            <th class="col-normal">Remarks</th>
                                            <th class="col-actions">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                `;

                records.forEach(donor => {
                    const isMBD = donor.donorType === "MBD";
                    const isWalkIn = donor.donorType === "Walk-in";
                    const isPatientDirected = donor.donorType === "Patient Directed";

                    html += `
                        <tr id="row-${donor.id}">
                            <td class="flag-cell ${isMBD ? 'yes-cell' : 'no-cell'}">${isMBD ? escapeHtml(donor.mbdDetails || "YES") : ""}</td>
                            <td class="flag-cell ${isWalkIn ? 'yes-cell' : 'no-cell'}">${isWalkIn ? "YES" : ""}</td>
                            <td class="flag-cell ${isPatientDirected ? 'yes-cell' : 'no-cell'}">${isPatientDirected ? escapeHtml(donor.patientDirectedDetails || "YES") : ""}</td>
                            <td>${escapeHtml(donor.surname)}</td>
                            <td>${escapeHtml(donor.firstName)}</td>
                            <td>${escapeHtml(donor.middleName)}</td>
                            <td>${escapeHtml(donor.birthday)}</td>
                            <td>${escapeHtml(donor.age)}</td>
                            <td>${escapeHtml(donor.sex)}</td>
                            <td>${escapeHtml(donor.contactNumber)}</td>
                            <td>${escapeHtml(donor.address)}</td>
                            <td>${escapeHtml(donor.cityProvince)}</td>
                            <td>${escapeHtml(donor.numberOfDonations)}</td>
                            <td>${escapeHtml(donor.bloodType)}</td>
                            <td>${escapeHtml(donor.serialNumber)}</td>
                            <td>${escapeHtml(donor.amount)}</td>
                            <td>${escapeHtml(donor.bloodBagBrand)}</td>
                            <td>${escapeHtml(donor.bloodBagType)}</td>
                            <td>${escapeHtml(donor.timeStarted)}</td>
                            <td>${escapeHtml(donor.timeEnded)}</td>
                            <td>${escapeHtml(donor.remarks)}</td>
                            <td class="actions-cell">
                                <button class="edit-btn" onclick="startEdit('${donor.id}')">Edit</button>
                                <button class="delete-btn" onclick="deleteDonor('${donor.id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });

                html += `
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                `;
            });

            html += `
                    </div>
                </div>
            `;
        });

        trackingContainer.innerHTML = html;
    }

    function buildEditSelect(options, selectedValue) {
        return `
            <select class="edit-select">
                ${options.map(opt => `<option value="${escapeHtml(opt)}" ${opt === selectedValue ? "selected" : ""}>${escapeHtml(opt)}</option>`).join("")}
            </select>
        `;
    }

    function buildEditInput(value, type = "text") {
        return `<input class="edit-input" type="${type}" value="${escapeHtml(value || "")}">`;
    }

    window.startEdit = function(id) {
        const donor = allDonors.find(item => item.id === id);
        if (!donor) return;

        const row = document.getElementById(`row-${id}`);
        if (!row) return;

        row.innerHTML = `
            <td>
                ${buildEditInput(donor.mbdDetails || "")}
            </td>
            <td>
                ${buildEditSelect(["", "YES"], donor.donorType === "Walk-in" ? "YES" : "")}
            </td>
            <td>
                ${buildEditInput(donor.patientDirectedDetails || "")}
            </td>
            <td>${buildEditInput(donor.surname || "")}</td>
            <td>${buildEditInput(donor.firstName || "")}</td>
            <td>${buildEditInput(donor.middleName || "")}</td>
            <td>${buildEditInput(donor.birthday || "", "date")}</td>
            <td>${buildEditInput(donor.age || "", "number")}</td>
            <td>${buildEditSelect(["Male", "Female"], donor.sex || "")}</td>
            <td>${buildEditInput(donor.contactNumber || "")}</td>
            <td>${buildEditInput(donor.address || "")}</td>
            <td>${buildEditInput(donor.cityProvince || "")}</td>
            <td>${buildEditInput(donor.numberOfDonations || 0, "number")}</td>
            <td>${buildEditSelect(["A+","A-","B+","B-","AB+","AB-","O+","O-","Unknown"], donor.bloodType || "")}</td>
            <td>${buildEditInput(donor.serialNumber || "")}</td>
            <td>${buildEditSelect(["450 ml", "QNS", "UB"], donor.amount || "")}</td>
            <td>${buildEditSelect(["KARMI", "TERUMO"], donor.bloodBagBrand || "")}</td>
            <td>${buildEditSelect(["Single", "Double", "Triple", "Quadruple"], donor.bloodBagType || "")}</td>
            <td>${buildEditInput(donor.timeStarted || "", "time")}</td>
            <td>${buildEditInput(donor.timeEnded || "", "time")}</td>
            <td>${buildEditInput(donor.remarks || "")}</td>
            <td class="actions-cell">
                <button class="save-btn" onclick="saveEdit('${id}')">Save</button>
                <button class="cancel-btn" onclick="renderTracking()">Cancel</button>
            </td>
        `;
    };

    window.saveEdit = async function(id) {
        const row = document.getElementById(`row-${id}`);
        const fields = row.querySelectorAll("input, select");

        const mbdDetails = fields[0].value.trim();
        const walkInValue = fields[1].value;
        const patientDirectedDetails = fields[2].value.trim();

        let donorType = "Walk-in";
        if (mbdDetails) donorType = "MBD";
        else if (patientDirectedDetails) donorType = "Patient Directed";
        else if (walkInValue === "YES") donorType = "Walk-in";

        const updatedData = {
            mbdDetails: mbdDetails,
            patientDirectedDetails: patientDirectedDetails,
            donorType: donorType,
            surname: fields[3].value.trim(),
            firstName: fields[4].value.trim(),
            middleName: fields[5].value.trim(),
            birthday: fields[6].value,
            age: parseInt(fields[7].value || "0"),
            sex: fields[8].value,
            contactNumber: fields[9].value.trim(),
            address: fields[10].value.trim(),
            cityProvince: fields[11].value.trim(),
            numberOfDonations: parseInt(fields[12].value || "0"),
            bloodType: fields[13].value,
            serialNumber: fields[14].value.trim(),
            amount: fields[15].value,
            bloodBagBrand: fields[16].value,
            bloodBagType: fields[17].value,
            timeStarted: fields[18].value,
            timeEnded: fields[19].value,
            remarks: fields[20].value.trim()
        };

        try {
            await db.collection("donorDatabase").doc(id).update(updatedData);
            showMessage("Record updated successfully.", "success");
            loadDonors();
        } catch (error) {
            console.error(error);
            showMessage("Failed to update record: " + error.message, "error");
        }
    };

    window.deleteDonor = async function(id) {
        const confirmed = confirm("Delete this donor record?");
        if (!confirmed) return;

        try {
            await db.collection("donorDatabase").doc(id).delete();
            showMessage("Record deleted successfully.", "success");
            loadDonors();
        } catch (error) {
            console.error(error);
            showMessage("Failed to delete record: " + error.message, "error");
        }
    };

    window.toggleGroup = function(bodyId, iconId) {
        const body = document.getElementById(bodyId);
        const icon = document.getElementById(iconId);

        if (!body || !icon) return;

        body.classList.toggle("hidden");
        icon.textContent = body.classList.contains("hidden") ? "+" : "−";
    };

    async function loadDonors() {
        try {
            const user = auth.currentUser;
            if (!user) {
                trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
                totalCountEl.textContent = "0";
                displayedCountEl.textContent = "0";
                return;
            }

            const snapshot = await db.collection("donorDatabase").orderBy("entryDate", "desc").get();

            allDonors = snapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));

            allDonors.sort((a, b) => {
                const dateA = a.entryDate || "";
                const dateB = b.entryDate || "";
                if (dateA !== dateB) return dateB.localeCompare(dateA);

                const serialA = a.serialNumber || "";
                const serialB = b.serialNumber || "";
                return serialA.localeCompare(serialB);
            });

            renderTracking();
        } catch (error) {
            console.error(error);
            trackingContainer.innerHTML = `<div class="empty-box">Failed to load donor records.</div>`;
            showMessage("Failed to load donor records: " + error.message, "error");
        }
    }

    searchInput.addEventListener("input", renderTracking);

    auth.onAuthStateChanged(user => {
        if (user) {
            loadDonors();
        } else {
            trackingContainer.innerHTML = `<div class="empty-box">Please log in first.</div>`;
            totalCountEl.textContent = "0";
            displayedCountEl.textContent = "0";
        }
    });
</script>

</body>
</html>
