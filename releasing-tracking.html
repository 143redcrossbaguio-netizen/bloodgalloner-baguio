<!DOCTYPE html>
<html>
<head>
<title>Releasing Tracking</title>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#ff9800;color:white;padding:15px;text-align:center;position:relative;}
.container{max-width:1200px;margin:20px auto;padding:20px;background:white;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
input,select,button{padding:8px;margin:5px;border-radius:5px;border:1px solid #ccc;}
input, select{width:auto;}
button{cursor:pointer;}
button.export{background:#2e7d32;color:white;border:none;}
button.edit{background:#1565c0;color:white;border:none;}
button.delete{background:#b30000;color:white;border:none;}
button.back{background:#444;color:white;border:none;padding:10px 15px;margin-bottom:10px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th, td{border:1px solid #ccc;padding:8px;text-align:center;}
th{background:#f0f0f0;}
.month-row{background:#ffcc80;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<header>
<h2>Blood Releasing Tracking</h2>
</header>

<div class="container">

<button class="back" onclick="goBack()">BACK TO RELEASING</button>

<div>
<label>SEARCH:</label>
<input type="text" id="search" placeholder="SEARCH BY PATIENT OR FACILITY" oninput="renderTable()">

<label>FILTER DATE:</label>
<input type="date" id="filterDate" onchange="renderTable()">

<label>FILTER FACILITY:</label>
<input type="text" id="filterFacility" placeholder="Facility" oninput="renderTable()">

<button class="export" onclick="exportCSV()">EXPORT CSV</button>
</div>

<table>
<thead>
<tr>
<th>DATE</th>
<th>FACILITY</th>
<th>SURNAME</th>
<th>FIRST NAME</th>
<th>AGE</th>
<th>SEX</th>
<th>BLOOD TYPE</th>
<th>OR</th>
<th>REQUEST</th>
<th>REQ QTY</th>
<th>ISSUED</th>
<th>ISSUED QTY</th>
<th>AMOUNT PAID</th>
<th>DISCOUNT</th>
<th>ACTIONS</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔹 REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const tableBody = document.getElementById("tableBody");

let entries = {}; // store data locally

// 🔹 LOAD DATA
onValue(ref(db,"releasing"), snapshot => {
    entries = {};
    snapshot.forEach(child => {
        entries[child.key] = child.val();
    });
    renderTable();
});

// 🔹 BACK BUTTON
function goBack(){
    window.location.href = "releasing.html";
}

// 🔹 RENDER TABLE WITH FILTERS AND MONTH GROUP
function renderTable(){
    const search = document.getElementById("search").value.toUpperCase();
    const filterDate = document.getElementById("filterDate").value;
    const filterFacility = document.getElementById("filterFacility").value.toUpperCase();

    tableBody.innerHTML = "";

    // group by month
    const months = {};

    Object.keys(entries).forEach(key=>{
        const entry = entries[key];
        if(entry.date === "") return;
        // filters
        if(search && !(
            entry.surname.toUpperCase().includes(search) || 
            entry.firstname.toUpperCase().includes(search) ||
            entry.facility.toUpperCase().includes(search)
        )) return;
        if(filterDate && entry.date !== filterDate) return;
        if(filterFacility && entry.facility.toUpperCase() !== filterFacility) return;

        const month = entry.date.substr(0,7); // YYYY-MM
        if(!months[month]) months[month] = [];
        months[month].push({key, entry});
    });

    Object.keys(months).sort().forEach(month=>{
        // month row
        const monthRow = document.createElement("tr");
        monthRow.className = "month-row";
        monthRow.innerHTML = `<td colspan="15">${month} (Click to Toggle)</td>`;
        monthRow.addEventListener("click",()=> {
            const rows = monthRow.nextSibling;
            if(rows.style.display === "none") rows.style.display = "";
            else rows.style.display = "table-row-group";
        });
        tableBody.appendChild(monthRow);

        const monthGroup = document.createElement("tbody");
        monthGroup.style.display = "none";
        months[month].forEach(item=>{
            const e = item.entry;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${e.date}</td>
                <td>${e.facility}</td>
                <td>${e.surname}</td>
                <td>${e.firstname}</td>
                <td>${e.age}</td>
                <td>${e.sex}</td>
                <td>${e.bloodtype}</td>
                <td>${e.or}</td>
                <td>${e.request}</td>
                <td>${e.requestQty}</td>
                <td>${e.issued}</td>
                <td>${e.issuedQty}</td>
                <td>${e.amountPaid}</td>
                <td>${e.discount}</td>
                <td>
                    <button class="edit" onclick="editEntry('${item.key}')">EDIT</button>
                    <button class="delete" onclick="deleteEntry('${item.key}')">DELETE</button>
                </td>
            `;
            monthGroup.appendChild(tr);
        });
        tableBody.appendChild(monthGroup);
    });
}

// 🔹 DELETE ENTRY
function deleteEntry(key){
    if(confirm("Are you sure you want to delete this entry?")){
        remove(ref(db,"releasing/"+key));
    }
}

// 🔹 EDIT ENTRY (OPEN ENTRY PAGE WITH DATA)
function editEntry(key){
    const e = entries[key];
    localStorage.setItem("editKey", key);
    localStorage.setItem("editData", JSON.stringify(e));
    window.location.href = "releasing-entry.html";
}

// 🔹 EXPORT CSV
function exportCSV(){
    let csv = "DATE,FACILITY,SURNAME,FIRST NAME,AGE,SEX,BLOOD TYPE,OR,REQUEST,REQ QTY,ISSUED,ISSUED QTY,AMOUNT PAID,DISCOUNT\n";
    Object.keys(entries).forEach(k=>{
        const e = entries[k];
        csv += `"${e.date}","${e.facility}","${e.surname}","${e.firstname}","${e.age}","${e.sex}","${e.bloodtype}","${e.or}","${e.request}","${e.requestQty}","${e.issued}","${e.issuedQty}","${e.amountPaid}","${e.discount}"\n`;
    });
    const blob = new Blob([csv], {type: 'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "blood_releasing.csv";
    a.click();
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
