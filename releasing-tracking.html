<!DOCTYPE html>
<html>
<head>
<title>Releasing Tracking</title>
<meta charset="UTF-8">

<style>

body{font-family:Arial;background:#f4f4f4;margin:0}

header{
background:#ff9800;
color:white;
padding:15px;
text-align:center
}

table{
width:90%;
margin:30px auto;
border-collapse:collapse;
background:white
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center
}

th{
background:#ff9800;
color:white
}

</style>
</head>

<body>

<header>
<h2>Blood Releasing Records</h2>
</header>

<table>

<tr>
<th>Patient</th>
<th>Blood</th>
<th>Bags</th>
<th>Hospital</th>
<th>Date</th>
</tr>

<tbody id="table"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={

apiKey:"YOUR-API-KEY",
authDomain:"YOUR-PROJECT.firebaseapp.com",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const table=document.getElementById("table");

onValue(ref(db,"releasing"),snapshot=>{

table.innerHTML="";

snapshot.forEach(child=>{

let data=child.val();

table.innerHTML+=`

<tr>
<td>${data.patient}</td>
<td>${data.blood}</td>
<td>${data.bags}</td>
<td>${data.hospital}</td>
<td>${data.date}</td>
</tr>

`;

});

});

</script>

</body>
</html>
