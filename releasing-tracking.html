<!DOCTYPE html>
<html>
<head>
<title>Releasing Tracking</title>
<meta charset="UTF-8">
<style>
body {margin:0; font-family:Arial; background:#f4f4f4;}
header {background:#ff9800; color:white; text-align:center; padding:15px;}
.container {max-width:1200px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1);}
table {width:100%; border-collapse:collapse; margin-top:20px;}
th, td {border:1px solid #ccc; padding:8px; text-align:center; text-transform:uppercase;}
th {background:#ff9800; color:white;}
button.back {background:#444;color:white;padding:10px 12px;margin-top:15px;border-radius:5px;border:none;cursor:pointer;}
</style>
</head>
<body>
<header><h2>Blood Releasing Tracking</h2></header>
<div class="container">
<table>
<thead>
<tr>
<th>DATE</th>
<th>FACILITY</th>
<th>SURNAME</th>
<th>FIRST NAME</th>
<th>AGE</th>
<th>SEX</th>
<th>BLOOD TYPE</th>
<th>OR</th>
<th>REQUEST</th>
<th>REQ QTY</th>
<th>ISSUED</th>
<th>ISS QTY</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
<button class="back" onclick="window.location.href='releasing.html'">BACK TO RELEASING</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔑 Replace these with your actual Firebase config
const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR-PROJECT"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const tableBody = document.getElementById("tableBody");

onValue(ref(db, "releasing"), snapshot => {
  tableBody.innerHTML = ""; // clear table first
  snapshot.forEach(child => {
    const row = child.val();
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${row.date || ""}</td>
      <td>${row.facility || ""}</td>
      <td>${row.surname || ""}</td>
      <td>${row.firstname || ""}</td>
      <td>${row.age || ""}</td>
      <td>${row.sex || ""}</td>
      <td>${row.bloodtype || ""}</td>
      <td>${row.or || ""}</td>
      <td>${row.request || ""}</td>
      <td>${row.requestQty || ""}</td>
      <td>${row.issued || ""}</td>
      <td>${row.issuedQty || ""}</td>
    `;
    tableBody.appendChild(tr);
  });
});
</script>
</body>
</html>
