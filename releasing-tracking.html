<!DOCTYPE html>
<html>
<head>
<title>Releasing Tracking</title>
<meta charset="UTF-8">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;text-transform:uppercase;}

header{
background:#ff9800;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.settings{
position:absolute;
right:20px;
top:15px;
font-size:22px;
cursor:pointer;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.row{
display:flex;
gap:10px;
}
.row select{flex:2}
.row input{flex:1}

button{
padding:10px 12px;
margin-top:10px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.save{background:#ff9800;color:white}
.back{background:#444;color:white}
.export{background:#2e7d32;color:white}
.edit{background:#1976d2;color:white}
.delete{background:#c62828;color:white}
.controls{
display:flex;
gap:10px;
margin:20px 0;
flex-wrap:wrap;
align-items:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}
th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}
th{
background:#ff9800;
color:white;
}
.monthHeader{
background:#eee;
cursor:pointer;
font-weight:bold;
padding:8px;
margin-top:10px;
}
.hidden{display:none;}

/* SETTINGS MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}
.modal-content{
background:white;
width:700px;
margin:60px auto;
padding:20px;
border-radius:8px;
max-height:80vh;
overflow:auto;
}
td[contenteditable]{background:#fffbe6;}
textarea{width:100%;height:150px;border-radius:5px;border:1px solid #ccc;margin-top:10px;padding:10px;}
.addRow{background:#2e7d32;color:white;margin-top:10px;}
.saveFacilities{background:#1565c0;color:white;}
.closeBtn{background:#444;color:white;}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Records</h2>
<div class="settings" onclick="openSettings()">⚙</div>
</header>

<div class="container">

<!-- ENTRY FORM -->
<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input list="facilityList" id="facility">
<datalist id="facilityList"></datalist>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="issuedQty" placeholder="Qty">
</div>

<button class="save" onclick="saveData()">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

<!-- TRACKING CONTROLS -->
<div class="controls">
<input type="text" id="search" placeholder="SEARCH">
<input type="date" id="dateFilter">
<select id="facilityFilter"><option value="">ALL FACILITIES</option></select>
<button class="export" onclick="exportCSV()">EXPORT CSV</button>
</div>

<!-- TRACKING TABLE CONTAINER -->
<div id="trackingContainer"></div>

</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settingsModal">
<div class="modal-content">
<h3>Facility Manager (Excel Style)</h3>
<p>Paste facilities from Excel OR edit directly.</p>
<textarea id="facilityBulk" placeholder="Paste Excel column here..."></textarea>
<button class="addRow" onclick="pasteFacilities()">PASTE FACILITIES</button>
<table id="facilityTable">
<thead>
<tr>
<th>#</th>
<th>Facility Name</th>
<th>Clear</th>
</tr>
</thead>
<tbody id="facilityBody"></tbody>
</table>
<button class="saveFacilities" onclick="saveFacilities()">SAVE TO DATABASE</button>
<button class="closeBtn" onclick="closeSettings()">CLOSE</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* SAVE ENTRY */
window.saveData=function(){
const editID=localStorage.getItem("editID");
if(editID){
remove(ref(db,"releasing/"+editID));
localStorage.removeItem("editID");
}
push(ref(db,"releasing"),{
date:date.value,
facility:facility.value,
surname:surname.value,
firstname:firstname.value,
age:age.value,
sex:sex.value,
bloodtype:bloodtype.value,
or:or.value,
request:request.value,
requestQty:requestQty.value,
issued:issued.value,
issuedQty:issuedQty.value
});
alert("SAVED SUCCESSFULLY");
resetForm();
}

/* RESET FORM */
function resetForm(){
date.value="";facility.value="";surname.value="";firstname.value="";age.value="";sex.value="";bloodtype.value="";
or.value="";request.value="WB";requestQty.value="";issued.value="WB";issuedQty.value="";
}

/* FACILITY AUTOCOMPLETE */
const facilityList=document.getElementById("facilityList");
onValue(ref(db,"facilities"),snapshot=>{
facilityList.innerHTML="";
snapshot.forEach(child=>{
let option=document.createElement("option");
option.value=child.val().name;
facilityList.appendChild(option);
});
});

/* SETTINGS MODAL */
window.openSettings=function(){document.getElementById("settingsModal").style.display="block";createExcelGrid();loadFacilities();}
window.closeSettings=function(){document.getElementById("settingsModal").style.display="none";}
window.goBack=function(){window.scrollTo({top:0,behavior:"smooth"});}

/* EXCEL GRID */
function createExcelGrid(){document.getElementById("facilityBody").innerHTML="";addRow();}
function addRow(value=""){const tbody=document.getElementById("facilityBody");let rowNumber=tbody.children.length+1;let row=document.createElement("tr");row.innerHTML=`<td>${rowNumber}</td><td contenteditable="true">${value}</td><td><button onclick="this.closest('tr').remove()">X</button></td>`;tbody.appendChild(row);row.children[1].addEventListener("input",function(){if(row===tbody.lastChild){addRow()}});}
function loadFacilities(){const tbody=document.getElementById("facilityBody");tbody.innerHTML="";onValue(ref(db,"facilities"),snapshot=>{snapshot.forEach(child=>{addRow(child.val().name)});addRow()},{onlyOnce:true});}
window.pasteFacilities=function(){const text=document.getElementById("facilityBulk").value.trim();if(text==="") return;const lines=text.split("\n");lines.forEach(line=>{let name=line.trim();if(name!==""){addRow(name)}});document.getElementById("facilityBulk").value="";}
window.saveFacilities=function(){remove(ref(db,"facilities"));const rows=document.querySelectorAll("#facilityBody tr");rows.forEach(row=>{let name=row.children[1].innerText.trim();if(name!==""){push(ref(db,"facilities"),{name:name})}});alert("FACILITIES UPDATED");}

/* -------------------- TRACKING -------------------- */
let allData={};
onValue(ref(db,"releasing"),snapshot=>{
allData={};
snapshot.forEach(child=>{
allData[child.key]=child.val();
});
renderData();
loadFacilityFilter();
});

function loadFacilityFilter(){const select=document.getElementById("facilityFilter");select.innerHTML='<option value="">ALL FACILITIES</option>';let facilities=new Set();Object.values(allData).forEach(r=>{facilities.add(r.facility)});facilities.forEach(f=>{let opt=document.createElement("option");opt.value=f;opt.textContent=f;select.appendChild(opt)})}

function renderData(){
const container=document.getElementById("trackingContainer");
container.innerHTML="";
const search=document.getElementById("search").value.toUpperCase();
const dateFilter=document.getElementById("dateFilter").value;
const facilityFilter=document.getElementById("facilityFilter").value;
let grouped={};
Object.entries(allData).forEach(([id,row])=>{
let text=JSON.stringify(row).toUpperCase();
if(search && !text.includes(search)) return;
if(dateFilter && row.date!==dateFilter) return;
if(facilityFilter && row.facility!==facilityFilter) return;
let month=row.date.substring(0,7);
if(!grouped[month]) grouped[month]=[];
grouped[month].push({id,...row});
});
Object.keys(grouped).sort().reverse().forEach(month=>{
let monthDiv=document.createElement("div");
let header=document.createElement("div");
header.className="monthHeader";
header.textContent=month;
let tableDiv=document.createElement("div");
let table=`<table><tr><th>DATE</th><th>FACILITY</th><th>SURNAME</th><th>FIRST NAME</th><th>AGE</th><th>SEX</th><th>BLOOD</th><th>OR</th><th>REQUEST</th><th>QTY</th><th>ISSUED</th><th>QTY</th><th>ACTION</th></tr>`;
grouped[month].forEach(row=>{
table+=`<tr><td>${row.date}</td><td>${row.facility}</td><td>${row.surname}</td><td>${row.firstname}</td><td>${row.age}</td><td>${row.sex}</td><td>${row.bloodtype}</td><td>${row.or}</td><td>${row.request}</td><td>${row.requestQty}</td><td>${row.issued}</td><td>${row.issuedQty}</td><td><button class="edit" onclick="editEntry('${row.id}')">EDIT</button><button class="delete" onclick="deleteEntry('${row.id}')">DELETE</button></td></tr>`;
});
table+="</table>";
tableDiv.innerHTML=table;
tableDiv.classList.add("hidden");
header.onclick=()=>{tableDiv.classList.toggle("hidden");}
monthDiv.appendChild(header);
monthDiv.appendChild(tableDiv);
container.appendChild(monthDiv);
});

document.getElementById("search").oninput=renderData;
document.getElementById("dateFilter").onchange=renderData;
document.getElementById("facilityFilter").onchange=renderData;

window.deleteEntry=function(id){if(confirm("DELETE THIS ENTRY?")){remove(ref(db,"releasing/"+id))}}
window.editEntry=function(id){localStorage.setItem("editID",id);window.scrollTo({top:0,behavior:"smooth"});get(ref(db,"releasing/"+id)).then(snapshot=>{if(snapshot.exists()){let d=snapshot.val();date.value=d.date;facility.value=d.facility;surname.value=d.surname;firstname.value=d.firstname;age.value=d.age;sex.value=d.sex;bloodtype.value=d.bloodtype;or.value=d.or;request.value=d.request;requestQty.value=d.requestQty;issued.value=d.issued;issuedQty.value=d.issuedQty}})}

window.exportCSV=function(){let csv="DATE,FACILITY,SURNAME,FIRSTNAME,AGE,SEX,BLOOD,OR,REQUEST,REQ_QTY,ISSUED,ISS_QTY\n";Object.values(allData).forEach(r=>{csv+=`${r.date},${r.facility},${r.surname},${r.firstname},${r.age},${r.sex},${r.bloodtype},${r.or},${r.request},${r.requestQty},${r.issued},${r.issuedQty}\n`});let blob=new Blob([csv],{type:"text/csv"});let url=URL.createObjectURL(blob);let a=document.createElement("a");a.href=url;a.download="release_tracking.csv";a.click()}
</script>

</body>
</html>
