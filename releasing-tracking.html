<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Records</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#e65100;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1450px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.topSwitch{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.switchBtn{
padding:12px 16px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
color:white;
}

.releaseBtn{background:#e65100;}
.augmentationBtn{background:#1565c0;}
.activeBtn{outline:3px solid #222;}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-weight:bold;
}

.controls button{
border:none;
cursor:pointer;
color:white;
}

.exportBtn{background:#2e7d32;}
.backBtn{background:#444;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
vertical-align:top;
font-size:14px;
}

th{
background:#e65100;
color:white;
}

.augTable th{
background:#1565c0;
}

.augTable td{
background:#eaf4ff;
}

.componentBox{
text-align:left;
font-size:13px;
line-height:1.5;
}

.actionBtn{
padding:6px 10px;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
font-weight:bold;
margin:2px;
}

.editBtn{background:#1565c0;}
.deleteBtn{background:#c62828;}

.monthHeader{
background:#f0f0f0;
padding:10px;
margin-top:20px;
font-weight:bold;
font-size:16px;
border-radius:5px;
}

.emptyMessage{
padding:20px;
text-align:center;
font-weight:bold;
color:#666;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.45);
z-index:2000;
overflow:auto;
}

.modalContent{
background:white;
max-width:800px;
margin:30px auto;
padding:20px;
border-radius:10px;
box-shadow:0 4px 14px rgba(0,0,0,0.2);
}

.formLabel{
font-weight:bold;
display:block;
margin-top:10px;
}

.formInput, .formSelect{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

.row{
display:flex;
gap:10px;
align-items:flex-end;
margin-top:8px;
}

.row select,
.row input{
flex:1;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

.row button{
width:auto;
min-width:45px;
padding:10px;
border:none;
border-radius:5px;
color:white;
font-weight:bold;
cursor:pointer;
}

.addBtn{background:#2e7d32;}
.removeBtn{background:#c62828;}
.saveBtn{background:#1565c0;color:white;}
.closeBtn{background:#444;color:white;}

.card{
border:1px solid #90caf9;
border-radius:8px;
padding:12px;
margin-top:12px;
background:#e3f2fd;
}

.innerBox{
border:1px solid #bbdefb;
border-radius:6px;
padding:10px;
margin-top:10px;
background:#f4faff;
}

.modalActions{
display:flex;
gap:10px;
margin-top:20px;
}

.modalActions button{
flex:1;
padding:12px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.augDetailsWrap{
text-align:left;
line-height:1.4;
}

.augDetailsCard{
background:#ffffff;
border:1px solid #bcd4f6;
border-radius:6px;
padding:8px;
margin-bottom:8px;
}

.augDetailsTitle{
font-weight:bold;
color:#0f3d91;
margin-bottom:6px;
}

.augMiniTable{
width:100%;
border-collapse:collapse;
margin:0;
}

.augMiniTable th,
.augMiniTable td{
border:1px solid #9bbce0;
padding:6px;
font-size:12px;
text-align:center;
}

.augMiniTable th{
background:#cfe2ff;
color:#0b3d91;
}

@media (max-width: 900px){
.controls{
flex-direction:column;
}
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Records</h2>
</header>

<div class="container">

<div class="topSwitch">
<button id="showReleaseBtn" class="switchBtn releaseBtn activeBtn">RELEASING RECORDS</button>
<button id="showAugmentationBtn" class="switchBtn augmentationBtn">BLOOD AUGMENTATION</button>
</div>

<div class="controls">
<input type="text" id="searchBox" placeholder="Search Name / Facility">
<input type="date" id="filterDate">

<select id="filterFacility">
<option value="">ALL FACILITIES</option>
</select>

<button class="exportBtn" id="exportBtn">EXPORT CSV</button>
<button class="backBtn" id="backBtn">BACK</button>
</div>

<div id="tableContainer"></div>

</div>

<!-- AUGMENTATION EDIT MODAL -->
<div id="augmentationModal" class="modal">
  <div class="modalContent">
    <h3 style="margin-top:0;">EDIT BLOOD AUGMENTATION</h3>

    <label class="formLabel">DATE</label>
    <input type="date" id="editAugDate" class="formInput">

    <label class="formLabel">FACILITY</label>
    <input type="text" id="editAugFacility" class="formInput">

    <label class="formLabel">BOX CONTAINER</label>
    <input type="number" id="editAugBoxContainerQty" class="formInput">

    <div id="editAugBloodTypeContainer"></div>

    <button type="button" class="addBtn" style="margin-top:15px;" onclick="addEditAugmentationBloodType()">+ ADD BLOOD TYPE</button>

    <label class="formLabel">AMOUNT PAID</label>
    <input type="number" id="editAugAmountPaid" class="formInput" readonly>

    <label class="formLabel">DISCOUNT</label>
    <input type="number" id="editAugDiscount" class="formInput">

    <div class="modalActions">
      <button type="button" class="saveBtn" onclick="saveAugmentationEdit()">SAVE CHANGES</button>
      <button type="button" class="closeBtn" onclick="closeAugmentationModal()">CLOSE</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, remove, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain:"galloners-club.firebaseapp.com",
  databaseURL:"https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"galloners-club",
  storageBucket:"galloners-club.firebasestorage.app",
  messagingSenderId:"213049860421",
  appId:"1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId:"G-XYXJH9JNXJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const container = document.getElementById("tableContainer");
const searchBox = document.getElementById("searchBox");
const filterDate = document.getElementById("filterDate");
const filterFacility = document.getElementById("filterFacility");
const exportBtn = document.getElementById("exportBtn");
const backBtn = document.getElementById("backBtn");
const showReleaseBtn = document.getElementById("showReleaseBtn");
const showAugmentationBtn = document.getElementById("showAugmentationBtn");

let currentView = "releasing";
let allReleasingEntries = [];
let allAugmentationEntries = [];
let currentAugmentationEditId = null;
let currentAugmentationPriceSnapshot = null;
let authReady = false;

let currentPrices = {
  WB: 0,
  PRBC: 0,
  PC: 0,
  FFP: 0,
  CRYO: 0,
  BOX: 0
};

async function loadPrices(){
  try{
    const snapshot = await get(ref(db, "settings/releasingPrices"));
    const data = snapshot.val() || {};

    currentPrices = {
      WB: Number(data.wb) || 0,
      PRBC: Number(data.prbc) || 0,
      PC: Number(data.pc) || 0,
      FFP: Number(data.ffp) || 0,
      CRYO: Number(data.cryo) || 0,
      BOX: Number(data.boxContainer) || 0
    };
  }catch(error){
    console.error("Failed to load prices:", error);
    currentPrices = {
      WB: 0,
      PRBC: 0,
      PC: 0,
      FFP: 0,
      CRYO: 0,
      BOX: 0
    };
  }
}

function normalizePriceSnapshot(snapshot){
  return {
    WB: Number(snapshot?.WB ?? snapshot?.wb) || 0,
    PRBC: Number(snapshot?.PRBC ?? snapshot?.prbc) || 0,
    PC: Number(snapshot?.PC ?? snapshot?.pc) || 0,
    FFP: Number(snapshot?.FFP ?? snapshot?.ffp) || 0,
    CRYO: Number(snapshot?.CRYO ?? snapshot?.cryo) || 0,
    BOX: Number(snapshot?.BOX ?? snapshot?.boxContainer ?? snapshot?.box) || 0
  };
}

function getEntryPrices(entry){
  if(entry && entry.priceSnapshot){
    return normalizePriceSnapshot(entry.priceSnapshot);
  }
  return currentPrices;
}

function computeIssuedTotalFromList(issuedList, boxContainerQty, prices){
  let total = 0;

  (Array.isArray(issuedList) ? issuedList : []).forEach(item => {
    const type = (item.type || "").toUpperCase();
    const qty = Number(item.qty || 0);

    if(prices[type] !== undefined){
      total += qty * prices[type];
    }
  });

  total += (Number(boxContainerQty) || 0) * (prices.BOX || 0);

  return total;
}

function computeReleasingTotal(entry){
  const prices = getEntryPrices(entry);
  return computeIssuedTotalFromList(entry.issued, entry.boxContainerQty, prices).toFixed(2);
}

function formatComponents(list){
  if(!Array.isArray(list) || list.length === 0) return "";
  return list.map(item => `${item.type || ""} - ${item.qty || ""}`).join("<br>");
}

function buildAugDetails(entry){
  const bloodTypes = Array.isArray(entry.bloodTypes) ? entry.bloodTypes : [];
  if(bloodTypes.length === 0) return "";

  return bloodTypes.map(bt => {
    const req = {WB:0,PRBC:0,PC:0,FFP:0,CRYO:0};
    const iss = {WB:0,PRBC:0,PC:0,FFP:0,CRYO:0};

    (Array.isArray(bt.requests) ? bt.requests : []).forEach(item => {
      const t = (item.type || "").toUpperCase();
      const q = Number(item.qty || 0);
      if(req[t] !== undefined) req[t] += q;
    });

    (Array.isArray(bt.issued) ? bt.issued : []).forEach(item => {
      const t = (item.type || "").toUpperCase();
      const q = Number(item.qty || 0);
      if(iss[t] !== undefined) iss[t] += q;
    });

    return `
      <div class="augDetailsCard">
        <div class="augDetailsTitle">${bt.bloodType || ""}</div>
        <table class="augMiniTable">
          <tr>
            <th></th>
            <th>WB</th>
            <th>PRBC</th>
            <th>PC</th>
            <th>FFP</th>
            <th>CRYO</th>
          </tr>
          <tr>
            <th>REQ</th>
            <td>${req.WB}</td>
            <td>${req.PRBC}</td>
            <td>${req.PC}</td>
            <td>${req.FFP}</td>
            <td>${req.CRYO}</td>
          </tr>
          <tr>
            <th>ISS</th>
            <td>${iss.WB}</td>
            <td>${iss.PRBC}</td>
            <td>${iss.PC}</td>
            <td>${iss.FFP}</td>
            <td>${iss.CRYO}</td>
          </tr>
        </table>
      </div>
    `;
  }).join("");
}

function computeAugEntryTotal(entry){
  const prices = getEntryPrices(entry);
  let total = 0;

  const bloodTypes = Array.isArray(entry.bloodTypes) ? entry.bloodTypes : [];
  bloodTypes.forEach(bt => {
    total += computeIssuedTotalFromList(bt.issued, 0, prices);
  });

  total += (Number(entry.boxContainerQty) || 0) * (prices.BOX || 0);
  return total.toFixed(2);
}

/* LOAD RELEASING */
function loadReleasingData(){
  onValue(ref(db,"releasing"), snapshot => {
    allReleasingEntries = [];

    snapshot.forEach(child => {
      allReleasingEntries.push({
        id: child.key,
        ...child.val()
      });
    });

    if(currentView === "releasing"){
      populateFacilityFilter();
      renderCurrentView();
    }
  }, error => {
    console.error("Load releasing error:", error);
    alert("Failed to load releasing records.");
  });
}

/* LOAD AUGMENTATION */
function loadAugmentationData(){
  onValue(ref(db,"bloodAugmentation"), snapshot => {
    allAugmentationEntries = [];

    snapshot.forEach(child => {
      allAugmentationEntries.push({
        id: child.key,
        ...child.val()
      });
    });

    if(currentView === "augmentation"){
      populateFacilityFilter();
      renderCurrentView();
    }
  }, error => {
    console.error("Load augmentation error:", error);
    alert("Failed to load blood augmentation records.");
  });
}

function setView(view){
  currentView = view;

  if(view === "releasing"){
    showReleaseBtn.classList.add("activeBtn");
    showAugmentationBtn.classList.remove("activeBtn");
    searchBox.placeholder = "Search Name / Facility";
  }else{
    showAugmentationBtn.classList.add("activeBtn");
    showReleaseBtn.classList.remove("activeBtn");
    searchBox.placeholder = "Search Facility / Blood Type";
  }

  populateFacilityFilter();
  renderCurrentView();
}

function populateFacilityFilter(){
  let facilities = [];

  if(currentView === "releasing"){
    facilities = [...new Set(
      allReleasingEntries.map(e => (e.facility || "").trim()).filter(Boolean)
    )].sort();
  }else{
    facilities = [...new Set(
      allAugmentationEntries.map(e => (e.facility || "").trim()).filter(Boolean)
    )].sort();
  }

  const currentValue = filterFacility.value;
  filterFacility.innerHTML = '<option value="">ALL FACILITIES</option>';

  facilities.forEach(f => {
    const option = document.createElement("option");
    option.value = f;
    option.textContent = f;
    filterFacility.appendChild(option);
  });

  if(facilities.includes(currentValue)){
    filterFacility.value = currentValue;
  }else{
    filterFacility.value = "";
  }
}

function getFilteredReleasingEntries(){
  const search = searchBox.value.trim().toUpperCase();
  const dateValue = filterDate.value;
  const facilityValue = filterFacility.value;

  let filtered = allReleasingEntries.filter(entry => {
    const fullName = `${entry.surname || ""} ${entry.firstname || ""}`.toUpperCase();
    const facility = (entry.facility || "").toUpperCase();
    const date = entry.date || "";

    const matchSearch =
      search === "" ||
      fullName.includes(search) ||
      facility.includes(search);

    const matchDate =
      dateValue === "" ||
      date === dateValue;

    const matchFacility =
      facilityValue === "" ||
      entry.facility === facilityValue;

    return matchSearch && matchDate && matchFacility;
  });

  filtered.sort((a,b) => (b.date || "").localeCompare(a.date || ""));
  return filtered;
}

function getFilteredAugmentationEntries(){
  const search = searchBox.value.trim().toUpperCase();
  const dateValue = filterDate.value;
  const facilityValue = filterFacility.value;

  let filtered = allAugmentationEntries.filter(entry => {
    const facility = (entry.facility || "").toUpperCase();
    const date = entry.date || "";
    const bloodTypesText = (Array.isArray(entry.bloodTypes) ? entry.bloodTypes : [])
      .map(item => (item.bloodType || "").toUpperCase())
      .join(" ");

    const matchSearch =
      search === "" ||
      facility.includes(search) ||
      bloodTypesText.includes(search);

    const matchDate =
      dateValue === "" ||
      date === dateValue;

    const matchFacility =
      facilityValue === "" ||
      entry.facility === facilityValue;

    return matchSearch && matchDate && matchFacility;
  });

  filtered.sort((a,b) => (b.date || "").localeCompare(a.date || ""));
  return filtered;
}

function renderCurrentView(){
  if(currentView === "releasing"){
    renderReleasingTable();
  }else{
    renderAugmentationTable();
  }
}

function renderReleasingTable(){
  const filtered = getFilteredReleasingEntries();

  if(filtered.length === 0){
    container.innerHTML = '<div class="emptyMessage">No releasing records found.</div>';
    return;
  }

  const grouped = {};

  filtered.forEach(entry => {
    const month = entry.date ? entry.date.slice(0,7) : "NO DATE";
    if(!grouped[month]) grouped[month] = [];
    grouped[month].push(entry);
  });

  container.innerHTML = "";

  Object.keys(grouped).sort().reverse().forEach(month => {
    const monthHeader = document.createElement("div");
    monthHeader.className = "monthHeader";
    monthHeader.textContent = month;
    container.appendChild(monthHeader);

    const table = document.createElement("table");

    table.innerHTML = `
      <thead>
        <tr>
          <th>DATE</th>
          <th>FACILITY</th>
          <th>SURNAME</th>
          <th>FIRST NAME</th>
          <th>AGE</th>
          <th>SEX</th>
          <th>BLOOD</th>
          <th>OR</th>
          <th>BOX CONTAINER</th>
          <th>REQUESTED</th>
          <th>ISSUED</th>
          <th>COMPUTED TOTAL</th>
          <th>AMOUNT PAID</th>
          <th>DISCOUNT</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;

    const tbody = table.querySelector("tbody");

    grouped[month].forEach(entry => {
      const computedTotal = computeReleasingTotal(entry);

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${entry.date || ""}</td>
        <td>${entry.facility || ""}</td>
        <td>${entry.surname || ""}</td>
        <td>${entry.firstname || ""}</td>
        <td>${entry.age || ""}</td>
        <td>${entry.sex || ""}</td>
        <td>${entry.bloodtype || ""}</td>
        <td>${entry.or || ""}</td>
        <td>${entry.boxContainerQty || 0}</td>
        <td class="componentBox">${formatComponents(entry.requests)}</td>
        <td class="componentBox">${formatComponents(entry.issued)}</td>
        <td>${computedTotal}</td>
        <td>${entry.amountPaid || ""}</td>
        <td>${entry.discount || ""}</td>
        <td>
          <button class="actionBtn editBtn" data-action="edit-release" data-id="${entry.id}">EDIT</button>
          <button class="actionBtn deleteBtn" data-action="delete-release" data-id="${entry.id}">DELETE</button>
        </td>
      `;
      tbody.appendChild(row);
    });

    container.appendChild(table);
  });
}

function renderAugmentationTable(){
  const filtered = getFilteredAugmentationEntries();

  if(filtered.length === 0){
    container.innerHTML = '<div class="emptyMessage">No blood augmentation records found.</div>';
    return;
  }

  const grouped = {};

  filtered.forEach(entry => {
    const month = entry.date ? entry.date.slice(0,7) : "NO DATE";
    if(!grouped[month]) grouped[month] = [];
    grouped[month].push(entry);
  });

  container.innerHTML = "";

  Object.keys(grouped).sort().reverse().forEach(month => {
    const monthHeader = document.createElement("div");
    monthHeader.className = "monthHeader";
    monthHeader.textContent = month;
    container.appendChild(monthHeader);

    const table = document.createElement("table");
    table.className = "augTable";

    table.innerHTML = `
      <thead>
        <tr>
          <th>DATE</th>
          <th>FACILITY</th>
          <th>BOX CONTAINER</th>
          <th>AUGMENTATION DETAILS</th>
          <th>COMPUTED TOTAL</th>
          <th>AMOUNT PAID</th>
          <th>DISCOUNT</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;

    const tbody = table.querySelector("tbody");

    grouped[month].forEach(entry => {
      const computedTotal = computeAugEntryTotal(entry);

      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${entry.date || ""}</td>
        <td>${entry.facility || ""}</td>
        <td>${entry.boxContainerQty || 0}</td>
        <td class="augDetailsWrap">${buildAugDetails(entry)}</td>
        <td>${computedTotal}</td>
        <td>${entry.amountPaid || ""}</td>
        <td>${entry.discount || ""}</td>
        <td>
          <button class="actionBtn editBtn" data-action="edit-augmentation" data-id="${entry.id}">EDIT</button>
          <button class="actionBtn deleteBtn" data-action="delete-augmentation" data-id="${entry.id}">DELETE</button>
        </td>
      `;
      tbody.appendChild(row);
    });

    container.appendChild(table);
  });
}

/* MODAL HELPERS */
function openAugmentationModal(){
  document.getElementById("augmentationModal").style.display = "block";
}

window.closeAugmentationModal = function(){
  document.getElementById("augmentationModal").style.display = "none";
  currentAugmentationEditId = null;
  currentAugmentationPriceSnapshot = null;
  document.getElementById("editAugDate").value = "";
  document.getElementById("editAugFacility").value = "";
  document.getElementById("editAugBoxContainerQty").value = "";
  document.getElementById("editAugAmountPaid").value = "";
  document.getElementById("editAugDiscount").value = "";
  document.getElementById("editAugBloodTypeContainer").innerHTML = "";
};

function recomputeEditAugmentationAmountPaid(){
  const prices = currentAugmentationPriceSnapshot || currentPrices;
  let total = 0;

  document.querySelectorAll("#editAugBloodTypeContainer .editAugIssuedRow").forEach(row => {
    const type = row.querySelector(".editAugIssuedType").value;
    const qty = Number(row.querySelector(".editAugIssuedQty").value) || 0;

    if(prices[type] !== undefined){
      total += prices[type] * qty;
    }
  });

  const boxQty = Number(document.getElementById("editAugBoxContainerQty").value) || 0;
  total += boxQty * (prices.BOX || 0);

  document.getElementById("editAugAmountPaid").value = total.toFixed(2);
}

window.addEditAugmentationBloodType = function(data = null){
  const container = document.getElementById("editAugBloodTypeContainer");
  const card = document.createElement("div");
  card.className = "card";

  const bloodTypeValue = data?.bloodType || "";

  card.innerHTML = `
    <div class="row">
      <div style="flex:1">
        <label class="formLabel">BLOOD TYPE</label>
        <select class="editAugBloodType formSelect">
          <option value="">Select</option>
          <option ${bloodTypeValue==="A+" ? "selected" : ""}>A+</option>
          <option ${bloodTypeValue==="A-" ? "selected" : ""}>A-</option>
          <option ${bloodTypeValue==="B+" ? "selected" : ""}>B+</option>
          <option ${bloodTypeValue==="B-" ? "selected" : ""}>B-</option>
          <option ${bloodTypeValue==="AB+" ? "selected" : ""}>AB+</option>
          <option ${bloodTypeValue==="AB-" ? "selected" : ""}>AB-</option>
          <option ${bloodTypeValue==="O+" ? "selected" : ""}>O+</option>
          <option ${bloodTypeValue==="O-" ? "selected" : ""}>O-</option>
        </select>
      </div>
      <div>
        <button type="button" class="removeBtn" onclick="this.closest('.card').remove(); recomputeEditAugmentationAmountPaid();">-</button>
      </div>
    </div>

    <div class="innerBox">
      <label class="formLabel">REQUESTED</label>
      <div class="editAugRequestContainer"></div>
      <button type="button" class="addBtn" onclick="addEditAugRequest(this)">+</button>
    </div>

    <div class="innerBox">
      <label class="formLabel">ISSUED</label>
      <div class="editAugIssuedContainer"></div>
      <button type="button" class="addBtn" onclick="addEditAugIssued(this)">+</button>
    </div>
  `;

  container.appendChild(card);

  const reqContainer = card.querySelector(".editAugRequestContainer");
  const issContainer = card.querySelector(".editAugIssuedContainer");

  const requests = Array.isArray(data?.requests) && data.requests.length ? data.requests : [{type:"WB", qty:""}];
  const issued = Array.isArray(data?.issued) && data.issued.length ? data.issued : [{type:"WB", qty:""}];

  requests.forEach(item => addEditAugRequestRow(reqContainer, item));
  issued.forEach(item => addEditAugIssuedRow(issContainer, item));

  recomputeEditAugmentationAmountPaid();
};

function addEditAugRequestRow(container, item = {type:"WB", qty:""}){
  const row = document.createElement("div");
  row.className = "row editAugRequestRow";
  row.innerHTML = `
    <select class="editAugRequestType">
      <option ${item.type==="WB" ? "selected" : ""}>WB</option>
      <option ${item.type==="PRBC" ? "selected" : ""}>PRBC</option>
      <option ${item.type==="PC" ? "selected" : ""}>PC</option>
      <option ${item.type==="FFP" ? "selected" : ""}>FFP</option>
      <option ${item.type==="CRYO" ? "selected" : ""}>CRYO</option>
    </select>
    <input type="number" class="editAugRequestQty" placeholder="Qty" value="${item.qty ?? ""}">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove()">-</button>
  `;
  container.appendChild(row);
}

function addEditAugIssuedRow(container, item = {type:"WB", qty:""}){
  const row = document.createElement("div");
  row.className = "row editAugIssuedRow";
  row.innerHTML = `
    <select class="editAugIssuedType">
      <option ${item.type==="WB" ? "selected" : ""}>WB</option>
      <option ${item.type==="PRBC" ? "selected" : ""}>PRBC</option>
      <option ${item.type==="PC" ? "selected" : ""}>PC</option>
      <option ${item.type==="FFP" ? "selected" : ""}>FFP</option>
      <option ${item.type==="CRYO" ? "selected" : ""}>CRYO</option>
    </select>
    <input type="number" class="editAugIssuedQty" placeholder="Qty" value="${item.qty ?? ""}">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove(); recomputeEditAugmentationAmountPaid();">-</button>
  `;
  container.appendChild(row);
}

window.addEditAugRequest = function(button){
  const card = button.closest(".innerBox");
  const container = card.querySelector(".editAugRequestContainer");
  addEditAugRequestRow(container);
};

window.addEditAugIssued = function(button){
  const card = button.closest(".innerBox");
  const container = card.querySelector(".editAugIssuedContainer");
  addEditAugIssuedRow(container);
  recomputeEditAugmentationAmountPaid();
};

async function openEditAugmentation(id){
  if(!auth.currentUser){
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  try{
    const snapshot = await get(ref(db, "bloodAugmentation/" + id));
    if(!snapshot.exists()){
      alert("Record not found.");
      return;
    }

    const data = snapshot.val();
    currentAugmentationEditId = id;
    currentAugmentationPriceSnapshot = data.priceSnapshot ? normalizePriceSnapshot(data.priceSnapshot) : currentPrices;

    document.getElementById("editAugDate").value = data.date || "";
    document.getElementById("editAugFacility").value = data.facility || "";
    document.getElementById("editAugBoxContainerQty").value = data.boxContainerQty || "";
    document.getElementById("editAugDiscount").value = data.discount || "";
    document.getElementById("editAugBloodTypeContainer").innerHTML = "";

    const bloodTypes = Array.isArray(data.bloodTypes) ? data.bloodTypes : [];
    if(bloodTypes.length){
      bloodTypes.forEach(item => window.addEditAugmentationBloodType(item));
    }else{
      window.addEditAugmentationBloodType();
    }

    recomputeEditAugmentationAmountPaid();
    openAugmentationModal();
  }catch(error){
    console.error(error);
    alert("Failed to load augmentation record.");
  }
}

window.saveAugmentationEdit = async function(){
  if(!auth.currentUser){
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  if(!currentAugmentationEditId) return;

  const cards = document.querySelectorAll("#editAugBloodTypeContainer .card");
  const bloodTypes = [];

  cards.forEach(card => {
    const bloodType = card.querySelector(".editAugBloodType").value;

    const requests = [];
    card.querySelectorAll(".editAugRequestRow").forEach(row => {
      const type = row.querySelector(".editAugRequestType").value;
      const qty = row.querySelector(".editAugRequestQty").value;
      if(qty !== ""){
        requests.push({type, qty});
      }
    });

    const issued = [];
    card.querySelectorAll(".editAugIssuedRow").forEach(row => {
      const type = row.querySelector(".editAugIssuedType").value;
      const qty = row.querySelector(".editAugIssuedQty").value;
      if(qty !== ""){
        issued.push({type, qty});
      }
    });

    if(bloodType !== ""){
      bloodTypes.push({
        bloodType,
        requests,
        issued
      });
    }
  });

  const payload = {
    date: document.getElementById("editAugDate").value,
    facility: document.getElementById("editAugFacility").value.toUpperCase(),
    boxContainerQty: document.getElementById("editAugBoxContainerQty").value || 0,
    bloodTypes,
    amountPaid: document.getElementById("editAugAmountPaid").value,
    discount: document.getElementById("editAugDiscount").value,
    priceSnapshot: currentAugmentationPriceSnapshot
  };

  try{
    await update(ref(db, "bloodAugmentation/" + currentAugmentationEditId), payload);
    alert("Blood augmentation updated successfully!");
    window.closeAugmentationModal();
  }catch(error){
    console.error(error);
    alert("Failed to save changes.");
  }
};

/* ACTIONS */
container.addEventListener("click", async (event) => {
  const button = event.target.closest("button");
  if(!button) return;

  const action = button.dataset.action;
  const id = button.dataset.id;

  if(!action || !id) return;

  if(!auth.currentUser){
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  if(action === "edit-release"){
    window.location.href = "releasing-entry.html?id=" + encodeURIComponent(id);
    return;
  }

  if(action === "delete-release"){
    const confirmed = confirm("Delete this releasing record?");
    if(!confirmed) return;

    try{
      await remove(ref(db, "releasing/" + id));
      alert("Deleted successfully!");
    }catch(error){
      console.error(error);
      alert("Failed to delete record");
    }
    return;
  }

  if(action === "edit-augmentation"){
    await openEditAugmentation(id);
    return;
  }

  if(action === "delete-augmentation"){
    const confirmed = confirm("Delete this blood augmentation record?");
    if(!confirmed) return;

    try{
      await remove(ref(db, "bloodAugmentation/" + id));
      alert("Deleted successfully!");
    }catch(error){
      console.error(error);
      alert("Failed to delete blood augmentation record");
    }
  }
});

/* EXPORT */
function exportReleasingCSV(){
  const filtered = getFilteredReleasingEntries();

  const rows = [
    ["DATE","FACILITY","SURNAME","FIRSTNAME","AGE","SEX","BLOOD","OR","BOX_CONTAINER","REQUESTED","ISSUED","COMPUTED_TOTAL","AMOUNT_PAID","DISCOUNT"]
  ];

  filtered.forEach(e => {
    const req = (Array.isArray(e.requests) ? e.requests : [])
      .map(r => `${r.type || ""}-${r.qty || ""}`)
      .join("|");

    const iss = (Array.isArray(e.issued) ? e.issued : [])
      .map(r => `${r.type || ""}-${r.qty || ""}`)
      .join("|");

    rows.push([
      e.date || "",
      e.facility || "",
      e.surname || "",
      e.firstname || "",
      e.age || "",
      e.sex || "",
      e.bloodtype || "",
      e.or || "",
      e.boxContainerQty || 0,
      req,
      iss,
      computeReleasingTotal(e),
      e.amountPaid || "",
      e.discount || ""
    ]);
  });

  const csv = rows.map(row =>
    row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "releasing_records.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function exportAugmentationCSV(){
  const filtered = getFilteredAugmentationEntries();

  const rows = [
    ["DATE","FACILITY","BOX_CONTAINER","AUGMENTATION_DETAILS","COMPUTED_TOTAL","AMOUNT_PAID","DISCOUNT"]
  ];

  filtered.forEach(e => {
    const details = (Array.isArray(e.bloodTypes) ? e.bloodTypes : []).map(bt => {
      const reqText = (Array.isArray(bt.requests) ? bt.requests : [])
        .filter(item => Number(item.qty || 0) > 0)
        .map(item => `${item.type}-${item.qty}`)
        .join(", ");

      const issText = (Array.isArray(bt.issued) ? bt.issued : [])
        .filter(item => Number(item.qty || 0) > 0)
        .map(item => `${item.type}-${item.qty}`)
        .join(", ");

      return `${bt.bloodType || ""} [REQ: ${reqText || "-"} | ISS: ${issText || "-"}]`;
    }).join(" || ");

    rows.push([
      e.date || "",
      e.facility || "",
      e.boxContainerQty || 0,
      details,
      computeAugEntryTotal(e),
      e.amountPaid || "",
      e.discount || ""
    ]);
  });

  const csv = rows.map(row =>
    row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "blood_augmentation_records.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function exportCurrentCSV(){
  if(!auth.currentUser){
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  if(currentView === "releasing"){
    exportReleasingCSV();
  }else{
    exportAugmentationCSV();
  }
}
