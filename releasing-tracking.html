<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Records</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#e65100;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1400px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-weight:bold;
}

.controls button{
border:none;
cursor:pointer;
color:white;
}

.exportBtn{background:#2e7d32;}
.backBtn{background:#444;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#e65100;
color:white;
}

.componentBox{
text-align:left;
font-size:13px;
line-height:1.5;
}

.actionBtn{
padding:6px 10px;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
font-weight:bold;
margin:2px;
}

.editBtn{background:#1565c0;}
.deleteBtn{background:#c62828;}

.monthHeader{
background:#f0f0f0;
padding:10px;
margin-top:20px;
font-weight:bold;
font-size:16px;
}

</style>
</head>

<body>

<header>
<h2>Blood Releasing Records</h2>
</header>

<div class="container">

<div class="controls">

<input type="text" id="searchBox" placeholder="Search Name / Facility">

<input type="date" id="filterDate">

<select id="filterFacility">
<option value="">ALL FACILITIES</option>
</select>

<button class="exportBtn" onclick="exportCSV()">EXPORT CSV</button>

<button class="backBtn" onclick="goBack()">BACK</button>

</div>

<div id="tableContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR-API-KEY",
databaseURL:"https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"galloners-club"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const container=document.getElementById("tableContainer");
const searchBox=document.getElementById("searchBox");
const filterDate=document.getElementById("filterDate");
const filterFacility=document.getElementById("filterFacility");

let allEntries=[];

onValue(ref(db,"releasing"),snapshot=>{

allEntries=[];

snapshot.forEach(child=>{
allEntries.push({
id:child.key,
...child.val()
});
});

populateFacilityFilter();
renderTable();

});


function populateFacilityFilter(){

const facilities=[...new Set(allEntries.map(e=>e.facility))];

filterFacility.innerHTML='<option value="">ALL FACILITIES</option>';

facilities.forEach(f=>{
const option=document.createElement("option");
option.value=f;
option.textContent=f;
filterFacility.appendChild(option);
});

}


function formatComponents(list){

if(!list || list.length===0) return "";

let text="";

list.forEach(item=>{
text+=item.type+" - "+item.qty+"<br>";
});

return text;

}


function renderTable(){

const search=searchBox.value.toUpperCase();
const dateFilter=filterDate.value;
const facilityFilter=filterFacility.value;

let filtered=allEntries.filter(e=>{

const name=(e.surname+" "+e.firstname).toUpperCase();
const facility=(e.facility||"").toUpperCase();

const matchSearch=
name.includes(search) ||
facility.includes(search);

const matchDate=
dateFilter==="" ||
e.date===dateFilter;

const matchFacility=
facilityFilter==="" ||
e.facility===facilityFilter;

return matchSearch && matchDate && matchFacility;

});

filtered.sort((a,b)=>b.date.localeCompare(a.date));

const grouped={};

filtered.forEach(entry=>{
const month=entry.date.slice(0,7);

if(!grouped[month]) grouped[month]=[];

grouped[month].push(entry);

});

container.innerHTML="";

Object.keys(grouped).sort().reverse().forEach(month=>{

const monthHeader=document.createElement("div");
monthHeader.className="monthHeader";
monthHeader.textContent=month;
container.appendChild(monthHeader);

const table=document.createElement("table");

table.innerHTML=`
<tr>
<th>DATE</th>
<th>FACILITY</th>
<th>SURNAME</th>
<th>FIRST NAME</th>
<th>AGE</th>
<th>SEX</th>
<th>BLOOD</th>
<th>REQUESTED</th>
<th>ISSUED</th>
<th>ACTION</th>
</tr>
`;

grouped[month].forEach(entry=>{

const row=document.createElement("tr");

row.innerHTML=`

<td>${entry.date}</td>
<td>${entry.facility}</td>
<td>${entry.surname}</td>
<td>${entry.firstname}</td>
<td>${entry.age}</td>
<td>${entry.sex}</td>
<td>${entry.bloodtype}</td>

<td class="componentBox">
${formatComponents(entry.requests)}
</td>

<td class="componentBox">
${formatComponents(entry.issued)}
</td>

<td>

<button class="actionBtn editBtn" onclick="editEntry('${entry.id}')">
EDIT
</button>

<button class="actionBtn deleteBtn" onclick="deleteEntry('${entry.id}')">
DELETE
</button>

</td>

`;

table.appendChild(row);

});

container.appendChild(table);

});

}


window.editEntry=function(id){
window.location.href="releasing-entry.html?id="+id;
}


window.deleteEntry=function(id){

if(confirm("Delete this entry?")){

remove(ref(db,"releasing/"+id));

}

}


window.exportCSV=function(){

let rows=[
["DATE","FACILITY","SURNAME","FIRSTNAME","AGE","SEX","BLOOD","REQUESTED","ISSUED"]
];

allEntries.forEach(e=>{

const req=(e.requests||[]).map(r=>r.type+"-"+r.qty).join("|");
const iss=(e.issued||[]).map(r=>r.type+"-"+r.qty).join("|");

rows.push([
e.date,
e.facility,
e.surname,
e.firstname,
e.age,
e.sex,
e.bloodtype,
req,
iss
]);

});

const csv=rows.map(r=>r.join(",")).join("\n");

const blob=new Blob([csv],{type:"text/csv"});
const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="releasing_records.csv";
link.click();

}


searchBox.addEventListener("input",renderTable);
filterDate.addEventListener("change",renderTable);
filterFacility.addEventListener("change",renderTable);


window.goBack=function(){
window.location.href="releasing.html";
}

</script>

</body>
</html>
