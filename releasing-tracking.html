<!DOCTYPE html>
<html>
<head>
<title>Releasing Tracking</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#e65100;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1300px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-weight:bold;
}

.controls input,
.controls select{
flex:1;
min-width:180px;
}

.controls button{
cursor:pointer;
border:none;
color:white;
}

.exportBtn{background:#2e7d32;}
.backBtn{background:#444;}

.monthHeader{
background:#f0f0f0;
padding:12px;
font-weight:bold;
border-radius:5px;
margin-top:15px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
font-size:14px;
}

th{
background:#e65100;
color:white;
}

.actionBtn{
padding:6px 10px;
border:none;
border-radius:4px;
color:white;
cursor:pointer;
font-weight:bold;
margin:2px;
}

.editBtn{background:#1565c0;}
.deleteBtn{background:#c62828;}

.hidden{
display:none;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Tracking</h2>
</header>

<div class="container">

<div class="controls">
<input type="text" id="searchBox" placeholder="SEARCH NAME OR FACILITY">
<input type="date" id="filterDate">
<select id="filterFacility">
<option value="">ALL FACILITIES</option>
</select>
<button class="exportBtn" onclick="exportCSV()">EXPORT CSV</button>
<button class="backBtn" onclick="goBack()">BACK TO RELEASING</button>
</div>

<div id="trackingContainer"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const trackingContainer = document.getElementById("trackingContainer");
const searchBox = document.getElementById("searchBox");
const filterDate = document.getElementById("filterDate");
const filterFacility = document.getElementById("filterFacility");

let allEntries = [];

/* LOAD ENTRIES */
onValue(ref(db, "releasing"), (snapshot) => {
  allEntries = [];

  snapshot.forEach((child) => {
    allEntries.push({
      id: child.key,
      ...child.val()
    });
  });

  loadFacilityFilter();
  renderTracking();
});

/* LOAD FACILITY FILTER OPTIONS */
function loadFacilityFilter(){
  const facilities = [...new Set(allEntries.map(entry => (entry.facility || "").toUpperCase()).filter(Boolean))];
  filterFacility.innerHTML = `<option value="">ALL FACILITIES</option>`;

  facilities.sort().forEach(facility => {
    const option = document.createElement("option");
    option.value = facility;
    option.textContent = facility;
    filterFacility.appendChild(option);
  });
}

/* FILTER + RENDER */
function renderTracking(){
  const searchValue = searchBox.value.trim().toUpperCase();
  const dateValue = filterDate.value;
  const facilityValue = filterFacility.value.toUpperCase();

  let filtered = allEntries.filter(entry => {
    const fullName = `${entry.surname || ""} ${entry.firstname || ""}`.toUpperCase();
    const facility = (entry.facility || "").toUpperCase();
    const matchesSearch =
      searchValue === "" ||
      fullName.includes(searchValue) ||
      facility.includes(searchValue);

    const matchesDate =
      dateValue === "" ||
      (entry.date || "") === dateValue;

    const matchesFacility =
      facilityValue === "" ||
      facility === facilityValue;

    return matchesSearch && matchesDate && matchesFacility;
  });

  // sort newest first
  filtered.sort((a,b) => (b.date || "").localeCompare(a.date || ""));

  const grouped = {};

  filtered.forEach(entry => {
    const monthKey = entry.date ? entry.date.slice(0,7) : "NO DATE";
    if(!grouped[monthKey]) grouped[monthKey] = [];
    grouped[monthKey].push(entry);
  });

  trackingContainer.innerHTML = "";

  Object.keys(grouped).sort().reverse().forEach(month => {
    const section = document.createElement("div");

    const header = document.createElement("div");
    header.className = "monthHeader";
    header.textContent = month;

    const content = document.createElement("div");
    content.className = "hidden";

    const table = document.createElement("table");
    table.innerHTML = `
      <thead>
        <tr>
          <th>DATE</th>
          <th>FACILITY</th>
          <th>SURNAME</th>
          <th>FIRST NAME</th>
          <th>AGE</th>
          <th>SEX</th>
          <th>BLOOD TYPE</th>
          <th>OR</th>
          <th>REQUEST</th>
          <th>REQ QTY</th>
          <th>ISSUED</th>
          <th>ISS QTY</th>
          <th>AMOUNT PAID</th>
          <th>DISCOUNT</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;

    const tbody = table.querySelector("tbody");

    grouped[month].forEach(entry => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${entry.date || ""}</td>
        <td>${entry.facility || ""}</td>
        <td>${entry.surname || ""}</td>
        <td>${entry.firstname || ""}</td>
        <td>${entry.age || ""}</td>
        <td>${entry.sex || ""}</td>
        <td>${entry.bloodtype || ""}</td>
        <td>${entry.or || ""}</td>
        <td>${entry.request || ""}</td>
        <td>${entry.requestQty || ""}</td>
        <td>${entry.issued || ""}</td>
        <td>${entry.issuedQty || ""}</td>
        <td>${entry.amountPaid || ""}</td>
        <td>${entry.discount || ""}</td>
        <td>
          <button class="actionBtn editBtn" onclick="editEntry('${entry.id}')">EDIT</button>
          <button class="actionBtn deleteBtn" onclick="deleteEntry('${entry.id}')">DELETE</button>
        </td>
      `;
      tbody.appendChild(row);
    });

    content.appendChild(table);

    header.addEventListener("click", () => {
      content.classList.toggle("hidden");
    });

    section.appendChild(header);
    section.appendChild(content);
    trackingContainer.appendChild(section);
  });

  if(filtered.length === 0){
    trackingContainer.innerHTML = "<p>No records found.</p>";
  }
}

/* SEARCH + FILTER EVENTS */
searchBox.addEventListener("input", renderTracking);
filterDate.addEventListener("change", renderTracking);
filterFacility.addEventListener("change", renderTracking);

/* EDIT */
window.editEntry = function(id){
  const entry = allEntries.find(item => item.id === id);
  if(!entry) return;

  localStorage.setItem("editId", id);
  localStorage.setItem("editEntryData", JSON.stringify(entry));
  window.location.href = "releasing-entry.html";
}

/* DELETE */
window.deleteEntry = async function(id){
  if(confirm("Delete this entry?")){
    try{
      await remove(ref(db, "releasing/" + id));
    }catch(error){
      console.error(error);
      alert("Failed to delete entry");
    }
  }
}

/* EXPORT CSV */
window.exportCSV = function(){
  let rows = [
    [
      "DATE","FACILITY","SURNAME","FIRST NAME","AGE","SEX","BLOOD TYPE","OR",
      "REQUEST","REQ QTY","ISSUED","ISS QTY","AMOUNT PAID","DISCOUNT"
    ]
  ];

  const searchValue = searchBox.value.trim().toUpperCase();
  const dateValue = filterDate.value;
  const facilityValue = filterFacility.value.toUpperCase();

  let filtered = allEntries.filter(entry => {
    const fullName = `${entry.surname || ""} ${entry.firstname || ""}`.toUpperCase();
    const facility = (entry.facility || "").toUpperCase();

    const matchesSearch =
      searchValue === "" ||
      fullName.includes(searchValue) ||
      facility.includes(searchValue);

    const matchesDate =
      dateValue === "" ||
      (entry.date || "") === dateValue;

    const matchesFacility =
      facilityValue === "" ||
      facility === facilityValue;

    return matchesSearch && matchesDate && matchesFacility;
  });

  filtered.forEach(entry => {
    rows.push([
      entry.date || "",
      entry.facility || "",
      entry.surname || "",
      entry.firstname || "",
      entry.age || "",
      entry.sex || "",
      entry.bloodtype || "",
      entry.or || "",
      entry.request || "",
      entry.requestQty || "",
      entry.issued || "",
      entry.issuedQty || "",
      entry.amountPaid || "",
      entry.discount || ""
    ]);
  });

  const csvContent = rows.map(row =>
    row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "releasing-tracking.csv";
  link.click();
}

/* BACK */
window.goBack = function(){
  window.location.href = "releasing.html";
}
</script>

</body>
</html>
