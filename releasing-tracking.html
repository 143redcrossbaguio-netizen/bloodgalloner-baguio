<!DOCTYPE html>
<html>
<head>
  <title>Blood Releasing Tracking</title>
  <meta charset="UTF-8">
  <style>
    body {
      margin:0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #ff9800;
      color: white;
      text-align: center;
      padding: 15px;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
      text-transform: uppercase;
    }

    th {
      background: #ff9800;
      color: white;
    }

    button {
      padding: 10px 15px;
      margin-top: 15px;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
      background: #444;
      color: white;
    }

  </style>
</head>

<body>

<header>
  <h2>Blood Releasing Tracking</h2>
</header>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>DATE</th>
        <th>FACILITY</th>
        <th>SURNAME</th>
        <th>FIRST NAME</th>
        <th>AGE</th>
        <th>SEX</th>
        <th>BLOOD TYPE</th>
        <th>OR (OPTIONAL)</th>
        <th>REQUEST</th>
        <th>REQUEST QTY</th>
        <th>ISSUED</th>
        <th>ISSUED QTY</th>
      </tr>
    </thead>
    <tbody id="trackingTableBody">
      <!-- Data will populate here -->
    </tbody>
  </table>

  <button onclick="goBack()">BACK TO BLOOD RELEASING</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "YOUR-API-KEY",
    databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR-PROJECT"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const tableBody = document.getElementById("trackingTableBody");

  // Load all releasing entries
  onValue(ref(db, "releasing"), snapshot => {
    tableBody.innerHTML = ""; // Clear table first
    snapshot.forEach(child => {
      const data = child.val();
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${data.date || ""}</td>
        <td>${data.facility || ""}</td>
        <td>${data.surname || ""}</td>
        <td>${data.firstname || ""}</td>
        <td>${data.age || ""}</td>
        <td>${data.sex || ""}</td>
        <td>${data.bloodtype || ""}</td>
        <td>${data.or || ""}</td>
        <td>${data.request || ""}</td>
        <td>${data.requestQty || ""}</td>
        <td>${data.issued || ""}</td>
        <td>${data.issuedQty || ""}</td>
      `;
      tableBody.appendChild(row);
    });
  });

  function goBack() {
    window.location.href = "releasing.html"; // Link back to releasing module
  }
</script>

</body>
</html>
