<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Statistics</title>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;color:#333;}
header{background:#00897b;color:white;text-align:center;padding:15px;}

.container{
max-width:1450px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-weight:bold;
}

.controls button{border:none;color:white;cursor:pointer;}

.printBtn{background:#1565c0;}
.exportBtn{background:#2e7d32;}
.backBtn{background:#444;}

.dashboardGrid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:15px;
margin-bottom:20px;
}

.card{
background:#f8f9fa;
border:1px solid #ddd;
border-radius:10px;
padding:18px;
}

.cardTitle{font-size:13px;font-weight:bold;color:#666;}
.cardValue{font-size:28px;font-weight:bold;color:#00695c;}

.sectionTitle{
font-size:16px;
font-weight:bold;
margin:15px 0 10px;
color:#00695c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{background:#00897b;color:white;}
.augTable th{background:#1565c0;}

.monthHeader{
background:#e0f2f1;
padding:12px;
font-weight:bold;
border-radius:6px;
margin-top:20px;
font-size:18px;
}

.left{text-align:left;}

.augSection{
margin-top:40px;
padding-top:15px;
border-top:3px solid #ccc;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Statistics</h2>
</header>

<div class="container">

<div class="controls">
<select id="monthFilter">
<option value="">ALL MONTHS</option>
</select>

<input type="text" id="hospitalSearch" placeholder="SEARCH HOSPITAL">

<button class="printBtn" onclick="window.print()">PRINT</button>
<button class="exportBtn" onclick="exportCSV()">EXPORT CSV</button>
<button class="backBtn" onclick="goBack()">BACK</button>
</div>

<div id="dashboardSection"></div>
<div id="statisticsContainer"></div>

<div class="augSection">

<div class="sectionTitle">BLOOD AUGMENTATION STATISTICS</div>

<div id="augmentationSummary"></div>
<div id="augmentationFacilityTable"></div>
<div id="augmentationMonthlyTable"></div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
databaseURL:"https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"galloners-club"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const monthFilter=document.getElementById("monthFilter");
const hospitalSearch=document.getElementById("hospitalSearch");

let releasing=[];
let augmentation=[];

onValue(ref(db,"releasing"),snap=>{
releasing=[];
snap.forEach(c=>{
releasing.push({...c.val(),id:c.key});
});
refresh();
});

onValue(ref(db,"bloodAugmentation"),snap=>{
augmentation=[];
snap.forEach(c=>{
augmentation.push({...c.val(),id:c.key});
});
refresh();
});

function empty(){return{WB:0,PRBC:0,PC:0,FFP:0,CRYO:0}}

function addComp(store,list){
if(!Array.isArray(list))return;
list.forEach(i=>{
let t=(i.type||"").toUpperCase();
let q=Number(i.qty||0);
if(store[t]!=null)store[t]+=q;
});
}

function refresh(){
renderAugmentationStats();
}

function renderAugmentationStats(){

let facilityStats={};
let grand={records:0,requested:empty(),issued:empty(),income:0};

augmentation.forEach(e=>{

let fac=(e.facility||"UNKNOWN").toUpperCase();

if(!facilityStats[fac]){
facilityStats[fac]={records:0,requested:empty(),issued:empty(),income:0};
}

facilityStats[fac].records++;
grand.records++;

if(Array.isArray(e.bloodTypes)){
e.bloodTypes.forEach(b=>{
addComp(facilityStats[fac].requested,b.requests);
addComp(facilityStats[fac].issued,b.issued);

addComp(grand.requested,b.requests);
addComp(grand.issued,b.issued);
});
}

let inc=(Number(e.amountPaid||0)-Number(e.discount||0));
facilityStats[fac].income+=inc;
grand.income+=inc;

});

document.getElementById("augmentationSummary").innerHTML=`

<div class="card">

<b>TOTAL RECORDS:</b> ${grand.records}<br>
<b>TOTAL INCOME:</b> ${grand.income.toFixed(2)}

</div>

`;

let table=`<table class="augTable">

<tr>
<th>FACILITY</th>
<th>RECORDS</th>

<th>WB REQ</th>
<th>PRBC REQ</th>
<th>PC REQ</th>
<th>FFP REQ</th>
<th>CRYO REQ</th>

<th>WB ISS</th>
<th>PRBC ISS</th>
<th>PC ISS</th>
<th>FFP ISS</th>
<th>CRYO ISS</th>

<th>INCOME</th>
</tr>
`;

Object.keys(facilityStats).sort().forEach(f=>{

let s=facilityStats[f];

table+=`
<tr>

<td class="left">${f}</td>
<td>${s.records}</td>

<td>${s.requested.WB}</td>
<td>${s.requested.PRBC}</td>
<td>${s.requested.PC}</td>
<td>${s.requested.FFP}</td>
<td>${s.requested.CRYO}</td>

<td>${s.issued.WB}</td>
<td>${s.issued.PRBC}</td>
<td>${s.issued.PC}</td>
<td>${s.issued.FFP}</td>
<td>${s.issued.CRYO}</td>

<td>${s.income.toFixed(2)}</td>

</tr>
`;

});

table+=`

<tr style="font-weight:bold;background:#eee">

<td>TOTAL</td>
<td>${grand.records}</td>

<td>${grand.requested.WB}</td>
<td>${grand.requested.PRBC}</td>
<td>${grand.requested.PC}</td>
<td>${grand.requested.FFP}</td>
<td>${grand.requested.CRYO}</td>

<td>${grand.issued.WB}</td>
<td>${grand.issued.PRBC}</td>
<td>${grand.issued.PC}</td>
<td>${grand.issued.FFP}</td>
<td>${grand.issued.CRYO}</td>

<td>${grand.income.toFixed(2)}</td>

</tr>

</table>`;

document.getElementById("augmentationFacilityTable").innerHTML=table;

}

window.goBack=function(){
window.location.href="releasing.html";
}

</script>

</body>
</html>
