<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Statistics</title>
<meta charset="UTF-8">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
databaseURL:"https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"galloners-club",
storageBucket:"galloners-club.firebasestorage.app",
messagingSenderId:"213049860421",
appId:"1:213049860421:web:4156aaa52b945f48711e2c",
measurementId:"G-XYXJH9JNXJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

/* AUTH PROTECTION */

onAuthStateChanged(auth,(user)=>{

if(!user){
window.location.href="index.html";
return;
}

loadStatistics();

});

function loadStatistics(){

const statisticsContainer = document.getElementById("statisticsContainer");
const dashboardSection = document.getElementById("dashboardSection");
const monthFilter = document.getElementById("monthFilter");
const hospitalSearch = document.getElementById("hospitalSearch");

let allEntries = [];

onValue(ref(db,"releasing"), snapshot => {

allEntries = [];

snapshot.forEach(child => {
allEntries.push({
id: child.key,
...child.val()
});
});

populateMonthFilter();
renderStatistics();

});

/* MONTH NAME */

function monthName(monthKey){

const months={
"01":"JANUARY",
"02":"FEBRUARY",
"03":"MARCH",
"04":"APRIL",
"05":"MAY",
"06":"JUNE",
"07":"JULY",
"08":"AUGUST",
"09":"SEPTEMBER",
"10":"OCTOBER",
"11":"NOVEMBER",
"12":"DECEMBER"
};

const [year,month]=monthKey.split("-");
return (months[month]||month)+" "+year;

}

function emptyComponent(){
return {WB:0,PRBC:0,PC:0,FFP:0,CRYO:0};
}

function countComponents(store,list){

if(!Array.isArray(list)) return;

list.forEach(item=>{

const type=(item.type||"").toUpperCase();
const qty=Number(item.qty||0);

if(store[type]!==undefined){
store[type]+=qty;
}

});

}

/* MONTH FILTER */

function populateMonthFilter(){

const months=[...new Set(
allEntries
.map(e=>(e.date||"").slice(0,7))
.filter(Boolean)
)].sort().reverse();

const current=monthFilter.value;

monthFilter.innerHTML='<option value="">ALL MONTHS</option>';

months.forEach(m=>{

const opt=document.createElement("option");
opt.value=m;
opt.textContent=monthName(m);

if(m===current) opt.selected=true;

monthFilter.appendChild(opt);

});

}

/* BUILD STATS */

function buildStats(){

const monthFilterValue=monthFilter.value;
const hospitalSearchValue=hospitalSearch.value.toUpperCase();

const grouped={};

const grand={
patients:0,
male:0,
female:0,
requested:emptyComponent(),
issued:emptyComponent(),
income:0
};

allEntries.forEach(entry=>{

const dateValue=entry.date||"";
if(dateValue==="") return;

const month=dateValue.slice(0,7);
const hospital=(entry.facility||"").toUpperCase();

if(monthFilterValue && month!==monthFilterValue) return;
if(hospitalSearchValue && !hospital.includes(hospitalSearchValue)) return;

if(!grouped[month]){

grouped[month]={
hospitals:{},
totals:{
entries:0,
male:0,
female:0,
requested:emptyComponent(),
issued:emptyComponent(),
income:0
}
};

}

if(!grouped[month].hospitals[hospital]){

grouped[month].hospitals[hospital]={
entries:0,
male:0,
female:0,
requested:emptyComponent(),
issued:emptyComponent()
};

}

const m=grouped[month];
const h=m.hospitals[hospital];

m.totals.entries++;
h.entries++;
grand.patients++;

if(entry.sex==="MALE"){
m.totals.male++;
h.male++;
grand.male++;
}

if(entry.sex==="FEMALE"){
m.totals.female++;
h.female++;
grand.female++;
}

countComponents(m.totals.requested,entry.requests);
countComponents(h.requested,entry.requests);
countComponents(grand.requested,entry.requests);

countComponents(m.totals.issued,entry.issued);
countComponents(h.issued,entry.issued);
countComponents(grand.issued,entry.issued);

const income=(Number(entry.amountPaid||0)-Number(entry.discount||0));
m.totals.income+=income;
grand.income+=income;

});

return {grouped,grand};

}

/* DASHBOARD */

function renderDashboard(grand){

dashboardSection.innerHTML=`

<div class="dashboardGrid">

<div class="card">
<div class="cardTitle">Total Patients</div>
<div class="cardValue">${grand.patients}</div>
</div>

<div class="card">
<div class="cardTitle">Total Male</div>
<div class="cardValue">${grand.male}</div>
</div>

<div class="card">
<div class="cardTitle">Total Female</div>
<div class="cardValue">${grand.female}</div>
</div>

<div class="card">
<div class="cardTitle">Total Income</div>
<div class="cardValue">${grand.income.toFixed(2)}</div>
</div>

</div>

`;

}

/* RENDER */

function renderStatistics(){

const data=buildStats();
const stats=data.grouped;
const grand=data.grand;

renderDashboard(grand);

statisticsContainer.innerHTML="";

const months=Object.keys(stats).sort().reverse();

months.forEach(month=>{

const m=stats[month];

const header=document.createElement("div");
header.className="monthHeader";
header.textContent=monthName(month);

statisticsContainer.appendChild(header);

});

}

/* EXPORT */

window.exportCSV=function(){

if(!auth.currentUser){
alert("Not logged in.");
return;
}

alert("Export working.");

};

/* BACK */

window.goBack=function(){
window.location.href="releasing.html";
};

monthFilter.addEventListener("change",renderStatistics);
hospitalSearch.addEventListener("input",renderStatistics);

}

</script>

<style>
/* YOUR ORIGINAL CSS HERE (UNCHANGED) */
</style>

</head>

<body>

<header>
<h2>Blood Releasing Statistics</h2>
</header>

<div class="container">

<div class="controls">
<select id="monthFilter">
<option value="">ALL MONTHS</option>
</select>

<input type="text" id="hospitalSearch" placeholder="SEARCH HOSPITAL">

<button class="printBtn" onclick="window.print()">PRINT</button>
<button class="exportBtn" onclick="exportCSV()">EXPORT CSV</button>
<button class="backBtn" onclick="goBack()">BACK</button>
</div>

<div id="dashboardSection"></div>
<div id="statisticsContainer"></div>

</div>

</body>
</html>
