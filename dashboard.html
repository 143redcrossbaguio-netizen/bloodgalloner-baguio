<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
            overflow-x: hidden;
        }

        .bg-liquid {
            display: none;
        }

        .page {
            position: relative;
            z-index: 1;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 1180px;
            margin: 20px auto 28px;
            padding: 0 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .main-card {
            background: rgba(255,255,255,0.96);
            border-radius: 26px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            border: 1px solid rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .main-button {
            width: 100%;
            border: none;
            cursor: pointer;
            color: white;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            text-align: left;
            min-height: 96px;
            position: relative;
            overflow: hidden;
        }

        .main-button::after,
        .single-button-card::after,
        .sub-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.00) 34%, rgba(0,0,0,0.08) 100%);
            pointer-events: none;
        }

        .main-left {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .main-title {
            font-size: 24px;
            line-height: 1.05;
            text-shadow: 0 1px 3px rgba(0,0,0,0.20);
        }

        .main-subtitle {
            font-size: 13px;
            opacity: 0.96;
            margin-top: 5px;
            font-weight: normal;
            text-shadow: 0 1px 2px rgba(0,0,0,0.16);
        }

        .galloner-main { background: linear-gradient(135deg, #690000, #a30000 48%, #d12c2c 100%); }
        .partner-main  { background: linear-gradient(135deg, #1f5f25, #2f8d36 52%, #48a451 100%); }
        .releasing-main{ background: linear-gradient(135deg, #8f3d00, #d56a00 55%, #ff9a1f 100%); }
        .backup-main   { background: linear-gradient(135deg, #005f56, #00897b 55%, #0ea99a 100%); }
        .admin-main    { background: linear-gradient(135deg, #3d096f, #65209d 52%, #7f36be 100%); }
        .logout-main   { background: linear-gradient(135deg, #2b2b2b, #3f3f3f 52%, #222 100%); }

        .icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.22));
        }

        .chevron {
            font-size: 22px;
            font-weight: bold;
            transition: transform 0.35s ease;
            position: relative;
            z-index: 1;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        .expand-shell {
            max-height: 0;
            overflow: hidden;
            background: #ffffff;
            border-top: 1px solid rgba(0,0,0,0.06);
            transition: max-height 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .expand-shell.open {
            max-height: 540px;
        }

        .expand-content {
            padding: 18px;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.26s ease, transform 0.26s ease;
        }

        .expand-shell.open .expand-content {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.06s;
        }

        .tube-wrap {
            position: relative;
            padding-top: 18px;
        }

        .tube-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 22px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid {
            display: grid;
            gap: 14px;
        }

        .tube-grid.three { grid-template-columns: repeat(3, 1fr); }
        .tube-grid.five { grid-template-columns: repeat(5, 1fr); }
        .tube-grid.three-center { grid-template-columns: repeat(3, 1fr); }

        .tube-item {
            position: relative;
            padding-top: 18px;
        }

        .tube-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 18px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            margin: 0 auto;
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid.three .tube-item:first-child::after,
        .tube-grid.five .tube-item:first-child::after,
        .tube-grid.three-center .tube-item:first-child::after {
            left: 50%;
        }

        .tube-grid.three .tube-item:last-child::after,
        .tube-grid.five .tube-item:last-child::after,
        .tube-grid.three-center .tube-item:last-child::after {
            right: 50%;
        }

        .sub-card {
            width: 100%;
            min-height: 104px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.10);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            position: relative;
            overflow: hidden;
        }

        .sub-card:hover,
        .single-button-card:hover,
        .main-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .entry-btn { background: linear-gradient(135deg, #7a0000, #b30000 60%, #d52626 100%); }
        .tracking-btn { background: linear-gradient(135deg, #bf2a2a, #ff4d4d 60%, #ff7676 100%); }
        .award-btn { background: linear-gradient(135deg, #52116f, #6a1b9a 60%, #8a34c0 100%); }

        .releasing-btn { background: linear-gradient(135deg, #b15a00, #ff9800 60%, #ffb84d 100%); }
        .releasing-entry-btn { background: linear-gradient(135deg, #a64b00, #ef6c00 60%, #ff8a2c 100%); }
        .releasing-track-btn { background: linear-gradient(135deg, #8d3000, #e65100 60%, #ff6f1f 100%); }
        .releasing-stats-btn { background: linear-gradient(135deg, #00685f, #00897b 60%, #14a89b 100%); }
        .facility-btn { background: linear-gradient(135deg, #0d4f98, #1565c0 60%, #2e84eb 100%); }

        .backup-file-btn { background: linear-gradient(135deg, #00665d, #00897b 60%, #0ca093 100%); }
        .backup-system-btn { background: linear-gradient(135deg, #00584f, #00796b 60%, #0a8f80 100%); }
        .backup-viewer-btn { background: linear-gradient(135deg, #004e47, #00695c 60%, #087b6d 100%); }

        .lower-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .backup-status {
            margin-top: 2px;
            padding: 16px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 10px 24px rgba(0,0,0,0.06);
            background: #ffffff;
            color: #333;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .backup-warning {
            border-color: #ffe69c;
            background: #fff3cd;
            color: #664d03;
        }

        .backup-ok {
            border-color: #a3cfbb;
            background: #d1e7dd;
            color: #0f5132;
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .single-button-card {
            width: 100%;
            min-height: 96px;
            border: none;
            border-radius: 26px;
            color: white;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(0,0,0,0.10);
            padding: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            font-size: 21px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 1100px) {
            .tube-grid.five {
                grid-template-columns: repeat(3, 1fr);
            }

            .expand-shell.open {
                max-height: 760px;
            }
        }

        @media (max-width: 900px) {
            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr 1fr;
            }

            .lower-row {
                grid-template-columns: 1fr;
            }

            .main-title {
                font-size: 22px;
            }

            .single-button-card {
                font-size: 20px;
            }

            .expand-shell.open {
                max-height: 940px;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin-top: 14px;
                padding: 0 12px 22px;
            }

            .dashboard-grid {
                gap: 14px;
            }

            .main-button {
                padding: 16px;
                min-height: 86px;
            }

            .main-title {
                font-size: 20px;
            }

            .main-subtitle {
                font-size: 12px;
            }

            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr;
            }

            .sub-card {
                min-height: 88px;
                font-size: 14px;
            }

            .single-button-card {
                font-size: 18px;
                min-height: 86px;
                padding: 16px;
            }

            .tube-item::after,
            .tube-line {
                display: none;
            }

            .expand-shell.open {
                max-height: 1220px;
            }
        }
    </style>
</head>

<body>

<div class="page">

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">
    <div class="dashboard-grid">

        <div class="main-card">
            <button class="main-button galloner-main" onclick="toggleSection('galloner')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                    <div>
                        <div class="main-title">Galloner</div>
                        <div class="main-subtitle">Donor registry and award monitoring</div>
                    </div>
                </div>
                <div id="chevron-galloner" class="chevron">▼</div>
            </button>

            <div id="section-galloner" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid three">
                            <div class="tube-item"><button class="sub-card entry-btn" onclick="goEntry()">Donor Entry</button></div>
                            <div class="tube-item"><button class="sub-card tracking-btn" onclick="goTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card award-btn" onclick="goAwardees()">Awardees</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="single-button-card partner-main" onclick="goPartner()">
            <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
            Partner Organization
        </button>

        <div class="main-card">
            <button class="main-button releasing-main" onclick="toggleSection('releasing')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                    <div>
                        <div class="main-title">Releasing</div>
                        <div class="main-subtitle">Blood releasing, tracking, statistics, facilities</div>
                    </div>
                </div>
                <div id="chevron-releasing" class="chevron">▼</div>
            </button>

            <div id="section-releasing" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid five">
                            <div class="tube-item"><button class="sub-card releasing-btn" onclick="goReleasing()">Main</button></div>
                            <div class="tube-item"><button class="sub-card releasing-entry-btn" onclick="goReleasingEntry()">Entry</button></div>
                            <div class="tube-item"><button class="sub-card releasing-track-btn" onclick="goReleasingTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card releasing-stats-btn" onclick="goReleasingStats()">Statistics</button></div>
                            <div class="tube-item"><button class="sub-card facility-btn" onclick="goFacilityManager()">Facility Manager</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lower-row">
            <button class="single-button-card admin-main" onclick="goAdminManager()">
                <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                Admin Manager
            </button>

            <div class="main-card">
                <button class="main-button backup-main" onclick="toggleSection('backup')">
                    <div class="main-left">
                        <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                        <div>
                            <div class="main-title">Backup Manager</div>
                            <div class="main-subtitle">Monthly backup, save backup, backup viewer</div>
                        </div>
                    </div>
                    <div id="chevron-backup" class="chevron">▼</div>
                </button>

                <div id="section-backup" class="expand-shell">
                    <div class="expand-content">
                        <div class="tube-wrap">
                            <div class="tube-line"></div>
                            <div class="tube-grid three-center">
                                <div class="tube-item"><button class="sub-card backup-file-btn" onclick="downloadBackupFile()">Monthly Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-system-btn" onclick="saveBackupToSystem()">Save Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-viewer-btn" onclick="goBackupViewer()">Backup Viewer</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="backupStatus" class="backup-status backup-warning">
            <div class="backup-title">Backup Status</div>
            <div>Checking backup status...</div>
        </div>

        <div style="display:flex; justify-content:flex-end;">
            <button class="single-button-card logout-main" onclick="logout()" style="max-width:280px;">
                <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5 5 5zm-6 7h16a2 2 0 002-2V2a2 2 0 00-2-2H4a2 2 0 00-2 2v5h2V2h16v20H4v-5H2v5a2 2 0 002 2z"></path></svg>
                Logout
            </button>
        </div>

    </div>
</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");
    const sections = ["galloner", "releasing", "backup"];

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    window.toggleSection = function(name) {
        sections.forEach(sectionName => {
            const shell = document.getElementById("section-" + sectionName);
            const chevron = document.getElementById("chevron-" + sectionName);
            const shouldOpen = sectionName === name ? !shell.classList.contains("open") : false;

            shell.classList.toggle("open", shouldOpen);
            chevron.classList.toggle("open", shouldOpen);
        });
    };

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed.");
        }
    };

    window.goEntry = function() { window.location.href = "donor-entry.html"; };
    window.goTracking = function() { window.location.href = "tracking.html"; };
    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };

    window.goReleasing = function() { window.location.href = "releasing.html"; };
    window.goReleasingEntry = function() { window.location.href = "releasing-entry.html"; };
    window.goReleasingTracking = function() { window.location.href = "releasing-tracking.html"; };
    window.goReleasingStats = function() { window.location.href = "releasing-statistics.html"; };
    window.goFacilityManager = function() { window.location.href = "facility-manager.html"; };

    window.goAdminManager = function() { window.location.href = "admin-manager.html"; };
    window.goBackupViewer = function() { window.location.href = "backup-viewer.html"; };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>

</body>
</html>
