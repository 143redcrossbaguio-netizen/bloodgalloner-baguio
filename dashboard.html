<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
            overflow-x: hidden;
        }

        .bg-liquid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(120,0,0,0.10), transparent 18%),
                radial-gradient(circle at 82% 22%, rgba(120,0,0,0.08), transparent 18%),
                radial-gradient(circle at 50% 84%, rgba(120,0,0,0.08), transparent 20%),
                #ffffff;
        }

        .bg-svg {
            position: absolute;
            inset: -8%;
            width: 116%;
            height: 116%;
            opacity: 1;
            filter: blur(1px) drop-shadow(0 12px 18px rgba(70,0,0,0.22));
        }

        .bg-gloss {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 18% 16%, rgba(255,255,255,0.30), transparent 16%),
                radial-gradient(ellipse at 78% 20%, rgba(255,255,255,0.22), transparent 15%),
                radial-gradient(ellipse at 44% 72%, rgba(255,255,255,0.16), transparent 18%);
            mix-blend-mode: screen;
            opacity: 0.85;
        }

        .bg-drops {
            position: absolute;
            inset: 0;
        }

        .drop {
            position: absolute;
            width: 20px;
            height: 28px;
            opacity: 0.34;
            animation: driftBlood 18s ease-in-out infinite;
            filter: drop-shadow(0 4px 6px rgba(70,0,0,0.22));
        }

        .drop svg {
            width: 100%;
            height: 100%;
            display: block;
            fill: #6b0000;
        }

        .d1 { top: 10%; left: 8%; animation-duration: 13s; }
        .d2 { top: 18%; left: 84%; animation-duration: 9s; width: 15px; height: 21px; }
        .d3 { top: 42%; left: 14%; animation-duration: 16s; width: 24px; height: 32px; }
        .d4 { top: 58%; left: 88%; animation-duration: 11s; }
        .d5 { top: 76%; left: 9%; animation-duration: 19s; width: 16px; height: 22px; }
        .d6 { top: 82%; left: 70%; animation-duration: 12s; width: 22px; height: 30px; }
        .d7 { top: 14%; left: 48%; animation-duration: 15s; width: 14px; height: 20px; }
        .d8 { top: 60%; left: 36%; animation-duration: 17s; width: 19px; height: 26px; }

        @keyframes driftBlood {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); }
            20%  { transform: translate(14px,-8px) rotate(4deg) scale(1.06); }
            45%  { transform: translate(38px,10px) rotate(-3deg) scale(0.96); }
            75%  { transform: translate(10px,26px) rotate(2deg) scale(1.03); }
            100% { transform: translate(0,0) rotate(0deg) scale(1); }
        }

        .page {
            position: relative;
            z-index: 1;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 1180px;
            margin: 18px auto 26px;
            padding: 0 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .main-card {
            background: rgba(255,255,255,0.86);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            border: 1px solid rgba(235,235,235,0.95);
            overflow: hidden;
        }

        .main-button {
            width: 100%;
            border: none;
            cursor: pointer;
            color: white;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            text-align: left;
            min-height: 92px;
        }

        .main-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-title {
            font-size: 24px;
            line-height: 1.05;
        }

        .main-subtitle {
            font-size: 13px;
            opacity: 0.92;
            margin-top: 4px;
            font-weight: normal;
        }

        .galloner-main { background: linear-gradient(135deg, #b30000, #d32f2f); }
        .partner-main  { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .releasing-main{ background: linear-gradient(135deg, #ff9800, #ef6c00); }
        .backup-main   { background: linear-gradient(135deg, #00897b, #00695c); }
        .admin-main    { background: linear-gradient(135deg, #4a148c, #6a1b9a); }
        .logout-main   { background: linear-gradient(135deg, #444, #222); }

        .icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .chevron {
            font-size: 22px;
            font-weight: bold;
            transition: transform 0.25s ease;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        .expand-shell {
            display: none;
            background: rgba(252,252,252,0.92);
            border-top: 1px solid #efefef;
        }

        .expand-shell.open {
            display: block;
        }

        .expand-content {
            padding: 18px;
            opacity: 0;
            transform: translateY(-5px);
            animation: contentIn 0.22s ease forwards;
        }

        @keyframes contentIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tube-wrap {
            position: relative;
            padding-top: 16px;
        }

        .tube-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 20px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid {
            display: grid;
            gap: 12px;
        }

        .tube-grid.three { grid-template-columns: repeat(3, 1fr); }
        .tube-grid.five { grid-template-columns: repeat(5, 1fr); }
        .tube-grid.three-center { grid-template-columns: repeat(3, 1fr); }

        .tube-item {
            position: relative;
            padding-top: 18px;
        }

        .tube-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 18px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            margin: 0 auto;
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid.three .tube-item:first-child::after,
        .tube-grid.five .tube-item:first-child::after,
        .tube-grid.three-center .tube-item:first-child::after {
            left: 50%;
        }

        .tube-grid.three .tube-item:last-child::after,
        .tube-grid.five .tube-item:last-child::after,
        .tube-grid.three-center .tube-item:last-child::after {
            right: 50%;
        }

        .sub-card {
            width: 100%;
            min-height: 102px;
            border: none;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .sub-card:hover,
        .single-button-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }

        .entry-btn { background: #b30000; }
        .tracking-btn { background: #ff4d4d; }
        .award-btn { background: #6a1b9a; }

        .releasing-btn { background: #ff9800; }
        .releasing-entry-btn { background: #ef6c00; }
        .releasing-track-btn { background: #e65100; }
        .releasing-stats-btn { background: #00897b; }
        .facility-btn { background: #1565c0; }

        .backup-file-btn { background: #00897b; }
        .backup-system-btn { background: #00796b; }
        .backup-viewer-btn { background: #00695c; }

        .lower-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .backup-status {
            margin-top: 4px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(4px);
        }

        .backup-warning {
            border: 1px solid #ffe69c;
            color: #664d03;
            background-color: rgba(255,243,205,0.96);
        }

        .backup-ok {
            border: 1px solid #a3cfbb;
            color: #0f5132;
            background-color: rgba(209,231,221,0.96);
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .single-button-card {
            width: 100%;
            min-height: 92px;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            font-size: 21px;
            text-align: center;
        }

        @media (max-width: 1100px) {
            .tube-grid.five {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr 1fr;
            }

            .lower-row {
                grid-template-columns: 1fr;
            }

            .main-title {
                font-size: 22px;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin-top: 14px;
                padding: 0 12px 20px;
            }

            .main-button {
                padding: 16px;
                min-height: 84px;
            }

            .main-title {
                font-size: 20px;
            }

            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr;
            }

            .sub-card {
                min-height: 86px;
                font-size: 14px;
            }

            .single-button-card {
                font-size: 19px;
                min-height: 86px;
            }

            .tube-item::after,
            .tube-line {
                display: none;
            }

            .bg-svg {
                opacity: 0.92;
            }

            .drop {
                opacity: 0.22 !important;
            }
        }
    </style>
</head>

<body>

<div class="page">

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">
    <div class="dashboard-grid">

        <div class="main-card">
            <button class="main-button galloner-main" onclick="toggleSection('galloner')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                    <div>
                        <div class="main-title">Galloner</div>
                        <div class="main-subtitle">Donor registry and award monitoring</div>
                    </div>
                </div>
                <div id="chevron-galloner" class="chevron">▼</div>
            </button>

            <div id="section-galloner" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid three">
                            <div class="tube-item"><button class="sub-card entry-btn" onclick="goEntry()">Donor Entry</button></div>
                            <div class="tube-item"><button class="sub-card tracking-btn" onclick="goTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card award-btn" onclick="goAwardees()">Awardees</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="single-button-card partner-main" onclick="goPartner()">
            <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
            Partner Organization
        </button>

        <div class="main-card">
            <button class="main-button releasing-main" onclick="toggleSection('releasing')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                    <div>
                        <div class="main-title">Releasing</div>
                        <div class="main-subtitle">Blood releasing, tracking, statistics, facilities</div>
                    </div>
                </div>
                <div id="chevron-releasing" class="chevron">▼</div>
            </button>

            <div id="section-releasing" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid five">
                            <div class="tube-item"><button class="sub-card releasing-btn" onclick="goReleasing()">Main</button></div>
                            <div class="tube-item"><button class="sub-card releasing-entry-btn" onclick="goReleasingEntry()">Entry</button></div>
                            <div class="tube-item"><button class="sub-card releasing-track-btn" onclick="goReleasingTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card releasing-stats-btn" onclick="goReleasingStats()">Statistics</button></div>
                            <div class="tube-item"><button class="sub-card facility-btn" onclick="goFacilityManager()">Facility Manager</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lower-row">
            <button class="single-button-card admin-main" onclick="goAdminManager()">
                <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                Admin Manager
            </button>

            <div class="main-card">
                <button class="main-button backup-main" onclick="toggleSection('backup')">
                    <div class="main-left">
                        <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                        <div>
                            <div class="main-title">Backup Manager</div>
                            <div class="main-subtitle">Monthly backup, save backup, backup viewer</div>
                        </div>
                    </div>
                    <div id="chevron-backup" class="chevron">▼</div>
                </button>

                <div id="section-backup" class="expand-shell">
                    <div class="expand-content">
                        <div class="tube-wrap">
                            <div class="tube-line"></div>
                            <div class="tube-grid three-center">
                                <div class="tube-item"><button class="sub-card backup-file-btn" onclick="downloadBackupFile()">Monthly Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-system-btn" onclick="saveBackupToSystem()">Save Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-viewer-btn" onclick="goBackupViewer()">Backup Viewer</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="backupStatus" class="backup-status backup-warning">
            <div class="backup-title">Backup Status</div>
            <div>Checking backup status...</div>
        </div>

        <div style="display:flex; justify-content:flex-end;">
            <button class="single-button-card logout-main" onclick="logout()" style="max-width:280px;">
                <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5 5 5zm-6 7h16a2 2 0 002-2V2a2 2 0 00-2-2H4a2 2 0 00-2 2v5h2V2h16v20H4v-5H2v5a2 2 0 002 2z"></path></svg>
                Logout
            </button>
        </div>

    </div>
</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");
    const sections = ["galloner", "releasing", "backup"];

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    window.toggleSection = function(name) {
        sections.forEach(sectionName => {
            const shell = document.getElementById("section-" + sectionName);
            const chevron = document.getElementById("chevron-" + sectionName);
            const shouldOpen = sectionName === name ? !shell.classList.contains("open") : false;

            shell.classList.toggle("open", shouldOpen);
            chevron.classList.toggle("open", shouldOpen);
        });
    };

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed.");
        }
    };

    window.goEntry = function() { window.location.href = "donor-entry.html"; };
    window.goTracking = function() { window.location.href = "tracking.html"; };
    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };

    window.goReleasing = function() { window.location.href = "releasing.html"; };
    window.goReleasingEntry = function() { window.location.href = "releasing-entry.html"; };
    window.goReleasingTracking = function() { window.location.href = "releasing-tracking.html"; };
    window.goReleasingStats = function() { window.location.href = "releasing-statistics.html"; };
    window.goFacilityManager = function() { window.location.href = "facility-manager.html"; };

    window.goAdminManager = function() { window.location.href = "admin-manager.html"; };
    window.goBackupViewer = function() { window.location.href = "backup-viewer.html"; };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>
