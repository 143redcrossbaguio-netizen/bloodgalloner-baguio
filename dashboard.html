<!-- FULL FILE INCLUDED FOR SAFETY -->

<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #eef3f7;
            color: #1f2937;
        }

        body{ overflow: hidden; }

        .app-shell{
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .topbar{
            background: linear-gradient(90deg, #8b0000, #b30000);
            color: white;
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
        }

        .layout{
            flex: 1;
            display: grid;
            grid-template-columns: 280px 1fr;
        }

        .sidebar{
            background: #ffffff;
            border-right: 1px solid #d7dee7;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .sidebar-title{
            font-size: 12px;
            font-weight: bold;
            margin: 8px 10px;
        }

        .nav-btn{
            width: 100%;
            border: none;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 6px;
            text-align: left;
            font-weight: bold;
            cursor: pointer;
            background: #f6f8fb;
        }

        .nav-btn.active{
            background: #b30000;
            color: white;
        }

        .submenu{
            display:none;
            padding-left:10px;
        }

        .submenu.open{
            display:block;
        }

        .sub-btn{
            width:100%;
            padding:10px;
            margin-bottom:5px;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        .workspace{
            display:flex;
            flex-direction:column;
        }

        .workspace-header{
            padding:12px;
            border-bottom:1px solid #ccc;
        }

        .iframe-wrap{
            flex:1;
        }

        .module-frame{
            width:100%;
            height:100%;
            border:none;
        }
    </style>
</head>

<body>

<div class="app-shell">

<div class="topbar">
    <div>Galloners Dashboard</div>
</div>

<div class="layout">

<!-- ✅ SIDEBAR -->
<aside class="sidebar">

<div class="sidebar-title">Modules</div>

<!-- ✅ DONOR DATABASE (FIRST NOW) -->
<button id="nav-donor-database" class="nav-btn active" onclick="toggleSection('donor-database')">
    Donor Database ▼
</button>

<div id="section-donor-database" class="submenu open">
    <button class="sub-btn" onclick="openModule('donor-database-entry.html','Donor DB - Input')">Data Input</button>
    <button class="sub-btn" onclick="openModule('donor-database-tracking.html','Donor DB - Tracking')">Tracking</button>
    <button class="sub-btn" onclick="openModule('donor-database-statistics.html','Donor DB - Statistics')">Statistics</button>
</div>

<!-- ✅ GALLONER -->
<button id="nav-galloner" class="nav-btn" onclick="toggleSection('galloner')">
    Galloner ▼
</button>

<div id="section-galloner" class="submenu">
    <button class="sub-btn" onclick="openModule('donor-entry.html','Donor Entry')">Donor Entry</button>
    <button class="sub-btn" onclick="openModule('tracking.html','Tracking')">Tracking</button>
    <button class="sub-btn" onclick="openModule('awardees.html','Awardees')">Awardees</button>
</div>

<!-- RELEASING -->
<button id="nav-releasing" class="nav-btn" onclick="toggleSection('releasing')">
    Releasing ▼
</button>

<div id="section-releasing" class="submenu">
    <button class="sub-btn" onclick="openModule('releasing.html','Releasing')">Main</button>
    <button class="sub-btn" onclick="openModule('releasing-entry.html','Entry')">Entry</button>
    <button class="sub-btn" onclick="openModule('releasing-tracking.html','Tracking')">Tracking</button>
    <button class="sub-btn" onclick="openModule('releasing-statistics.html','Statistics')">Statistics</button>
</div>

</aside>

<!-- ✅ RIGHT PANEL -->
<main class="workspace">

<div class="workspace-header">
    <h3 id="workspaceTitle">Donor Database - Input</h3>
</div>

<div class="iframe-wrap">
    <iframe id="moduleFrame" class="module-frame" src="donor-database-entry.html"></iframe>
</div>

</main>

</div>
</div>

<script>
const sections = ["donor-database","galloner","releasing"];

function toggleSection(name){
    sections.forEach(s=>{
        const el = document.getElementById("section-"+s);
        const nav = document.getElementById("nav-"+s);

        if(s===name){
            el.classList.toggle("open");
            nav.classList.add("active");
        }else{
            el.classList.remove("open");
            nav.classList.remove("active");
        }
    });
}

function openModule(url,title){
    document.getElementById("moduleFrame").src = url;
    document.getElementById("workspaceTitle").innerText = title;
}
</script>

</body>
</html>
