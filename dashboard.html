<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galloners Club - Dashboard</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f4f4;
        height: 100vh;
        overflow: hidden;
    }

    header {
        height: 70px;
        background: #b30000;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        font-weight: bold;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        z-index: 10;
        position: relative;
    }

    .main {
        display: flex;
        height: calc(100vh - 70px);
        width: 100%;
    }

    .sidebar {
        width: 280px;
        background: #ffffff;
        border-right: 1px solid #ddd;
        overflow-y: auto;
        padding: 15px;
    }

    .workspace {
        flex: 1;
        background: #eaeaea;
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
        background: white;
    }

    .module {
        margin-bottom: 12px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        background: #fff;
    }

    .module-title {
        width: 100%;
        border: none;
        outline: none;
        text-align: left;
        padding: 14px 16px;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        color: white;
        transition: 0.2s;
    }

    .module-title:hover {
        filter: brightness(0.95);
    }

    .submenu {
        display: none;
        background: #fafafa;
        border-top: 1px solid #eee;
        padding: 10px;
    }

    .submenu button {
        width: 100%;
        border: none;
        outline: none;
        cursor: pointer;
        text-align: left;
        padding: 11px 12px;
        margin-bottom: 8px;
        border-radius: 8px;
        background: #f1f1f1;
        color: #333;
        font-size: 14px;
        transition: 0.2s;
    }

    .submenu button:hover {
        background: #e0e0e0;
    }

    .submenu button:last-child {
        margin-bottom: 0;
    }

    .module.active .submenu {
        display: block;
    }

    .donor-db { background: #8e0000; }
    .galloner { background: #b30000; }
    .partner { background: #1565c0; }
    .releasing { background: #ef6c00; }
    .admin { background: #6a1b9a; }
    .backup { background: #00897b; }
    .logout { background: #424242; }

    .welcome-screen {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffffff, #f7f7f7);
        color: #777;
        font-size: 22px;
        font-weight: bold;
        text-align: center;
        padding: 30px;
    }

    @media (max-width: 900px) {
        .sidebar {
            width: 240px;
        }

        .module-title {
            font-size: 14px;
        }

        .submenu button {
            font-size: 13px;
        }
    }

    @media (max-width: 700px) {
        .main {
            flex-direction: column;
        }

        .sidebar {
            width: 100%;
            height: auto;
            max-height: 45vh;
            border-right: none;
            border-bottom: 1px solid #ddd;
        }

        .workspace {
            height: 55vh;
        }
    }
</style>
</head>
<body>

<header>
    Galloners Club Dashboard
</header>

<div class="main">
    <div class="sidebar">

        <!-- Donor Database -->
        <div class="module">
            <button class="module-title donor-db" onclick="toggleModule(this)">
                Donor Database
            </button>
            <div class="submenu">
                <button onclick="loadPage('donor-database-entry.html')">Data Input</button>
                <button onclick="loadPage('donor-database-tracking.html')">Tracking</button>
                <button onclick="loadPage('donor-database-statistics.html')">Statistics</button>
                <button onclick="loadPage('donor-import.html')">Bulk Import</button>
            </div>
        </div>

        <!-- Galloner -->
        <div class="module">
            <button class="module-title galloner" onclick="toggleModule(this)">
                Galloner
            </button>
            <div class="submenu">
                <button onclick="loadPage('galloner-entry.html')">Entry</button>
                <button onclick="loadPage('galloner-tracking.html')">Tracking</button>
                <button onclick="loadPage('galloner-statistics.html')">Statistics</button>
            </div>
        </div>

        <!-- Partner Organization -->
        <div class="module">
            <button class="module-title partner" onclick="toggleModule(this)">
                Partner Organization
            </button>
            <div class="submenu">
                <button onclick="loadPage('partner-organization.html')">Open Module</button>
            </div>
        </div>

        <!-- Releasing -->
        <div class="module">
            <button class="module-title releasing" onclick="toggleModule(this)">
                Releasing
            </button>
            <div class="submenu">
                <button onclick="loadPage('releasing-entry.html')">Entry</button>
                <button onclick="loadPage('releasing-tracking.html')">Tracking</button>
                <button onclick="loadPage('releasing-statistics.html')">Statistics</button>
            </div>
        </div>

        <!-- Admin Manager -->
        <div class="module">
            <button class="module-title admin" onclick="toggleModule(this)">
                Admin Manager
            </button>
            <div class="submenu">
                <button onclick="loadPage('admin-manager.html')">Open Module</button>
            </div>
        </div>

        <!-- Backup Manager -->
        <div class="module">
            <button class="module-title backup" onclick="toggleModule(this)">
                Backup Manager
            </button>
            <div class="submenu">
                <button onclick="loadPage('backup-manager.html')">Open Module</button>
            </div>
        </div>

        <!-- Logout -->
        <div class="module">
            <button class="module-title logout" onclick="logoutUser()">
                Logout
            </button>
        </div>

    </div>

    <div class="workspace">
        <iframe id="contentFrame" srcdoc="
            <div style='height:100%;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;color:#777;background:#fff;'>
                <div style='text-align:center;'>
                    <h2>Welcome to Galloners Club Dashboard</h2>
                    <p>Select a module from the left panel.</p>
                </div>
            </div>
        "></iframe>
    </div>
</div>

<script>
    function toggleModule(button) {
        const currentModule = button.parentElement;
        const allModules = document.querySelectorAll('.module');

        allModules.forEach(module => {
            if (module !== currentModule) {
                module.classList.remove('active');
            }
        });

        currentModule.classList.toggle('active');
    }

    function loadPage(page) {
        document.getElementById('contentFrame').src = page;
    }

    function logoutUser() {
        const confirmLogout = confirm("Are you sure you want to logout?");
        if (confirmLogout) {
            window.location.href = "index.html";
        }
    }
</script>

</body>
</html>
