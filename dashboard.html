<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 3px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        .entry-btn { background-color: #b30000; }
        .tracking-btn { background-color: #ff4d4d; }
        .award-btn { background-color: #6a1b9a; }
        .settings-btn { background-color: #1565c0; }
        .partner-btn { background-color: #2e7d32; }
        .releasing-btn { background-color: #ff9800; }

        /* NEW ADMIN BUTTON */
        .admin-btn { background-color: #4a148c; }

        .logout-btn { background-color: #444; }
    </style>
</head>

<body>

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">

    <button class="entry-btn" onclick="goEntry()">Donor Entry</button>
    <button class="tracking-btn" onclick="goTracking()">Tracking</button>
    <button class="award-btn" onclick="goAwardees()">Awardees</button>
    <button class="settings-btn" onclick="goSettings()">Settings</button>
    <button class="partner-btn" onclick="goPartner()">Partner Organization</button>
    <button class="releasing-btn" onclick="goReleasing()">Releasing</button>

    <!-- NEW ADMIN MANAGER BUTTON -->
    <button class="admin-btn" onclick="goAdminManager()">Admin Manager</button>

    <button class="logout-btn" onclick="logout()">Logout</button>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.firebaseio.com",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
        }
    });

    window.goEntry = function() { window.location.href = "donor-entry.html"; };
    window.goTracking = function() { window.location.href = "tracking.html"; };
    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };
    window.goReleasing = function() { window.location.href = "releasing.html"; };

    /* NEW ADMIN MANAGER PAGE */
    window.goAdminManager = function() {
        window.location.href = "admin-manager.html";
    };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>

</body>
</html>
