<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const sections = ["donor-database", "galloner", "releasing", "backup"];
    const frame = document.getElementById("moduleFrame");
    const workspaceTitle = document.getElementById("workspaceTitle");
    const workspaceSubtitle = document.getElementById("workspaceSubtitle");

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
    });

    function clearActiveSubs(){
        document.querySelectorAll(".sub-btn").forEach(btn => btn.classList.remove("active-sub"));
    }

    function clearActiveNavs(){
        document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.remove("active"));
    }

    window.toggleSection = function(name) {
        const clickedNav = document.getElementById("nav-" + name);

        sections.forEach(sectionName => {
            const section = document.getElementById("section-" + sectionName);
            const nav = document.getElementById("nav-" + sectionName);

            if(!section || !nav) return;

            if(sectionName === name){
                const willOpen = !section.classList.contains("open");
                section.classList.toggle("open", willOpen);
                if(willOpen){
                    clearActiveNavs();
                    nav.classList.add("active");
                }
            }else{
                section.classList.remove("open");
                nav.classList.remove("active");
            }
        });

        if(clickedNav && document.getElementById("section-" + name).classList.contains("open")){
            clickedNav.classList.add("active");
        }
    };

    window.openModule = function(url, title, subtitle){
        const freshUrl = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
        frame.src = freshUrl;
        workspaceTitle.textContent = title;
        workspaceSubtitle.textContent = subtitle;
        clearActiveSubs();

        const matchingButton = Array.from(document.querySelectorAll(".sub-btn")).find(btn =>
            btn.getAttribute("onclick") &&
            (
                (url.includes("donor-database-statistics.html") && btn.getAttribute("onclick").includes("donor-database-statistics.html")) ||
                btn.getAttribute("onclick").includes("'" + url + "'")
            )
        );

        if(matchingButton){
            matchingButton.classList.add("active-sub");
        }
    };

    window.openSingleModule = function(navButton, url, title, subtitle){
        clearActiveNavs();
        navButton.classList.add("active");
        clearActiveSubs();
        frame.src = url + (url.includes("?") ? "&" : "?") + "t=" + Date.now();
        workspaceTitle.textContent = title;
        workspaceSubtitle.textContent = subtitle;
    };

    window.reloadFrame = function(){
        const current = frame.src.split("#")[0];
        frame.src = current + (current.includes("?") ? "&" : "?") + "t=" + Date.now();
    };

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};
        snapshot.forEach((doc) => { data[doc.id] = doc.data(); });
        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();
            await set(ref(db, "backups/" + backupKey), backupData);

            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed.");
        }
    };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>
