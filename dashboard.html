<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
            overflow-x: hidden;
        }

        /* ===== LIQUID BLOOD BACKGROUND ===== */
        .bg-liquid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(circle at 18% 18%, rgba(180,0,0,0.05), transparent 18%),
                radial-gradient(circle at 82% 24%, rgba(180,0,0,0.045), transparent 18%),
                radial-gradient(circle at 50% 82%, rgba(180,0,0,0.05), transparent 20%),
                #fff;
        }

        .liquid {
            position: absolute;
            border-radius: 46% 54% 58% 42% / 42% 38% 62% 58%;
            filter: blur(10px);
            opacity: 0.28;
            mix-blend-mode: multiply;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
            will-change: transform, border-radius;
        }

        .liquid::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            background: inherit;
            opacity: 0.85;
            filter: blur(16px);
        }

        .liquid.red1 { background: rgba(155, 0, 0, 0.50); }
        .liquid.red2 { background: rgba(210, 20, 20, 0.42); }
        .liquid.red3 { background: rgba(120, 0, 0, 0.48); }

        .l1  { width: 260px; height: 220px; top: 4%;  left: 2%;  animation: liquid1 16s infinite; }
        .l2  { width: 180px; height: 160px; top: 10%; left: 76%; animation: liquid2 10s infinite; }
        .l3  { width: 300px; height: 250px; top: 28%; left: 8%;  animation: liquid3 18s infinite; }
        .l4  { width: 170px; height: 150px; top: 42%; left: 83%; animation: liquid4 12s infinite; }
        .l5  { width: 240px; height: 210px; top: 66%; left: 4%;  animation: liquid5 20s infinite; }
        .l6  { width: 220px; height: 190px; top: 70%; left: 70%; animation: liquid6 11s infinite; }
        .l7  { width: 130px; height: 120px; top: 16%; left: 45%; animation: liquid7 14s infinite; }
        .l8  { width: 210px; height: 175px; top: 52%; left: 32%; animation: liquid8 15s infinite; }
        .l9  { width: 140px; height: 130px; top: 80%; left: 44%; animation: liquid9 9s infinite; }

        @keyframes liquid1 {
            0%   { transform: translate(0,0) scale(1) rotate(0deg); border-radius: 46% 54% 58% 42% / 42% 38% 62% 58%; }
            25%  { transform: translate(70px,-18px) scale(1.08) rotate(10deg); border-radius: 58% 42% 44% 56% / 40% 58% 42% 60%; }
            50%  { transform: translate(130px,24px) scale(0.94) rotate(-8deg); border-radius: 42% 58% 52% 48% / 60% 38% 62% 40%; }
            75%  { transform: translate(42px,76px) scale(1.04) rotate(7deg); border-radius: 52% 48% 40% 60% / 44% 62% 38% 56%; }
            100% { transform: translate(0,0) scale(1) rotate(0deg); border-radius: 46% 54% 58% 42% / 42% 38% 62% 58%; }
        }

        @keyframes liquid2 {
            0%   { transform: translate(0,0) scale(1); border-radius: 56% 44% 52% 48% / 46% 42% 58% 54%; }
            30%  { transform: translate(-74px,14px) scale(1.06); border-radius: 44% 56% 40% 60% / 58% 36% 64% 42%; }
            55%  { transform: translate(-18px,64px) scale(0.95); border-radius: 62% 38% 58% 42% / 40% 60% 40% 60%; }
            80%  { transform: translate(32px,8px) scale(1.02); border-radius: 48% 52% 62% 38% / 58% 36% 64% 42%; }
            100% { transform: translate(0,0) scale(1); border-radius: 56% 44% 52% 48% / 46% 42% 58% 54%; }
        }

        @keyframes liquid3 {
            0%   { transform: translate(0,0) rotate(0deg); }
            25%  { transform: translate(92px,-28px) rotate(8deg); }
            50%  { transform: translate(155px,28px) rotate(-10deg); }
            75%  { transform: translate(52px,96px) rotate(6deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        @keyframes liquid4 {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(-44px,30px); }
            50%  { transform: translate(-102px,8px); }
            75%  { transform: translate(-34px,-22px); }
            100% { transform: translate(0,0); }
        }

        @keyframes liquid5 {
            0%   { transform: translate(0,0) scale(1); }
            30%  { transform: translate(78px,-16px) scale(1.05); }
            55%  { transform: translate(132px,22px) scale(0.95); }
            80%  { transform: translate(38px,84px) scale(1.03); }
            100% { transform: translate(0,0) scale(1); }
        }

        @keyframes liquid6 {
            0%   { transform: translate(0,0) rotate(0deg); }
            25%  { transform: translate(-66px,-10px) rotate(-8deg); }
            50%  { transform: translate(-122px,26px) rotate(7deg); }
            75%  { transform: translate(-18px,68px) rotate(-4deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        @keyframes liquid7 {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(34px,18px); }
            50%  { transform: translate(66px,-10px); }
            75%  { transform: translate(14px,-34px); }
            100% { transform: translate(0,0); }
        }

        @keyframes liquid8 {
            0%   { transform: translate(0,0) scale(1); }
            35%  { transform: translate(62px,-24px) scale(1.07); }
            65%  { transform: translate(114px,16px) scale(0.96); }
            100% { transform: translate(0,0) scale(1); }
        }

        @keyframes liquid9 {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(34px,-8px); }
            50%  { transform: translate(70px,-44px); }
            75%  { transform: translate(18px,-72px); }
            100% { transform: translate(0,0); }
        }

        .page {
            position: relative;
            z-index: 1;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 1180px;
            margin: 18px auto 26px;
            padding: 0 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .main-card {
            background: rgba(255,255,255,0.82);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            border: 1px solid rgba(235,235,235,0.95);
            overflow: hidden;
        }

        .main-button {
            width: 100%;
            border: none;
            cursor: pointer;
            color: white;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            text-align: left;
            min-height: 92px;
        }

        .main-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-title {
            font-size: 24px;
            line-height: 1.05;
        }

        .main-subtitle {
            font-size: 13px;
            opacity: 0.92;
            margin-top: 4px;
            font-weight: normal;
        }

        .galloner-main { background: linear-gradient(135deg, #b30000, #d32f2f); }
        .partner-main  { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .releasing-main{ background: linear-gradient(135deg, #ff9800, #ef6c00); }
        .backup-main   { background: linear-gradient(135deg, #00897b, #00695c); }
        .admin-main    { background: linear-gradient(135deg, #4a148c, #6a1b9a); }
        .logout-main   { background: linear-gradient(135deg, #444, #222); }

        .icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .chevron {
            font-size: 22px;
            font-weight: bold;
            transition: transform 0.25s ease;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        .expand-shell {
            display: none;
            background: rgba(252,252,252,0.88);
            border-top: 1px solid #efefef;
        }

        .expand-shell.open {
            display: block;
        }

        .expand-content {
            padding: 18px;
            opacity: 0;
            transform: translateY(-5px);
            animation: contentIn 0.22s ease forwards;
        }

        @keyframes contentIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tube-wrap {
            position: relative;
            padding-top: 16px;
        }

        .tube-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 20px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid {
            display: grid;
            gap: 12px;
        }

        .tube-grid.three { grid-template-columns: repeat(3, 1fr); }
        .tube-grid.five { grid-template-columns: repeat(5, 1fr); }
        .tube-grid.three-center { grid-template-columns: repeat(3, 1fr); }

        .tube-item {
            position: relative;
            padding-top: 18px;
        }

        .tube-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 18px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            margin: 0 auto;
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid.three .tube-item:first-child::after,
        .tube-grid.five .tube-item:first-child::after,
        .tube-grid.three-center .tube-item:first-child::after {
            left: 50%;
        }

        .tube-grid.three .tube-item:last-child::after,
        .tube-grid.five .tube-item:last-child::after,
        .tube-grid.three-center .tube-item:last-child::after {
            right: 50%;
        }

        .sub-card {
            width: 100%;
            min-height: 102px;
            border: none;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .sub-card:hover,
        .single-button-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }

        .entry-btn { background: #b30000; }
        .tracking-btn { background: #ff4d4d; }
        .award-btn { background: #6a1b9a; }

        .releasing-btn { background: #ff9800; }
        .releasing-entry-btn { background: #ef6c00; }
        .releasing-track-btn { background: #e65100; }
        .releasing-stats-btn { background: #00897b; }
        .facility-btn { background: #1565c0; }

        .backup-file-btn { background: #00897b; }
        .backup-system-btn { background: #00796b; }
        .backup-viewer-btn { background: #00695c; }

        .lower-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .backup-status {
            margin-top: 4px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
        }

        .backup-warning {
            border: 1px solid #ffe69c;
            color: #664d03;
            background-color: rgba(255,243,205,0.94);
        }

        .backup-ok {
            border: 1px solid #a3cfbb;
            color: #0f5132;
            background-color: rgba(209,231,221,0.94);
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .single-button-card {
            width: 100%;
            min-height: 92px;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            font-size: 21px;
            text-align: center;
        }

        @media (max-width: 1100px) {
            .tube-grid.five {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr 1fr;
            }

            .lower-row {
                grid-template-columns: 1fr;
            }

            .main-title {
                font-size: 22px;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin-top: 14px;
                padding: 0 12px 20px;
            }

            .main-button {
                padding: 16px;
                min-height: 84px;
            }

            .main-title {
                font-size: 20px;
            }

            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr;
            }

            .sub-card {
                min-height: 86px;
                font-size: 14px;
            }

            .single-button-card {
                font-size: 19px;
                min-height: 86px;
            }

            .tube-item::after,
            .tube-line {
                display: none;
            }

            .liquid {
                opacity: 0.20 !important;
                filter: blur(8px);
            }
        }
    </style>
</head>

<body>

<div class="bg-liquid">
    <div class="liquid red1 l1"></div>
    <div class="liquid red2 l2"></div>
    <div class="liquid red1 l3"></div>
    <div class="liquid red3 l4"></div>
    <div class="liquid red2 l5"></div>
    <div class="liquid red1 l6"></div>
    <div class="liquid red3 l7"></div>
    <div class="liquid red2 l8"></div>
    <div class="liquid red1 l9"></div>
</div>

<div class="page">

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">

    <div class="dashboard-grid">

        <div class="main-card">
            <button class="main-button galloner-main" onclick="toggleSection('galloner')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                    <div>
                        <div class="main-title">Galloner</div>
                        <div class="main-subtitle">Donor registry and award monitoring</div>
                    </div>
                </div>
                <div id="chevron-galloner" class="chevron">▼</div>
            </button>

            <div id="section-galloner" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid three">
                            <div class="tube-item"><button class="sub-card entry-btn" onclick="goEntry()">Donor Entry</button></div>
                            <div class="tube-item"><button class="sub-card tracking-btn" onclick="goTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card award-btn" onclick="goAwardees()">Awardees</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="single-button-card partner-main" onclick="goPartner()">
            <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
            Partner Organization
        </button>

        <div class="main-card">
            <button class="main-button releasing-main" onclick="toggleSection('releasing')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                    <div>
                        <div class="main-title">Releasing</div>
                        <div class="main-subtitle">Blood releasing, tracking, statistics, facilities</div>
                    </div>
                </div>
                <div id="chevron-releasing" class="chevron">▼</div>
            </button>

            <div id="section-releasing" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid five">
                            <div class="tube-item"><button class="sub-card releasing-btn" onclick="goReleasing()">Main</button></div>
                            <div class="tube-item"><button class="sub-card releasing-entry-btn" onclick="goReleasingEntry()">Entry</button></div>
                            <div class="tube-item"><button class="sub-card releasing-track-btn" onclick="goReleasingTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card releasing-stats-btn" onclick="goReleasingStats()">Statistics</button></div>
                            <div class="tube-item"><button class="sub-card facility-btn" onclick="goFacilityManager()">Facility Manager</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lower-row">
            <button class="single-button-card admin-main" onclick="goAdminManager()">
                <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                Admin Manager
            </button>

            <div class="main-card">
                <button class="main-button backup-main" onclick="toggleSection('backup')">
                    <div class="main-left">
                        <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path></svg>
                        <div>
                            <div class="main-title">Backup Manager</div>
                            <div class="main-subtitle">Monthly backup, save backup, backup viewer</div>
                        </div>
                    </div>
                    <div id="chevron-backup" class="chevron">▼</div>
                </button>

                <div id="section-backup" class="expand-shell">
                    <div class="expand-content">
                        <div class="tube-wrap">
                            <div class="tube-line"></div>
                            <div class="tube-grid three-center">
                                <div class="tube-item"><button class="sub-card backup-file-btn" onclick="downloadBackupFile()">Monthly Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-system-btn" onclick="saveBackupToSystem()">Save Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-viewer-btn" onclick="goBackupViewer()">Backup Viewer</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="backupStatus" class="backup-status backup-warning">
            <div class="backup-title">Backup Status</div>
            <div>Checking backup status...</div>
        </div>

        <div style="display:flex; justify-content:flex-end;">
            <button class="single-button-card logout-main" onclick="logout()" style="max-width:280px;">
                <svg class="icon" viewBox="0 0 24 24" fill="white"><path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5 5 5zm-6 7h16a2 2 0 002-2V2a2 2 0 00-2-2H4a2 2 0 00-2 2v5h2V2h16v20H4v-5H2v5a2 2 0 002 2z"></path></svg>
                Logout
            </button>
        </div>

    </div>

</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");
    const sections = ["galloner", "releasing", "backup"];

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    window.toggleSection = function(name) {
        sections.forEach(sectionName => {
            const shell = document.getElementById("section-" + sectionName);
            const chevron = document.getElementById("chevron-" + sectionName);
            const shouldOpen = sectionName === name ? !shell.classList.contains("open") : false;

            shell.classList.toggle("open", shouldOpen);
            chevron.classList.toggle("open", shouldOpen);
        });
    };

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed. Check browser console.");
        }
    };
