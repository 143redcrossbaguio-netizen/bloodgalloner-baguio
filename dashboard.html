<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
            overflow-x: hidden;
        }

        /* ===== LIQUID BLOOD BACKGROUND ===== */
        .bg-liquid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(circle at 20% 20%, rgba(180,0,0,0.03), transparent 22%),
                radial-gradient(circle at 80% 25%, rgba(180,0,0,0.025), transparent 20%),
                radial-gradient(circle at 50% 85%, rgba(180,0,0,0.03), transparent 24%),
                #fff;
        }

        .liquid {
            position: absolute;
            border-radius: 48% 52% 57% 43% / 40% 45% 55% 60%;
            filter: blur(18px);
            opacity: 0.16;
            mix-blend-mode: multiply;
            animation-iteration-count: infinite;
            animation-timing-function: ease-in-out;
        }

        .liquid.red1 { background: rgba(179,0,0,0.55); }
        .liquid.red2 { background: rgba(210,30,30,0.42); }
        .liquid.red3 { background: rgba(140,0,0,0.48); }

        .l1  { width: 180px; height: 180px; top: 6%;  left: 5%;  animation: liquid1 18s infinite; }
        .l2  { width: 130px; height: 130px; top: 14%; left: 78%; animation: liquid2 11s infinite; }
        .l3  { width: 220px; height: 220px; top: 32%; left: 10%; animation: liquid3 20s infinite; }
        .l4  { width: 120px; height: 120px; top: 44%; left: 86%; animation: liquid4 13s infinite; }
        .l5  { width: 170px; height: 170px; top: 68%; left: 7%;  animation: liquid5 22s infinite; }
        .l6  { width: 150px; height: 150px; top: 72%; left: 72%; animation: liquid6 12s infinite; }
        .l7  { width: 95px;  height: 95px;  top: 18%; left: 44%; animation: liquid7 15s infinite; }
        .l8  { width: 140px; height: 140px; top: 54%; left: 34%; animation: liquid8 17s infinite; }
        .l9  { width: 110px; height: 110px; top: 82%; left: 46%; animation: liquid9 10s infinite; }
        .l10 { width: 160px; height: 160px; top: 8%;  left: 58%; animation: liquid10 19s infinite; }

        @keyframes liquid1 {
            0%   { transform: translate(0,0) scale(1) rotate(0deg); }
            25%  { transform: translate(60px,-20px) scale(1.08) rotate(18deg); }
            50%  { transform: translate(120px,25px) scale(0.95) rotate(-8deg); }
            75%  { transform: translate(40px,80px) scale(1.04) rotate(10deg); }
            100% { transform: translate(0,0) scale(1) rotate(0deg); }
        }
        @keyframes liquid2 {
            0%   { transform: translate(0,0) scale(1); }
            25%  { transform: translate(-70px,18px) scale(1.06); }
            50%  { transform: translate(-20px,60px) scale(0.94); }
            75%  { transform: translate(35px,10px) scale(1.03); }
            100% { transform: translate(0,0) scale(1); }
        }
        @keyframes liquid3 {
            0%   { transform: translate(0,0) rotate(0deg); }
            30%  { transform: translate(90px,-25px) rotate(14deg); }
            60%  { transform: translate(150px,30px) rotate(-10deg); }
            85%  { transform: translate(40px,95px) rotate(8deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        @keyframes liquid4 {
            0%   { transform: translate(0,0); }
            20%  { transform: translate(-35px,25px); }
            45%  { transform: translate(-95px,10px); }
            70%  { transform: translate(-40px,-20px); }
            100% { transform: translate(0,0); }
        }
        @keyframes liquid5 {
            0%   { transform: translate(0,0) scale(1); }
            25%  { transform: translate(60px,-18px) scale(1.05); }
            50%  { transform: translate(120px,20px) scale(0.93); }
            75%  { transform: translate(45px,70px) scale(1.04); }
            100% { transform: translate(0,0) scale(1); }
        }
        @keyframes liquid6 {
            0%   { transform: translate(0,0) rotate(0deg); }
            30%  { transform: translate(-65px,-14px) rotate(-12deg); }
            55%  { transform: translate(-120px,28px) rotate(8deg); }
            80%  { transform: translate(-25px,68px) rotate(-5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }
        @keyframes liquid7 {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(28px,18px); }
            50%  { transform: translate(58px,-8px); }
            75%  { transform: translate(10px,-35px); }
            100% { transform: translate(0,0); }
        }
        @keyframes liquid8 {
            0%   { transform: translate(0,0) scale(1); }
            35%  { transform: translate(58px,-20px) scale(1.08); }
            60%  { transform: translate(110px,18px) scale(0.96); }
            100% { transform: translate(0,0) scale(1); }
        }
        @keyframes liquid9 {
            0%   { transform: translate(0,0); }
            25%  { transform: translate(36px,-10px); }
            50%  { transform: translate(66px,-42px); }
            75%  { transform: translate(18px,-72px); }
            100% { transform: translate(0,0); }
        }
        @keyframes liquid10 {
            0%   { transform: translate(0,0) rotate(0deg); }
            25%  { transform: translate(40px,14px) rotate(8deg); }
            50%  { transform: translate(95px,-12px) rotate(-10deg); }
            75%  { transform: translate(35px,48px) rotate(6deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        .page {
            position: relative;
            z-index: 1;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 1180px;
            margin: 18px auto 26px;
            padding: 0 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 14px;
        }

        .main-card {
            background: rgba(255,255,255,0.84);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            border: 1px solid rgba(235,235,235,0.95);
            overflow: hidden;
        }

        .main-button {
            width: 100%;
            border: none;
            cursor: pointer;
            color: white;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            text-align: left;
            min-height: 92px;
        }

        .main-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-title {
            font-size: 24px;
            line-height: 1.05;
        }

        .main-subtitle {
            font-size: 13px;
            opacity: 0.92;
            margin-top: 4px;
            font-weight: normal;
        }

        .galloner-main { background: linear-gradient(135deg, #b30000, #d32f2f); }
        .partner-main  { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .releasing-main{ background: linear-gradient(135deg, #ff9800, #ef6c00); }
        .backup-main   { background: linear-gradient(135deg, #00897b, #00695c); }
        .admin-main    { background: linear-gradient(135deg, #4a148c, #6a1b9a); }
        .logout-main   { background: linear-gradient(135deg, #444, #222); }

        .icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .chevron {
            font-size: 22px;
            font-weight: bold;
            transition: transform 0.32s ease;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        /* smoother collapse, width stays fixed */
        .expand-shell {
            overflow: hidden;
            max-height: 0;
            transition: max-height 0.45s ease;
            background: rgba(252,252,252,0.88);
            border-top: 1px solid #efefef;
        }

        .expand-content {
            padding: 18px;
        }

        .tube-wrap {
            position: relative;
            padding-top: 16px;
        }

        .tube-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 20px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid {
            display: grid;
            gap: 12px;
        }

        .tube-grid.three { grid-template-columns: repeat(3, 1fr); }
        .tube-grid.five { grid-template-columns: repeat(5, 1fr); }
        .tube-grid.three-center { grid-template-columns: repeat(3, 1fr); }

        .tube-item {
            position: relative;
            padding-top: 18px;
        }

        .tube-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 18px;
            transform: translateX(-50%);
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            margin: 0 auto;
            background: #d7d7d7;
            border-radius: 999px;
        }

        .tube-grid.three .tube-item:first-child::after,
        .tube-grid.five .tube-item:first-child::after,
        .tube-grid.three-center .tube-item:first-child::after {
            left: 50%;
        }

        .tube-grid.three .tube-item:last-child::after,
        .tube-grid.five .tube-item:last-child::after,
        .tube-grid.three-center .tube-item:last-child::after {
            right: 50%;
        }

        .sub-card {
            width: 100%;
            min-height: 102px;
            border: none;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .sub-card:hover,
        .single-button-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }

        .sub-card .icon {
            width: 24px;
            height: 24px;
        }

        .entry-btn { background: #b30000; }
        .tracking-btn { background: #ff4d4d; }
        .award-btn { background: #6a1b9a; }

        .releasing-btn { background: #ff9800; }
        .releasing-entry-btn { background: #ef6c00; }
        .releasing-track-btn { background: #e65100; }
        .releasing-stats-btn { background: #00897b; }
        .facility-btn { background: #1565c0; }

        .backup-file-btn { background: #00897b; }
        .backup-system-btn { background: #00796b; }
        .backup-viewer-btn { background: #00695c; }

        .lower-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .backup-status {
            margin-top: 4px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
        }

        .backup-warning {
            border: 1px solid #ffe69c;
            color: #664d03;
            background-color: rgba(255,243,205,0.94);
        }

        .backup-ok {
            border: 1px solid #a3cfbb;
            color: #0f5132;
            background-color: rgba(209,231,221,0.94);
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .single-button-card {
            width: 100%;
            min-height: 92px;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            font-size: 21px;
            text-align: center;
        }

        @media (max-width: 1100px) {
            .tube-grid.five {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr 1fr;
            }

            .lower-row {
                grid-template-columns: 1fr;
            }

            .main-title {
                font-size: 22px;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin-top: 14px;
                padding: 0 12px 20px;
            }

            .main-button {
                padding: 16px;
                min-height: 84px;
            }

            .main-title {
                font-size: 20px;
            }

            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr;
            }

            .sub-card {
                min-height: 86px;
                font-size: 14px;
            }

            .single-button-card {
                font-size: 19px;
                min-height: 86px;
            }

            .tube-item::after,
            .tube-line {
                display: none;
            }

            .liquid {
                filter: blur(14px);
                opacity: 0.10 !important;
            }
        }
    </style>
</head>

<body>

<div class="bg-liquid">
    <div class="liquid red1 l1"></div>
    <div class="liquid red2 l2"></div>
    <div class="liquid red1 l3"></div>
    <div class="liquid red3 l4"></div>
    <div class="liquid red2 l5"></div>
    <div class="liquid red1 l6"></div>
    <div class="liquid red3 l7"></div>
    <div class="liquid red2 l8"></div>
    <div class="liquid red1 l9"></div>
    <div class="liquid red3 l10"></div>
</div>

<div class="page">

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">

    <div class="dashboard-grid">

        <div class="main-card">
            <button class="main-button galloner-main" onclick="toggleSection('gallonerContent','gallonerChevron')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                    </svg>
                    <div>
                        <div class="main-title">Galloner</div>
                        <div class="main-subtitle">Donor registry and award monitoring</div>
                    </div>
                </div>
                <div id="gallonerChevron" class="chevron">▼</div>
            </button>

            <div id="gallonerContent" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid three">
                            <div class="tube-item">
                                <button class="sub-card entry-btn" onclick="goEntry()">
                                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                    </svg>
                                    Donor Entry
                                </button>
                            </div>
                            <div class="tube-item">
                                <button class="sub-card tracking-btn" onclick="goTracking()">
                                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                    </svg>
                                    Tracking
                                </button>
                            </div>
                            <div class="tube-item">
                                <button class="sub-card award-btn" onclick="goAwardees()">
                                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                    </svg>
                                    Awardees
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <button class="single-button-card partner-main" onclick="goPartner()">
            <svg class="icon" viewBox="0 0 24 24" fill="white">
                <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
            </svg>
            Partner Organization
        </button>

        <div class="main-card">
            <button class="main-button releasing-main" onclick="toggleSection('releasingContent','releasingChevron')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                    </svg>
                    <div>
                        <div class="main-title">Releasing</div>
                        <div class="main-subtitle">Blood releasing, tracking, statistics, facilities</div>
                    </div>
                </div>
                <div id="releasingChevron" class="chevron">▼</div>
            </button>

            <div id="releasingContent" class="expand-shell">
                <div class="expand-content">
                    <div class="tube-wrap">
                        <div class="tube-line"></div>
                        <div class="tube-grid five">
                            <div class="tube-item"><button class="sub-card releasing-btn" onclick="goReleasing()">Main</button></div>
                            <div class="tube-item"><button class="sub-card releasing-entry-btn" onclick="goReleasingEntry()">Entry</button></div>
                            <div class="tube-item"><button class="sub-card releasing-track-btn" onclick="goReleasingTracking()">Tracking</button></div>
                            <div class="tube-item"><button class="sub-card releasing-stats-btn" onclick="goReleasingStats()">Statistics</button></div>
                            <div class="tube-item"><button class="sub-card facility-btn" onclick="goFacilityManager()">Facility Manager</button></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lower-row">
            <button class="single-button-card admin-main" onclick="goAdminManager()">
                <svg class="icon" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                </svg>
                Admin Manager
            </button>

            <div class="main-card">
                <button class="main-button backup-main" onclick="toggleSection('backupContent','backupChevron')">
                    <div class="main-left">
                        <svg class="icon" viewBox="0 0 24 24" fill="white">
                            <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                        </svg>
                        <div>
                            <div class="main-title">Backup Manager</div>
                            <div class="main-subtitle">Monthly backup, save backup, backup viewer</div>
                        </div>
                    </div>
                    <div id="backupChevron" class="chevron">▼</div>
                </button>

                <div id="backupContent" class="expand-shell">
                    <div class="expand-content">
                        <div class="tube-wrap">
                            <div class="tube-line"></div>
                            <div class="tube-grid three-center">
                                <div class="tube-item"><button class="sub-card backup-file-btn" onclick="downloadBackupFile()">Monthly Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-system-btn" onclick="saveBackupToSystem()">Save Backup</button></div>
                                <div class="tube-item"><button class="sub-card backup-viewer-btn" onclick="goBackupViewer()">Backup Viewer</button></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="backupStatus" class="backup-status backup-warning">
            <div class="backup-title">Backup Status</div>
            <div>Checking backup status...</div>
        </div>

        <div style="display:flex; justify-content:flex-end;">
            <button class="single-button-card logout-main" onclick="logout()" style="max-width:280px;">
                <svg class="icon" viewBox="0 0 24 24" fill="white">
                    <path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5 5 5zm-6 7h16a2 2 0 002-2V2a2 2 0 00-2-2H4a2 2 0 00-2 2v5h2V2h16v20H4v-5H2v5a2 2 0 002 2z"></path>
                </svg>
                Logout
            </button>
        </div>

    </div>

</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    function setOpenState(shell, chevron, open) {
        shell.style.maxHeight = open ? shell.scrollHeight + "px" : "0px";
        chevron.classList.toggle("open", open);
    }

    window.toggleSection = function(contentId, chevronId) {
        const shell = document.getElementById(contentId);
        const chevron = document.getElementById(chevronId);
        const isOpen = shell.style.maxHeight && shell.style.maxHeight !== "0px";
        setOpenState(shell, chevron, !isOpen);
    };

    window.addEventListener("resize", () => {
        [["gallonerContent","gallonerChevron"],["releasingContent","releasingChevron"],["backupContent","backupChevron"]]
            .forEach(([contentId, chevronId]) => {
                const shell = document.getElementById(contentId);
                const chevron = document.getElementById(chevronId);
                if (chevron.classList.contains("open")) {
                    shell.style.maxHeight = shell.scrollHeight + "px";
                }
            });
    });

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed. Check browser console.");
        }
    };

    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };

    window.goReleasingEntry = function() { window.location.href = "releasing-entry.html"; };
    window.goReleasingTracking = function() { window.location.href = "releasing-tracking.html"; };
    window.goReleasingStats = function() { window.location.href = "releasing-statistics.html"; };
    window.goFacilityManager = function() { window.location.href = "facility-manager.html"; };

    window.goAdminManager = function() { window.location.href = "admin-manager.html"; };
    window.goBackupViewer = function() { window.location.href = "backup-viewer.html"; };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
