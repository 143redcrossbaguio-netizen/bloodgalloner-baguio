<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * { box-sizing: border-box; }

        :root{
            --mx: 50%;
            --my: 50%;
            --scrollY: 0px;
            --glass: rgba(255,255,255,0.12);
            --glass-border: rgba(255,255,255,0.16);
            --shadow-deep: 0 18px 42px rgba(0,0,0,0.24);
            --shadow-soft: 0 10px 24px rgba(0,0,0,0.16);
        }

        html, body {
            margin: 0;
            min-height: 100%;
            font-family: Arial, sans-serif;
            background: #120000;
            color: #333;
            overflow-x: hidden;
        }

        body {
            background:
                radial-gradient(circle at 18% 16%, rgba(255,255,255,0.04), transparent 15%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.025), transparent 18%),
                linear-gradient(180deg, #120000 0%, #1b0000 32%, #240000 60%, #110000 100%);
        }

        .bg-liquid {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% -10%, rgba(255,255,255,0.05), transparent 28%),
                linear-gradient(180deg, rgba(0,0,0,0.10), rgba(0,0,0,0.28));
        }

        .parallax-layer {
            position: absolute;
            inset: -8%;
            will-change: transform;
        }

        .bg-core {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 15% 15%, rgba(255,255,255,0.03), transparent 14%),
                radial-gradient(circle at 85% 22%, rgba(255,255,255,0.02), transparent 15%);
            opacity: 0.9;
        }

        .bg-svg {
            position: absolute;
            inset: -10%;
            width: 120%;
            height: 120%;
            opacity: 1;
            filter: blur(0.8px) drop-shadow(0 18px 30px rgba(20,0,0,0.55));
            transform: scale(1.04);
        }

        .bg-svg.back {
            opacity: 0.72;
            filter: blur(8px) drop-shadow(0 20px 36px rgba(30,0,0,0.4));
            transform: scale(1.10);
        }

        .liquid-gloss {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 16%, rgba(255,255,255,0.16), transparent 14%),
                radial-gradient(ellipse at 74% 20%, rgba(255,255,255,0.10), transparent 13%),
                radial-gradient(ellipse at 46% 78%, rgba(255,220,220,0.08), transparent 18%);
            mix-blend-mode: screen;
            opacity: 0.95;
        }

        .shine-sweep {
            position: absolute;
            inset: -10%;
            background:
                linear-gradient(
                    112deg,
                    transparent 0%,
                    transparent 36%,
                    rgba(255,255,255,0.08) 42%,
                    rgba(255,255,255,0.02) 48%,
                    transparent 57%,
                    transparent 100%
                );
            animation: shineSweep 12s ease-in-out infinite;
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        @keyframes shineSweep {
            0%   { transform: translateX(-6%) translateY(0%) rotate(0deg); }
            50%  { transform: translateX(3%) translateY(-1%) rotate(0.5deg); }
            100% { transform: translateX(-6%) translateY(0%) rotate(0deg); }
        }

        .blood-drips {
            position: absolute;
            inset: 0;
            overflow: hidden;
        }

        .drip {
            position: absolute;
            top: -18px;
            width: 42px;
            border-radius: 999px;
            background:
                linear-gradient(180deg,
                    rgba(255,190,190,0.15) 0%,
                    rgba(142,0,0,0.95) 22%,
                    rgba(96,0,0,0.98) 70%,
                    rgba(54,0,0,1) 100%);
            box-shadow:
                inset 0 4px 5px rgba(255,255,255,0.10),
                inset 0 -10px 14px rgba(0,0,0,0.28),
                0 10px 18px rgba(15,0,0,0.35);
            transform-origin: top center;
            opacity: 0.92;
            filter: blur(0.2px);
        }

        .drip::before {
            content: "";
            position: absolute;
            left: 8%;
            right: 8%;
            top: 6%;
            height: 24%;
            border-radius: 999px;
            background: linear-gradient(180deg, rgba(255,255,255,0.12), transparent);
        }

        .drip::after {
            content: "";
            position: absolute;
            left: 50%;
            bottom: -16px;
            width: 28px;
            height: 28px;
            transform: translateX(-50%);
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 30%, rgba(255,255,255,0.18), transparent 35%),
                radial-gradient(circle at 50% 65%, #7d0000 0%, #540000 62%, #300000 100%);
            box-shadow: 0 8px 10px rgba(10,0,0,0.30);
        }

        .drip1 { left: 6%;  height: 140px; animation: dripFlow1 7.8s ease-in-out infinite; }
        .drip2 { left: 18%; height: 96px;  width: 34px; animation: dripFlow2 6.2s ease-in-out infinite; }
        .drip3 { left: 31%; height: 170px; width: 48px; animation: dripFlow3 8.7s ease-in-out infinite; }
        .drip4 { left: 48%; height: 110px; width: 36px; animation: dripFlow2 7.2s ease-in-out infinite 0.8s; }
        .drip5 { left: 64%; height: 155px; width: 46px; animation: dripFlow1 9.1s ease-in-out infinite 0.4s; }
        .drip6 { left: 79%; height: 90px;  width: 32px; animation: dripFlow3 6.9s ease-in-out infinite 1.2s; }
        .drip7 { left: 90%; height: 132px; width: 40px; animation: dripFlow2 8.0s ease-in-out infinite 0.6s; }

        @keyframes dripFlow1 {
            0%, 100% { transform: scaleY(0.94) scaleX(1) translateY(0); }
            18%      { transform: scaleY(1.10) scaleX(0.92) translateY(6px); }
            38%      { transform: scaleY(1.28) scaleX(0.84) translateY(12px); }
            52%      { transform: scaleY(1.38) scaleX(0.80) translateY(18px); }
            67%      { transform: scaleY(1.12) scaleX(0.92) translateY(10px); }
            82%      { transform: scaleY(1.00) scaleX(1.00) translateY(3px); }
        }

        @keyframes dripFlow2 {
            0%, 100% { transform: scaleY(0.96) scaleX(1) translateY(0); }
            16%      { transform: scaleY(1.08) scaleX(0.94) translateY(4px); }
            35%      { transform: scaleY(1.26) scaleX(0.86) translateY(11px); }
            50%      { transform: scaleY(1.34) scaleX(0.82) translateY(16px); }
            72%      { transform: scaleY(1.05) scaleX(0.96) translateY(7px); }
        }

        @keyframes dripFlow3 {
            0%, 100% { transform: scaleY(0.92) scaleX(1.02) translateY(0); }
            22%      { transform: scaleY(1.18) scaleX(0.90) translateY(6px); }
            44%      { transform: scaleY(1.40) scaleX(0.78) translateY(15px); }
            57%      { transform: scaleY(1.46) scaleX(0.76) translateY(18px); }
            75%      { transform: scaleY(1.10) scaleX(0.95) translateY(8px); }
        }

        .floating-drops {
            position: absolute;
            inset: 0;
        }

        .drop {
            position: absolute;
            width: 24px;
            height: 34px;
            opacity: 0.34;
            animation: driftBlood 18s ease-in-out infinite;
            filter: drop-shadow(0 8px 10px rgba(30,0,0,0.45));
        }

        .drop svg {
            width: 100%;
            height: 100%;
            display: block;
            fill: #670000;
        }

        .d1 { top: 12%; left: 8%; animation-duration: 13s; }
        .d2 { top: 18%; left: 84%; animation-duration: 10s; width: 18px; height: 25px; }
        .d3 { top: 44%; left: 14%; animation-duration: 16s; width: 28px; height: 38px; }
        .d4 { top: 62%; left: 88%; animation-duration: 12s; }
        .d5 { top: 79%; left: 9%; animation-duration: 19s; width: 18px; height: 25px; }
        .d6 { top: 84%; left: 70%; animation-duration: 12s; width: 25px; height: 34px; }
        .d7 { top: 15%; left: 49%; animation-duration: 15s; width: 17px; height: 24px; }
        .d8 { top: 63%; left: 37%; animation-duration: 17s; width: 22px; height: 30px; }

        @keyframes driftBlood {
            0%   { transform: translate(0,0) rotate(0deg) scale(1); }
            18%  { transform: translate(12px,-6px) rotate(3deg) scale(1.06); }
            42%  { transform: translate(30px,7px) rotate(-3deg) scale(0.97); }
            70%  { transform: translate(16px,19px) rotate(2deg) scale(1.03); }
            100% { transform: translate(0,0) rotate(0deg) scale(1); }
        }

        .mouse-liquid {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle 240px at var(--mx) var(--my), rgba(255,255,255,0.14), rgba(255,255,255,0.06) 22%, rgba(120,0,0,0.12) 46%, transparent 72%),
                radial-gradient(circle 520px at var(--mx) var(--my), rgba(160,0,0,0.16), transparent 62%);
            mix-blend-mode: screen;
            opacity: 0.9;
            transition: opacity 0.2s ease;
        }

        .mouse-liquid::after {
            content: "";
            position: absolute;
            left: var(--mx);
            top: var(--my);
            width: 260px;
            height: 260px;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 30%, rgba(255,255,255,0.16), transparent 28%),
                radial-gradient(circle at 55% 55%, rgba(120,0,0,0.20), transparent 64%);
            filter: blur(24px);
            opacity: 0.65;
        }

        .page {
            position: relative;
            z-index: 1;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 1180px;
            margin: 20px auto 28px;
            padding: 0 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .main-card {
            background: rgba(255,255,255,0.11);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 26px;
            box-shadow: var(--shadow-deep);
            border: 1px solid rgba(255,255,255,0.14);
            overflow: hidden;
        }

        .main-button {
            width: 100%;
            border: none;
            cursor: pointer;
            color: white;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            text-align: left;
            min-height: 96px;
            position: relative;
            overflow: hidden;
        }

        .main-button::after,
        .single-button-card::after,
        .sub-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.00) 34%, rgba(0,0,0,0.08) 100%);
            pointer-events: none;
        }

        .main-left {
            display: flex;
            align-items: center;
            gap: 14px;
            position: relative;
            z-index: 1;
        }

        .main-title {
            font-size: 24px;
            line-height: 1.05;
            text-shadow: 0 1px 3px rgba(0,0,0,0.20);
        }

        .main-subtitle {
            font-size: 13px;
            opacity: 0.96;
            margin-top: 5px;
            font-weight: normal;
            text-shadow: 0 1px 2px rgba(0,0,0,0.16);
        }

        .galloner-main { background: linear-gradient(135deg, #690000, #a30000 48%, #d12c2c 100%); }
        .partner-main  { background: linear-gradient(135deg, #1f5f25, #2f8d36 52%, #48a451 100%); }
        .releasing-main{ background: linear-gradient(135deg, #8f3d00, #d56a00 55%, #ff9a1f 100%); }
        .backup-main   { background: linear-gradient(135deg, #005f56, #00897b 55%, #0ea99a 100%); }
        .admin-main    { background: linear-gradient(135deg, #3d096f, #65209d 52%, #7f36be 100%); }
        .logout-main   { background: linear-gradient(135deg, #2b2b2b, #3f3f3f 52%, #222 100%); }

        .icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.22));
        }

        .chevron {
            font-size: 22px;
            font-weight: bold;
            transition: transform 0.35s ease;
            position: relative;
            z-index: 1;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        .expand-shell {
            max-height: 0;
            overflow: hidden;
            background: rgba(255,255,255,0.16);
            border-top: 1px solid rgba(255,255,255,0.10);
            transition: max-height 0.42s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .expand-shell.open {
            max-height: 540px;
        }

        .expand-content {
            padding: 18px;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.26s ease, transform 0.26s ease;
        }

        .expand-shell.open .expand-content {
            opacity: 1;
            transform: translateY(0);
            transition-delay: 0.06s;
        }

        .tube-wrap {
            position: relative;
            padding-top: 18px;
        }

        .tube-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 22px;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.46);
            border-radius: 999px;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.10);
        }

        .tube-grid {
            display: grid;
            gap: 14px;
        }

        .tube-grid.three { grid-template-columns: repeat(3, 1fr); }
        .tube-grid.five { grid-template-columns: repeat(5, 1fr); }
        .tube-grid.three-center { grid-template-columns: repeat(3, 1fr); }

        .tube-item {
            position: relative;
            padding-top: 18px;
        }

        .tube-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 18px;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.42);
            border-radius: 999px;
        }

        .tube-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            margin: 0 auto;
            background: rgba(255,255,255,0.42);
            border-radius: 999px;
        }

        .tube-grid.three .tube-item:first-child::after,
        .tube-grid.five .tube-item:first-child::after,
        .tube-grid.three-center .tube-item:first-child::after {
            left: 50%;
        }

        .tube-grid.three .tube-item:last-child::after,
        .tube-grid.five .tube-item:last-child::after,
        .tube-grid.three-center .tube-item:last-child::after {
            right: 50%;
        }

        .sub-card {
            width: 100%;
            min-height: 104px;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-soft);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            position: relative;
            overflow: hidden;
        }

        .sub-card:hover,
        .single-button-card:hover,
        .main-button:hover {
            transform: translateY(-1px);
            filter: brightness(1.03);
        }

        .entry-btn { background: linear-gradient(135deg, #7a0000, #b30000 60%, #d52626 100%); }
        .tracking-btn { background: linear-gradient(135deg, #bf2a2a, #ff4d4d 60%, #ff7676 100%); }
        .award-btn { background: linear-gradient(135deg, #52116f, #6a1b9a 60%, #8a34c0 100%); }

        .releasing-btn { background: linear-gradient(135deg, #b15a00, #ff9800 60%, #ffb84d 100%); }
        .releasing-entry-btn { background: linear-gradient(135deg, #a64b00, #ef6c00 60%, #ff8a2c 100%); }
        .releasing-track-btn { background: linear-gradient(135deg, #8d3000, #e65100 60%, #ff6f1f 100%); }
        .releasing-stats-btn { background: linear-gradient(135deg, #00685f, #00897b 60%, #14a89b 100%); }
        .facility-btn { background: linear-gradient(135deg, #0d4f98, #1565c0 60%, #2e84eb 100%); }

        .backup-file-btn { background: linear-gradient(135deg, #00665d, #00897b 60%, #0ca093 100%); }
        .backup-system-btn { background: linear-gradient(135deg, #00584f, #00796b 60%, #0a8f80 100%); }
        .backup-viewer-btn { background: linear-gradient(135deg, #004e47, #00695c 60%, #087b6d 100%); }

        .lower-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            align-items: start;
        }

        .backup-status {
            margin-top: 2px;
            padding: 16px 18px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            box-shadow: var(--shadow-soft);
            background: rgba(255,255,255,0.14);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
        }

        .backup-warning {
            border-color: rgba(255,214,102,0.38);
            background: rgba(120,84,0,0.24);
            color: #ffeaa6;
        }

        .backup-ok {
            border-color: rgba(116,255,181,0.30);
            background: rgba(0,95,61,0.24);
            color: #cbffe2;
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .single-button-card {
            width: 100%;
            min-height: 96px;
            border: none;
            border-radius: 26px;
            color: white;
            cursor: pointer;
            box-shadow: var(--shadow-deep);
            padding: 20px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            font-size: 21px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        @media (max-width: 1100px) {
            .tube-grid.five {
                grid-template-columns: repeat(3, 1fr);
            }

            .expand-shell.open {
                max-height: 760px;
            }
        }

        @media (max-width: 900px) {
            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr 1fr;
            }

            .lower-row {
                grid-template-columns: 1fr;
            }

            .main-title {
                font-size: 22px;
            }

            .single-button-card {
                font-size: 20px;
            }

            .expand-shell.open {
                max-height: 940px;
            }

            .drip {
                opacity: 0.82;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin-top: 14px;
                padding: 0 12px 22px;
            }

            .dashboard-grid {
                gap: 14px;
            }

            .main-button {
                padding: 16px;
                min-height: 86px;
            }

            .main-title {
                font-size: 20px;
            }

            .main-subtitle {
                font-size: 12px;
            }

            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr;
            }

            .sub-card {
                min-height: 88px;
                font-size: 14px;
            }

            .single-button-card {
                font-size: 18px;
                min-height: 86px;
                padding: 16px;
            }

            .tube-item::after,
            .tube-line {
                display: none;
            }

            .tube-item::before {
                background: rgba(255,255,255,0.30);
            }

            .bg-svg {
                opacity: 0.98;
                transform: scale(1.08);
            }

            .drop {
                opacity: 0.18 !important;
            }

            .mouse-liquid {
                opacity: 0.5;
            }

            .drip1, .drip5 { height: 110px; }
            .drip3 { height: 130px; }
            .drip7 { height: 96px; }

            .expand-shell.open {
                max-height: 1220px;
            }
        }
    </style>
</head>

<body>

<div class="bg-liquid" id="bgLiquid">
    <div class="parallax-layer" id="layerBack">
        <svg class="bg-svg back" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
            <defs>
                <linearGradient id="bloodBack1" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#120000"/>
                    <stop offset="35%" stop-color="#3a0000"/>
                    <stop offset="70%" stop-color="#6f0000"/>
                    <stop offset="100%" stop-color="#190000"/>
                </linearGradient>

                <linearGradient id="bloodBack2" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#180000"/>
                    <stop offset="50%" stop-color="#4e0000"/>
                    <stop offset="100%" stop-color="#110000"/>
                </linearGradient>

                <filter id="blurBack">
                    <feGaussianBlur stdDeviation="10"/>
                </filter>
            </defs>

            <path fill="url(#bloodBack1)" filter="url(#blurBack)" opacity="0.95">
                <animate attributeName="d" dur="18s" repeatCount="indefinite"
                    values="
                    M-120,270 C90,130 315,300 560,240 C795,182 990,126 1235,188 C1435,238 1578,212 1720,148 L1720,-120 L-120,-120 Z;
                    M-120,300 C125,175 340,258 590,232 C825,206 1016,134 1260,198 C1462,250 1592,222 1720,176 L1720,-120 L-120,-120 Z;
                    M-120,246 C94,108 322,325 586,254 C828,192 1024,106 1275,180 C1470,240 1598,210 1720,156 L1720,-120 L-120,-120 Z;
                    M-120,270 C90,130 315,300 560,240 C795,182 990,126 1235,188 C1435,238 1578,212 1720,148 L1720,-120 L-120,-120 Z
                    "/>
            </path>

            <path fill="url(#bloodBack2)" filter="url(#blurBack)" opacity="0.86">
                <animate attributeName="d" dur="20s" repeatCount="indefinite"
                    values="
                    M-120,760 C140,640 340,795 585,730 C840,662 1038,585 1280,660 C1470,720 1602,690 1720,636 L1720,1040 L-120,1040 Z;
                    M-120,708 C118,598 340,740 610,694 C860,648 1056,560 1300,632 C1490,694 1610,662 1720,610 L1720,1040 L-120,1040 Z;
                    M-120,790 C148,688 346,826 606,754 C874,672 1078,610 1305,688 C1498,752 1614,714 1720,652 L1720,1040 L-120,1040 Z;

<script>
    (function () {
        const root = document.documentElement;
        const layerBack = document.getElementById("layerBack");
        const layerFront = document.getElementById("layerFront");
        const layerDrips = document.getElementById("layerDrips");
        const layerDrops = document.getElementById("layerDrops");
        const layerGloss = document.getElementById("layerGloss");
        const layerShine = document.getElementById("layerShine");

        let mouseX = window.innerWidth / 2;
        let mouseY = window.innerHeight / 2;
        let targetX = mouseX;
        let targetY = mouseY;
        let currentX = mouseX;
        let currentY = mouseY;
        let scrollY = window.scrollY || 0;
        let currentScroll = scrollY;

        function setMouseVars(x, y) {
            root.style.setProperty("--mx", x + "px");
            root.style.setProperty("--my", y + "px");
        }

        window.addEventListener("mousemove", (e) => {
            targetX = e.clientX;
            targetY = e.clientY;
        });

        window.addEventListener("touchmove", (e) => {
            if (e.touches && e.touches[0]) {
                targetX = e.touches[0].clientX;
                targetY = e.touches[0].clientY;
            }
        }, { passive: true });

        window.addEventListener("scroll", () => {
            scrollY = window.scrollY || 0;
            root.style.setProperty("--scrollY", scrollY + "px");
        }, { passive: true });

        function animate() {
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;
            currentScroll += (scrollY - currentScroll) * 0.08;

            setMouseVars(currentX, currentY);

            const cx = currentX / window.innerWidth - 0.5;
            const cy = currentY / window.innerHeight - 0.5;

            if (layerBack) {
                layerBack.style.transform =
                    `translate(${cx * -18}px, ${cy * -10 + currentScroll * -0.05}px) scale(1.08)`;
            }

            if (layerFront) {
                layerFront.style.transform =
                    `translate(${cx * -10}px, ${cy * -6 + currentScroll * -0.08}px) scale(1.04)`;
            }

            if (layerDrips) {
                layerDrips.style.transform =
                    `translate(${cx * -6}px, ${currentScroll * -0.12}px)`;
            }

            if (layerDrops) {
                layerDrops.style.transform =
                    `translate(${cx * -14}px, ${cy * -8 + currentScroll * -0.10}px)`;
            }

            if (layerGloss) {
                layerGloss.style.transform =
                    `translate(${cx * -22}px, ${cy * -12 + currentScroll * -0.03}px)`;
            }

            if (layerShine) {
                layerShine.style.transform =
                    `translate(${cx * -28}px, ${cy * -14 + currentScroll * -0.02}px)`;
            }

            requestAnimationFrame(animate);
        }

        setMouseVars(mouseX, mouseY);
        animate();
    })();
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");
    const sections = ["galloner", "releasing", "backup"];

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    window.toggleSection = function(name) {
        sections.forEach(sectionName => {
            const shell = document.getElementById("section-" + sectionName);
            const chevron = document.getElementById("chevron-" + sectionName);
            const shouldOpen = sectionName === name ? !shell.classList.contains("open") : false;

            shell.classList.toggle("open", shouldOpen);
            chevron.classList.toggle("open", shouldOpen);
        });
    };

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed.");
        }
    };

    window.goEntry = function() { window.location.href = "donor-entry.html"; };
    window.goTracking = function() { window.location.href = "tracking.html"; };
    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };

    window.goReleasing = function() { window.location.href = "releasing.html"; };
    window.goReleasingEntry = function() { window.location.href = "releasing-entry.html"; };
    window.goReleasingTracking = function() { window.location.href = "releasing-tracking.html"; };
    window.goReleasingStats = function() { window.location.href = "releasing-statistics.html"; };
    window.goFacilityManager = function() { window.location.href = "facility-manager.html"; };

    window.goAdminManager = function() { window.location.href = "admin-manager.html"; };
    window.goBackupViewer = function() { window.location.href = "backup-viewer.html"; };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>
