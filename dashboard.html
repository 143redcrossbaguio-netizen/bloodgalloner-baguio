<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #ffffff;
            color: #333;
            min-height: 100%;
            overflow-x: hidden;
        }

        /* ANIMATED MINIMAL BLOOD BACKGROUND */
        .bg-animation {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(circle at 20% 20%, rgba(179,0,0,0.04), transparent 20%),
                radial-gradient(circle at 80% 30%, rgba(179,0,0,0.03), transparent 18%),
                radial-gradient(circle at 50% 80%, rgba(179,0,0,0.035), transparent 22%),
                #ffffff;
        }

        .blood-drop {
            position: absolute;
            width: 26px;
            height: 36px;
            opacity: 0.12;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        .blood-drop svg {
            width: 100%;
            height: 100%;
            display: block;
            filter: drop-shadow(0 2px 5px rgba(179,0,0,0.10));
        }

        .drop1 { top: 8%; left: 6%; animation: float1 16s infinite; }
        .drop2 { top: 18%; left: 82%; animation: float2 11s infinite; width: 22px; height: 30px; opacity: 0.10; }
        .drop3 { top: 32%; left: 18%; animation: float3 19s infinite; width: 34px; height: 46px; opacity: 0.09; }
        .drop4 { top: 52%; left: 88%; animation: float4 13s infinite; width: 20px; height: 28px; opacity: 0.14; }
        .drop5 { top: 70%; left: 9%; animation: float5 21s infinite; width: 28px; height: 38px; opacity: 0.10; }
        .drop6 { top: 78%; left: 72%; animation: float6 10s infinite; width: 24px; height: 32px; opacity: 0.13; }
        .drop7 { top: 42%; left: 45%; animation: float7 18s infinite; width: 18px; height: 25px; opacity: 0.08; }
        .drop8 { top: 12%; left: 48%; animation: float8 14s infinite; width: 30px; height: 42px; opacity: 0.09; }
        .drop9 { top: 60%; left: 32%; animation: float9 12s infinite; width: 22px; height: 30px; opacity: 0.11; }
        .drop10 { top: 84%; left: 52%; animation: float10 17s infinite; width: 26px; height: 36px; opacity: 0.08; }

        @keyframes float1 {
            0% { transform: translate(0,0) scale(1) rotate(0deg); }
            25% { transform: translate(40px, -18px) scale(1.05) rotate(6deg); }
            50% { transform: translate(90px, 12px) scale(0.96) rotate(-4deg); }
            75% { transform: translate(32px, 46px) scale(1.03) rotate(5deg); }
            100% { transform: translate(0,0) scale(1) rotate(0deg); }
        }

        @keyframes float2 {
            0% { transform: translate(0,0) rotate(0deg); }
            20% { transform: translate(-50px, 18px) rotate(-8deg); }
            40% { transform: translate(-20px, 58px) rotate(6deg); }
            60% { transform: translate(30px, 22px) rotate(-5deg); }
            80% { transform: translate(16px, -20px) rotate(7deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        @keyframes float3 {
            0% { transform: translate(0,0) scale(1); }
            30% { transform: translate(70px, -25px) scale(1.08); }
            60% { transform: translate(120px, 20px) scale(0.94); }
            80% { transform: translate(48px, 70px) scale(1.02); }
            100% { transform: translate(0,0) scale(1); }
        }

        @keyframes float4 {
            0% { transform: translate(0,0); }
            25% { transform: translate(-35px, 36px); }
            50% { transform: translate(-86px, 5px); }
            75% { transform: translate(-22px, -28px); }
            100% { transform: translate(0,0); }
        }

        @keyframes float5 {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(65px, -14px) rotate(8deg); }
            50% { transform: translate(110px, 25px) rotate(-6deg); }
            75% { transform: translate(30px, 55px) rotate(5deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        @keyframes float6 {
            0% { transform: translate(0,0); }
            15% { transform: translate(-24px, -12px); }
            35% { transform: translate(-70px, 12px); }
            55% { transform: translate(-42px, 52px); }
            75% { transform: translate(6px, 24px); }
            100% { transform: translate(0,0); }
        }

        @keyframes float7 {
            0% { transform: translate(0,0) scale(1); }
            25% { transform: translate(-18px, -30px) scale(1.1); }
            50% { transform: translate(30px, -10px) scale(0.92); }
            75% { transform: translate(16px, 38px) scale(1.02); }
            100% { transform: translate(0,0) scale(1); }
        }

        @keyframes float8 {
            0% { transform: translate(0,0); }
            20% { transform: translate(38px, 16px); }
            40% { transform: translate(82px, -8px); }
            65% { transform: translate(55px, 34px); }
            85% { transform: translate(-6px, 22px); }
            100% { transform: translate(0,0); }
        }

        @keyframes float9 {
            0% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(28px, -22px) rotate(7deg); }
            50% { transform: translate(75px, 10px) rotate(-5deg); }
            75% { transform: translate(24px, 50px) rotate(4deg); }
            100% { transform: translate(0,0) rotate(0deg); }
        }

        @keyframes float10 {
            0% { transform: translate(0,0); }
            30% { transform: translate(-46px, -18px); }
            55% { transform: translate(-15px, -54px); }
            80% { transform: translate(22px, -10px); }
            100% { transform: translate(0,0); }
        }

        .page {
            position: relative;
            z-index: 1;
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto 28px;
            padding: 0 16px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
        }

        .main-card {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(6px);
            border-radius: 24px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            border: 1px solid rgba(232,232,232,0.95);
            overflow: hidden;
        }

        .main-button {
            width: 100%;
            border: none;
            cursor: pointer;
            color: white;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: bold;
            text-align: left;
        }

        .main-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-title {
            font-size: 24px;
            line-height: 1.1;
        }

        .main-subtitle {
            font-size: 13px;
            opacity: 0.92;
            margin-top: 4px;
            font-weight: normal;
        }

        .galloner-main {
            background: linear-gradient(135deg, #b30000, #d32f2f);
        }

        .partner-main {
            background: linear-gradient(135deg, #2e7d32, #43a047);
            min-height: 96px;
        }

        .releasing-main {
            background: linear-gradient(135deg, #ff9800, #ef6c00);
        }

        .backup-main {
            background: linear-gradient(135deg, #00897b, #00695c);
        }

        .admin-main {
            background: linear-gradient(135deg, #4a148c, #6a1b9a);
            min-height: 96px;
        }

        .logout-main {
            background: linear-gradient(135deg, #444, #222);
            min-height: 96px;
        }

        .icon {
            width: 30px;
            height: 30px;
            flex-shrink: 0;
        }

        .chevron {
            font-size: 22px;
            font-weight: bold;
            opacity: 0.95;
            transition: transform 0.25s ease;
        }

        .chevron.open {
            transform: rotate(180deg);
        }

        .expand-shell {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.35s ease;
            background: #fcfcfc;
            border-top: 1px solid #efefef;
        }

        .expand-shell.open {
            grid-template-rows: 1fr;
        }

        .expand-inner {
            overflow: hidden;
        }

        .expand-content {
            padding: 18px 18px 20px;
        }

        .tube-wrap {
            position: relative;
            padding-top: 18px;
        }

        .tube-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 6px;
            height: 22px;
            transform: translateX(-50%);
            background: #d5d5d5;
            border-radius: 999px;
        }

        .tube-grid {
            display: grid;
            gap: 14px;
        }

        .tube-grid.three {
            grid-template-columns: repeat(3, 1fr);
        }

        .tube-grid.five {
            grid-template-columns: repeat(5, 1fr);
        }

        .tube-grid.three-center {
            grid-template-columns: repeat(3, 1fr);
        }

        .tube-item {
            position: relative;
            padding-top: 18px;
        }

        .tube-item::before {
            content: "";
            position: absolute;
            top: 0;
            left: 50%;
            width: 4px;
            height: 18px;
            transform: translateX(-50%);
            background: #d5d5d5;
            border-radius: 999px;
        }

        .tube-item::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            margin: 0 auto;
            background: #d5d5d5;
            border-radius: 999px;
        }

        .tube-grid.three .tube-item:first-child::after,
        .tube-grid.five .tube-item:first-child::after,
        .tube-grid.three-center .tube-item:first-child::after {
            left: 50%;
        }

        .tube-grid.three .tube-item:last-child::after,
        .tube-grid.five .tube-item:last-child::after,
        .tube-grid.three-center .tube-item:last-child::after {
            right: 50%;
        }

        .sub-card {
            width: 100%;
            min-height: 118px;
            border: none;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            padding: 14px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 15px;
            transition: transform 0.18s ease, box-shadow 0.18s ease;
        }

        .sub-card:hover,
        .single-button-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0,0,0,0.10);
        }

        .sub-card .icon {
            width: 24px;
            height: 24px;
        }

        .entry-btn { background: #b30000; }
        .tracking-btn { background: #ff4d4d; }
        .award-btn { background: #6a1b9a; }

        .releasing-btn { background: #ff9800; }
        .releasing-entry-btn { background: #ef6c00; }
        .releasing-track-btn { background: #e65100; }
        .releasing-stats-btn { background: #00897b; }
        .facility-btn { background: #1565c0; }

        .backup-file-btn { background: #00897b; }
        .backup-system-btn { background: #00796b; }
        .backup-viewer-btn { background: #00695c; }

        .lower-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .backup-status {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            text-align: left;
            box-shadow: 0 6px 16px rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(4px);
        }

        .backup-warning {
            border: 1px solid #ffe69c;
            color: #664d03;
            background-color: rgba(255,243,205,0.94);
        }

        .backup-ok {
            border: 1px solid #a3cfbb;
            color: #0f5132;
            background-color: rgba(209,231,221,0.94);
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
        }

        .single-button-card {
            width: 100%;
            min-height: 100%;
            border: none;
            border-radius: 24px;
            color: white;
            cursor: pointer;
            box-shadow: 0 10px 24px rgba(0,0,0,0.08);
            padding: 20px 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            font-size: 22px;
            text-align: center;
        }

        @media (max-width: 1100px) {
            .tube-grid.five {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 900px) {
            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr 1fr;
            }

            .lower-row {
                grid-template-columns: 1fr;
            }

            .main-title {
                font-size: 22px;
            }
        }

        @media (max-width: 640px) {
            .container {
                margin-top: 14px;
                padding: 0 12px 20px;
            }

            .main-button {
                padding: 18px 16px;
            }

            .main-title {
                font-size: 20px;
            }

            .tube-grid.three,
            .tube-grid.five,
            .tube-grid.three-center {
                grid-template-columns: 1fr;
            }

            .sub-card {
                min-height: 90px;
                font-size: 14px;
            }

            .single-button-card {
                font-size: 20px;
                min-height: 90px;
            }

            .tube-item::after,
            .tube-line {
                display: none;
            }

            .blood-drop {
                opacity: 0.08 !important;
            }
        }
    </style>
</head>

<body>

<div class="bg-animation">
    <div class="blood-drop drop1">
        <svg viewBox="0 0 24 24" fill="#b30000"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop2">
        <svg viewBox="0 0 24 24" fill="#c62828"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop3">
        <svg viewBox="0 0 24 24" fill="#d32f2f"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop4">
        <svg viewBox="0 0 24 24" fill="#b71c1c"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop5">
        <svg viewBox="0 0 24 24" fill="#e53935"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop6">
        <svg viewBox="0 0 24 24" fill="#c62828"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop7">
        <svg viewBox="0 0 24 24" fill="#d32f2f"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop8">
        <svg viewBox="0 0 24 24" fill="#b71c1c"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop9">
        <svg viewBox="0 0 24 24" fill="#b30000"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
    <div class="blood-drop drop10">
        <svg viewBox="0 0 24 24" fill="#c62828"><path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/></svg>
    </div>
</div>

<div class="page">

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">

    <div class="dashboard-grid">

        <!-- GALLONER -->
        <div class="main-card">
            <button class="main-button galloner-main" onclick="toggleSection('gallonerContent','gallonerChevron')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                    </svg>
                    <div>
                        <div class="main-title">Galloner</div>
                        <div class="main-subtitle">Donor registry and award monitoring</div>
                    </div>
                </div>
                <div id="gallonerChevron" class="chevron">▼</div>
            </button>

            <div id="gallonerContent" class="expand-shell">
                <div class="expand-inner">
                    <div class="expand-content">
                        <div class="tube-wrap">
                            <div class="tube-line"></div>
                            <div class="tube-grid three">
                                <div class="tube-item">
                                    <button class="sub-card entry-btn" onclick="goEntry()">
                                        <svg class="icon" viewBox="0 0 24 24" fill="white">
                                            <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                        </svg>
                                        Donor Entry
                                    </button>
                                </div>

                                <div class="tube-item">
                                    <button class="sub-card tracking-btn" onclick="goTracking()">
                                        <svg class="icon" viewBox="0 0 24 24" fill="white">
                                            <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                        </svg>
                                        Tracking
                                    </button>
                                </div>

                                <div class="tube-item">
                                    <button class="sub-card award-btn" onclick="goAwardees()">
                                        <svg class="icon" viewBox="0 0 24 24" fill="white">
                                            <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                        </svg>
                                        Awardees
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- PARTNER -->
        <button class="single-button-card partner-main" onclick="goPartner()">
            <svg class="icon" viewBox="0 0 24 24" fill="white">
                <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
            </svg>
            Partner Organization
        </button>

        <!-- RELEASING -->
        <div class="main-card">
            <button class="main-button releasing-main" onclick="toggleSection('releasingContent','releasingChevron')">
                <div class="main-left">
                    <svg class="icon" viewBox="0 0 24 24" fill="white">
                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                    </svg>
                    <div>
                        <div class="main-title">Releasing</div>
                        <div class="main-subtitle">Blood releasing, tracking, statistics, facilities</div>
                    </div>
                </div>
                <div id="releasingChevron" class="chevron">▼</div>
            </button>

            <div id="releasingContent" class="expand-shell">
                <div class="expand-inner">
                    <div class="expand-content">
                        <div class="tube-wrap">
                            <div class="tube-line"></div>
                            <div class="tube-grid five">
                                <div class="tube-item">
                                    <button class="sub-card releasing-btn" onclick="goReleasing()">Main</button>
                                </div>

                                <div class="tube-item">
                                    <button class="sub-card releasing-entry-btn" onclick="goReleasingEntry()">Entry</button>
                                </div>

                                <div class="tube-item">
                                    <button class="sub-card releasing-track-btn" onclick="goReleasingTracking()">Tracking</button>
                                </div>

                                <div class="tube-item">
                                    <button class="sub-card releasing-stats-btn" onclick="goReleasingStats()">Statistics</button>
                                </div>

                                <div class="tube-item">
                                    <button class="sub-card facility-btn" onclick="goFacilityManager()">Facility Manager</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- LOWER ROW -->
        <div class="lower-row">
            <button class="single-button-card admin-main" onclick="goAdminManager()">
                <svg class="icon" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                </svg>
                Admin Manager
            </button>

            <div class="main-card">
                <button class="main-button backup-main" onclick="toggleSection('backupContent','backupChevron')">
                    <div class="main-left">
                        <svg class="icon" viewBox="0 0 24 24" fill="white">
                            <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                        </svg>
                        <div>
                            <div class="main-title">Backup Manager</div>
                            <div class="main-subtitle">Monthly backup, save backup, backup viewer</div>
                        </div>
                    </div>
                    <div id="backupChevron" class="chevron">▼</div>
                </button>

                <div id="backupContent" class="expand-shell">
                    <div class="expand-inner">
                        <div class="expand-content">
                            <div class="tube-wrap">
                                <div class="tube-line"></div>
                                <div class="tube-grid three-center">
                                    <div class="tube-item">
                                        <button class="sub-card backup-file-btn" onclick="downloadBackupFile()">Monthly Backup</button>
                                    </div>

                                    <div class="tube-item">
                                        <button class="sub-card backup-system-btn" onclick="saveBackupToSystem()">Save Backup</button>
                                    </div>

                                    <div class="tube-item">
                                        <button class="sub-card backup-viewer-btn" onclick="goBackupViewer()">Backup Viewer</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="backupStatus" class="backup-status backup-warning">
            <div class="backup-title">Backup Status</div>
            <div>Checking backup status...</div>
        </div>

        <div style="display:flex; justify-content:flex-end;">
            <button class="single-button-card logout-main" onclick="logout()" style="max-width:280px;">
                <svg class="icon" viewBox="0 0 24 24" fill="white">
                    <path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5 5 5zm-6 7h16a2 2 0 002-2V2a2 2 0 00-2-2H4a2 2 0 00-2 2v5h2V2h16v20H4v-5H2v5a2 2 0 002 2z"></path>
                </svg>
                Logout
            </button>
        </div>

    </div>

</div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    window.toggleSection = function(contentId, chevronId) {
        const shell = document.getElementById(contentId);
        const chevron = document.getElementById(chevronId);
        const isOpen = shell.classList.toggle("open");
        chevron.classList.toggle("open", isOpen);
    };

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed. Check browser console.");
        }
    };

    window.goEntry = function() { window.location.href = "donor-entry.html"; };
    window.goTracking = function() { window.location.href = "tracking.html"; };
    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };

    window.goReleasing = function() { window.location.href = "releasing.html"; };
    window.goReleasingEntry = function() { window.location.href = "releasing-entry.html"; };
    window.goReleasingTracking = function() { window.location.href = "releasing-tracking.html"; };
    window.goReleasingStats = function() { window.location.href = "releasing-statistics.html"; };
    window.goFacilityManager = function() { window.location.href = "facility-manager.html"; };

    window.goAdminManager = function() { window.location.href = "admin-manager.html"; };
    window.goBackupViewer = function() { window.location.href = "backup-viewer.html"; };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>

</body>
</html>
