<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Dashboard</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #f4f4f4, #ececec);
        }

        header {
            background-color: #b30000;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .logo {
            width: 100px;
            display: block;
            margin: 10px auto;
        }

        .chapter {
            font-weight: bold;
            margin-top: -5px;
        }

        .container {
            max-width: 980px;
            margin: 25px auto 40px;
            padding: 0 16px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 18px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .flip-card {
            perspective: 1200px;
            min-height: 210px;
        }

        .flip-card.small {
            min-height: 120px;
        }

        .flip-inner {
            position: relative;
            width: 100%;
            height: 100%;
            min-height: inherit;
            transition: transform 0.7s ease;
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-inner {
            transform: rotateY(180deg);
        }

        .flip-face {
            position: absolute;
            width: 100%;
            height: 100%;
            min-height: inherit;
            backface-visibility: hidden;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(0,0,0,0.10);
            border: 1px solid #ececec;
            background: white;
        }

        .flip-front {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flip-back {
            transform: rotateY(180deg);
            padding: 18px;
            box-sizing: border-box;
            background: #fff;
            overflow: auto;
        }

        .section-title-btn {
            width: 100%;
            height: 100%;
            border: none;
            cursor: pointer;
            color: white;
            font-weight: bold;
            background: transparent;
            padding: 0;
        }

        .single-card-btn {
            width: 100%;
            min-height: 120px;
            border: none;
            border-radius: 22px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            box-shadow: 0 10px 24px rgba(0,0,0,0.10);
            border: 1px solid #ececec;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px;
        }

        .partner-btn {
            background: linear-gradient(135deg, #2e7d32, #43a047);
        }

        .admin-btn {
            background: linear-gradient(135deg, #4a148c, #6a1b9a);
        }

        .logout-btn {
            background: linear-gradient(135deg, #444, #222);
        }

        .galloner-front {
            background: linear-gradient(135deg, #b30000, #d32f2f);
            padding: 20px;
            box-sizing: border-box;
        }

        .galloner-shell {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 18px;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .blood-bag {
            width: 170px;
            height: 150px;
            background: rgba(255,255,255,0.16);
            border: 3px solid rgba(255,255,255,0.85);
            border-radius: 18px 18px 24px 24px;
            position: relative;
            box-shadow: inset 0 0 0 2px rgba(255,255,255,0.08);
        }

        .blood-bag::before {
            content: "";
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            width: 46px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.9);
            border-bottom: none;
            border-radius: 12px 12px 0 0;
            background: transparent;
        }

        .blood-bag::after {
            content: "";
            position: absolute;
            bottom: 14px;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 45%;
            background: rgba(255,255,255,0.16);
            border-radius: 12px;
        }

        .bag-label {
            position: absolute;
            top: 22px;
            left: 12px;
            right: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            line-height: 1.2;
        }

        .front-caption {
            width: 100%;
            text-align: center;
            margin-top: 10px;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .releasing-front {
            background: linear-gradient(135deg, #ff9800, #ef6c00);
            padding: 20px;
            box-sizing: border-box;
        }

        .backup-front {
            background: linear-gradient(135deg, #00897b, #00695c);
            padding: 20px;
            box-sizing: border-box;
        }

        .section-main {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            gap: 10px;
            color: white;
            text-align: center;
        }

        .section-main .main-title {
            font-size: 24px;
            font-weight: bold;
        }

        .section-main .main-sub {
            font-size: 13px;
            opacity: 0.9;
        }

        .icon {
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .back-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .back-top h3 {
            margin: 0;
            color: #444;
            font-size: 20px;
        }

        .back-close {
            background: #ddd;
            border: none;
            border-radius: 10px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
        }

        .back-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .back-grid.two {
            grid-template-columns: repeat(2, 1fr);
        }

        .menu-card {
            border: none;
            border-radius: 16px;
            padding: 18px 14px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            min-height: 110px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-align: center;
            font-size: 15px;
        }

        .entry-btn { background: #b30000; }
        .tracking-btn { background: #ff4d4d; }
        .award-btn { background: #6a1b9a; }

        .releasing-main-btn { background: #ff9800; }
        .releasing-entry-btn { background: #ef6c00; }
        .releasing-track-btn { background: #e65100; }
        .releasing-stats-btn { background: #00897b; }
        .facility-btn { background: #1565c0; }

        .backup-file-btn { background: #00897b; }
        .backup-system-btn { background: #00796b; }
        .backup-viewer-btn { background: #00695c; }

        .backup-status {
            margin-top: 22px;
            padding: 16px 18px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            text-align: left;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
        }

        .backup-warning {
            background: #fff3cd;
            border: 1px solid #ffe69c;
            color: #664d03;
        }

        .backup-ok {
            background: #d1e7dd;
            border: 1px solid #a3cfbb;
            color: #0f5132;
        }

        .backup-title {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
        }

        @media (max-width: 850px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .back-grid,
            .back-grid.two {
                grid-template-columns: 1fr;
            }

            .blood-bag {
                width: 100%;
                max-width: 220px;
            }

            .flip-card {
                min-height: 330px;
            }
        }
    </style>
</head>

<body>

<header>
    <img src="images/logo.png" class="logo">
    <div class="chapter">BAGUIO CITY CHAPTER</div>
    <h2>Dashboard</h2>
</header>

<div class="container">

    <div class="grid">

        <!-- GALLONER -->
        <div class="flip-card full-width" id="gallonerCard">
            <div class="flip-inner">
                <div class="flip-face flip-front galloner-front">
                    <button class="section-title-btn" onclick="toggleFlip('gallonerCard')">
                        <div class="galloner-shell">
                            <div class="blood-bag">
                                <div class="bag-label">Donor<br>Entry</div>
                            </div>
                            <div class="blood-bag">
                                <div class="bag-label">Tracking</div>
                            </div>
                            <div class="blood-bag">
                                <div class="bag-label">Awardees</div>
                            </div>
                        </div>
                        <div class="front-caption">Galloner</div>
                    </button>
                </div>

                <div class="flip-face flip-back">
                    <div class="back-top">
                        <h3>Galloner</h3>
                        <button class="back-close" onclick="toggleFlip('gallonerCard')">Close</button>
                    </div>

                    <div class="back-grid">
                        <button class="menu-card entry-btn" onclick="goEntry()">
                            <svg class="icon" viewBox="0 0 24 24" fill="white">
                                <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                            </svg>
                            Donor Entry
                        </button>

                        <button class="menu-card tracking-btn" onclick="goTracking()">
                            <svg class="icon" viewBox="0 0 24 24" fill="white">
                                <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                            </svg>
                            Tracking
                        </button>

                        <button class="menu-card award-btn" onclick="goAwardees()">
                            <svg class="icon" viewBox="0 0 24 24" fill="white">
                                <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                            </svg>
                            Awardees
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PARTNER -->
        <div class="full-width">
            <button class="single-card-btn partner-btn" onclick="goPartner()">
                <svg class="icon" viewBox="0 0 24 24" fill="white">
                    <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                </svg>
                Partner Organization
            </button>
        </div>

        <!-- RELEASING -->
        <div class="flip-card full-width" id="releasingCard">
            <div class="flip-inner">
                <div class="flip-face flip-front releasing-front">
                    <button class="section-title-btn" onclick="toggleFlip('releasingCard')">
                        <div class="section-main">
                            <svg class="icon" viewBox="0 0 24 24" fill="white" style="width:42px;height:42px;">
                                <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                            </svg>
                            <div class="main-title">Releasing</div>
                            <div class="main-sub">Click to open all releasing modules</div>
                        </div>
                    </button>
                </div>

                <div class="flip-face flip-back">
                    <div class="back-top">
                        <h3>Releasing</h3>
                        <button class="back-close" onclick="toggleFlip('releasingCard')">Close</button>
                    </div>

                    <div class="back-grid">
                        <button class="menu-card releasing-main-btn" onclick="goReleasing()">Main</button>
                        <button class="menu-card releasing-entry-btn" onclick="goReleasingEntry()">Entry</button>
                        <button class="menu-card releasing-track-btn" onclick="goReleasingTracking()">Tracking</button>
                        <button class="menu-card releasing-stats-btn" onclick="goReleasingStats()">Statistics</button>
                        <button class="menu-card facility-btn" onclick="goFacilityManager()">Facility Manager</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ADMIN MANAGER LOWER LEFT -->
        <div class="full-width">
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap:18px;">
                <div>
                    <button class="single-card-btn admin-btn" onclick="goAdminManager()">
                        <svg class="icon" viewBox="0 0 24 24" fill="white">
                            <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                        </svg>
                        Admin Manager
                    </button>
                </div>

                <!-- BACKUP MANAGER -->
                <div class="flip-card small" id="backupCard">
                    <div class="flip-inner">
                        <div class="flip-face flip-front backup-front">
                            <button class="section-title-btn" onclick="toggleFlip('backupCard')">
                                <div class="section-main">
                                    <svg class="icon" viewBox="0 0 24 24" fill="white" style="width:34px;height:34px;">
                                        <path d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"></path>
                                    </svg>
                                    <div class="main-title" style="font-size:21px;">Backup Manager</div>
                                </div>
                            </button>
                        </div>

                        <div class="flip-face flip-back">
                            <div class="back-top">
                                <h3>Backup Manager</h3>
                                <button class="back-close" onclick="toggleFlip('backupCard')">Close</button>
                            </div>

                            <div class="back-grid two">
                                <button class="menu-card backup-file-btn" onclick="downloadBackupFile()">Monthly Backup</button>
                                <button class="menu-card backup-system-btn" onclick="saveBackupToSystem()">Save Backup</button>
                                <button class="menu-card backup-viewer-btn" onclick="goBackupViewer()" style="grid-column: 1 / -1;">Backup Viewer</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div id="backupStatus" class="backup-status backup-warning">
        <div class="backup-title">Backup Status</div>
        <div>Checking backup status...</div>
    </div>

    <div style="display:flex; justify-content:flex-end; margin-top:20px;">
        <button class="single-card-btn logout-btn" onclick="logout()" style="max-width:240px; min-height:90px; font-size:18px;">
            <svg class="icon" viewBox="0 0 24 24" fill="white">
                <path d="M10 17l1.41-1.41L8.83 13H20v-2H8.83l2.58-2.59L10 7l-5 5 5 5zm-6 7h16a2 2 0 002-2V2a2 2 0 00-2-2H4a2 2 0 00-2 2v5h2V2h16v20H4v-5H2v5a2 2 0 002 2z"></path>
            </svg>
            Logout
        </button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const firestore = getFirestore(app);

    const backupStatusEl = document.getElementById("backupStatus");

    onAuthStateChanged(auth, (user) => {
        if (!user) {
            window.location.href = "index.html";
            return;
        }
        updateBackupStatus();
    });

    window.toggleFlip = function(cardId) {
        document.getElementById(cardId).classList.toggle("flipped");
    };

    function getCurrentMonthKey() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        return `${now.getFullYear()}-${month}`;
    }

    function formatDateTime(value) {
        if (!value) return "Never";
        const d = new Date(value);
        if (isNaN(d.getTime())) return value;
        return d.toLocaleString();
    }

    function updateBackupStatus() {
        const currentMonth = getCurrentMonthKey();
        const lastBackupMonth = localStorage.getItem("lastBackupMonth");
        const lastBackupTime = localStorage.getItem("lastBackupTime");

        if (lastBackupMonth === currentMonth) {
            backupStatusEl.className = "backup-status backup-ok";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup completed.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        } else {
            backupStatusEl.className = "backup-status backup-warning";
            backupStatusEl.innerHTML = `
                <div class="backup-title">Backup Status</div>
                <div>Monthly backup is due.</div>
                <div>Last backup: ${formatDateTime(lastBackupTime)}</div>
            `;
        }
    }

    async function getRealtimeDatabaseBackup() {
        const paths = ["admins", "facilities", "releasing", "bloodAugmentation"];
        const backup = {};

        for (const path of paths) {
            const snapshot = await get(ref(db, path));
            backup[path] = snapshot.exists() ? snapshot.val() : {};
        }

        return backup;
    }

    async function getFirestoreCollectionBackup(collectionName) {
        const snapshot = await getDocs(collection(firestore, collectionName));
        const data = {};

        snapshot.forEach((doc) => {
            data[doc.id] = doc.data();
        });

        return data;
    }

    async function buildBackupData() {
        const realtimeData = await getRealtimeDatabaseBackup();
        const donorsData = await getFirestoreCollectionBackup("donors");

        return {
            metadata: {
                project: "galloners-club",
                exportedAt: new Date().toISOString(),
                exportedBy: auth.currentUser?.email || "",
                type: "monthly-backup"
            },
            realtimeDatabase: realtimeData,
            firestore: {
                donors: donorsData
            }
        };
    }

    function markBackupDone(dateObj) {
        const month = String(dateObj.getMonth() + 1).padStart(2, "0");
        localStorage.setItem("lastBackupMonth", `${dateObj.getFullYear()}-${month}`);
        localStorage.setItem("lastBackupTime", dateObj.toISOString());
        updateBackupStatus();
    }

    window.downloadBackupFile = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");

            const backupData = await buildBackupData();

            const fileName = `bloodbank-backup-${now.getFullYear()}-${month}-${day}.json`;
            const json = JSON.stringify(backupData, null, 2);
            const blob = new Blob([json], { type: "application/json" });

            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            markBackupDone(now);
            alert("Backup file downloaded successfully.");
        } catch (error) {
            console.error("Download backup error:", error);
            alert("Backup file download failed. Check browser console.");
        }
    };

    window.saveBackupToSystem = async function() {
        try {
            if (!auth.currentUser) {
                alert("You are not logged in.");
                window.location.href = "index.html";
                return;
            }

            const now = new Date();
            const month = String(now.getMonth() + 1).padStart(2, "0");
            const day = String(now.getDate()).padStart(2, "0");
            const backupKey = `${now.getFullYear()}-${month}-${day}`;

            const backupData = await buildBackupData();

            await set(ref(db, "backups/" + backupKey), backupData);

            markBackupDone(now);
            alert("Backup saved to system successfully.");
        } catch (error) {
            console.error("Save system backup error:", error);
            alert("Saving backup to system failed. Check browser console.");
        }
    };

    window.goEntry = function() { window.location.href = "donor-entry.html"; };
    window.goTracking = function() { window.location.href = "tracking.html"; };
    window.goAwardees = function() { window.location.href = "awardees.html"; };
    window.goSettings = function() { window.location.href = "settings.html"; };
    window.goPartner = function() { window.location.href = "partner-organization.html"; };

    window.goReleasing = function() { window.location.href = "releasing.html"; };
    window.goReleasingEntry = function() { window.location.href = "releasing-entry.html"; };
    window.goReleasingTracking = function() { window.location.href = "releasing-tracking.html"; };
    window.goReleasingStats = function() { window.location.href = "releasing-statistics.html"; };
    window.goFacilityManager = function() { window.location.href = "facility-manager.html"; };

    window.goAdminManager = function() { window.location.href = "admin-manager.html"; };
    window.goBackupViewer = function() { window.location.href = "backup-viewer.html"; };

    window.logout = async function() {
        try {
            await signOut(auth);
            alert("Logged out successfully.");
            window.location.href = "index.html";
        } catch (error) {
            console.error("Logout error:", error);
            alert("Logout failed.");
        }
    };
</script>

</body>
</html>
