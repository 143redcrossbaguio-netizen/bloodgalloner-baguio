<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Tracking</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
header { background:#b30000; color:white; padding:15px; text-align:center; }
.logo { width:100px; display:block; margin:10px auto; }
.container { max-width:95%; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
table { width:100%; border-collapse:collapse; }
th, td { padding:8px; border:1px solid #ddd; text-align:center; }
th { background:#b30000; color:white; }
button { padding:5px 8px; margin:2px; border:none; border-radius:4px; cursor:pointer; color:white; }
.edit-btn { background:#1565c0; }
.delete-btn { background:#c62828; }
.view-btn { background:#6a1b9a; }
.notes-btn { background:#2e7d32; }
.top-btn { background:#b30000; }
.galloner-btn { background:#1e88e5; }
.bronze-btn { background:#cd7f32; }
.silver-btn { background:#9e9e9e; }
.gold-btn { background:#d4af37; color:black; }
.filter-btn { background:#222; }

.serial-box {
background:#f9f9f9;
border:1px solid #ccc;
padding:10px;
border-radius:6px;
}

.serial-item {
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.serial-item input {
padding:4px;
margin-right:5px;
}
</style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo">
<h2>Donor Tracking</h2>
</header>

<div class="container">

<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()" style="margin-bottom:10px; padding:5px;">

<button class="top-btn" onclick="exportToCSV()">Export CSV</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>

<br><br>

<select id="bloodFilter" onchange="renderTable()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<br><br>

<button class="galloner-btn" onclick="filterByCategory('galloner')">Galloners</button>
<button class="bronze-btn" onclick="filterByCategory('bronze')">Bronze</button>
<button class="silver-btn" onclick="filterByCategory('silver')">Silver</button>
<button class="gold-btn" onclick="filterByCategory('gold')">Gold</button>
<button class="filter-btn" onclick="renderTable()">Show All</button>

<br><br>

<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Blood Type</th>
<th>Contact</th>
<th>Serial Count</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="donorTable"></tbody>
</table>

</div>

<script>

var firebaseConfig = {
apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain: "galloners-club.firebaseapp.com",
projectId: "galloners-club",
storageBucket: "galloners-club.appspot.com",
messagingSenderId: "213049860421",
appId: "1:213049860421:web:4156aaa52b945f48711e2c",
measurementId: "G-XYXJH9JNXJ"
};

firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

let donorsData = [];
let currentCategory = null;

function goDashboard(){ window.location.href="dashboard.html"; }

function fetchDonors(){
db.collection("donors").get().then(snapshot=>{
donorsData = [];
snapshot.forEach(doc=>{
let data = doc.data();
data.id = doc.id;
donorsData.push(data);
});
renderTable(currentCategory);
});
}

function getCategoryLimits(){
let limits = localStorage.getItem("categorySettings");
if(!limits) return {galloner:8, bronze:28, silver:46, gold:70};
return JSON.parse(limits);
}

function renderTable(category=null){
currentCategory = category;
let table = document.getElementById("donorTable");
let bloodFilter = document.getElementById("bloodFilter").value;
let limits = getCategoryLimits();

table.innerHTML = "";

if(donorsData.length === 0){
table.innerHTML = "<tr><td colspan='6'>No donors found</td></tr>";
return;
}

donorsData.forEach((d,index)=>{

let serialCount = d.serials ? d.serials.length : 0;

if(bloodFilter !== "" && d.bloodType !== bloodFilter) return;

if(category){
if(category==="galloner" && serialCount < limits.galloner) return;
if(category==="bronze" && serialCount < limits.bronze) return;
if(category==="silver" && serialCount < limits.silver) return;
if(category==="gold" && serialCount < limits.gold) return;
}

table.innerHTML += `
<tr>
<td>${index+1}</td>
<td>${d.firstName || ""} ${d.middleName || ""} ${d.surname || ""}</td>
<td>${d.bloodType || ""} ${d.rhFactor || ""}</td>
<td>${d.contact || ""}</td>
<td>${serialCount} <button class="view-btn" onclick="toggleSerial(${index})">View</button></td>
<td>
<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="notes-btn" onclick="toggleNotes(${index})">Notes</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>
</td>
</tr>

<tr id="serialRow${index}" style="display:none;">
<td colspan="6">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>

<tr id="notesRow${index}" style="display:none;">
<td colspan="6">
<div class="serial-box" id="notesList${index}"></div>
<br>
<input id="noteInput${index}" placeholder="Enter note" style="width:70%; padding:5px;">
<button class="notes-btn" onclick="addNote('${d.id}',${index})">Add</button>
</td>
</tr>
`;
});
}

function toggleSerial(index){
let row = document.getElementById("serialRow"+index);
let container = document.getElementById("serialList"+index);

if(row.style.display==="none"){
container.innerHTML="";
let serials = donorsData[index].serials || [];
serials.forEach(s=>{
container.innerHTML += `<div>${s.serial} - ${s.date}</div>`;
});
row.style.display="table-row";
} else {
row.style.display="none";
}
}

/* NOTES VIEW LIKE SERIAL */

function toggleNotes(index){
let row = document.getElementById("notesRow"+index);
let container = document.getElementById("notesList"+index);

if(row.style.display==="none"){

container.innerHTML="";

let notes = donorsData[index].notes || [];

notes.forEach((n,i)=>{

container.innerHTML += `
<div class="serial-item">
<span id="noteText${index}_${i}">${n}</span>
<div>
<button class="edit-btn" onclick="editNote(${index},${i})">Edit</button>
<button class="delete-btn" onclick="deleteNote('${donorsData[index].id}',${index},${i})">Delete</button>
</div>
</div>
`;

});

row.style.display="table-row";

}else{
row.style.display="none";
}
}

function addNote(id,index){

let input = document.getElementById("noteInput"+index);
let text = input.value.trim();
if(!text) return;

let notes = donorsData[index].notes || [];
notes.push(text);

db.collection("donors").doc(id).update({notes:notes}).then(()=>{
donorsData[index].notes = notes;
input.value="";
toggleNotes(index);
toggleNotes(index);
});
}

function editNote(index,i){

let current = donorsData[index].notes[i];
let newText = prompt("Edit note",current);
if(newText===null) return;

donorsData[index].notes[i] = newText;

db.collection("donors").doc(donorsData[index].id).update({
notes: donorsData[index].notes
}).then(()=>{
toggleNotes(index);
toggleNotes(index);
});
}

function deleteNote(id,index,i){

if(!confirm("Delete note?")) return;

donorsData[index].notes.splice(i,1);

db.collection("donors").doc(id).update({
notes: donorsData[index].notes
}).then(()=>{
toggleNotes(index);
toggleNotes(index);
});
}

function editDonor(id){
window.location.href = "donor-entry.html?editId=" + id;
}

function deleteDonor(id){
if(confirm("Delete this donor?")){
db.collection("donors").doc(id).delete().then(()=>{
fetchDonors();
});
}
}

function filterByCategory(cat){ renderTable(cat); }

function searchDonor(){
let input = document.getElementById("searchInput").value.toLowerCase();
let rows = document.querySelectorAll("#donorTable tr");

rows.forEach(row=>{
row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
});
}

function exportToCSV(){
let csv = "Blood Type,Rh Factor,First Name,Middle Name,Surname,Birthday,Contact\n";
donorsData.forEach(d=>{
csv += `${d.bloodType || ""},${d.rhFactor || ""},${d.firstName || ""},${d.middleName || ""},${d.surname || ""},${d.birthday || ""},${d.contact || ""}\n`;
});
let blob = new Blob([csv], { type: "text/csv" });
let url = window.URL.createObjectURL(blob);
let a = document.createElement("a");
a.href = url;
a.download = "donors.csv";
a.click();
window.URL.revokeObjectURL(url);
}

window.onload = fetchDonors;

</script>

</body>
</html>
