<script>

/* BLOOD DROP ICON */

function bloodDrop(color, outline=false){

let stroke = outline ? "#000" : "none";

return `
<svg class="blood-icon" viewBox="0 0 24 24">
<path fill="${color}" stroke="${stroke}" stroke-width="1.5"
d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/>
</svg>
`;

}

/* BLOOD TYPE ICON LOGIC */

function getBloodIcon(type,rh){

if(rh === "-"){
return bloodDrop("#a5d6a7");
}

if(type === "A") return bloodDrop("#1e88e5");
if(type === "B") return bloodDrop("#ffd600");
if(type === "AB") return bloodDrop("#ff80ab");
if(type === "O") return bloodDrop("#ffffff",true);

return bloodDrop("#ccc");

}

/* BADGE */

function getBadge(serial){

if(serial >= categoryLimits.gold)
return `<span class="badge badge-gold">GOLD</span>`;

if(serial >= categoryLimits.silver)
return `<span class="badge badge-silver">SILVER</span>`;

if(serial >= categoryLimits.bronze)
return `<span class="badge badge-bronze">BRONZE</span>`;

if(serial >= categoryLimits.galloner)
return `<span class="badge badge-galloner">GALLONER</span>`;

return "";

}

/* SMART TRACKING HELPERS */

function normalizeText(value){
return String(value || "")
.toUpperCase()
.replace(/[^A-Z0-9]+/g," ")
.trim();
}

function getFirstValue(obj, keys){
for(let i=0;i<keys.length;i++){
let value = obj ? obj[keys[i]] : "";
if(value !== undefined && value !== null && String(value).trim() !== ""){
return value;
}
}
return "";
}

function getMiddleInitial(value){
let cleaned = normalizeText(value);
return cleaned ? cleaned.charAt(0) : "";
}

function buildNameVariants(first,middle,last,full){
let variants = new Set();

function addVariant(value){
let cleaned = normalizeText(value);
if(cleaned) variants.add(cleaned);
}

let f = normalizeText(first);
let m = normalizeText(middle);
let l = normalizeText(last);
let mi = getMiddleInitial(middle);

addVariant(full);

if(f || m || l){
addVariant([f,m,l].filter(Boolean).join(" "));
addVariant([f,l].filter(Boolean).join(" "));
addVariant([l,f,m].filter(Boolean).join(" "));
addVariant([l,f].filter(Boolean).join(" "));
if(mi){
addVariant([f,mi,l].filter(Boolean).join(" "));
addVariant([l,f,mi].filter(Boolean).join(" "));
}
}

return Array.from(variants);
}

function getDonorNameVariants(record){
let first = getFirstValue(record, ["firstName","firstname","first_name","givenName","given_name"]);
let middle = getFirstValue(record, ["middleName","middlename","middle_name","middle","middleInitial","middle_initial"]);
let last = getFirstValue(record, ["surname","lastName","lastname","last_name","familyName","family_name"]);
let full = getFirstValue(record, ["fullName","fullname","full_name","name","donorName","donor_name","completeName","memberName"]);

return buildNameVariants(first,middle,last,full);
}

function getContactDigits(value){
return String(value || "").replace(/\D/g,"");
}

function getRecordBloodType(record){
let raw = String(getFirstValue(record, [
"bloodType","bloodtype","blood_type","abo","group","bloodGroup","blood_group"
]) || "").toUpperCase();

if(raw.includes("AB")) return "AB";
if(raw.includes("A")) return "A";
if(raw.includes("B")) return "B";
if(raw.includes("O")) return "O";
return "";
}

function buildDonationRecordIndex(records){
let index = new Map();

records.forEach(record=>{
let variants = getDonorNameVariants(record);
variants.forEach(key=>{
if(!index.has(key)) index.set(key, []);
index.get(key).push(record);
});
});

return index;
}

function findMatchingDonationRecords(donor, index){
let donorVariants = getDonorNameVariants(donor);
let seen = new Set();
let matches = [];

donorVariants.forEach(key=>{
let arr = index.get(key) || [];
arr.forEach(record=>{
let recordKey = record._recordKey || record.id || JSON.stringify(record);
if(!seen.has(recordKey)){
seen.add(recordKey);
matches.push(record);
}
});
});

if(!matches.length) return [];

let donorBlood = getRecordBloodType(donor);
if(donorBlood){
let exactBloodMatches = matches.filter(record=>{
let blood = getRecordBloodType(record);
return blood && blood === donorBlood;
});
if(exactBloodMatches.length){
matches = exactBloodMatches;
}else{
matches = matches.filter(record=>{
let blood = getRecordBloodType(record);
return !blood || blood === donorBlood;
});
}
}

let donorContact = getContactDigits(getFirstValue(donor, [
"contact","phone","mobile","mobileNumber","contactNumber"
]));

if(donorContact){
let contactMatches = matches.filter(record=>{
let recordContact = getContactDigits(getFirstValue(record, [
"contact","phone","mobile","mobileNumber","contactNumber"
]));
return recordContact && (recordContact === donorContact || recordContact.endsWith(donorContact) || donorContact.endsWith(recordContact));
});
if(contactMatches.length){
matches = contactMatches;
}
}

return matches;
}

function extractPositiveInteger(value){
if(value === undefined || value === null || value === "") return 0;

if(typeof value === "number" && isFinite(value)){
return value > 0 ? Math.floor(value) : 0;
}

let match = String(value).match(/(\d{1,5})/);
if(!match) return 0;

let num = parseInt(match[1],10);
return isFinite(num) && num > 0 ? num : 0;
}

function parseDateValue(raw){
if(!raw) return null;
if(raw instanceof Date) return isNaN(raw.getTime()) ? null : raw;
if(typeof raw?.toDate === "function") return raw.toDate();
if(typeof raw === "object" && raw.seconds) return new Date(raw.seconds * 1000);

if(typeof raw === "string"){
let trimmed = raw.trim();
if(!trimmed) return null;
let parsed = new Date(trimmed);
if(!isNaN(parsed.getTime())) return parsed;
}

if(typeof raw === "number"){
let parsed = new Date(raw);
if(!isNaN(parsed.getTime())) return parsed;
}

return null;
}

function formatDateValue(raw){
let parsed = parseDateValue(raw);
if(parsed){
let mm = String(parsed.getMonth()+1).padStart(2,"0");
let dd = String(parsed.getDate()).padStart(2,"0");
let yyyy = parsed.getFullYear();
return `${mm}/${dd}/${yyyy}`;
}
return String(raw || "");
}

function getDateSortValue(raw){
let parsed = parseDateValue(raw);
return parsed ? parsed.getTime() : 0;
}

function getDonationNumberFromObject(obj){
return extractPositiveInteger(getFirstValue(obj, [
"serial",
"serialNo",
"serialNumber",
"serial_number",
"donationNo",
"donationNumber",
"donation_number",
"donationCount",
"donation_count",
"totalDonations",
"numberOfDonations",
"noOfDonations",
"timesDonated",
"bleedingNo",
"bleedNo",
"count",
"serialCount"
]));
}

function buildTrackingItemFromDatabaseRecord(record){
let serialValue = getFirstValue(record, [
"serial",
"serialNo",
"serialNumber",
"serial_number",
"donationNo",
"donationNumber",
"donation_number",
"donationCount",
"donation_count",
"totalDonations",
"numberOfDonations",
"noOfDonations",
"timesDonated",
"bleedingNo",
"bleedNo",
"count",
"serialCount"
]);

let rawDate = getFirstValue(record, [
"donationDate",
"donation_date",
"entryDate",
"date",
"bleedingDate",
"collectionDate",
"dateOfDonation",
"bleedDate",
"createdAt"
]);

let sequenceNumber = getDonationNumberFromObject(record);
let serialDisplay = serialValue !== "" ? String(serialValue) : (sequenceNumber ? String(sequenceNumber) : "");
let dateDisplay = formatDateValue(rawDate);

if(!serialDisplay && !dateDisplay && !sequenceNumber) return null;

return {
key: "db-" + (record._recordKey || record.id || Math.random().toString(36).slice(2)),
sequenceNumber: sequenceNumber,
serialDisplay: serialDisplay || "-",
dateDisplay: dateDisplay || "-",
dateSort: getDateSortValue(rawDate),
source: "database"
};
}

function buildTrackingFromProfile(donor){
let serials = Array.isArray(donor.serials) ? donor.serials : [];
let items = [];

serials.forEach((entry, idx)=>{
let serialValue = typeof entry === "object"
? getFirstValue(entry, ["serial","serialNo","serialNumber","count","donationNo","donationNumber"])
: entry;

let rawDate = typeof entry === "object"
? getFirstValue(entry, ["date","donationDate","entryDate","createdAt"])
: "";

let sequenceNumber = extractPositiveInteger(serialValue);
let serialDisplay = serialValue !== undefined && serialValue !== null && String(serialValue).trim() !== ""
? String(serialValue)
: (sequenceNumber ? String(sequenceNumber) : "");

let dateDisplay = formatDateValue(rawDate);

if(serialDisplay || dateDisplay || sequenceNumber){
items.push({
key: "profile-" + idx,
sequenceNumber: sequenceNumber,
serialDisplay: serialDisplay || "-",
dateDisplay: dateDisplay || "-",
dateSort: getDateSortValue(rawDate),
source: "profile"
});
}
});

let directCount = getDonationNumberFromObject(donor);

return {items, directCount};
}

function chooseBetterTrackingItem(a,b){
let scoreA = 0;
let scoreB = 0;

if(a.sequenceNumber) scoreA += 3;
if(a.serialDisplay && a.serialDisplay !== "-") scoreA += 2;
if(a.dateDisplay && a.dateDisplay !== "-") scoreA += 1;

if(b.sequenceNumber) scoreB += 3;
if(b.serialDisplay && b.serialDisplay !== "-") scoreB += 2;
if(b.dateDisplay && b.dateDisplay !== "-") scoreB += 1;

return scoreB > scoreA ? b : a;
}

function dedupeTrackingItems(items){
let map = new Map();

items.forEach((item, index)=>{
let key = "";

if(item.sequenceNumber > 0){
key = "SEQ:" + item.sequenceNumber;
}else if(item.serialDisplay && item.serialDisplay !== "-" && item.dateDisplay && item.dateDisplay !== "-"){
key = "SERIALDATE:" + item.serialDisplay + "|" + item.dateDisplay;
}else if(item.serialDisplay && item.serialDisplay !== "-"){
key = "SERIAL:" + item.serialDisplay;
}else{
key = item.key || ("ROW:" + index);
}

if(!map.has(key)){
map.set(key, item);
}else{
map.set(key, chooseBetterTrackingItem(map.get(key), item));
}
});

return Array.from(map.values());
}

function compareTrackingItems(a,b){
if((a.sequenceNumber || 0) !== (b.sequenceNumber || 0)){
if(a.sequenceNumber && b.sequenceNumber) return a.sequenceNumber - b.sequenceNumber;
if(a.sequenceNumber) return -1;
if(b.sequenceNumber) return 1;
}

if((a.dateSort || 0) !== (b.dateSort || 0)){
if(a.dateSort && b.dateSort) return a.dateSort - b.dateSort;
if(a.dateSort) return -1;
if(b.dateSort) return 1;
}

return String(a.serialDisplay || "").localeCompare(String(b.serialDisplay || ""), undefined, {numeric:true});
}

function computeTrackingStats(items, directCount){
let deduped = dedupeTrackingItems(items);
deduped.sort(compareTrackingItems);

let highestSequence = directCount || 0;
deduped.forEach(item=>{
if((item.sequenceNumber || 0) > highestSequence){
highestSequence = item.sequenceNumber;
}
});

let count = highestSequence > 0 ? highestSequence : deduped.length;

return {
count: count,
items: deduped
};
}

function buildSmartTrackingForDonor(donor, matchedRecords){
let databaseItems = matchedRecords.map(buildTrackingItemFromDatabaseRecord).filter(Boolean);
let profileTracking = buildTrackingFromProfile(donor);

let databaseStats = computeTrackingStats(databaseItems, 0);
let profileStats = computeTrackingStats(profileTracking.items, profileTracking.directCount);

if(databaseStats.count > 0){
return {
count: databaseStats.count,
items: databaseStats.items,
source: "donorDatabase"
};
}

return {
count: profileStats.count,
items: profileStats.items,
source: "profile"
};
}

function buildAllDonorTracking(){
let donationIndex = buildDonationRecordIndex(donorDatabaseRecords);
donorTrackingMap = {};

donorsData.forEach(donor=>{
let matchedRecords = findMatchingDonationRecords(donor, donationIndex);
donorTrackingMap[donor.id] = buildSmartTrackingForDonor(donor, matchedRecords);
});
}

function getTrackingForDonor(donor){
return donorTrackingMap[donor.id] || {count:0, items:[], source:"none"};
}

/* FETCH DONORS + DONOR DATABASE */

async function fetchDonors(){

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

try{

let results = await Promise.allSettled([
db.collection("donors").get(),
db.collection("donorDatabase").get()
]);

let donorsResult = results[0];
let donorDatabaseResult = results[1];

if(donorsResult.status !== "fulfilled"){
throw donorsResult.reason;
}

donorsData = [];
donorsResult.value.forEach(doc=>{
let data = doc.data() || {};
data.id = doc.id;
donorsData.push(data);
});

donorDatabaseRecords = [];
if(donorDatabaseResult.status === "fulfilled"){
donorDatabaseResult.value.forEach(doc=>{
let data = doc.data() || {};
data.id = doc.id;
data._recordKey = doc.id;
donorDatabaseRecords.push(data);
});
}else{
console.error("Donor database fetch error:", donorDatabaseResult.reason);
}

buildAllDonorTracking();
renderTable();

}catch(error){
console.error("Fetch donors error:", error);
alert("Error loading donor records.");
}

}

/* RENDER TABLE */

function renderTable(){

let table=document.getElementById("donorTable");
let bloodFilter=document.getElementById("bloodFilter").value;

table.innerHTML="";

donorsData.forEach((d,index)=>{

let tracking = getTrackingForDonor(d);
let serialCount = tracking.count || 0;

if(bloodFilter && d.bloodType !== bloodFilter) return;

let badge=getBadge(serialCount);
let bloodIcon=getBloodIcon(d.bloodType,d.rhFactor);
let hasRemarks = (d.remarks || "").trim() !== "";

table.innerHTML+=`

<tr>

<td>${index+1}</td>

<td class="name-cell">
${d.firstName||""} ${d.middleName||""} ${d.surname||""}
${hasRemarks ? `<span class="remark-indicator">REMARK</span>` : ``}
</td>

<td>${badge}</td>

<td>
${bloodIcon} ${d.bloodType||""}${d.rhFactor||""}
</td>

<td>${d.contact||""}</td>

<td>
${serialCount}
<button class="view-btn" onclick="toggleSerial(${index})">View</button>
</td>

<td>

<button class="remarks-btn" onclick="openRemarksOnly(${index})">Remarks</button>
<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>

</td>

</tr>

<tr id="serialRow${index}" style="display:none;">
<td colspan="7">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>

`;

});

}

/* SERIAL VIEW WITH REMARKS PANEL */

function toggleSerial(index){

let row=document.getElementById("serialRow"+index);
let container=document.getElementById("serialList"+index);

if(row.style.display==="none"){

renderSerialAndRemarks(index);
row.style.display="table-row";

}else{

row.style.display="none";

}

}

function openRemarksOnly(index){

let row=document.getElementById("serialRow"+index);

if(row.style.display==="none"){
row.style.display="table-row";
}

renderSerialAndRemarks(index);

let remarksBox=document.getElementById("remarksText"+index);
if(remarksBox){
remarksBox.focus();
}
}

function renderSerialAndRemarks(index){

let container=document.getElementById("serialList"+index);
let donor = donorsData[index];
let tracking = getTrackingForDonor(donor);
let serials = tracking.items || [];
let remarks = donor.remarks || "";

let serialRows = "";

if(serials.length){
serials.forEach((s,i)=>{
serialRows += `
<tr>
<td style="text-align:center;">${i+1}</td>
<td>${s.serialDisplay||"-"}</td>
<td>${s.dateDisplay||"-"}</td>
</tr>
`;
});
}else{
serialRows = `
<tr>
<td colspan="3" style="text-align:center;">No serial records found.</td>
</tr>
`;
}

container.innerHTML = `
<div class="serial-detail-layout">

<div>
<div class="serial-count-box">Detected Donation Count: ${tracking.count || 0}</div>

<table class="serial-table">
<thead>
<tr>
<th style="width:70px;">#</th>
<th>Serial Number</th>
<th style="width:180px;">Date</th>
</tr>
</thead>
<tbody>
${serialRows}
</tbody>
</table>
</div>

<div class="remarks-panel">
<h4>Remarks</h4>
<textarea id="remarksText${index}" class="remarks-textarea" placeholder="Enter remarks here...">${escapeHtmlToTextarea(remarks)}</textarea>
<button class="save-remarks-btn" onclick="saveRemarks(${index})">Save Remarks</button>
${remarks.trim() === "" ? `<span class="no-remarks-label">No remarks saved.</span>` : ``}
</div>

</div>
`;

}

/* SAVE REMARKS */

function saveRemarks(index){

let donor = donorsData[index];
let remarksValue = document.getElementById("remarksText"+index).value.trim();

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

db.collection("donors").doc(donor.id).update({
remarks: remarksValue
}).then(()=>{
donorsData[index].remarks = remarksValue;
renderTable();

let reopenedRow = document.getElementById("serialRow"+index);
if(reopenedRow){
reopenedRow.style.display="table-row";
renderSerialAndRemarks(index);
}

alert("Remarks saved successfully.");
}).catch(error=>{
console.error("Remarks save error:", error);
alert("Error saving remarks.");
});

}

/* SEARCH */

function searchDonor(){

let input=document.getElementById("searchInput").value.toLowerCase();

document.querySelectorAll("#donorTable tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";
});

}

/* DELETE */

function deleteDonor(id){

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

if(confirm("Delete donor?")){

db.collection("donors").doc(id).delete().then(()=>{
fetchDonors();
}).catch(error => {
console.error("Delete error:", error);
alert("Error deleting donor.");
});

}

}

/* EDIT */

function editDonor(id){
window.location.href="donor-entry.html?editId="+id;
}

/* CSV */

function exportToCSV(){

let csv="Blood Type,Rh Factor,First Name,Middle Name,Surname,Contact,Remarks\n";

donorsData.forEach(d=>{
csv+=`${d.bloodType||""},${d.rhFactor||""},${d.firstName||""},${d.middleName||""},${d.surname||""},${d.contact||""},"${(d.remarks||"").replace(/"/g,'""')}"\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="donors.csv";
