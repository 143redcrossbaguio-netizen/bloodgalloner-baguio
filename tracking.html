<div class="container">

<div class="summary-bar">
<div class="summary-box" id="totalDonorsBox">Total Donors: 0</div>

<script>

var firebaseConfig={
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
projectId:"galloners-club"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();

let donorsData = [];
let filteredDonorsData = [];
let categoryLimits = {galloner:8, bronze:28, silver:46, gold:70};
let authReady = false;

function goDashboard(){
window.location.href="dashboard.html";
}

/* BLOOD DROP ICON */

function bloodDrop(color, outline=false){
let stroke = outline ? "#000" : "none";
return `
<svg class="blood-icon" viewBox="0 0 24 24">
<path fill="${color}" stroke="${stroke}" stroke-width="1.5"
d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/>
</svg>
`;
}

/* BLOOD TYPE ICON LOGIC */

function getBloodIcon(type,rh){
if(rh === "-"){
return bloodDrop("#a5d6a7");
}
if(type === "A") return bloodDrop("#1e88e5");
if(type === "B") return bloodDrop("#ffd600");
if(type === "AB") return bloodDrop("#ff80ab");
if(type === "O") return bloodDrop("#ffffff",true);
return bloodDrop("#ccc");
}

/* BADGE */

function getBadgeLevel(donationCount){
if(donationCount >= categoryLimits.gold) return "gold";
if(donationCount >= categoryLimits.silver) return "silver";
if(donationCount >= categoryLimits.bronze) return "bronze";
if(donationCount >= categoryLimits.galloner) return "galloner";
return "none";
}

function getBadge(donationCount){
if(donationCount >= categoryLimits.gold)
return `<span class="badge badge-gold">GOLD</span>`;

if(donationCount >= categoryLimits.silver)
return `<span class="badge badge-silver">SILVER</span>`;

if(donationCount >= categoryLimits.bronze)
return `<span class="badge badge-bronze">BRONZE</span>`;

if(donationCount >= categoryLimits.galloner)
return `<span class="badge badge-galloner">GALLONER</span>`;

return "";
}

/* NORMALIZE / SMART COUNT HELPERS */

function normalizeText(value){
return String(value || "")
.toLowerCase()
.trim()
.replace(/\s+/g," ")
.replace(/[^a-z0-9 ]/g,"");
}

function normalizeBirthday(value){
if(!value) return "";

if(typeof value === "object" && value.seconds){
let date = new Date(value.seconds * 1000);
return formatDateToYMD(date);
}

let text = String(value).trim();
if(!text) return "";

let parsed = new Date(text);
if(!isNaN(parsed.getTime())){
return formatDateToYMD(parsed);
}

return text.replace(/\//g,"-").replace(/\./g,"-").trim().toLowerCase();
}

function formatDateToYMD(date){
let y = date.getFullYear();
let m = String(date.getMonth() + 1).padStart(2,"0");
let d = String(date.getDate()).padStart(2,"0");
return `${y}-${m}-${d}`;
}

function buildDonorKey(firstName,surname,birthday,middleName=""){
return [
normalizeText(firstName),
normalizeText(surname),
normalizeBirthday(birthday),
normalizeText(middleName)
].join("|");
}

function buildDonorKeyNoMiddle(firstName,surname,birthday){
return [
normalizeText(firstName),
normalizeText(surname),
normalizeBirthday(birthday)
].join("|");
}

function buildDonorKeyNameOnly(firstName,surname){
return [
normalizeText(firstName),
normalizeText(surname)
].join("|");
}

function getPossibleBirthday(data){
return data.birthday || data.birthDate || data.dateOfBirth || data.dob || "";
}

function getPossibleFirstName(data){
return data.firstName || data.firstname || data.givenName || "";
}

function getPossibleMiddleName(data){
return data.middleName || data.middlename || data.middle || "";
}

function getPossibleSurname(data){
return data.surname || data.lastName || data.lastname || data.familyName || "";
}

function getPossibleDonationDate(data){
return data.date || data.donationDate || data.collectionDate || data.dateDonated || data.entryDate || "";
}

function getPossibleSerialNumber(data){
return data.serialNumber || data.serial || data.bagSerial || data.bloodBagSerial || "";
}

function parseDonationNumber(value){
if(value === null || value === undefined || value === "") return 0;
let cleaned = String(value).replace(/[^0-9]/g,"");
let num = parseInt(cleaned,10);
return isNaN(num) ? 0 : num;
}

function getRecordDonationCount(record){
let possibleFields = [
record.numberOfDonations,
record.donationCount,
record.noOfDonations,
record.no_of_donations,
record.donationNo,
record.donationNumber,
record.totalDonations,
record.timesDonated,
record.donations,
record.donation_count,
record.count
];

for(let i=0;i<possibleFields.length;i++){
let num = parseDonationNumber(possibleFields[i]);
if(num > 0) return num;
}

return 0;
}

function buildUniqueDonationFingerprint(record){
let donationNo = getRecordDonationCount(record);
let serial = normalizeText(getPossibleSerialNumber(record));
let date = normalizeBirthday(getPossibleDonationDate(record));
let firstName = normalizeText(getPossibleFirstName(record));
let surname = normalizeText(getPossibleSurname(record));
let birthday = normalizeBirthday(getPossibleBirthday(record));

return [
firstName,
surname,
birthday,
date,
serial,
donationNo
].join("|");
}

function aggregateSmartDonationCounts(records){
let exactMap = {};
let noMiddleMap = {};
let nameOnlyMap = {};

records.forEach(record=>{
let firstName = getPossibleFirstName(record);
let middleName = getPossibleMiddleName(record);
let surname = getPossibleSurname(record);
let birthday = getPossibleBirthday(record);

if(!normalizeText(firstName) || !normalizeText(surname)) return;

let exactKey = buildDonorKey(firstName,surname,birthday,middleName);
let noMiddleKey = buildDonorKeyNoMiddle(firstName,surname,birthday);
let nameOnlyKey = buildDonorKeyNameOnly(firstName,surname);

if(!exactMap[exactKey]){
exactMap[exactKey] = { maxCount:0, fingerprints:new Set(), rawRows:0 };
}
if(!noMiddleMap[noMiddleKey]){
noMiddleMap[noMiddleKey] = { maxCount:0, fingerprints:new Set(), rawRows:0 };
}
if(!nameOnlyMap[nameOnlyKey]){
nameOnlyMap[nameOnlyKey] = { maxCount:0, fingerprints:new Set(), rawRows:0 };
}

let explicitCount = getRecordDonationCount(record);
let fingerprint = buildUniqueDonationFingerprint(record);

exactMap[exactKey].rawRows += 1;
noMiddleMap[noMiddleKey].rawRows += 1;
nameOnlyMap[nameOnlyKey].rawRows += 1;

exactMap[exactKey].fingerprints.add(fingerprint);
noMiddleMap[noMiddleKey].fingerprints.add(fingerprint);
nameOnlyMap[nameOnlyKey].fingerprints.add(fingerprint);

if(explicitCount > exactMap[exactKey].maxCount){
exactMap[exactKey].maxCount = explicitCount;
}
if(explicitCount > noMiddleMap[noMiddleKey].maxCount){
noMiddleMap[noMiddleKey].maxCount = explicitCount;
}
if(explicitCount > nameOnlyMap[nameOnlyKey].maxCount){
nameOnlyMap[nameOnlyKey].maxCount = explicitCount;
}
});

return { exactMap, noMiddleMap, nameOnlyMap };
}

function computeSmartResult(bucket, sourceLabel){
if(!bucket){
return { count:0, source:"No Match", matchedRows:0 };
}

let dedupedRows = bucket.fingerprints ? bucket.fingerprints.size : 0;
let highestExplicitCount = Number(bucket.maxCount || 0);
let finalCount = highestExplicitCount > 0 ? highestExplicitCount : dedupedRows;

return {
count: finalCount,
source: sourceLabel,
matchedRows: dedupedRows
};
}

function getSmartDonationCountForDonor(donor, smartMaps){
let firstName = getPossibleFirstName(donor);
let middleName = getPossibleMiddleName(donor);
let surname = getPossibleSurname(donor);
let birthday = getPossibleBirthday(donor);

let exactKey = buildDonorKey(firstName,surname,birthday,middleName);
let noMiddleKey = buildDonorKeyNoMiddle(firstName,surname,birthday);
let nameOnlyKey = buildDonorKeyNameOnly(firstName,surname);

let exactBucket = smartMaps.exactMap[exactKey];
let noMiddleBucket = smartMaps.noMiddleMap[noMiddleKey];
let nameOnlyBucket = smartMaps.nameOnlyMap[nameOnlyKey];

let exactResult = computeSmartResult(exactBucket,"Exact Match");
let noMiddleResult = computeSmartResult(noMiddleBucket,"No Middle Name Match");
let nameOnlyResult = computeSmartResult(nameOnlyBucket,"Name Only Match");

if(exactResult.count > 0){
return exactResult;
}
if(noMiddleResult.count > 0){
return noMiddleResult;
}
if(nameOnlyResult.count > 0){
return nameOnlyResult;
}

return { count:0, source:"No Match", matchedRows:0 };
}

/* FETCH DONORS + SMART DONATION COUNT FROM donorDatabase */

function fetchDonors(){

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

Promise.all([
db.collection("donors").get(),
db.collection("donorDatabase").get()
]).then(([donorsSnapshot, donorDatabaseSnapshot])=>{

donorsData=[];

let donorDatabaseRecords = [];
donorDatabaseSnapshot.forEach(doc=>{
let data = doc.data() || {};
data.id = doc.id;
donorDatabaseRecords.push(data);
});

let smartMaps = aggregateSmartDonationCounts(donorDatabaseRecords);

donorsSnapshot.forEach(doc=>{
let data = doc.data() || {};
data.id = doc.id;

let smartResult = getSmartDonationCountForDonor(data, smartMaps);
data.smartDonationCount = smartResult.count;
data.smartMatchSource = smartResult.source;
data.smartMatchedRows = smartResult.matchedRows;
data.badgeLevel = getBadgeLevel(data.smartDonationCount);

donorsData.push(data);
});

applyFiltersAndRender();

}).catch(error => {
console.error("Fetch donors error:", error);
alert("Error loading donor records.");
});

}

/* FILTER / SORT / SUMMARY */

function applyFiltersAndRender(){
let bloodFilter = document.getElementById("bloodFilter").value;
let badgeFilter = document.getElementById("badgeFilter").value;
let sortFilter = document.getElementById("sortFilter").value;
let searchValue = document.getElementById("searchInput").value.toLowerCase().trim();

filteredDonorsData = donorsData.filter(d=>{
let donorBlood = String(d.bloodType || "");
let donorBadge = String(d.badgeLevel || "none");
let nameText = `${d.firstName||""} ${d.middleName||""} ${d.surname||""}`.toLowerCase();
let contactText = String(d.contact || "").toLowerCase();
let remarksText = String(d.remarks || "").toLowerCase();
let donationText = String(d.smartDonationCount || 0).toLowerCase();

if(bloodFilter && donorBlood !== bloodFilter) return false;
if(badgeFilter && donorBadge !== badgeFilter) return false;

if(searchValue){
let searchable = `${nameText} ${contactText} ${remarksText} ${donationText} ${donorBlood}`.toLowerCase();
if(!searchable.includes(searchValue)) return false;
}

return true;
});

filteredDonorsData.sort((a,b)=>{
if(sortFilter === "qualifiedAsc"){
return (a.smartDonationCount||0) - (b.smartDonationCount||0);
}
if(sortFilter === "nameAsc"){
return getFullName(a).localeCompare(getFullName(b));
}
if(sortFilter === "nameDesc"){
return getFullName(b).localeCompare(getFullName(a));
}
return (b.smartDonationCount||0) - (a.smartDonationCount||0);
});

updateSummary();
renderTable();
}

function updateSummary(){
document.getElementById("totalDonorsBox").innerText = `Total Donors: ${filteredDonorsData.length}`;
document.getElementById("qualifiedGallonersBox").innerText = `Qualified Galloners: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.galloner).length}`;
document.getElementById("qualifiedBronzeBox").innerText = `Bronze: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.bronze && d.smartDonationCount < categoryLimits.silver).length}`;
document.getElementById("qualifiedSilverBox").innerText = `Silver: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.silver && d.smartDonationCount < categoryLimits.gold).length}`;
document.getElementById("qualifiedGoldBox").innerText = `Gold: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.gold).length}`;
}

function getFullName(d){
return `${d.surname||""}, ${d.firstName||""} ${d.middleName||""}`.replace(/\s+/g," ").trim();
}

/* RENDER TABLE */

function renderTable(){

let table=document.getElementById("donorTable");
table.innerHTML="";

filteredDonorsData.forEach((d,index)=>{

let serialCount = Array.isArray(d.serials) ? d.serials.length : 0;
let smartDonationCount = Number(d.smartDonationCount || 0);
let badge = getBadge(smartDonationCount);
let bloodIcon = getBloodIcon(d.bloodType,d.rhFactor);
let hasRemarks = (d.remarks || "").trim() !== "";

table.innerHTML += `
<tr id="mainRow${index}">
<td>${index+1}</td>

<td class="name-cell">
${d.firstName||""} ${d.middleName||""} ${d.surname||""}
${hasRemarks ? `<span class="remark-indicator">REMARK</span>` : ``}
<span class="match-note">${d.smartMatchSource || "No Match"}</span>
</td>

<td>
${badge}
<div class="badge-count-label">${smartDonationCount} Donation${smartDonationCount === 1 ? "" : "s"}</div>
</td>

<td>
${bloodIcon} ${d.bloodType||""}${d.rhFactor||""}
</td>

<td>${d.contact||""}</td>

<td>
${serialCount}
<button class="view-btn" onclick="toggleSerial(${index})">View</button>
</td>

<td>
<button class="remarks-btn" onclick="openRemarksOnly(${index})">Remarks</button>
<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>
</td>
</tr>

<tr id="serialRow${index}" style="display:none;">
<td colspan="7">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>
`;
});

}

/* SERIAL VIEW WITH REMARKS PANEL */

function toggleSerial(index){

let row=document.getElementById("serialRow"+index);

if(!row) return;

if(row.style.display==="none"){
renderSerialAndRemarks(index);
row.style.display="table-row";
}else{
row.style.display="none";
}

}

function openRemarksOnly(index){

let row=document.getElementById("serialRow"+index);

if(!row) return;

if(row.style.display==="none"){
row.style.display="table-row";
}

renderSerialAndRemarks(index);

let remarksBox=document.getElementById("remarksText"+index);
if(remarksBox){
remarksBox.focus();
}
}

function renderSerialAndRemarks(index){

let container=document.getElementById("serialList"+index);
if(!container) return;

let donor = filteredDonorsData[index];
let serials = donor.serials || [];
let remarks = donor.remarks || "";
let smartDonationCount = Number(donor.smartDonationCount || 0);
let smartMatchedRows = Number(donor.smartMatchedRows || 0);
let smartMatchSource = donor.smartMatchSource || "No Match";

let serialRows = "";

if(serials.length){
serials.forEach((s,i)=>{
serialRows += `
<tr>
<td style="text-align:center;">${i+1}</td>
<td>${s.serial||""}</td>
<td>${s.date||""}</td>
</tr>
`;
});
}else{
serialRows = `
<tr>
<td colspan="3" style="text-align:center;">No serial records found.</td>
</tr>
`;
}

container.innerHTML = `
<div class="serial-detail-layout">

<div>
<div class="serial-count-box">Total Serial Records: ${serials.length}</div>
<div class="serial-count-box">Qualified Donation Count from Donor Database: ${smartDonationCount}</div>
<div class="serial-count-box">Match Source: ${smartMatchSource}</div>
<div class="serial-count-box">Matched Donation Rows: ${smartMatchedRows}</div>

<table class="serial-table">
<thead>
<tr>
<th style="width:70px;">#</th>
<th>Serial Number</th>
<th style="width:180px;">Date</th>
</tr>
</thead>
<tbody>
${serialRows}
</tbody>
</table>
</div>

<div class="remarks-panel">
<h4>Remarks</h4>
<textarea id="remarksText${index}" class="remarks-textarea" placeholder="Enter remarks here...">${escapeHtmlToTextarea(remarks)}</textarea>
<button class="save-remarks-btn" onclick="saveRemarks(${index})">Save Remarks</button>
${remarks.trim() === "" ? `<span class="no-remarks-label">No remarks saved.</span>` : ``}
</div>

</div>
`;

}

/* SAVE REMARKS */

function saveRemarks(index){

let donor = filteredDonorsData[index];
let remarksValue = document.getElementById("remarksText"+index).value.trim();

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

db.collection("donors").doc(donor.id).update({
remarks: remarksValue
}).then(()=>{
let mainIndex = donorsData.findIndex(x => x.id === donor.id);
if(mainIndex > -1){
donorsData[mainIndex].remarks = remarksValue;
}
filteredDonorsData[index].remarks = remarksValue;

applyFiltersAndRender();

let reopenedIndex = filteredDonorsData.findIndex(x => x.id === donor.id);
if(reopenedIndex > -1){
let reopenedRow = document.getElementById("serialRow"+reopenedIndex);
if(reopenedRow){
reopenedRow.style.display="table-row";
renderSerialAndRemarks(reopenedIndex);
}
}

alert("Remarks saved successfully.");
}).catch(error=>{
console.error("Remarks save error:", error);
alert("Error saving remarks.");
});

}

/* SEARCH */

function searchDonor(){
applyFiltersAndRender();
}

/* DELETE */

function deleteDonor(id){

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

if(confirm("Delete donor?")){

db.collection("donors").doc(id).delete().then(()=>{
fetchDonors();
}).catch(error => {
console.error("Delete error:", error);
alert("Error deleting donor.");
});

}

}

/* EDIT */

function editDonor(id){
window.location.href="donor-entry.html?editId="+id;
}

/* CSV */

function exportToCSV(){

let csv="Blood Type,Rh Factor,First Name,Middle Name,Surname,Contact,Qualified Donation Count,Badge Level,Match Source,Matched Donation Rows,Remarks\n";

filteredDonorsData.forEach(d=>{
csv += `${escapeCSV(d.bloodType||"")},${escapeCSV(d.rhFactor||"")},${escapeCSV(d.firstName||"")},${escapeCSV(d.middleName||"")},${escapeCSV(d.surname||"")},${escapeCSV(d.contact||"")},${escapeCSV(d.smartDonationCount||0)},${escapeCSV((d.badgeLevel||"").toUpperCase())},${escapeCSV(d.smartMatchSource||"")},${escapeCSV(d.smartMatchedRows||0)},${escapeCSV(d.remarks||"")}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="donors.csv";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

window.URL.revokeObjectURL(url);

}

function escapeCSV(value){
let text = String(value || "");
return `"${text.replace(/"/g,'""')}"`;
}

function escapeHtmlToTextarea(text){
return String(text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;");
}

auth.onAuthStateChanged(function(user){
authReady = true;

if(!user){
window.location.href="index.html";
return;
}

fetchDonors();
});
