<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Tracking</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
color:#222;
}

header{
background:#b30000;
color:white;
padding:18px 15px;
text-align:center;
}

.logo{
width:100px;
display:block;
margin:0 auto 10px auto;
}

.container{
max-width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.status-bar{
display:none;
margin-bottom:15px;
padding:12px 14px;
border-radius:8px;
font-weight:bold;
white-space:pre-wrap;
}

.status-loading{
display:block;
background:#eef5ff;
border:1px solid #cdddf5;
color:#1f4f8a;
}

.status-success{
display:block;
background:#edf8ef;
border:1px solid #c7e6cd;
color:#226437;
}

.status-error{
display:block;
background:#fff1f1;
border:1px solid #f0bdbd;
color:#b30000;
}

.summary-bar{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-bottom:15px;
}

.summary-box{
background:#fff4f4;
border:1px solid #e0b4b4;
padding:10px 14px;
border-radius:8px;
font-weight:bold;
color:#b30000;
}

.controls-row{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
margin-bottom:15px;
}

input[type="text"], select{
padding:9px 10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

#searchInput{
min-width:260px;
flex:1;
}

button{
padding:8px 10px;
margin:0;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.top-btn{background:#b30000;}
.reload-btn{background:#1565c0;}
.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.view-btn{background:#6a1b9a;}
.remarks-btn{background:#2e7d32;}
.save-remarks-btn{background:#b30000;}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
vertical-align:middle;
}

th{
background:#b30000;
color:white;
position:sticky;
top:0;
z-index:1;
}

.name-cell{
text-align:left;
font-weight:bold;
padding-left:10px;
}

.badge{
padding:3px 6px;
border-radius:4px;
font-size:11px;
color:white;
display:inline-block;
font-weight:bold;
}

.badge-galloner{background:#1e88e5;}
.badge-bronze{background:#cd7f32;}
.badge-silver{background:#9e9e9e;}
.badge-gold{background:#d4af37;color:black;}

.badge-count-label{
display:block;
font-size:11px;
margin-top:4px;
color:#444;
font-weight:bold;
}

.remark-indicator{
display:inline-block;
margin-left:6px;
padding:2px 6px;
font-size:10px;
border-radius:10px;
background:#2e7d32;
color:white;
vertical-align:middle;
}

.blood-icon{
width:20px;
height:20px;
vertical-align:middle;
margin-right:4px;
}

.table-wrap{
overflow:auto;
max-height:70vh;
border:1px solid #ddd;
border-radius:8px;
}

.serial-box{
background:#f9f9f9;
border:1px solid #ccc;
padding:10px;
border-radius:6px;
text-align:left;
}

.serial-detail-layout{
display:grid;
grid-template-columns:1.25fr 1fr;
gap:15px;
align-items:start;
}

.serial-count-box{
background:#fff4f4;
border:1px solid #e0b4b4;
padding:10px;
border-radius:6px;
font-weight:bold;
color:#b30000;
margin-bottom:10px;
}

.serial-table{
width:100%;
border-collapse:collapse;
background:white;
}

.serial-table th,
.serial-table td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

.serial-table th{
background:#b30000;
color:white;
text-align:center;
position:static;
}

.remarks-panel{
background:#ffffff;
border:1px solid #ccc;
border-radius:6px;
padding:10px;
}

.remarks-panel h4{
margin:0 0 10px 0;
color:#b30000;
}

.remarks-textarea{
width:100%;
min-height:140px;
padding:10px;
box-sizing:border-box;
resize:vertical;
font-family:Arial;
font-size:14px;
border:1px solid #ccc;
border-radius:6px;
}

.no-remarks-label{
font-size:12px;
color:#888;
margin-top:8px;
display:block;
}

.empty-box{
padding:20px;
text-align:center;
color:#666;
background:#fafafa;
border:1px dashed #ccc;
border-radius:8px;
margin-top:10px;
}

@media (max-width: 900px){
.serial-detail-layout{
grid-template-columns:1fr;
}
.controls-row{
flex-direction:column;
align-items:stretch;
}
#searchInput{
width:100%;
min-width:auto;
}
}
</style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo" onerror="this.style.display='none'">
<h2>Donor Tracking</h2>
</header>

<div class="container">

<div id="statusBar" class="status-bar"></div>

<div class="summary-bar">
<div class="summary-box" id="totalDonorsBox">Total Donors: 0</div>
<div class="summary-box" id="qualifiedGallonersBox">Qualified Galloners: 0</div>
<div class="summary-box" id="qualifiedBronzeBox">Bronze: 0</div>
<div class="summary-box" id="qualifiedSilverBox">Silver: 0</div>
<div class="summary-box" id="qualifiedGoldBox">Gold: 0</div>
</div>

<div class="controls-row">
<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="applyFiltersAndRender()">

<select id="bloodFilter" onchange="applyFiltersAndRender()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<select id="badgeFilter" onchange="applyFiltersAndRender()">
<option value="">All Badges</option>
<option value="galloner">Galloner</option>
<option value="bronze">Bronze</option>
<option value="silver">Silver</option>
<option value="gold">Gold</option>
<option value="none">No Badge</option>
</select>

<select id="sortFilter" onchange="applyFiltersAndRender()">
<option value="qualifiedDesc">Sort: Highest Donations</option>
<option value="qualifiedAsc">Sort: Lowest Donations</option>
<option value="nameAsc">Sort: Name A-Z</option>
<option value="nameDesc">Sort: Name Z-A</option>
<option value="serialDesc">Sort: Highest Serial Count</option>
<option value="serialAsc">Sort: Lowest Serial Count</option>
</select>

<button class="top-btn" onclick="exportToCSV()">Export CSV</button>
<button class="reload-btn" onclick="fetchDonors()">Reload</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>
</div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Badge</th>
<th>Blood</th>
<th>Contact</th>
<th>Serial</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="donorTable"></tbody>
</table>
</div>

<div id="emptyBox" class="empty-box" style="display:none;">No donor records found.</div>

</div>

<script>
var firebaseConfig = {
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
projectId:"galloners-club"
};

if(!firebase.apps.length){
firebase.initializeApp(firebaseConfig);
}

var auth = firebase.auth();
var db = firebase.firestore();

let donorsData = [];
let filteredDonorsData = [];
let isLoading = false;

let categoryLimits = {
galloner:8,
bronze:28,
silver:46,
gold:70
};

function goDashboard(){
window.location.href = "dashboard.html";
}

function setStatus(message, type){
let el = document.getElementById("statusBar");
el.className = "status-bar";

if(!message){
el.style.display = "none";
el.innerHTML = "";
return;
}

el.innerHTML = escapeHtml(message);

if(type === "error"){
el.classList.add("status-error");
}else if(type === "success"){
el.classList.add("status-success");
}else{
el.classList.add("status-loading");
}
}

function escapeHtml(text){
return String(text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#39;");
}

function escapeHtmlToTextarea(text){
return String(text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;");
}

function escapeCSV(value){
let text = String(value || "");
return `"${text.replace(/"/g,'""')}"`;
}

function safeText(value){
return String(value || "").trim();
}

function getFullName(d){
return `${safeText(d.firstName)} ${safeText(d.middleName)} ${safeText(d.surname)}`.replace(/\s+/g," ").trim();
}

function getSortableName(d){
return `${safeText(d.surname)}, ${safeText(d.firstName)} ${safeText(d.middleName)}`.replace(/\s+/g," ").trim();
}

function bloodDrop(color, outline=false){
let stroke = outline ? "#000" : "none";
return `
<svg class="blood-icon" viewBox="0 0 24 24">
<path fill="${color}" stroke="${stroke}" stroke-width="1.5"
d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/>
</svg>
`;
}

function getBloodIcon(type,rh){
if(rh === "-") return bloodDrop("#a5d6a7");
if(type === "A") return bloodDrop("#1e88e5");
if(type === "B") return bloodDrop("#ffd600");
if(type === "AB") return bloodDrop("#ff80ab");
if(type === "O") return bloodDrop("#ffffff",true);
return bloodDrop("#ccc");
}

function getBadgeLevel(count){
if(count >= categoryLimits.gold) return "gold";
if(count >= categoryLimits.silver) return "silver";
if(count >= categoryLimits.bronze) return "bronze";
if(count >= categoryLimits.galloner) return "galloner";
return "none";
}

function getBadge(count){
if(count >= categoryLimits.gold) return `<span class="badge badge-gold">GOLD</span>`;
if(count >= categoryLimits.silver) return `<span class="badge badge-silver">SILVER</span>`;
if(count >= categoryLimits.bronze) return `<span class="badge badge-bronze">BRONZE</span>`;
if(count >= categoryLimits.galloner) return `<span class="badge badge-galloner">GALLONER</span>`;
return "";
}

function inferDonationCount(donor){
let serialCount = Array.isArray(donor.serials) ? donor.serials.length : 0;

let possibleCounts = [
donor.numberOfDonations,
donor.donationCount,
donor.noOfDonations,
donor.no_of_donations,
donor.donationNo,
donor.donationNumber,
donor.totalDonations,
donor.timesDonated,
donor.donations,
donor.count
];

let highestEncodedCount = 0;

for(let i=0;i<possibleCounts.length;i++){
let raw = possibleCounts[i];
if(raw === null || raw === undefined || raw === "") continue;
let num = parseInt(String(raw).replace(/[^0-9]/g,""),10);
if(!isNaN(num) && num > highestEncodedCount){
highestEncodedCount = num;
}
}

return Math.max(serialCount, highestEncodedCount);
}

async function fetchDonors(){
if(isLoading) return;

if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

isLoading = true;
setStatus("Loading galloner tracking data...", "loading");

try{
let snapshot = await db.collection("donors").get();

donorsData = snapshot.docs.map(doc=>{
let data = doc.data() || {};
data.id = doc.id;
data.serialCount = Array.isArray(data.serials) ? data.serials.length : 0;
data.smartDonationCount = inferDonationCount(data);
data.badgeLevel = getBadgeLevel(data.smartDonationCount);
return data;
});

applyFiltersAndRender();

setStatus(`Loaded successfully. Donors: ${donorsData.length}`, "success");
}catch(error){
console.error("Fetch donors error:", error);
donorsData = [];
applyFiltersAndRender();
setStatus("Failed to load donors collection: " + error.message, "error");
}finally{
isLoading = false;
}
}

function applyFiltersAndRender(){
let bloodFilter = document.getElementById("bloodFilter").value;
let badgeFilter = document.getElementById("badgeFilter").value;
let sortFilter = document.getElementById("sortFilter").value;
let searchValue = document.getElementById("searchInput").value.toLowerCase().trim();

filteredDonorsData = donorsData.filter(d=>{
let donorBlood = String(d.bloodType || "");
let donorBadge = String(d.badgeLevel || "none");
let nameText = getFullName(d).toLowerCase();
let contactText = String(d.contact || "").toLowerCase();
let remarksText = String(d.remarks || "").toLowerCase();
let donationText = String(d.smartDonationCount || 0).toLowerCase();
let serialText = String(d.serialCount || 0).toLowerCase();

if(bloodFilter && donorBlood !== bloodFilter) return false;
if(badgeFilter && donorBadge !== badgeFilter) return false;

if(searchValue){
let searchable = `${nameText} ${contactText} ${remarksText} ${donationText} ${serialText} ${donorBlood}`.toLowerCase();
if(!searchable.includes(searchValue)) return false;
}

return true;
});

filteredDonorsData.sort((a,b)=>{
if(sortFilter === "qualifiedAsc") return (a.smartDonationCount||0) - (b.smartDonationCount||0);
if(sortFilter === "nameAsc") return getSortableName(a).localeCompare(getSortableName(b));
if(sortFilter === "nameDesc") return getSortableName(b).localeCompare(getSortableName(a));
if(sortFilter === "serialDesc") return (b.serialCount||0) - (a.serialCount||0);
if(sortFilter === "serialAsc") return (a.serialCount||0) - (b.serialCount||0);
return (b.smartDonationCount||0) - (a.smartDonationCount||0);
});

updateSummary();
renderTable();
}

function updateSummary(){
document.getElementById("totalDonorsBox").innerText = `Total Donors: ${filteredDonorsData.length}`;
document.getElementById("qualifiedGallonersBox").innerText = `Qualified Galloners: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.galloner).length}`;
document.getElementById("qualifiedBronzeBox").innerText = `Bronze: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.bronze && d.smartDonationCount < categoryLimits.silver).length}`;
document.getElementById("qualifiedSilverBox").innerText = `Silver: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.silver && d.smartDonationCount < categoryLimits.gold).length}`;
document.getElementById("qualifiedGoldBox").innerText = `Gold: ${filteredDonorsData.filter(d => d.smartDonationCount >= categoryLimits.gold).length}`;
}

function renderTable(){
let table = document.getElementById("donorTable");
let emptyBox = document.getElementById("emptyBox");
table.innerHTML = "";

if(filteredDonorsData.length === 0){
emptyBox.style.display = "block";
return;
}
emptyBox.style.display = "none";

filteredDonorsData.forEach((d,index)=>{
let badge = getBadge(Number(d.smartDonationCount || 0));
let bloodIcon = getBloodIcon(d.bloodType,d.rhFactor);
let hasRemarks = (d.remarks || "").trim() !== "";

table.innerHTML += `
<tr>
<td>${index+1}</td>

<td class="name-cell">
${escapeHtml(getFullName(d))}
${hasRemarks ? `<span class="remark-indicator">REMARK</span>` : ``}
</td>

<td>
${badge}
<div class="badge-count-label">${Number(d.smartDonationCount || 0)} Donation${Number(d.smartDonationCount || 0) === 1 ? "" : "s"}</div>
</td>

<td>${bloodIcon} ${escapeHtml(d.bloodType||"")}${escapeHtml(d.rhFactor||"")}</td>
<td>${escapeHtml(d.contact||"")}</td>

<td>
${Number(d.serialCount || 0)}
<button class="view-btn" onclick="toggleSerial(${index})">View</button>
</td>

<td>
<button class="remarks-btn" onclick="openRemarksOnly(${index})">Remarks</button>
<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>
</td>
</tr>

<tr id="serialRow${index}" style="display:none;">
<td colspan="7">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>
`;
});
}

function toggleSerial(index){
let row = document.getElementById("serialRow"+index);
if(!row) return;

if(row.style.display === "none"){
renderSerialAndRemarks(index);
row.style.display = "table-row";
}else{
row.style.display = "none";
}
}

function openRemarksOnly(index){
let row = document.getElementById("serialRow"+index);
if(!row) return;

if(row.style.display === "none"){
row.style.display = "table-row";
}
renderSerialAndRemarks(index);

let remarksBox = document.getElementById("remarksText"+index);
if(remarksBox) remarksBox.focus();
}

function renderSerialAndRemarks(index){
let container = document.getElementById("serialList"+index);
if(!container) return;

let donor = filteredDonorsData[index];
let serials = donor.serials || [];
let remarks = donor.remarks || "";
let smartDonationCount = Number(donor.smartDonationCount || 0);
let serialCount = Number(donor.serialCount || 0);

let serialRows = "";

if(serials.length){
serials.forEach((s,i)=>{
serialRows += `
<tr>
<td style="text-align:center;">${i+1}</td>
<td>${escapeHtml(s.serial || "")}</td>
<td>${escapeHtml(s.date || "")}</td>
</tr>
`;
});
}else{
serialRows = `
<tr>
<td colspan="3" style="text-align:center;">No serial records found.</td>
</tr>
`;
}

container.innerHTML = `
<div class="serial-detail-layout">
<div>
<div class="serial-count-box">Qualified Donation Count: ${smartDonationCount}</div>
<div class="serial-count-box">Encoded Serial Records: ${serialCount}</div>

<table class="serial-table">
<thead>
<tr>
<th style="width:70px;">#</th>
<th>Serial Number</th>
<th style="width:180px;">Date</th>
</tr>
</thead>
<tbody>
${serialRows}
</tbody>
</table>
</div>

<div class="remarks-panel">
<h4>Remarks</h4>
<textarea id="remarksText${index}" class="remarks-textarea" placeholder="Enter remarks here...">${escapeHtmlToTextarea(remarks)}</textarea>
<button class="save-remarks-btn" onclick="saveRemarks(${index})">Save Remarks</button>
${remarks.trim() === "" ? `<span class="no-remarks-label">No remarks saved.</span>` : ``}
</div>
</div>
`;
}

function saveRemarks(index){
let donor = filteredDonorsData[index];
let textarea = document.getElementById("remarksText"+index);
if(!textarea) return;

let remarksValue = textarea.value.trim();

if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

db.collection("donors").doc(donor.id).update({
remarks: remarksValue
}).then(()=>{
let mainIndex = donorsData.findIndex(x => x.id === donor.id);
if(mainIndex > -1){
donorsData[mainIndex].remarks = remarksValue;
}
applyFiltersAndRender();

let reopenedIndex = filteredDonorsData.findIndex(x => x.id === donor.id);
if(reopenedIndex > -1){
let reopenedRow = document.getElementById("serialRow"+reopenedIndex);
if(reopenedRow){
reopenedRow.style.display = "table-row";
renderSerialAndRemarks(reopenedIndex);
}
}

alert("Remarks saved successfully.");
}).catch(error=>{
console.error("Remarks save error:", error);
alert("Error saving remarks.");
});
}

function editDonor(id){
window.location.href = "donor-entry.html?editId=" + id;
}

function deleteDonor(id){
if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

if(confirm("Delete donor?")){
db.collection("donors").doc(id).delete().then(()=>{
fetchDonors();
}).catch(error=>{
console.error("Delete error:", error);
alert("Error deleting donor.");
});
}
}

function exportToCSV(){
let csv = "Blood Type,Rh Factor,First Name,Middle Name,Surname,Contact,Qualified Donation Count,Encoded Serial Count,Badge Level,Remarks\n";

filteredDonorsData.forEach(d=>{
csv += `${escapeCSV(d.bloodType||"")},${escapeCSV(d.rhFactor||"")},${escapeCSV(d.firstName||"")},${escapeCSV(d.middleName||"")},${escapeCSV(d.surname||"")},${escapeCSV(d.contact||"")},${escapeCSV(d.smartDonationCount||0)},${escapeCSV(d.serialCount||0)},${escapeCSV((d.badgeLevel||"").toUpperCase())},${escapeCSV(d.remarks||"")}\n`;
});

let blob = new Blob([csv],{type:"text/csv"});
let url = window.URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "galloner-tracking.csv";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

window.URL.revokeObjectURL(url);
}

auth.onAuthStateChanged(function(user){
if(!user){
window.location.href = "index.html";
return;
}
fetchDonors();
});
</script>

</body>
</html>
