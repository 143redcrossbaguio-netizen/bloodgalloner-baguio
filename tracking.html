<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Tracking</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f4f4;
color:#222;
}

header{
background:#b30000;
color:white;
padding:18px 15px;
text-align:center;
}

.logo{
width:100px;
display:block;
margin:0 auto 10px auto;
}

.container{
max-width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.status-bar{
display:none;
margin-bottom:15px;
padding:12px 14px;
border-radius:8px;
font-weight:bold;
white-space:pre-wrap;
}

.status-loading{
display:block;
background:#eef5ff;
border:1px solid #cdddf5;
color:#1f4f8a;
}

.status-success{
display:block;
background:#edf8ef;
border:1px solid #c7e6cd;
color:#226437;
}

.status-error{
display:block;
background:#fff1f1;
border:1px solid #f0bdbd;
color:#b30000;
}

.summary-bar{
display:flex;
flex-wrap:wrap;
gap:0;
margin-bottom:0;
border-bottom:3px solid #e2e8f0;
padding-bottom:0;
align-items:flex-end;
}

/* Read-only total — sits to the left of the tabs, NOT clickable. Communicates
   "this is information, not a navigation target". The actual list renders
   inside one of the per-category tabs to the right. */
.total-stat-card{
background:linear-gradient(135deg,#fef2f2 0%,#fee2e2 100%);
border:1px solid #fecaca;
border-bottom:3px solid #b30000;
margin-bottom:-3px;
padding:8px 14px 10px 14px;
border-radius:10px 10px 0 0;
margin-right:14px;
display:flex;
flex-direction:column;
align-items:flex-start;
cursor:default;
user-select:none;
}
.total-stat-label{
font-size:10.5px;
font-weight:600;
color:#7f1d1d;
text-transform:uppercase;
letter-spacing:0.6px;
}
.total-stat-value{
font-size:22px;
font-weight:800;
color:#b30000;
line-height:1.1;
margin-top:2px;
}

.summary-box{
background:#f8fafc;
border:1px solid #e2e8f0;
border-bottom:3px solid transparent;
margin-bottom:-3px; /* overlap the bar's bottom border so active tab "merges" with it */
padding:11px 18px 13px 18px;
border-radius:10px 10px 0 0;
font-weight:bold;
color:#475569;
cursor:pointer;
user-select:none;
transition:all .15s ease;
position:relative;
font-size:13px;
display:flex;
align-items:center;
gap:8px;
}

.summary-box:hover:not(.active){
background:#eef2f7;
color:#1f2937;
}

.summary-box .tab-count{
display:inline-block;
min-width:24px;
text-align:center;
padding:1px 7px;
border-radius:10px;
background:rgba(0,0,0,0.08);
font-size:12px;
font-weight:700;
}

.summary-box.active{
background:#fff;
border-color:#cbd5e1;
border-bottom:3px solid #fff;
color:#0f172a;
box-shadow:0 -2px 6px rgba(0,0,0,0.04);
}

.summary-box.active.tab-galloner{ color:#1565c0; border-top:3px solid #1565c0; padding-top:9px; }
.summary-box.active.tab-galloner .tab-count{ background:#1565c0; color:#fff; }
.summary-box.active.tab-bronze{   color:#8d4925; border-top:3px solid #8d4925; padding-top:9px; }
.summary-box.active.tab-bronze .tab-count{   background:#8d4925; color:#fff; }
.summary-box.active.tab-silver{   color:#475569; border-top:3px solid #94a3b8; padding-top:9px; }
.summary-box.active.tab-silver .tab-count{   background:#64748b; color:#fff; }
.summary-box.active.tab-gold{     color:#a16207; border-top:3px solid #d4af37; padding-top:9px; }
.summary-box.active.tab-gold .tab-count{     background:#d4af37; color:#fff; }

/* Visual cue for which tab you're viewing — shown above the toolbar */
.tab-context-banner{
margin-top:14px;
margin-bottom:14px;
padding:10px 14px;
border-radius:8px;
font-size:13px;
font-weight:600;
color:#1f2937;
background:#fefce8;
border:1px solid #fde68a;
display:flex;
flex-wrap:wrap;
align-items:center;
justify-content:space-between;
gap:8px;
}
.tab-context-banner.tab-galloner{ background:#eff6ff; border-color:#93c5fd; color:#1e40af; }
.tab-context-banner.tab-bronze  { background:#fff7ed; border-color:#fdba74; color:#7c2d12; }
.tab-context-banner.tab-silver  { background:#f8fafc; border-color:#cbd5e1; color:#334155; }
.tab-context-banner.tab-gold    { background:#fffbeb; border-color:#fcd34d; color:#92400e; }

.tab-context-banner .tab-context-meta{
font-weight:400;
font-size:12px;
opacity:0.85;
}

.controls-row{
display:flex;
flex-wrap:wrap;
gap:10px;
align-items:center;
margin-bottom:15px;
}

input[type="text"], input[type="number"], select{
padding:9px 10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

#searchInput{
min-width:260px;
flex:1;
}

button{
padding:8px 10px;
margin:0;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.top-btn{background:#b30000;}
.reload-btn{background:#1565c0;}
.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.view-btn{background:#6a1b9a;}
.remarks-btn{background:#2e7d32;}
.save-remarks-btn{background:#b30000;}
.save-award-btn{background:#1565c0;}
.to-award-btn{background:#ef6c00;}
.print-btn{background:#455a64;}
.print-galloner-btn{background:#1e88e5;}
.print-bronze-btn{background:#cd7f32;}
.print-silver-btn{background:#757575;}
.print-gold-btn{background:#b8860b;color:white;}
.print-not-awarded-btn{background:#c62828;}

/* Print / Export dropdown menu — replaces the old cramped 8-button row.
   Saves a whole strip of vertical space and groups related actions. */
.print-menu-wrap{
position:relative;
display:inline-block;
}
.print-menu-trigger{
background:#1f2937;
color:#fff;
border:none;
border-radius:8px;
padding:9px 16px;
font-size:13px;
font-weight:bold;
cursor:pointer;
display:inline-flex;
align-items:center;
gap:8px;
transition:background .15s ease;
}
.print-menu-trigger:hover{ background:#0f172a; }
.print-menu-trigger.open{ background:#0f172a; }
.print-menu-caret{ font-size:11px; opacity:0.85; }

.print-menu{
display:none;
position:absolute;
top:calc(100% + 6px);
left:0;
min-width:280px;
background:#fff;
border:1px solid #d1d5db;
border-radius:10px;
box-shadow:0 8px 24px rgba(0,0,0,0.12);
padding:6px;
z-index:1000;
}
.print-menu.show{ display:block; }
.print-menu-section-label{
font-size:10.5px;
font-weight:700;
color:#6b7280;
text-transform:uppercase;
letter-spacing:0.6px;
padding:8px 10px 4px 10px;
}
.print-menu-divider{
height:1px;
background:#e5e7eb;
margin:6px 4px;
}
.print-menu-item{
display:flex;
align-items:center;
gap:10px;
width:100%;
text-align:left;
background:none;
border:none;
border-radius:6px;
padding:9px 10px;
font-size:13px;
font-weight:500;
color:#1f2937;
cursor:pointer;
}
.print-menu-item:hover, .print-menu-item:focus{
background:#f3f4f6;
outline:none;
}
.print-menu-item::before{
content:"";
display:inline-block;
width:9px;
height:9px;
border-radius:50%;
background:#cbd5e1;
flex-shrink:0;
}
.print-menu-item.dot-galloner::before{ background:#1e88e5; }
.print-menu-item.dot-bronze::before{   background:#cd7f32; }
.print-menu-item.dot-silver::before{   background:#9ca3af; }
.print-menu-item.dot-gold::before{     background:#d4af37; }
.print-menu-item.dot-warn::before{     background:#dc2626; }

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
vertical-align:middle;
}

th{
background:#b30000;
color:white;
position:sticky;
top:0;
z-index:1;
}

.name-cell{
text-align:left;
font-weight:bold;
padding-left:10px;
}

.badge{
padding:3px 6px;
border-radius:4px;
font-size:11px;
color:white;
display:inline-block;
font-weight:bold;
}

.badge-galloner{background:#1e88e5;}
.badge-bronze{background:#cd7f32;}
.badge-silver{background:#9e9e9e;}
.badge-gold{background:#d4af37;color:black;}

.award-pill{
display:inline-block;
padding:3px 7px;
border-radius:999px;
font-size:11px;
font-weight:bold;
}

.award-yes{
background:#e8f7e8;
color:#1b5e20;
border:1px solid #b7dfb9;
}

.award-no{
background:#fff4e5;
color:#8a4b00;
border:1px solid #f2c48a;
}

.badge-count-label{
display:block;
font-size:11px;
margin-top:4px;
color:#444;
font-weight:bold;
}

.source-label{
display:block;
font-size:10px;
margin-top:3px;
color:#666;
font-weight:normal;
}

.remark-indicator{
display:inline-block;
margin-left:6px;
padding:2px 6px;
font-size:10px;
border-radius:10px;
background:#2e7d32;
color:white;
vertical-align:middle;
}

.blood-icon{
width:20px;
height:20px;
vertical-align:middle;
margin-right:4px;
}

.table-wrap{
overflow:auto;
max-height:70vh;
border:1px solid #ddd;
border-radius:8px;
}

.serial-box{
background:#f9f9f9;
border:1px solid #ccc;
padding:10px;
border-radius:6px;
text-align:left;
}

.serial-detail-layout{
display:grid;
grid-template-columns:1.3fr 1fr;
gap:15px;
align-items:start;
}

.serial-count-box{
background:#fff4f4;
border:1px solid #e0b4b4;
padding:10px;
border-radius:6px;
font-weight:bold;
color:#b30000;
margin-bottom:10px;
}

.serial-table{
width:100%;
border-collapse:collapse;
background:white;
}

.serial-table th,
.serial-table td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

.serial-table th{
background:#b30000;
color:white;
text-align:center;
position:static;
}

.serial-table td{
font-size:13px;
}

.serial-table td:first-child{
text-align:center;
font-weight:bold;
color:#888;
width:40px;
}

.serial-empty-row td{
text-align:center;
color:#888;
font-style:italic;
}

.serial-highlight{
background:#fff8e1;
}

.remarks-panel{
background:#ffffff;
border:1px solid #ccc;
border-radius:6px;
padding:10px;
margin-bottom:12px;
}

.remarks-panel h4{
margin:0 0 10px 0;
color:#b30000;
}

.remarks-textarea{
width:100%;
min-height:140px;
padding:10px;
box-sizing:border-box;
resize:vertical;
font-family:Arial;
font-size:14px;
border:1px solid #ccc;
border-radius:6px;
}

.no-remarks-label{
font-size:12px;
color:#888;
margin-top:8px;
display:block;
}

.detail-note{
font-size:12px;
color:#555;
margin-top:8px;
display:block;
line-height:1.4;
}

.award-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.award-grid label{
display:block;
font-size:12px;
font-weight:bold;
margin-bottom:4px;
color:#444;
}

.award-full{
grid-column:1 / -1;
}

.empty-box{
padding:20px;
text-align:center;
color:#666;
background:#fafafa;
border:1px dashed #ccc;
border-radius:8px;
margin-top:10px;
}

/* Serial number individual cell formatting */
.serial-val{
font-family:monospace;
font-size:13px;
font-weight:bold;
color:#1a237e;
letter-spacing:0.5px;
}

.serial-date-val{
color:#444;
font-size:12px;
}

.serial-source-badge{
display:inline-block;
padding:2px 6px;
border-radius:4px;
font-size:10px;
font-weight:bold;
}

.src-donors{background:#e3f2fd;color:#0d47a1;}
.src-database{background:#fce4ec;color:#880e4f;}
.src-merged{background:#e8f5e9;color:#1b5e20;}
.src-fuzzy{background:#fff8e1;color:#92400e;}

@media (max-width: 900px){
.serial-detail-layout{
grid-template-columns:1fr;
}
.controls-row{
flex-direction:column;
align-items:stretch;
}
#searchInput{
width:100%;
min-width:auto;
}
.award-grid{
grid-template-columns:1fr;
}
}

/* ============================================================
   RESPONSIVE PHONE + TABLET STYLES (added by Claude)
   ============================================================ */
@media (max-width: 980px) {
    html, body { overflow-x: hidden; }
    header { padding: 8px 12px !important; }
    .header-bar { flex-wrap: wrap !important; gap: 8px !important; }
    .header-actions { flex-wrap: wrap !important; gap: 8px !important; width: 100% !important; justify-content: flex-start !important; }
    .header-find-wrap { flex: 1 1 100% !important; min-width: 0 !important; max-width: 100% !important; }
    .header-find-input { width: 100% !important; min-width: 0 !important; font-size: 14px !important; }
    .auth-indicator { min-width: 0 !important; flex: 1 1 auto !important; font-size: 12px !important; padding: 6px 10px !important; }
    .reload-btn { padding: 8px 14px !important; font-size: 13px !important; }
    .page { padding: 0 8px 16px !important; margin: 8px auto !important; max-width: 100% !important; }
    .lis-panel, .panel, .card, .lookup-results { border-radius: 10px !important; }
    .panel-body { padding: 10px !important; }
    .form-grid, .serial-batch-grid { grid-template-columns: 1fr !important; gap: 10px !important; }
    .span-2, .span-3, .span-4, .span-6, .span-8, .span-12 { grid-column: span 1 !important; }
    .field-row { grid-template-columns: 1fr !important; gap: 10px !important; }
    .field-group input:not([type=radio]):not([type=checkbox]), .field-group select, .field-group textarea,
    input[type="text"], input[type="number"], input[type="email"], input[type="tel"], input[type="date"],
    input[type="time"], input[type="search"], input[type="password"], select, textarea {
        font-size: 16px !important; padding: 10px !important;
    }
    button, .main-btn, .small-btn, .action-btn { min-height: 40px; padding: 10px 14px !important; font-size: 14px !important; }
    .btn-row, .serial-btn-row { gap: 8px !important; }
    .lookup-table-wrap, .table-wrap, .table-scroll, .table-container { overflow-x: auto !important; -webkit-overflow-scrolling: touch; }
    table { min-width: 600px !important; font-size: 13px !important; }
    th, td { padding: 8px 8px !important; font-size: 12px !important; }
    .radio-options, .range-type-options, .inline-toggle { gap: 10px !important; }
    .radio-options label, .range-type-options label, .inline-toggle label { font-size: 14px !important; }
    .serial-wrap { grid-template-columns: 1fr !important; gap: 8px !important; }
    .serial-prefix { text-align: center; justify-content: center; }
    .status-message { font-size: 13px !important; padding: 10px !important; }
    .helper-text, .group-info, .loaded-donor-info, .type-helper, .serial-helper, .time-helper, .serial-batch-info, .range-type-info { font-size: 12px !important; }
    .modal, .modal-content, .dialog, .popup { max-width: 95vw !important; max-height: 90vh !important; overflow: auto; }
    .lookup-sticky { position: relative !important; top: 0 !important; }
}
@media (max-width: 640px) {
    header { padding: 8px 10px !important; }
    .header-find-label { font-size: 11px !important; }
    .auth-indicator { font-size: 11px !important; padding: 5px 8px !important; min-width: 0 !important; }
    .reload-btn { padding: 6px 10px !important; font-size: 12px !important; }
    .panel-head { padding: 8px 10px !important; font-size: 12px !important; }
    .panel-body { padding: 8px !important; }
    .btn-row .main-btn, .serial-btn-row .main-btn { flex: 1 1 100% !important; }
    .field-group label { font-size: 12px !important; }
    .collapse-btn { padding: 8px 10px !important; font-size: 13px !important; }
    table { min-width: 500px !important; }
    th, td { padding: 6px 6px !important; font-size: 11px !important; }
    .small-btn { padding: 6px 8px !important; font-size: 11px !important; min-height: 36px; }
}
@media (max-width: 380px) {
    .page { padding: 0 6px 12px !important; }
    header { padding: 6px 8px !important; }
    .auth-indicator { font-size: 10px !important; }
    .field-group label { font-size: 11px !important; }
    button, .main-btn { font-size: 13px !important; }
}
@media (hover: none) and (pointer: coarse) {
    button:hover, .main-btn:hover, .small-btn:hover, .nav-btn:hover, .sub-btn:hover { transform: none !important; }
}

    </style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo" onerror="this.style.display='none'">
<h2>Eligible Awardees Tracking</h2>
</header>

<div class="container">

<div id="statusBar" class="status-bar"></div>

<div class="summary-bar">
<!-- Stat card (NOT clickable) — shows the running total at a glance without
     rendering a giant list. The actual data table is always scoped to one
     category tab below. -->
<div class="total-stat-card" id="totalEligibleStat">
<div class="total-stat-label">Total Eligible</div>
<div class="total-stat-value" id="totalEligibleBox">0</div>
</div>
<div class="summary-box tab-galloner active" id="summaryGalloner" onclick="applySummaryFilter('galloner')">Galloner <span class="tab-count" id="gallonerBox">0</span></div>
<div class="summary-box tab-bronze" id="summaryBronze" onclick="applySummaryFilter('bronze')">Bronze <span class="tab-count" id="bronzeBox">0</span></div>
<div class="summary-box tab-silver" id="summarySilver" onclick="applySummaryFilter('silver')">Silver <span class="tab-count" id="silverBox">0</span></div>
<div class="summary-box tab-gold" id="summaryGold" onclick="applySummaryFilter('gold')">Gold <span class="tab-count" id="goldBox">0</span></div>
</div>

<!-- Tells the user which tab they're viewing and how many records are in scope -->
<div id="tabContextBanner" class="tab-context-banner tab-galloner">
<div><span id="tabContextLabel">Viewing: Galloner Tab</span></div>
<div class="tab-context-meta" id="tabContextMeta">Click a category above to switch.</div>
</div>

<div class="controls-row">
<input type="text" id="searchInput" placeholder="Search eligible donor..." onkeyup="applyFiltersAndRender()">

<select id="bloodFilter" onchange="applyFiltersAndRender()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<select id="badgeFilter" onchange="syncSummaryFromBadgeFilter(); applyFiltersAndRender();">
<option value="galloner">Galloner</option>
<option value="bronze">Bronze</option>
<option value="silver">Silver</option>
<option value="gold">Gold</option>
</select>

<select id="awardFilter" onchange="applyFiltersAndRender()">
<option value="">All Award Status</option>
<option value="awarded">Awarded</option>
<option value="not_awarded">Not Awarded</option>
<option value="to_be_awarded_this_year">To Be Awarded This Year</option>
</select>

<input type="number" id="yearAwardedFilter" placeholder="Year Awarded" min="1900" max="2999" oninput="applyFiltersAndRender()" style="width:140px;">

<select id="sortFilter" onchange="applyFiltersAndRender()">
<option value="nameAsc">Sort: Name A-Z</option>
<option value="nameDesc">Sort: Name Z-A</option>
<option value="qualifiedDesc">Sort: Highest Donations</option>
<option value="qualifiedAsc">Sort: Lowest Donations</option>
</select>

<button class="to-award-btn" onclick="showToBeAwardedThisYear()">To Be Awarded This Year</button>
<button class="top-btn" onclick="clearAwardFilters()">Clear Award Filter</button>
<button class="reload-btn" onclick="invalidateCache(); fetchEligibleDonors()">Reload</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>

<!-- Print / Export menu — single button replaces a cramped row of 8 buttons -->
<div class="print-menu-wrap">
<button class="print-menu-trigger" id="printMenuTrigger" type="button" onclick="togglePrintMenu(event)">
🖨️ Print / Export <span class="print-menu-caret">▾</span>
</button>
<div class="print-menu" id="printMenu" role="menu">
<div class="print-menu-section-label">Print by Award Type</div>
<button type="button" role="menuitem" class="print-menu-item dot-galloner" onclick="runFromPrintMenu(()=>printByBadge('galloner'))">Print Galloners</button>
<button type="button" role="menuitem" class="print-menu-item dot-bronze"   onclick="runFromPrintMenu(()=>printByBadge('bronze'))">Print Bronze</button>
<button type="button" role="menuitem" class="print-menu-item dot-silver"   onclick="runFromPrintMenu(()=>printByBadge('silver'))">Print Silver</button>
<button type="button" role="menuitem" class="print-menu-item dot-gold"     onclick="runFromPrintMenu(()=>printByBadge('gold'))">Print Gold</button>
<button type="button" role="menuitem" class="print-menu-item dot-warn"     onclick="runFromPrintMenu(()=>printNotAwarded())">Print Not Yet Awarded</button>

<div class="print-menu-divider"></div>
<div class="print-menu-section-label">Current View</div>
<button type="button" role="menuitem" class="print-menu-item" onclick="runFromPrintMenu(()=>printFilteredView())">Print Current Tab (filtered)</button>

function escapeHtml(text){
return String(text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;")
.replace(/"/g, "&quot;")
.replace(/'/g, "&#39;");
}

function escapeHtmlToTextarea(text){
return String(text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;");
}

function escapeCSV(value){
let text = String(value || "");
return `"${text.replace(/"/g,'""')}"`;
}

function safeText(value){
return String(value || "").trim();
}

function normalizeText(value){
return safeText(value)
.toLowerCase()
.replace(/\s+/g," ")
.replace(/[^a-z0-9 ]/g,"");
}

function normalizeBirthday(value){
if(!value) return "";

if(typeof value === "object" && value.seconds){
let date = new Date(value.seconds * 1000);
return formatDateToYMD(date);
}

if(typeof value === "object" && typeof value.toDate === "function"){
let date = value.toDate();
return formatDateToYMD(date);
}

let text = safeText(value);
if(!text) return "";

let parsed = new Date(text);
if(!isNaN(parsed.getTime())){
return formatDateToYMD(parsed);
}

return text.replace(/\//g,"-").replace(/\./g,"-").toLowerCase();
}

function formatDateToYMD(date){
let y = date.getFullYear();
let m = String(date.getMonth() + 1).padStart(2,"0");
let d = String(date.getDate()).padStart(2,"0");
return `${y}-${m}-${d}`;
}

function splitFullName(fullName){
let txt = safeText(fullName);
if(!txt) return { firstName:"", middleName:"", surname:"" };
let parts = txt.split(/\s+/).filter(Boolean);
if(parts.length === 1) return { firstName:parts[0], middleName:"", surname:"" };
if(parts.length === 2) return { firstName:parts[0], middleName:"", surname:parts[1] };
return {
firstName: parts[0],
middleName: parts.slice(1, parts.length - 1).join(" "),
surname: parts[parts.length - 1]
};
}

function getPossibleFirstName(data){
if(data.firstName || data.firstname || data.givenName) return data.firstName || data.firstname || data.givenName || "";
let split = splitFullName(data.fullName || data.name || data.donorName || "");
return split.firstName;
}

function getPossibleMiddleName(data){
if(data.middleName || data.middlename || data.middle) return data.middleName || data.middlename || data.middle || "";
let split = splitFullName(data.fullName || data.name || data.donorName || "");
return split.middleName;
}

function getPossibleSurname(data){
if(data.surname || data.lastName || data.lastname || data.familyName) return data.surname || data.lastName || data.lastname || data.familyName || "";
let split = splitFullName(data.fullName || data.name || data.donorName || "");
return split.surname;
}

function getPossibleBirthday(data){
return data.birthday || data.birthDate || data.dateOfBirth || data.dob || data.birth || "";
}

function getPossibleDonationDate(data){
let fields = [
data.date,
data.donationDate,
data.collectionDate,
data.dateDonated,
data.entryDate,
data.bleedingDate,
data.createdAt,
data.importDate,
data.dateTested
];

for(let i=0;i<fields.length;i++){
let normalized = normalizeBirthday(fields[i]);
if(normalized) return normalized;
}

return "";
}

function getPossibleSerialNumber(data){
let fields = [
data.serialNumber,
data.serial,
data.bagSerial,
data.bloodBagSerial,
data.unitSerial,
data.unitNumber,
data.unitNo,
data.serialNo,
data.donationSerial,
data.bagNumber,
data.bagNo,
data.bloodBagNumber,
data.bloodBagNo,
data.donorSerialNumber,
data.donationSerialNumber
];

for(let i=0;i<fields.length;i++){
let value = safeText(fields[i]);
if(value) return value;
}

return "";
}

function getPossibleBloodType(data){
return data.bloodType || data.blood || data.blood_group || data.type || "";
}

function getPossibleRhFactor(data){
return data.rhFactor || data.rh || data.rhesus || "";
}

function getPossibleContact(data){
return data.contact || data.contactNumber || data.mobile || data.phone || data.contactNo || "";
}

// Normalize a phone/contact number for IDENTITY matching only. Strips every
// non-digit so "0921-432-1989", "+639214321989", "9214321989" all reduce to
// the same string. Returns "" for inputs that have fewer than 6 digits — too
// short to reliably identify a person (and likely a partial entry).
function normalizeContact(value){
let digits = String(value || "").replace(/[^0-9]/g, "");
// Strip leading "63" (PH country code) and "0" so all formats normalize equal:
// "09214321989", "+639214321989", "639214321989", "9214321989" → same.
if(digits.length >= 12 && digits.startsWith("63")) digits = digits.slice(2);
if(digits.length >= 11 && digits.startsWith("0")) digits = digits.slice(1);
if(digits.length < 6) return ""; // too short to be a useful identity signal
return digits;
}

function buildFullKey(firstName,surname,birthday,middleName=""){
return [
normalizeText(firstName),
normalizeText(surname),
normalizeBirthday(birthday),
normalizeText(middleName)
].join("|");
}

function buildNoMiddleKey(firstName,surname,birthday){
return [
normalizeText(firstName),
normalizeText(surname),
normalizeBirthday(birthday)
].join("|");
}

function buildNameOnlyKey(firstName,surname){
return [
normalizeText(firstName),
normalizeText(surname)
].join("|");
}

function parseDonationNumber(value){
if(value === null || value === undefined || value === "") return 0;
let cleaned = String(value).replace(/[^0-9]/g,"");
let num = parseInt(cleaned,10);
return isNaN(num) ? 0 : num;
}

function getRecordDonationCount(record){
let possibleFields = [
record.numberOfDonations,
record.donationCount,
record.noOfDonations,
record.no_of_donations,
record.donationNo,
record.donationNumber,
record.totalDonations,
record.timesDonated,
record.donations,
record.donation_count,
record.count,
record.donationNoCount,
record.noDonation,
record.numberDonation,
record.noOfDonation,
record["No. of Donations"],
record["No of Donations"],
record["Donation No"],
record["Donation Count"],
record["Times Donated"]
];

for(let i=0;i<possibleFields.length;i++){
let num = parseDonationNumber(possibleFields[i]);
if(num > 0) return num;
}
return 0;
}

function buildUniqueDonationFingerprint(record){
let donationNo = getRecordDonationCount(record);
let serial = normalizeText(getPossibleSerialNumber(record));
let date = getPossibleDonationDate(record);
let firstName = normalizeText(getPossibleFirstName(record));
let surname = normalizeText(getPossibleSurname(record));
let birthday = normalizeBirthday(getPossibleBirthday(record));
return [firstName,surname,birthday,date,serial,donationNo].join("|");
}

function inferDonorsCollectionCount(donor){
let serialCount = Array.isArray(donor.serials) ? donor.serials.length : 0;

let possibleCounts = [
donor.numberOfDonations,
donor.donationCount,
donor.noOfDonations,
donor.no_of_donations,
donor.donationNo,
donor.donationNumber,
donor.totalDonations,
donor.timesDonated,
donor.donations,
donor.count
];

let highestEncodedCount = 0;

for(let i=0;i<possibleCounts.length;i++){
let raw = possibleCounts[i];
let num = parseDonationNumber(raw);
if(num > highestEncodedCount){
highestEncodedCount = num;
}
}

return {
serialCount: serialCount,
count: Math.max(serialCount, highestEncodedCount)
};
}

function makeAggregate(firstName,middleName,surname,birthday){
return {
firstName: safeText(firstName),
middleName: safeText(middleName),
surname: safeText(surname),
birthday: birthday || "",
bloodType: "",
rhFactor: "",
contact: "",
maxDonationCount: 0,
// "Latest record" tracking — for a more accurate count than just max().
// Some encoders update the donation-count field each entry; if that's
// the case the LATEST entry's count is the truest current count.
// Falls back to maxDonationCount when no dated records exist.
latestDonationDate: "",      // YYYY-MM-DD of the most recent donation
latestRecordCount: 0,        // donation count from that latest record
fingerprints: new Set(),
docIds: [],
detailRows: []
};
}

function applyRecordToAggregate(bucket, record){
let count = getRecordDonationCount(record);
let fp = buildUniqueDonationFingerprint(record);
bucket.fingerprints.add(fp);

if(count > bucket.maxDonationCount) bucket.maxDonationCount = count;

// Track the LATEST record's count separately. If this record's donation
// date is newer than what we've seen for this bucket so far, its
// donation-count field is the truest "current" count of how many times
// the donor has donated. We DON'T require the count to be higher — even
// a lower count from a newer record might be more accurate (e.g. if an
// older record had a typo'd inflated number).
let recDate = normalizeBirthday(getPossibleDonationDate(record));
if(recDate && recDate >= (bucket.latestDonationDate || "")){
bucket.latestDonationDate = recDate;
if(count > 0) bucket.latestRecordCount = count;
}

if(!bucket.bloodType && getPossibleBloodType(record)) bucket.bloodType = getPossibleBloodType(record);
if(!bucket.rhFactor && getPossibleRhFactor(record)) bucket.rhFactor = getPossibleRhFactor(record);
if(!bucket.contact && getPossibleContact(record)) bucket.contact = getPossibleContact(record);

if(record.id){
bucket.docIds.push(record.id);
}

let row = {
docId: record.id || "",
source: "donorDatabase",
serial: safeText(getPossibleSerialNumber(record)),
date: safeText(getPossibleDonationDate(record)),
count: getRecordDonationCount(record)
};

if(row.serial || row.date || row.count){
bucket.detailRows.push(row);
}
}

// ─── FUZZY NAME MATCHING ─────────────────────────────────────────────────────
// Some encoders typo donor names (e.g. MARIA vs MARYA, JOHN vs JON), creating
// duplicate buckets that split the donation count. We tolerate small typos
// when OTHER strong identifiers also match — birthday is the anchor.
//
// Rule of thumb: same birthday + close-enough names = same person.
// Without the birthday anchor, fuzzy matching is too risky (lots of common
// name typo-collisions aren't actually the same person).

// Levenshtein edit distance with early-exit if it exceeds maxDist (perf).
function levenshteinBounded(a, b, maxDist){
let s = String(a || ""), t = String(b || "");
if(s === t) return 0;
let n = s.length, m = t.length;
if(Math.abs(n - m) > maxDist) return maxDist + 1;
if(n === 0) return m;
if(m === 0) return n;

let prev = new Array(m + 1);
let curr = new Array(m + 1);
for(let j = 0; j <= m; j++) prev[j] = j;

for(let i = 1; i <= n; i++){
curr[0] = i;
let rowMin = curr[0];
let si = s.charCodeAt(i - 1);
for(let j = 1; j <= m; j++){
let cost = (si === t.charCodeAt(j - 1)) ? 0 : 1;
let val = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
curr[j] = val;
if(val < rowMin) rowMin = val;
}
// Early exit: if every value in this row already exceeds maxDist, the
// final answer can only get larger.
if(rowMin > maxDist) return maxDist + 1;
let tmp = prev; prev = curr; curr = tmp;
}
return prev[m];
}

// Adaptive thresholds: short names tolerate fewer edits than long ones, so a
// 1-letter typo in JON/JON is too aggressive but a 2-letter typo in JONATHAN
// is reasonable. Returns true if the names are considered "close enough".
function namesAreFuzzyClose(a, b, kind){
// kind: "first" or "surname"
let A = normalizeText(a), B = normalizeText(b);
if(!A || !B) return false;
if(A === B) return true;

// Exact-substring match (handles "JOHN" vs "JOHNNY" — same root)
if(A.length >= 4 && B.length >= 4 && (A.startsWith(B) || B.startsWith(A))) return true;

let len = Math.max(A.length, B.length);
// Choose max allowed edit distance based on length
let maxDist;
if(kind === "surname"){
// Surnames: stricter (shouldn't differ by much)
if(len <= 4) maxDist = 0;        // 4-char surname must match exactly
else if(len <= 7) maxDist = 1;   // 5-7 chars: allow 1 typo
else maxDist = 2;                // 8+ chars: allow 2 typos
} else {
// First names: a touch more lenient
if(len <= 3) maxDist = 0;
else if(len <= 5) maxDist = 1;   // MARIA / MARYA → 1 edit, allowed
else if(len <= 8) maxDist = 2;
else maxDist = 2;                // cap at 2 even for long names
}

let dist = levenshteinBounded(A, B, maxDist);
return dist <= maxDist;
}

// Tries to find an existing aggregate that matches a record by combining
// fuzzy name matching with a CORROBORATING strong signal (any one of:
// matching birthday, matching contact number, or exact full-name match).
//
// The new rule: fuzzy names alone are NOT enough — there must be at least
// one other identity signal that agrees. This catches the cases where:
//   • Same name, different birthday entry → contact match still merges
//   • Typo'd name, missing birthday → contact match still merges
//   • Exact name match, missing both → don't merge (fuzzy could be coincidence)
//
// Returns the bucket if exactly one good match exists.
//
// PERFORMANCE: Lookups iterate a SMALL candidate set. We try birthday-first
// (normally the strongest filter), then contact-first if no birthday, then
// fall back to scanning all buckets only as a last resort.
function findFuzzyAggregate(noMiddleMap, firstName, surname, birthday, contact, middleName, indexes){
let bday = normalizeBirthday(birthday);
let phone = normalizeContact(contact);
let firstNorm = normalizeText(firstName);
let surnameNorm = normalizeText(surname);
let middleNorm = normalizeText(middleName || "");

// Need ENOUGH name signal to even consider — empty names can't match anyone.
if(!firstNorm || !surnameNorm) return null;

// Build the candidate pool — combine birthday-shared and contact-shared
// buckets so we don't miss either side. Dedupe via a Set.
let candidatePool = new Set();
if(indexes && bday && indexes.byBirthday && indexes.byBirthday.has(bday)){
indexes.byBirthday.get(bday).forEach(b => candidatePool.add(b));
}
if(indexes && phone && indexes.byContact && indexes.byContact.has(phone)){
indexes.byContact.get(phone).forEach(b => candidatePool.add(b));
}

// If we have NO indexed candidates at all and no birthday/contact to anchor,
// we cannot safely fuzzy-merge — would produce false positives.
if(candidatePool.size === 0){
if(!bday && !phone){
// Last-resort: scan all buckets to find an EXACT full-name match
// (firstName + surname + middleName + birthday all equal). This is
// just a safety net — it shouldn't match anything that the fullKey
// lookup wouldn't already have caught, but if middle-name spelling
// differs by punctuation, we still recover here.
let keys = Object.keys(noMiddleMap);
for(let i = 0; i < keys.length; i++){
let b = noMiddleMap[keys[i]];
if(!b) continue;
if(normalizeText(b.firstName) === firstNorm
&& normalizeText(b.surname) === surnameNorm
&& normalizeText(b.middleName) === middleNorm
&& normalizeBirthday(b.birthday) === bday){
candidatePool.add(b);
}
}
}
}

let candidates = [];
candidatePool.forEach(bucket => {
if(!bucket) return;
if(!namesAreFuzzyClose(firstName, bucket.firstName, "first")) return;
if(!namesAreFuzzyClose(surname, bucket.surname, "surname")) return;

// Names are close — now check for at least ONE corroborating signal.
let signals = 0;
let bucketBday = normalizeBirthday(bucket.birthday);
let bucketPhone = normalizeContact(bucket.contact);
if(bday && bucketBday && bday === bucketBday) signals++;
if(phone && bucketPhone && phone === bucketPhone) signals++;
// Exact full-name (incl. middle) — strong identity signal even without
// birthday/contact, when names match perfectly post-normalization.
if(normalizeText(bucket.firstName) === firstNorm
&& normalizeText(bucket.surname) === surnameNorm
&& normalizeText(bucket.middleName) === middleNorm){
signals++;
}

if(signals >= 1) candidates.push(bucket);
});

if(candidates.length === 1) return candidates[0];
// More than one candidate = ambiguous — don't auto-merge (safety).
return null;
}

function aggregateDonorDatabase(records){
let fullMap = {};
let noMiddleMap = {};
let nameOnlyMap = {};
// Identity indexes — fast lookup for fuzzy matching: maps a strong identity
// signal (birthday, contact) → array of noMiddleMap buckets that match.
// Two indexes used together let us catch records that share EITHER a
// birthday OR a contact number with an existing bucket.
let byBirthday = new Map();
let byContact  = new Map();
let indexes = { byBirthday, byContact };

for(let i=0;i<records.length;i++){
let record = records[i];
let firstName = getPossibleFirstName(record);
let middleName = getPossibleMiddleName(record);
let surname = getPossibleSurname(record);
let birthday = getPossibleBirthday(record);
let contact = getPossibleContact(record);

if(!normalizeText(firstName) || !normalizeText(surname)) continue;

let fullKey = buildFullKey(firstName,surname,birthday,middleName);
let noMiddleKey = buildNoMiddleKey(firstName,surname,birthday);
let nameOnlyKey = buildNameOnlyKey(firstName,surname);

if(!fullMap[fullKey]) fullMap[fullKey] = makeAggregate(firstName,middleName,surname,birthday);

// FUZZY UPGRADE for noMiddleMap: before creating a new bucket for an exact
// firstname+surname+birthday combo, see if there's an existing bucket that
// fuzzy-matches WITH at least one corroborating signal (birthday/contact/
// exact full name). If so, alias this key onto that existing bucket so all
// the donations consolidate into one record.
if(!noMiddleMap[noMiddleKey]){
let fuzzyBucket = findFuzzyAggregate(noMiddleMap, firstName, surname, birthday, contact, middleName, indexes);
if(fuzzyBucket){
noMiddleMap[noMiddleKey] = fuzzyBucket; // alias — both keys now point to the same bucket
} else {
let newBucket = makeAggregate(firstName,middleName,surname,birthday);
// Carry the contact through immediately so the index has it on the
// very first record (otherwise the contact index never indexes a
// bucket whose first record is the only record).
if(!newBucket.contact && contact) newBucket.contact = safeText(contact);
noMiddleMap[noMiddleKey] = newBucket;
// Add the new bucket to BOTH indexes for fast future fuzzy lookups
let bday = normalizeBirthday(birthday);
if(bday){
let arr = byBirthday.get(bday);
if(!arr){ arr = []; byBirthday.set(bday, arr); }
arr.push(newBucket);
}
let phone = normalizeContact(contact);
if(phone){
let arr = byContact.get(phone);
if(!arr){ arr = []; byContact.set(phone, arr); }
arr.push(newBucket);
}
}
}

if(!nameOnlyMap[nameOnlyKey]) nameOnlyMap[nameOnlyKey] = makeAggregate(firstName,middleName,surname,birthday);

applyRecordToAggregate(fullMap[fullKey], record);
applyRecordToAggregate(noMiddleMap[noMiddleKey], record);
applyRecordToAggregate(nameOnlyMap[nameOnlyKey], record);

// After applying, the bucket may have just acquired its first contact —
// add it to the contact index now so subsequent records can find it.
let bucket = noMiddleMap[noMiddleKey];
let bucketPhone = normalizeContact(bucket.contact);
if(bucketPhone){
let arr = byContact.get(bucketPhone);
if(!arr){ arr = []; byContact.set(bucketPhone, arr); }
if(arr.indexOf(bucket) === -1) arr.push(bucket);
}
}

return { fullMap, noMiddleMap, nameOnlyMap, indexes };
}

function dedupeDetailRows(rows){
let seen = {};
let result = [];

for(let i=0;i<rows.length;i++){
let row = rows[i] || {};
let key = [
safeText(row.source),
safeText(row.docId),
safeText(row.serial),
safeText(row.date),
safeText(row.count)
].join("|");

if(!seen[key]){
seen[key] = true;
result.push(row);
}
}

result.sort((a,b)=>{
let dateA = safeText(a.date);
let dateB = safeText(b.date);
if(dateA !== dateB) return dateB.localeCompare(dateA);
return safeText(a.serial).localeCompare(safeText(b.serial), undefined, { numeric:true, sensitivity:"base" });
});

return result;
}

function aggregateToResult(bucket, source){
if(!bucket){
return {
source: "No Match",
matchedRows: 0,
countFromDatabase: 0,
bloodType: "",
rhFactor: "",
contact: "",
detailRows: [],
docIds: [],
latestDonationDate: "",
latestRecordCount: 0
};
}

let matchedRows = bucket.fingerprints ? bucket.fingerprints.size : 0;

// Smartest count = max(latest-record count, max-ever-seen count, serial evidence).
// Serial evidence is the FLOOR (we have proof of N donations from N distinct
// fingerprints, so the donor has at least donated that many times).
// The latest record's count is usually the most up-to-date number, but if a
// previous record happened to have a higher number, max() preserves it as
// belt-and-suspenders for buggy data.
let finalCount = Math.max(
bucket.latestRecordCount || 0,
bucket.maxDonationCount  || 0,
matchedRows              || 0
);

return {
source: source,
matchedRows: matchedRows,
countFromDatabase: finalCount,
bloodType: bucket.bloodType || "",
rhFactor: bucket.rhFactor || "",
contact: bucket.contact || "",
detailRows: dedupeDetailRows(bucket.detailRows || []),
docIds: Array.from(new Set(bucket.docIds || [])),
latestDonationDate: bucket.latestDonationDate || "",
latestRecordCount: bucket.latestRecordCount || 0
};
}

function getAggregateResultForDonor(donor, aggregates){
let firstName = getPossibleFirstName(donor);
let middleName = getPossibleMiddleName(donor);
let surname = getPossibleSurname(donor);
let birthday = getPossibleBirthday(donor);
let contact = getPossibleContact(donor);

let fullKey = buildFullKey(firstName,surname,birthday,middleName);
let noMiddleKey = buildNoMiddleKey(firstName,surname,birthday);
let nameOnlyKey = buildNameOnlyKey(firstName,surname);

if(aggregates.fullMap[fullKey]) return aggregateToResult(aggregates.fullMap[fullKey], "Exact Match");
if(aggregates.noMiddleMap[noMiddleKey]) return aggregateToResult(aggregates.noMiddleMap[noMiddleKey], "No Middle Name Match");

// Smart fuzzy match — close-enough names + at least one corroborating signal
// (matching birthday OR contact OR exact full-name). Catches encoder typos
// like MARIA vs MARYA or LEONARDO duplicates with same contact.
let fuzzyBucket = findFuzzyAggregate(aggregates.noMiddleMap, firstName, surname, birthday, contact, middleName, aggregates.indexes);
if(fuzzyBucket) return aggregateToResult(fuzzyBucket, "Smart Match (identity-corroborated)");

if(aggregates.nameOnlyMap[nameOnlyKey]) return aggregateToResult(aggregates.nameOnlyMap[nameOnlyKey], "Name Only Match");

return aggregateToResult(null, "No Match");
}

function mergeSerialRowsFromDonors(serials){
let rows = [];

if(Array.isArray(serials)){
for(let i=0;i<serials.length;i++){
let s = serials[i] || {};
let serial = safeText(s.serial || s.serialNumber || s.unitSerial || "");
let date = safeText(normalizeBirthday(s.date || s.entryDate || s.donationDate || "") || safeText(s.date || s.entryDate || s.donationDate || ""));
if(serial || date){
rows.push({
docId: "",
source: "donors",
serial: serial,
date: date,
count: 0
});
}
}
}

return rows;
}

function buildSerialsArrayFromDetailRows(detailRows){
let serials = [];
let seen = {};

for(let i=0;i<detailRows.length;i++){
let row = detailRows[i] || {};
let serial = safeText(row.serial);
let date = safeText(row.date);
if(!serial && !date) continue;

let key = [serial, date].join("|");
if(seen[key]) continue;
seen[key] = true;

serials.push({
serial: serial,
date: date
});
}

return serials;
}

function mergeBothCollections(donorsDocs, donorDatabaseDocs){
let aggregates = aggregateDonorDatabase(donorDatabaseDocs);
let mergedList = [];
let usedFullKeys = new Set();

for(let i=0;i<donorsDocs.length;i++){
let data = donorsDocs[i];

let firstName = getPossibleFirstName(data);
let middleName = getPossibleMiddleName(data);
let surname = getPossibleSurname(data);
let birthday = getPossibleBirthday(data);

let donorSide = inferDonorsCollectionCount(data);
let aggregateResult = getAggregateResultForDonor(data, aggregates);

// Smart count = max of (latest-record count from DB aggregates, donors-side
// count, and the records-evidence floor from countFromDatabase).
// The latest-record value reflects the most current encoded "no. of
// donations" — usually the truest current count when encoders update that
// field on each visit.
let finalCount = Math.max(
donorSide.count || 0,
aggregateResult.countFromDatabase || 0,
aggregateResult.latestRecordCount || 0
);

let sourceLabel = "Donors Only";
if(aggregateResult.countFromDatabase > 0 && donorSide.count > 0){
sourceLabel = "Merged";
}else if(aggregateResult.countFromDatabase > 0){
sourceLabel = "Donor Database";
}else if(donorSide.serialCount > 0){
sourceLabel = "Serial Count";
}

let mergedDetailRows = dedupeDetailRows([
...mergeSerialRowsFromDonors(data.serials),
...(aggregateResult.detailRows || [])
]);

let item = {
id: data.id || "",
firstName: safeText(firstName),
middleName: safeText(middleName),
surname: safeText(surname),
birthday: birthday || "",
bloodType: safeText(data.bloodType || aggregateResult.bloodType || ""),
rhFactor: safeText(data.rhFactor || aggregateResult.rhFactor || ""),
contact: safeText(data.contact || aggregateResult.contact || ""),
serials: Array.isArray(data.serials) ? data.serials : [],
serialCount: donorSide.serialCount || 0,
remarks: safeText(data.remarks || ""),
awardStatus: safeText(data.awardStatus || "NOT AWARDED").toUpperCase() || "NOT AWARDED",
yearAwarded: safeText(data.yearAwarded || ""),
smartDonationCount: finalCount,
smartMatchedRows: aggregateResult.matchedRows || 0,
smartMatchSource: sourceLabel,
badgeLevel: getBadgeLevel(finalCount),
canEdit: true,
canDelete: true,
donorDatabaseDocIds: aggregateResult.docIds || [],
detailRows: mergedDetailRows,
// Carry the latest-record info onto the item so the post-pass can use it
// when consolidating duplicates (whichever item has the most recent
// donation date wins as the canonical count).
latestDonationDate: aggregateResult.latestDonationDate || "",
latestRecordCount: aggregateResult.latestRecordCount || 0
};

if(item.smartDonationCount >= categoryLimits.galloner){
mergedList.push(item);
}

usedFullKeys.add(buildFullKey(firstName,surname,birthday,middleName));
}

// Phase 2: emit donorDatabase-only items for fullMap buckets the donors
// collection didn't touch. If the same person has multiple fullMap buckets
// (different middle-name spellings, etc.) this emits multiple items —
// `consolidateFuzzyDuplicates` cleans those up afterward using the
// multi-signal identity check (name + birthday/contact/full-name match).
Object.keys(aggregates.fullMap).forEach(key=>{
if(usedFullKeys.has(key)) return;

let bucket = aggregates.fullMap[key];
let matchedRows = bucket.fingerprints ? bucket.fingerprints.size : 0;
// Same prefer-latest count math as Phase 1.
let smartDonationCount = Math.max(
bucket.latestRecordCount || 0,
bucket.maxDonationCount  || 0,
matchedRows              || 0
);

if(smartDonationCount < categoryLimits.galloner) return;

mergedList.push({
id: "",
firstName: safeText(bucket.firstName),
middleName: safeText(bucket.middleName),
surname: safeText(bucket.surname),
birthday: bucket.birthday || "",
bloodType: safeText(bucket.bloodType || ""),
rhFactor: safeText(bucket.rhFactor || ""),
contact: safeText(bucket.contact || ""),
serials: [],
serialCount: 0,
remarks: "",
awardStatus: "NOT AWARDED",
yearAwarded: "",
smartDonationCount: smartDonationCount,
smartMatchedRows: matchedRows,
smartMatchSource: "Donor Database Only",
badgeLevel: getBadgeLevel(smartDonationCount),
canEdit: true,
canDelete: true,
donorDatabaseDocIds: Array.from(new Set(bucket.docIds || [])),
detailRows: dedupeDetailRows(bucket.detailRows || []),
latestDonationDate: bucket.latestDonationDate || "",
latestRecordCount: bucket.latestRecordCount || 0
});
});

// ─── FUZZY POST-PASS ─────────────────────────────────────────────────────
// If the donors collection itself has typo-duplicates (e.g. one doc as
// MARIA SANTOS and another as MARYA SANTOS, same birthday), Phase 1 produces
// two separate items. Walk mergedList and consolidate any pairs that
// fuzzy-match. The "winner" keeps the editable id; the loser's serials,
// detail rows, donation count, doc-ids merge into the winner.
mergedList = consolidateFuzzyDuplicates(mergedList);

return mergedList;
}

// Walks a list of merged items and combines fuzzy duplicates into a single
// record. Identity = close names + at least one corroborating signal
// (matching birthday OR matching contact OR exact full-name match).
//
// PERFORMANCE: We bucket items by both birthday and contact, then only
// fuzzy-compare within those buckets. This catches duplicates the original
// merge passes missed (Phase 1 + Phase 2 producing two separate items for
// the same donor when their middle names or other fields differ slightly).
function consolidateFuzzyDuplicates(items){
// Build candidate-pair set: any two items that share a birthday OR share
// a contact number OR have an exact full name match are considered for
// fuzzy comparison. We then verify with namesAreFuzzyClose().
let bdayBuckets = new Map();    // birthday → array of item indices
let contactBuckets = new Map(); // normalized phone → array of item indices
let nameBuckets = new Map();    // first|surname|middle → array of item indices

for(let i = 0; i < items.length; i++){
let it = items[i];
let bday = normalizeBirthday(it.birthday);
let phone = normalizeContact(it.contact);
let nameKey = normalizeText(it.firstName) + "|" + normalizeText(it.surname) + "|" + normalizeText(it.middleName || "");

if(bday){
let arr = bdayBuckets.get(bday);
if(!arr){ arr = []; bdayBuckets.set(bday, arr); }
arr.push(i);
}
if(phone){
let arr = contactBuckets.get(phone);
if(!arr){ arr = []; contactBuckets.set(phone, arr); }
arr.push(i);
}
if(nameKey !== "||" && nameKey.split("|").filter(Boolean).length >= 2){
let arr = nameBuckets.get(nameKey);
if(!arr){ arr = []; nameBuckets.set(nameKey, arr); }
arr.push(i);
}
}

// Build a map: index i → set of indices it should be compared against
let comparePairs = new Map();
function addPairs(group){
for(let a = 0; a < group.length; a++){
for(let b = a+1; b < group.length; b++){
let lo = Math.min(group[a], group[b]), hi = Math.max(group[a], group[b]);
let s = comparePairs.get(lo);
if(!s){ s = new Set(); comparePairs.set(lo, s); }
s.add(hi);
}
}
}
bdayBuckets.forEach(addPairs);
contactBuckets.forEach(addPairs);
nameBuckets.forEach(addPairs);

let merged = new Set();
let result = [];

for(let i = 0; i < items.length; i++){
if(merged.has(i)) continue;
let winner = items[i];
let winnerSerials = Array.isArray(winner.serials) ? [...winner.serials] : [];
let winnerDetails = Array.isArray(winner.detailRows) ? [...winner.detailRows] : [];
let winnerDocIds = Array.isArray(winner.donorDatabaseDocIds) ? [...winner.donorDatabaseDocIds] : [];
let bestCount = winner.smartDonationCount || 0;
let bestMatchedRows = winner.smartMatchedRows || 0;
let didMerge = false;

let candidateIndices = comparePairs.get(i);
if(candidateIndices){
candidateIndices.forEach(j => {
if(merged.has(j)) return;
let cand = items[j];

if(!namesAreFuzzyClose(winner.firstName, cand.firstName, "first")) return;
if(!namesAreFuzzyClose(winner.surname,   cand.surname,   "surname")) return;

// Names close — now confirm at least one corroborating signal.
let bdayW = normalizeBirthday(winner.birthday), bdayC = normalizeBirthday(cand.birthday);
let phoneW = normalizeContact(winner.contact), phoneC = normalizeContact(cand.contact);
let nameMatchExact = (
normalizeText(winner.firstName)  === normalizeText(cand.firstName)
&& normalizeText(winner.surname)    === normalizeText(cand.surname)
&& normalizeText(winner.middleName || "") === normalizeText(cand.middleName || "")
);
let signals = 0;
if(bdayW && bdayC && bdayW === bdayC) signals++;
if(phoneW && phoneC && phoneW === phoneC) signals++;
if(nameMatchExact) signals++;
if(signals < 1) return;

// Merge.
merged.add(j);
didMerge = true;

if(Array.isArray(cand.serials)){
for(let k = 0; k < cand.serials.length; k++) winnerSerials.push(cand.serials[k]);
}
if(Array.isArray(cand.detailRows)){
for(let k = 0; k < cand.detailRows.length; k++) winnerDetails.push(cand.detailRows[k]);
}
if(Array.isArray(cand.donorDatabaseDocIds)){
for(let k = 0; k < cand.donorDatabaseDocIds.length; k++) winnerDocIds.push(cand.donorDatabaseDocIds[k]);
}
if((cand.smartDonationCount || 0) > bestCount) bestCount = cand.smartDonationCount;
if((cand.smartMatchedRows || 0) > bestMatchedRows) bestMatchedRows = cand.smartMatchedRows;

// Prefer the latest-record's count if available — that's the truest "current"
// number. If the candidate has a more recent latestDonationDate, use ITS count.
let dW = winner.latestDonationDate || "", dC = cand.latestDonationDate || "";
if(dC && dC > dW){
winner.latestDonationDate = dC;
if((cand.latestRecordCount || 0) > 0){
winner.latestRecordCount = cand.latestRecordCount;
if(cand.latestRecordCount > bestCount) bestCount = cand.latestRecordCount;
}
}

// Carry forward whichever fields the winner is missing.
if(!winner.bloodType && cand.bloodType) winner.bloodType = cand.bloodType;
if(!winner.rhFactor && cand.rhFactor) winner.rhFactor = cand.rhFactor;
if(!winner.contact && cand.contact) winner.contact = cand.contact;
if(!winner.middleName && cand.middleName) winner.middleName = cand.middleName;
if(!winner.birthday && cand.birthday) winner.birthday = cand.birthday;
if(!winner.id && cand.id) winner.id = cand.id;
if(!winner.remarks && cand.remarks) winner.remarks = cand.remarks;
if((winner.awardStatus || "NOT AWARDED") !== "AWARDED" && cand.awardStatus === "AWARDED"){
winner.awardStatus = "AWARDED";
if(cand.yearAwarded && !winner.yearAwarded) winner.yearAwarded = cand.yearAwarded;
}
});
}

if(didMerge){
winner.serials = buildSerialsArrayFromDetailRows([
...mergeSerialRowsFromDonors(winnerSerials),
...winnerDetails
]);
winner.detailRows = dedupeDetailRows(winnerDetails);
winner.donorDatabaseDocIds = Array.from(new Set(winnerDocIds));
winner.smartDonationCount = bestCount;
winner.smartMatchedRows = bestMatchedRows;
winner.serialCount = winner.serials.length;
winner.badgeLevel = getBadgeLevel(bestCount);
let existing = safeText(winner.smartMatchSource || "");
if(existing && !/Consolidated/i.test(existing)){
winner.smartMatchSource = existing + " + Consolidated";
} else if(!existing){
winner.smartMatchSource = "Consolidated";
}
}

result.push(winner);
}

return result;
}

function timeoutPromise(ms, label){
return new Promise((_, reject)=>{
setTimeout(()=>{
reject(new Error(label + " timed out after " + ms + "ms"));
}, ms);
});
}

async function getCollectionWithTimeout(collectionName, timeoutMs){
return Promise.race([
db.collection(collectionName).get(),
timeoutPromise(timeoutMs, collectionName)
]);
}

// ─── PERSISTENT CACHE (stale-while-revalidate) ───────────────────────────────
// Reading from Firestore over the network is the dominant cost when the page
// loads. localStorage caches the last fetched data so a returning user sees
// the table within ~10ms while a fresh fetch happens in the background. When
// the fresh result arrives, the table is re-rendered with the latest data.
// Cache invalidates after CACHE_MAX_AGE_MS or whenever the user edits/saves.
const CACHE_KEY_DONORS    = "tracking_cache_donors_v1";
const CACHE_KEY_DATABASE  = "tracking_cache_donorDatabase_v1";
const CACHE_KEY_TIMESTAMP = "tracking_cache_ts_v1";
const CACHE_MAX_AGE_MS    = 24 * 60 * 60 * 1000; // 24h — but we always also revalidate

function readCache(){
try{
let ts = parseInt(localStorage.getItem(CACHE_KEY_TIMESTAMP) || "0", 10);
if(!ts) return null;
if(Date.now() - ts > CACHE_MAX_AGE_MS) return null;
let donors = JSON.parse(localStorage.getItem(CACHE_KEY_DONORS) || "null");
let database = JSON.parse(localStorage.getItem(CACHE_KEY_DATABASE) || "null");
if(!Array.isArray(donors)) return null;
return {
donors: donors,
database: Array.isArray(database) ? database : [],
ageMs: Date.now() - ts
};
}catch(e){
console.warn("Cache read failed:", e);
return null;
}
}

function writeCache(donorsDocs, donorDatabaseDocs){
try{
// localStorage has ~5MB limit. Strip server timestamps and big nested
// objects that can't be safely re-serialized.
let safeDonors = donorsDocs.map(d => {
let out = {};
Object.keys(d).forEach(k => {
let v = d[k];
if(v && typeof v === "object" && typeof v.toDate === "function"){
out[k] = v.toDate().toISOString();
} else {
out[k] = v;
}
});
return out;
});
let safeDatabase = donorDatabaseDocs.map(d => {
let out = {};
Object.keys(d).forEach(k => {
let v = d[k];
if(v && typeof v === "object" && typeof v.toDate === "function"){
out[k] = v.toDate().toISOString();
} else {
out[k] = v;
}
});
return out;
});
localStorage.setItem(CACHE_KEY_DONORS, JSON.stringify(safeDonors));
localStorage.setItem(CACHE_KEY_DATABASE, JSON.stringify(safeDatabase));
localStorage.setItem(CACHE_KEY_TIMESTAMP, String(Date.now()));
}catch(e){
// Cache is best-effort — quota errors etc. are silent
console.warn("Cache write failed (non-fatal):", e);
}
}

function invalidateCache(){
try{
localStorage.removeItem(CACHE_KEY_DONORS);
localStorage.removeItem(CACHE_KEY_DATABASE);
localStorage.removeItem(CACHE_KEY_TIMESTAMP);
}catch(e){ /* noop */ }
}

async function fetchEligibleDonors(){
if(isLoading) return;

if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

isLoading = true;

// ─── Step 1: Show cached data IMMEDIATELY (stale-while-revalidate) ────────
// If we have a recent cache, render it now so the user sees the table
// within ~10ms instead of waiting for the network. We then refresh in
// the background and re-render with the fresh data.
let cached = readCache();
let renderedFromCache = false;
if(cached){
try{
setStatus("Showing cached data — refreshing in background...", "loading");
donorsData = mergeBothCollections(cached.donors, cached.database);
applyFiltersAndRender();
renderedFromCache = true;
}catch(e){
console.warn("Failed to render from cache:", e);
}
}

if(!renderedFromCache){
setStatus("Loading eligible awardees...", "loading");
}

try{
// ─── Step 2: Parallel network fetch ───────────────────────────────────
// Old code awaited donors THEN donorDatabase serially. Doing them in
// parallel cuts the network wall-clock time by roughly half whenever
// the two collections take similar time (which is usually the case).
let [donorsResult, databaseResult] = await Promise.allSettled([
getCollectionWithTimeout("donors", 12000),
getCollectionWithTimeout("donorDatabase", 15000)
]);

if(donorsResult.status === "rejected"){
throw donorsResult.reason || new Error("donors collection failed to load");
}

let donorsSnap = donorsResult.value;
let donorDatabaseSnap;
if(databaseResult.status === "fulfilled"){
donorDatabaseSnap = databaseResult.value;
} else {
console.error("donorDatabase load warning:", databaseResult.reason);
donorDatabaseSnap = { docs: [] };
}

let donorsDocs = [];
donorsSnap.forEach(doc=>{
let data = doc.data() || {};
data.id = doc.id;
donorsDocs.push(data);
});

// ─── Step 3: Render donors-only IMMEDIATELY ───────────────────────────
// If we didn't render from cache, the donors collection alone is enough
// to start showing meaningful data. donorDatabase only enriches the
// counts — render now so the user sees something rather than an
// indefinite loading spinner while parsing the larger collection.
if(!renderedFromCache){
donorsData = mergeBothCollections(donorsDocs, []);
applyFiltersAndRender();
setStatus("Refining counts from donor database...", "loading");
}

let donorDatabaseDocs = [];
if(typeof donorDatabaseSnap.forEach === "function"){
donorDatabaseSnap.forEach(doc=>{
let data = doc.data() || {};
data.id = doc.id;
donorDatabaseDocs.push(data);
});
}else if(Array.isArray(donorDatabaseSnap.docs)){
for(let i=0;i<donorDatabaseSnap.docs.length;i++){
let doc = donorDatabaseSnap.docs[i];
if(typeof doc.data === "function"){
let data = doc.data() || {};
data.id = doc.id;
donorDatabaseDocs.push(data);
}
}
}

// ─── Step 4: Final merge with full data ───────────────────────────────
donorsData = mergeBothCollections(donorsDocs, donorDatabaseDocs);
applyFiltersAndRender();

// ─── Step 5: Persist cache for the next page load ─────────────────────
writeCache(donorsDocs, donorDatabaseDocs);

if(donorDatabaseDocs.length > 0){
setStatus(`Loaded successfully. Eligible donors: ${donorsData.length}. donors: ${donorsDocs.length}, donorDatabase: ${donorDatabaseDocs.length}`, "success");
}else{
setStatus(`Loaded donors collection. donorDatabase was unavailable, so only donors-side eligible counts are shown. Eligible donors: ${donorsData.length}`, "error");
}
}catch(error){
console.error("Fetch eligible donors error:", error);
if(!renderedFromCache){
donorsData = [];
applyFiltersAndRender();
}
setStatus("Failed to load eligible donors: " + error.message + (renderedFromCache ? " (showing cached data)" : ""), "error");
}finally{
isLoading = false;
}
}

function matchesAwardFilter(donor, awardFilter, yearFilter){
let status = safeText(donor.awardStatus || "NOT AWARDED").toUpperCase();
let yearAwarded = safeText(donor.yearAwarded || "");
let filterYear = safeText(yearFilter || "");

if(awardFilter === "awarded"){
if(status !== "AWARDED") return false;
if(filterYear && yearAwarded !== filterYear) return false;
return true;
}

if(awardFilter === "not_awarded"){
return status !== "AWARDED";
}

if(awardFilter === "to_be_awarded_this_year"){
let cy = String(currentYear());
if(filterYear && filterYear !== cy){
cy = filterYear;
}
return donor.smartDonationCount >= categoryLimits.galloner && !(status === "AWARDED" && yearAwarded === cy);
}

if(filterYear){
return yearAwarded === filterYear;
}

return true;
}

function applyFiltersAndRender(){
let bloodFilter = document.getElementById("bloodFilter").value;
let badgeFilter = document.getElementById("badgeFilter").value;
let awardFilter = document.getElementById("awardFilter").value;
let yearAwardedFilter = document.getElementById("yearAwardedFilter").value;
let sortFilter = document.getElementById("sortFilter").value;
let searchValue = document.getElementById("searchInput").value.toLowerCase().trim();

filteredDonorsData = donorsData.filter(d=>{
let donorBlood = String(d.bloodType || "");
let donorBadge = String(d.badgeLevel || "none");
let nameText = getFullName(d).toLowerCase();
let contactText = String(d.contact || "").toLowerCase();
let remarksText = String(d.remarks || "").toLowerCase();
let donationText = String(d.smartDonationCount || 0).toLowerCase();
let serialText = String(d.serialCount || 0).toLowerCase();
let awardText = `${d.awardStatus || ""} ${d.yearAwarded || ""}`.toLowerCase();

if(d.smartDonationCount < categoryLimits.galloner) return false;
if(bloodFilter && donorBlood !== bloodFilter) return false;
if(badgeFilter && donorBadge !== badgeFilter) return false;
if(!matchesAwardFilter(d, awardFilter, yearAwardedFilter)) return false;

if(searchValue){
let searchable = `${nameText} ${contactText} ${remarksText} ${donationText} ${serialText} ${donorBlood} ${awardText}`.toLowerCase();
if(!searchable.includes(searchValue)) return false;
}

return true;
});

filteredDonorsData.sort((a,b)=>{
if(sortFilter === "qualifiedAsc") return (a.smartDonationCount||0) - (b.smartDonationCount||0);
if(sortFilter === "qualifiedDesc") return (b.smartDonationCount||0) - (a.smartDonationCount||0);
if(sortFilter === "nameDesc") return getSortableName(b).localeCompare(getSortableName(a));
// Default: nameAsc
return getSortableName(a).localeCompare(getSortableName(b));
});

updateSummary();
syncSummaryFromBadgeFilter(); // keep the banner / active-tab state in sync after every render
renderTable();
}

function updateSummary(){
// All counts in the tabs/cards are TOTALS across the whole donorsData set
// — they don't shrink as you switch tabs or type into the search box.
// "Total Eligible" is the grand sum (Galloner + Bronze + Silver + Gold).
let allEligible = donorsData.filter(d => d.smartDonationCount >= categoryLimits.galloner);
document.getElementById("totalEligibleBox").innerText = allEligible.length;

document.getElementById("gallonerBox").innerText = allEligible.filter(d => d.smartDonationCount >= categoryLimits.galloner && d.smartDonationCount < categoryLimits.bronze).length;
document.getElementById("bronzeBox").innerText   = allEligible.filter(d => d.smartDonationCount >= categoryLimits.bronze   && d.smartDonationCount < categoryLimits.silver).length;
document.getElementById("silverBox").innerText   = allEligible.filter(d => d.smartDonationCount >= categoryLimits.silver   && d.smartDonationCount < categoryLimits.gold).length;
document.getElementById("goldBox").innerText     = allEligible.filter(d => d.smartDonationCount >= categoryLimits.gold).length;
}

function renderTable(){
let table = document.getElementById("donorTable");
let emptyBox = document.getElementById("emptyBox");

if(filteredDonorsData.length === 0){
table.innerHTML = "";
emptyBox.style.display = "block";
return;
}
emptyBox.style.display = "none";

// PERFORMANCE: Build the entire table HTML as an array, then set innerHTML
// ONCE at the end. The original code did `table.innerHTML += ...` inside a
// loop, which forces the browser to re-parse the entire table on every
// iteration — O(N²) string operations and DOM thrashing. With 500 rows
// this is the single largest render cost. Joining a string array is
// roughly 50-100x faster.
let parts = new Array(filteredDonorsData.length);
for(let index = 0; index < filteredDonorsData.length; index++){
let d = filteredDonorsData[index];
let donationCount = Number(d.smartDonationCount || 0);
let badge = getBadge(donationCount);
let bloodIcon = getBloodIcon(d.bloodType, d.rhFactor);
let hasRemarks = (d.remarks || "").trim() !== "";

// Count visible serials from detailRows
let allRows = Array.isArray(d.detailRows) ? d.detailRows : [];
let serialsWithValue = 0;
for(let r = 0; r < allRows.length; r++){
if(safeText(allRows[r].serial) !== "") serialsWithValue++;
}
let serialCountDisplay = serialsWithValue > 0 ? serialsWithValue : Number(d.serialCount || 0);

parts[index] = `<tr>
<td>${index+1}</td>
<td class="name-cell">
${escapeHtml(getFullName(d))}
${hasRemarks ? `<span class="remark-indicator">REMARK</span>` : ``}
</td>
<td>
${badge}
<div class="badge-count-label">${donationCount} Donation${donationCount === 1 ? "" : "s"}</div>
<div class="source-label">${escapeHtml(d.smartMatchSource || "")}</div>
</td>
<td>${bloodIcon} ${escapeHtml(d.bloodType||"")}${escapeHtml(d.rhFactor||"")}</td>
<td>${escapeHtml(d.contact||"")}</td>
<td>${renderAwardCell(d)}</td>
<td>
<div style="font-weight:bold;margin-bottom:4px;">${serialCountDisplay} Serial${serialCountDisplay === 1 ? "" : "s"}</div>
<button class="view-btn" onclick="toggleSerial(${index})">View Serials</button>
</td>
<td>
<button class="remarks-btn" onclick="openRemarksOnly(${index})">Remarks</button>
<button class="edit-btn" onclick="editEligibleDonor(${index})">Edit</button>
<button class="delete-btn" onclick="deleteEligibleDonor(${index})">Delete</button>
</td>
</tr>
<tr id="serialRow${index}" style="display:none;">
<td colspan="8">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>`;
}

table.innerHTML = parts.join("");
}

async function ensureDonorRecordForAward(index){
let donor = filteredDonorsData[index];

if(donor.id){
return donor.id;
}

let serialsToSync = buildSerialsArrayFromDetailRows(donor.detailRows || []);
let docRef = await db.collection("donors").add({
firstName: donor.firstName || "",
middleName: donor.middleName || "",
surname: donor.surname || "",
birthday: donor.birthday || "",
bloodType: donor.bloodType || "",
rhFactor: donor.rhFactor || "",
contact: donor.contact || "",
remarks: donor.remarks || "",
awardStatus: donor.awardStatus || "NOT AWARDED",
yearAwarded: donor.yearAwarded || "",
serials: serialsToSync,
createdFrom: "eligible-awardees-tracking",
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});

donor.id = docRef.id;
let mainIndex = donorsData.findIndex(x =>
normalizeText(getFullName(x)) === normalizeText(getFullName(donor)) &&
normalizeBirthday(x.birthday) === normalizeBirthday(donor.birthday)
);
if(mainIndex > -1){
donorsData[mainIndex].id = docRef.id;
}
return docRef.id;
}

async function saveAwardInfo(index){
if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

let donor = filteredDonorsData[index];
let statusEl = document.getElementById("awardStatus"+index);
let yearEl = document.getElementById("yearAwarded"+index);

if(!statusEl || !yearEl) return;

let awardStatus = safeText(statusEl.value || "NOT AWARDED").toUpperCase();
let yearAwarded = safeText(yearEl.value || "");

if(awardStatus === "NOT AWARDED"){
yearAwarded = "";
}

try{
let donorId = await ensureDonorRecordForAward(index);

await db.collection("donors").doc(donorId).update({
awardStatus: awardStatus,
yearAwarded: yearAwarded
});

let mainIndex = donorsData.findIndex(x => x.id === donorId);
if(mainIndex > -1){
donorsData[mainIndex].awardStatus = awardStatus;
donorsData[mainIndex].yearAwarded = yearAwarded;
}
filteredDonorsData[index].awardStatus = awardStatus;
filteredDonorsData[index].yearAwarded = yearAwarded;

applyFiltersAndRender();

let reopenedIndex = filteredDonorsData.findIndex(x => x.id === donorId || (normalizeText(getFullName(x)) === normalizeText(getFullName(donor)) && normalizeBirthday(x.birthday) === normalizeBirthday(donor.birthday)));
if(reopenedIndex > -1){
let reopenedRow = document.getElementById("serialRow"+reopenedIndex);
if(reopenedRow){
reopenedRow.style.display = "table-row";
renderSerialAndRemarks(reopenedIndex);
}
}

alert("Award info saved successfully.");
}catch(error){
console.error("Save award info error:", error);
alert("Error saving award info.");
}
}

function saveRemarks(index){
let donor = filteredDonorsData[index];
if(!donor.id){
alert("This donor is from Donor Database only. Please click Edit first so a donor record is created.");
return;
}

let textarea = document.getElementById("remarksText"+index);
if(!textarea) return;

let remarksValue = textarea.value.trim();

if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

db.collection("donors").doc(donor.id).update({
remarks: remarksValue
}).then(()=>{
let mainIndex = donorsData.findIndex(x => x.id === donor.id);
if(mainIndex > -1){
donorsData[mainIndex].remarks = remarksValue;
}
applyFiltersAndRender();

let reopenedIndex = filteredDonorsData.findIndex(x => x.id === donor.id);
if(reopenedIndex > -1){
let reopenedRow = document.getElementById("serialRow"+reopenedIndex);
if(reopenedRow){
reopenedRow.style.display = "table-row";
renderSerialAndRemarks(reopenedIndex);
}
}

alert("Remarks saved successfully.");
}).catch(error=>{
console.error("Remarks save error:", error);
alert("Error saving remarks.");
});
}

async function editEligibleDonor(index){
let donor = filteredDonorsData[index];

if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

try{
let serialsToSync = buildSerialsArrayFromDetailRows(donor.detailRows || []);

if(donor.id){
let donorRef = db.collection("donors").doc(donor.id);
let existingDoc = await donorRef.get();
let existingData = existingDoc.exists ? (existingDoc.data() || {}) : {};
let existingSerials = Array.isArray(existingData.serials) ? existingData.serials : [];

let merged = {};
for(let i=0;i<existingSerials.length;i++){
let s = existingSerials[i] || {};
let key = [safeText(s.serial), safeText(s.date)].join("|");
if(key !== "|"){
merged[key] = {
serial: safeText(s.serial),
date: safeText(s.date)
};
}
}
for(let i=0;i<serialsToSync.length;i++){
let s = serialsToSync[i] || {};
let key = [safeText(s.serial), safeText(s.date)].join("|");
if(key !== "|"){
merged[key] = {
serial: safeText(s.serial),
date: safeText(s.date)
};
}
}

await donorRef.update({
firstName: donor.firstName || "",
middleName: donor.middleName || "",
surname: donor.surname || "",
birthday: donor.birthday || "",
bloodType: donor.bloodType || "",
rhFactor: donor.rhFactor || "",
contact: donor.contact || "",
remarks: donor.remarks || existingData.remarks || "",
awardStatus: donor.awardStatus || existingData.awardStatus || "NOT AWARDED",
yearAwarded: donor.yearAwarded || existingData.yearAwarded || "",
serials: Object.values(merged)
});

window.location.href = "donor-entry.html?editId=" + donor.id;
return;
}

let docRef = await db.collection("donors").add({
firstName: donor.firstName || "",
middleName: donor.middleName || "",
surname: donor.surname || "",
birthday: donor.birthday || "",
bloodType: donor.bloodType || "",
rhFactor: donor.rhFactor || "",
contact: donor.contact || "",
remarks: donor.remarks || "",
awardStatus: donor.awardStatus || "NOT AWARDED",
yearAwarded: donor.yearAwarded || "",
serials: serialsToSync,
createdFrom: "eligible-awardees-tracking",
createdAt: firebase.firestore.FieldValue.serverTimestamp()
});

window.location.href = "donor-entry.html?editId=" + docRef.id;
}catch(error){
console.error("Create or sync donor record error:", error);
alert("Error preparing donor for edit.");
}
}

async function deleteEligibleDonor(index){
let donor = filteredDonorsData[index];

if(!auth.currentUser){
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

try{
if(donor.id){
if(confirm("Delete this donor record from donors collection?")){
await db.collection("donors").doc(donor.id).delete();
await fetchEligibleDonors();
}
return;
}

if(Array.isArray(donor.donorDatabaseDocIds) && donor.donorDatabaseDocIds.length){
if(confirm("Delete all matched donorDatabase records for this donor?")){
let ids = donor.donorDatabaseDocIds.slice();
for(let i=0;i<ids.length;i++){
await db.collection("donorDatabase").doc(ids[i]).delete();
}
await fetchEligibleDonors();
}
return;
}

alert("No deletable record found for this donor.");
}catch(error){
console.error("Delete eligible donor error:", error);
alert("Error deleting donor.");
}
}

// ─── PRINT / EXPORT DROPDOWN MENU ────────────────────────────────────────────
// Opens the dropdown next to the "Print / Export" button. Outside-click and
// Escape both close it. Items use runFromPrintMenu() so the menu always
// closes before the print/export function runs.
function togglePrintMenu(ev){
if(ev) ev.stopPropagation();
let menu = document.getElementById("printMenu");
let trigger = document.getElementById("printMenuTrigger");
if(!menu || !trigger) return;
let isOpen = menu.classList.toggle("show");
trigger.classList.toggle("open", isOpen);
}
function closePrintMenu(){
let menu = document.getElementById("printMenu");
let trigger = document.getElementById("printMenuTrigger");
if(menu) menu.classList.remove("show");
if(trigger) trigger.classList.remove("open");
}
function runFromPrintMenu(fn){
closePrintMenu();
try{ fn && fn(); }catch(e){ console.error("Print action failed:", e); }
}

// Close on outside-click and on Escape
document.addEventListener("click", function(ev){
let menu = document.getElementById("printMenu");
let trigger = document.getElementById("printMenuTrigger");
if(!menu || !menu.classList.contains("show")) return;
// Don't close if click was inside the menu or on the trigger
if(menu.contains(ev.target) || (trigger && trigger.contains(ev.target))) return;
closePrintMenu();
});
document.addEventListener("keydown", function(ev){
if(ev.key === "Escape") closePrintMenu();
});

function printFilteredView(){
printDataSet(filteredDonorsData, true);
}

function printWholeView(){
printDataSet(donorsData, false);
}

function printByBadge(level){
let badgeLabel = getBadgeLabelForPrint(level);
let subset = donorsData.filter(d => d.badgeLevel === level);
// Sort alphabetically by surname
subset.sort((a,b) => getSortableName(a).localeCompare(getSortableName(b)));
if(!subset.length){
alert("No " + badgeLabel + " donors found.");
return;
}
printDataSet(
subset,
false,
"Eligible Awardees — " + badgeLabel + " Level",
"Badge: " + badgeLabel + " | Total: " + subset.length + " donor" + (subset.length === 1 ? "" : "s") + " | Sorted A-Z"
);
}

function printNotAwarded(){
let subset = donorsData.filter(d => {
let status = safeText(d.awardStatus || "NOT AWARDED").toUpperCase();
return status !== "AWARDED";
});
// Sort alphabetically by surname
subset.sort((a,b) => getSortableName(a).localeCompare(getSortableName(b)));
if(!subset.length){
alert("No not-yet-awarded donors found.");
return;
}
printDataSet(
subset,
false,
"Not Yet Awarded — Eligible Donors",
"Award Status: NOT AWARDED | Total: " + subset.length + " donor" + (subset.length === 1 ? "" : "s") + " | Sorted A-Z"
);
}

function exportToCSV(){
let csv = "Blood Type,Rh Factor,First Name,Middle Name,Surname,Contact,Qualified Donation Count,Matched DonorDatabase Rows,Encoded Serial Count,Badge Level,Award Status,Year Awarded,Source,Remarks\n";

filteredDonorsData.forEach(d=>{
csv += `${escapeCSV(d.bloodType||"")},${escapeCSV(d.rhFactor||"")},${escapeCSV(d.firstName||"")},${escapeCSV(d.middleName||"")},${escapeCSV(d.surname||"")},${escapeCSV(d.contact||"")},${escapeCSV(d.smartDonationCount||0)},${escapeCSV(d.smartMatchedRows||0)},${escapeCSV(d.serialCount||0)},${escapeCSV((d.badgeLevel||"").toUpperCase())},${escapeCSV(d.awardStatus||"NOT AWARDED")},${escapeCSV(d.yearAwarded||"")},${escapeCSV(d.smartMatchSource||"")},${escapeCSV(d.remarks||"")}\n`;
});

let blob = new Blob([csv],{type:"text/csv"});
let url = window.URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "eligible-awardees-tracking.csv";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

window.URL.revokeObjectURL(url);
}

auth.onAuthStateChanged(function(user){
if(!user){
window.location.href = "index.html";
return;
}
fetchEligibleDonors();
});
