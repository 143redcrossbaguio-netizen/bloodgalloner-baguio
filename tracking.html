<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Tracking</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f4f4;}

header{
background:#b30000;
color:white;
padding:15px;
text-align:center;
}

.logo{
width:100px;
display:block;
margin:10px auto;
}

.container{
max-width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#b30000;
color:white;
}

.name-cell{
text-align:left;
font-weight:bold;
padding-left:10px;
}

.badge{
padding:3px 6px;
border-radius:4px;
font-size:11px;
color:white;
}

.badge-galloner{background:#1e88e5;}
.badge-bronze{background:#cd7f32;}
.badge-silver{background:#9e9e9e;}
.badge-gold{background:#d4af37;color:black;}

.blood-icon{
width:20px;
height:20px;
vertical-align:middle;
}

button{
padding:5px 8px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
}

.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.view-btn{background:#6a1b9a;}

.top-btn{background:#b30000;}

.serial-box{
background:#f9f9f9;
border:1px solid #ccc;
padding:10px;
border-radius:6px;
text-align:left;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
width:350px;
margin:100px auto;
padding:20px;
border-radius:10px;
}

.modal-content input{
width:100%;
padding:6px;
margin-bottom:10px;
}

.save-settings{background:#2e7d32;}
.close-settings{background:#444;}

</style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo">
<h2>Donor Tracking</h2>
</header>

<div class="container">

<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()">

<br><br>

<button class="top-btn" onclick="exportToCSV()">Export CSV</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>
<button class="top-btn" onclick="openSettings()">Category Settings</button>

<br><br>

<select id="bloodFilter" onchange="renderTable()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<br><br>

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Badge</th>
<th>Blood</th>
<th>Contact</th>
<th>Serial</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>

</table>

</div>

<!-- SETTINGS PANEL -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<h3>Donation Category Limits</h3>

<label>Galloner</label>
<input id="gallonerLimit">

<label>Bronze</label>
<input id="bronzeLimit">

<label>Silver</label>
<input id="silverLimit">

<label>Gold</label>
<input id="goldLimit">

<button class="save-settings" onclick="saveLimits()">Save</button>
<button class="close-settings" onclick="closeSettings()">Close</button>

</div>

</div>

<script>

var firebaseConfig={
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
projectId:"galloners-club"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.firestore();

let donorsData=[];
let categoryLimits={galloner:8,bronze:28,silver:46,gold:70};

function goDashboard(){
window.location.href="dashboard.html";
}

/* BLOOD DROP ICON */

function bloodDrop(color){

return `
<svg class="blood-icon" viewBox="0 0 24 24">
<path fill="${color}" d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/>
</svg>
`;

}

function getBloodIcon(type,rh){

if(rh=="-") return bloodDrop("#a5d6a7");

if(type=="A") return bloodDrop("#1e88e5");
if(type=="B") return bloodDrop("#ffd600");
if(type=="AB") return bloodDrop("#ff80ab");
if(type=="O") return bloodDrop("#ffffff");

return bloodDrop("#ccc");

}

/* BADGE */

function getBadge(serial){

if(serial>=categoryLimits.gold)
return `<span class="badge badge-gold">GOLD</span>`;

if(serial>=categoryLimits.silver)
return `<span class="badge badge-silver">SILVER</span>`;

if(serial>=categoryLimits.bronze)
return `<span class="badge badge-bronze">BRONZE</span>`;

if(serial>=categoryLimits.galloner)
return `<span class="badge badge-galloner">GALLONER</span>`;

return "";

}

/* LOAD LIMITS */

function fetchLimits(){

db.collection("settings").doc("categories").get().then(doc=>{

if(doc.exists) categoryLimits=doc.data();

});

}

/* SETTINGS */

function openSettings(){

settingsModal.style.display="block";

gallonerLimit.value=categoryLimits.galloner;
bronzeLimit.value=categoryLimits.bronze;
silverLimit.value=categoryLimits.silver;
goldLimit.value=categoryLimits.gold;

}

function closeSettings(){
settingsModal.style.display="none";
}

function saveLimits(){

categoryLimits={
galloner:Number(gallonerLimit.value),
bronze:Number(bronzeLimit.value),
silver:Number(silverLimit.value),
gold:Number(goldLimit.value)
};

db.collection("settings").doc("categories").set(categoryLimits).then(()=>{

alert("Limits Saved");
closeSettings();
renderTable();

});

}

/* LOAD DONORS */

function fetchDonors(){

db.collection("donors").get().then(snapshot=>{

donorsData=[];

snapshot.forEach(doc=>{
let data=doc.data();
data.id=doc.id;
donorsData.push(data);
});

renderTable();

});

}

/* TABLE */

function renderTable(){

let table=document.getElementById("donorTable");
table.innerHTML="";

donorsData.forEach((d,index)=>{

let serial=d.serials?d.serials.length:0;

let badge=getBadge(serial);
let bloodIcon=getBloodIcon(d.bloodType,d.rhFactor);

table.innerHTML+=`

<tr>

<td>${index+1}</td>

<td class="name-cell">
${d.firstName||""} ${d.middleName||""} ${d.surname||""}
</td>

<td>${badge}</td>

<td>
${bloodIcon} ${d.bloodType||""}${d.rhFactor||""}
</td>

<td>${d.contact||""}</td>

<td>
${serial}
<button class="view-btn" onclick="toggleSerial(${index})">View</button>
</td>

<td>

<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>

</td>

</tr>

<tr id="serialRow${index}" style="display:none;">
<td colspan="7">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>

`;

});

}

/* SERIAL VIEW */

function toggleSerial(index){

let row=document.getElementById("serialRow"+index);
let container=document.getElementById("serialList"+index);

if(row.style.display==="none"){

container.innerHTML="";

let serials=donorsData[index].serials||[];

serials.forEach(s=>{
container.innerHTML+=`${s.serial} - ${s.date}<br>`;
});

row.style.display="table-row";

}else{

row.style.display="none";

}

}

/* SEARCH */

function searchDonor(){

let input=searchInput.value.toLowerCase();

let rows=document.querySelectorAll("#donorTable tr");

rows.forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";
});

}

/* DELETE */

function deleteDonor(id){

if(confirm("Delete donor?")){

db.collection("donors").doc(id).delete().then(()=>{

fetchDonors();

});

}

}

/* EDIT */

function editDonor(id){

window.location.href="donor-entry.html?editId="+id;

}

/* CSV */

function exportToCSV(){

let csv="Blood Type,Rh Factor,First Name,Middle Name,Surname,Contact\n";

donorsData.forEach(d=>{
csv+=`${d.bloodType||""},${d.rhFactor||""},${d.firstName||""},${d.middleName||""},${d.surname||""},${d.contact||""}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;
a.download="donors.csv";
a.click();

window.URL.revokeObjectURL(url);

}

window.onload=function(){

fetchLimits();
fetchDonors();

};

</script>

</body>
</html>
