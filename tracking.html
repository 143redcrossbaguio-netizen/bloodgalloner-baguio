<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Tracking</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f4f4;}

header{
background:#b30000;
color:white;
padding:15px;
text-align:center;
}

.logo{
width:100px;
display:block;
margin:10px auto;
}

.container{
max-width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#b30000;
color:white;
}

.name-cell{
text-align:left;
font-weight:bold;
padding-left:10px;
}

.badge{
padding:3px 6px;
border-radius:4px;
font-size:11px;
color:white;
}

.badge-galloner{background:#1e88e5;}
.badge-bronze{background:#cd7f32;}
.badge-silver{background:#9e9e9e;}
.badge-gold{background:#d4af37;color:black;}

button{
padding:5px 8px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
}

.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.view-btn{background:#6a1b9a;}
.remarks-btn{background:#2e7d32;}
.save-remarks-btn{background:#b30000;}

.top-btn{background:#b30000;}

.blood-icon{
width:20px;
height:20px;
vertical-align:middle;
margin-right:4px;
}

.serial-box{
background:#f9f9f9;
border:1px solid #ccc;
padding:10px;
border-radius:6px;
text-align:left;
}

.serial-detail-layout{
display:grid;
grid-template-columns: 1.2fr 1fr;
gap:15px;
align-items:start;
}

.serial-count-box{
background:#fff4f4;
border:1px solid #e0b4b4;
padding:10px;
border-radius:6px;
font-weight:bold;
color:#b30000;
margin-bottom:10px;
}

.serial-table{
width:100%;
border-collapse:collapse;
background:white;
}

.serial-table th,
.serial-table td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

.serial-table th{
background:#b30000;
color:white;
text-align:center;
}

.remarks-panel{
background:#ffffff;
border:1px solid #ccc;
border-radius:6px;
padding:10px;
}

.remarks-panel h4{
margin:0 0 10px 0;
color:#b30000;
}

.remarks-textarea{
width:100%;
min-height:140px;
padding:10px;
box-sizing:border-box;
resize:vertical;
font-family:Arial;
font-size:14px;
border:1px solid #ccc;
border-radius:6px;
}

.remark-indicator{
display:inline-block;
margin-left:6px;
padding:2px 6px;
font-size:10px;
border-radius:10px;
background:#2e7d32;
color:white;
vertical-align:middle;
}

.no-remarks-label{
font-size:12px;
color:#888;
margin-top:8px;
display:block;
}

@media (max-width: 900px){
.serial-detail-layout{
grid-template-columns:1fr;
}
}

</style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo">
<h2>Donor Tracking</h2>
</header>

<div class="container">

<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()">

<br><br>

<button class="top-btn" onclick="exportToCSV()">Export CSV</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>

<br><br>

<select id="bloodFilter" onchange="renderTable()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<br><br>

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Badge</th>
<th>Blood</th>
<th>Contact</th>
<th>Serial</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>

</table>

</div>

<script>

var firebaseConfig={
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
projectId:"galloners-club"
};

firebase.initializeApp(firebaseConfig);

var auth = firebase.auth();
var db = firebase.firestore();

let donorsData = [];
let categoryLimits = {galloner:8, bronze:28, silver:46, gold:70};
let authReady = false;

function goDashboard(){
window.location.href="dashboard.html";
}

/* BLOOD DROP ICON */

function bloodDrop(color, outline=false){

let stroke = outline ? "#000" : "none";

return `
<svg class="blood-icon" viewBox="0 0 24 24">
<path fill="${color}" stroke="${stroke}" stroke-width="1.5"
d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/>
</svg>
`;

}

/* BLOOD TYPE ICON LOGIC */

function getBloodIcon(type,rh){

if(rh === "-"){
return bloodDrop("#a5d6a7");
}

if(type === "A") return bloodDrop("#1e88e5");
if(type === "B") return bloodDrop("#ffd600");
if(type === "AB") return bloodDrop("#ff80ab");
if(type === "O") return bloodDrop("#ffffff",true);

return bloodDrop("#ccc");

}

/* BADGE */

function getBadge(serial){

if(serial >= categoryLimits.gold)
return `<span class="badge badge-gold">GOLD</span>`;

if(serial >= categoryLimits.silver)
return `<span class="badge badge-silver">SILVER</span>`;

if(serial >= categoryLimits.bronze)
return `<span class="badge badge-bronze">BRONZE</span>`;

if(serial >= categoryLimits.galloner)
return `<span class="badge badge-galloner">GALLONER</span>`;

return "";

}

/* FETCH DONORS */

function fetchDonors(){

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

db.collection("donors").get().then(snapshot=>{

donorsData=[];

snapshot.forEach(doc=>{
let data=doc.data();
data.id=doc.id;
donorsData.push(data);
});

renderTable();

}).catch(error => {
console.error("Fetch donors error:", error);
alert("Error loading donor records.");
});

}

/* RENDER TABLE */

function renderTable(){

let table=document.getElementById("donorTable");
let bloodFilter=document.getElementById("bloodFilter").value;

table.innerHTML="";

donorsData.forEach((d,index)=>{

let serialCount=d.serials ? d.serials.length : 0;

if(bloodFilter && d.bloodType !== bloodFilter) return;

let badge=getBadge(serialCount);
let bloodIcon=getBloodIcon(d.bloodType,d.rhFactor);
let hasRemarks = (d.remarks || "").trim() !== "";

table.innerHTML+=`

<tr>

<td>${index+1}</td>

<td class="name-cell">
${d.firstName||""} ${d.middleName||""} ${d.surname||""}
${hasRemarks ? `<span class="remark-indicator">REMARK</span>` : ``}
</td>

<td>${badge}</td>

<td>
${bloodIcon} ${d.bloodType||""}${d.rhFactor||""}
</td>

<td>${d.contact||""}</td>

<td>
${serialCount}
<button class="view-btn" onclick="toggleSerial(${index})">View</button>
</td>

<td>

<button class="remarks-btn" onclick="openRemarksOnly(${index})">Remarks</button>
<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>

</td>

</tr>

<tr id="serialRow${index}" style="display:none;">
<td colspan="7">
<div class="serial-box" id="serialList${index}"></div>
</td>
</tr>

`;

});

}

/* SERIAL VIEW WITH REMARKS PANEL */

function toggleSerial(index){

let row=document.getElementById("serialRow"+index);
let container=document.getElementById("serialList"+index);

if(row.style.display==="none"){

renderSerialAndRemarks(index);
row.style.display="table-row";

}else{

row.style.display="none";

}

}

function openRemarksOnly(index){

let row=document.getElementById("serialRow"+index);

if(row.style.display==="none"){
row.style.display="table-row";
}

renderSerialAndRemarks(index);

let remarksBox=document.getElementById("remarksText"+index);
if(remarksBox){
remarksBox.focus();
}
}

function renderSerialAndRemarks(index){

let container=document.getElementById("serialList"+index);
let donor = donorsData[index];
let serials = donor.serials || [];
let remarks = donor.remarks || "";

let serialRows = "";

if(serials.length){
serials.forEach((s,i)=>{
serialRows += `
<tr>
<td style="text-align:center;">${i+1}</td>
<td>${s.serial||""}</td>
<td>${s.date||""}</td>
</tr>
`;
});
}else{
serialRows = `
<tr>
<td colspan="3" style="text-align:center;">No serial records found.</td>
</tr>
`;
}

container.innerHTML = `
<div class="serial-detail-layout">

<div>
<div class="serial-count-box">Total Serial Records: ${serials.length}</div>

<table class="serial-table">
<thead>
<tr>
<th style="width:70px;">#</th>
<th>Serial Number</th>
<th style="width:180px;">Date</th>
</tr>
</thead>
<tbody>
${serialRows}
</tbody>
</table>
</div>

<div class="remarks-panel">
<h4>Remarks</h4>
<textarea id="remarksText${index}" class="remarks-textarea" placeholder="Enter remarks here...">${escapeHtmlToTextarea(remarks)}</textarea>
<button class="save-remarks-btn" onclick="saveRemarks(${index})">Save Remarks</button>
${remarks.trim() === "" ? `<span class="no-remarks-label">No remarks saved.</span>` : ``}
</div>

</div>
`;

}

/* SAVE REMARKS */

function saveRemarks(index){

let donor = donorsData[index];
let remarksValue = document.getElementById("remarksText"+index).value.trim();

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

db.collection("donors").doc(donor.id).update({
remarks: remarksValue
}).then(()=>{
donorsData[index].remarks = remarksValue;
renderTable();

let reopenedRow = document.getElementById("serialRow"+index);
if(reopenedRow){
reopenedRow.style.display="table-row";
renderSerialAndRemarks(index);
}

alert("Remarks saved successfully.");
}).catch(error=>{
console.error("Remarks save error:", error);
alert("Error saving remarks.");
});

}

/* SEARCH */

function searchDonor(){

let input=document.getElementById("searchInput").value.toLowerCase();

document.querySelectorAll("#donorTable tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";
});

}

/* DELETE */

function deleteDonor(id){

if (!auth.currentUser) {
alert("You are not logged in.");
window.location.href = "index.html";
return;
}

if(confirm("Delete donor?")){

db.collection("donors").doc(id).delete().then(()=>{
fetchDonors();
}).catch(error => {
console.error("Delete error:", error);
alert("Error deleting donor.");
});

}

}

/* EDIT */

function editDonor(id){
window.location.href="donor-entry.html?editId="+id;
}

/* CSV */

function exportToCSV(){

let csv="Blood Type,Rh Factor,First Name,Middle Name,Surname,Contact,Remarks\n";

donorsData.forEach(d=>{
csv+=`${d.bloodType||""},${d.rhFactor||""},${d.firstName||""},${d.middleName||""},${d.surname||""},${d.contact||""},"${(d.remarks||"").replace(/"/g,'""')}"\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="donors.csv";
a.click();

window.URL.revokeObjectURL(url);

}

function escapeHtmlToTextarea(text){
return String(text || "")
.replace(/&/g, "&amp;")
.replace(/</g, "&lt;")
.replace(/>/g, "&gt;");
}

/* AUTH CHECK */

auth.onAuthStateChanged(function(user){
authReady = true;

if(!user){
window.location.href="index.html";
return;
}

fetchDonors();
});

</script>

</body>
</html>
