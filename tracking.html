<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Tracking</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f4f4;}

header{
background:#b30000;
color:white;
padding:15px;
text-align:center;
}

.logo{
width:100px;
display:block;
margin:10px auto;
}

.container{
max-width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#b30000;
color:white;
}

button{
padding:5px 8px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
}

.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.notes-btn{background:#2e7d32;}
.view-btn{background:#6a1b9a;}

.top-btn{background:#b30000;}

.galloner-btn{background:#1e88e5;}
.bronze-btn{background:#cd7f32;}
.silver-btn{background:#9e9e9e;}
.gold-btn{background:#d4af37;color:black;}
.filter-btn{background:#222;}

.badge{
padding:2px 6px;
border-radius:4px;
font-size:11px;
margin-left:5px;
color:white;
}

.badge-galloner{background:#1e88e5;}
.badge-bronze{background:#cd7f32;}
.badge-silver{background:#9e9e9e;}
.badge-gold{background:#d4af37;color:black;}

.serial-box{
background:#f9f9f9;
border:1px solid #ccc;
padding:10px;
border-radius:6px;
}

/* SETTINGS */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
width:350px;
margin:100px auto;
padding:20px;
border-radius:10px;
}

.modal-content input{
width:100%;
padding:6px;
margin-bottom:10px;
}

.save-settings{background:#2e7d32;}
.close-settings{background:#444;}

</style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo">
<h2>Donor Tracking</h2>
</header>

<div class="container">

<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()">

<br><br>

<button class="top-btn" onclick="exportToCSV()">Export CSV</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>
<button class="top-btn" onclick="openSettings()">Category Settings</button>

<br><br>

<select id="bloodFilter" onchange="renderTable()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<br><br>

<button class="galloner-btn" onclick="filterByCategory('galloner')">Galloners</button>
<button class="bronze-btn" onclick="filterByCategory('bronze')">Bronze</button>
<button class="silver-btn" onclick="filterByCategory('silver')">Silver</button>
<button class="gold-btn" onclick="filterByCategory('gold')">Gold</button>
<button class="filter-btn" onclick="renderTable()">Show All</button>

<br><br>

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Blood Type</th>
<th>Contact</th>
<th>Serial Count</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>

</table>

</div>

<!-- SETTINGS PANEL -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<h3>Donation Category Limits</h3>

<label>Galloner</label>
<input id="gallonerLimit">

<label>Bronze</label>
<input id="bronzeLimit">

<label>Silver</label>
<input id="silverLimit">

<label>Gold</label>
<input id="goldLimit">

<button class="save-settings" onclick="saveLimits()">Save</button>
<button class="close-settings" onclick="closeSettings()">Close</button>

</div>

</div>


<script>

var firebaseConfig={
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
projectId:"galloners-club"
};

firebase.initializeApp(firebaseConfig);

var db=firebase.firestore();

let donorsData=[];
let currentCategory=null;

let categoryLimits={
galloner:8,
bronze:28,
silver:46,
gold:70
};

function goDashboard(){
window.location.href="dashboard.html";
}

/* LOAD LIMITS */

function fetchLimits(){

db.collection("settings").doc("categories").get().then(doc=>{

if(doc.exists){
categoryLimits=doc.data();
}else{
db.collection("settings").doc("categories").set(categoryLimits);
}

});

}

/* SETTINGS PANEL */

function openSettings(){

document.getElementById("settingsModal").style.display="block";

gallonerLimit.value=categoryLimits.galloner;
bronzeLimit.value=categoryLimits.bronze;
silverLimit.value=categoryLimits.silver;
goldLimit.value=categoryLimits.gold;

}

function closeSettings(){

settingsModal.style.display="none";

}

function saveLimits(){

categoryLimits={
galloner:Number(gallonerLimit.value),
bronze:Number(bronzeLimit.value),
silver:Number(silverLimit.value),
gold:Number(goldLimit.value)
};

db.collection("settings").doc("categories").set(categoryLimits).then(()=>{

alert("Limits saved!");
closeSettings();
renderTable();

});

}

/* LOAD DONORS */

function fetchDonors(){

db.collection("donors").get().then(snapshot=>{

donorsData=[];

snapshot.forEach(doc=>{
let data=doc.data();
data.id=doc.id;
donorsData.push(data);
});

renderTable();

});

}

/* BADGE */

function getBadge(serialCount){

if(serialCount>=categoryLimits.gold)
return `<span class="badge badge-gold">GOLD</span>`;

if(serialCount>=categoryLimits.silver)
return `<span class="badge badge-silver">SILVER</span>`;

if(serialCount>=categoryLimits.bronze)
return `<span class="badge badge-bronze">BRONZE</span>`;

if(serialCount>=categoryLimits.galloner)
return `<span class="badge badge-galloner">GALLONER</span>`;

return "";

}

/* TABLE */

function renderTable(category=null){

currentCategory=category;

let table=document.getElementById("donorTable");
let bloodFilter=document.getElementById("bloodFilter").value;

table.innerHTML="";

donorsData.forEach((d,index)=>{

let serialCount=d.serials?d.serials.length:0;

if(bloodFilter!=="" && d.bloodType!==bloodFilter) return;

if(category){

if(category==="galloner" && serialCount<categoryLimits.galloner) return;
if(category==="bronze" && serialCount<categoryLimits.bronze) return;
if(category==="silver" && serialCount<categoryLimits.silver) return;
if(category==="gold" && serialCount<categoryLimits.gold) return;

}

let badge=getBadge(serialCount);

table.innerHTML+=`
<tr>

<td>${index+1}</td>

<td>${d.firstName||""} ${d.middleName||""} ${d.surname||""} ${badge}</td>

<td>${d.bloodType||""} ${d.rhFactor||""}</td>

<td>${d.contact||""}</td>

<td>${serialCount}</td>

<td>

<button class="edit-btn" onclick="editDonor('${d.id}')">Edit</button>
<button class="delete-btn" onclick="deleteDonor('${d.id}')">Delete</button>

</td>

</tr>
`;

});

}

/* SEARCH */

function searchDonor(){

let input=searchInput.value.toLowerCase();

let rows=document.querySelectorAll("#donorTable tr");

rows.forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";
});

}

/* DELETE */

function deleteDonor(id){

if(confirm("Delete donor?")){

db.collection("donors").doc(id).delete().then(()=>{
fetchDonors();
});

}

}

/* EDIT */

function editDonor(id){

window.location.href="donor-entry.html?editId="+id;

}

/* FILTER */

function filterByCategory(cat){

renderTable(cat);

}

/* EXPORT */

function exportToCSV(){

let csv="Blood Type,Rh Factor,First Name,Middle Name,Surname,Birthday,Contact\n";

donorsData.forEach(d=>{
csv+=`${d.bloodType||""},${d.rhFactor||""},${d.firstName||""},${d.middleName||""},${d.surname||""},${d.birthday||""},${d.contact||""}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");

a.href=url;
a.download="donors.csv";
a.click();

window.URL.revokeObjectURL(url);

}

window.onload=function(){

fetchLimits();
fetchDonors();

};

</script>

</body>
</html>
