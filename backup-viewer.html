<!DOCTYPE html>
<html>
<head>
<title>Backup Viewer</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f4f4f4;
}

header{
background:#00695c;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:1200px;
margin:30px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

select, button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-weight:bold;
}

button{
border:none;
cursor:pointer;
color:white;
}

.back-btn{background:#444;}
.reload-btn{background:#1565c0;}

.section{
margin-top:25px;
}

.section h3{
margin-bottom:10px;
color:#00695c;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
vertical-align:top;
font-size:14px;
}

th{
background:#00695c;
color:white;
}

.empty{
padding:20px;
text-align:center;
color:#666;
font-weight:bold;
background:#fafafa;
border:1px solid #ddd;
border-radius:8px;
}

pre{
white-space:pre-wrap;
word-break:break-word;
margin:0;
font-family:Arial, sans-serif;
}

.meta{
background:#f7f7f7;
border:1px solid #ccc;
padding:12px;
border-radius:8px;
margin-bottom:20px;
line-height:1.6;
}

.count-box{
margin-top:8px;
font-size:14px;
color:#444;
font-weight:bold;
}

@media (max-width: 800px){
.controls{
flex-direction:column;
}
}
</style>
</head>

<body>

<header>
<h2>Backup Viewer</h2>
</header>

<div class="container">

<div class="controls">
<select id="backupSelect"></select>
<button class="reload-btn" onclick="loadSelectedBackup()">Load Backup</button>
<button class="back-btn" onclick="goBack()">Back to Dashboard</button>
</div>

<div id="backupMeta"></div>
<div id="backupContent"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain: "galloners-club.firebaseapp.com",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club",
  storageBucket: "galloners-club.firebasestorage.app",
  messagingSenderId: "213049860421",
  appId: "1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId: "G-XYXJH9JNXJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const backupSelect = document.getElementById("backupSelect");
const backupMeta = document.getElementById("backupMeta");
const backupContent = document.getElementById("backupContent");

onAuthStateChanged(auth, (user) => {
  if(!user){
    window.location.href = "index.html";
    return;
  }

  loadBackupList();
});

function loadBackupList(){
  onValue(ref(db, "backups"), (snapshot) => {
    backupSelect.innerHTML = "";

    if(!snapshot.exists()){
      backupSelect.innerHTML = '<option value="">No backups found</option>';
      backupMeta.innerHTML = "";
      backupContent.innerHTML = '<div class="empty">No backups available.</div>';
      return;
    }

    const keys = [];
    snapshot.forEach(child => keys.push(child.key));
    keys.sort().reverse();

    keys.forEach(key => {
      const option = document.createElement("option");
      option.value = key;
      option.textContent = key;
      backupSelect.appendChild(option);
    });

    loadSelectedBackup();
  });
}

window.loadSelectedBackup = async function(){
  const backupId = backupSelect.value;

  if(!backupId){
    backupMeta.innerHTML = "";
    backupContent.innerHTML = '<div class="empty">No backup selected.</div>';
    return;
  }

  try{
    const snapshot = await get(ref(db, "backups/" + backupId));

    if(!snapshot.exists()){
      backupMeta.innerHTML = "";
      backupContent.innerHTML = '<div class="empty">Backup not found.</div>';
      return;
    }

    const data = snapshot.val();
    renderBackup(data);
  }catch(error){
    console.error(error);
    backupMeta.innerHTML = "";
    backupContent.innerHTML = '<div class="empty">Failed to load backup.</div>';
  }
};

function formatDateTime(value){
  if(!value) return "";
  const d = new Date(value);
  if(isNaN(d.getTime())) return value;
  return d.toLocaleString();
}

function renderBackup(data){
  const metadata = data.metadata || {};
  const rt = data.realtimeDatabase || {};
  const fs = data.firestore || {};

  backupMeta.innerHTML = `
    <div class="meta">
      <b>Backup Date:</b> ${formatDateTime(metadata.exportedAt || "")}<br>
      <b>Exported By:</b> ${metadata.exportedBy || ""}<br>
      <b>Type:</b> ${metadata.type || ""}<br>
      <b>Project:</b> ${metadata.project || ""}
    </div>
  `;

  backupContent.innerHTML = "";

  renderObjectSection("Admins", rt.admins || {});
  renderObjectSection("Facilities", rt.facilities || {});
  renderObjectSection("Releasing", rt.releasing || {});
  renderObjectSection("Blood Augmentation", rt.bloodAugmentation || {});
  renderObjectSection("Donors (Firestore)", fs.donors || {});
}

function renderObjectSection(title, obj){
  const section = document.createElement("div");
  section.className = "section";

  const heading = document.createElement("h3");
  heading.textContent = title;
  section.appendChild(heading);

  const keys = Object.keys(obj || {});

  const countBox = document.createElement("div");
  countBox.className = "count-box";
  countBox.textContent = `Total records: ${keys.length}`;
  section.appendChild(countBox);

  if(keys.length === 0){
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No data found.";
    section.appendChild(empty);
    backupContent.appendChild(section);
    return;
  }

  const table = document.createElement("table");
  table.innerHTML = `
    <thead>
      <tr>
        <th style="width:180px;">Record ID</th>
        <th>Data</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");

  keys.forEach(key => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${key}</td>
      <td><pre>${escapeHtml(JSON.stringify(obj[key], null, 2))}</pre></td>
    `;
    tbody.appendChild(row);
  });

  section.appendChild(table);
  backupContent.appendChild(section);
}

function escapeHtml(str){
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

window.goBack = function(){
  window.location.href = "dashboard.html";
};
</script>

</body>
</html>
