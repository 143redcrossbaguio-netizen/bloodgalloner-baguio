<!DOCTYPE html>
<html>
<head>
<title>Galloners Club - Awardees</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>

body{margin:0;font-family:Arial;background:#f4f4f4;}

header{
background:#b30000;
color:white;
padding:15px;
text-align:center;
}

.logo{
width:100px;
display:block;
margin:10px auto;
}

.container{
max-width:95%;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

table{width:100%;border-collapse:collapse;}

th,td{
padding:8px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#b30000;
color:white;
}

.name-cell{
text-align:left;
font-weight:bold;
padding-left:10px;
}

button{
padding:5px 8px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
color:white;
}

.save-btn{
background:#c62828;
color:white;
}

.top-btn{background:#b30000;}

.blood-icon{
width:20px;
height:20px;
vertical-align:middle;
}

.badge{
padding:3px 6px;
border-radius:4px;
font-size:11px;
color:white;
}

.badge-galloner{background:#1e88e5;}
.badge-bronze{background:#cd7f32;}
.badge-silver{background:#9e9e9e;}
.badge-gold{background:#d4af37;color:black;}

select{padding:5px;margin-right:5px;}

</style>
</head>

<body>

<header>
<img src="images/logo.png" class="logo">
<h2>Awardees Monitoring</h2>
</header>

<div class="container">

<input type="text" id="searchInput" placeholder="Search donor..." onkeyup="searchDonor()">

<select id="bloodFilter" onchange="renderTable()">
<option value="">All Blood Types</option>
<option value="A">A</option>
<option value="B">B</option>
<option value="AB">AB</option>
<option value="O">O</option>
</select>

<select id="statusFilter" onchange="renderTable()">
<option value="">All Status</option>
<option value="awarded">Awarded</option>
<option value="notawarded">Not Awarded</option>
<option value="claimed">Claimed</option>
<option value="unclaimed">Unclaimed</option>
</select>

<button class="top-btn" onclick="exportToGoogleSheet()">Export CSV</button>
<button class="top-btn" onclick="goDashboard()">Return to Dashboard</button>
<button class="top-btn" onclick="printAllCategories()">Print All Categories</button>

<br><br>

<table>

<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Badge</th>
<th>Blood Type</th>
<th>Serial Count</th>
<th>Awarded</th>
<th>Claimed</th>
<th>Action</th>
</tr>
</thead>

<tbody id="donorTable"></tbody>

</table>

</div>

<script>

var firebaseConfig={
apiKey:"AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain:"galloners-club.firebaseapp.com",
projectId:"galloners-club"
};

firebase.initializeApp(firebaseConfig);
var db=firebase.firestore();

let donorsData=[];
let currentCategory=null;

function goDashboard(){
window.location.href="dashboard.html";
}

/* BLOOD DROP ICON */

function bloodDrop(color,stroke="none"){

return `
<svg class="blood-icon" viewBox="0 0 24 24">
<path fill="${color}" stroke="${stroke}" stroke-width="1.5"
d="M12 2C12 2 5 10 5 14a7 7 0 0014 0C19 10 12 2 12 2z"/>
</svg>
`;

}

function getBloodIcon(type,rh){

if(rh=="-") return bloodDrop("#a5d6a7");

if(type=="A") return bloodDrop("#1e88e5");
if(type=="B") return bloodDrop("#ffd600");
if(type=="AB") return bloodDrop("#ff80ab");
if(type=="O") return bloodDrop("#ffffff","#000");

return bloodDrop("#ccc");

}

/* BADGE */

function getBadge(serial){

let limits=JSON.parse(localStorage.getItem("categoryLimits")) || {galloner:8,bronze:28,silver:46,gold:70};

if(serial>=limits.gold) return `<span class="badge badge-gold">GOLD</span>`;
if(serial>=limits.silver) return `<span class="badge badge-silver">SILVER</span>`;
if(serial>=limits.bronze) return `<span class="badge badge-bronze">BRONZE</span>`;
if(serial>=limits.galloner) return `<span class="badge badge-galloner">GALLONER</span>`;

return "";

}

/* FETCH DONORS */

function fetchDonors(){

db.collection("donors").get().then(snapshot=>{

donorsData=[];

snapshot.forEach(doc=>{
let data=doc.data();
data.id=doc.id;
donorsData.push(data);
});

renderTable();

});

}

/* SAVE STATUS */

function saveDonorStatus(id,field,value){

let donorRef=db.collection("donors").doc(id);

donorRef.get().then(doc=>{

let data=doc.data()||{};
data.awardStatus=data.awardStatus||{};
data.awardStatus[field]=value;

donorRef.set(data).then(()=>fetchDonors());

});

}

/* TABLE */

function renderTable(){

let table=document.getElementById("donorTable");
let bloodFilter=document.getElementById("bloodFilter").value;
let statusFilter=document.getElementById("statusFilter").value;

table.innerHTML="";

let count=1;

donorsData.forEach(d=>{

let serialCount=d.serials?d.serials.length:0;

if(bloodFilter && d.bloodType!==bloodFilter) return;

let status=d.awardStatus||{};

if(statusFilter){

if(statusFilter==="awarded" && !status.awarded) return;
if(statusFilter==="notawarded" && status.awarded) return;
if(statusFilter==="claimed" && !status.claimed) return;
if(statusFilter==="unclaimed" && status.claimed) return;

}

let badge=getBadge(serialCount);
let bloodIcon=getBloodIcon(d.bloodType,d.rhFactor);

table.innerHTML+=`

<tr>

<td>${count++}</td>

<td class="name-cell">
${d.firstName||""} ${d.middleName||""} ${d.surname||""}
</td>

<td>${badge}</td>

<td>${bloodIcon} ${d.bloodType||""}${d.rhFactor||""}</td>

<td>${serialCount}</td>

<td>

<select onchange="saveDonorStatus('${d.id}','awarded',this.value)">
<option value="">Select</option>
<option value="awarded" ${status.awarded==='awarded'?'selected':''}>Awarded</option>
<option value="notawarded" ${status.awarded==='notawarded'?'selected':''}>Not Awarded</option>
</select>

<input type="date" value="${status.awardDate||''}" onchange="saveDonorStatus('${d.id}','awardDate',this.value)">

</td>

<td>

<select onchange="saveDonorStatus('${d.id}','claimed',this.value)">
<option value="">Select</option>
<option value="claimed" ${status.claimed==='claimed'?'selected':''}>Claimed</option>
<option value="unclaimed" ${status.claimed==='unclaimed'?'selected':''}>Unclaimed</option>
</select>

<input type="date" value="${status.claimDate||''}" onchange="saveDonorStatus('${d.id}','claimDate',this.value)">

</td>

<td>
<button class="save-btn" onclick="saveDonorStatus('${d.id}','saved','yes')">Save</button>
</td>

</tr>

`;

});

}

/* SEARCH */

function searchDonor(){

let input=document.getElementById("searchInput").value.toLowerCase();

document.querySelectorAll("#donorTable tr").forEach(row=>{
row.style.display=row.innerText.toLowerCase().includes(input)?"":"none";
});

}

/* EXPORT CSV */

function exportToGoogleSheet(){

let csv="Blood Type,Rh Factor,First Name,Middle Name,Surname\n";

donorsData.forEach(d=>{
csv+=`${d.bloodType||""},${d.rhFactor||""},${d.firstName||""},${d.middleName||""},${d.surname||""}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="awardees.csv";
a.click();

window.URL.revokeObjectURL(url);

}

/* PRINT */

function printAllCategories(){

let limits=JSON.parse(localStorage.getItem("categoryLimits")) || {galloner:8,bronze:28,silver:46,gold:70};

let categories=['galloner','bronze','silver','gold'];

let content=`<h1>Awardees Monitoring</h1>`;

categories.forEach(cat=>{

content+=`<h2>${cat.toUpperCase()}</h2>`;
content+=`<table border="1" style="border-collapse:collapse;width:100%">`;

content+=`<tr>
<th>#</th>
<th>Name</th>
<th>Blood</th>
<th>Serial Count</th>
</tr>`;

let count=1;

donorsData.forEach(d=>{

let serialCount=d.serials?d.serials.length:0;

if(serialCount<limits[cat]) return;

content+=`
<tr>
<td>${count++}</td>
<td>${d.firstName} ${d.middleName} ${d.surname}</td>
<td>${d.bloodType}${d.rhFactor}</td>
<td>${serialCount}</td>
</tr>
`;

});

content+="</table><br>";

});

let w=window.open("");
w.document.write(content);
w.print();

}

window.onload=fetchDonors;

</script>

</body>
</html>
