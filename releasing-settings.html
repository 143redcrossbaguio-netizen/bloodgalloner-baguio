<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Settings</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#6a1b9a;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:550px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h3{
margin-top:0;
text-align:center;
color:#333;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:bold;
margin-bottom:6px;
color:#333;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:5px;
color:white;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.save{background:#2e7d32;}
.reset{background:#ef6c00;}
.back{background:#444;}

.note{
margin-top:20px;
padding:12px;
background:#f3e5f5;
border-radius:6px;
font-size:14px;
color:#444;
text-align:center;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Settings</h2>
</header>

<div class="container">
<h3>Set Blood Product Prices</h3>

<div class="form-group">
<label for="wb">WB Price</label>
<input type="number" id="wb" placeholder="Enter WB price">
</div>

<div class="form-group">
<label for="prbc">PRBC Price</label>
<input type="number" id="prbc" placeholder="Enter PRBC price">
</div>

<div class="form-group">
<label for="pc">PC Price</label>
<input type="number" id="pc" placeholder="Enter PC price">
</div>

<div class="form-group">
<label for="ffp">FFP Price</label>
<input type="number" id="ffp" placeholder="Enter FFP price">
</div>

<div class="form-group">
<label for="cryo">CRYO Price</label>
<input type="number" id="cryo" placeholder="Enter CRYO price">
</div>

<div class="form-group">
<label for="boxContainer">Box Container Price</label>
<input type="number" id="boxContainer" placeholder="Enter box container price">
</div>

<button class="save" onclick="savePrices()">SAVE PRICES</button>
<button class="reset" onclick="resetPrices()">RESET PRICES</button>
<button class="back" onclick="goBack()">BACK</button>

<div class="note" id="statusMessage">
Saved prices will stay on this browser using localStorage.
</div>
</div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.appspot.com",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c",
    measurementId: "G-XYXJH9JNXJ"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

var auth = firebase.auth();

auth.onAuthStateChanged(function(user){
    if(!user){
        window.location.href = "index.html";
    }
});

function loadPrices(){
    document.getElementById("wb").value = localStorage.getItem("price_wb") || "";
    document.getElementById("prbc").value = localStorage.getItem("price_prbc") || "";
    document.getElementById("pc").value = localStorage.getItem("price_pc") || "";
    document.getElementById("ffp").value = localStorage.getItem("price_ffp") || "";
    document.getElementById("cryo").value = localStorage.getItem("price_cryo") || "";
    document.getElementById("boxContainer").value = localStorage.getItem("price_boxContainer") || "";
}

function savePrices(){
    localStorage.setItem("price_wb", document.getElementById("wb").value);
    localStorage.setItem("price_prbc", document.getElementById("prbc").value);
    localStorage.setItem("price_pc", document.getElementById("pc").value);
    localStorage.setItem("price_ffp", document.getElementById("ffp").value);
    localStorage.setItem("price_cryo", document.getElementById("cryo").value);
    localStorage.setItem("price_boxContainer", document.getElementById("boxContainer").value);

    document.getElementById("statusMessage").innerHTML = "Prices saved successfully.";
}

function resetPrices(){
    document.getElementById("wb").value = "";
    document.getElementById("prbc").value = "";
    document.getElementById("pc").value = "";
    document.getElementById("ffp").value = "";
    document.getElementById("cryo").value = "";
    document.getElementById("boxContainer").value = "";

    localStorage.removeItem("price_wb");
    localStorage.removeItem("price_prbc");
    localStorage.removeItem("price_pc");
    localStorage.removeItem("price_ffp");
    localStorage.removeItem("price_cryo");
    localStorage.removeItem("price_boxContainer");

    document.getElementById("statusMessage").innerHTML = "Prices reset successfully.";
}

function goBack(){
    window.location.href = "blood-releasing.html";
}

loadPrices();
</script>

</body>
</html>
