<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Settings</title>
<meta charset="UTF-8">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#6a1b9a;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:550px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

h3{
margin-top:0;
text-align:center;
color:#333;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:bold;
margin-bottom:6px;
color:#333;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:5px;
color:white;
font-weight:bold;
cursor:pointer;
font-size:15px;
}

.save{background:#2e7d32;}
.back{background:#444;}

.note{
margin-top:20px;
padding:12px;
background:#f3e5f5;
border-radius:6px;
font-size:14px;
color:#444;
text-align:center;
word-wrap:break-word;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Settings</h2>
</header>

<div class="container">
<h3>Set Blood Product Prices</h3>

<div class="form-group">
<label for="wb">WB Price</label>
<input type="number" id="wb" placeholder="Enter WB price">
</div>

<div class="form-group">
<label for="prbc">PRBC Price</label>
<input type="number" id="prbc" placeholder="Enter PRBC price">
</div>

<div class="form-group">
<label for="pc">PC Price</label>
<input type="number" id="pc" placeholder="Enter PC price">
</div>

<div class="form-group">
<label for="ffp">FFP Price</label>
<input type="number" id="ffp" placeholder="Enter FFP price">
</div>

<div class="form-group">
<label for="cryo">CRYO Price</label>
<input type="number" id="cryo" placeholder="Enter CRYO price">
</div>

<div class="form-group">
<label for="boxContainer">Box Container Price</label>
<input type="number" id="boxContainer" placeholder="Enter box container price">
</div>

<button class="save" onclick="savePrices()">SAVE PRICES</button>
<button class="back" onclick="goBack()">BACK</button>

<div class="note" id="statusMessage">Loading saved prices...</div>
</div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c",
    measurementId: "G-XYXJH9JNXJ",
    databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

var auth = firebase.auth();
var db = firebase.database();

auth.onAuthStateChanged(function(user){
    if(!user){
        window.location.href = "index.html";
        return;
    }
    loadPrices();
});

function loadPrices(){
    document.getElementById("statusMessage").innerHTML = "Loading saved prices...";

    db.ref("settings/releasingPrices").once("value")
    .then(function(snapshot){
        var data = snapshot.val() || {};

        document.getElementById("wb").value = data.wb || "";
        document.getElementById("prbc").value = data.prbc || "";
        document.getElementById("pc").value = data.pc || "";
        document.getElementById("ffp").value = data.ffp || "";
        document.getElementById("cryo").value = data.cryo || "";
        document.getElementById("boxContainer").value = data.boxContainer || "";

        document.getElementById("statusMessage").innerHTML = "Prices loaded from Firebase.";
    })
    .catch(function(error){
        console.error(error);
        document.getElementById("statusMessage").innerHTML = "Error loading prices: " + error.message;
    });
}

function savePrices(){
    var prices = {
        wb: parseFloat(document.getElementById("wb").value) || 0,
        prbc: parseFloat(document.getElementById("prbc").value) || 0,
        pc: parseFloat(document.getElementById("pc").value) || 0,
        ffp: parseFloat(document.getElementById("ffp").value) || 0,
        cryo: parseFloat(document.getElementById("cryo").value) || 0,
        boxContainer: parseFloat(document.getElementById("boxContainer").value) || 0
    };

    document.getElementById("statusMessage").innerHTML = "Saving prices...";

    db.ref("settings/releasingPrices").set(prices)
    .then(function(){
        document.getElementById("statusMessage").innerHTML = "Prices saved successfully to Firebase.";
        alert("Prices saved successfully!");
    })
    .catch(function(error){
        console.error(error);
        document.getElementById("statusMessage").innerHTML = "Error saving prices: " + error.message;
        alert("Failed to save prices: " + error.message);
    });
}

function goBack(){
    window.location.href = "releasing.html";
}
</script>

</body>
</html>
