<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Login</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #b30000;
        }

        .login-box {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-sizing: border-box;
        }

        .logo {
            width: 120px;
            margin-bottom: 15px;
        }

        h2 {
            color: #b30000;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #b30000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #800000;
        }
    </style>
</head>

<body>

<div class="login-box">
    <img src="images/logo.png" alt="Galloners Club Logo" class="logo">
    <h2>Galloners Club</h2>

    <input type="text" id="username" placeholder="Username or Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        databaseURL: "https://galloners-club-default-rtdb.firebaseio.com",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    function normalizeLoginInput(value) {
        const input = value.trim().toLowerCase();

        if (!input) return "";

        // If user already typed a full email, use it as-is
        if (input.includes("@")) {
            return input;
        }

        // Otherwise convert username to Firebase email format
        return input + "@galloners.club";
    }

    window.login = async function() {
        const usernameOrEmail = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        if (!usernameOrEmail || !password) {
            alert("Enter both username/email and password.");
            return;
        }

        const email = normalizeLoginInput(usernameOrEmail);

        try {
            await signInWithEmailAndPassword(auth, email, password);
            alert("Login successful.");
            window.location.href = "dashboard.html";
        } catch (error) {
            console.error("Login error:", error);
            alert("Invalid username/email or password.");
        }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            window.location.href = "dashboard.html";
        }
    });
</script>

</body>
</html>
