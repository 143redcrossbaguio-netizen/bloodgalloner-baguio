<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Login</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #b30000;
        }

        .login-box {
            background-color: white;
            width: 350px;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .logo {
            width: 120px;
            margin-bottom: 15px;
        }

        h2 {
            color: #b30000;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #b30000;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background-color: #800000;
        }
    </style>
</head>

<body>

<div class="login-box">
    <img src="images/logo.png" alt="Galloners Club Logo" class="logo">
    <h2>Galloners Club</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>
</div>

<!-- Firebase CDN -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);
    window.db = db;

    // LOGIN FUNCTION USING FIRESTORE
    window.login = async function() {
        const userInput = document.getElementById("username").value.trim();
        const passInput = document.getElementById("password").value.trim();

        if(!userInput || !passInput){
            alert("Enter both username and password.");
            return;
        }

        try {
            const credRef = collection(db, "credentials");
            const q = query(credRef, where("username", "==", userInput), where("password", "==", passInput));
            const querySnapshot = await getDocs(q);

            if(!querySnapshot.empty){
                localStorage.setItem("isLoggedIn", "true");
                window.location.href = "dashboard.html";
            } else {
                alert("Invalid Username or Password");
            }
        } catch(e){
            console.error(e);
            alert("Login error. Check console.");
        }
    }

    // Auto redirect if already logged in
    window.onload = function() {
        if(localStorage.getItem("isLoggedIn") === "true") {
            window.location.href = "dashboard.html";
        }
    }
</script>

</body>
</html>
