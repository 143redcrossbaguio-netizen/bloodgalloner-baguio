<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Settings</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; background:#f4f4f4; margin:0; }
        header { background:#b30000; color:white; padding:15px; text-align:center; }
        .container {
            max-width:400px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }
        input {
            width:100%;
            padding:8px;
            margin-bottom:10px;
        }
        button {
            width:100%;
            padding:10px;
            background:#b30000;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<header>
    <h2>Category Settings</h2>
</header>

<div class="container">

<label>Galloner Limit</label>
<input type="number" id="galloner">

<label>Bronze Limit</label>
<input type="number" id="bronze">

<label>Silver Limit</label>
<input type="number" id="silver">

<label>Gold Limit</label>
<input type="number" id="gold">

<hr>

<h3>Admin Account</h3>
<label>Username</label>
<input type="text" id="loginUsername">

<label>Password</label>
<input type="password" id="loginPassword">

<button onclick="saveSettings()">Save Settings</button>

</div>

<!-- ✅ FIREBASE INTEGRATION -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        projectId: "galloners-club",
        storageBucket: "galloners-club.firebasestorage.app",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const db = getFirestore(app);

    // Expose db globally
    window.db = db;
</script>

<script>
async function loadSettings(){
    // Load category settings from localStorage
    let settings = localStorage.getItem("categorySettings");
    if(settings){
        settings = JSON.parse(settings);
    } else {
        settings = { galloner:8, bronze:28, silver:46, gold:70 };
    }

    document.getElementById("galloner").value = settings.galloner;
    document.getElementById("bronze").value = settings.bronze;
    document.getElementById("silver").value = settings.silver;
    document.getElementById("gold").value = settings.gold;

    // Load login credentials from Firebase
    const loginDoc = await getDoc(doc(window.db, "admin", "credentials"));
    if(loginDoc.exists()){
        const data = loginDoc.data();
        document.getElementById("loginUsername").value = data.username || "admin";
        document.getElementById("loginPassword").value = data.password || "1234";
    } else {
        // Default values if not set
        document.getElementById("loginUsername").value = "admin";
        document.getElementById("loginPassword").value = "1234";
    }
}

async function saveSettings(){
    // Save category settings locally
    let settings = {
        galloner: parseInt(document.getElementById("galloner").value),
        bronze: parseInt(document.getElementById("bronze").value),
        silver: parseInt(document.getElementById("silver").value),
        gold: parseInt(document.getElementById("gold").value)
    };
    localStorage.setItem("categorySettings", JSON.stringify(settings));

    // Save login credentials to Firebase
    const username = document.getElementById("loginUsername").value.trim();
    const password = document.getElementById("loginPassword").value.trim();

    await setDoc(doc(window.db, "admin", "credentials"), { username, password });

    alert("Settings and Admin Account Saved!");
    window.location.href="dashboard.html";
}

window.onload = loadSettings;
</script>

</body>
</html>
