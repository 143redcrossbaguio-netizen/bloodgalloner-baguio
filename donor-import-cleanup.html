<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Import Cleanup (FAST DELETE)</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }
header { background:#b30000; color:white; padding:15px; text-align:center; font-size:22px; }
.container { max-width:1000px; margin:20px auto; padding:20px; background:white; border-radius:10px; }

button {
    padding:10px 15px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}
.btn-red { background:#b30000; color:white; }
.btn-blue { background:#1565c0; color:white; }

.status { margin-top:15px; font-weight:bold; }
</style>
</head>

<body>

<header>🔥 FAST IMPORT CLEANUP</header>

<div class="container">

    <button class="btn-blue" onclick="scan()">Scan Imports</button>
    <div id="list"></div>

    <div class="status" id="status"></div>

</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let groups = {};

function setStatus(msg){
    document.getElementById("status").innerText = msg;
}

async function scan(){
    setStatus("Scanning...");
    groups = {};
    document.getElementById("list").innerHTML = "";

    const snap = await db.collection("donorDatabase").get();

    snap.forEach(doc=>{
        const data = doc.data();
        const meta = data.importMeta || {};
        const key = meta.sourceFile + " | " + meta.sourceSheet;

        if(!groups[key]) groups[key] = [];
        groups[key].push(doc.id);
    });

    render();
    setStatus("Scan complete");
}

function render(){
    let html = "";

    Object.keys(groups).forEach(key=>{
        html += `
            <div style="margin-top:10px; padding:10px; border:1px solid #ccc;">
                <b>${key}</b> (${groups[key].length} rows)
                <br><br>
                <button class="btn-red" onclick="deleteGroup('${key}')">DELETE</button>
            </div>
        `;
    });

    document.getElementById("list").innerHTML = html;
}

async function confirmPassword(){
    const user = auth.currentUser;
    const pass = prompt("Enter password to confirm delete:");

    const cred = firebase.auth.EmailAuthProvider.credential(user.email, pass);
    await user.reauthenticateWithCredential(cred);
}

async function deleteGroup(key){
    try{
        if(!confirm("DELETE THIS IMPORT?")) return;

        await confirmPassword();

        const ids = groups[key];

        setStatus("Deleting " + ids.length + " records...");

        let batchSize = 500;
        let totalDeleted = 0;

        for(let i=0;i<ids.length;i+=batchSize){
            const batch = db.batch();
            const chunk = ids.slice(i, i + batchSize);

            chunk.forEach(id=>{
                batch.delete(db.collection("donorDatabase").doc(id));
            });

            await batch.commit();
            totalDeleted += chunk.length;

            setStatus(`Deleted ${totalDeleted}/${ids.length}`);
        }

        setStatus("✅ DELETE COMPLETE");
        alert("SUCCESS: Deleted " + totalDeleted + " records");

        scan();

    }catch(e){
        console.error(e);
        alert("ERROR: " + e.message);
        setStatus("ERROR");
    }
}

auth.onAuthStateChanged(user=>{
    if(!user){
        alert("Login required");
        location.href="index.html";
    }
});
</script>

</body>
</html>
