<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Donor Entry</title>
    <meta charset="UTF-8">

    <!-- Firebase CDN scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }
        header { background:#b30000; color:white; padding:15px; text-align:center; }
        .container { max-width:500px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
        input, select { width:100%; padding:8px; margin-bottom:10px; box-sizing:border-box; }
        button { padding:8px; margin-top:5px; background:#b30000; color:white; border:none; border-radius:5px; cursor:pointer; }
        .serial-box { margin-top:10px; }
    </style>
</head>

<body>

<header>
    <h2>Donor Entry</h2>
</header>

<div class="container">

<input type="text" id="firstName" placeholder="First Name">
<input type="text" id="middleName" placeholder="Middle Name">
<input type="text" id="surname" placeholder="Surname">

<select id="bloodType">
    <option value="">Blood Type</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="AB">AB</option>
    <option value="O">O</option>
</select>

<select id="rhFactor">
    <option value="">Rh Factor</option>
    <option value="+">+</option>
    <option value="-">-</option>
</select>

<input type="date" id="birthday">
<input type="text" id="contact" placeholder="Contact Number">

<hr>

<h3>Serial Records</h3>

<input type="text" id="serialInput" placeholder="Serial Number">
<input type="date" id="dateInput">
<button onclick="addSerial()">Add Serial</button>

<div id="serialList" class="serial-box"></div>

<hr>

<button onclick="saveDonor()">Save Donor</button>
<button onclick="window.location.href='dashboard.html'">Return to Dashboard</button>
<button onclick="window.location.href='tracking.html'">Go to Tracking</button>

</div>

<script>
    // Firebase configuration
    var firebaseConfig = {
        apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
        authDomain: "galloners-club.firebaseapp.com",
        projectId: "galloners-club",
        storageBucket: "galloners-club.appspot.com",
        messagingSenderId: "213049860421",
        appId: "1:213049860421:web:4156aaa52b945f48711e2c",
        measurementId: "G-XYXJH9JNXJ"
    };

    firebase.initializeApp(firebaseConfig);

    var auth = firebase.auth();
    var db = firebase.firestore();

    let serials = [];
    let editDocId = null;
    let authReady = false;

    auth.onAuthStateChanged(function(user) {
        if (!user) {
            window.location.href = "index.html";
            return;
        }

        authReady = true;

        let params = new URLSearchParams(window.location.search);
        if (params.has("editId")) {
            editDocId = params.get("editId");
            db.collection("donors").doc(editDocId).get().then(docSnap => {
                if (docSnap.exists) {
                    let d = docSnap.data();
                    document.getElementById("firstName").value = d.firstName || "";
                    document.getElementById("middleName").value = d.middleName || "";
                    document.getElementById("surname").value = d.surname || "";
                    document.getElementById("bloodType").value = d.bloodType || "";
                    document.getElementById("rhFactor").value = d.rhFactor || "";
                    document.getElementById("birthday").value = d.birthday || "";
                    document.getElementById("contact").value = d.contact || "";
                    serials = d.serials || [];
                    renderSerials();
                }
            }).catch(error => {
                console.error("Error loading donor:", error);
                alert("Error loading donor record.");
            });
        }
    });

    function addSerial() {
        let serial = document.getElementById("serialInput").value.trim();
        let date = document.getElementById("dateInput").value;

        if (serial === "" || date === "") {
            alert("Enter serial number and date.");
            return;
        }

        if (serials.some(s => s.serial === serial)) {
            alert("Duplicate serial detected!");
            return;
        }

        serials.push({ serial: serial, date: date });
        document.getElementById("serialInput").value = "";
        document.getElementById("dateInput").value = "";
        renderSerials();
    }

    function renderSerials() {
        let container = document.getElementById("serialList");
        container.innerHTML = "";
        serials.forEach((s, i) => {
            container.innerHTML += `
                <div>
                    ${s.serial} - ${s.date}
                    <button onclick="removeSerial(${i})">Remove</button>
                </div>
            `;
        });
    }

    function removeSerial(index) {
        serials.splice(index, 1);
        renderSerials();
    }

    function saveDonor() {
        if (!authReady || !auth.currentUser) {
            alert("You are not logged in.");
            window.location.href = "index.html";
            return;
        }

        let firstName = document.getElementById("firstName").value.trim();
        let middleName = document.getElementById("middleName").value.trim();
        let surname = document.getElementById("surname").value.trim();
        let bloodType = document.getElementById("bloodType").value;
        let rhFactor = document.getElementById("rhFactor").value;
        let birthday = document.getElementById("birthday").value;
        let contact = document.getElementById("contact").value.trim();

        if (!firstName || !surname || !bloodType || !rhFactor) {
            alert("Fill required fields.");
            return;
        }

        var donorData = {
            firstName,
            middleName,
            surname,
            bloodType,
            rhFactor,
            birthday,
            contact,
            serials
        };

        if (editDocId) {
            db.collection("donors").doc(editDocId).update(donorData).then(() => {
                alert("Donor updated successfully!");
                window.location.href = "tracking.html";
            }).catch(error => {
                console.error("Update error:", error);
                alert("Error updating donor.");
            });
        } else {
            db.collection("donors").add(donorData).then(() => {
                alert("Donor saved successfully!");
                window.location.href = "tracking.html";
            }).catch(error => {
                console.error("Save error:", error);
                alert("Error saving donor.");
            });
        }
    }

    window.addSerial = addSerial;
    window.removeSerial = removeSerial;
    window.saveDonor = saveDonor;
</script>

</body>
</html>
