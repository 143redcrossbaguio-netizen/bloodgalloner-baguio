<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Donor Entry</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }
        header { background:#b30000; color:white; padding:15px; text-align:center; }
        .container { max-width:500px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
        input, select { width:100%; padding:8px; margin-bottom:10px; }
        button { padding:8px; margin-top:5px; background:#b30000; color:white; border:none; border-radius:5px; cursor:pointer; }
        .serial-box { margin-top:10px; background:#f9f9f9; border:1px solid #ccc; padding:10px; border-radius:6px; }
    </style>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-app.js";
        import { getDatabase, ref, push, set, get, child } from "https://www.gstatic.com/firebasejs/10.1.0/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
          authDomain: "galloners-club.firebaseapp.com",
          projectId: "galloners-club",
          storageBucket: "galloners-club.appspot.com",
          messagingSenderId: "213049860421",
          appId: "1:213049860421:web:4156aaa52b945f48711e2c",
          measurementId: "G-XYXJH9JNXJ"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.firebaseDB = db;
    </script>
</head>

<body>

<header>
    <h2>Donor Entry</h2>
</header>

<div class="container">

    <input type="text" id="firstName" placeholder="First Name">
    <input type="text" id="middleName" placeholder="Middle Name">
    <input type="text" id="surname" placeholder="Surname">
    <select id="bloodType">
        <option value="">Blood Type</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="AB">AB</option>
        <option value="O">O</option>
    </select>
    <select id="rhFactor">
        <option value="">Rh Factor</option>
        <option value="+">+</option>
        <option value="-">-</option>
    </select>
    <input type="date" id="birthday">
    <input type="text" id="contact" placeholder="Contact Number">

    <h4>Serial Records</h4>
    <input type="text" id="serialInput" placeholder="Serial Number">
    <input type="date" id="dateInput">
    <button onclick="addSerial()">Add Serial</button>

    <div id="serialList" class="serial-box"></div>

    <button onclick="saveDonor()">Save Donor</button>
    <button onclick="window.location.href='dashboard.html'">Return to Dashboard</button>
    <button onclick="window.location.href='tracking.html'">Go to Tracking</button>

</div>

<script type="module">
let serials = [];

function addSerial(){
    let s = document.getElementById("serialInput").value.trim();
    let d = document.getElementById("dateInput").value;
    if(!s || !d){ alert("Enter serial and date"); return; }
    // Prevent duplicate serials
    if(serials.some(x=>x.serial===s)){ alert("Serial already added"); return; }
    serials.push({serial:s,date:d});
    document.getElementById("serialInput").value="";
    document.getElementById("dateInput").value="";
    renderSerials();
}

function renderSerials(){
    let container = document.getElementById("serialList");
    container.innerHTML="";
    serials.forEach((s,i)=>{
        container.innerHTML += `<div>${s.serial} - ${s.date} <button onclick="removeSerial(${i})">Remove</button></div>`;
    });
}

function removeSerial(i){ serials.splice(i,1); renderSerials(); }

async function saveDonor(){
    const donorData = {
        firstName: document.getElementById("firstName").value.trim(),
        middleName: document.getElementById("middleName").value.trim(),
        surname: document.getElementById("surname").value.trim(),
        bloodType: document.getElementById("bloodType").value,
        rhFactor: document.getElementById("rhFactor").value,
        birthday: document.getElementById("birthday").value,
        contact: document.getElementById("contact").value.trim(),
        serials
    };

    if(!donorData.firstName || !donorData.surname){ alert("First and last name required"); return; }

    const dbRef = ref(window.firebaseDB);
    const snapshot = await get(child(dbRef, "donors"));
    const donors = snapshot.val() || {};
    // Duplicate detection
    let duplicate = Object.values(donors).some(d => 
        d.firstName===donorData.firstName && 
        d.middleName===donorData.middleName && 
        d.surname===donorData.surname && 
        d.birthday===donorData.birthday
    );
    if(duplicate){ alert("Donor already exists!"); return; }

    const editKey = localStorage.getItem("editKey");
    if(editKey){
        set(ref(window.firebaseDB, "donors/"+editKey), donorData)
        .then(()=>{ localStorage.removeItem("editKey"); alert("Donor updated!"); location.href="tracking.html"; });
    } else {
        push(ref(window.firebaseDB, "donors"), donorData)
        .then(()=>{ alert("Donor saved!"); location.href="tracking.html"; });
    }
}

window.onload = async ()=>{
    const editKey = localStorage.getItem("editKey");
    if(editKey){
        const snapshot = await get(ref(window.firebaseDB,"donors/"+editKey));
        const d = snapshot.val();
        if(d){
            document.getElementById("firstName").value = d.firstName;
            document.getElementById("middleName").value = d.middleName;
            document.getElementById("surname").value = d.surname;
            document.getElementById("bloodType").value = d.bloodType;
            document.getElementById("rhFactor").value = d.rhFactor;
            document.getElementById("birthday").value = d.birthday;
            document.getElementById("contact").value = d.contact;
            serials = d.serials || [];
            renderSerials();
        }
    }
};
</script>
</body>
</html>
