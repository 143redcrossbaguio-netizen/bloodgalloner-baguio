<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blood Galloner Donor Entry</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      color: #222;
    }

    header {
      background: #b30000;
      color: white;
      padding: 18px;
      text-align: center;
    }

    .container {
      max-width: 1100px;
      margin: 25px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 0;
      color: #b30000;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    label {
      font-weight: bold;
      font-size: 14px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-primary {
      background: #b30000;
      color: white;
    }

    .btn-secondary {
      background: #444;
      color: white;
    }

    .btn-danger {
      background: #dc3545;
      color: white;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #ddd;
      padding: 9px;
      text-align: left;
    }

    th {
      background: #b30000;
      color: white;
    }

    .blood {
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      font-weight: bold;
      display: inline-block;
    }

    .Apos, .Aneg { background: #e74c3c; }
    .Bpos, .Bneg { background: #3498db; }
    .ABpos, .ABneg { background: #8e44ad; }
    .Opos, .Oneg { background: #27ae60; }

    .small {
      font-size: 12px;
      color: #666;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Blood Galloner Donor Entry</h1>
    <p>Donor Registration and Donation Tracking</p>
  </header>

  <div class="container">

    <div class="card">
      <h2>Donor Entry Form</h2>

      <div class="grid">
        <div>
          <label>Serial Number Prefix</label>
          <input type="text" id="serialPrefix" value="PRC2600-" />
        </div>

        <div>
          <label>Serial Number</label>
          <input type="text" id="serialNumber" placeholder="Example: 0001" />
        </div>

        <div>
          <label>Date</label>
          <input type="date" id="entryDate" />
        </div>

        <div>
          <label>Donor Type</label>
          <select id="donorType">
            <option value="Walk-in">Walk-in</option>
            <option value="MBD">MBD</option>
            <option value="Patient Directed">Patient Directed</option>
          </select>
        </div>

        <div>
          <label>Donor Name</label>
          <input type="text" id="donorName" placeholder="Full name" oninput="lookupDonor()" />
          <p class="small" id="lookupResult"></p>
        </div>

        <div>
          <label>Blood Type</label>
          <select id="bloodType">
            <option value="">Select Blood Type</option>
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
          </select>
        </div>

        <div>
          <label>Amount / Blood Bag Type</label>
          <select id="amount">
            <option value="">Select</option>
            <option value="450cc">450cc</option>
            <option value="350cc">350cc</option>
            <option value="Double Bag">Double Bag</option>
            <option value="Triple Bag">Triple Bag</option>
            <option value="Quadruple Bag">Quadruple Bag</option>
          </select>
        </div>

        <div>
          <label>Time Started</label>
          <input type="time" id="timeStarted" />
        </div>

        <div>
          <label>Time Ended</label>
          <input type="time" id="timeEnded" />
        </div>

        <div>
          <label>Number of Donations</label>
          <input type="number" id="donationCount" min="1" value="1" />
        </div>

        <div>
          <label>Status</label>
          <select id="status">
            <option value="Successful">Successful</option>
            <option value="Deferred">Deferred</option>
            <option value="Incomplete">Incomplete</option>
            <option value="Reaction">Reaction</option>
          </select>
        </div>

        <div>
          <label>Encoded By</label>
          <input type="text" id="encodedBy" placeholder="Staff name" />
        </div>
      </div>

      <div style="margin-top:15px;">
        <label>Remarks</label>
        <textarea id="remarks" rows="3" placeholder="Remarks / notes"></textarea>
      </div>

      <div class="btn-row">
        <button class="btn-primary" onclick="saveDonor()">Save Entry</button>
        <button class="btn-secondary" onclick="addSerial()">Add Serial</button>
        <button class="btn-secondary" onclick="clearForm()">Clear Form</button>
        <button class="btn-danger" onclick="clearAllRecords()">Clear All Records</button>
      </div>
    </div>

    <div class="card">
      <h2>Saved Donor Records</h2>

      <input type="text" id="searchInput" placeholder="Search by name, serial, blood type, or donor type..." oninput="renderTable()" />

      <table>
        <thead>
          <tr>
            <th>Serial</th>
            <th>Date</th>
            <th>Name</th>
            <th>Blood Type</th>
            <th>Type</th>
            <th>Donations</th>
            <th>Amount</th>
            <th>Time</th>
            <th>Status</th>
            <th>Remarks</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="donorTable"></tbody>
      </table>
    </div>

  </div>

  <script>
    let donors = JSON.parse(localStorage.getItem("donors")) || [];

    document.getElementById("entryDate").valueAsDate = new Date();

    function getFullSerial() {
      const prefix = document.getElementById("serialPrefix").value.trim();
      const number = document.getElementById("serialNumber").value.trim();
      return prefix + number;
    }

    function saveDonor() {
      const donorName = document.getElementById("donorName").value.trim();
      const bloodType = document.getElementById("bloodType").value;
      const serialNumber = document.getElementById("serialNumber").value.trim();

      if (!serialNumber || !donorName || !bloodType) {
        alert("Please fill in Serial Number, Donor Name, and Blood Type.");
        return;
      }

      const donor = {
        id: Date.now(),
        serial: getFullSerial(),
        date: document.getElementById("entryDate").value,
        donorType: document.getElementById("donorType").value,
        name: donorName,
        bloodType: bloodType,
        amount: document.getElementById("amount").value,
        timeStarted: document.getElementById("timeStarted").value,
        timeEnded: document.getElementById("timeEnded").value,
        donationCount: document.getElementById("donationCount").value,
        status: document.getElementById("status").value,
        encodedBy: document.getElementById("encodedBy").value.trim(),
        remarks: document.getElementById("remarks").value.trim(),
        createdAt: new Date().toISOString()
      };

      donors.push(donor);
      localStorage.setItem("donors", JSON.stringify(donors));

      alert("Donor entry saved successfully.");
      clearForm();
      renderTable();
    }

    function lookupDonor() {
      const name = document.getElementById("donorName").value.trim().toLowerCase();
      const result = document.getElementById("lookupResult");

      if (!name) {
        result.textContent = "";
        return;
      }

      const existing = donors.filter(d =>
        d.name.toLowerCase().includes(name)
      );

      if (existing.length > 0) {
        const latest = existing[existing.length - 1];
        result.textContent =
          "Repeat donor found. Last blood type: " +
          latest.bloodType +
          " | Total previous records: " +
          existing.length;

        document.getElementById("bloodType").value = latest.bloodType;
        document.getElementById("donationCount").value = existing.length + 1;
      } else {
        result.textContent = "New donor.";
        document.getElementById("donationCount").value = 1;
      }
    }

    function bloodClass(type) {
      return type
        .replace("+", "pos")
        .replace("-", "neg")
        .replace("AB", "AB")
        .replace("O", "O")
        .replace("A", "A")
        .replace("B", "B");
    }

    function renderTable() {
      const tbody = document.getElementById("donorTable");
      const search = document.getElementById("searchInput").value.toLowerCase();

      tbody.innerHTML = "";

      const filtered = donors.filter(d =>
        d.serial.toLowerCase().includes(search) ||
        d.name.toLowerCase().includes(search) ||
        d.bloodType.toLowerCase().includes(search) ||
        d.donorType.toLowerCase().includes(search)
      );

      if (filtered.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="11" style="text-align:center;">No records found</td>
          </tr>
        `;
        return;
      }

      filtered.forEach(donor => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${donor.serial}</td>
          <td>${donor.date}</td>
          <td>${donor.name}</td>
          <td>
            <span class="blood ${bloodClass(donor.bloodType)}">
              ${donor.bloodType}
            </span>
          </td>
          <td>${donor.donorType}</td>
          <td>${donor.donationCount}</td>
          <td>${donor.amount}</td>
          <td>${donor.timeStarted} - ${donor.timeEnded}</td>
          <td>${donor.status}</td>
          <td>${donor.remarks}</td>
          <td>
            <button class="btn-danger" onclick="deleteDonor(${donor.id})">
              Delete
            </button>
          </td>
        `;

        tbody.appendChild(row);
      });
    }

    function deleteDonor(id) {
      if (!confirm("Delete this donor record?")) return;

      donors = donors.filter(d => d.id !== id);
      localStorage.setItem("donors", JSON.stringify(donors));
      renderTable();
    }

    function addSerial() {
      const serialInput = document.getElementById("serialNumber");
      let current = serialInput.value.trim();

      if (!current) {
        serialInput.value = "0001";
        return;
      }

      let number = parseInt(current, 10);

      if (isNaN(number)) {
        alert("Serial number must be numeric.");
        return;
      }

      number++;

      serialInput.value = String(number).padStart(current.length, "0");
    }

    function clearForm() {
      document.getElementById("serialNumber").value = "";
      document.getElementById("entryDate").valueAsDate = new Date();
      document.getElementById("donorType").value = "Walk-in";
      document.getElementById("donorName").value = "";
      document.getElementById("bloodType").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("timeStarted").value = "";
      document.getElementById("timeEnded").value = "";
      document.getElementById("donationCount").value = 1;
      document.getElementById("status").value = "Successful";
      document.getElementById("encodedBy").value = "";
      document.getElementById("remarks").value = "";
      document.getElementById("lookupResult").textContent = "";
    }

    function clearAllRecords() {
      if (!confirm("This will delete all donor records. Continue?")) return;

      donors = [];
      localStorage.removeItem("donors");
      renderTable();
    }

    renderTable();
  </script>
</body>
</html>
