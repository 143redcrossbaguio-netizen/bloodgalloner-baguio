<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Partner Organization</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }
        header { background:#b30000; color:white; padding:15px; text-align:center; }
        .container { max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
        input, select { padding:6px; margin:5px 0; }
        button { padding:6px 10px; margin:5px; border:none; border-radius:4px; cursor:pointer; }
        .add-btn { background:#b30000; color:white; }
        .edit-btn { background:#1565c0; color:white; }
        .delete-btn { background:#c62828; color:white; }
        table { width:100%; border-collapse:collapse; margin-top:15px; }
        th, td { border:1px solid #ddd; padding:8px; text-align:center; }
        th { background:#b30000; color:white; }
    </style>
</head>
<body>

<header>
    <h2>Partner Organization Entry</h2>
</header>

<div class="container">

<h3>Add Organization</h3>
<input type="text" id="orgName" placeholder="Organization Name">
<input type="number" id="numDonors" placeholder="Number of Donors">
<input type="date" id="orgDate" placeholder="Date">
<select id="awardStatus">
    <option value="">Awarded?</option>
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>
<input type="date" id="awardDate" placeholder="Award Date">
<button class="add-btn" onclick="addOrganization()">Add Organization</button>

<h3>Search</h3>
<input type="text" id="searchInput" placeholder="Search Organization..." onkeyup="searchOrg()">

<h3>Partner Organizations</h3>
<table>
    <thead>
        <tr>
            <th>#</th>
            <th>Organization</th>
            <th>Number of Donors</th>
            <th>Total ML</th>
            <th>Date</th>
            <th>Award Status</th>
            <th>Award Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="orgTable"></tbody>
</table>

<br>
<button onclick="exportCSV()">Export to CSV</button>
<button onclick="printOrgs()">Print</button>
<button onclick="window.location.href='dashboard.html'">Return to Dashboard</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c",
    measurementId: "G-XYXJH9JNXJ"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);
window.db = db;

let organizations = []; // local cache with IDs

async function loadOrganizations(){
    organizations = [];
    const querySnapshot = await getDocs(collection(db,"partnerOrganizations"));
    querySnapshot.forEach(docSnap => {
        const data = docSnap.data();
        data.id = docSnap.id;
        organizations.push(data);
    });
    renderTable();
}

function renderTable(){
    const table = document.getElementById("orgTable");
    table.innerHTML = "";
    let searchVal = document.getElementById("searchInput").value.toLowerCase();
    organizations.forEach((org,i)=>{
        if(org.name.toLowerCase().includes(searchVal)){
            table.innerHTML += `
                <tr>
                    <td>${i+1}</td>
                    <td>${org.name}</td>
                    <td>${org.numDonors}</td>
                    <td>${org.numDonors * 450}</td>
                    <td>${org.date}</td>
                    <td>${org.awardStatus || ''}</td>
                    <td>${org.awardDate || ''}</td>
                    <td>
                        <button class="edit-btn" onclick="editOrganization('${org.id}')">Edit</button>
                        <button class="delete-btn" onclick="deleteOrganization('${org.id}')">Delete</button>
                    </td>
                </tr>
            `;
        }
    });
}

async function addOrganization(){
    const name = document.getElementById("orgName").value.trim();
    const numDonors = parseInt(document.getElementById("numDonors").value);
    const date = document.getElementById("orgDate").value;
    const awardStatus = document.getElementById("awardStatus").value;
    const awardDate = document.getElementById("awardDate").value;

    if(!name || !numDonors || !date){
        alert("Please fill all required fields.");
        return;
    }

    // Prevent duplicate
    if(organizations.some(o=>o.name.toLowerCase()===name.toLowerCase())){
        alert("This organization already exists!");
        return;
    }

    const orgData = {name,numDonors,date,awardStatus,awardDate};
    const docRef = await addDoc(collection(db,"partnerOrganizations"), orgData);
    orgData.id = docRef.id;
    organizations.push(orgData);

    renderTable();
    document.getElementById("orgName").value="";
    document.getElementById("numDonors").value="";
    document.getElementById("orgDate").value="";
    document.getElementById("awardStatus").value="";
    document.getElementById("awardDate").value="";
}

async function deleteOrganization(id){
    await deleteDoc(doc(db,"partnerOrganizations",id));
    organizations = organizations.filter(o=>o.id!==id);
    renderTable();
}

function searchOrg(){ renderTable(); }

function printOrgs(){
    let printContent = "<h1>Partner Organizations</h1><table border='1' cellpadding='5'><tr><th>Organization</th><th>Total ML</th><th>Award Status</th></tr>";
    organizations.forEach(o=>{
        printContent += `<tr><td>${o.name}</td><td>${o.numDonors*450}</td><td>${o.awardStatus || ''}</td></tr>`;
    });
    printContent += "</table>";
    const w = window.open("");
    w.document.write(printContent);
    w.print();
}

function exportCSV(){
    let csv = "Organization,Number of Donors,Total ML,Date,Award Status,Award Date\n";
    organizations.forEach(o=>{
        csv += `${o.name},${o.numDonors},${o.numDonors*450},${o.date},${o.awardStatus || ''},${o.awardDate || ''}\n`;
    });
    const blob = new Blob([csv], {type:"text/csv"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "partner_organizations.csv";
    a.click();
    URL.revokeObjectURL(url);
}

// Edit organization inline
function editOrganization(id){
    const org = organizations.find(o=>o.id===id);
    if(!org) return;

    const newNumDonors = prompt("Enter number of donors:", org.numDonors);
    const newDate = prompt("Enter date:", org.date);
    const newAwardStatus = prompt("Awarded? yes/no:", org.awardStatus || "");
    const newAwardDate = prompt("Award Date:", org.awardDate || "");

    if(newNumDonors && newDate){
        org.numDonors = parseInt(newNumDonors);
        org.date = newDate;
        org.awardStatus = newAwardStatus;
        org.awardDate = newAwardDate;
        setDoc(doc(db,"partnerOrganizations",id), org);
        renderTable();
    }
}

window.onload = loadOrganizations;
</script>

</body>
</html>
