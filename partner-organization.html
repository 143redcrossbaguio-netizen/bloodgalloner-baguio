<!DOCTYPE html>
<html>
<head>
<title>Partner Organization</title>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#2e7d32;color:white;padding:15px;text-align:center;}

.container{
max-width:1200px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select{padding:6px;margin:3px;}

button{
padding:6px 10px;
margin:3px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.save-btn{background:#2e7d32;}
.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.claim-btn{background:#6a1b9a;}
.print-btn{background:#000;}
.export-btn{background:#ff9800;}
.return-btn{background:#444;}

table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#2e7d32;color:white;}

#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}
#modalContent{
background:white;
padding:20px;
width:420px;
margin:100px auto;
border-radius:10px;
}

@media print{
body *{visibility:hidden;}
#printArea,#printArea *{visibility:visible;}
#printArea{position:absolute;left:0;top:0;width:100%;}
}
</style>
</head>

<body>

<header>
<h2>Partner Organization</h2>
</header>

<div class="container">

<input type="text" id="orgName" placeholder="Organization Name">
<input type="date" id="orgDate">
<input type="number" id="initialDonors" placeholder="Initial Number of Donors">
<button class="save-btn" id="savePartner" type="button">Save</button>

<br>

<button class="print-btn" onclick="printReport()">Print</button>
<button class="export-btn" onclick="exportCSV()">Export CSV</button>
<button class="return-btn" onclick="window.location.href='dashboard.html'">Return</button>

<table>
<thead>
<tr>
<th>Organization</th>
<th>Date Added</th>
<th>Total ML</th>
<th>Award</th>
<th>Claimed</th>
<th>Date Claimed</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="partnerTable"></tbody>
</table>
</div>

<div id="printArea">
<h2>Partner Organization Report</h2>
<table border="1" width="100%" cellpadding="5">
<thead>
<tr>
<th>Organization</th>
<th>Total ML</th>
<th>Award</th>
</tr>
</thead>
<tbody id="printTable"></tbody>
</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let partners=[];
let thresholds={Bronze:1000,Silver:5000,Gold:10000,Platinum:20000};

function calculateAward(totalML){
let award="";
Object.entries(thresholds).forEach(([key,value])=>{
if(totalML>=value) award=key;
});
return award;
}

async function loadPartners(){
const snap=await getDocs(collection(db,"partners"));
partners=[];
snap.forEach(d=>partners.push({id:d.id,...d.data()}));
display();
}

function display(){
const table=document.getElementById("partnerTable");
const printTable=document.getElementById("printTable");
table.innerHTML="";
printTable.innerHTML="";

partners.forEach(p=>{
const totalML=(p.entries||[]).reduce((s,e)=>s+e.donors*450,0);
const award=calculateAward(totalML);

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.dateAdded||""}</td>
<td>${totalML}</td>
<td>${award}</td>
<td>${p.claimed?"Yes":"No"}</td>
<td>${p.dateClaimed||""}</td>
<td>
<button class="claim-btn" onclick="toggleClaim('${p.id}')">Claim</button>
<button class="delete-btn" onclick="deletePartner('${p.id}')">Delete</button>
</td>
</tr>
`;

printTable.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${totalML}</td>
<td>${award}</td>
</tr>
`;
});
}

document.getElementById("savePartner").addEventListener("click",async function(){

const name=document.getElementById("orgName").value.trim();
const date=document.getElementById("orgDate").value;
const donors=parseInt(document.getElementById("initialDonors").value)||0;

if(!name || !date){
alert("Please complete all required fields.");
return;
}

// 🔴 DUPLICATE CHECK
const duplicate=partners.find(p=>p.name.toLowerCase()===name.toLowerCase());
if(duplicate){
alert("Organization already exists. Duplicate not allowed.");
return;
}

try{
await addDoc(collection(db,"partners"),{
name:name,
dateAdded:date,
entries: donors>0 ? [{donors:donors,date:date}] : [],
claimed:false,
dateClaimed:""
});

document.getElementById("orgName").value="";
document.getElementById("orgDate").value="";
document.getElementById("initialDonors").value="";

await loadPartners();

}catch(error){
console.error(error);
alert("Error saving organization.");
}
});

window.toggleClaim=async function(id){
const p=partners.find(x=>x.id===id);

try{
await updateDoc(doc(db,"partners",id),{
claimed:!p.claimed,
dateClaimed:!p.claimed?new Date().toISOString().split("T")[0]:""
});
await loadPartners();
}catch(error){
console.error(error);
alert("Error updating claim status.");
}
}

window.deletePartner=async function(id){
if(confirm("Delete organization?")){
await deleteDoc(doc(db,"partners",id));
await loadPartners();
}
}

window.printReport=function(){window.print();}

window.exportCSV=function(){
let csv="Organization,Total ML,Award\n";
partners.forEach(p=>{
const totalML=(p.entries||[]).reduce((s,e)=>s+e.donors*450,0);
const award=calculateAward(totalML);
csv+=`${p.name},${totalML},${award}\n`;
});
const blob=new Blob([csv],{type:"text/csv"});
const link=document.createElement("a");
link.href=URL.createObjectURL(blob);
link.download="partner_report.csv";
link.click();
}

window.onload=loadPartners;

</script>

</body>
</html>
