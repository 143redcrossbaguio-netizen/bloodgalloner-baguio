<!DOCTYPE html>
<html>
<head>
    <title>Partner Organization</title>
    <meta charset="UTF-8">
    <style>
        body {margin:0;font-family:Arial;background:#f4f4f4;}
        header{background:#2e7d32;color:white;padding:15px;text-align:center;}
        .container{max-width:1200px;margin:30px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
        input,select{padding:6px;margin:4px;}
        button{padding:6px 10px;margin:4px;border:none;border-radius:5px;cursor:pointer;color:white;}
        .save-btn{background:#2e7d32;}
        .edit-btn{background:#1565c0;}
        .delete-btn{background:#c62828;}
        .print-btn{background:#000;}
        .export-btn{background:#ff9800;}
        .return-btn{background:#444;}
        table{width:100%;border-collapse:collapse;margin-top:20px;}
        th,td{border:1px solid #ddd;padding:6px;text-align:center;}
        th{background:#2e7d32;color:white;}
        #modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);}
        #modalContent{background:white;padding:20px;width:450px;margin:80px auto;border-radius:10px;}
        @media print{body *{visibility:hidden;}#printArea,#printArea *{visibility:visible;}#printArea{position:absolute;left:0;top:0;width:100%;}}
    </style>
</head>
<body>

<header><h2>Partner Organization</h2></header>

<div class="container">

<h3>Add Organization</h3>
<input type="text" id="orgName" placeholder="Organization Name">
<input type="date" id="orgDate">
<input type="number" id="initialDonors" placeholder="Initial Donors">
<button class="save-btn" id="savePartner">Save</button>

<br><br>

<input type="text" id="searchBox" placeholder="Search organization...">
<button class="print-btn" onclick="printReport()">Print</button>
<button class="export-btn" onclick="exportCSV()">Export CSV</button>
<button class="return-btn" onclick="goDashboard()">Return to Dashboard</button>

<table>
<thead>
<tr>
<th>Organization</th>
<th>Date Added</th>
<th>Total ML</th>
<th>Award</th>
<th>Awarded</th>
<th>Date Awarded</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="partnerTable"></tbody>
</table>

</div>

<div id="printArea">
<h2>Partner Organization Report</h2>
<table border="1" width="100%">
<thead><tr><th>Organization</th><th>Total ML</th><th>Award</th></tr></thead>
<tbody id="printTable"></tbody>
</table>
</div>

<div id="modal">
<div id="modalContent">
<h3>Manage Entries</h3>
<input type="number" id="newDonors" placeholder="Number of Donors">
<input type="date" id="newDate">
<button class="save-btn" id="saveEntryBtn">Add Entry</button>
<hr>
<div id="entryList"></div>
<button class="delete-btn" onclick="closeModal()">Close</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔹 Firebase Config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let partners = [];
let currentId = null;

// Calculate total ML & award
function calculateAward(total){
  if(total>=20000) return "Platinum";
  if(total>=10000) return "Gold";
  if(total>=5000) return "Silver";
  if(total>=1000) return "Bronze";
  return "";
}

// Real-time listener
const q = query(collection(db,"partners"),orderBy("dateAdded","asc"));
onSnapshot(q, snapshot=>{
  partners = [];
  snapshot.forEach(docSnap => {partners.push({id:docSnap.id,...docSnap.data()});});
  display();
});

// Display table
function display(){
  const table = document.getElementById("partnerTable");
  const printTable = document.getElementById("printTable");
  const search = document.getElementById("searchBox").value.toLowerCase();
  table.innerHTML = ""; printTable.innerHTML = "";
  partners.forEach(p=>{
    if(search && !p.name.toLowerCase().includes(search)) return;
    const total = (p.entries||[]).reduce((s,e)=>s+e.donors*450,0);
    const award = calculateAward(total);
    table.innerHTML += `
      <tr>
        <td>${p.name}</td>
        <td>${p.dateAdded}</td>
        <td>${total}</td>
        <td>${award}</td>
        <td>
          <select onchange="setAward('${p.id}',this.value)">
            <option value="No" ${!p.awarded?"selected":""}>No</option>
            <option value="Yes" ${p.awarded?"selected":""}>Yes</option>
          </select>
        </td>
        <td>
          ${p.awarded ? `<input type="date" value="${p.dateAwarded||""}" onchange="setAwardDate('${p.id}',this.value)">` : ""}
        </td>
        <td>
          <button class="edit-btn" onclick="openModal('${p.id}')">Entries</button>
          <button class="delete-btn" onclick="deleteOrg('${p.id}')">Delete</button>
        </td>
      </tr>
    `;
    printTable.innerHTML += `<tr><td>${p.name}</td><td>${total}</td><td>${award}</td></tr>`;
  });
}

// Save organization
document.getElementById("savePartner").addEventListener("click", async()=>{
  const name = document.getElementById("orgName").value.trim();
  const date = document.getElementById("orgDate").value;
  const donors = parseInt(document.getElementById("initialDonors").value)||0;
  if(!name||!date) return alert("Fill required fields.");
  if(partners.find(p=>p.name.toLowerCase()===name.toLowerCase())) return alert("Organization already exists.");
  try{
    await addDoc(collection(db,"partners"),{
      name,
      dateAdded:date,
      entries: donors>0?[{donors,date}]:[],
      awarded:false,
      dateAwarded:""
    });
    document.getElementById("orgName").value="";
    document.getElementById("orgDate").value="";
    document.getElementById("initialDonors").value="";
  } catch(e){console.error(e);alert("Error saving organization.");}
});

// Modal & entries
window.openModal = function(id){currentId=id;renderEntries();document.getElementById("modal").style.display="block";};
function renderEntries(){
  const p = partners.find(x=>x.id===currentId);
  const list = document.getElementById("entryList"); list.innerHTML="";
  (p.entries||[]).forEach((e,i)=>{list.innerHTML+=`<div>Donors:${e.donors} | Date:${e.date} <button onclick="deleteEntry(${i})">Delete</button></div>`;});
}
document.getElementById("saveEntryBtn").addEventListener("click", async()=>{
  const donors = parseInt(document.getElementById("newDonors").value);
  const date = document.getElementById("newDate").value;
  if(!donors||!date)return;
  const p = partners.find(x=>x.id===currentId);
  const updated = [...(p.entries||[]),{donors,date}];
  await updateDoc(doc(db,"partners",currentId),{entries:updated});
  document.getElementById("newDonors").value=""; document.getElementById("newDate").value="";
  renderEntries();
});
window.deleteEntry = async function(index){
  const p = partners.find(x=>x.id===currentId);
  const updated = [...(p.entries||[])]; updated.splice(index,1);
  await updateDoc(doc(db,"partners",currentId),{entries:updated}); renderEntries();
};
window.setAward=async function(id,value){await updateDoc(doc(db,"partners",id),{awarded:value==="Yes",dateAwarded:value==="Yes"?new Date().toISOString().split("T")[0]:""});};
window.setAwardDate=async function(id,date){await updateDoc(doc(db,"partners",id),{dateAwarded:date});};
window.deleteOrg=async function(id){if(confirm("Delete organization?")) await deleteDoc(doc(db,"partners",id));};
window.printReport=function(){window.print();};
window.exportCSV=function(){let csv="Organization,Total ML,Award\n";partners.forEach(p=>{const total=(p.entries||[]).reduce((s,e)=>s+e.donors*450,0);const award=calculateAward(total);csv+=`${p.name},${total},${award}\n`;});const blob=new Blob([csv],{type:"text/csv"});const link=document.createElement("a");link.href=URL.createObjectURL(blob);link.download="partner_report.csv";link.click();};
window.closeModal=function(){document.getElementById("modal").style.display="none";};
document.getElementById("searchBox").addEventListener("input",display);
window.goDashboard=function(){window.location.href="dashboard.html";};
</script>

</body>
</html>
