<!DOCTYPE html>
<html>
<head>
    <title>Partner Organization</title>
    <meta charset="UTF-8">

    <style>
        body {
            margin:0;
            font-family: Arial, sans-serif;
            background:#f4f4f4;
        }

        header {
            background:#2e7d32;
            color:white;
            padding:15px;
            text-align:center;
        }

        .container {
            max-width:900px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        input {
            padding:8px;
            margin:5px;
        }

        button {
            padding:8px 12px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            color:white;
        }

        .save-btn { background:#2e7d32; }
        .print-btn { background:#6a1b9a; }
        .dashboard-btn { background:#444; }

        table {
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td {
            border:1px solid #ddd;
            padding:10px;
            text-align:center;
        }

        th {
            background:#2e7d32;
            color:white;
        }
    </style>
</head>

<body>

<header>
    <h2>Partner Organization</h2>
</header>

<div class="container">

    <input type="text" id="orgName" placeholder="Organization Name">
    <input type="number" id="donorCount" placeholder="Number of Donors">
    <input type="date" id="orgDate">

    <button class="save-btn" id="savePartner">Save</button>
    <button class="print-btn" onclick="window.print()">Print</button>
    <button class="dashboard-btn" onclick="window.location.href='dashboard.html'">Return to Dashboard</button>

    <table>
        <thead>
            <tr>
                <th>Organization</th>
                <th>Date</th>
                <th>Number of Donors</th>
                <th>Total ML</th>
            </tr>
        </thead>
        <tbody id="partnerTable"></tbody>
    </table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadPartners() {

    const querySnapshot = await getDocs(collection(db, "partners"));
    const table = document.getElementById("partnerTable");
    table.innerHTML = "";

    querySnapshot.forEach((doc) => {
        const data = doc.data();
        const totalML = data.donorCount * 450;

        table.innerHTML += `
            <tr>
                <td>${data.name}</td>
                <td>${data.date}</td>
                <td>${data.donorCount}</td>
                <td>${totalML} ml</td>
            </tr>
        `;
    });
}

document.getElementById("savePartner").addEventListener("click", async () => {

    const name = document.getElementById("orgName").value.trim();
    const donorCount = parseInt(document.getElementById("donorCount").value);
    const date = document.getElementById("orgDate").value;

    if(!name || !donorCount || !date){
        alert("Fill all fields.");
        return;
    }

    await addDoc(collection(db, "partners"), {
        name: name,
        donorCount: donorCount,
        date: date
    });

    alert("Partner saved successfully!");

    document.getElementById("orgName").value = "";
    document.getElementById("donorCount").value = "";
    document.getElementById("orgDate").value = "";

    loadPartners();
});

window.onload = loadPartners;

</script>

</body>
</html>
