<!DOCTYPE html>
<html>
<head>
    <title>Partner Organization</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family: Arial; background:#f4f4f4; }
        header { background:#2e7d32; color:white; padding:15px; text-align:center; }

        .container {
            max-width:1200px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        input, select { padding:6px; }

        button {
            padding:8px 12px;
            margin:5px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            color:white;
        }

        .save-btn { background:#2e7d32; }
        .print-btn { background:#6a1b9a; }
        .dashboard-btn { background:#444; }

        table {
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td {
            border:1px solid #ddd;
            padding:6px;
            text-align:center;
        }

        th { background:#2e7d32; color:white; }
    </style>
</head>

<body>

<header>
    <h2>Partner Organization</h2>
</header>

<div class="container">

    <!-- ENTRY -->
    <input type="text" id="orgName" placeholder="Organization Name">
    <input type="number" id="donorCount" placeholder="Number of Donors">
    <input type="date" id="orgDate">
    <button class="save-btn" id="savePartner">Save</button>
    <button class="print-btn" onclick="window.print()">Print</button>
    <button class="dashboard-btn" onclick="window.location.href='dashboard.html'">Return to Dashboard</button>

    <hr>

    <!-- SEARCH -->
    <input type="text" id="searchBox" placeholder="Search Organization">

    <table>
        <thead>
            <tr>
                <th>Organization</th>
                <th>Date</th>
                <th>Donors</th>
                <th>Total ML</th>
                <th>Award Type</th>
                <th>Claimed</th>
                <th>Date Claimed</th>
            </tr>
        </thead>
        <tbody id="partnerTable"></tbody>
    </table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let partnerData = [];
let awardTypes = [];

/* LOAD AWARD TYPES FROM SETTINGS */
async function loadAwardTypes() {
    const snapshot = await getDocs(collection(db, "settings"));
    snapshot.forEach(docSnap => {
        const data = docSnap.data();
        if(data.awardTypes){
            awardTypes = data.awardTypes;
        }
    });
}

/* LOAD PARTNERS */
async function loadPartners() {
    const snapshot = await getDocs(collection(db, "partners"));
    partnerData = [];
    snapshot.forEach(docSnap => {
        partnerData.push({ id: docSnap.id, ...docSnap.data() });
    });
    displayPartners(partnerData);
}

/* DISPLAY TABLE */
function displayPartners(data) {
    const table = document.getElementById("partnerTable");
    table.innerHTML = "";

    data.forEach(item => {
        const totalML = item.donorCount * 450;

        let awardOptions = awardTypes.map(type =>
            `<option value="${type}" ${item.awardType===type?'selected':''}>${type}</option>`
        ).join("");

        table.innerHTML += `
        <tr>
            <td>${item.name}</td>
            <td>${item.date}</td>
            <td>${item.donorCount}</td>
            <td>${totalML} ml</td>

            <td>
                <select onchange="updateField('${item.id}','awardType',this.value)">
                    <option value="">Select</option>
                    ${awardOptions}
                </select>
            </td>

            <td>
                <select onchange="updateField('${item.id}','claimedStatus',this.value)">
                    <option value="No" ${item.claimedStatus==='No'?'selected':''}>Not Claimed</option>
                    <option value="Yes" ${item.claimedStatus==='Yes'?'selected':''}>Claimed</option>
                </select>
            </td>

            <td>
                <input type="date" value="${item.claimedDate||''}"
                onchange="updateField('${item.id}','claimedDate',this.value)">
            </td>
        </tr>
        `;
    });
}

/* SAVE NEW PARTNER */
document.getElementById("savePartner").addEventListener("click", async () => {

    const name = document.getElementById("orgName").value.trim();
    const donorCount = parseInt(document.getElementById("donorCount").value);
    const date = document.getElementById("orgDate").value;

    if(!name || !donorCount || !date){
        alert("Fill all fields.");
        return;
    }

    await addDoc(collection(db,"partners"),{
        name,
        donorCount,
        date,
        awardType:"",
        claimedStatus:"No",
        claimedDate:""
    });

    document.getElementById("orgName").value="";
    document.getElementById("donorCount").value="";
    document.getElementById("orgDate").value="";

    loadPartners();
});

/* UPDATE PER ROW */
window.updateField = async function(id, field, value){
    const ref = doc(db,"partners",id);
    await updateDoc(ref,{ [field]: value });
};

/* SEARCH */
document.getElementById("searchBox").addEventListener("input", function(){
    const val = this.value.toLowerCase();
    const filtered = partnerData.filter(p =>
        p.name.toLowerCase().includes(val)
    );
    displayPartners(filtered);
});

/* INIT */
window.onload = async () => {
    await loadAwardTypes();
    await loadPartners();
};
</script>

</body>
</html>
