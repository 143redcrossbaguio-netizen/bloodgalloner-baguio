<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Partner Organization</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }
        header { background:#b30000; color:white; padding:15px; text-align:center; position:relative; }
        .settings-icon {
            position:absolute;
            right:20px;
            top:15px;
            cursor:pointer;
            font-size:20px;
        }
        .container { max-width:95%; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
        input { padding:5px; margin:5px; }
        button { padding:5px 10px; margin:5px; border:none; border-radius:4px; cursor:pointer; color:white; }
        .add-btn { background:#b30000; }
        .edit-btn { background:#1565c0; }
        .delete-btn { background:#c62828; }
        .print-btn { background:#444; }
        .export-btn { background:#222; }
        #dashboardBtn { background:#1e88e5; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { padding:8px; border:1px solid #ddd; text-align:center; }
        th { background:#b30000; color:white; }
        .modal {
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.5);
            justify-content:center;
            align-items:center;
        }
        .modal-content {
            background:white;
            padding:20px;
            border-radius:10px;
            width:300px;
        }
        .history-row { background:#f9f9f9; }
    </style>
</head>
<body>

<header>
    <h2>Partner Organization</h2>
    <div class="settings-icon" onclick="openSettings()">⚙️</div>
</header>

<div class="container">

    <input type="text" id="searchInput" placeholder="Search organization..." onkeyup="searchOrg()">

    <div style="margin-top:10px;">
        <input type="text" id="orgName" placeholder="Organization Name">
        <input type="number" id="numDonors" placeholder="Number of Donors">
        <input type="date" id="orgDate">
        <button class="add-btn" id="addBtn">Add Organization</button>
    </div>

    <button class="export-btn" id="exportBtn">Export CSV</button>
    <button class="print-btn" id="printBtn">Print</button>
    <button id="dashboardBtn">Return to Dashboard</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Organization</th>
                <th>Date</th>
                <th>Number of Donors</th>
                <th>Total (ml)</th>
                <th>Award</th>
                <th>Award Date</th>
                <th>Status</th>
                <th>Claimed Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="orgTable"></tbody>
    </table>
</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>Reward Settings</h3>
        <input type="number" id="rewardLimit" placeholder="Donor Limit">
        <input type="text" id="rewardType" placeholder="Reward Name">
        <br>
        <button style="background:#2e7d32;" onclick="saveSettings()">Save</button>
        <button style="background:#757575;" onclick="closeSettings()">Close</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let organizations = [];
let rewardLimit = 50;
let rewardType = "Gold Award";

/* LOAD */
async function loadOrganizations(){
    organizations = [];
    const snapshot = await getDocs(collection(db,"partnerOrganizations"));
    snapshot.forEach(docSnap=>{
        const data = docSnap.data();
        data.id = docSnap.id;
        if(!data.history) data.history = [];
        organizations.push(data);
    });
    renderTable();
}

/* CALCULATE */
function calculateTotalML(numDonors){
    return numDonors * 450;
}

/* AUTO AWARD */
function checkAward(org){
    if(org.numDonors >= rewardLimit){
        if(!org.awardDate){
            org.awardDate = new Date().toISOString().split("T")[0];
            org.status = "Unclaimed";
            org.award = rewardType;
        }
    }
}

/* RENDER */
function renderTable(){
    const table = document.getElementById("orgTable");
    table.innerHTML = "";

    organizations.forEach((org,index)=>{

        checkAward(org);

        table.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${org.name}</td>
            <td>${org.date}</td>
            <td>${org.numDonors}</td>
            <td>${calculateTotalML(org.numDonors)}</td>
            <td>${org.award || "-"}</td>
            <td>${org.awardDate || "-"}</td>
            <td>${org.status || "-"}</td>
            <td>${org.claimedDate || "-"}</td>
            <td>
                <button class="edit-btn" onclick="editOrganization('${org.id}')">Edit</button>
                <button class="edit-btn" style="background:#6a1b9a;" onclick="viewHistory('${org.id}')">View</button>
                <button class="delete-btn" onclick="deleteOrganization('${org.id}')">Delete</button>
            </td>
        </tr>`;
    });
}

/* SETTINGS */
window.openSettings = function(){
    document.getElementById("settingsModal").style.display="flex";
}
window.closeSettings = function(){
    document.getElementById("settingsModal").style.display="none";
}
window.saveSettings = function(){
    rewardLimit = parseInt(document.getElementById("rewardLimit").value);
    rewardType = document.getElementById("rewardType").value;
    closeSettings();
    renderTable();
}

/* KEEP YOUR ORIGINAL ADD, EDIT, DELETE, HISTORY FUNCTIONS BELOW */
/* DO NOT TOUCH THEM */

document.getElementById("addBtn").onclick = addOrganization;
document.getElementById("dashboardBtn").onclick = ()=>window.location.href="dashboard.html";
document.getElementById("exportBtn").onclick = exportCSV;
document.getElementById("printBtn").onclick = ()=>window.print();

window.onload = loadOrganizations;

</script>

</body>
</html>
