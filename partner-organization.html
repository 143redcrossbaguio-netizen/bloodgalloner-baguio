<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Partner Organization</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }
        header { background:#b30000; color:white; padding:15px; text-align:center; }
        .container { max-width:95%; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
        input { padding:5px; margin:5px; }
        button { padding:5px 10px; margin:5px; border:none; border-radius:4px; cursor:pointer; color:white; }
        .add-btn { background:#b30000; }
        .edit-btn { background:#1565c0; }
        .delete-btn { background:#c62828; }
        .print-btn { background:#444; }
        .export-btn { background:#222; }
        #dashboardBtn { background:#1e88e5; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { padding:8px; border:1px solid #ddd; text-align:center; }
        th { background:#b30000; color:white; }
        .entry-box { background:#f9f9f9; padding:10px; border-radius:6px; }
    </style>
</head>
<body>

<header>
    <h2>Partner Organization</h2>
</header>

<div class="container">

    <input type="text" id="searchInput" placeholder="Search organization..." onkeyup="searchOrg()">

    <div style="margin-top:10px;">
        <input type="text" id="orgName" placeholder="Organization Name">
        <input type="number" id="numDonors" placeholder="Number of Donors">
        <input type="date" id="orgDate">
        <button class="add-btn" id="addBtn">Add Organization</button>
    </div>

    <button class="export-btn" id="exportBtn">Export CSV</button>
    <button class="print-btn" id="printBtn">Print</button>
    <button id="dashboardBtn">Return to Dashboard</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Organization</th>
                <th>Latest Date</th>
                <th>Total Donors</th>
                <th>Total (ml)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="orgTable"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_AUTH",
    projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let organizations = [];

/* LOAD */
async function loadOrganizations(){
    organizations = [];
    const snapshot = await getDocs(collection(db,"partnerOrganizations"));
    snapshot.forEach(docSnap=>{
        const data = docSnap.data();
        data.id = docSnap.id;
        if(!data.entries) data.entries = [];
        organizations.push(data);
    });
    renderTable();
}

/* CALCULATE */
function calculateTotal(org){
    return org.entries.reduce((sum,e)=>sum+e.donors,0);
}

/* RENDER */
function renderTable(){
    const table = document.getElementById("orgTable");
    table.innerHTML = "";

    organizations.forEach((org,index)=>{
        const totalDonors = calculateTotal(org);
        const latestDate = org.entries.length ? org.entries[org.entries.length-1].date : "-";

        table.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td>${org.name}</td>
            <td>${latestDate}</td>
            <td>${totalDonors}</td>
            <td>${totalDonors*450}</td>
            <td>
                <button class="edit-btn" onclick="showEntry('${org.id}')">Add Entry</button>
                <button class="delete-btn" onclick="deleteOrganization('${org.id}')">Delete</button>
            </td>
        </tr>`;
    });
}

/* ADD ORGANIZATION */
async function addOrganization(){
    const name = orgName.value.trim();
    const donors = parseInt(numDonors.value);
    const date = orgDate.value;

    if(!name || !donors || !date){
        alert("Fill all fields.");
        return;
    }

    const docRef = await addDoc(collection(db,"partnerOrganizations"),{
        name,
        entries:[{donors,date}]
    });

    organizations.push({
        id:docRef.id,
        name,
        entries:[{donors,date}]
    });

    renderTable();

    orgName.value="";
    numDonors.value="";
    orgDate.value="";
}

/* SHOW INLINE ENTRY */
window.showEntry = function(id){
    const row = document.querySelector(`button[onclick="showEntry('${id}')"]`).closest("tr");

    if(row.nextElementSibling && row.nextElementSibling.classList.contains("entry-row")) return;

    const entryRow = document.createElement("tr");
    entryRow.classList.add("entry-row");

    entryRow.innerHTML = `
        <td colspan="6">
            <div class="entry-box">
                <input type="number" id="donor-${id}" placeholder="Donors">
                <input type="date" id="date-${id}">
                <button style="background:#2e7d32;" onclick="saveEntry('${id}')">Save</button>
                <button style="background:#757575;" onclick="this.closest('tr').remove()">Cancel</button>
            </div>
        </td>
    `;
    row.after(entryRow);
};

/* SAVE ENTRY */
window.saveEntry = async function(id){
    const donors = parseInt(document.getElementById(`donor-${id}`).value);
    const date = document.getElementById(`date-${id}`).value;

    if(!donors || !date){
        alert("Enter donors and date.");
        return;
    }

    const index = organizations.findIndex(o=>o.id===id);
    const org = organizations[index];

    org.entries.push({donors,date});

    await updateDoc(doc(db,"partnerOrganizations",id),{
        entries:org.entries
    });

    renderTable();
};

/* DELETE */
window.deleteOrganization = async function(id){
    if(!confirm("Delete this organization?")) return;

    await deleteDoc(doc(db,"partnerOrganizations",id));
    organizations = organizations.filter(o=>o.id!==id);
    renderTable();
};

/* OTHER */
function searchOrg(){
    const input = searchInput.value.toLowerCase();
    document.querySelectorAll("#orgTable tr").forEach(row=>{
        row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
    });
}

function exportCSV(){
    let csv="Organization,Total Donors,Total ML\n";
    organizations.forEach(org=>{
        const total=calculateTotal(org);
        csv+=`${org.name},${total},${total*450}\n`;
    });
    const blob=new Blob([csv],{type:"text/csv"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="partner_org.csv";
    a.click();
}

function printTable(){ window.print(); }
function goDashboard(){ window.location.href="dashboard.html"; }

addBtn.onclick=addOrganization;
dashboardBtn.onclick=goDashboard;
exportBtn.onclick=exportCSV;
printBtn.onclick=printTable;

window.onload=loadOrganizations;

</script>

</body>
</html>
