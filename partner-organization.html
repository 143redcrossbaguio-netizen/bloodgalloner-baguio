<!DOCTYPE html>
<html>
<head>
<title>Partner Organization</title>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#2e7d32;color:white;padding:15px;text-align:center;}

.container{
max-width:1200px;
margin:30px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{padding:6px;margin:4px;}

button{
padding:6px 10px;
margin:4px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.save-btn{background:#2e7d32;}
.edit-btn{background:#1565c0;}
.delete-btn{background:#c62828;}
.claim-btn{background:#6a1b9a;}
.return-btn{background:#444;}

table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ddd;padding:6px;text-align:center;}
th{background:#2e7d32;color:white;}

#modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
}

#modalContent{
background:white;
padding:20px;
width:450px;
margin:80px auto;
border-radius:10px;
}
</style>
</head>

<body>

<header>
<h2>Partner Organization</h2>
</header>

<div class="container">

<h3>Add Organization</h3>

<input type="text" id="orgName" placeholder="Organization Name">
<input type="date" id="orgDate">
<input type="number" id="initialDonors" placeholder="Initial Donors">
<button class="save-btn" id="savePartner">Save</button>

<br><br>

<input type="text" id="searchBox" placeholder="Search organization...">

<button class="return-btn" onclick="goDashboard()">Return to Dashboard</button>

<table>
<thead>
<tr>
<th>Organization</th>
<th>Date Added</th>
<th>Total ML</th>
<th>Award</th>
<th>Claimed</th>
<th>Date Claimed</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="partnerTable"></tbody>
</table>

</div>

<div id="modal">
<div id="modalContent">
<h3>Manage Entries</h3>

<input type="number" id="newDonors" placeholder="Number of Donors">
<input type="date" id="newDate">
<button class="save-btn" onclick="addEntry()">Add Entry</button>

<hr>
<div id="entryList"></div>

<button class="delete-btn" onclick="closeModal()">Close</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={
apiKey:"YOUR_API_KEY",
authDomain:"YOUR_AUTH_DOMAIN",
projectId:"YOUR_PROJECT_ID"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let partners=[];
let currentId=null;

const thresholds={Bronze:1000,Silver:5000,Gold:10000,Platinum:20000};

function calculateAward(total){
let award="";
Object.entries(thresholds).forEach(([k,v])=>{
if(total>=v) award=k;
});
return award;
}

async function loadPartners(){
const snap=await getDocs(collection(db,"partners"));
partners=[];
snap.forEach(d=>partners.push({id:d.id,...d.data()}));
display();
}

function display(){
const table=document.getElementById("partnerTable");
const search=document.getElementById("searchBox").value.toLowerCase();
table.innerHTML="";

partners.forEach(p=>{
if(search && !p.name.toLowerCase().includes(search)) return;

const total=(p.entries||[]).reduce((s,e)=>s+e.donors*450,0);
const award=calculateAward(total);

table.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.dateAdded}</td>
<td>${total}</td>
<td>${award}</td>
<td>${p.claimed?"Yes":"No"}</td>
<td>${p.dateClaimed||""}</td>
<td>
<button class="edit-btn" onclick="openModal('${p.id}')">Entries</button>
<button class="claim-btn" onclick="toggleClaim('${p.id}')">Claim</button>
<button class="delete-btn" onclick="deleteOrg('${p.id}')">Delete</button>
</td>
</tr>
`;
});
}

document.getElementById("savePartner").addEventListener("click",async()=>{

const name=document.getElementById("orgName").value.trim();
const date=document.getElementById("orgDate").value;
const donors=parseInt(document.getElementById("initialDonors").value)||0;

if(!name || !date){
alert("Please fill required fields.");
return;
}

if(partners.find(p=>p.name.toLowerCase()===name.toLowerCase())){
alert("Organization already exists.");
return;
}

await addDoc(collection(db,"partners"),{
name,
dateAdded:date,
entries: donors>0?[{donors,date}]:[],
claimed:false,
dateClaimed:""
});

document.getElementById("orgName").value="";
document.getElementById("orgDate").value="";
document.getElementById("initialDonors").value="";

await loadPartners();
});

window.openModal=function(id){
currentId=id;
const p=partners.find(x=>x.id===id);
const list=document.getElementById("entryList");
list.innerHTML="";
(p.entries||[]).forEach((e,i)=>{
list.innerHTML+=`
<div>
Donors: ${e.donors} | Date: ${e.date}
<button onclick="deleteEntry(${i})">Delete</button>
</div>`;
});
document.getElementById("modal").style.display="block";
}

window.addEntry=async function(){
const donors=parseInt(document.getElementById("newDonors").value);
const date=document.getElementById("newDate").value;
if(!donors||!date)return;

const p=partners.find(x=>x.id===currentId);
p.entries.push({donors,date});
await updateDoc(doc(db,"partners",currentId),{entries:p.entries});
document.getElementById("newDonors").value="";
document.getElementById("newDate").value="";
await loadPartners();
openModal(currentId);
}

window.deleteEntry=async function(index){
const p=partners.find(x=>x.id===currentId);
p.entries.splice(index,1);
await updateDoc(doc(db,"partners",currentId),{entries:p.entries});
await loadPartners();
openModal(currentId);
}

window.toggleClaim=async function(id){
const p=partners.find(x=>x.id===id);
await updateDoc(doc(db,"partners",id),{
claimed:!p.claimed,
dateClaimed:!p.claimed?new Date().toISOString().split("T")[0]:""
});
await loadPartners();
}

window.deleteOrg=async function(id){
if(confirm("Delete organization?")){
await deleteDoc(doc(db,"partners",id));
await loadPartners();
}
}

window.closeModal=function(){
document.getElementById("modal").style.display="none";
}

document.getElementById("searchBox").addEventListener("input",display);

window.goDashboard=function(){
window.location.href="dashboard.html";
}

window.onload=loadPartners;

</script>

</body>
</html>
