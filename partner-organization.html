<!DOCTYPE html>
<html>
<head>
    <title>Galloners Club - Partner Organization</title>
    <meta charset="UTF-8">
    <style>
        body { margin:0; font-family:Arial; background:#f4f4f4; }
        header { background:#b30000; color:white; padding:15px; text-align:center; }
        .container { max-width:95%; margin:20px auto; background:white; padding:20px; border-radius:10px; box-shadow:0 3px 10px rgba(0,0,0,0.1); }
        input, select { padding:5px; margin:5px; }
        button { padding:5px 10px; margin:5px; border:none; border-radius:4px; cursor:pointer; color:white; }
        .add-btn { background:#b30000; }
        .edit-btn { background:#1565c0; }
        .delete-btn { background:#c62828; }
        .print-btn { background:#444; }
        .export-btn { background:#222; }
        table { width:100%; border-collapse:collapse; margin-top:10px; }
        th, td { padding:8px; border:1px solid #ddd; text-align:center; }
        th { background:#b30000; color:white; }
    </style>
</head>
<body>

<header>
    <h2>Partner Organization</h2>
</header>

<div class="container">

    <input type="text" id="searchInput" placeholder="Search organization..." onkeyup="searchOrg()">

    <div style="margin-top:10px;">
        <input type="text" id="orgName" placeholder="Organization Name">
        <input type="number" id="numDonors" placeholder="Number of Donors">
        <input type="date" id="orgDate">
        <select id="awardStatus">
            <option value="">Awarded?</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
        </select>
        <input type="date" id="awardDate">
        <button class="add-btn" onclick="addOrganization()">Add Organization</button>
    </div>

    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    <button class="print-btn" onclick="printTable()">Print</button>
    <button onclick="goDashboard()">Return to Dashboard</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Organization</th>
                <th>Date</th>
                <th>Number of Donors</th>
                <th>Total (ml)</th>
                <th>Awarded</th>
                <th>Award Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="orgTable"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";

const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c",
    measurementId: "G-XYXJH9JNXJ"
};

const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
const db = getFirestore(app);

let organizations = [];

async function loadOrganizations(){
    organizations = [];
    const snapshot = await getDocs(collection(db,"partnerOrganizations"));
    snapshot.forEach(docSnap=>{
        const data = docSnap.data();
        data.id = docSnap.id;
        organizations.push(data);
    });
    renderTable();
}

function calculateTotalML(numDonors){
    return numDonors * 450;
}

function renderTable(){
    const table = document.getElementById("orgTable");
    table.innerHTML = "";
    organizations.forEach((org,index)=>{
        table.innerHTML += `<tr>
            <td>${index+1}</td>
            <td>${org.name}</td>
            <td>${org.date}</td>
            <td>${org.numDonors}</td>
            <td>${calculateTotalML(org.numDonors)}</td>
            <td>${org.awardStatus || ""}</td>
            <td>${org.awardDate || ""}</td>
            <td>
                <button class="edit-btn" onclick="editOrganization('${org.id}')">Edit</button>
                <button class="delete-btn" onclick="deleteOrganization('${org.id}')">Delete</button>
            </td>
        </tr>`;
    });
}

async function addOrganization(){
    const name = document.getElementById("orgName").value.trim();
    const numDonors = parseInt(document.getElementById("numDonors").value);
    const date = document.getElementById("orgDate").value;
    const awardStatus = document.getElementById("awardStatus").value;
    const awardDate = document.getElementById("awardDate").value;

    if(!name || !numDonors || !date){
        alert("Please fill all required fields.");
        return;
    }

    if(organizations.some(o=>o.name.toLowerCase()===name.toLowerCase())){
        alert("Organization already exists!");
        return;
    }

    try{
        const docRef = await addDoc(collection(db,"partnerOrganizations"),{
            name,numDonors,date,awardStatus,awardDate
        });
        organizations.push({id:docRef.id,name,numDonors,date,awardStatus,awardDate});
        renderTable();

        // Reset input
        document.getElementById("orgName").value="";
        document.getElementById("numDonors").value="";
        document.getElementById("orgDate").value="";
        document.getElementById("awardStatus").value="";
        document.getElementById("awardDate").value="";
    } catch(e){
        console.error(e);
        alert("Error adding organization.");
    }
}

async function deleteOrganization(id){
    if(confirm("Are you sure to delete?")){
        await deleteDoc(doc(db,"partnerOrganizations",id));
        organizations = organizations.filter(o=>o.id!==id);
        renderTable();
    }
}

function searchOrg(){
    const input = document.getElementById("searchInput").value.toLowerCase();
    document.querySelectorAll("#orgTable tr").forEach(row=>{
        row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
    });
}

function printTable(){
    let content = "<h2>Partner Organization Report</h2><table border='1' cellpadding='5'><tr><th>Organization</th><th>Total (ml)</th><th>Awarded</th></tr>";
    organizations.forEach(org=>{
        content += `<tr>
            <td>${org.name}</td>
            <td>${calculateTotalML(org.numDonors)}</td>
            <td>${org.awardStatus||''}</td>
        </tr>`;
    });
    content += "</table>";
    const w = window.open("");
    w.document.write(content);
    w.print();
}

function exportCSV(){
    let csv = "Organization,Date,Number of Donors,Total (ml),Awarded,Award Date\n";
    organizations.forEach(org=>{
        csv += `${org.name},${org.date},${org.numDonors},${calculateTotalML(org.numDonors)},${org.awardStatus||''},${org.awardDate||''}\n`;
    });
    const blob = new Blob([csv], {type:"text/csv"});
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "partner_organizations.csv";
    a.click();
    window.URL.revokeObjectURL(url);
}

function goDashboard(){
    window.location.href="dashboard.html";
}

async function editOrganization(id){
    const org = organizations.find(o=>o.id===id);
    if(!org) return;

    const newNum = prompt("Enter number of donors", org.numDonors);
    const newDate = prompt("Enter date", org.date);
    if(!newNum || !newDate) return;

    try{
        await updateDoc(doc(db,"partnerOrganizations",id),{
            numDonors:parseInt(newNum),
            date:newDate
        });
        org.numDonors = parseInt(newNum);
        org.date = newDate;
        renderTable();
    } catch(e){
        console.error(e);
        alert("Error updating organization.");
    }
}

window.onload = loadOrganizations;
</script>

</body>
</html>
