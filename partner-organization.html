<!DOCTYPE html>
<html>
<head>
    <title>Settings</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; background:#f4f4f4; margin:0; }
        header { background:#1565c0; color:white; padding:15px; text-align:center; }
        .container {
            max-width:500px;
            margin:40px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }
        input { width:100%; padding:8px; margin:5px 0; }
        button {
            width:100%;
            padding:10px;
            margin-top:10px;
            background:#1565c0;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<header><h2>Settings</h2></header>

<div class="container">
    <h3>Award Thresholds (ML)</h3>

    <input type="number" id="bronze" placeholder="Bronze Threshold">
    <input type="number" id="silver" placeholder="Silver Threshold">
    <input type="number" id="gold" placeholder="Gold Threshold">
    <input type="number" id="platinum" placeholder="Platinum Threshold">

    <button onclick="saveSettings()">Save Settings</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_AUTH_DOMAIN",
    projectId: "YOUR_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadSettings(){
    const snap = await getDoc(doc(db,"settings","awards"));
    if(snap.exists()){
        const d = snap.data();
        bronze.value=d.bronze;
        silver.value=d.silver;
        gold.value=d.gold;
        platinum.value=d.platinum;
    }
}
window.saveSettings = async function(){
    await setDoc(doc(db,"settings","awards"),{
        bronze:Number(bronze.value),
        silver:Number(silver.value),
        gold:Number(gold.value),
        platinum:Number(platinum.value)
    });
    alert("Settings Saved");
}
window.onload=loadSettings;
</script>

</body>
</html>
