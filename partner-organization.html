<!DOCTYPE html>
<html>
<head>
    <title>Partner Organization</title>
    <meta charset="UTF-8">

    <style>
        body { margin:0; font-family: Arial; background:#f4f4f4; }
        header { background:#2e7d32; color:white; padding:15px; text-align:center; }

        .container {
            max-width:1200px;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        input, select { padding:6px; margin:3px; }

        button {
            padding:6px 10px;
            margin:3px;
            border:none;
            border-radius:5px;
            cursor:pointer;
            color:white;
        }

        .save-btn { background:#2e7d32; }
        .print-btn { background:#6a1b9a; }
        .dashboard-btn { background:#444; }
        .edit-btn { background:#1565c0; }
        .view-btn { background:#6a1b9a; }
        .export-btn { background:#ff9800; }

        table {
            width:100%;
            border-collapse: collapse;
            margin-top:20px;
        }

        th, td {
            border:1px solid #ddd;
            padding:6px;
            text-align:center;
        }

        th { background:#2e7d32; color:white; }

        .hidden { display:none; }

        @media print {
            body * { visibility:hidden; }
            #printArea, #printArea * { visibility:visible; }
            #printArea { position:absolute; left:0; top:0; width:100%; }
        }
    </style>
</head>

<body>

<header>
    <h2>Partner Organization</h2>
</header>

<div class="container">

    <!-- ENTRY -->
    <input type="text" id="orgName" placeholder="Organization Name">
    <button class="save-btn" id="savePartner">Save</button>
    <button class="print-btn" onclick="window.print()">Print</button>
    <button class="export-btn" onclick="exportCSV()">Export CSV</button>
    <button class="dashboard-btn" onclick="window.location.href='dashboard.html'">Return to Dashboard</button>

    <hr>

    <table>
        <thead>
            <tr>
                <th>Organization</th>
                <th>Total ML</th>
                <th>Award</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="partnerTable"></tbody>
    </table>

</div>

<!-- PRINT AREA -->
<div id="printArea" class="hidden">
    <h2>Partner Organization Report</h2>
    <table border="1" width="100%" cellpadding="5">
        <thead>
            <tr>
                <th>Organization</th>
                <th>Total ML</th>
                <th>Award</th>
            </tr>
        </thead>
        <tbody id="printTable"></tbody>
    </table>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    projectId: "galloners-club",
    storageBucket: "galloners-club.firebasestorage.app",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let partners = [];

/* LOAD */
async function loadPartners(){
    const snapshot = await getDocs(collection(db,"partners"));
    partners=[];
    snapshot.forEach(docSnap=>{
        partners.push({id:docSnap.id, ...docSnap.data()});
    });
    display();
}

/* DISPLAY */
function display(){
    const table=document.getElementById("partnerTable");
    const printTable=document.getElementById("printTable");

    table.innerHTML="";
    printTable.innerHTML="";

    partners.forEach(p=>{
        const totalML = (p.entries||[]).reduce((sum,e)=>sum+e.donors*450,0);

        table.innerHTML+=`
        <tr>
            <td>${p.name}</td>
            <td>${totalML} ml</td>
            <td>${p.awardType||""}</td>
            <td>
                <button class="view-btn" onclick="viewDetails('${p.id}')">View</button>
                <button class="edit-btn" onclick="editPartner('${p.id}')">Edit</button>
            </td>
        </tr>
        `;

        printTable.innerHTML+=`
        <tr>
            <td>${p.name}</td>
            <td>${totalML} ml</td>
            <td>${p.awardType||""}</td>
        </tr>
        `;
    });
}

/* SAVE NEW ORG */
document.getElementById("savePartner").addEventListener("click", async ()=>{
    const name=document.getElementById("orgName").value.trim();
    if(!name){ alert("Enter organization name"); return; }

    await addDoc(collection(db,"partners"),{
        name,
        entries:[],
        awardType:""
    });

    document.getElementById("orgName").value="";
    loadPartners();
});

/* EDIT */
window.editPartner = async function(id){
    const donors = prompt("Enter number of donors:");
    const date = prompt("Enter date (YYYY-MM-DD):");

    if(!donors || !date) return;

    const ref = doc(db,"partners",id);
    const partner = partners.find(p=>p.id===id);

    const newEntries = partner.entries || [];
    newEntries.push({ donors:parseInt(donors), date });

    await updateDoc(ref,{ entries:newEntries });

    loadPartners();
};

/* VIEW */
window.viewDetails = function(id){
    const partner = partners.find(p=>p.id===id);
    let details="Entries:\n";
    (partner.entries||[]).forEach(e=>{
        details+=`Donors: ${e.donors} | Date: ${e.date}\n`;
    });
    alert(details);
};

/* EXPORT CSV */
window.exportCSV = function(){
    let csv="Organization,Total ML,Award\n";
    partners.forEach(p=>{
        const totalML=(p.entries||[]).reduce((s,e)=>s+e.donors*450,0);
        csv+=`${p.name},${totalML},${p.awardType||""}\n`;
    });

    const blob=new Blob([csv],{type:"text/csv"});
    const link=document.createElement("a");
    link.href=URL.createObjectURL(blob);
    link.download="partner_organization.csv";
    link.click();
};

window.onload=loadPartners;
</script>

</body>
</html>
