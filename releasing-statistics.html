<!DOCTYPE html>
<html>
<head>
<title>Releasing Statistics</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#00897b;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1400px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-weight:bold;
}

.controls input,
.controls select{
flex:1;
min-width:200px;
}

.controls button{
border:none;
cursor:pointer;
color:white;
}

.backBtn{background:#444;}
.printBtn{background:#1565c0;}
.exportBtn{background:#2e7d32;}

.monthSection{
margin-top:25px;
}

.monthHeader{
background:#e0f2f1;
padding:12px;
font-weight:bold;
border-radius:6px;
margin-bottom:10px;
font-size:18px;
}

.summaryBox{
background:#f7f7f7;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:15px;
}

.summaryTable,
.mainTable,
.componentTable{
width:100%;
border-collapse:collapse;
}

.summaryTable th,
.summaryTable td,
.mainTable th,
.mainTable td,
.componentTable th,
.componentTable td{
border:1px solid #ccc;
padding:8px;
text-align:center;
vertical-align:top;
}

.summaryTable th,
.mainTable th,
.componentTable th{
background:#00897b;
color:white;
}

.left{
text-align:left !important;
}

.componentCell{
padding:0 !important;
}

.componentTable th,
.componentTable td{
font-size:13px;
padding:6px;
}

.incomeBox{
margin-top:10px;
font-weight:bold;
font-size:16px;
color:#00695c;
}

@media print{
.controls{
display:none !important;
}

body{
background:white;
}

.container{
box-shadow:none;
margin:0;
max-width:none;
}
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Statistics</h2>
</header>

<div class="container">

<div class="controls">
<select id="monthFilter">
<option value="">ALL MONTHS</option>
</select>

<input type="text" id="hospitalSearch" placeholder="SEARCH HOSPITAL">

<button class="printBtn" id="printBtn">PRINT</button>
<button class="exportBtn" id="exportBtn">EXPORT CSV</button>
<button class="backBtn" id="backBtn">BACK TO RELEASING</button>
</div>

<div id="statisticsContainer"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const statisticsContainer = document.getElementById("statisticsContainer");
const monthFilter = document.getElementById("monthFilter");
const hospitalSearch = document.getElementById("hospitalSearch");
const printBtn = document.getElementById("printBtn");
const exportBtn = document.getElementById("exportBtn");
const backBtn = document.getElementById("backBtn");

let allEntries = [];

function emptyComponentCounts(){
  return {
    "WB": 0,
    "PRBC": 0,
    "PC": 0,
    "FFP": 0,
    "CRYO": 0
  };
}

function addComponentCount(store, component, qty){
  const key = (component || "").toUpperCase().trim();
  const num = Number(qty || 0);
  if(store[key] !== undefined){
    store[key] += isNaN(num) ? 0 : num;
  }
}

function monthToWords(monthKey){
  if(!monthKey || !monthKey.includes("-")) return monthKey;
  const [year, month] = monthKey.split("-");
  const months = {
    "01":"JANUARY",
    "02":"FEBRUARY",
    "03":"MARCH",
    "04":"APRIL",
    "05":"MAY",
    "06":"JUNE",
    "07":"JULY",
    "08":"AUGUST",
    "09":"SEPTEMBER",
    "10":"OCTOBER",
    "11":"NOVEMBER",
    "12":"DECEMBER"
  };
  return `${months[month] || month} ${year}`;
}

function componentTableHTML(obj){
  return `
    <table class="componentTable">
      <thead>
        <tr>
          <th>WB</th>
          <th>PRBC</th>
          <th>PC</th>
          <th>FFP</th>
          <th>CRYO</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>${obj.WB}</td>
          <td>${obj.PRBC}</td>
          <td>${obj.PC}</td>
          <td>${obj.FFP}</td>
          <td>${obj.CRYO}</td>
        </tr>
      </tbody>
    </table>
  `;
}

function computeIncome(entry){
  const amountPaid = Number(entry.amountPaid || 0);
  const discount = Number(entry.discount || 0);
  return (isNaN(amountPaid) ? 0 : amountPaid) - (isNaN(discount) ? 0 : discount);
}

function populateMonthFilter(entries){
  const months = [...new Set(
    entries
      .map(e => (e.date || "").slice(0,7))
      .filter(Boolean)
  )].sort().reverse();

  monthFilter.innerHTML = `<option value="">ALL MONTHS</option>`;

  months.forEach(month => {
    const option = document.createElement("option");
    option.value = month;
    option.textContent = monthToWords(month);
    monthFilter.appendChild(option);
  });
}

function buildStatisticsData(){
  const selectedMonth = monthFilter.value;
  const searchValue = hospitalSearch.value.trim().toUpperCase();

  let filtered = allEntries.filter(entry => {
    const month = (entry.date || "").slice(0,7);
    const hospital = (entry.facility || "").toUpperCase();

    const matchMonth = selectedMonth === "" || month === selectedMonth;
    const matchSearch = searchValue === "" || hospital.includes(searchValue);

    return matchMonth && matchSearch;
  });

  const groupedByMonth = {};

  filtered.forEach(entry => {
    const month = (entry.date || "").slice(0,7) || "NO DATE";
    const hospital = (entry.facility || "").toUpperCase().trim() || "NO FACILITY";

    if(!groupedByMonth[month]){
      groupedByMonth[month] = {
        hospitals: {},
        totals: {
          entries: 0,
          male: 0,
          female: 0,
          requested: emptyComponentCounts(),
          issued: emptyComponentCounts(),
          income: 0
        }
      };
    }

    if(!groupedByMonth[month].hospitals[hospital]){
      groupedByMonth[month].hospitals[hospital] = {
        entries: 0,
        male: 0,
        female: 0,
        requested: emptyComponentCounts(),
        issued: emptyComponentCounts()
      };
    }

    const monthStats = groupedByMonth[month].totals;
    const hospitalStats = groupedByMonth[month].hospitals[hospital];

    monthStats.entries += 1;
    hospitalStats.entries += 1;

    const sex = (entry.sex || "").toUpperCase();
    if(sex === "MALE"){
      monthStats.male += 1;
      hospitalStats.male += 1;
    }else if(sex === "FEMALE"){
      monthStats.female += 1;
      hospitalStats.female += 1;
    }

    addComponentCount(monthStats.requested, entry.request, entry.requestQty);
    addComponentCount(hospitalStats.requested, entry.request, entry.requestQty);

    addComponentCount(monthStats.issued, entry.issued, entry.issuedQty);
    addComponentCount(hospitalStats.issued, entry.issued, entry.issuedQty);

    monthStats.income += computeIncome(entry);
  });

  return groupedByMonth;
}

function renderStatistics(){
  const groupedByMonth = buildStatisticsData();
  statisticsContainer.innerHTML = "";

  const months = Object.keys(groupedByMonth).sort().reverse();

  if(months.length === 0){
    statisticsContainer.innerHTML = "<p>No statistics found.</p>";
    return;
  }

  months.forEach(month => {
    const data = groupedByMonth[month];

    const section = document.createElement("div");
    section.className = "monthSection";

    const header = document.createElement("div");
    header.className = "monthHeader";
    header.textContent = monthToWords(month);

    const summaryBox = document.createElement("div");
    summaryBox.className = "summaryBox";
    summaryBox.innerHTML = `
      <table class="summaryTable">
        <thead>
          <tr>
            <th>TOTAL ENTRY / PATIENT</th>
            <th>TOTAL MALE</th>
            <th>TOTAL FEMALE</th>
            <th>TOTAL COMPONENTS REQUESTED</th>
            <th>TOTAL COMPONENTS ISSUED</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>${data.totals.entries}</td>
            <td>${data.totals.male}</td>
            <td>${data.totals.female}</td>
            <td class="componentCell">${componentTableHTML(data.totals.requested)}</td>
            <td class="componentCell">${componentTableHTML(data.totals.issued)}</td>
          </tr>
        </tbody>
      </table>
      <div class="incomeBox">TOTAL INCOME FOR ${monthToWords(month)}: ${data.totals.income.toFixed(2)}</div>
    `;

    const table = document.createElement("table");
    table.className = "mainTable";
    table.innerHTML = `
      <thead>
        <tr>
          <th>HOSPITAL</th>
          <th>NO. OF ENTRY / PATIENT</th>
          <th>MALE</th>
          <th>FEMALE</th>
          <th>COMPONENTS REQUESTED</th>
          <th>COMPONENTS ISSUED</th>
        </tr>
      </thead>
      <tbody></tbody>
    `;

    const tbody = table.querySelector("tbody");
    const hospitals = Object.keys(data.hospitals).sort();

    hospitals.forEach(hospital => {
      const stats = data.hospitals[hospital];

      const row = document.createElement("tr");
      row.innerHTML = `
        <td class="left">${hospital}</td>
        <td>${stats.entries}</td>
        <td>${stats.male}</td>
        <td>${stats.female}</td>
        <td class="componentCell">${componentTableHTML(stats.requested)}</td>
        <td class="componentCell">${componentTableHTML(stats.issued)}</td>
      `;
      tbody.appendChild(row);
    });

    section.appendChild(header);
    section.appendChild(summaryBox);
    section.appendChild(table);
    statisticsContainer.appendChild(section);
  });
}

function exportStatisticsCSV(){
  const groupedByMonth = buildStatisticsData();
  let rows = [[
    "MONTH",
    "HOSPITAL",
    "NO. OF ENTRY / PATIENT",
    "MALE",
    "FEMALE",
    "REQUEST_WB",
    "REQUEST_PRBC",
    "REQUEST_PC",
    "REQUEST_FFP",
    "REQUEST_CRYO",
    "ISSUED_WB",
    "ISSUED_PRBC",
    "ISSUED_PC",
    "ISSUED_FFP",
    "ISSUED_CRYO",
    "MONTH_INCOME"
  ]];

  Object.keys(groupedByMonth).sort().reverse().forEach(month => {
    const hospitals = groupedByMonth[month].hospitals;
    const monthIncome = groupedByMonth[month].totals.income;

    Object.keys(hospitals).sort().forEach(hospital => {
      const stats = hospitals[hospital];
      rows.push([
        monthToWords(month),
        hospital,
        stats.entries,
        stats.male,
        stats.female,
        stats.requested.WB,
        stats.requested.PRBC,
        stats.requested.PC,
        stats.requested.FFP,
        stats.requested.CRYO,
        stats.issued.WB,
        stats.issued.PRBC,
        stats.issued.PC,
        stats.issued.FFP,
        stats.issued.CRYO,
        monthIncome.toFixed(2)
      ]);
    });

    const total = groupedByMonth[month].totals;
    rows.push([
      monthToWords(month) + " TOTAL",
      "ALL HOSPITALS",
      total.entries,
      total.male,
      total.female,
      total.requested.WB,
      total.requested.PRBC,
      total.requested.PC,
      total.requested.FFP,
      total.requested.CRYO,
      total.issued.WB,
      total.issued.PRBC,
      total.issued.PC,
      total.issued.FFP,
      total.issued.CRYO,
      total.income.toFixed(2)
    ]);
  });

  const csvContent = rows.map(row =>
    row.map(value => `"${String(value).replace(/"/g, '""')}"`).join(",")
  ).join("\n");

  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "releasing-statistics.csv";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

onValue(ref(db, "releasing"), (snapshot) => {
  allEntries = [];

  snapshot.forEach(child => {
    allEntries.push({
      id: child.key,
      ...child.val()
    });
  });

  populateMonthFilter(allEntries);
  renderStatistics();
});

monthFilter.addEventListener("change", renderStatistics);
hospitalSearch.addEventListener("input", renderStatistics);
printBtn.addEventListener("click", () => window.print());
exportBtn.addEventListener("click", exportStatisticsCSV);
backBtn.addEventListener("click", () => {
  window.location.href = "releasing.html";
});
</script>

</body>
</html>
