<!DOCTYPE html>
<html>
<head>
<title>Releasing Statistics</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#00897b;
color:white;
text-align:center;
padding:15px;
}

.container{
max-width:1400px;
margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-weight:bold;
}

.controls button{
border:none;
cursor:pointer;
color:white;
}

.printBtn{background:#1565c0;}
.exportBtn{background:#2e7d32;}
.backBtn{background:#444;}

.monthHeader{
background:#e0f2f1;
padding:12px;
font-weight:bold;
border-radius:6px;
margin-top:20px;
font-size:18px;
}

.summaryBox{
background:#f7f7f7;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#00897b;
color:white;
}

.left{
text-align:left;
}

.componentBox{
font-size:13px;
line-height:1.5;
text-align:left;
}

.incomeBox{
margin-top:10px;
font-weight:bold;
font-size:16px;
color:#00695c;
}

</style>
</head>

<body>

<header>
<h2>Blood Releasing Statistics</h2>
</header>

<div class="container">

<div class="controls">

<select id="monthFilter">
<option value="">ALL MONTHS</option>
</select>

<input type="text" id="hospitalSearch" placeholder="SEARCH HOSPITAL">

<button class="printBtn" id="printBtn">PRINT</button>
<button class="exportBtn" id="exportBtn">EXPORT CSV</button>
<button class="backBtn" id="backBtn">BACK</button>

</div>

<div id="statisticsContainer"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR-API-KEY",
databaseURL:"https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"galloners-club"

};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const container=document.getElementById("statisticsContainer");
const monthFilter=document.getElementById("monthFilter");
const hospitalSearch=document.getElementById("hospitalSearch");

let allEntries=[];

/* LIVE LOAD FROM FIREBASE */

onValue(ref(db,"releasing"),snapshot=>{

allEntries=[];

snapshot.forEach(child=>{
allEntries.push({
id:child.key,
...child.val()
});
});

populateMonthFilter();
renderStatistics();

});


/* MONTH TEXT */

function monthName(monthKey){

const months={
"01":"JANUARY",
"02":"FEBRUARY",
"03":"MARCH",
"04":"APRIL",
"05":"MAY",
"06":"JUNE",
"07":"JULY",
"08":"AUGUST",
"09":"SEPTEMBER",
"10":"OCTOBER",
"11":"NOVEMBER",
"12":"DECEMBER"
};

const [year,month]=monthKey.split("-");
return months[month]+" "+year;

}


/* COMPONENT COUNT */

function emptyComponent(){
return {WB:0,PRBC:0,PC:0,FFP:0,CRYO:0};
}

function countComponents(store,list){

if(!Array.isArray(list)) return;

list.forEach(item=>{
const type=(item.type||"").toUpperCase();
const qty=Number(item.qty||0);

if(store[type]!=undefined){
store[type]+=qty;
}

});

}


/* MONTH FILTER */

function populateMonthFilter(){

const months=[...new Set(allEntries.map(e=>e.date.slice(0,7)))].sort().reverse();

monthFilter.innerHTML='<option value="">ALL MONTHS</option>';

months.forEach(m=>{
const opt=document.createElement("option");
opt.value=m;
opt.textContent=monthName(m);
monthFilter.appendChild(opt);
});

}


/* BUILD STATS */

function buildStats(){

const monthFilterValue=monthFilter.value;
const hospitalSearchValue=hospitalSearch.value.toUpperCase();

const grouped={};

allEntries.forEach(entry=>{

const month=entry.date.slice(0,7);
const hospital=(entry.facility||"").toUpperCase();

if(monthFilterValue && month!==monthFilterValue) return;
if(hospitalSearchValue && !hospital.includes(hospitalSearchValue)) return;

if(!grouped[month]){

grouped[month]={
hospitals:{},
totals:{
entries:0,
male:0,
female:0,
requested:emptyComponent(),
issued:emptyComponent(),
income:0
}
};

}

if(!grouped[month].hospitals[hospital]){

grouped[month].hospitals[hospital]={
entries:0,
male:0,
female:0,
requested:emptyComponent(),
issued:emptyComponent()
};

}

const m=grouped[month];
const h=grouped[month].hospitals[hospital];

m.totals.entries++;
h.entries++;

if(entry.sex==="MALE"){m.totals.male++;h.male++;}
if(entry.sex==="FEMALE"){m.totals.female++;h.female++;}

countComponents(m.totals.requested,entry.requests);
countComponents(h.requested,entry.requests);

countComponents(m.totals.issued,entry.issued);
countComponents(h.issued,entry.issued);

const income=(Number(entry.amountPaid||0)-Number(entry.discount||0));
m.totals.income+=income;

});

return grouped;

}


/* RENDER */

function renderStatistics(){

const stats=buildStats();

container.innerHTML="";

Object.keys(stats).sort().reverse().forEach(month=>{

const data=stats[month];

const header=document.createElement("div");
header.className="monthHeader";
header.textContent=monthName(month);

const summary=document.createElement("div");
summary.className="summaryBox";

summary.innerHTML=`

<b>TOTAL PATIENTS:</b> ${data.totals.entries}
<br>
<b>MALE:</b> ${data.totals.male}
<br>
<b>FEMALE:</b> ${data.totals.female}

<div class="incomeBox">
TOTAL INCOME: ${data.totals.income.toFixed(2)}
</div>

`;

const table=document.createElement("table");

table.innerHTML=`
<tr>
<th>HOSPITAL</th>
<th>PATIENTS</th>
<th>MALE</th>
<th>FEMALE</th>
<th>REQUESTED</th>
<th>ISSUED</th>
</tr>
`;

Object.keys(data.hospitals).sort().forEach(hospital=>{

const s=data.hospitals[hospital];

const row=document.createElement("tr");

row.innerHTML=`

<td class="left">${hospital}</td>
<td>${s.entries}</td>
<td>${s.male}</td>
<td>${s.female}</td>

<td class="componentBox">
WB:${s.requested.WB}<br>
PRBC:${s.requested.PRBC}<br>
PC:${s.requested.PC}<br>
FFP:${s.requested.FFP}<br>
CRYO:${s.requested.CRYO}
</td>

<td class="componentBox">
WB:${s.issued.WB}<br>
PRBC:${s.issued.PRBC}<br>
PC:${s.issued.PC}<br>
FFP:${s.issued.FFP}<br>
CRYO:${s.issued.CRYO}
</td>

`;

table.appendChild(row);

});

container.appendChild(header);
container.appendChild(summary);
container.appendChild(table);

});

}


/* EXPORT CSV */

function exportCSV(){

const stats=buildStats();

let rows=[["MONTH","HOSPITAL","PATIENTS","MALE","FEMALE","WB_REQ","PRBC_REQ","PC_REQ","FFP_REQ","CRYO_REQ","WB_ISS","PRBC_ISS","PC_ISS","FFP_ISS","CRYO_ISS"]];

Object.keys(stats).forEach(month=>{

const hospitals=stats[month].hospitals;

Object.keys(hospitals).forEach(hospital=>{

const s=hospitals[hospital];

rows.push([
monthName(month),
hospital,
s.entries,
s.male,
s.female,
s.requested.WB,
s.requested.PRBC,
s.requested.PC,
s.requested.FFP,
s.requested.CRYO,
s.issued.WB,
s.issued.PRBC,
s.issued.PC,
s.issued.FFP,
s.issued.CRYO
]);

});

});

const csv=rows.map(r=>r.join(",")).join("\n");

const blob=new Blob([csv],{type:"text/csv"});
const link=document.createElement("a");

link.href=URL.createObjectURL(blob);
link.download="releasing_statistics.csv";
link.click();

}


/* EVENTS */

monthFilter.addEventListener("change",renderStatistics);
hospitalSearch.addEventListener("input",renderStatistics);

document.getElementById("printBtn").onclick=()=>window.print();
document.getElementById("exportBtn").onclick=exportCSV;
document.getElementById("backBtn").onclick=()=>window.location.href="releasing.html";

</script>

</body>
</html>
