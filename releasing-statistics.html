<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Statistics</title>
<meta charset="UTF-8">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f4f4;
color:#333;
}

header{
background:#00897b;
color:white;
text-align:center;
padding:15px;
}

.container{

margin:20px auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.controls input,
.controls select,
.controls button{
padding:10px;
border-radius:5px;
border:1px solid #ccc;
font-weight:bold;
}

.controls input,
.controls select{
flex:1;
min-width:200px;
}

.controls button{
border:none;
cursor:pointer;
color:white;
}

.printBtn{background:#1565c0;}
.exportBtn{background:#2e7d32;}
.backBtn{background:#444;}

.dashboardGrid{
display:grid;
grid-template-columns:repeat(3,1fr);

margin-bottom:20px;
}

.card{
background:#f8f9fa;
border:1px solid #ddd;
border-radius:10px;

box-shadow:0 2px 6px rgba(0,0,0,0.05);

.cardTitle{

font-weight:bold;

margin-bottom:8px;
text-transform:uppercase;
}

.cardValue{
font-size:28px;
font-weight:bold;
color:#00695c;
}

.doubleGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:25px;
}

.sectionTitle{

font-weight:bold;
margin-bottom:10px;
color:#00695c;
}

.yearHeader{
background:#c8e6e1;
padding:13px 14px;
font-weight:bold;
border-radius:6px;
margin-top:20px;
font-size:18px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
color:#004d40;

}

.yearBody{
display:none;
}

.yearBody.open{
display:block;
}

.monthHeader{
background:#e0f2f1;
padding:12px;
font-weight:bold;
border-radius:6px;
margin-top:14px;
font-size:17px;
cursor:pointer;
display:flex;
justify-content:space-between;
align-items:center;
}

.monthBody{
display:none;
}

.monthBody.open{
display:block;
}

.summaryBox{
background:#f7f7f7;
padding:12px;
border:1px solid #ccc;
border-radius:6px;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#00897b;
color:white;
}

.subHeader{
background:#b2dfdb;
font-weight:bold;
color:#000;
}

.left{
text-align:left;
}

.totalRow{
font-weight:bold;
background:#f0f0f0;
}

.smallTable th,
.smallTable td{
padding:10px;
}

.patientServedWrap{
margin-bottom:25px;
}

.patientServedTable{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

.patientServedTable th,
.patientServedTable td{
border:2px solid #000;
padding:8px;
text-align:center;
font-size:14px;
}

.patientServedTable th{
background:#eadfce;
color:#000;
}

.patientServedTable td{
background:#eadfce;
color:#000;
}

.patientServedLeft{
font-weight:bold;
}

.clickableRow{
cursor:pointer;
transition:0.2s;
}

.clickableRow:hover td{
filter:brightness(0.97);
}

.expanderNote{
font-size:12px;
font-weight:bold;
color:#555;
margin-left:8px;
}

.patientDetailWrap{
background:#f8fffe;
border:1px solid #b2dfdb;
border-top:none;
padding:12px;
}

.patientDetailTitle{
font-weight:bold;
color:#00695c;
margin-bottom:8px;
}

.detailTable{
width:100%;
border-collapse:collapse;
margin-top:8px;
}

.detailTable th,
.detailTable td{
border:1px solid #9fd4cd;
padding:7px;
font-size:13px;
text-align:center;
}

.detailTable th{
background:#dff4f1;
color:#004d40;
}

.detailTable td{
background:#ffffff;
}

.hospitalRow{
cursor:pointer;
transition:0.2s;
}

.hospitalRow:hover td{
background:#f1fbf9;
}

.hospitalDetailRow td{
background:#f8fffe;
padding:12px;
}

.hospitalDetailBox{
border:1px solid #b2dfdb;
border-radius:8px;
padding:10px;
background:#f8fffe;
}

.hospitalDetailTitle{
font-size:14px;
font-weight:bold;
color:#00695c;
margin-bottom:8px;
text-align:left;
}

.muted{
color:#666;
font-size:12px;
font-weight:bold;
}

.collapsibleSection{
margin-bottom:20px;
}

.collapsibleHeader{
background:#e0f2f1;
padding:12px 14px;
font-weight:bold;
border-radius:6px;
font-size:17px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
color:#00695c;
border:1px solid #b2dfdb;
}

.collapsibleBody{
display:none;
margin-top:12px;
}

.collapsibleBody.open{
display:block;
}

@media (max-width: 1000px){

grid-template-columns:repeat(2,1fr);
}
.doubleGrid{

}
}

@media (max-width: 640px){
.dashboardGrid{
grid-template-columns:1fr;
}
}

@media print{
.controls{
display:none !important;
}
body{
background:white;
}
.container{
box-shadow:none;
margin:0;
max-width:none;
}
.collapsibleBody,
.yearBody,
.monthBody{

}
}
</style>

</head>

<body>

<header>
<h2>Blood Releasing Statistics</h2>
</header>

<div class="container">

<div class="controls">
<select id="monthFilter">
<option value="">ALL MONTHS</option>
</select>

<input type="text" id="hospitalSearch" placeholder="SEARCH HOSPITAL">

<button class="printBtn" onclick="window.print()">PRINT</button>
<button class="exportBtn" onclick="exportCSV()">EXPORT CSV</button>
<button class="backBtn" onclick="goBack()">BACK</button>
</div>

<div id="dashboardSection"></div>
<div id="patientServedSection"></div>
<div id="statisticsContainer"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain: "galloners-club.firebaseapp.com",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club",
  storageBucket: "galloners-club.firebasestorage.app",
  messagingSenderId: "213049860421",
  appId: "1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId: "G-XYXJH9JNXJ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const statisticsContainer = document.getElementById("statisticsContainer");
const dashboardSection = document.getElementById("dashboardSection");
const patientServedSection = document.getElementById("patientServedSection");
const monthFilter = document.getElementById("monthFilter");
const hospitalSearch = document.getElementById("hospitalSearch");

let allEntries = [];
let allAugmentationEntries = [];
let currentPrices = {
    WB: 0,
    PRBC: 0,
    PC: 0,
    FFP: 0,
    CRYO: 0,
    BOX: 0
};

let expandedPatientSections = new Set();
let expandedHospitalRows = new Set();
let expandedMainSections = new Set(["dashboard","patientServed"]);
let expandedYears = new Set();
let expandedMonths = new Set();

async function loadPrices(){
    try{
        const snapshot = await get(ref(db, "settings/releasingPrices"));
        const data = snapshot.val() || {};

        currentPrices = {
            WB: Number(data.wb) || 0,
            PRBC: Number(data.prbc) || 0,
            PC: Number(data.pc) || 0,
            FFP: Number(data.ffp) || 0,
            CRYO: Number(data.cryo) || 0,
            BOX: Number(data.boxContainer) || 0
        };
    }catch(error){
        console.error("Failed to load prices:", error);
        currentPrices = {
            WB: 0,
            PRBC: 0,
            PC: 0,
            FFP: 0,
            CRYO: 0,
            BOX: 0
        };
    }
}

function refreshAll(){
    populateMonthFilter();
    renderStatistics();
}

function normalizePriceSnapshot(snapshot){
    return {
        WB: Number(snapshot?.WB ?? snapshot?.wb) || 0,
        PRBC: Number(snapshot?.PRBC ?? snapshot?.prbc) || 0,
        PC: Number(snapshot?.PC ?? snapshot?.pc) || 0,
        FFP: Number(snapshot?.FFP ?? snapshot?.ffp) || 0,
        CRYO: Number(snapshot?.CRYO ?? snapshot?.cryo) || 0,
        BOX: Number(snapshot?.BOX ?? snapshot?.box ?? snapshot?.boxContainer) || 0
    };
}

function getEntryPrices(entry){
    if(entry && entry.priceSnapshot){
        return normalizePriceSnapshot(entry.priceSnapshot);
    }
    return currentPrices;
}

function computeIssuedTotalFromList(issuedList, boxContainerQty, prices){
    let total = 0;

    (Array.isArray(issuedList) ? issuedList : []).forEach(item => {
        const type = (item.type || "").toUpperCase();
        const qty = Number(item.qty || 0);

        if(prices[type] !== undefined){
            total += qty * prices[type];
        }
    });

    total += (Number(boxContainerQty) || 0) * (prices.BOX || 0);
    return total;
}

function monthName(monthKey){
    const months = {
        "01":"JANUARY",
        "02":"FEBRUARY",
        "03":"MARCH",
        "04":"APRIL",
        "05":"MAY",
        "06":"JUNE",
        "07":"JULY",
        "08":"AUGUST",
        "09":"SEPTEMBER",
        "10":"OCTOBER",
        "11":"NOVEMBER",
        "12":"DECEMBER"
    };

    const [year, month] = monthKey.split("-");
    return (months[month] || month) + " " + year;
}

function emptyComponent(){
    return {WB:0, PRBC:0, PC:0, FFP:0, CRYO:0};
}

function countComponents(store, list){
    if(!Array.isArray(list)) return;

    list.forEach(item => {
        const type = (item.type || "").toUpperCase();
        const qty = Number(item.qty || 0);

        if(store[type] !== undefined){
            store[type] += qty;
        }
    });
}

function formatComponentsPlain(list){
    if(!Array.isArray(list) || list.length === 0) return "";
    return list
        .filter(item => Number(item.qty || 0) > 0)
        .map(item => `${item.type || ""} - ${item.qty || 0}`)
        .join(" | ");
}

function formatDateForExport(dateValue){
    if(!dateValue) return "";
    if(/^\d{4}-\d{2}-\d{2}$/.test(dateValue)){
        const [y,m,d] = dateValue.split("-");
        return `${m}/${d}/${y.slice(-2)}`;
    }
    return dateValue;
}

function populateMonthFilter(){
    const monthSet = new Set();

    allEntries.forEach(e => {
        const month = (e.date || "").slice(0,7);
        if(month) monthSet.add(month);
    });

    allAugmentationEntries.forEach(e => {
        const month = (e.date || "").slice(0,7);
        if(month) monthSet.add(month);
    });

    const months = [...monthSet].sort().reverse();
    const current = monthFilter.value;

    monthFilter.innerHTML = '<option value="">ALL MONTHS</option>';

    months.forEach(m => {
        const opt = document.createElement("option");
        opt.value = m;
        opt.textContent = monthName(m);
        if(m === current) opt.selected = true;
        monthFilter.appendChild(opt);
    });
}

function buildReleasingStats(){
    const monthFilterValue = monthFilter.value;
    const hospitalSearchValue = hospitalSearch.value.trim().toUpperCase();

    const grouped = {};
    const grand = {
        patients:0,
        male:0,
        female:0,
        requested:emptyComponent(),
        issued:emptyComponent(),
        actualIncome:0,
        computedTotal:0,
        boxContainers:0
    };

    const patientServed = {
        pay:{ male:0, female:0, entries:[] },
        discounted:{ male:0, female:0, entries:[] },
        noCharge:{ male:0, female:0, entries:[] }
    };

    allEntries.forEach(entry => {
        const dateValue = entry.date || "";
        if(dateValue === "") return;

        const month = dateValue.slice(0,7);
        const hospital = (entry.facility || "").toUpperCase();

        if(monthFilterValue && month !== monthFilterValue) return;
        if(hospitalSearchValue && !hospital.includes(hospitalSearchValue)) return;

        if(!grouped[month]){
            grouped[month] = {
                hospitals:{},
                totals:{
                    entries:0,
                    male:0,
                    female:0,
                    requested:emptyComponent(),
                    issued:emptyComponent(),
                    actualIncome:0,
                    computedTotal:0,
                    boxContainers:0
                }
            };
        }

        if(!grouped[month].hospitals[hospital]){
            grouped[month].hospitals[hospital] = {
                entries:0,
                male:0,
                female:0,
                requested:emptyComponent(),
                issued:emptyComponent(),
                boxContainers:0,
                computedTotal:0,
                patients:[]
            };
        }

        const m = grouped[month];
        const h = m.hospitals[hospital];

        m.totals.entries++;
        h.entries++;
        grand.patients++;

        const sex = String(entry.sex || "").toUpperCase();
        if(sex === "MALE"){
            m.totals.male++;
            h.male++;
            grand.male++;
        }

        if(sex === "FEMALE"){
            m.totals.female++;
            h.female++;
            grand.female++;
        }

        countComponents(m.totals.requested, entry.requests);
        countComponents(h.requested, entry.requests);
        countComponents(grand.requested, entry.requests);

        countComponents(m.totals.issued, entry.issued);
        countComponents(h.issued, entry.issued);
        countComponents(grand.issued, entry.issued);

        const amountPaid = Number(entry.amountPaid || 0);
        const discount = Number(entry.discount || 0);
        const actualIncome = amountPaid - discount;
        const computedTotal = computeIssuedTotalFromList(entry.issued, entry.boxContainerQty, getEntryPrices(entry));
        const boxCount = Number(entry.boxContainerQty || 0);

        m.totals.actualIncome += actualIncome;
        grand.actualIncome += actualIncome;

        m.totals.computedTotal += computedTotal;
        h.computedTotal += computedTotal;
        grand.computedTotal += computedTotal;

        m.totals.boxContainers += boxCount;
        h.boxContainers += boxCount;
        grand.boxContainers += boxCount;

        const patientDetail = {
            date: entry.date || "",
            facility: entry.facility || "",
            surname: entry.surname || "",
            firstname: entry.firstname || "",
            age: entry.age || "",
            sex: entry.sex || "",
            bloodtype: entry.bloodtype || "",
            or: entry.or || "",
            requestedText: formatComponentsPlain(entry.requests),
            issuedText: formatComponentsPlain(entry.issued),
            amountPaid: amountPaid,
            discount: discount,
            netAmount: actualIncome,
            boxContainerQty: boxCount,
            computedTotal: computedTotal
        };

        h.patients.push(patientDetail);

        if(actualIncome <= 0){
            if(sex === "MALE") patientServed.noCharge.male++;
            if(sex === "FEMALE") patientServed.noCharge.female++;
            patientServed.noCharge.entries.push(patientDetail);
        }else if(discount > 0){
            if(sex === "MALE") patientServed.discounted.male++;
            if(sex === "FEMALE") patientServed.discounted.female++;
            patientServed.discounted.entries.push(patientDetail);
        }else{
            if(sex === "MALE") patientServed.pay.male++;
            if(sex === "FEMALE") patientServed.pay.female++;
            patientServed.pay.entries.push(patientDetail);
        }
    });

    return {grouped, grand, patientServed};
}

function smallComponentTable(title, data){
    return `
        <div class="card">
            <div class="sectionTitle">${title}</div>
            <table class="smallTable">
                <thead>
                    <tr>
                        <th>WB</th>
                        <th>PRBC</th>
                        <th>PC</th>
                        <th>FFP</th>
                        <th>CRYO</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>${data.WB}</td>
                        <td>${data.PRBC}</td>
                        <td>${data.PC}</td>
                        <td>${data.FFP}</td>
                        <td>${data.CRYO}</td>
                    </tr>
                </tbody>
            </table>
        </div>
    `;
}

function renderDashboard(grand){
    const isOpen = expandedMainSections.has("dashboard");
    dashboardSection.innerHTML = `
        <div class="collapsibleSection">
            <div class="collapsibleHeader" data-main-section="dashboard">
                <span>DASHBOARD SUMMARY</span>
                <span>${isOpen ? "▲ COLLAPSE" : "▼ EXPAND"}</span>
            </div>
            <div class="collapsibleBody ${isOpen ? "open" : ""}">
                <div class="dashboardGrid">
                    <div class="card">
                        <div class="cardTitle">Total Patients</div>
                        <div class="cardValue">${grand.patients}</div>
                    </div>
                    <div class="card">
                        <div class="cardTitle">Total Male</div>
                        <div class="cardValue">${grand.male}</div>
                    </div>
                    <div class="card">
                        <div class="cardTitle">Total Female</div>
                        <div class="cardValue">${grand.female}</div>
                    </div>
                    <div class="card">
                        <div class="cardTitle">Actual Income</div>
                        <div class="cardValue">${grand.actualIncome.toFixed(2)}</div>
                    </div>
                    <div class="card">
                        <div class="cardTitle">Computed Total</div>
                        <div class="cardValue">${grand.computedTotal.toFixed(2)}</div>
                    </div>
                    <div class="card">
                        <div class="cardTitle">Box Containers</div>
                        <div class="cardValue">${grand.boxContainers}</div>
                    </div>
                </div>

                <div class="doubleGrid">
                    ${smallComponentTable("GRAND TOTAL REQUESTED", grand.requested)}
                    ${smallComponentTable("GRAND TOTAL ISSUED", grand.issued)}
                </div>
            </div>
        </div>
    `;
}

function renderPatientDetailsTable(entries){
    if(!entries.length){
        return `<div class="muted">No patient records found.</div>`;
    }

    return `
        <table class="detailTable">
            <tr>
                <th>DATE</th>
                <th>HOSPITAL</th>
                <th>SURNAME</th>
                <th>FIRST NAME</th>
                <th>AGE</th>
                <th>SEX</th>
                <th>BLOOD TYPE</th>
                <th>OR</th>
                <th>BOX</th>
                <th>REQUESTED</th>
                <th>ISSUED</th>
                <th>COMPUTED TOTAL</th>
                <th>AMOUNT PAID</th>
                <th>DISCOUNT</th>
                <th>NET AMOUNT</th>
            </tr>
            ${entries.map(item => `
                <tr>
                    <td>${item.date || ""}</td>
                    <td>${item.facility || ""}</td>
                    <td>${item.surname || ""}</td>
                    <td>${item.firstname || ""}</td>
                    <td>${item.age || ""}</td>
                    <td>${item.sex || ""}</td>
                    <td>${item.bloodtype || ""}</td>
                    <td>${item.or || ""}</td>
                    <td>${item.boxContainerQty || 0}</td>
                    <td class="left">${item.requestedText || ""}</td>
                    <td class="left">${item.issuedText || ""}</td>
                    <td>${Number(item.computedTotal || 0).toFixed(2)}</td>
                    <td>${Number(item.amountPaid || 0).toFixed(2)}</td>
                    <td>${Number(item.discount || 0).toFixed(2)}</td>
                    <td>${Number(item.netAmount || 0).toFixed(2)}</td>
                </tr>
            `).join("")}
        </table>
    `;
}

function renderPatientServedTable(patientServed){
    const sectionOpen = expandedMainSections.has("patientServed");
    const discountedOpen = expandedPatientSections.has("discounted");
    const noChargeOpen = expandedPatientSections.has("noCharge");

    patientServedSection.innerHTML = `
        <div class="collapsibleSection">
            <div class="collapsibleHeader" data-main-section="patientServed">
                <span>PATIENT SERVED</span>
                <span>${sectionOpen ? "▲ COLLAPSE" : "▼ EXPAND"}</span>
            </div>
            <div class="collapsibleBody ${sectionOpen ? "open" : ""}">
                <div class="patientServedWrap">
                    <table class="patientServedTable">
                        <tr>
                            <th rowspan="2" class="patientServedLeft">Patient Served</th>
                            <th colspan="2">Conventional units</th>
                        </tr>
                        <tr>
                            <th>Male</th>
                            <th>Female</th>
                        </tr>
                        <tr>
                            <td class="patientServedLeft">Pay</td>
                            <td>${patientServed.pay.male}</td>
                            <td>${patientServed.pay.female}</td>
                        </tr>
                        <tr class="clickableRow" data-patient-section="discounted">
                            <td class="patientServedLeft">DISCOUNTED <span class="expanderNote">${discountedOpen ? "▲ HIDE DETAILS" : "▼ SHOW DETAILS"}</span></td>
                            <td>${patientServed.discounted.male}</td>
                            <td>${patientServed.discounted.female}</td>
                        </tr>
                        ${discountedOpen ? `
                        <tr>
                            <td colspan="3" style="padding:0;">
                                <div class="patientDetailWrap">
                                    <div class="patientDetailTitle">DISCOUNTED PATIENT DETAILS</div>
                                    ${renderPatientDetailsTable(patientServed.discounted.entries)}
                                </div>
                            </td>
                        </tr>
                        ` : ""}
                        <tr class="clickableRow" data-patient-section="noCharge">
                            <td class="patientServedLeft">NO CHARGE<br>(Indigent) <span class="expanderNote">${noChargeOpen ? "▲ HIDE DETAILS" : "▼ SHOW DETAILS"}</span></td>
                            <td>${patientServed.noCharge.male}</td>
                            <td>${patientServed.noCharge.female}</td>
                        </tr>
                        ${noChargeOpen ? `
                        <tr>
                            <td colspan="3" style="padding:0;">
                                <div class="patientDetailWrap">
                                    <div class="patientDetailTitle">NO CHARGE / INDIGENT PATIENT DETAILS</div>
                                    ${renderPatientDetailsTable(patientServed.noCharge.entries)}
                                </div>
                            </td>
                        </tr>
                        ` : ""}
                    </table>
                </div>
            </div>
        </div>
    `;
}

function renderStatistics(){
    const data = buildReleasingStats();
    const stats = data.grouped;
    const grand = data.grand;
    const patientServed = data.patientServed;

    renderDashboard(grand);
    renderPatientServedTable(patientServed);
    statisticsContainer.innerHTML = "";

    const months = Object.keys(stats).sort().reverse();

    if(months.length === 0){
        statisticsContainer.innerHTML = "<p>No releasing statistics found.</p>";
        attachExpandableEvents();
        return;
    }

    const yearsMap = {};
    months.forEach(month => {
        const year = month.split("-")[0];
        if(!yearsMap[year]) yearsMap[year] = [];
        yearsMap[year].push(month);
    });

    Object.keys(yearsMap).sort().reverse().forEach(year => {
        const yearOpen = expandedYears.has(year);

        const yearWrap = document.createElement("div");

        const yearHeader = document.createElement("div");
        yearHeader.className = "yearHeader";
        yearHeader.dataset.yearKey = year;
        yearHeader.innerHTML = `
            <span>${year}</span>
            <span>${yearOpen ? "▲ COLLAPSE" : "▼ EXPAND"}</span>
        `;

        const yearBody = document.createElement("div");
        yearBody.className = `yearBody ${yearOpen ? "open" : ""}`;

        yearsMap[year].forEach(month => {
            const m = stats[month];
            const monthOpen = expandedMonths.has(month);

            const wrapper = document.createElement("div");

            const header = document.createElement("div");
            header.className = "monthHeader";
            header.dataset.monthKey = month;
            header.innerHTML = `
                <span>${monthName(month)}</span>
                <span>${monthOpen ? "▲ COLLAPSE" : "▼ EXPAND"}</span>
            `;

            const body = document.createElement("div");
            body.className = `monthBody ${monthOpen ? "open" : ""}`;

            const summary = document.createElement("div");
            summary.className = "summaryBox";
            summary.innerHTML = `
                <b>PATIENTS:</b> ${m.totals.entries}
                <br>
                <b>MALE:</b> ${m.totals.male}
                <br>
                <b>FEMALE:</b> ${m.totals.female}
                <br>
                <b>BOX CONTAINERS:</b> ${m.totals.boxContainers}
                <br>
                <b>ACTUAL INCOME:</b> ${m.totals.actualIncome.toFixed(2)}
                <br>
                <b>COMPUTED TOTAL:</b> ${m.totals.computedTotal.toFixed(2)}
            `;

            const table = document.createElement("table");

            table.innerHTML = `
                <tr>
                    <th rowspan="2">HOSPITAL</th>
                    <th rowspan="2">PATIENTS</th>
                    <th rowspan="2">MALE</th>
                    <th rowspan="2">FEMALE</th>
                    <th rowspan="2">BOX</th>
                    <th rowspan="2">COMPUTED TOTAL</th>
                    <th colspan="5">REQUESTED</th>
                    <th colspan="5">ISSUED</th>
                </tr>

                <tr class="subHeader">
                    <th>WB</th>
                    <th>PRBC</th>
                    <th>PC</th>
                    <th>FFP</th>
                    <th>CRYO</th>

                    <th>WB</th>
                    <th>PRBC</th>
                    <th>PC</th>
                    <th>FFP</th>
                    <th>CRYO</th>
                </tr>
            `;

            Object.keys(m.hospitals).sort().forEach(hospital => {
                const s = m.hospitals[hospital];
                const rowKey = `${month}__${hospital}`;
                const isOpen = expandedHospitalRows.has(rowKey);

                const row = document.createElement("tr");
                row.className = "hospitalRow";
                row.dataset.hospitalKey = rowKey;
                row.innerHTML = `
                    <td class="left">${hospital} <span class="expanderNote">${isOpen ? "▲ HIDE DETAILS" : "▼ SHOW DETAILS"}</span></td>
                    <td>${s.entries}</td>
                    <td>${s.male}</td>
                    <td>${s.female}</td>
                    <td>${s.boxContainers}</td>
                    <td>${s.computedTotal.toFixed(2)}</td>

                    <td>${s.requested.WB}</td>
                    <td>${s.requested.PRBC}</td>
                    <td>${s.requested.PC}</td>
                    <td>${s.requested.FFP}</td>
                    <td>${s.requested.CRYO}</td>

                    <td>${s.issued.WB}</td>
                    <td>${s.issued.PRBC}</td>
                    <td>${s.issued.PC}</td>
                    <td>${s.issued.FFP}</td>
                    <td>${s.issued.CRYO}</td>
                `;
                table.appendChild(row);

                if(isOpen){
                    const detailRow = document.createElement("tr");
                    detailRow.className = "hospitalDetailRow";
                    detailRow.innerHTML = `
                        <td colspan="16">
                            <div class="hospitalDetailBox">
                                <div class="hospitalDetailTitle">${hospital} PATIENT LIST AND FULL DETAILS</div>
                                ${renderPatientDetailsTable(s.patients)}
                            </div>
                        </td>
                    `;
                    table.appendChild(detailRow);
                }
            });

            const totalRow = document.createElement("tr");
            totalRow.className = "totalRow";
            totalRow.innerHTML = `
                <td class="left">TOTAL</td>
                <td>${m.totals.entries}</td>
                <td>${m.totals.male}</td>
                <td>${m.totals.female}</td>
                <td>${m.totals.boxContainers}</td>
                <td>${m.totals.computedTotal.toFixed(2)}</td>

                <td>${m.totals.requested.WB}</td>
                <td>${m.totals.requested.PRBC}</td>
                <td>${m.totals.requested.PC}</td>
                <td>${m.totals.requested.FFP}</td>
                <td>${m.totals.requested.CRYO}</td>

                <td>${m.totals.issued.WB}</td>
                <td>${m.totals.issued.PRBC}</td>
                <td>${m.totals.issued.PC}</td>
                <td>${m.totals.issued.FFP}</td>
                <td>${m.totals.issued.CRYO}</td>
            `;
            table.appendChild(totalRow);

            body.appendChild(summary);
            body.appendChild(table);

            wrapper.appendChild(header);
            wrapper.appendChild(body);
            yearBody.appendChild(wrapper);
        });

        yearWrap.appendChild(yearHeader);
        yearWrap.appendChild(yearBody);
        statisticsContainer.appendChild(yearWrap);
    });

    attachExpandableEvents();
}

function attachExpandableEvents(){
    document.querySelectorAll("[data-patient-section]").forEach(row => {
        row.onclick = function(){
            const key = this.dataset.patientSection;
            if(expandedPatientSections.has(key)){
                expandedPatientSections.delete(key);
            }else{
                expandedPatientSections.add(key);
            }
            renderStatistics();
        };
    });

    document.querySelectorAll("[data-hospital-key]").forEach(row => {
        row.onclick = function(){
            const key = this.dataset.hospitalKey;
            if(expandedHospitalRows.has(key)){
                expandedHospitalRows.delete(key);
            }else{
                expandedHospitalRows.add(key);
            }
            renderStatistics();
        };
    });

    document.querySelectorAll("[data-main-section]").forEach(row => {
        row.onclick = function(){
            const key = this.dataset.mainSection;
            if(expandedMainSections.has(key)){
                expandedMainSections.delete(key);
            }else{
                expandedMainSections.add(key);
            }
            renderStatistics();
        };
    });

    document.querySelectorAll("[data-year-key]").forEach(row => {
        row.onclick = function(){
            const key = this.dataset.yearKey;
            if(expandedYears.has(key)){
                expandedYears.delete(key);
            }else{
                expandedYears.add(key);
            }
            renderStatistics();
        };
    });

    document.querySelectorAll("[data-month-key]").forEach(row => {
        row.onclick = function(){
            const key = this.dataset.monthKey;
            if(expandedMonths.has(key)){
                expandedMonths.delete(key);
            }else{
                expandedMonths.add(key);
            }
            renderStatistics();
        };
    });
}

window.exportCSV = function(){
    const rel = buildReleasingStats();
    const rows = [];

    rows.push([
        "MONTH",
        "HOSPITAL",
        "PATIENTS",
        "MALE",
        "FEMALE",
        "BOX CONTAINERS",
        "COMPUTED TOTAL",
        "REQUESTED WB",
        "REQUESTED PRBC",
        "REQUESTED PC",
        "REQUESTED FFP",
        "REQUESTED CRYO",
        "ISSUED WB",
        "ISSUED PRBC",
        "ISSUED PC",
        "ISSUED FFP",
        "ISSUED CRYO"
    ]);

    Object.keys(rel.grouped).sort().reverse().forEach(month => {
        const monthLabel = monthName(month);
        const hospitals = rel.grouped[month].hospitals;

        Object.keys(hospitals).sort().forEach(hospital => {
            const s = hospitals[hospital];

            rows.push([
                monthLabel,
                hospital,
                s.entries,
                s.male,
                s.female,
                s.boxContainers,
                s.computedTotal.toFixed(2),
                s.requested.WB,
                s.requested.PRBC,
                s.requested.PC,
                s.requested.FFP,
                s.requested.CRYO,
                s.issued.WB,
                s.issued.PRBC,
                s.issued.PC,
                s.issued.FFP,
                s.issued.CRYO
            ]);
        });

        rows.push([
            monthLabel,
            "TOTAL",
            rel.grouped[month].totals.entries,
            rel.grouped[month].totals.male,
            rel.grouped[month].totals.female,
            rel.grouped[month].totals.boxContainers,
            rel.grouped[month].totals.computedTotal.toFixed(2),
            rel.grouped[month].totals.requested.WB,
            rel.grouped[month].totals.requested.PRBC,
            rel.grouped[month].totals.requested.PC,
            rel.grouped[month].totals.requested.FFP,
            rel.grouped[month].totals.requested.CRYO,
            rel.grouped[month].totals.issued.WB,
            rel.grouped[month].totals.issued.PRBC,
            rel.grouped[month].totals.issued.PC,
            rel.grouped[month].totals.issued.FFP,
            rel.grouped[month].totals.issued.CRYO
        ]);

        rows.push([]);
    });

    const csv = rows.map(r => r.map(v => `"${String(v ?? "").replace(/"/g,'""')}"`).join(",")).join("\n");
    const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "releasing_statistics_summary_only.csv";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};

    window.location.href = "releasing.html";
};

onAuthStateChanged(auth, async (user) => {
    if(!user){
        window.location.href = "index.html";
        return;
    }

    await loadPrices();

    onValue(ref(db,"releasing"), snapshot => {
        allEntries = [];
        snapshot.forEach(child => {
            allEntries.push({
                id: child.key,
                ...child.val()
            });
        });
        refreshAll();
    });

    onValue(ref(db,"bloodAugmentation"), snapshot => {
        allAugmentationEntries = [];
        snapshot.forEach(child => {
            allAugmentationEntries.push({

                ...child.val()
            });
        });
        refreshAll();
    });
});
