<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Database Entry</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<style>
body {
    font-family: Arial;
    background: #eef2f6;
    margin: 0;
    padding: 20px;
}
.field-group {
    margin-bottom: 10px;
}
input {
    padding: 8px;
    width: 100%;
}
</style>
</head>

<body>

<h2>Donor Entry</h2>

<form id="donorForm">

<!-- CONTACT NUMBER (RESTORED) -->
<div class="field-group">
    <label>Contact Number</label>
    <input type="text" id="contactNumber">
</div>

<!-- TIME START -->
<div class="field-group">
    <label>Time Started</label>
    <input type="text" id="timeStarted" placeholder="e.g. 930 or 1930">
</div>

<!-- TIME END -->
<div class="field-group">
    <label>Time Ended</label>
    <input type="text" id="timeEnded" placeholder="e.g. 930 or 1930">
</div>

<button type="submit">Save</button>

</form>

<script>

// ================= SMART TIME FORMATTER =================
function formatSmartTime(value) {
    let raw = value.replace(/\D/g, "");

    if (!raw) return "";

    if (value.includes(":")) return value;

    if (raw.length === 1) return "0" + raw + ":00";
    if (raw.length === 2) return raw + ":00";

    if (raw.length >= 3) {
        let minutes = raw.slice(-2);
        let hours = raw.slice(0, raw.length - 2);
        hours = hours.slice(-2);
        return hours.padStart(2, "0") + ":" + minutes;
    }

    return value;
}

// ================= AUTO FORMAT + AUTO JUMP =================
function attachTimeFormatter(input) {

    input.addEventListener("input", function() {
        let val = input.value;

        if (val.includes(":")) return;

        input.value = formatSmartTime(val);
    });

    input.addEventListener("blur", function() {
        input.value = formatSmartTime(input.value);
    });

    input.addEventListener("keyup", function() {
        if (/^\d{2}:\d{2}$/.test(input.value)) {
            focusNext(input);
        }
    });
}

// ================= AUTO NEXT FIELD =================
function focusNext(current) {
    const inputs = Array.from(document.querySelectorAll("input"));
    const index = inputs.indexOf(current);
    if (index > -1 && index < inputs.length - 1) {
        inputs[index + 1].focus();
    }
}

// INIT
attachTimeFormatter(document.getElementById("timeStarted"));
attachTimeFormatter(document.getElementById("timeEnded"));

// ================= VALIDATION =================
function parseFlexibleTime(value) {
    const match = value.match(/^([01]\d|2[0-3]):([0-5]\d)$/);
    if (!match) return null;

    const h = Number(match[1]);
    const m = Number(match[2]);

    return {
        normalized: value,
        totalMinutes: h * 60 + m
    };
}

</script>

</body>
</html>
