<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Entry</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        header {
            background: #b30000;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 25px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.12);
        }

        h3 {
            margin-top: 0;
            color: #b30000;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px 18px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        .field-group label {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .field-group input,
        .field-group select,
        .field-group textarea {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .triple-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .serial-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .serial-prefix {
            background: #f1f1f1;
            border: 1px solid #ccc;
            padding: 10px 12px;
            border-radius: 8px;
            font-weight: bold;
            white-space: nowrap;
        }

        .radio-box {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            background: #fafafa;
        }

        .radio-options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 10px;
        }

        .radio-options label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn {
            background: #b30000;
            color: white;
        }

        .reset-btn {
            background: #666;
            color: white;
        }

        .status-message {
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .status-success {
            display: block;
            background: #e8f7e8;
            color: #1b5e20;
            border: 1px solid #b7dfb9;
        }

        .status-error {
            display: block;
            background: #fdeaea;
            color: #b71c1c;
            border: 1px solid #efb7b7;
        }

        @media (max-width: 900px) {
            .form-grid,
            .field-row,
            .triple-row {
                grid-template-columns: 1fr;
            }

            .serial-wrap {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<header>Donor Database Entry</header>

<div class="container">
    <h3>Donor Information Entry Form</h3>

    <form id="donorForm">
        <div class="form-grid">

            <!-- Date -->
            <div class="field-group full-width">
                <label for="entryDate">Date</label>
                <input type="date" id="entryDate" required>
            </div>

            <!-- Serial Number + Donor Type -->
            <div class="field-group">
                <label for="serialNumber">1. Serial Number</label>
                <div class="serial-wrap">
                    <span class="serial-prefix">PRC2600-</span>
                    <input type="text" id="serialNumber" placeholder="Enter manual number" required>
                </div>
            </div>

            <div class="field-group">
                <label>2. Donor Type</label>
                <div class="radio-box">
                    <div class="radio-options">
                        <label>
                            <input type="radio" name="donorType" value="Patient Directed">
                            Patient Directed
                        </label>
                        <label>
                            <input type="radio" name="donorType" value="Walk-in">
                            Walk-in
                        </label>
                        <label>
                            <input type="radio" name="donorType" value="MBD">
                            MBD
                        </label>
                    </div>

                    <div id="patientDirectedBox" class="hidden">
                        <input type="text" id="patientDirectedDetails" placeholder="Enter patient directed details">
                    </div>

                    <div id="mbdBox" class="hidden" style="margin-top:10px;">
                        <input type="text" id="mbdDetails" placeholder="Enter MBD site / organization (example: Peoples Park)">
                    </div>
                </div>
            </div>

            <!-- Name -->
            <div class="field-group">
                <label for="surname">3. Surname</label>
                <input type="text" id="surname" required>
            </div>

            <div class="field-group">
                <label for="firstName">4. First Name</label>
                <input type="text" id="firstName" required>
            </div>

            <div class="field-group">
                <label for="middleName">5. Middle</label>
                <input type="text" id="middleName">
            </div>

            <!-- Birthday + Age -->
            <div class="field-group">
                <label>6. Birthday / Age</label>
                <div class="field-row">
                    <input type="date" id="birthday" required>
                    <input type="number" id="age" placeholder="Age" readonly>
                </div>
            </div>

            <!-- Civil Status + Sex -->
            <div class="field-group">
                <label for="civilStatus">7. Civil Status</label>
                <select id="civilStatus" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Separated">Separated</option>
                    <option value="Divorced">Divorced</option>
                    <option value="Widowed">Widowed</option>
                </select>
            </div>

            <div class="field-group">
                <label for="sex">8. Sex</label>
                <select id="sex" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <!-- Address -->
            <div class="field-group full-width">
                <label for="address">9. Address (House Number, Street, Barangay, Town, City/Province)</label>
                <input type="text" id="address" required>
            </div>

            <!-- Occupation + Contact -->
            <div class="field-group">
                <label for="occupation">10. Occupation</label>
                <input type="text" id="occupation">
            </div>

            <div class="field-group">
                <label for="contactNumber">11. Contact Number</label>
                <input type="text" id="contactNumber">
            </div>

            <!-- Blood Type + Donations -->
            <div class="field-group">
                <label for="bloodType">12. Blood Type</label>
                <select id="bloodType" required>
                    <option value="">Select</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="Unknown">Unknown</option>
                </select>
            </div>

            <div class="field-group">
                <label for="numberOfDonations">13. Number of Donations</label>
                <input type="number" id="numberOfDonations" min="0" value="0">
            </div>

            <!-- Blood Bag Brand + Type -->
            <div class="field-group">
                <label for="bloodBagBrand">14. Blood Bag Used (KARMI / TERUMO)</label>
                <select id="bloodBagBrand" required>
                    <option value="">Select</option>
                    <option value="KARMI">KARMI</option>
                    <option value="TERUMO">TERUMO</option>
                </select>
            </div>

            <div class="field-group">
                <label for="bloodBagType">15. Blood Bag Type</label>
                <select id="bloodBagType" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Triple">Triple</option>
                    <option value="Quadruple">Quadruple</option>
                </select>
            </div>

            <!-- Amount -->
            <div class="field-group">
                <label for="amount">16. Amount</label>
                <select id="amount" required>
                    <option value="">Select</option>
                    <option value="450 ml">450 ml</option>
                    <option value="QNS">QNS</option>
                    <option value="UB">UB</option>
                </select>
            </div>

            <!-- Time Started / Ended -->
            <div class="field-group">
                <label>17. Time Started / Time Ended</label>
                <div class="field-row">
                    <input type="time" id="timeStarted">
                    <input type="time" id="timeEnded">
                </div>
            </div>

            <!-- Remarks -->
            <div class="field-group full-width">
                <label for="remarks">18. Remarks</label>
                <textarea id="remarks" placeholder="Enter remarks here"></textarea>
            </div>

        </div>

        <div class="btn-row">
            <button type="submit" class="save-btn">Save Donor Entry</button>
            <button type="reset" class="reset-btn">Clear Form</button>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </form>
</div>

<script>
    // =========================================================
    // KEEP YOUR EXISTING FIREBASE CONFIG
    // Replace only if you have a new config
    // =========================================================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const donorForm = document.getElementById("donorForm");
    const entryDate = document.getElementById("entryDate");
    const birthday = document.getElementById("birthday");
    const age = document.getElementById("age");
    const statusMessage = document.getElementById("statusMessage");

    const donorTypeRadios = document.querySelectorAll('input[name="donorType"]');
    const patientDirectedBox = document.getElementById("patientDirectedBox");
    const patientDirectedDetails = document.getElementById("patientDirectedDetails");
    const mbdBox = document.getElementById("mbdBox");
    const mbdDetails = document.getElementById("mbdDetails");

    // Auto set today's date
    function setTodayDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        entryDate.value = `${yyyy}-${mm}-${dd}`;
    }

    setTodayDate();

    // Compute age from birthday
    function computeAge() {
        if (!birthday.value) {
            age.value = "";
            return;
        }

        const birthDate = new Date(birthday.value);
        const today = new Date();

        let years = today.getFullYear() - birthDate.getFullYear();
        const monthDiff = today.getMonth() - birthDate.getMonth();

        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
            years--;
        }

        age.value = years >= 0 ? years : "";
    }

    birthday.addEventListener("change", computeAge);

    // Show / hide donor type extra fields
    function updateDonorTypeFields() {
        const selected = document.querySelector('input[name="donorType"]:checked');

        patientDirectedBox.classList.add("hidden");
        mbdBox.classList.add("hidden");
        patientDirectedDetails.value = "";
        mbdDetails.value = "";

        if (!selected) return;

        if (selected.value === "Patient Directed") {
            patientDirectedBox.classList.remove("hidden");
        }

        if (selected.value === "MBD") {
            mbdBox.classList.remove("hidden");
        }
    }

    donorTypeRadios.forEach(radio => {
        radio.addEventListener("change", updateDonorTypeFields);
    });

    function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status-message";
        statusMessage.classList.add(type === "success" ? "status-success" : "status-error");
    }

    function getSelectedDonorType() {
        const selected = document.querySelector('input[name="donorType"]:checked');
        return selected ? selected.value : "";
    }

    donorForm.addEventListener("submit", async function(e) {
        e.preventDefault();

        const currentUser = auth.currentUser;
        if (!currentUser) {
            showMessage("You must be logged in first before saving donor data.", "error");
            return;
        }

        const donorType = getSelectedDonorType();

        if (!donorType) {
            showMessage("Please select donor type.", "error");
            return;
        }

        const serialManual = document.getElementById("serialNumber").value.trim();
        const fullSerialNumber = "PRC2600-" + serialManual;

        const donorData = {
            entryDate: entryDate.value,
            serialNumber: fullSerialNumber,

            donorType: donorType,
            patientDirectedDetails: donorType === "Patient Directed" ? patientDirectedDetails.value.trim() : "",
            mbdDetails: donorType === "MBD" ? mbdDetails.value.trim() : "",

            surname: document.getElementById("surname").value.trim(),
            firstName: document.getElementById("firstName").value.trim(),
            middleName: document.getElementById("middleName").value.trim(),

            birthday: document.getElementById("birthday").value,
            age: parseInt(document.getElementById("age").value || "0"),

            civilStatus: document.getElementById("civilStatus").value,
            sex: document.getElementById("sex").value,
            address: document.getElementById("address").value.trim(),
            occupation: document.getElementById("occupation").value.trim(),
            contactNumber: document.getElementById("contactNumber").value.trim(),

            bloodType: document.getElementById("bloodType").value,
            numberOfDonations: parseInt(document.getElementById("numberOfDonations").value || "0"),

            bloodBagBrand: document.getElementById("bloodBagBrand").value,
            bloodBagType: document.getElementById("bloodBagType").value,
            amount: document.getElementById("amount").value,

            timeStarted: document.getElementById("timeStarted").value,
            timeEnded: document.getElementById("timeEnded").value,
            remarks: document.getElementById("remarks").value.trim(),

            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            createdBy: currentUser.uid
        };

        try {
            await db.collection("donorDatabase").add(donorData);
            showMessage("Donor record saved successfully.", "success");
            donorForm.reset();
            setTodayDate();
            age.value = "";
            patientDirectedBox.classList.add("hidden");
            mbdBox.classList.add("hidden");
        } catch (error) {
            console.error("Error saving donor record:", error);
            showMessage("Failed to save donor record: " + error.message, "error");
        }
    });

    donorForm.addEventListener("reset", function() {
        setTimeout(() => {
            setTodayDate();
            age.value = "";
            patientDirectedBox.classList.add("hidden");
            mbdBox.classList.add("hidden");
            statusMessage.className = "status-message";
            statusMessage.textContent = "";
        }, 50);
    });
</script>

</body>
</html>
