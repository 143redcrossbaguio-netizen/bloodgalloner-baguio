<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Entry</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
        }

        header {
            background: #b30000;
            color: white;
            padding: 16px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            max-width: 1100px;
            margin: 25px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.12);
        }

        h3 {
            margin-top: 0;
            color: #b30000;
            border-bottom: 2px solid #eee;
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px 18px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .field-group {
            display: flex;
            flex-direction: column;
        }

        .field-group label {
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 14px;
        }

        .field-group input,
        .field-group select,
        .field-group textarea {
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            width: 100%;
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .serial-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .serial-prefix {
            background: #f1f1f1;
            border: 1px solid #ccc;
            padding: 10px 12px;
            border-radius: 8px;
            font-weight: bold;
            white-space: nowrap;
        }

        .radio-box {
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 12px;
            background: #fafafa;
        }

        .radio-options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 10px;
        }

        .radio-options label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .group-info {
            margin-top: 10px;
            padding: 10px 12px;
            background: #fff5f5;
            border: 1px solid #efc6c6;
            border-radius: 8px;
            color: #8a1111;
            font-size: 14px;
            font-weight: bold;
        }

        .helper-text {
            margin-top: 6px;
            font-size: 12px;
            color: #666;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .save-btn {
            background: #b30000;
            color: white;
        }

        .reset-btn {
            background: #666;
            color: white;
        }

        .end-group-btn {
            background: #8a1111;
            color: white;
        }

        .status-message {
            margin-top: 18px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
        }

        .status-success {
            display: block;
            background: #e8f7e8;
            color: #1b5e20;
            border: 1px solid #b7dfb9;
        }

        .status-error {
            display: block;
            background: #fdeaea;
            color: #b71c1c;
            border: 1px solid #efb7b7;
        }

        .auth-indicator {
            margin-top: 10px;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            background: #f5f5f5;
            border: 1px solid #ddd;
            color: #444;
        }

        @media (max-width: 900px) {
            .form-grid,
            .field-row {
                grid-template-columns: 1fr;
            }

            .serial-wrap {
                flex-direction: column;
                align-items: stretch;
            }
        }
    </style>
</head>
<body>

<header>Donor Database Entry</header>

<div class="container">
    <h3>Donor Information Entry Form</h3>
    <div id="authIndicator" class="auth-indicator">Checking login status...</div>

    <form id="donorForm">
        <div class="form-grid">

            <div class="field-group full-width">
                <label for="entryDate">Date</label>
                <input type="date" id="entryDate" required>
            </div>

            <div class="field-group">
                <label for="serialNumber">1. Serial Number</label>
                <div class="serial-wrap">
                    <span class="serial-prefix">PRC2600-</span>
                    <input type="text" id="serialNumber" placeholder="Enter manual number" required>
                </div>
            </div>

            <div class="field-group">
                <label>2. Donor Type</label>
                <div class="radio-box">
                    <div class="radio-options">
                        <label>
                            <input type="radio" name="donorType" value="Patient Directed">
                            Patient Directed
                        </label>
                        <label>
                            <input type="radio" name="donorType" value="Walk-in">
                            Walk-in
                        </label>
                        <label>
                            <input type="radio" name="donorType" value="MBD">
                            MBD
                        </label>
                    </div>

                    <div id="patientDirectedBox" class="hidden">
                        <input type="text" id="patientDirectedDetails" placeholder="Enter patient directed details">
                    </div>

                    <div id="walkInBox" class="hidden" style="margin-top:10px;">
                        <div class="field-row">
                            <input type="number" id="walkInCount" min="1" placeholder="Number of walk-in donors">
                            <button type="button" id="startWalkInGroupBtn" class="save-btn">Start Walk-in Group</button>
                        </div>
                        <div class="helper-text">
                            Starts one shared Firebase walk-in group for all computers using this system.
                        </div>
                    </div>

                    <div id="mbdBox" class="hidden" style="margin-top:10px;">
                        <div class="field-row">
                            <input type="text" id="mbdDetails" placeholder="Enter MBD site / organization (example: Peoples Park)">
                            <input type="number" id="mbdCount" min="1" placeholder="Number of MBD donors">
                        </div>
                        <div style="margin-top:10px;">
                            <button type="button" id="startMbdGroupBtn" class="save-btn">Start MBD Group</button>
                        </div>
                        <div class="helper-text">
                            Starts one shared Firebase MBD group for all computers using this system.
                        </div>
                    </div>

                    <div id="groupInfoBox" class="group-info hidden"></div>
                </div>
            </div>

            <div class="field-group">
                <label for="surname">3. Surname</label>
                <input type="text" id="surname" required>
            </div>

            <div class="field-group">
                <label for="firstName">4. First Name</label>
                <input type="text" id="firstName" required>
            </div>

            <div class="field-group">
                <label for="middleName">5. Middle</label>
                <input type="text" id="middleName">
            </div>

            <div class="field-group">
                <label>6. Birthday / Age</label>
                <div class="field-row">
                    <input type="date" id="birthday" required>
                    <input type="number" id="age" placeholder="Age" readonly>
                </div>
            </div>

            <div class="field-group">
                <label for="civilStatus">7. Civil Status</label>
                <select id="civilStatus" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                    <option value="Separated">Separated</option>
                    <option value="Divorced">Divorced</option>
                    <option value="Widowed">Widowed</option>
                </select>
            </div>

            <div class="field-group">
                <label for="sex">8. Sex</label>
                <select id="sex" required>
                    <option value="">Select</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="field-group">
                <label for="address">9. Address (House Number, Street, Barangay, Town)</label>
                <input type="text" id="address" required>
            </div>

            <div class="field-group">
                <label for="cityProvince">City / Province</label>
                <input type="text" id="cityProvince" required>
            </div>

            <div class="field-group">
                <label for="occupation">10. Occupation</label>
                <input type="text" id="occupation">
            </div>

            <div class="field-group">
                <label for="contactNumber">11. Contact Number</label>
                <input type="text" id="contactNumber">
            </div>

            <div class="field-group">
                <label for="numberOfDonations">13. Number of Donations</label>
                <input type="number" id="numberOfDonations" min="0" value="0">
            </div>

            <div class="field-group">
                <label for="bloodType">12. Blood Type</label>
                <select id="bloodType" required>
                    <option value="">Select</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="Unknown">Unknown</option>
                </select>
            </div>

            <div class="field-group">
                <label for="bloodBagBrand">14. Blood Bag Used (KARMI / TERUMO)</label>
                <select id="bloodBagBrand" required>
                    <option value="">Select</option>
                    <option value="KARMI">KARMI</option>
                    <option value="TERUMO">TERUMO</option>
                </select>
            </div>

            <div class="field-group">
                <label for="bloodBagType">15. Blood Bag Type</label>
                <select id="bloodBagType" required>
                    <option value="">Select</option>
                    <option value="Single">Single</option>
                    <option value="Double">Double</option>
                    <option value="Triple">Triple</option>
                    <option value="Quadruple">Quadruple</option>
                </select>
            </div>

            <div class="field-group">
                <label for="amount">16. Amount</label>
                <select id="amount" required>
                    <option value="">Select</option>
                    <option value="450 ml">450 ml</option>
                    <option value="QNS">QNS</option>
                    <option value="UB">UB</option>
                </select>
            </div>

            <div class="field-group">
                <label>17. Time Started / Time Ended</label>
                <div class="field-row">
                    <input type="time" id="timeStarted">
                    <input type="time" id="timeEnded">
                </div>
            </div>

            <div class="field-group full-width">
                <label for="remarks">18. Remarks</label>
                <textarea id="remarks" placeholder="Enter remarks here"></textarea>
            </div>

        </div>

        <div class="btn-row">
            <button type="submit" class="save-btn">Save Donor Entry</button>
            <button type="reset" class="reset-btn">Clear Form</button>
            <button type="button" id="endGroupBtn" class="end-group-btn">End Active Group</button>
        </div>

        <div id="statusMessage" class="status-message"></div>
    </form>
</div>

<script>
    // =========================================================
    // REPLACE THIS WITH YOUR REAL EXISTING FIREBASE CONFIG
    // =========================================================
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }

    const db = firebase.firestore();
    const auth = firebase.auth();

    const donorForm = document.getElementById("donorForm");
    const entryDate = document.getElementById("entryDate");
    const birthday = document.getElementById("birthday");
    const age = document.getElementById("age");
    const statusMessage = document.getElementById("statusMessage");
    const authIndicator = document.getElementById("authIndicator");

    const donorTypeRadios = document.querySelectorAll('input[name="donorType"]');
    const patientDirectedBox = document.getElementById("patientDirectedBox");
    const patientDirectedDetails = document.getElementById("patientDirectedDetails");

    const walkInBox = document.getElementById("walkInBox");
    const walkInCount = document.getElementById("walkInCount");
    const startWalkInGroupBtn = document.getElementById("startWalkInGroupBtn");

    const mbdBox = document.getElementById("mbdBox");
    const mbdDetails = document.getElementById("mbdDetails");
    const mbdCount = document.getElementById("mbdCount");
    const startMbdGroupBtn = document.getElementById("startMbdGroupBtn");

    const groupInfoBox = document.getElementById("groupInfoBox");
    const endGroupBtn = document.getElementById("endGroupBtn");

    const ACTIVE_GROUP_COLLECTION = "donorEntryGroups";
    const ACTIVE_GROUP_DOC_ID = "active";

    let currentUser = null;
    let authReady = false;

    function setTodayDate() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, "0");
        const dd = String(today.getDate()).padStart(2, "0");
        entryDate.value = `${yyyy}-${mm}-${dd}`;
    }

    function computeAge() {
        if (!birthday.value) {
            age.value = "";
            return;
        }

        const birthDate = new Date(birthday.value);
        const today = new Date();

        let years = today.getFullYear() - birthDate.getFullYear();
        const monthDiff = today.getMonth() - birthDate.getMonth();

        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birthDate.getDate())) {
            years--;
        }

        age.value = years >= 0 ? years : "";
    }

    function showMessage(message, type) {
        statusMessage.textContent = message;
        statusMessage.className = "status-message";
        statusMessage.classList.add(type === "success" ? "status-success" : "status-error");
    }

    function setAuthIndicator(text, isGood) {
        authIndicator.textContent = text;
        authIndicator.style.background = isGood ? "#e8f7e8" : "#f5f5f5";
        authIndicator.style.borderColor = isGood ? "#b7dfb9" : "#ddd";
        authIndicator.style.color = isGood ? "#1b5e20" : "#444";
    }

    function getSelectedDonorType() {
        const selected = document.querySelector('input[name="donorType"]:checked');
        return selected ? selected.value : "";
    }

    function setSelectedDonorType(value) {
        donorTypeRadios.forEach(radio => {
            radio.checked = radio.value === value;
        });
        updateDonorTypeFields();
    }

    function updateDonorTypeFields() {
        const selected = getSelectedDonorType();

        patientDirectedBox.classList.add("hidden");
        walkInBox.classList.add("hidden");
        mbdBox.classList.add("hidden");

        if (selected === "Patient Directed") {
            patientDirectedBox.classList.remove("hidden");
        }

        if (selected === "Walk-in") {
            walkInBox.classList.remove("hidden");
        }

        if (selected === "MBD") {
            mbdBox.classList.remove("hidden");
        }
    }

    donorTypeRadios.forEach(radio => {
        radio.addEventListener("change", updateDonorTypeFields);
    });

    birthday.addEventListener("change", computeAge);

    async function getActiveGroup() {
        const doc = await db.collection(ACTIVE_GROUP_COLLECTION).doc(ACTIVE_GROUP_DOC_ID).get();
        if (!doc.exists) return null;
        return { id: doc.id, ...doc.data() };
    }

    async function setActiveGroup(groupData) {
        await db.collection(ACTIVE_GROUP_COLLECTION).doc(ACTIVE_GROUP_DOC_ID).set(groupData, { merge: true });
    }

    async function clearActiveGroup() {
        await db.collection(ACTIVE_GROUP_COLLECTION).doc(ACTIVE_GROUP_DOC_ID).delete();
    }

    async function renderActiveGroup() {
        try {
            const activeGroup = await getActiveGroup();

            if (!activeGroup || !activeGroup.remaining || activeGroup.remaining <= 0) {
                groupInfoBox.classList.add("hidden");
                groupInfoBox.textContent = "";
                return;
            }

            let text = "";

            if (activeGroup.donorType === "Walk-in") {
                text = `Active Group: Walk-in | Date: ${activeGroup.entryDate || "-"} | Remaining donors: ${activeGroup.remaining}`;
                setSelectedDonorType("Walk-in");
            } else if (activeGroup.donorType === "MBD") {
                text = `Active Group: MBD - ${activeGroup.organization || ""} | Date: ${activeGroup.entryDate || "-"} | Remaining donors: ${activeGroup.remaining}`;
                setSelectedDonorType("MBD");
                mbdDetails.value = activeGroup.organization || "";
            }

            groupInfoBox.textContent = text;
            groupInfoBox.classList.remove("hidden");
        } catch (error) {
            console.error("Error loading active group:", error);
            showMessage("Failed to load active donor group.", "error");
        }
    }

    async function consumeGroupEntry() {
        const groupRef = db.collection(ACTIVE_GROUP_COLLECTION).doc(ACTIVE_GROUP_DOC_ID);

        await db.runTransaction(async (transaction) => {
            const groupDoc = await transaction.get(groupRef);

            if (!groupDoc.exists) return;

            const groupData = groupDoc.data();
            const currentRemaining = Number(groupData.remaining || 0);
            const newRemaining = currentRemaining - 1;

            if (newRemaining <= 0) {
                transaction.delete(groupRef);
            } else {
                transaction.update(groupRef, {
                    remaining: newRemaining,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
            }
        });
    }

    startWalkInGroupBtn.addEventListener("click", async function() {
        try {
            if (!authReady) {
                showMessage("Authentication is still loading. Please wait a moment.", "error");
                return;
            }

            if (!currentUser) {
                showMessage("You must be logged in first.", "error");
                return;
            }

            const count = parseInt(walkInCount.value || "0");

            if (count <= 0) {
                showMessage("Please enter a valid number of walk-in donors.", "error");
                return;
            }

            await setActiveGroup({
                entryDate: entryDate.value,
                donorType: "Walk-in",
                organization: "",
                remaining: count,
                createdBy: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            setSelectedDonorType("Walk-in");
            await renderActiveGroup();
            showMessage(`Walk-in group started for ${count} donors.`, "success");
        } catch (error) {
            console.error("Error starting walk-in group:", error);
            showMessage("Failed to start walk-in group: " + error.message, "error");
        }
    });

    startMbdGroupBtn.addEventListener("click", async function() {
        try {
            if (!authReady) {
                showMessage("Authentication is still loading. Please wait a moment.", "error");
                return;
            }

            if (!currentUser) {
                showMessage("You must be logged in first.", "error");
                return;
            }

            const organization = mbdDetails.value.trim();
            const count = parseInt(mbdCount.value || "0");

            if (!organization) {
                showMessage("Please enter the MBD site or organization.", "error");
                return;
            }

            if (count <= 0) {
                showMessage("Please enter a valid number of MBD donors.", "error");
                return;
            }

            await setActiveGroup({
                entryDate: entryDate.value,
                donorType: "MBD",
                organization: organization,
                remaining: count,
                createdBy: currentUser.uid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            setSelectedDonorType("MBD");
            await renderActiveGroup();
            showMessage(`MBD group started for ${count} donors under ${organization}.`, "success");
        } catch (error) {
            console.error("Error starting MBD group:", error);
            showMessage("Failed to start MBD group: " + error.message, "error");
        }
    });

    endGroupBtn.addEventListener("click", async function() {
        try {
            if (!authReady) {
                showMessage("Authentication is still loading. Please wait a moment.", "error");
                return;
            }

            if (!currentUser) {
                showMessage("You must be logged in first.", "error");
                return;
            }

            await clearActiveGroup();
            await renderActiveGroup();
            showMessage("Active donor group ended.", "success");
        } catch (error) {
            console.error("Error ending active group:", error);
            showMessage("Failed to end active group: " + error.message, "error");
        }
    });

    donorForm.addEventListener("submit", async function(e) {
        e.preventDefault();

        try {
            if (!authReady) {
                showMessage("Authentication is still loading. Please wait a moment and try again.", "error");
                return;
            }

            if (!currentUser) {
                showMessage("No logged in user detected. Please log in again from your dashboard first.", "error");
                return;
            }

            let donorType = getSelectedDonorType();
            let patientDirectedValue = patientDirectedDetails.value.trim();
            let mbdValue = mbdDetails.value.trim();

            const activeGroup = await getActiveGroup();

            if (activeGroup && activeGroup.remaining > 0 && activeGroup.entryDate === entryDate.value) {
                donorType = activeGroup.donorType;
                if (activeGroup.donorType === "MBD") {
                    mbdValue = activeGroup.organization || "";
                }
            }

            if (!donorType) {
                showMessage("Please select donor type.", "error");
                return;
            }

            if (donorType === "Patient Directed" && !patientDirectedValue) {
                showMessage("Please enter patient directed details.", "error");
                return;
            }

            if (donorType === "MBD" && !mbdValue) {
                showMessage("Please enter MBD site or organization.", "error");
                return;
            }

            const serialManual = document.getElementById("serialNumber").value.trim();
            if (!serialManual) {
                showMessage("Please enter serial number.", "error");
                return;
            }

            const fullSerialNumber = "PRC2600-" + serialManual;

            const donorData = {
                entryDate: entryDate.value,
                serialNumber: fullSerialNumber,

                donorType: donorType,
                patientDirectedDetails: donorType === "Patient Directed" ? patientDirectedValue : "",
                mbdDetails: donorType === "MBD" ? mbdValue : "",

                surname: document.getElementById("surname").value.trim(),
                firstName: document.getElementById("firstName").value.trim(),
                middleName: document.getElementById("middleName").value.trim(),

                birthday: document.getElementById("birthday").value,
                age: parseInt(document.getElementById("age").value || "0"),

                civilStatus: document.getElementById("civilStatus").value,
                sex: document.getElementById("sex").value,

                address: document.getElementById("address").value.trim(),
                cityProvince: document.getElementById("cityProvince").value.trim(),

                occupation: document.getElementById("occupation").value.trim(),
                contactNumber: document.getElementById("contactNumber").value.trim(),

                numberOfDonations: parseInt(document.getElementById("numberOfDonations").value || "0"),
                bloodType: document.getElementById("bloodType").value,

                bloodBagBrand: document.getElementById("bloodBagBrand").value,
                bloodBagType: document.getElementById("bloodBagType").value,
                amount: document.getElementById("amount").value,

                timeStarted: document.getElementById("timeStarted").value,
                timeEnded: document.getElementById("timeEnded").value,
                remarks: document.getElementById("remarks").value.trim(),

                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                createdBy: currentUser.uid
            };

            await db.collection("donorDatabase").add(donorData);

            if (activeGroup && activeGroup.remaining > 0 && activeGroup.entryDate === entryDate.value) {
                await consumeGroupEntry();
            }

            showMessage("Donor record saved successfully.", "success");

            const preservedDate = entryDate.value;

            donorForm.reset();
            entryDate.value = preservedDate;
            age.value = "";

            patientDirectedBox.classList.add("hidden");
            walkInBox.classList.add("hidden");
            mbdBox.classList.add("hidden");

            await renderActiveGroup();
        } catch (error) {
            console.error("Error saving donor record:", error);
            showMessage("Failed to save donor record: " + error.message, "error");
        }
    });

    donorForm.addEventListener("reset", function() {
        setTimeout(async () => {
            setTodayDate();
            age.value = "";
            patientDirectedBox.classList.add("hidden");
            walkInBox.classList.add("hidden");
            mbdBox.classList.add("hidden");
            statusMessage.className = "status-message";
            statusMessage.textContent = "";
            await renderActiveGroup();
        }, 50);
    });

    auth.onAuthStateChanged(async (user) => {
        authReady = true;
        currentUser = user;

        if (user) {
            console.log("Logged in user:", user.uid, user.email);
            setAuthIndicator(`Logged in as: ${user.email || user.uid}`, true);
            await renderActiveGroup();
        } else {
            console.log("No logged in user detected on donor entry page.");
            setAuthIndicator("No logged in user detected on this page.", false);
        }
    });

    setTodayDate();
</script>

</body>
</html>
