<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donor Database Statistics</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f6fa;
}

header{
background:#b30000;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1400px;
margin:20px auto;
padding:10px;
}

.card{
background:white;
border-radius:12px;
padding:12px;
margin-bottom:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.year-header{
background:#8b0000;
color:white;
padding:12px;
cursor:pointer;
border-radius:10px;
}

.month-header{
background:#eef2f6;
padding:10px;
cursor:pointer;
margin-top:6px;
border-radius:8px;
}

.hidden{
display:none;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #222;
padding:6px;
font-size:12px;
text-align:center;
}

.title{
background:#eee;
font-weight:bold;
text-align:left;
}

.btn{
padding:6px 10px;
border:none;
border-radius:6px;
cursor:pointer;
color:white;
font-weight:bold;
}

.blue{background:#1565c0;}
.green{background:#2e7d32;}
.gray{background:#555;}
</style>

</head>
<body>

<header>Donor Database Statistics</header>

<div class="container">

<input type="month" id="monthFilter">
<button class="btn blue" onclick="loadData()">Refresh</button>

<div id="output"></div>

</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain: "galloners-club.firebaseapp.com",
databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId: "galloners-club"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const rtdb = firebase.database();

let donors = [];
let releasing = [];

function getMonthName(m){
return ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][m-1];
}

function getYearMonth(date){
const p = date.split("-");
return {
year:p[0],
month:parseInt(p[1]),
key:p[0]+"-"+p[1]
};
}

/* 🔥 FIXED FUNCTION */
function buildDonorGroups(records){
const grouped = {};
records.forEach(r=>{
if(!r.entryDate)return;
const d = getYearMonth(r.entryDate);

if(!grouped[d.year]) grouped[d.year]={};
if(!grouped[d.year][d.month]){
grouped[d.year][d.month]={records:[]};
}

grouped[d.year][d.month].records.push(r);
});
return grouped;
}

function count(records, field, value){
return records.filter(r=> (r[field]||"").toLowerCase()==value.toLowerCase()).length;
}

function loadData(){
Promise.all([
db.collection("donorDatabase").get(),
rtdb.ref("releasing").once("value")
]).then(([snap, rel])=>{

donors = snap.docs.map(d=>d.data());
releasing = Object.values(rel.val()||{});

render();

});
}

function render(){

const grouped = buildDonorGroups(donors);
let html="";

Object.keys(grouped).sort((a,b)=>b-a).forEach(year=>{

html+=`
<div class="card">
<div class="year-header" onclick="toggle('y${year}')">${year}</div>
<div id="y${year}">
`;

Object.keys(grouped[year]).sort((a,b)=>b-a).forEach(month=>{

const data = grouped[year][month].records;
const key = year+"-"+String(month).padStart(2,"0");

html+=`
<div class="month-header" onclick="toggle('m${year}${month}')">
${getMonthName(month)} (${data.length})
<button class="btn gray" onclick="printMonth('${key}')">Print</button>
</div>

<div id="m${year}${month}">
${sectionOffice(data)}
${sectionSex(data)}
${sectionBlood(data)}
${sectionRequests(key)}
</div>
`;

});

html+=`</div></div>`;
});

document.getElementById("output").innerHTML = html;
}

function toggle(id){
document.getElementById(id).classList.toggle("hidden");
}

/* ---------------- SECTIONS ---------------- */

function sectionOffice(data){
let walk = count(data,"donorType","walk-in");
let pd = count(data,"donorType","patient directed");

return `
<div class="card">
<table>
<tr><th colspan="2" class="title">Office Bleeding</th></tr>
<tr><td>Walk-in</td><td>${walk}</td></tr>
<tr><td>Patient Directed</td><td>${pd}</td></tr>
</table>
</div>
`;
}

function sectionSex(data){
let m = count(data,"sex","male");
let f = count(data,"sex","female");

return `
<div class="card">
<table>
<tr><th colspan="2" class="title">Sex Distribution</th></tr>
<tr><td>Male</td><td>${m}</td></tr>
<tr><td>Female</td><td>${f}</td></tr>
</table>
</div>
`;
}

function sectionBlood(data){
let bt = {};
data.forEach(d=>{
let b=d.bloodType||"";
if(!bt[b])bt[b]=0;
bt[b]++;
});

let rows="";
Object.keys(bt).forEach(k=>{
rows+=`<tr><td>${k}</td><td>${bt[k]}</td></tr>`;
});

return `
<div class="card">
<table>
<tr><th colspan="2" class="title">Blood Type Distribution</th></tr>
${rows}
</table>
</div>
`;
}

function sectionRequests(monthKey){

let map={};

releasing.forEach(r=>{
if(!r.date || !r.date.startsWith(monthKey)) return;

(r.requests||[]).forEach(req=>{
let key = req.bloodType+"-"+req.type;

if(!map[key]) map[key]=0;

if(req.type=="WB"){
map[key]+=Number(req.qty||0);
}else{
map[key]+=Number(req.qty||0);
}
});
});

let rows="";
Object.keys(map).forEach(k=>{
rows+=`<tr><td>${k}</td><td>${map[k]}</td></tr>`;
});

return `
<div class="card">
<table>
<tr><th colspan="2" class="title">Blood Requests</th></tr>
${rows || "<tr><td colspan=2>No Data</td></tr>"}
</table>
</div>
`;
}

/* PRINT */
function printMonth(key){
let data = donors.filter(d=>d.entryDate.startsWith(key));
let w = window.open("");
w.document.write("<h2>"+key+"</h2>");
w.document.write(sectionOffice(data));
w.document.write(sectionSex(data));
w.document.write(sectionBlood(data));
w.print();
}

/* INIT */
firebase.auth().onAuthStateChanged(user=>{
if(user){
let d=new Date();
document.getElementById("monthFilter").value =
d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
loadData();
}
});

</script>

</body>
</html>
