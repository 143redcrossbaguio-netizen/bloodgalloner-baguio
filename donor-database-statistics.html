<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Statistics</title>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        :root{
            --red:#b30000;
            --red-dark:#860000;
            --red-soft:#ffe7e7;
            --bg:#f5f6fa;
            --card:#ffffff;
            --text:#232323;
            --muted:#6b7280;
            --line:#e5e7eb;
            --green:#15803d;
            --shadow:0 10px 25px rgba(0,0,0,0.08);
            --radius:18px;
        }

        html, body{
            margin:0;
            padding:0;
            font-family: Arial, Helvetica, sans-serif;
            background:var(--bg);
            color:var(--text);
        }

        header{
            background:linear-gradient(135deg, var(--red), var(--red-dark));
            color:#fff;
            padding:18px 20px;
            text-align:center;
            box-shadow:0 6px 20px rgba(0,0,0,0.15);
        }

        header h2{
            margin:0;
            font-size:26px;
            letter-spacing:.4px;
        }

        .page{
            width:min(1400px, 96%);
            margin:18px auto 32px;
        }

        .toolbar,
        .summary-wrap,
        .category-wrap,
        .report-wrap{
            background:var(--card);
            border-radius:var(--radius);
            box-shadow:var(--shadow);
            border:1px solid #f0f0f0;
            margin-bottom:18px;
        }

        .toolbar{
            padding:16px;
        }

        .toolbar-grid{
            display:grid;
            grid-template-columns: repeat(6, minmax(120px, 1fr));
            gap:12px;
            align-items:end;
        }

        .field label{
            display:block;
            font-size:13px;
            font-weight:bold;
            color:var(--muted);
            margin-bottom:6px;
        }

        .field select,
        .field input{
            width:100%;
            padding:10px 12px;
            border:1px solid #d7dbe2;
            border-radius:12px;
            font-size:14px;
            background:#fff;
        }

        .toolbar-buttons{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            justify-content:flex-end;
        }

        button{
            border:none;
            border-radius:12px;
            padding:11px 16px;
            font-weight:bold;
            cursor:pointer;
            transition:.18s ease;
            font-size:14px;
        }

        button:hover{
            transform:translateY(-1px);
        }

        .btn-primary{ background:var(--red); color:#fff; }
        .btn-primary:hover{ background:var(--red-dark); }
        .btn-muted{ background:#374151; color:#fff; }
        .btn-green{ background:var(--green); color:#fff; }
        .btn-soft{ background:#f3f4f6; color:#111827; }

        .summary-wrap{
            padding:18px;
        }

        .summary-head{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:14px;
            flex-wrap:wrap;
        }

        .summary-head h3,
        .category-head h3{
            margin:0;
            font-size:20px;
            color:var(--red-dark);
        }

        .summary-grid{
            display:grid;
            grid-template-columns: repeat(5, 1fr);
            gap:14px;
        }

        .summary-card{
            background:linear-gradient(180deg, #fff, #fafafa);
            border:1px solid var(--line);
            border-radius:16px;
            padding:16px;
            min-height:110px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .summary-card .label{
            color:var(--muted);
            font-size:13px;
            font-weight:bold;
            margin-bottom:8px;
        }

        .summary-card .value{
            font-size:30px;
            font-weight:800;
            color:var(--red);
            line-height:1.1;
        }

        .summary-card .sub{
            margin-top:6px;
            font-size:12px;
            color:var(--muted);
        }

        .category-wrap{
            overflow:hidden;
        }

        .category-head{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            padding:16px 18px;
            cursor:pointer;
            background:#fff7f7;
            border-bottom:1px solid var(--line);
        }

        .toggle-badge{
            font-size:12px;
            font-weight:bold;
            background:var(--red-soft);
            color:var(--red-dark);
            border-radius:999px;
            padding:6px 10px;
        }

        .category-body{
            display:none;
            padding:18px;
        }

        .category-body.open{
            display:block;
        }

        .mapping-grid{
            display:grid;
            grid-template-columns: 1.25fr .75fr auto;
            gap:10px;
            margin-bottom:12px;
        }

        .mapping-list{
            border:1px solid var(--line);
            border-radius:14px;
            overflow:hidden;
        }

        .mapping-row{
            display:grid;
            grid-template-columns: 1.25fr .75fr auto;
            gap:10px;
            align-items:center;
            padding:10px 12px;
            border-bottom:1px solid #f1f1f1;
            background:#fff;
        }

        .mapping-row:last-child{
            border-bottom:none;
        }

        .mapping-row .name{
            font-weight:bold;
        }

        .mapping-row .cat{
            color:var(--muted);
        }

        .mapping-row .actions{
            display:flex;
            gap:6px;
            justify-content:flex-end;
        }

        .report-wrap{
            padding:18px;
        }

        .report-head{
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            margin-bottom:16px;
            flex-wrap:wrap;
        }

        .report-head h3{
            margin:0;
            font-size:20px;
            color:var(--red-dark);
        }

        .year-block{
            border:1px solid var(--line);
            border-radius:18px;
            overflow:hidden;
            background:#fff;
            margin-bottom:16px;
        }

        .year-header{
            background:linear-gradient(90deg, #fff0f0, #ffffff);
            padding:16px 18px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            cursor:pointer;
            border-bottom:1px solid var(--line);
        }

        .year-title{
            font-size:20px;
            font-weight:800;
            color:var(--red-dark);
        }

        .year-meta{
            color:var(--muted);
            font-size:13px;
            font-weight:bold;
        }

        .year-content{
            display:none;
            padding:16px;
            background:#fcfcfc;
        }

        .year-content.open{
            display:block;
        }

        .month-block{
            border:1px solid #ececec;
            border-radius:16px;
            overflow:hidden;
            margin-bottom:14px;
            background:#fff;
        }

        .month-header{
            padding:14px 16px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            gap:12px;
            cursor:pointer;
            background:#ffffff;
            border-bottom:1px solid #f2f2f2;
        }

        .month-title{
            font-weight:800;
            color:#111827;
            font-size:17px;
        }

        .month-meta{
            color:var(--muted);
            font-size:12px;
            font-weight:bold;
        }

        .month-content{
            display:none;
            padding:14px;
            background:#fafafa;
        }

        .month-content.open{
            display:block;
        }

        .stats-grid{
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:14px;
        }

        .stat-card{
            background:#fff;
            border:1px solid var(--line);
            border-radius:16px;
            overflow:hidden;
        }

        .stat-card h4{
            margin:0;
            padding:12px 14px;
            background:#fff4f4;
            color:var(--red-dark);
            font-size:15px;
            border-bottom:1px solid var(--line);
        }

        .stat-body{
            padding:12px 14px;
        }

        .mini-list{
            display:grid;
            gap:8px;
        }

        .mini-row{
            display:flex;
            justify-content:space-between;
            gap:14px;
            border-bottom:1px dashed #ececec;
            padding-bottom:6px;
        }

        .mini-row:last-child{
            border-bottom:none;
            padding-bottom:0;
        }

        .mini-row span:first-child{
            color:#374151;
        }

        .mini-row span:last-child{
            font-weight:800;
            color:#111827;
        }

        .empty{
            padding:28px 14px;
            text-align:center;
            color:var(--muted);
            background:#fff;
            border:1px dashed #d1d5db;
            border-radius:16px;
        }

        .loader{
            padding:30px;
            text-align:center;
            color:var(--muted);
            font-weight:bold;
        }

        .footer-note{
            margin-top:12px;
            color:var(--muted);
            font-size:12px;
            text-align:right;
        }

        @media (max-width: 1200px){
            .summary-grid{ grid-template-columns: repeat(3, 1fr); }
            .stats-grid{ grid-template-columns: repeat(2, 1fr); }
            .toolbar-grid{ grid-template-columns: repeat(3, 1fr); }
        }

        @media (max-width: 760px){
            .summary-grid{ grid-template-columns: repeat(2, 1fr); }
            .stats-grid{ grid-template-columns: 1fr; }
            .toolbar-grid{ grid-template-columns: 1fr 1fr; }
            .mapping-grid,
            .mapping-row{ grid-template-columns: 1fr; }
        }

        @media print{
            body{
                background:#fff;
            }
            header, .toolbar, .category-wrap, .footer-note{
                display:none !important;
            }
            .page{
                width:100%;
                margin:0;
            }
            .summary-wrap, .report-wrap, .year-block, .month-block, .stat-card{
                box-shadow:none !important;
                border:1px solid #ccc !important;
            }
            .year-content,
            .month-content{
                display:block !important;
            }
        }
    </style>
</head>
<body>
    <header>
        <h2>Donor Database Statistics</h2>
    </header>

    <div class="page">
        <div class="toolbar">
            <div class="toolbar-grid">
                <div class="field">
                    <label for="filterYear">Year</label>
                    <select id="filterYear">
                        <option value="ALL">All Years</option>
                    </select>
                </div>

                <div class="field">
                    <label for="filterMonth">Month</label>
                    <select id="filterMonth">
                        <option value="ALL">All Months</option>
                    </select>
                </div>

                <div class="field">
                    <label for="searchPartner">Partner / Group Search</label>
                    <input type="text" id="searchPartner" placeholder="Search partner / MBD group">
                </div>

                <div class="field">
                    <label for="viewMode">View Mode</label>
                    <select id="viewMode">
                        <option value="filtered">Selected Filter Only</option>
                        <option value="all">Show All Available</option>
                    </select>
                </div>

                <div class="field">
                    <label>&nbsp;</label>
                    <button class="btn-primary" onclick="reloadStatistics()">Reload Statistics</button>
                </div>

                <div class="field">
                    <label>&nbsp;</label>
                    <div class="toolbar-buttons">
                        <button class="btn-green" onclick="exportCSV()">Export CSV</button>
                        <button class="btn-muted" onclick="printSelectedMonth()">Print Selected</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="summary-wrap">
            <div class="summary-head">
                <h3>Summary</h3>
                <div id="summaryFilterLabel" class="toggle-badge">All Data</div>
            </div>
            <div class="summary-grid" id="summaryGrid"></div>
        </div>

        <div class="category-wrap">
            <div class="category-head" onclick="toggleCategoryPanel()">
                <h3>Group Category Entry</h3>
                <div id="categoryToggleBadge" class="toggle-badge">Collapsed</div>
            </div>

            <div class="category-body" id="categoryBody">
                <div class="mapping-grid">
                    <div class="field">
                        <label for="mapPartnerName">Partner / Alias / Group Name</label>
                        <input type="text" id="mapPartnerName" placeholder="Example: DA(DEPARTMENT OF AGRICULTURE)">
                    </div>

                    <div class="field">
                        <label for="mapCategory">Category</label>
                        <select id="mapCategory">
                            <option value="Group">Group</option>
                            <option value="RC143 / BRGY Base">RC143 / BRGY Base</option>
                            <option value="Pledge 25">Pledge 25</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>&nbsp;</label>
                        <button class="btn-primary" onclick="saveGroupCategory()">Save Mapping</button>
                    </div>
                </div>

                <div class="mapping-list" id="mappingList">
                    <div class="empty">No group category mappings yet.</div>
                </div>
            </div>
        </div>

        <div class="report-wrap">
            <div class="report-head">
                <h3>Year / Month Statistics</h3>
                <div id="reportCount" class="toggle-badge">0 groups</div>
            </div>

            <div id="loadingState" class="loader">Loading statistics...</div>
            <div id="reportContainer"></div>

            <div class="footer-note">
                Blood Requests Received is linked to Realtime Database path <strong>releasing</strong>. WB is counted as 450 cc / 450S.
            </div>
        </div>
    </div>

    <script>
        // =========================================================
        // FIREBASE CONFIG
        // Keep your existing config here.
        // =========================================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            databaseURL: "YOUR_DATABASE_URL",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();
        const rtdb = firebase.database();

        // =========================================================
        // GLOBALS
        // =========================================================
        let donorRecords = [];
        let releasingRecords = [];
        let categoryMappings = [];
        let groupedStatsCache = {};
        let activeFilteredData = [];
        let activeFilterLabel = "All Data";

        const MONTH_NAMES = [
            "January","February","March","April","May","June",
            "July","August","September","October","November","December"
        ];

        // =========================================================
        // AUTH
        // =========================================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                alert("You are not logged in.");
                return;
            }
            await initializePage();
        });

        async function initializePage(){
            try{
                showLoading(true);
                await Promise.all([
                    loadCategoryMappings(),
                    loadDonorDatabase(),
                    loadReleasingData()
                ]);
                populateYearFilter();
                populateMonthFilter();
                renderMappings();
                buildAndRenderStatistics();
                attachFilterEvents();
            }catch(error){
                console.error(error);
                document.getElementById("reportContainer").innerHTML = `
                    <div class="empty">Failed to load statistics: ${escapeHtml(error.message || error)}</div>
                `;
            }finally{
                showLoading(false);
            }
        }

        function attachFilterEvents(){
            document.getElementById("filterYear").onchange = buildAndRenderStatistics;
            document.getElementById("filterMonth").onchange = buildAndRenderStatistics;
            document.getElementById("searchPartner").oninput = buildAndRenderStatistics;
            document.getElementById("viewMode").onchange = buildAndRenderStatistics;
        }

        function showLoading(show){
            document.getElementById("loadingState").style.display = show ? "block" : "none";
        }

        // =========================================================
        // DATA LOADERS
        // =========================================================
        async function loadDonorDatabase(){
            donorRecords = [];
            const snapshot = await db.collection("donorDatabase").get();
            snapshot.forEach(doc => {
                donorRecords.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
        }

        async function loadCategoryMappings(){
            categoryMappings = [];
            const snapshot = await db.collection("donorGroupCategories").get();
            snapshot.forEach(doc => {
                categoryMappings.push({
                    id: doc.id,
                    ...doc.data()
                });
            });
        }

        async function loadReleasingData(){
            const snap = await rtdb.ref("releasing").once("value");
            const raw = snap.val();
            releasingRecords = flattenRealtimeData(raw);
        }

        function flattenRealtimeData(node, path = []){
            const output = [];
            if (node === null || node === undefined) return output;

            if (Array.isArray(node)){
                node.forEach((item, idx) => {
                    output.push(...flattenRealtimeData(item, [...path, idx]));
                });
                return output;
            }

            if (typeof node === "object"){
                const looksLikeRecord = hasAnyKey(node, [
                    "date","entryDate","requestDate","releasedDate","bloodType","component",
                    "product","items","quantity","units","patientName","hospital","facility"
                ]);

                if (looksLikeRecord){
                    output.push({ _path: path.join("/"), ...node });
                }else{
                    Object.keys(node).forEach(key => {
                        output.push(...flattenRealtimeData(node[key], [...path, key]));
                    });
                }
            }

            return output;
        }

        // =========================================================
        // FILTERS
        // =========================================================
        function populateYearFilter(){
            const years = [...new Set(donorRecords
                .map(r => getDateParts(extractDate(r)).year)
                .filter(Boolean)
            )].sort((a,b) => b-a);

            const select = document.getElementById("filterYear");
            select.innerHTML = `<option value="ALL">All Years</option>`;
            years.forEach(year => {
                select.innerHTML += `<option value="${year}">${year}</option>`;
            });
        }

        function populateMonthFilter(){
            const select = document.getElementById("filterMonth");
            select.innerHTML = `<option value="ALL">All Months</option>`;
            MONTH_NAMES.forEach((m, idx) => {
                select.innerHTML += `<option value="${idx+1}">${m}</option>`;
            });
        }

        function getFilteredDonorRecords(){
            const yearVal = document.getElementById("filterYear").value;
            const monthVal = document.getElementById("filterMonth").value;
            const keyword = normalizeText(document.getElementById("searchPartner").value || "");
            const viewMode = document.getElementById("viewMode").value;

            let data = donorRecords.slice();

            if (viewMode === "filtered"){
                if (yearVal !== "ALL"){
                    data = data.filter(r => getDateParts(extractDate(r)).year == Number(yearVal));
                }
                if (monthVal !== "ALL"){
                    data = data.filter(r => getDateParts(extractDate(r)).month == Number(monthVal));
                }
            }

            if (keyword){
                data = data.filter(r => {
                    const partner = normalizeText(getPartnerName(r));
                    const donorType = normalizeText(extractDonorType(r));
                    return partner.includes(keyword) || donorType.includes(keyword);
                });
            }

            return data;
        }

        function getFilteredReleasingRecords(){
            const yearVal = document.getElementById("filterYear").value;
            const monthVal = document.getElementById("filterMonth").value;
            const viewMode = document.getElementById("viewMode").value;

            let data = releasingRecords.slice();

            if (viewMode === "filtered"){
                if (yearVal !== "ALL"){
                    data = data.filter(r => getDateParts(extractReleasingDate(r)).year == Number(yearVal));
                }
                if (monthVal !== "ALL"){
                    data = data.filter(r => getDateParts(extractReleasingDate(r)).month == Number(monthVal));
                }
            }
            return data;
        }

        // =========================================================
        // MAIN BUILD
        // =========================================================
        function buildAndRenderStatistics(){
            activeFilteredData = getFilteredDonorRecords();
            const releasingFiltered = getFilteredReleasingRecords();

            activeFilterLabel = buildFilterLabel();
            document.getElementById("summaryFilterLabel").textContent = activeFilterLabel;

            const grouped = buildDonorGroups(activeFilteredData, releasingFiltered);
            groupedStatsCache = grouped;

            renderSummary(grouped.summary);
            renderReport(grouped.byYearMonth);
        }

        function buildFilterLabel(){
            const yearVal = document.getElementById("filterYear").value;
            const monthVal = document.getElementById("filterMonth").value;
            const viewMode = document.getElementById("viewMode").value;

            if (viewMode === "all") return "All Data";

            if (yearVal === "ALL" && monthVal === "ALL") return "All Years / All Months";
            if (yearVal !== "ALL" && monthVal === "ALL") return `${yearVal}`;
            if (yearVal === "ALL" && monthVal !== "ALL") return `${MONTH_NAMES[Number(monthVal)-1]} (All Years)`;
            return `${MONTH_NAMES[Number(monthVal)-1]} ${yearVal}`;
        }

        // =========================================================
        // IMPORTANT: buildDonorGroups defined here to fix error
        // =========================================================
        function buildDonorGroups(records, releasingFiltered){
            const yearMonthMap = {};
            const summary = createEmptyStats();

            records.forEach(record => {
                const d = extractDate(record);
                const {year, month} = getDateParts(d);
                if (!year || !month) return;

                const ymKey = `${year}-${String(month).padStart(2,"0")}`;

                if (!yearMonthMap[year]) yearMonthMap[year] = {};
                if (!yearMonthMap[year][ymKey]){
                    yearMonthMap[year][ymKey] = createEmptyStats();
                    yearMonthMap[year][ymKey]._meta = { year, month, ymKey };
                }

                applyDonorRecordToStats(yearMonthMap[year][ymKey], record);
                applyDonorRecordToStats(summary, record);
            });

            releasingFiltered.forEach(record => {
                const d = extractReleasingDate(record);
                const {year, month} = getDateParts(d);
                if (!year || !month) return;

                const ymKey = `${year}-${String(month).padStart(2,"0")}`;

                if (!yearMonthMap[year]) yearMonthMap[year] = {};
                if (!yearMonthMap[year][ymKey]){
                    yearMonthMap[year][ymKey] = createEmptyStats();
                    yearMonthMap[year][ymKey]._meta = { year, month, ymKey };
                }

                applyReleasingRecordToStats(yearMonthMap[year][ymKey], record);
                applyReleasingRecordToStats(summary, record);
            });

            const sortedYears = Object.keys(yearMonthMap)
                .map(Number)
                .sort((a,b) => b-a);

            const byYearMonth = sortedYears.map(year => {
                const months = Object.values(yearMonthMap[year]).sort((a,b) => b._meta.month - a._meta.month);
                const totalEntries = months.reduce((sum, m) => sum + (m.totalDonors || 0), 0);
                return {
                    year,
                    totalEntries,
                    months
                };
            });

            return { summary, byYearMonth };
        }

        function createEmptyStats(){
            return {
                totalDonors: 0,
                officeBleeding: {
                    "Walk-in": 0,
                    "Patient Directed": 0,
                    "Other Office": 0
                },
                fieldDonation: {
                    totalMBD: 0,
                    byCategory: {
                        "Group": 0,
                        "RC143 / BRGY Base": 0,
                        "Pledge 25": 0,
                        "Unmapped": 0
                    },
                    byPartner: {}
                },
                bloodTypeDistribution: {},
                componentPreparation: {
                    "450 cc": 0,
                    "PRBC": 0,
                    "FFP": 0,
                    "PC": 0
                },
                bloodRequestsReceived: {
                    "450 cc": 0,
                    "PRBC": 0,
                    "FFP": 0,
                    "PC": 0
                },
                sexDistribution: {
                    Male: 0,
                    Female: 0,
                    Other: 0,
                    Unknown: 0
                },
                donationFrequency: {
                    "First-time donors": 0,
                    "Repeat non-regular": 0,
                    "Repeat regular": 0
                },
                ageGroupDistribution: {
                    "17-24": 0,
                    "25-34": 0,
                    "35-44": 0,
                    "45-54": 0,
                    "55-65": 0,
                    "66+": 0,
                    "Unknown": 0
                }
            };
        }

        function applyDonorRecordToStats(stats, record){
            stats.totalDonors += 1;

            // a. Office Bleeding / b. Field Donation
            const donorType = normalizeDonorType(extractDonorType(record));
            const partnerName = getPartnerName(record);

            if (donorType === "MBD"){
                stats.fieldDonation.totalMBD += 1;
                const category = getMappedGroupCategory(partnerName);
                stats.fieldDonation.byCategory[category] = (stats.fieldDonation.byCategory[category] || 0) + 1;
                const displayPartner = partnerName || "Unspecified MBD Partner";
                stats.fieldDonation.byPartner[displayPartner] = (stats.fieldDonation.byPartner[displayPartner] || 0) + 1;
            }else if (donorType === "Walk-in"){
                stats.officeBleeding["Walk-in"] += 1;
            }else if (donorType === "Patient Directed"){
                stats.officeBleeding["Patient Directed"] += 1;
            }else{
                stats.officeBleeding["Other Office"] += 1;
            }

            // c. Blood Type Distribution
            const bloodType = normalizeBloodType(extractBloodType(record));
            stats.bloodTypeDistribution[bloodType] = (stats.bloodTypeDistribution[bloodType] || 0) + 1;

            // d. Component Preparation
            const bagType = normalizeBagType(extractBagType(record));
            applyBagTypeToComponents(stats.componentPreparation, bagType);

            // f. Sex Distribution
            const sex = normalizeSex(extractSex(record));
            stats.sexDistribution[sex] = (stats.sexDistribution[sex] || 0) + 1;

            // g. Distribution of Donors according to Frequency
            const donorCategory = normalizeDonorCategory(extractDonorCategory(record));
            if (donorCategory === "New"){
                stats.donationFrequency["First-time donors"] += 1;
            }else if (donorCategory === "Lapse"){
                stats.donationFrequency["Repeat non-regular"] += 1;
            }else if (donorCategory === "Repeat"){
                stats.donationFrequency["Repeat regular"] += 1;
            }

            // h. Age Group
            const age = extractAge(record);
            const ageGroup = getAgeGroup(age);
            stats.ageGroupDistribution[ageGroup] = (stats.ageGroupDistribution[ageGroup] || 0) + 1;
        }

        function applyReleasingRecordToStats(stats, record){
            const normalizedItems = extractRequestedComponents(record);
            normalizedItems.forEach(item => {
                const key = normalizeRequestComponent(item.component);
                const qty = Number(item.quantity) || 0;
                if (!qty) return;

                if (key === "450 cc"){
                    stats.bloodRequestsReceived["450 cc"] += qty;
                }else if (key === "PRBC"){
                    stats.bloodRequestsReceived["PRBC"] += qty;
                }else if (key === "FFP"){
                    stats.bloodRequestsReceived["FFP"] += qty;
                }else if (key === "PC"){
                    stats.bloodRequestsReceived["PC"] += qty;
                }
            });
        }

        async function saveGroupCategory(){
            const partner = (document.getElementById("mapPartnerName").value || "").trim();
            const category = document.getElementById("mapCategory").value;

            if (!partner){
                alert("Please enter a partner / group name.");
                return;
            }

            try{
                const normalized = normalizeAliasKey(partner);
                const existing = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === normalized);

                if (existing){
                    await db.collection("donorGroupCategories").doc(existing.id).update({
                        partnerName: partner,
                        category,
                        normalizedKey: normalized,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }else{
                    await db.collection("donorGroupCategories").add({
                        partnerName: partner,
                        category,
                        normalizedKey: normalized,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                document.getElementById("mapPartnerName").value = "";
                await loadCategoryMappings();
                renderMappings();
                buildAndRenderStatistics();
                alert("Group category mapping saved.");
            }catch(error){
                console.error(error);
                alert("Failed to save mapping: " + (error.message || error));
            }
        }

        function getMappedGroupCategory(partnerName){
            const norm = normalizeAliasKey(partnerName || "");
            if (!norm) return "Unmapped";

            const exact = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === norm);
            if (exact) return exact.category || "Unmapped";

            const partial = categoryMappings.find(x => {
                const target = normalizeAliasKey(x.partnerName || x.name || "");
                return target && (target.includes(norm) || norm.includes(target));
            });
            if (partial) return partial.category || "Unmapped";

            return "Unmapped";
        }

        // =========================================================
        // EXTRACTION HELPERS
        // =========================================================
        function extractDate(record){
            const raw = firstNonEmpty([
                record.entryDate,
                record.date,
                record.donationDate,
                record.bleedingDate,
                record.createdAt,
                record.timestamp
            ]);

            return parseFlexibleDate(raw);
        }

        function extractReleasingDate(record){
            const raw = firstNonEmpty([
                record.date,
                record.entryDate,
                record.requestDate,
                record.releasedDate,
                record.createdAt,
                record.timestamp
            ]);
            return parseFlexibleDate(raw);
        }

        function extractDonorType(record){
            return firstNonEmpty([
                record.donorType,
                record.typeOfDonation,
                record.type,
                record.donationType
            ], "Unknown");
        }

        function extractBloodType(record){
            return firstNonEmpty([
                record.bloodType,
                record.aboRh,
                record.blood_group,
                record.group
            ], "Unknown");
        }

        function extractBagType(record){
            return firstNonEmpty([
                record.bagType,
                record.bag,
                record.bagConfiguration,
                record.bagUsed,
                record.collectionBag
            ], "Single");
        }

        function extractSex(record){
            return firstNonEmpty([
                record.sex,
                record.gender
            ], "Unknown");
        }

        function extractDonorCategory(record){
            return firstNonEmpty([
                record.donorCategory,
                record.typeOfDonor,
                record.donorStatus,
                record.frequencyCategory
            ], "Unknown");
        }

        function extractAge(record){
            const direct = firstNonEmpty([record.age], null);
            if (direct !== null && direct !== undefined && direct !== "") return Number(direct);

            const birthDate = firstNonEmpty([
                record.birthDate,
                record.dob,
                record.dateOfBirth
            ], null);

            if (!birthDate) return null;
            const b = parseFlexibleDate(birthDate);
            const d = extractDate(record);
            if (!b || !d) return null;

            let age = d.getFullYear() - b.getFullYear();
            const m = d.getMonth() - b.getMonth();
            if (m < 0 || (m === 0 && d.getDate() < b.getDate())) age--;
            return age >= 0 ? age : null;
        }

        function getPartnerName(record){
            return firstNonEmpty([
                record.groupName,
                record.partnerName,
                record.partnerOrganization,
                record.organization,
                record.company,
                record.office,
                record.school,
                record.barangay,
                record.mbdGroupName,
                record.groupCategoryName
            ], "");
        }

        function extractRequestedComponents(record){
            const items = [];

            if (Array.isArray(record.items)){
                record.items.forEach(item => {
                    items.push({
                        component: firstNonEmpty([item.component, item.product, item.type, item.bloodType], ""),
                        quantity: firstNonEmpty([item.quantity, item.qty, item.units, item.count], 0)
                    });
                });
                return items;
            }

            const comp = firstNonEmpty([
                record.component,
                record.product,
                record.bloodType,
                record.requestedComponent,
                record.requestType
            ], "");

            const qty = firstNonEmpty([
                record.quantity,
                record.qty,
                record.units,
                record.count,
                record.numberOfUnits
            ], 1);

            if (comp){
                items.push({ component: comp, quantity: qty });
            }

            const wbQty = firstNonEmpty([record.WB, record.wb], null);
            const prbcQty = firstNonEmpty([record.PRBC, record.prbc], null);
            const ffpQty = firstNonEmpty([record.FFP, record.ffp], null);
            const pcQty = firstNonEmpty([record.PC, record.pc], null);

            if (wbQty !== null) items.push({ component: "WB", quantity: wbQty });
            if (prbcQty !== null) items.push({ component: "PRBC", quantity: prbcQty });
            if (ffpQty !== null) items.push({ component: "FFP", quantity: ffpQty });
            if (pcQty !== null) items.push({ component: "PC", quantity: pcQty });

            return items;
        }

        // =========================================================
        // NORMALIZERS
        // =========================================================
        function normalizeDonorType(type){
            const t = normalizeText(type);
            if (t.includes("mbd")) return "MBD";
            if (t.includes("walk")) return "Walk-in";
            if (t.includes("patient")) return "Patient Directed";
            return type || "Unknown";
        }

        function normalizeBloodType(type){
            let t = String(type || "").trim().toUpperCase().replace(/\s+/g, "");
            if (!t) return "Unknown";
            if (["A+","A-","B+","B-","AB+","AB-","O+","O-"].includes(t)) return t;
            return "Unknown";
        }

        function normalizeBagType(type){
            const t = normalizeText(type);
            if (t.includes("quad")) return "Quadruple";
            if (t.includes("triple")) return "Triple";
            if (t.includes("double")) return "Double";
            return "Single";
        }

        function normalizeSex(sex){
            const s = normalizeText(sex);
            if (s === "male" || s === "m") return "Male";
            if (s === "female" || s === "f") return "Female";
            if (!s) return "Unknown";
            if (s === "other") return "Other";
            return "Unknown";
        }

        function normalizeDonorCategory(category){
            const c = normalizeText(category);
            if (c.includes("new")) return "New";
            if (c.includes("repeat")) return "Repeat";
            if (c.includes("lapse")) return "Lapse";
            return "Unknown";
        }

        function normalizeRequestComponent(component){
            const c = normalizeText(component).replace(/\s+/g, "");
            if (["wb","wholeblood","450cc","450s","450"].includes(c)) return "450 cc";
            if (c.includes("prbc")) return "PRBC";
            if (c.includes("ffp")) return "FFP";
            if (c === "pc" || c.includes("platelet")) return "PC";
            return "";
        }

        function normalizeAliasKey(value){
            return String(value || "")
                .toUpperCase()
                .replace(/\([^)]*\)/g, " ")
                .replace(/[^A-Z0-9]+/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function normalizeText(value){
            return String(value || "").trim().toLowerCase();
        }

        // =========================================================
        // BUSINESS RULES
        // =========================================================
        function applyBagTypeToComponents(target, bagType){
            if (bagType === "Single"){
                target["450 cc"] += 1;
            }else if (bagType === "Double"){
                target["450 cc"] += 1;
            }else if (bagType === "Triple"){
                target["PRBC"] += 1;
                target["FFP"] += 1;
                target["PC"] += 1;
            }else if (bagType === "Quadruple"){
                target["450 cc"] += 1;
                target["PRBC"] += 1;
                target["FFP"] += 1;
                target["PC"] += 1;
            }else{
                target["450 cc"] += 1;
            }
        }

        function getAgeGroup(age){
            if (age === null || age === undefined || Number.isNaN(Number(age))) return "Unknown";
            const a = Number(age);
            if (a >= 17 && a <= 24) return "17-24";
            if (a >= 25 && a <= 34) return "25-34";
            if (a >= 35 && a <= 44) return "35-44";
            if (a >= 45 && a <= 54) return "45-54";
            if (a >= 55 && a <= 65) return "55-65";
            if (a >= 66) return "66+";
            return "Unknown";
        }

        // =========================================================
        // UTILS
        // =========================================================
        function parseFlexibleDate(raw){
            if (!raw) return null;

            if (raw instanceof Date) return isNaN(raw) ? null : raw;

            if (typeof raw?.toDate === "function"){
                const d = raw.toDate();
                return isNaN(d) ? null : d;
            }

            if (typeof raw === "number"){
                const d = new Date(raw);
                return isNaN(d) ? null : d;
            }

            if (typeof raw === "string"){
                const trimmed = raw.trim();
                if (!trimmed) return null;

                let d = new Date(trimmed);
                if (!isNaN(d)) return d;

                const m1 = trimmed.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
                if (m1){
                    d = new Date(Number(m1[1]), Number(m1[2]) - 1, Number(m1[3]));
                    return isNaN(d) ? null : d;
                }

                const m2 = trimmed.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
                if (m2){
                    d = new Date(Number(m2[3]), Number(m2[1]) - 1, Number(m2[2]));
                    return isNaN(d) ? null : d;
                }
            }

            if (typeof raw === "object" && raw.seconds){
                const d = new Date(raw.seconds * 1000);
                return isNaN(d) ? null : d;
            }

            return null;
        }

        function getDateParts(date){
            if (!date || isNaN(date)) return {year:null, month:null, day:null};
            return {
                year: date.getFullYear(),
                month: date.getMonth() + 1,
                day: date.getDate()
            };
        }

        function firstNonEmpty(values, fallback = ""){
            for (const v of values){
                if (v !== undefined && v !== null && String(v).trim() !== "") return v;
            }
            return fallback;
        }

        function formatNumber(val){
            return Number(val || 0).toLocaleString();
        }

        function sortObjectByBloodType(obj){
            const order = ["A+","A-","B+","B-","AB+","AB-","O+","O-","Unknown"];
            const out = {};
            order.forEach(k => {
                out[k] = obj[k] || 0;
            });
            return out;
        }

        function hasAnyKey(obj, keys){
            return keys.some(k => Object.prototype.hasOwnProperty.call(obj, k));
        }

        function csvEscape(value){
            const str = String(value ?? "");
            if (/[",\n]/.test(str)) return `"${str.replace(/"/g,'""')}"`;
            return str;
        }

        function slugify(text){
            return String(text || "export")
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, "-")
                .replace(/^-+|-+$/g, "") || "export";
        }

        function escapeHtml(str){
            return String(str ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function escapeJs(str){
            return String(str ?? "")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'");
        }
    </script>
</body>
