<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Database Statistics</title>

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#f3f4f6;
}

header{
background:linear-gradient(135deg,#b30000,#8b0000);
color:white;
text-align:center;
padding:18px;
font-size:22px;
font-weight:bold;
}

.container{
max-width:1200px;
margin:20px auto;
padding:15px;
}

/* ===== INLINE MAPPING STYLE ===== */
.mapping-form{
display:flex;
gap:10px;
margin-bottom:15px;
flex-wrap:nowrap;
}

.mapping-form input,
.mapping-form select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

.mapping-form button{
padding:10px 14px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-red{background:#b30000;color:white;}
.btn-blue{background:#2563eb;color:white;}
.btn-gray{background:#444;color:white;}

.mapping-list{
border:1px solid #ddd;
border-radius:10px;
overflow:hidden;
background:white;
}

.mapping-head{
display:grid;
grid-template-columns:2fr 1fr 2fr auto;
padding:10px;
background:#f9fafb;
font-weight:bold;
font-size:13px;
}

.mapping-row{
display:grid;
grid-template-columns:2fr 1fr 2fr auto;
gap:8px;
padding:10px;
border-top:1px solid #eee;
align-items:center;
}

.mapping-row input,
.mapping-row select{
padding:8px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

.mapping-actions{
display:flex;
gap:5px;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<header>Donor Database Statistics</header>

<div class="container">

<!-- ADD NEW -->
<div class="mapping-form">
<input id="mapPartnerName" placeholder="Group Name">
<select id="mapCategory">
<option value="Group">Group</option>
<option value="RC143 / BRGY Base">RC143 / BRGY Base</option>
<option value="Pledge 25">Pledge 25</option>
</select>
<input id="mapPlace" placeholder="Place">
<button class="btn-red" onclick="saveGroupCategory()">ADD</button>
</div>

<!-- LIST -->
<div id="mappingList" class="mapping-list">
<div class="mapping-head">
<div>Group Name</div>
<div>Category</div>
<div>Place</div>
<div>Action</div>
</div>
</div>

</div>

<script>
const firebaseConfig = {
apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
authDomain: "galloners-club.firebaseapp.com",
projectId: "galloners-club"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

let categoryMappings = [];

/* ===== LOAD ===== */
async function loadMappings(){
const snap = await db.collection("donorGroupCategories").get();
categoryMappings = [];
snap.forEach(doc=>{
categoryMappings.push({id:doc.id,...doc.data()});
});
renderMappings();
}

/* ===== ADD ===== */
async function saveGroupCategory(){
const name = document.getElementById("mapPartnerName").value.trim();
const cat = document.getElementById("mapCategory").value;
const place = document.getElementById("mapPlace").value.trim();

if(!name){ alert("Enter group name"); return; }

await db.collection("donorGroupCategories").add({
partnerName:name,
category:cat,
place:place
});

document.getElementById("mapPartnerName").value="";
document.getElementById("mapPlace").value="";

loadMappings();
}

/* ===== INLINE UPDATE ===== */
async function updateMapping(id){
const name = document.getElementById("name_"+id).value;
const cat = document.getElementById("cat_"+id).value;
const place = document.getElementById("place_"+id).value;

await db.collection("donorGroupCategories").doc(id).update({
partnerName:name,
category:cat,
place:place
});

alert("Updated");
}

/* ===== DELETE ===== */
async function deleteMapping(id){
if(!confirm("Delete?")) return;
await db.collection("donorGroupCategories").doc(id).delete();
loadMappings();
}

/* ===== RENDER ===== */
function renderMappings(){
const list = document.getElementById("mappingList");

if(!categoryMappings.length){
list.innerHTML += `<div style="padding:15px;">No Data</div>`;
return;
}

list.innerHTML = `
<div class="mapping-head">
<div>Group Name</div>
<div>Category</div>
<div>Place</div>
<div>Action</div>
</div>
`;

categoryMappings.forEach(m=>{
list.innerHTML += `
<div class="mapping-row">
<input id="name_${m.id}" value="${m.partnerName||""}">
<select id="cat_${m.id}">
<option ${m.category==="Group"?"selected":""}>Group</option>
<option ${m.category==="RC143 / BRGY Base"?"selected":""}>RC143 / BRGY Base</option>
<option ${m.category==="Pledge 25"?"selected":""}>Pledge 25</option>
</select>
<input id="place_${m.id}" value="${m.place||""}">
<div class="mapping-actions">
<button class="btn-blue" onclick="updateMapping('${m.id}')">Save</button>
<button class="btn-gray" onclick="deleteMapping('${m.id}')">Delete</button>
</div>
</div>
`;
});
}

/* INIT */
loadMappings();
</script>

</body>
</html>
