<div class="page">

<script>
// ─── FIREBASE ────────────────────────────────────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain: "galloners-club.firebaseapp.com",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club",
  storageBucket: "galloners-club.firebasestorage.app",
  messagingSenderId: "213049860421",
  appId: "1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId: "G-XYXJH9JNXJ"
};
if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const auth  = firebase.auth();
const fs    = firebase.firestore();
const rtdb  = firebase.database();

// ─── STATE ────────────────────────────────────────────────────────────────────
let donorRecords    = [];
let releasingRecords= [];
let categoryMappings= [];
let groupedCache    = null;
let eventsAttached  = false;
let inlineEditingMappingId = null;
let initializeInFlight = false;
let initializeQueued   = false;
let initializeVersion  = 0;
let domReadyBooted     = false;

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

// ─── BOOT ────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  if (domReadyBooted) return;
  domReadyBooted = true;
  auth.onAuthStateChanged(async () => { await initializePage(); });
  setTimeout(async () => {
    if (!donorRecords.length && !initializeInFlight) await initializePage();
  }, 2500);
});

async function initializePage() {
  if (initializeInFlight) { initializeQueued = true; return; }
  initializeInFlight = true;
  initializeQueued   = false;
  const myVersion = ++initializeVersion;
  try {
    setStatus("Loading statistics...", "info");
    await Promise.allSettled([
      loadDonorDatabase(myVersion),
      loadCategoryMappings(myVersion),
      loadReleasingSafe(myVersion)
    ]);
    if (myVersion !== initializeVersion) return;
    populateFilters();
    attachEventsOnce();
    renderMappings();
    buildStatistics();
    setStatus("Statistics loaded successfully.", "ok");
  } catch(e) {
    console.error(e);
    setStatus("Failed to load statistics: " + (e.message || e), "error");
  } finally {
    initializeInFlight = false;
    if (initializeQueued) { initializeQueued = false; initializePage(); }
  }
}

function setStatus(msg, type) {
  const el = document.getElementById("statusBox");
  el.className = "status " + type;
  el.textContent = msg;
}

// ─── DATA LOAD ────────────────────────────────────────────────────────────────
function isVisible(record) {
  if (!record || typeof record !== "object") return false;
  if (record.isDeleted === true) return false;
  // Check deletedAt — Firestore Timestamp, string, or null
  const deletedAt = record.deletedAt;
  if (deletedAt && deletedAt !== "" && deletedAt !== null) return false;
  const deletedBatchId = String(record.deletedBatchId || "").trim();
  if (deletedBatchId) return false;
  return true;
}

async function loadDonorDatabase(version) {
  const local = [];
  const snap = await fs.collection("donorDatabase").get();
  snap.forEach(doc => {
    const r = { id: doc.id, ...doc.data() };
    if (isVisible(r)) local.push(r);
  });
  if (version === initializeVersion) donorRecords = local;
}

async function loadCategoryMappings(version) {
  const local = [];
  try {
    const snap = await fs.collection("donorGroupCategories").get();
    snap.forEach(doc => local.push({ id: doc.id, ...doc.data() }));
  } catch(e) {}
  if (version === initializeVersion) categoryMappings = local;
}

async function loadReleasingSafe(version) {
  let local = [];
  try {
    const timeout  = new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 6000));
    const req      = rtdb.ref("releasing").once("value");
    const snap     = await Promise.race([req, timeout]);
    local = flattenRealtime(snap.val());
  } catch(e) { local = []; }
  if (version === initializeVersion) releasingRecords = local;
}

function flattenRealtime(node) {
  const out = [];
  walkNode(node, out);
  return out;
}
function walkNode(node, out) {
  if (node == null) return;
  if (Array.isArray(node)) { node.forEach(x => walkNode(x, out)); return; }
  if (typeof node !== "object") return;
  const keys = Object.keys(node).map(k => k.toLowerCase());
  const isRecord = keys.some(k => ["date","requestdate","releaseddate","requests","wb","prbc","ffp","pc","cryo"].includes(k));
  if (isRecord) { out.push(node); return; }
  Object.keys(node).forEach(k => walkNode(node[k], out));
}

function attachEventsOnce() {
  if (eventsAttached) return;
  eventsAttached = true;
  document.getElementById("filterYear").addEventListener("change", buildStatistics);
  document.getElementById("filterMonth").addEventListener("change", buildStatistics);
  document.getElementById("searchText").addEventListener("input", buildStatistics);
}

// ─── DATE UTILITIES ───────────────────────────────────────────────────────────
// Matches the exact resolution logic used in donor-tracking.html

const MONTH_MAP = {
  jan:"01",january:"01",feb:"02",february:"02",mar:"03",march:"03",
  apr:"04",april:"04",may:"05",jun:"06",june:"06",jul:"07",july:"07",
  aug:"08",august:"08",sep:"09",sept:"09",september:"09",
  oct:"10",october:"10",nov:"11",november:"11",dec:"12",december:"12"
};

function parseDateFromText(text) {
  const s = String(text || "").trim().toLowerCase();
  if (!s) return "";
  const ymd = s.match(/(\d{4})[-_ ](\d{1,2})[-_ ](\d{1,2})/);
  if (ymd) return `${ymd[1]}-${ymd[2].padStart(2,"0")}-${ymd[3].padStart(2,"0")}`;
  const mdy = s.match(/(\d{1,2})[-_ ](\d{1,2})[-_ ](\d{4})/);
  if (mdy) return `${mdy[3]}-${mdy[1].padStart(2,"0")}-${mdy[2].padStart(2,"0")}`;
  const monthYear = s.match(/(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)[\s\-_]*(\d{4})/);
  if (monthYear) {
    const key = Object.keys(MONTH_MAP).find(k => monthYear[1].startsWith(k));
    if (key) return `${monthYear[2]}-${MONTH_MAP[key]}-01`;
  }
  const yearMonth = s.match(/(\d{4})[\s\-_]*(jan(?:uary)?|feb(?:ruary)?|mar(?:ch)?|apr(?:il)?|may|jun(?:e)?|jul(?:y)?|aug(?:ust)?|sep(?:t(?:ember)?)?|oct(?:ober)?|nov(?:ember)?|dec(?:ember)?)/);
  if (yearMonth) {
    const key = Object.keys(MONTH_MAP).find(k => yearMonth[2].startsWith(k));
    if (key) return `${yearMonth[1]}-${MONTH_MAP[key]}-01`;
  }
  return "";
}

function parseDate(raw) {
  if (!raw) return null;
  if (raw instanceof Date) return isNaN(raw) ? null : raw;
  if (typeof raw?.toDate === "function") return raw.toDate();
  if (typeof raw === "object" && raw.seconds) return new Date(raw.seconds * 1000);
  if (typeof raw === "string") {
    const t = raw.trim();
    if (!t) return null;
    if (/^\d{4}-\d{2}-\d{2}$/.test(t)) {
      const [y,m,d] = t.split("-").map(Number);
      return new Date(y, m-1, d);
    }
    if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(t)) {
      const [m,d,yR] = t.split("/");
      let y = Number(yR);
      if (String(yR).length === 2) y = y < 50 ? 2000+y : 1900+y;
      return new Date(y, Number(m)-1, Number(d));
    }
    const fromText = parseDateFromText(t);
    if (fromText) {
      const [y,m,d] = fromText.split("-").map(Number);
      return new Date(y, m-1, d);
    }
    const fb = new Date(t);
    if (!isNaN(fb.getTime())) return fb;
  }
  return null;
}

function toISODate(d) {
  if (!d || isNaN(d)) return "";
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function getDateParts(d) {
  if (!d || isNaN(d)) return { year:null, month:null, day:null };
  return { year:d.getFullYear(), month:d.getMonth()+1, day:d.getDate() };
}

// ─── ENTRY DATE RESOLUTION ────────────────────────────────────────────────────
// Mirrors donor-tracking.html resolveEntryDate() + applyImportedDateCarryForward()
//
// donor-tracking.html resolves in this order:
//   1. record.entryDate / donationDate / date / bleedingDate  (direct field)
//   2. parseDateFromText(importMeta.sourceSheet)
//   3. parseDateFromText(importMeta.sourceFile)
//   4. createdAt
//
// AND it runs a batch carry-forward per (batchId+sourceFile+sourceSheet) group
// sorted by sourceRowNumber so rows with empty dates inherit the previous row's date.

function resolveDirectEntryDate(r) {
  return (
    toISODate(parseDate(r.entryDate))       ||
    toISODate(parseDate(r.donationDate))    ||
    toISODate(parseDate(r.date))            ||
    toISODate(parseDate(r.bleedingDate))    ||
    ""
  );
}

function resolveSourceMonthBase(r) {
  return (
    parseDateFromText(r?.importMeta?.sourceSheet || "") ||
    parseDateFromText(r?.importMeta?.sourceFile  || "") ||
    toISODate(parseDate(r.createdAt))                   ||
    ""
  );
}

function parseDayOnlyDateWithBase(value, baseISO) {
  const raw = String(value ?? "").trim();
  if (!raw || !baseISO || !/^\d{4}-\d{2}-\d{2}$/.test(baseISO)) return "";
  const m = raw.match(/^(\d{1,2})$/);
  if (!m) return "";
  const day = Number(m[1]);
  if (!day || day < 1 || day > 31) return "";
  const [year, month] = baseISO.split("-");
  const candidate = `${year}-${month}-${String(day).padStart(2,"0")}`;
  const d = new Date(candidate + "T00:00:00");
  if (isNaN(d.getTime())) return "";
  if (d.getFullYear() !== Number(year) || d.getMonth()+1 !== Number(month) || d.getDate() !== day) return "";
  return candidate;
}

/**
 * Apply the same carry-forward logic donor-tracking.html uses.
 * Groups records by batchId+sourceFile+sourceSheet, sorts by sourceRowNumber,
 * then cascades the last known date to rows with no explicit date.
 */
function applyCarryForward(records) {
  const groups = {};
  records.forEach(r => {
    const key = [
      r?.importMeta?.batchId      || "",
      r?.importMeta?.sourceFile   || "",
      r?.importMeta?.sourceSheet  || ""
    ].join("|");
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  Object.values(groups).forEach(items => {
    items.sort((a, b) =>
      Number(a?.importMeta?.sourceRowNumber || 0) - Number(b?.importMeta?.sourceRowNumber || 0)
    );
    let lastDate = "";
    items.forEach(r => {
      const explicit = resolveDirectEntryDate(r);
      const base     = resolveSourceMonthBase(r);
      const rawMarker= r.entryDate || r.donationDate || r.date || r.bleedingDate || "";
      const dayOnly  = parseDayOnlyDateWithBase(rawMarker, lastDate || base);

      if (explicit) {
        r._resolvedEntryDate = explicit;
        lastDate = explicit;
      } else if (dayOnly) {
        r._resolvedEntryDate = dayOnly;
        lastDate = dayOnly;
      } else if (lastDate) {
        r._resolvedEntryDate = lastDate;
      } else if (base) {
        r._resolvedEntryDate = base;
        lastDate = base;
      }
    });
  });
}

function getResolvedEntryDate(r) {
  // Use pre-computed value if available (set by applyCarryForward)
  if (r._resolvedEntryDate) return r._resolvedEntryDate;
  return resolveDirectEntryDate(r) || resolveSourceMonthBase(r) || "";
}

// ─── DONOR TYPE RESOLUTION ────────────────────────────────────────────────────
// Mirrors donor-tracking.html getDonorTypes() exactly:
//  - Splits donorType field on comma/pipe/slash
//  - Checks mbdDetails → adds "MBD"
//  - Checks patientDirectedDetails → adds "Patient Directed"
//  - walkInRaw is stored as "Walk-in" donorType or via walkInRaw field

function getDonorTypes(r) {
  const rawType = String(r?.donorType || "").trim();
  const values  = [];
  const seen    = new Set();

  rawType.split(/[,|/]+/).forEach(part => {
    const s = part.trim().toLowerCase().replace(/[-_]+/g," ");
    if (s === "mbd" && !seen.has("MBD")) { seen.add("MBD"); values.push("MBD"); }
    if ((s === "walk in" || s === "walkin" || s === "walk-in") && !seen.has("Walk-in")) { seen.add("Walk-in"); values.push("Walk-in"); }
    if ((s === "patient directed" || s === "patient-directed" || s === "patientdirected") && !seen.has("Patient Directed")) { seen.add("Patient Directed"); values.push("Patient Directed"); }
  });

  // donor-tracking.html also checks these fields directly
  if (String(r?.mbdDetails || "").trim() && !seen.has("MBD")) { seen.add("MBD"); values.push("MBD"); }
  if (String(r?.patientDirectedDetails || "").trim() && !seen.has("Patient Directed")) { seen.add("Patient Directed"); values.push("Patient Directed"); }

  return values;
}

function getPrimaryDonorType(r) {
  const types = getDonorTypes(r);
  if (types.includes("MBD"))               return "MBD";
  if (types.includes("Walk-in"))           return "Walk-in";
  if (types.includes("Patient Directed"))  return "Patient Directed";
  return "";
}

function hasCategorizedType(r) {
  return getDonorTypes(r).length > 0;
}

// ─── FIELD ACCESSORS (exact field names from donor-tracking.html) ─────────────
// donor-tracking.html stores these exact field names in Firestore:
//   surname, firstName, middleName, birthday, age, sex
//   contactNumber, address, cityProvince
//   entryDate, donorType, donorCategory, mbdDetails, patientDirectedDetails
//   walkInRaw, serialNumber, numberOfDonations
//   bloodType, amount, bloodBagBrand, bloodBagType
//   timeStarted, timeEnded, remarks
//   importMeta.{ batchId, sourceFile, sourceSheet, sourceRowNumber }

function getMbdGroup(r) {
  // Primary group name for MBD donors — matches donor-tracking.html getGroupLabel()
  const type = getPrimaryDonorType(r);
  if (type === "MBD")              return String(r.mbdDetails || "").trim().toUpperCase() || "MBD";
  if (type === "Patient Directed") return String(r.patientDirectedDetails || "").trim().toUpperCase() || "PATIENT DIRECTED";
  if (type === "Walk-in")          return "WALK-IN";
  return "";
}

function getAge(r) {
  // donor-tracking.html stores age directly as r.age
  const direct = parseNumericAge(r.age);
  if (direct != null && direct >= 0 && direct <= 120) return direct;
  // Fallback: compute from birthday
  const bday     = parseDate(r.birthday);
  const donation = parseDate(getResolvedEntryDate(r));
  if (!bday || !donation) return null;
  let years = donation.getFullYear() - bday.getFullYear();
  const md = donation.getMonth() - bday.getMonth();
  if (md < 0 || (md === 0 && donation.getDate() < bday.getDate())) years--;
  return (years >= 0 && years <= 120) ? years : null;
}

function parseNumericAge(v) {
  if (v == null || v === "") return null;
  if (typeof v === "number" && isFinite(v)) return v;
  const m = String(v).match(/(\d{1,3})/);
  if (!m) return null;
  const n = Number(m[1]);
  return isFinite(n) ? n : null;
}

// ─── BLOOD TYPE ───────────────────────────────────────────────────────────────
// donor-tracking.html stores normalized blood type in r.bloodType
// e.g., "O+", "A+", "B+", "AB+", "O-", "A-", "B-", "AB-", "UNKNOWN"
// The import page normalizes using normalizeBloodType() before saving.
// We just need to canonicalize what we read.

function normalizeBloodType(v) {
  let s = String(v || "").toUpperCase().trim()
    .replace(/\./g," ").replace(/_/g," ").replace(/\s+/g," ")
    .replace(/TYPE\s*/g,"").replace(/GROUP\s*/g,"").replace(/BLOOD\s*/g,"")
    .replace(/R\/H|RH FACTOR|RH TYPE|RH/g,"")
    .replace(/POSITIVE|\bPOS\b/g,"+").replace(/NEGATIVE|\bNEG\b/g,"-")
    .replace(/PLUS/g,"+").replace(/MINUS/g,"-")
    .replace(/\s+/g,"").trim();
  const map = {
    "AB+":["AB+","ABPOS","AB(+)"],
    "AB-":["AB-","ABNEG","AB(-)"],
    "A+" :["A+","APOS","A(+)"],
    "A-" :["A-","ANEG","A(-)"],
    "B+" :["B+","BPOS","B(+)"],
    "B-" :["B-","BNEG","B(-)"],
    "O+" :["O+","OPOS","O(+)"],
    "O-" :["O-","ONEG","O(-)"],
    "AB" :["AB"],
    "A"  :["A"],
    "B"  :["B"],
    "O"  :["O"]
  };
  for (const [canonical, aliases] of Object.entries(map)) {
    if (aliases.includes(s)) {
      // bare letter → assume positive
      if (!canonical.includes("+") && !canonical.includes("-")) return canonical + "+";
      return canonical;
    }
  }
  if (s === "UNKNOWN" || s === "UNK" || s === "UN" || s === "") return "Unknown";
  return "Unknown";
}

function getBloodType(r) {
  // donor-tracking.html stores bloodType directly
  const bt = normalizeBloodType(r.bloodType || "");
  return bt || "Unknown";
}

// ─── BLOOD BAG TYPE ───────────────────────────────────────────────────────────
// donor-tracking.html stores bloodBagType as "SINGLE","DOUBLE","TRIPLE","QUADRUPLE"
// The import page normalizes these strings before saving.

function normalizeBagCode(v) {
  const s = String(v || "").toUpperCase().trim();
  if (["SINGLE","S","1"].includes(s))    return "S";
  if (["DOUBLE","D","2"].includes(s))    return "D";
  if (["TRIPLE","T","3"].includes(s))    return "T";
  if (["QUADRUPLE","QUAD","Q","4"].includes(s)) return "Q";
  return "";
}

function getBagCode(r) {
  // donor-tracking.html field is bloodBagType
  return normalizeBagCode(r.bloodBagType || r.bloodBagBrand || "");
}

// ─── SEX / DONOR CATEGORY ────────────────────────────────────────────────────
// donor-tracking.html stores sex as "MALE"/"FEMALE" (uppercase)
// donorCategory as "New","Repeat","Lapse"

function normalizeSex(v) {
  const s = String(v || "").toUpperCase().trim();
  if (s === "MALE"   || s === "M") return "Male";
  if (s === "FEMALE" || s === "F") return "Female";
  return "";
}

function normalizeDonorCategory(v) {
  const s = String(v || "").toLowerCase();
  if (s.includes("new"))    return "New";
  if (s.includes("repeat")) return "Repeat";
  if (s.includes("lapse"))  return "Lapse";
  return "";
}

// ─── GROUP MAPPING ────────────────────────────────────────────────────────────
function normalizeAliasKey(value) {
  let s = String(value || "").toUpperCase().trim();
  s = s.replace(/\(.*?\)/g," ").replace(/[_.,/\\]+/g," ")
       .replace(/\s*-\s*\d+\s*$/g," ").replace(/\d+\s*$/g," ")
       .replace(/\bNO\.?\s*\d+\b/g," ").replace(/\b#\s*\d+\b/g," ")
       .replace(/\b(BATCH|TEAM|GROUP)\s*\d+\b/g," ")
       .replace(/\s+/g," ").trim();
  return s;
}

function smartGroupDisplayName(value) { return normalizeAliasKey(value || ""); }

function getBestMapping(partnerName) {
  const norm = normalizeAliasKey(partnerName || "");
  if (!norm) return null;
  const exact = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === norm);
  if (exact) return exact;
  return categoryMappings.find(x => {
    const t = normalizeAliasKey(x.partnerName || x.name || "");
    return t && (t.includes(norm) || norm.includes(t));
  }) || null;
}

// ─── COMPONENT PREP FROM BAG CODE ────────────────────────────────────────────
// donor-tracking.html does NOT store prepared components separately.
// Components are derived from bag type at display time.
// S/D → 1 whole blood (450 cc)
// T   → PRBC + FFP + PC
// Q   → PRBC + FFP + PC + CRYO

function getPreparedComponents(bagCode) {
  if (bagCode === "Q") return { "450 cc":0, "PRBC":1, "FFP":1, "PC":1, "CRYO":1 };
  if (bagCode === "T") return { "450 cc":0, "PRBC":1, "FFP":1, "PC":1, "CRYO":0 };
  if (bagCode === "D") return { "450 cc":1, "PRBC":0, "FFP":0, "PC":0, "CRYO":0 };
  if (bagCode === "S") return { "450 cc":1, "PRBC":0, "FFP":0, "PC":0, "CRYO":0 };
  return { "450 cc":0, "PRBC":0, "FFP":0, "PC":0, "CRYO":0 };
}

function bagCounts(code) { return { S:code==="S"?1:0, D:code==="D"?1:0, T:code==="T"?1:0, Q:code==="Q"?1:0 }; }
function addBags(t, s) { t.S+=s.S; t.D+=s.D; t.T+=s.T; t.Q+=s.Q; }
function sumBagGroup(o) { return (o.S||0)+(o.D||0)+(o.T||0)+(o.Q||0); }
function sumBagCol(s, code) { return Object.values(s.bagTypeBloodType[code]||{}).reduce((a,b)=>a+(b||0),0); }

// ─── STATS FACTORY ───────────────────────────────────────────────────────────
function createBloodTypeCounter() {
  return {"O+":0,"A+":0,"B+":0,"AB+":0,"O-":0,"A-":0,"B-":0,"AB-":0,"Unknown":0};
}

function emptyStats() {
  return {
    totalDonors: 0,
    dailyCounts: {},
    officeBleeding: {
      "Walk-in":         {S:0,D:0,T:0,Q:0},
      "Patient Directed":{S:0,D:0,T:0,Q:0}
    },
    fieldDonation: {
      "Total MBD":        {S:0,D:0,T:0,Q:0},
      "Group":            {S:0,D:0,T:0,Q:0},
      "RC143 / BRGY Base":{S:0,D:0,T:0,Q:0},
      "Pledge 25":        {S:0,D:0,T:0,Q:0},
      "Unmapped":         {S:0,D:0,T:0,Q:0}
    },
    fieldDetails: { group:[], rc143:[], pledge25:[], unmapped:[] },
    bloodType: createBloodTypeCounter(),
    bagTypeBloodType: {
      S: createBloodTypeCounter(),
      D: createBloodTypeCounter(),
      T: createBloodTypeCounter(),
      Q: createBloodTypeCounter()
    },
    components:{ "450 cc":0,"PRBC":0,"FFP":0,"PC":0,"CRYO":0 },
    componentBloodType:{
      "450 cc": createBloodTypeCounter(),
      "PRBC":   createBloodTypeCounter(),
      "FFP":    createBloodTypeCounter(),
      "PC":     createBloodTypeCounter(),
      "CRYO":   createBloodTypeCounter()
    },
    requests:{ "450 cc":0,"PRBC":0,"FFP":0,"PC":0,"CRYO":0 },
    sex:{ "Male":0,"Female":0 },
    frequency:{ "First-time donors":0,"Repeat non-regular":0,"Repeat regular":0,"Total":0 },
    age:{
      "16-17":0,"18-20":0,"21-30":0,"31-40":0,
      "41-50":0,"51-60":0,"60-65":0,"66 & above":0,"Total":0
    },
    agePicture:{
      "Under 18":0,"18-24":0,"25-44":0,"45-64":0,"65 & above":0,"Total donations":0
    },
    youth1625Sex:{ "Male":0,"Female":0,"Total":0 }
  };
}

// ─── APPLY ONE DONOR RECORD ───────────────────────────────────────────────────
function applyDonor(s, r) {
  const entryDateISO  = getResolvedEntryDate(r);
  const donorTypePrim = getPrimaryDonorType(r);
  const mbdGroup      = getMbdGroup(r);
  const mapping       = donorTypePrim === "MBD" ? getBestMapping(mbdGroup) : null;
  const bt            = getBloodType(r);
  const bagCode       = getBagCode(r);
  const bags          = bagCounts(bagCode);
  const hasBag        = !!bagCode;

  // ── Total donors (only categorized entries) ──
  if (hasCategorizedType(r)) {
    s.totalDonors++;
    if (entryDateISO) {
      s.dailyCounts[entryDateISO] = (s.dailyCounts[entryDateISO] || 0) + 1;
    }
  }

  // ── Collection / bag stats ──
  if (hasBag) {
    s.bloodType[bt] = (s.bloodType[bt] || 0) + 1;
    if (s.bagTypeBloodType[bagCode]) {
      s.bagTypeBloodType[bagCode][bt] = (s.bagTypeBloodType[bagCode][bt] || 0) + 1;
    }

    if (donorTypePrim === "MBD") {
      addBags(s.fieldDonation["Total MBD"], bags);
      const category = mapping ? (mapping.category || "Unmapped") : "Unmapped";
      if (!s.fieldDonation[category]) s.fieldDonation[category] = {S:0,D:0,T:0,Q:0};
      addBags(s.fieldDonation[category], bags);

      // Date display — use the formatted entry date (MM/DD/YY)
      const d = parseDate(entryDateISO);
      const dateDisplay = d ? `${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}/${String(d.getFullYear()).slice(-2)}` : "";

      // Use mbdDetails as the group name (uppercase, as stored by import/tracking)
      const displayName = mapping
        ? (mapping.partnerName || mbdGroup || "Unspecified")
        : smartGroupDisplayName(mbdGroup || "Unspecified");
      const displayPlace = mapping && mapping.place ? mapping.place : (r.cityProvince || r.address || "");

      const detail = {
        name: displayName,
        place: displayPlace,
        date: dateDisplay,
        rawDate: entryDateISO,
        totalDonors: 1,
        "450 cc S": bags.S,
        "450 cc D": bags.D,
        "450 cc T": bags.T,
        "450 cc Q": bags.Q
      };
      if      (category === "Group")            s.fieldDetails.group.push(detail);
      else if (category === "RC143 / BRGY Base") s.fieldDetails.rc143.push(detail);
      else if (category === "Pledge 25")         s.fieldDetails.pledge25.push(detail);
      else                                       s.fieldDetails.unmapped.push(detail);

    } else if (donorTypePrim === "Walk-in") {
      addBags(s.officeBleeding["Walk-in"], bags);
    } else if (donorTypePrim === "Patient Directed") {
      addBags(s.officeBleeding["Patient Directed"], bags);
    }

    // ── Component prep ──
    const prep = getPreparedComponents(bagCode);
    Object.entries(prep).forEach(([comp, qty]) => {
      s.components[comp] += qty;
      if (qty > 0) s.componentBloodType[comp][bt] = (s.componentBloodType[comp][bt] || 0) + qty;
    });
  }

  // ── Sex ──
  const sex = normalizeSex(r.sex || "");
  if (sex) s.sex[sex]++;

  // ── Donor category / frequency ──
  // donor-tracking.html stores donorCategory as "New","Repeat","Lapse"
  const cat = normalizeDonorCategory(r.donorCategory || "");
  if      (cat === "New")    s.frequency["First-time donors"]++;
  else if (cat === "Lapse")  s.frequency["Repeat non-regular"]++;
  else if (cat === "Repeat") s.frequency["Repeat regular"]++;
  s.frequency["Total"]++;

  // ── Age ──
  const age = getAge(r);
  const ageGroup = getAgeGroup(age);
  if (ageGroup) { s.age[ageGroup]++; s.age["Total"]++; }
  const agePicGroup = getAgePicGroup(age);
  if (agePicGroup) { s.agePicture[agePicGroup]++; s.agePicture["Total donations"]++; }

  // ── Youth 16-25 ──
  if (age != null && age >= 16 && age <= 25) {
    const sx = normalizeSex(r.sex || "");
    if (sx === "Male")   s.youth1625Sex["Male"]++;
    if (sx === "Female") s.youth1625Sex["Female"]++;
    s.youth1625Sex["Total"]++;
  }
}

function getAgeGroup(age) {
  if (age == null) return null;
  if (age <= 17) return "16-17";
  if (age <= 20) return "18-20";
  if (age <= 30) return "21-30";
  if (age <= 40) return "31-40";
  if (age <= 50) return "41-50";
  if (age <= 60) return "51-60";
  if (age <= 65) return "60-65";
  return "66 & above";
}
function getAgePicGroup(age) {
  if (age == null) return null;
  if (age < 18)  return "Under 18";
  if (age <= 24) return "18-24";
  if (age <= 44) return "25-44";
  if (age <= 64) return "45-64";
  return "65 & above";
}

// ─── RELEASING REQUESTS ───────────────────────────────────────────────────────
function normalizeReqComponent(v) {
  const s = String(v || "").toUpperCase().trim();
  if (["WB","WHOLE BLOOD","450CC","450 CC","450S","450 S"].includes(s)) return "450 cc";
  if (s === "PRBC") return "PRBC";
  if (s === "FFP")  return "FFP";
  if (["PC","PLATELET CONCENTRATE"].includes(s)) return "PC";
  if (s === "CRYO") return "CRYO";
  return "";
}

function applyRequestedOnly(s, r) {
  const items = [];
  if (Array.isArray(r.requests)) r.requests.forEach(x => items.push({ component: x.component||x.product||x.type||"", quantity: x.quantity||x.qty||0 }));
  const panels = [r.requestedPanel, r.requestedBlood, r.bloodRequest, r.request].filter(x => x && typeof x === "object");
  panels.forEach(p => {
    ["WB","wb","PRBC","prbc","FFP","ffp","PC","pc","CRYO","cryo"].forEach(k => {
      if (p[k] != null) items.push({ component: k, quantity: p[k] });
    });
  });
  items.forEach(item => {
    const key = normalizeReqComponent(item.component);
    const qty = Number(item.quantity) || 0;
    if (key && qty) s.requests[key] += qty;
  });
}

// ─── FILTER HELPERS ───────────────────────────────────────────────────────────
function getFilteredDonors() {
  const y = document.getElementById("filterYear").value;
  const m = document.getElementById("filterMonth").value;
  const q = String(document.getElementById("searchText").value || "").trim().toLowerCase();

  return donorRecords.filter(r => {
    if (!isVisible(r)) return false;
    if (!hasCategorizedType(r)) return false;

    const iso  = getResolvedEntryDate(r);
    const d    = parseDate(iso);
    const p    = getDateParts(d);
    if (!p.year) return false;

    if (y !== "ALL" && String(p.year) !== y) return false;
    if (m !== "ALL" && String(p.month) !== m) return false;

    if (q) {
      const hay = [
        r.mbdDetails, r.patientDirectedDetails,
        r.walkInRaw, r.donorType,
        r.surname, r.firstName
      ].join(" ").toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function getFilteredReleasing() {
  const y = document.getElementById("filterYear").value;
  const m = document.getElementById("filterMonth").value;
  return releasingRecords.filter(r => {
    const d = parseDate(r.date || r.requestDate || r.releasedDate || r.entryDate || null);
    const p = getDateParts(d);
    if (y !== "ALL" && String(p.year) !== y) return false;
    if (m !== "ALL" && String(p.month) !== m) return false;
    return true;
  });
}

// ─── BUILD STATISTICS ─────────────────────────────────────────────────────────
function buildStatistics() {
  try {
    // Run carry-forward on the full dataset once per build
    applyCarryForward(donorRecords);

    const donors   = getFilteredDonors();
    const releases = getFilteredReleasing();
    const grouped  = {};

    donors.forEach(r => {
      const iso = getResolvedEntryDate(r);
      const d   = parseDate(iso);
      const p   = getDateParts(d);
      if (!p.year || !p.month) return;
      const y = String(p.year);
      const k = `${p.year}-${String(p.month).padStart(2,"0")}`;
      if (!grouped[y])    grouped[y] = {};
      if (!grouped[y][k]) grouped[y][k] = emptyStats();
      grouped[y][k]._meta = { year: p.year, month: p.month };
      applyDonor(grouped[y][k], r);
    });

    releases.forEach(r => {
      const d = parseDate(r.date || r.requestDate || r.releasedDate || r.entryDate || null);
      const p = getDateParts(d);
      if (!p.year || !p.month) return;
      const y = String(p.year);
      const k = `${p.year}-${String(p.month).padStart(2,"0")}`;
      if (!grouped[y])    grouped[y] = {};
      if (!grouped[y][k]) grouped[y][k] = emptyStats();
      grouped[y][k]._meta = { year: p.year, month: p.month };
      applyRequestedOnly(grouped[y][k], r);
    });

    groupedCache = grouped;
    renderMonthlySummary(grouped);
    renderMonthlySexTable(grouped);
    const q = String(document.getElementById("searchText").value || "").trim();
    if (q) renderSearchGroupReport(grouped, q);
    else   renderReport(grouped);
    setStatus("Statistics loaded successfully.", "ok");
  } catch(e) {
    console.error(e);
    document.getElementById("reportContainer").innerHTML     = `<div class="empty">Failed to build statistics: ${escapeHtml(e.message || String(e))}</div>`;
    document.getElementById("summaryGrid").innerHTML         = `<div class="empty">Failed to build monthly summary.</div>`;
    document.getElementById("sexMonthlyContainer").innerHTML = `<div class="empty">Failed to build male / female monthly table.</div>`;
    setStatus("Failed to build statistics.", "error");
  }
}

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────
function num(v) { return Number(v || 0).toLocaleString(); }
function escapeHtml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}
function escapeJs(s) {
  return String(s ?? "").replace(/\\/g,"\\\\").replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,"\\n");
}
function csvEscape(v) {
  const s = String(v ?? "");
  return (s.includes(",") || s.includes('"') || s.includes("\n")) ? `"${s.replace(/"/g,'""')}"` : s;
}
function sumVals(o) { return Object.values(o).reduce((a,b) => a+(Number(b)||0), 0); }
function sumDetailField(rows, f) { return (rows||[]).reduce((a,b)=>a+(Number(b[f])||0),0); }
function getMonthLabel(meta) { return `${MONTHS[(meta.month||1)-1]} ${meta.year||""}`.trim(); }
function flattenMonths(grouped) {
  const rows = [];
  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(y => {
    Object.keys(grouped[y]).sort((a,b)=>b.localeCompare(a)).forEach(k => rows.push(grouped[y][k]));
  });
  return rows;
}

function combineSmartGroupRows(rows) {
  const map = {};
  (rows||[]).forEach(r => {
    const key = normalizeAliasKey(r.name || "");
    if (!map[key]) map[key] = { name: key||r.name||"", place:"", date:"", "450 cc S":0,"450 cc D":0,"450 cc T":0,"450 cc Q":0, totalDonors:0 };
    map[key]["450 cc S"] += Number(r["450 cc S"]||0);
    map[key]["450 cc D"] += Number(r["450 cc D"]||0);
    map[key]["450 cc T"] += Number(r["450 cc T"]||0);
    map[key]["450 cc Q"] += Number(r["450 cc Q"]||0);
    map[key].totalDonors += Number(r.totalDonors||0);
    if (!map[key].place && r.place) map[key].place = r.place;
    if (!map[key].date  && r.date)  map[key].date  = r.date;
  });
  return Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
}

// ─── DAILY DROPDOWN ───────────────────────────────────────────────────────────
function buildDailyDropdown(monthKey, s) {
  const keys = Object.keys(s.dailyCounts || {}).sort((a,b) => a.localeCompare(b));
  const safeKey = escapeHtml(monthKey);
  const jsKey   = escapeJs(monthKey);

  const inner = keys.length
    ? `<div class="daily-dropdown-list">${keys.map(dayKey => {
        const d     = parseDate(dayKey);
        const label = d ? `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}` : dayKey;
        return `<div class="daily-row"><div class="daily-row-date">${escapeHtml(label)}</div><div class="daily-row-count">${num(s.dailyCounts[dayKey])}</div></div>`;
      }).join("")}</div>`
    : `<div class="daily-empty">No daily donor counts found.</div>`;

  return `
    <div class="daily-dropdown-wrap">
      <button type="button" class="daily-dropdown-btn" onclick="toggleDailyDropdown('${jsKey}')">
        <span>Daily Count of Donors</span>
        <span id="dailyArrow-${safeKey}">▼</span>
      </button>
      <div id="dailyDropdown-${safeKey}" class="daily-dropdown-content">${inner}</div>
    </div>`;
}

// ─── MONTHLY SUMMARY ─────────────────────────────────────────────────────────
function renderMonthlySummary(grouped) {
  const years = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  const el    = document.getElementById("summaryGrid");
  if (!years.length) { el.innerHTML = `<div class="empty">No monthly summary found.</div>`; return; }
  el.innerHTML = years.map((year, yi) => {
    const mKeys = Object.keys(grouped[year]).sort((a,b)=>b.localeCompare(a));
    return `
      <div class="summary-year-block">
        <div class="summary-year-head" onclick="toggleNext(this)">
          <span>${escapeHtml(year)}</span>
          <span>${mKeys.length} month${mKeys.length===1?"":"s"}</span>
        </div>

// ─── SEARCH GROUP REPORT ─────────────────────────────────────────────────────
function aggregateSearchRows(details, query) {
  const q   = String(query || "").trim().toLowerCase();
  const all = [...(details.group||[]),...(details.rc143||[]),...(details.pledge25||[]),...(details.unmapped||[])];
  const map = {};
  all.forEach(row => {
    const name = String(row.name || "").trim();
    if (q && !name.toLowerCase().includes(q)) return;
    const key = `${normalizeAliasKey(name)}__${row.date||""}`;
    if (!map[key]) map[key] = { name, date:row.date||"", rawDate: parseDate(row.rawDate||row.date), totalDonors:0 };
    map[key].totalDonors += Number(row.totalDonors || 0);
  });
  return Object.values(map).sort((a,b) => {
    const at = a.rawDate?.getTime()||0, bt = b.rawDate?.getTime()||0;
    return bt-at || a.name.localeCompare(b.name);
  });
}

// ─── GROUP MAPPING CRUD ───────────────────────────────────────────────────────
async function saveGroupCategory() {
  const partner  = (document.getElementById("mapPartnerName").value || "").trim();
  const category = document.getElementById("mapCategory").value;
  const place    = (document.getElementById("mapPlace").value || "").trim();
  if (!partner) { alert("Please enter a partner / group name."); return; }
  try {
    const normalized = normalizeAliasKey(partner);
    const existing   = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === normalized);
    const payload    = { partnerName: smartGroupDisplayName(partner), category, place, normalizedKey: normalized, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
    if (existing) {
      await fs.collection("donorGroupCategories").doc(existing.id).update(payload);
    } else {
      await fs.collection("donorGroupCategories").add({ ...payload, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
    }
    inlineEditingMappingId = null;
    clearMappingEditor();
    await loadCategoryMappings(initializeVersion);
    renderMappings();
    buildStatistics();
    alert(existing ? "Group category updated." : "Group category saved.");
  } catch(e) { console.error(e); alert("Failed to save: " + (e.message || e)); }
}

async function saveInlineGroupCategory(id) {
  const partner  = (document.getElementById("inlineEditPartnerName").value || "").trim();
  const category = document.getElementById("inlineEditCategory").value;
  const place    = (document.getElementById("inlineEditPlace").value || "").trim();
  if (!partner) { alert("Please enter a partner / group name."); return; }
  try {
    const normalized = normalizeAliasKey(partner);
    await fs.collection("donorGroupCategories").doc(id).update({ partnerName: smartGroupDisplayName(partner), category, place, normalizedKey: normalized, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
    inlineEditingMappingId = null;
    await loadCategoryMappings(initializeVersion);
    renderMappings();
    buildStatistics();
    alert("Group category updated.");
  } catch(e) { console.error(e); alert("Failed to update: " + (e.message || e)); }
}

function clearMappingEditor() {
  document.getElementById("mapPartnerName").value = "";
  document.getElementById("mapCategory").value    = "Group";
  document.getElementById("mapPlace").value       = "";
  inlineEditingMappingId = null;
}
function cancelInlineEdit() { inlineEditingMappingId = null; renderMappings(); }
function fillMappingForEdit(id) { inlineEditingMappingId = id; renderMappings(); }

async function deleteGroupCategory(id) {
  if (!confirm("Delete this mapping?")) return;
  try {
    await fs.collection("donorGroupCategories").doc(id).delete();
    inlineEditingMappingId = null;
    await loadCategoryMappings(initializeVersion);
    renderMappings();
    buildStatistics();
  } catch(e) { console.error(e); alert("Failed to delete: " + (e.message || e)); }
}

function renderMappings() {
  const list = document.getElementById("mappingList");
  if (!categoryMappings.length) { list.innerHTML = `<div class="empty">No group category mappings yet.</div>`; return; }
  const sorted = [...categoryMappings].sort((a,b) => String(a.partnerName||a.name||"").localeCompare(String(b.partnerName||b.name||"")));
  list.innerHTML = sorted.map(item => {
    if (inlineEditingMappingId === item.id) {
      return `
        <div class="mapping-row editing">
          <div class="field"><label>Partner / Alias / Group Name</label>
            <input type="text" id="inlineEditPartnerName" value="${escapeHtml(item.partnerName||item.name||"")}">
          </div>
          <div class="field"><label>Category</label>
            <select id="inlineEditCategory">
              <option value="Group" ${(item.category||"Group")==="Group"?"selected":""}>Group</option>
              <option value="RC143 / BRGY Base" ${item.category==="RC143 / BRGY Base"?"selected":""}>RC143 / BRGY Base</option>
              <option value="Pledge 25" ${item.category==="Pledge 25"?"selected":""}>Pledge 25</option>
            </select>
          </div>
          <div class="field"><label>Place Override</label>
            <input type="text" id="inlineEditPlace" value="${escapeHtml(item.place||"")}">
          </div>
          <div style="display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;">
            <button class="btn-red" onclick="saveInlineGroupCategory('${escapeJs(item.id)}')">Update</button>
            <button class="btn-gray" onclick="cancelInlineEdit()">Cancel</button>
          </div>
        </div>`;
    }
    return `
      <div class="mapping-row">
        <div><strong>${escapeHtml(item.partnerName||item.name||"")}</strong></div>
        <div>${escapeHtml(item.category||"Unmapped")}</div>
        <div>${escapeHtml(item.place||"")}</div>
        <div style="display:flex;gap:6px;justify-content:flex-end;flex-wrap:wrap;">

  }).join("");
}

// ─── FILTER POPULATE ─────────────────────────────────────────────────────────
function populateFilters() {
  const yearEl  = document.getElementById("filterYear");
  const monthEl = document.getElementById("filterMonth");
  const keepY   = yearEl.value  || "ALL";
  const keepM   = monthEl.value || "ALL";

  const years = [...new Set(
    donorRecords
      .map(r => parseDate(getResolvedEntryDate(r)))
      .filter(Boolean)
      .map(d => String(d.getFullYear()))
  )].sort((a,b) => b.localeCompare(a));

  yearEl.innerHTML = `<option value="ALL">All Years</option>` +
    years.map(y => `<option value="${y}">${y}</option>`).join("");
  if ([...yearEl.options].some(o => o.value === keepY)) yearEl.value = keepY;

  monthEl.innerHTML = `<option value="ALL">All Months</option>` +
    MONTHS.map((m,i) => `<option value="${i+1}">${m}</option>`).join("");
  if ([...monthEl.options].some(o => o.value === keepM)) monthEl.value = keepM;
}

      rows.push([
        y, MONTHS[(s._meta.month||1)-1],
        s.officeBleeding["Walk-in"].S, s.officeBleeding["Walk-in"].D,
        s.officeBleeding["Walk-in"].T, s.officeBleeding["Walk-in"].Q,
        s.officeBleeding["Patient Directed"].S, s.officeBleeding["Patient Directed"].D,
        s.officeBleeding["Patient Directed"].T, s.officeBleeding["Patient Directed"].Q,
        s.fieldDonation["Total MBD"].S, s.fieldDonation["Total MBD"].D,
        s.fieldDonation["Total MBD"].T, s.fieldDonation["Total MBD"].Q,
        s.components["450 cc"], s.components["PRBC"],
        s.components["FFP"],    s.components["PC"], s.components["CRYO"],
        s.sex["Male"], s.sex["Female"],
        s.age["16-17"],s.age["18-20"],s.age["21-30"],s.age["31-40"],
        s.age["41-50"],s.age["51-60"],s.age["60-65"],s.age["66 & above"]
      ]);
    });
  });
  const csv  = rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = "donor-database-statistics.csv";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
</script>
