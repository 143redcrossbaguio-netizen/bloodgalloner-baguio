<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Database Statistics</title>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>

    <style>
        * { box-sizing: border-box; }

        :root{
            --red:#b30000;
            --red-dark:#8f0000;
            --red-soft:#fff1f2;
            --bg:#f3f4f6;
            --card:#ffffff;
            --line:#e5e7eb;
            --text:#1f2937;
            --muted:#6b7280;
            --green:#15803d;
            --blue:#2563eb;
            --shadow:0 8px 20px rgba(0,0,0,0.08);
            --radius:16px;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: linear-gradient(135deg, var(--red), var(--red-dark));
            color: white;
            text-align: center;
            padding: 24px 16px;
            font-size: 24px;
            font-weight: bold;
        }

        .page {
            width: min(1500px, 96%);
            margin: 18px auto 30px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 16px;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto auto auto;
            gap: 12px;
            align-items: end;
        }

        .field label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            color: var(--muted);
            font-weight: bold;
        }

        .field select,
        .field input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #d1d5db;
            font-size: 14px;
            background: #fff;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-red { background: var(--red); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-gray { background: #374151; color: white; }

        .status {
            padding: 12px 14px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .info { background: #eff6ff; color: #1d4ed8; }
        .warn { background: #fff7ed; color: #c2410c; }
        .error { background: #fef2f2; color: #b91c1c; }
        .ok { background: #ecfdf5; color: #15803d; }

        .debug-box {
            background: #111827;
            color: #d1fae5;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            max-height: 180px;
            overflow: auto;
            white-space: pre-wrap;
            line-height: 1.5;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
        }

        .summary-box {
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 14px;
            background: #fff;
        }

        .summary-box .label {
            font-size: 13px;
            color: var(--muted);
            font-weight: bold;
            margin-bottom: 8px;
        }

        .summary-box .value {
            font-size: 28px;
            font-weight: 800;
            color: var(--red);
        }

        .section-card {
            overflow: hidden;
            padding: 0;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            padding: 16px;
            cursor: pointer;
            background: #fff;
            border-bottom: 1px solid var(--line);
        }

        .section-head h3 {
            margin: 0;
            color: var(--red-dark);
        }

        .section-badge {
            background: var(--red-soft);
            color: var(--red-dark);
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: bold;
        }

        .section-body {
            display: none;
            padding: 16px;
        }

        .section-body.open {
            display: block;
        }

        .mapping-form {
            display: grid;
            grid-template-columns: 1.4fr .9fr auto;
            gap: 10px;
            margin-bottom: 12px;
        }

        .mapping-list {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
        }

        .mapping-row {
            display: grid;
            grid-template-columns: 1.4fr .9fr auto;
            gap: 10px;
            align-items: center;
            padding: 10px 12px;
            border-bottom: 1px solid #f1f1f1;
            background: #fff;
        }

        .mapping-row:last-child {
            border-bottom: none;
        }

        .mapping-name {
            font-weight: bold;
        }

        .mapping-cat {
            color: var(--muted);
        }

        .mapping-actions {
            display: flex;
            gap: 6px;
            justify-content: flex-end;
        }

        .year-block, .month-block {
            border: 1px solid var(--line);
            border-radius: 14px;
            overflow: hidden;
            margin-bottom: 12px;
            background: #fff;
        }

        .year-head, .month-head {
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }

        .year-head {
            background: var(--red-soft);
            color: var(--red-dark);
        }

        .month-head {
            background: #f9fafb;
        }

        .year-content, .month-content {
            display: none;
            padding: 14px;
        }

        .year-content.open, .month-content.open {
            display: block;
        }

        .stats-table-wrap {
            overflow-x: auto;
        }

        table.stats-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1150px;
        }

        table.stats-table th,
        table.stats-table td {
            border: 1px solid var(--line);
            padding: 10px 12px;
            text-align: center;
            vertical-align: middle;
            font-size: 14px;
        }

        table.stats-table th {
            background: #f8fafc;
            color: #111827;
            font-weight: 700;
        }

        table.stats-table td:first-child,
        table.stats-table th:first-child {
            text-align: left;
            font-weight: bold;
        }

        .subhead {
            background: #fef2f2 !important;
            color: var(--red-dark) !important;
        }

        .empty {
            padding: 20px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed #d1d5db;
            border-radius: 12px;
            background: #fff;
        }

        @media (max-width: 1200px) {
            .toolbar { grid-template-columns: repeat(3, 1fr); }
            .summary-grid { grid-template-columns: repeat(3, 1fr); }
            .mapping-form, .mapping-row { grid-template-columns: 1fr; }
        }

        @media (max-width: 760px) {
            .toolbar, .summary-grid { grid-template-columns: 1fr; }
        }

        @media print {
            .toolbar-card,
            #debugCard,
            #mappingCard,
            .status {
                display: none !important;
            }

            .year-content,
            .month-content,
            .section-body {
                display: block !important;
            }

            body {
                background: white;
            }

            .card, .year-block, .month-block {
                box-shadow: none !important;
            }
        }
    </style>
</head>
<body>
    <header>Donor Database Statistics</header>

    <div class="page">
        <div class="card toolbar-card">
            <div class="toolbar">
                <div class="field">
                    <label for="filterYear">Year</label>
                    <select id="filterYear">
                        <option value="ALL">All Years</option>
                    </select>
                </div>

                <div class="field">
                    <label for="filterMonth">Month</label>
                    <select id="filterMonth">
                        <option value="ALL">All Months</option>
                    </select>
                </div>

                <div class="field">
                    <label for="searchText">Search Partner</label>
                    <input id="searchText" type="text" placeholder="Search group / partner">
                </div>

                <button class="btn-red" onclick="reloadStatistics()">Reload Statistics</button>
                <button class="btn-blue" onclick="window.print()">Print</button>
                <button class="btn-green" onclick="exportCSV()">Export CSV</button>
            </div>
        </div>

        <div id="statusBox" class="status info">Booting page...</div>

        <div id="debugCard" class="card">
            <h3 style="margin-top:0;color:#991b1b;">Debug Log</h3>
            <div id="debugBox" class="debug-box"></div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;color:#991b1b;">Summary</h3>
            <div id="summaryGrid" class="summary-grid"></div>
        </div>

        <div id="mappingCard" class="card section-card">
            <div class="section-head" onclick="toggleSectionBody('mappingBody','mappingBadge')">
                <h3>Group Category Entry</h3>
                <div id="mappingBadge" class="section-badge">Collapsed</div>
            </div>

            <div id="mappingBody" class="section-body">
                <div class="mapping-form">
                    <div class="field">
                        <label for="mapPartnerName">Partner / Alias / Group Name</label>
                        <input type="text" id="mapPartnerName" placeholder="Example: DA(DEPARTMENT OF AGRICULTURE)">
                    </div>

                    <div class="field">
                        <label for="mapCategory">Category</label>
                        <select id="mapCategory">
                            <option value="Group">Group</option>
                            <option value="RC143 / BRGY Base">RC143 / BRGY Base</option>
                            <option value="Pledge 25">Pledge 25</option>
                        </select>
                    </div>

                    <div class="field">
                        <label>&nbsp;</label>
                        <button class="btn-red" onclick="saveGroupCategory()">Save Mapping</button>
                    </div>
                </div>

                <div id="mappingList" class="mapping-list">
                    <div class="empty">No group category mappings yet.</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h3 style="margin-top:0;color:#991b1b;">Year / Month Statistics</h3>
            <div id="reportContainer"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
            authDomain: "galloners-club.firebaseapp.com",
            databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "galloners-club",
            storageBucket: "galloners-club.firebasestorage.app",
            messagingSenderId: "213049860421",
            appId: "1:213049860421:web:4156aaa52b945f48711e2c",
            measurementId: "G-XYXJH9JNXJ"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const fs = firebase.firestore();
        const rtdb = firebase.database();

        let donorRecords = [];
        let releasingRecords = [];
        let categoryMappings = [];
        let attached = false;
        let groupedCache = null;

        const MONTHS = [
            "January","February","March","April","May","June",
            "July","August","September","October","November","December"
        ];

        function debug(msg) {
            console.log(msg);
            const box = document.getElementById("debugBox");
            if (box) {
                box.textContent += `[${new Date().toLocaleTimeString()}] ${msg}\n`;
                box.scrollTop = box.scrollHeight;
            }
        }

        function setStatus(message, type) {
            const el = document.getElementById("statusBox");
            el.className = "status " + type;
            el.textContent = message;
        }

        window.addEventListener("error", function(e) {
            debug("WINDOW ERROR: " + e.message);
            setStatus("JavaScript error: " + e.message, "error");
        });

        window.addEventListener("unhandledrejection", function(e) {
            debug("PROMISE ERROR: " + (e.reason?.message || e.reason || "Unknown"));
            setStatus("Promise error: " + (e.reason?.message || e.reason || "Unknown"), "error");
        });

        document.addEventListener("DOMContentLoaded", function() {
            debug("DOMContentLoaded fired");
            bootPage();
        });

        async function bootPage() {
            try {
                setStatus("Checking Firebase auth...", "info");
                debug("bootPage started");

                let authResolved = false;

                auth.onAuthStateChanged(async function(user) {
                    if (authResolved) return;
                    authResolved = true;

                    if (user) {
                        debug("Auth resolved with user: " + (user.email || user.uid));
                        setStatus("User detected. Loading statistics...", "info");
                        await initializePage();
                    } else {
                        debug("Auth resolved with no user");
                        setStatus("No authenticated user detected. Trying direct load anyway...", "warn");
                        await initializePage();
                    }
                });

                setTimeout(async function() {
                    if (!authResolved) {
                        authResolved = true;
                        debug("Auth timeout fallback triggered");
                        setStatus("Auth took too long. Trying direct load...", "warn");
                        await initializePage();
                    }
                }, 3000);

            } catch (error) {
                debug("bootPage failed: " + (error.message || error));
                setStatus("Boot failed: " + (error.message || error), "error");
            }
        }

        async function initializePage() {
            try {
                debug("initializePage started");

                let donorOk = false;
                let releasingOk = false;
                let mappingOk = false;

                try {
                    setStatus("Loading donorDatabase from Firestore...", "info");
                    debug("Loading donorDatabase...");
                    await loadDonorDatabase();
                    donorOk = true;
                    debug("donorDatabase loaded: " + donorRecords.length + " records");
                } catch (err) {
                    debug("donorDatabase load failed: " + (err.message || err));
                }

                try {
                    setStatus("Loading releasing data from Realtime Database...", "info");
                    debug("Loading releasing...");
                    await loadReleasingSafe();
                    releasingOk = true;
                    debug("releasing loaded: " + releasingRecords.length + " records");
                } catch (err) {
                    debug("releasing load failed: " + (err.message || err));
                }

                try {
                    setStatus("Loading group mappings...", "info");
                    debug("Loading donorGroupCategories...");
                    await loadCategoryMappings();
                    mappingOk = true;
                    debug("group mappings loaded: " + categoryMappings.length + " records");
                } catch (err) {
                    debug("group mappings load failed: " + (err.message || err));
                }

                populateFilters();
                attachEventsOnce();
                renderMappings();
                buildStatistics();

                if (donorOk && releasingOk) {
                    setStatus("Statistics loaded successfully.", "ok");
                } else if (donorOk && !releasingOk) {
                    setStatus("Donor statistics loaded. Requested blood from releasing could not be fully loaded.", "warn");
                } else {
                    setStatus("Failed to load donorDatabase. Check Firestore rules or collection name.", "error");
                }

                if (!mappingOk) {
                    debug("Mapping section fallback: empty mapping list");
                }

                debug("initializePage finished");
            } catch (error) {
                debug("initializePage crashed: " + (error.message || error));
                setStatus("Initialization failed: " + (error.message || error), "error");
            }
        }

        async function loadDonorDatabase() {
            donorRecords = [];
            const snap = await fs.collection("donorDatabase").get();
            snap.forEach(doc => donorRecords.push({ id: doc.id, ...doc.data() }));
        }

        async function loadCategoryMappings() {
            categoryMappings = [];
            const snap = await fs.collection("donorGroupCategories").get();
            snap.forEach(doc => categoryMappings.push({ id: doc.id, ...doc.data() }));
        }

        async function loadReleasingSafe() {
            releasingRecords = [];

            const timeout = new Promise((_, reject) => {
                setTimeout(() => reject(new Error("Realtime Database timeout after 8 seconds")), 8000);
            });

            const req = rtdb.ref("releasing").once("value");
            const snap = await Promise.race([req, timeout]);

            const raw = snap.val();
            releasingRecords = flattenRealtime(raw);
        }

        function flattenRealtime(node) {
            const out = [];
            walkNode(node, out);
            return out;
        }

        function walkNode(node, out) {
            if (node == null) return;

            if (Array.isArray(node)) {
                node.forEach(item => walkNode(item, out));
                return;
            }

            if (typeof node !== "object") return;

            const keys = Object.keys(node).map(k => String(k).toLowerCase());

            const looksRecord =
                keys.includes("date") ||
                keys.includes("requestdate") ||
                keys.includes("releaseddate") ||
                keys.includes("component") ||
                keys.includes("product") ||
                keys.includes("requestedpanel") ||
                keys.includes("requestedblood") ||
                keys.includes("bloodrequest") ||
                keys.includes("request") ||
                keys.includes("requests") ||
                keys.includes("requesttype") ||
                keys.includes("wb") ||
                keys.includes("prbc") ||
                keys.includes("ffp") ||
                keys.includes("pc") ||
                keys.includes("cryo") ||
                keys.includes("wholeblood") ||
                keys.includes("quantity") ||
                keys.includes("qty") ||
                keys.includes("units");

            if (looksRecord) {
                out.push(node);
                return;
            }

            Object.keys(node).forEach(k => walkNode(node[k], out));
        }

        function attachEventsOnce() {
            if (attached) return;
            attached = true;

            document.getElementById("filterYear").addEventListener("change", buildStatistics);
            document.getElementById("filterMonth").addEventListener("change", buildStatistics);
            document.getElementById("searchText").addEventListener("input", buildStatistics);
        }

        function populateFilters() {
            const yearEl = document.getElementById("filterYear");
            const monthEl = document.getElementById("filterMonth");

            const currentYear = yearEl.value || "ALL";
            const currentMonth = monthEl.value || "ALL";

            const years = [...new Set(
                donorRecords.map(r => getDateParts(parseDate(getDonorDate(r))).year).filter(Boolean)
            )].sort((a,b) => b-a);

            yearEl.innerHTML = `<option value="ALL">All Years</option>`;
            years.forEach(y => yearEl.innerHTML += `<option value="${y}">${y}</option>`);
            if ([...yearEl.options].some(o => o.value === currentYear)) yearEl.value = currentYear;

            monthEl.innerHTML = `<option value="ALL">All Months</option>`;
            MONTHS.forEach((m, i) => monthEl.innerHTML += `<option value="${i+1}">${m}</option>`);
            if ([...monthEl.options].some(o => o.value === currentMonth)) monthEl.value = currentMonth;
        }

        function getFilteredDonors() {
            const y = document.getElementById("filterYear").value;
            const m = document.getElementById("filterMonth").value;
            const q = String(document.getElementById("searchText").value || "").trim().toLowerCase();

            return donorRecords.filter(r => {
                const d = parseDate(getDonorDate(r));
                const p = getDateParts(d);
                const partner = String(getPartnerName(r) || "").toLowerCase();
                const donorType = String(getDonorType(r) || "").toLowerCase();

                if (y !== "ALL" && String(p.year) !== y) return false;
                if (m !== "ALL" && String(p.month) !== m) return false;
                if (q && !partner.includes(q) && !donorType.includes(q)) return false;
                return true;
            });
        }

        function getFilteredReleasing() {
            const y = document.getElementById("filterYear").value;
            const m = document.getElementById("filterMonth").value;

            return releasingRecords.filter(r => {
                const d = parseDate(getReleaseDate(r));
                const p = getDateParts(d);
                if (y !== "ALL" && String(p.year) !== y) return false;
                if (m !== "ALL" && String(p.month) !== m) return false;
                return true;
            });
        }

        function buildStatistics() {
            try {
                const donors = getFilteredDonors();
                const releases = getFilteredReleasing();

                debug("Filtered donors: " + donors.length);
                debug("Filtered releases: " + releases.length);

                if (releases.length) {
                    debug("Sample release record: " + JSON.stringify(releases[0], null, 2));
                }

                const grouped = {};
                const summary = emptyStats();

                donors.forEach(r => {
                    const d = parseDate(getDonorDate(r));
                    const p = getDateParts(d);
                    if (!p.year || !p.month) return;

                    const y = String(p.year);
                    const k = `${p.year}-${String(p.month).padStart(2,"0")}`;

                    if (!grouped[y]) grouped[y] = {};
                    if (!grouped[y][k]) grouped[y][k] = emptyStats();
                    grouped[y][k]._meta = { year:p.year, month:p.month };

                    applyDonor(grouped[y][k], r);
                    applyDonor(summary, r);
                });

                releases.forEach(r => {
                    const d = parseDate(getReleaseDate(r));
                    const p = getDateParts(d);
                    if (!p.year || !p.month) return;

                    const y = String(p.year);
                    const k = `${p.year}-${String(p.month).padStart(2,"0")}`;

                    if (!grouped[y]) grouped[y] = {};
                    if (!grouped[y][k]) grouped[y][k] = emptyStats();
                    grouped[y][k]._meta = { year:p.year, month:p.month };

                    applyRequestedOnly(grouped[y][k], r);
                    applyRequestedOnly(summary, r);
                });

                groupedCache = grouped;
                renderSummary(summary);
                renderReport(grouped);

                debug("Statistics render complete");
            } catch (err) {
                debug("buildStatistics error: " + (err.message || err));
                document.getElementById("reportContainer").innerHTML =
                    `<div class="empty">Failed to build statistics: ${escapeHtml(err.message || String(err))}</div>`;
                setStatus("Statistics build failed: " + (err.message || err), "error");
            }
        }

        function emptyStats() {
            return {
                totalDonors: 0,
                officeBleeding: { "Walk-in":0, "Patient Directed":0 },
                fieldDonation: {
                    "Total MBD": 0,
                    "Group": 0,
                    "RC143 / BRGY Base": 0,
                    "Pledge 25": 0,
                    "Unmapped": 0
                },
                bloodType: { "A+":0,"A-":0,"B+":0,"B-":0,"AB+":0,"AB-":0,"O+":0,"O-":0,"Unknown":0 },
                components: { "450 cc":0,"PRBC":0,"FFP":0,"PC":0,"CRYO":0 },
                requests: { "450 cc":0,"PRBC":0,"FFP":0,"PC":0,"CRYO":0 },
                sex: { "Male":0, "Female":0 },
                frequency: {
                    "First-time donors":0,
                    "Repeat non-regular":0,
                    "Repeat regular":0
                },
                age: {
                    "17-24":0,
                    "25-34":0,
                    "35-44":0,
                    "45-54":0,
                    "55-65":0,
                    "66+":0,
                    "Unknown":0
                }
            };
        }

        function applyDonor(s, r) {
            s.totalDonors++;

            const donorType = normalizeDonorType(getDonorType(r));
            const partnerName = getPartnerName(r);

            if (donorType === "MBD") {
                s.fieldDonation["Total MBD"]++;
                const cat = getMappedGroupCategory(partnerName);
                s.fieldDonation[cat] = (s.fieldDonation[cat] || 0) + 1;
            } else if (donorType === "Walk-in") {
                s.officeBleeding["Walk-in"]++;
            } else if (donorType === "Patient Directed") {
                s.officeBleeding["Patient Directed"]++;
            }

            const bt = normalizeBloodType(r.bloodType || r.bloodtype || r.aboRh || r.group || "");
            s.bloodType[bt] = (s.bloodType[bt] || 0) + 1;

            const bag = normalizeBagType(r.bagType || r.bag || r.bagConfiguration || "");
            if (bag === "Single" || bag === "Double") {
                s.components["450 cc"]++;
            } else if (bag === "Triple") {
                s.components["PRBC"]++;
                s.components["FFP"]++;
                s.components["PC"]++;
            } else if (bag === "Quadruple") {
                s.components["450 cc"]++;
                s.components["PRBC"]++;
                s.components["FFP"]++;
                s.components["PC"]++;
            } else {
                s.components["450 cc"]++;
            }

            const sex = normalizeSex(r.sex || r.gender || "");
            if (sex === "Male" || sex === "Female") {
                s.sex[sex] = (s.sex[sex] || 0) + 1;
            }

            const cat = normalizeDonorCategory(r.donorCategory || r.typeOfDonor || r.donorStatus || "");
            if (cat === "New") s.frequency["First-time donors"]++;
            else if (cat === "Lapse") s.frequency["Repeat non-regular"]++;
            else if (cat === "Repeat") s.frequency["Repeat regular"]++;

            const age = getAge(r);
            const ageGroup = getAgeGroup(age);
            s.age[ageGroup] = (s.age[ageGroup] || 0) + 1;
        }

        function applyRequestedOnly(s, r) {
            const items = getRequestedItemsOnly(r);
            if (!items.length) return;

            items.forEach(item => {
                const key = normalizeRequestComponent(item.component);
                const qty = Number(item.quantity) || 0;
                if (!key || !qty) return;
                s.requests[key] = (s.requests[key] || 0) + qty;
            });
        }

        async function saveGroupCategory() {
            const partner = (document.getElementById("mapPartnerName").value || "").trim();
            const category = document.getElementById("mapCategory").value;

            if (!partner) {
                alert("Please enter a partner / group name.");
                return;
            }

            try {
                const normalized = normalizeAliasKey(partner);
                const existing = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === normalized);

                if (existing) {
                    await fs.collection("donorGroupCategories").doc(existing.id).update({
                        partnerName: partner,
                        category,
                        normalizedKey: normalized,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    await fs.collection("donorGroupCategories").add({
                        partnerName: partner,
                        category,
                        normalizedKey: normalized,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                document.getElementById("mapPartnerName").value = "";
                await loadCategoryMappings();
                renderMappings();
                buildStatistics();
                alert("Group category mapping saved.");
            } catch (error) {
                console.error(error);
                alert("Failed to save mapping: " + (error.message || error));
            }
        }

        async function deleteGroupCategory(id) {

            try {
                await fs.collection("donorGroupCategories").doc(id).delete();
                await loadCategoryMappings();

                buildStatistics();
            } catch (error) {
                console.error(error);
                alert("Failed to delete mapping: " + (error.message || error));
            }
        }

        function getMappedGroupCategory(partnerName) {
            const norm = normalizeAliasKey(partnerName || "");
            if (!norm) return "Unmapped";

            const exact = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === norm);
            if (exact) return exact.category || "Unmapped";

            const partial = categoryMappings.find(x => {
                const target = normalizeAliasKey(x.partnerName || x.name || "");
                return target && (target.includes(norm) || norm.includes(target));
            });
            if (partial) return partial.category || "Unmapped";

            return "Unmapped";
        }

            ]];

            Object.keys(groupedCache).sort((a,b)=>b-a).forEach(year => {
                Object.keys(groupedCache[year]).sort((a,b)=>b.localeCompare(a)).forEach(key => {
                    const s = groupedCache[year][key];

        function getDonorDate(r) {
            return r.entryDate || r.date || r.donationDate || r.bleedingDate || r.createdAt || null;
        }

        function getReleaseDate(r) {
            return r.date || r.requestDate || r.releasedDate || r.entryDate || null;
        }

        function getDonorType(r) {
            return r.donorType || r.typeOfDonation || r.type || r.donationType || "";
        }

        function getPartnerName(r) {
            return r.groupName || r.partnerName || r.partnerOrganization || r.organization || r.company || r.office || r.school || r.barangay || "";
        }

        function parseDate(raw) {
            if (!raw) return null;
            if (raw instanceof Date) return isNaN(raw) ? null : raw;
            if (typeof raw?.toDate === "function") return raw.toDate();
            if (typeof raw === "object" && raw.seconds) return new Date(raw.seconds * 1000);
            const d = new Date(raw);
            return isNaN(d) ? null : d;
        }

        function getDateParts(d) {
            if (!d || isNaN(d)) return {year:null, month:null, day:null};
            return { year:d.getFullYear(), month:d.getMonth()+1, day:d.getDate() };
        }

        function normalizeDonorType(v) {
            const s = String(v || "").toLowerCase();
            if (s.includes("mbd")) return "MBD";
            if (s.includes("walk")) return "Walk-in";
            if (s.includes("patient")) return "Patient Directed";
            return "Other";
        }

        function normalizeBloodType(v) {
            const s = String(v || "").toUpperCase().replace(/\s+/g,"");
            return ["A+","A-","B+","B-","AB+","AB-","O+","O-"].includes(s) ? s : "Unknown";
        }

        function normalizeBagType(v) {
            const s = String(v || "").toLowerCase();
            if (s.includes("quad")) return "Quadruple";
            if (s.includes("triple")) return "Triple";
            if (s.includes("double")) return "Double";
            return "Single";
        }

        function normalizeSex(v) {
            const s = String(v || "").toLowerCase();
            if (s === "male" || s === "m") return "Male";
            if (s === "female" || s === "f") return "Female";
            return "";
        }

        function normalizeDonorCategory(v) {
            const s = String(v || "").toLowerCase();
            if (s.includes("new")) return "New";
            if (s.includes("repeat")) return "Repeat";
            if (s.includes("lapse")) return "Lapse";
            return "";
        }

        function normalizeRequestComponent(v) {
            const s = String(v || "").toLowerCase().replace(/\s+/g,"");
            if (["wb","wholeblood","450","450cc","450s"].includes(s)) return "450 cc";
            if (s.includes("prbc")) return "PRBC";
            if (s.includes("ffp")) return "FFP";
            if (s === "pc" || s.includes("platelet")) return "PC";
            if (s.includes("cryo")) return "CRYO";
            return "";
        }

        function normalizeAliasKey(value) {
            return String(value || "")
                .toUpperCase()
                .replace(/\([^)]*\)/g, " ")
                .replace(/[^A-Z0-9]+/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        function getAge(r) {
            const a = Number(r.age);
            if (!isNaN(a) && a > 0) return a;
            return null;
        }

        function getAgeGroup(age) {
            if (age == null) return "Unknown";
            if (age >= 17 && age <= 24) return "17-24";
            if (age >= 25 && age <= 34) return "25-34";
            if (age >= 35 && age <= 44) return "35-44";
            if (age >= 45 && age <= 54) return "45-54";
            if (age >= 55 && age <= 65) return "55-65";
            if (age >= 66) return "66+";
            return "Unknown";
        }

        function sumVals(obj) {
            return Object.values(obj).reduce((a,b)=>a + (Number(b)||0), 0);
        }

        function num(v) {
            return Number(v || 0).toLocaleString();
        }

        function csvEscape(value) {
            const str = String(value ?? "");
            if (/[",\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
            return str;
        }

        function escapeHtml(str) {
            return String(str ?? "")
                .replace(/&/g,"&amp;")
                .replace(/</g,"&lt;")
                .replace(/>/g,"&gt;")
                .replace(/"/g,"&quot;")
                .replace(/'/g,"&#039;");
        }

        function escapeJs(str) {
            return String(str ?? "")
                .replace(/\\/g, "\\\\")
                .replace(/'/g, "\\'");
        }
    </script>
</body>
</html>
