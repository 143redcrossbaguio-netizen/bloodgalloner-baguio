<script>
const firebaseConfig = {
  apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain: "galloners-club.firebaseapp.com",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club",
  storageBucket: "galloners-club.firebasestorage.app",
  messagingSenderId: "213049860421",
  appId: "1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId: "G-XYXJH9JNXJ"
};

if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const fs = firebase.firestore();
const rtdb = firebase.database();

let donorRecords = [];
let releasingRecords = [];
let categoryMappings = [];
let groupedCache = null;
let eventsAttached = false;
let inlineEditingMappingId = null;

let initializeInFlight = false;
let initializeQueued = false;
let initializeVersion = 0;
let domReadyBooted = false;

const MONTHS = [
  "January","February","March","April","May","June",
  "July","August","September","October","November","December"
];

document.addEventListener("DOMContentLoaded", () => {
  if (domReadyBooted) return;
  domReadyBooted = true;

  auth.onAuthStateChanged(async () => {
    await initializePage();
  });

  setTimeout(async () => {
    if (!donorRecords.length && !initializeInFlight) {
      await initializePage();
    }
  }, 2500);
});

async function initializePage(){
  if (initializeInFlight) {
    initializeQueued = true;
    return;
  }

  initializeInFlight = true;
  initializeQueued = false;
  const myVersion = ++initializeVersion;

  try{
    setStatus("Loading statistics...", "info");
    await Promise.allSettled([
      loadDonorDatabase(myVersion),
      loadCategoryMappings(myVersion),
      loadReleasingSafe(myVersion)
    ]);

    if (myVersion !== initializeVersion) return;

    populateFilters();
    attachEventsOnce();
    renderMappings();
    buildStatistics();
    setStatus("Statistics loaded successfully.", "ok");
  }catch(error){
    console.error(error);
    setStatus("Failed to load statistics: " + (error.message || error), "error");
  }finally{
    initializeInFlight = false;
    if (initializeQueued) {
      initializeQueued = false;
      initializePage();
    }
  }
}

function setStatus(message, type){
  const el = document.getElementById("statusBox");
  el.className = "status " + type;
  el.textContent = message;
}

function isVisibleTrackingRecord(record){
  if (!record || typeof record !== "object") return false;

  if (record.isDeleted === true) return false;
  if (record.deleted === true) return false;
  if (record.hidden === true) return false;
  if (record.archived === true) return false;

  const deletedAt = record.deletedAt;
  if (deletedAt && deletedAt !== "" && deletedAt !== null) return false;

  const deletedFrom = String(record.deletedFrom || "").trim();
  if (deletedFrom) return false;

  const deletedBatchId = String(record.deletedBatchId || "").trim();
  if (deletedBatchId) return false;

  const status = String(record.status || "").trim().toLowerCase();
  if (status === "deleted" || status === "inactive" || status === "removed") return false;

  return true;
}

async function loadDonorDatabase(version){
  const localRecords = [];
  const snap = await fs.collection("donorDatabase").get();
  snap.forEach(doc => {
    const record = { id: doc.id, ...doc.data() };
    if (!isVisibleTrackingRecord(record)) return;
    localRecords.push(record);
  });
  if (version === initializeVersion) donorRecords = localRecords;
}

async function loadCategoryMappings(version){
  const localMappings = [];
  try{
    const snap = await fs.collection("donorGroupCategories").get();
    snap.forEach(doc => localMappings.push({ id: doc.id, ...doc.data() }));
  }catch(e){}
  if (version === initializeVersion) categoryMappings = localMappings;
}

async function loadReleasingSafe(version){
  let localReleasing = [];
  try{
    const timeout = new Promise((_, reject) => setTimeout(() => reject(new Error("Realtime Database timeout")), 6000));
    const req = rtdb.ref("releasing").once("value");
    const snap = await Promise.race([req, timeout]);
    const raw = snap.val();
    localReleasing = flattenRealtime(raw);
  }catch(e){
    localReleasing = [];
  }
  if (version === initializeVersion) releasingRecords = localReleasing;
}

function flattenRealtime(node){
  const out = [];
  walkNode(node, out);
  return out;
}

function walkNode(node, out){
  if (node == null) return;
  if (Array.isArray(node)) {
    node.forEach(x => walkNode(x, out));
    return;
  }
  if (typeof node !== "object") return;

  const keys = Object.keys(node).map(k => String(k).toLowerCase());
  const looksRecord =
    keys.includes("date") || keys.includes("requestdate") || keys.includes("releaseddate") ||
    keys.includes("requests") || keys.includes("wb") || keys.includes("prbc") ||
    keys.includes("ffp") || keys.includes("pc") || keys.includes("cryo");

  if (looksRecord) {
    out.push(node);
    return;
  }
  Object.keys(node).forEach(k => walkNode(node[k], out));
}

function attachEventsOnce(){
  if (eventsAttached) return;
  eventsAttached = true;
  document.getElementById("filterYear").addEventListener("change", buildStatistics);
  document.getElementById("filterMonth").addEventListener("change", buildStatistics);
  document.getElementById("searchText").addEventListener("input", buildStatistics);
}

function parseDateFromText(text){
  const value = String(text || "").trim().toLowerCase();
  if (!value) return "";

  const ymd = value.match(/(\d{4})[-_ ](\d{1,2})[-_ ](\d{1,2})/);
  if (ymd) return `${ymd[1]}-${String(ymd[2]).padStart(2,"0")}-${String(ymd[3]).padStart(2,"0")}`;

  const mdy = value.match(/(\d{1,2})[-_ ](\d{1,2})[-_ ](\d{4})/);
  if (mdy) return `${mdy[3]}-${String(mdy[1]).padStart(2,"0")}-${String(mdy[2]).padStart(2,"0")}`;

  const monthMap = {
    jan:"01", january:"01", feb:"02", february:"02", mar:"03", march:"03",
    apr:"04", april:"04", may:"05", jun:"06", june:"06", jul:"07", july:"07",
    aug:"08", august:"08", sep:"09", sept:"09", september:"09",
    oct:"10", october:"10", nov:"11", november:"11", dec:"12", december:"12"
  };

  const monthYear = value.match(/(jan|january|feb|february|mar|march|apr|april|may|jun|june|jul|july|aug|august|sep|sept|september|oct|october|nov|november|dec|december)[\s\-_]*(\d{4})/);
  if (monthYear) return `${monthYear[2]}-${monthMap[monthYear[1]]}-01`;

  const yearMonth = value.match(/(\d{4})[\s\-_]*(jan|january|feb|february|mar|march|apr|april|may|jun|june|jul|july|aug|august|sep|sept|september|oct|october|nov|november|dec|december)/);
  if (yearMonth) return `${yearMonth[1]}-${monthMap[yearMonth[2]]}-01`;

  return "";
}

function parseDate(raw){
  if (!raw) return null;
  if (raw instanceof Date) return isNaN(raw) ? null : raw;
  if (typeof raw?.toDate === "function") return raw.toDate();
  if (typeof raw === "object" && raw.seconds) return new Date(raw.seconds * 1000);

  if (typeof raw === "number") {
    const excelEpoch = new Date(1899, 11, 30);
    const d = new Date(excelEpoch.getTime() + raw * 86400000);
    if (!isNaN(d.getTime())) return d;
  }

  if (typeof raw === "string") {
    const trimmed = raw.trim();
    if (!trimmed) return null;

    if (/^\d{4}-\d{2}-\d{2}$/.test(trimmed)) {
      const [y,m,d] = trimmed.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    if (/^\d{1,2}\/\d{1,2}\/\d{2,4}$/.test(trimmed)) {
      const [m,d,yRaw] = trimmed.split("/");
      let y = Number(yRaw);
      if (String(yRaw).length === 2) y = y < 50 ? 2000 + y : 1900 + y;
      return new Date(y, Number(m) - 1, Number(d));
    }

    if (/^\d{1,2}-\d{1,2}-\d{2,4}$/.test(trimmed)) {
      const [m,d,yRaw] = trimmed.split("-");
      let y = Number(yRaw);
      if (String(yRaw).length === 2) y = y < 50 ? 2000 + y : 1900 + y;
      return new Date(y, Number(m) - 1, Number(d));
    }

    const parsedText = parseDateFromText(trimmed);
    if (parsedText) {
      const [y,m,d] = parsedText.split("-").map(Number);
      return new Date(y, m - 1, d);
    }

    const fallback = new Date(trimmed);
    if (!isNaN(fallback.getTime())) return fallback;
  }

  return null;
}

function getDateParts(d){
  if (!d || isNaN(d)) return { year:null, month:null, day:null };
  return { year:d.getFullYear(), month:d.getMonth() + 1, day:d.getDate() };
}

function parseDateFromImportMeta(r){
  const sheet = r?.importMeta?.sourceSheet || "";
  const file = r?.importMeta?.sourceFile || "";
  return parseDateFromText(sheet) || parseDateFromText(file) || null;
}

function getDonorDate(r){
  return (
    r.entryDate ||
    r.donationDate ||
    r.date ||
    r.bleedingDate ||
    r.collectionDate ||
    r.dateOfDonation ||
    r.donation_date ||
    r.bleedDate ||
    parseDateFromImportMeta(r) ||
    r.createdAt ||
    null
  );
}

function getBirthdayValue(r){
  return (
    r.birthday ||
    r.birthDate ||
    r.birthdate ||
    r.dateOfBirth ||
    r.dob ||
    r.birth_date ||
    null
  );
}

function getAgeValue(r){
  return (
    r.age ??
    r.AGE ??
    r.donorAge ??
    r.ageYears ??
    r.age_years ??
    null
  );
}

function getReleaseDate(r){
  return r.date || r.requestDate || r.releasedDate || r.entryDate || null;
}

function getDonorType(r){
  return r.donorType || r.typeOfDonation || r.type || r.donationType || "";
}

function getPartnerName(r){
  return r.mbdDetails || r.groupName || r.partnerName || r.partnerOrganization || r.organization || r.company || r.office || r.school || r.barangay || "";
}

function getPartnerPlace(r){
  return r.place || r.location || r.address || r.barangay || r.municipality || r.city || r.province || "";
}

function normalizeAliasKey(value){
  let s = String(value || "").toUpperCase().trim();
  s = s.replace(/\(.*?\)/g, " ");
  s = s.replace(/[_.,/\\]+/g, " ");
  s = s.replace(/\s*-\s*\d+\s*$/g, " ");
  s = s.replace(/\d+\s*$/g, " ");
  s = s.replace(/\bNO\.?\s*\d+\b/g, " ");
  s = s.replace(/\b#\s*\d+\b/g, " ");
  s = s.replace(/\b(BATCH|TEAM|GROUP)\s*\d+\b/g, " ");
  s = s.replace(/\s+/g, " ").trim();
  return s;
}

function smartGroupDisplayName(value){
  return normalizeAliasKey(value || "");
}

function getBestMapping(partnerName){
  const norm = normalizeAliasKey(partnerName || "");
  if (!norm) return null;

  const exact = categoryMappings.find(x => normalizeAliasKey(x.partnerName || x.name || "") === norm);
  if (exact) return exact;

  const partial = categoryMappings.find(x => {
    const target = normalizeAliasKey(x.partnerName || x.name || "");
    return target && (target.includes(norm) || norm.includes(target));
  });
  return partial || null;
}

function normalizeDonorType(v){
  const s = String(v || "").toLowerCase();
  if (s.includes("mbd")) return "MBD";
  if (s.includes("walk")) return "Walk-in";
  if (s.includes("patient")) return "Patient Directed";
  return "Other";
}

function normalizeBloodType(v){
  let s = String(v || "").toUpperCase().trim();
  if (!s) return "Unknown";

  s = s.replace(/\./g, " ");
  s = s.replace(/\s+/g, " ");
  s = s.replace(/POSITIVE/g, "POS");
  s = s.replace(/NEGATIVE/g, "NEG");
  s = s.replace(/RH/g, "");
  s = s.replace(/\s+/g, " ").trim();
  s = s.replace("POS", "+").replace("NEG", "-");
  s = s.replace(/\s+/g, "");

  if (s === "O+") return "O+";
  if (s === "A+") return "A+";
  if (s === "B+") return "B+";
  if (s === "AB+") return "AB+";
  if (s === "O-") return "O-";
  if (s === "A-") return "A-";
  if (s === "B-") return "B-";
  if (s === "AB-") return "AB-";

  if (s === "OPOS") return "O+";
  if (s === "APOS") return "A+";
  if (s === "BPOS") return "B+";
  if (s === "ABPOS") return "AB+";
  if (s === "ONEG") return "O-";
  if (s === "ANEG") return "A-";
  if (s === "BNEG") return "B-";
  if (s === "ABNEG") return "AB-";

  if (s.startsWith("O+")) return "O+";
  if (s.startsWith("A+")) return "A+";
  if (s.startsWith("B+")) return "B+";
  if (s.startsWith("AB+")) return "AB+";
  if (s.startsWith("O-")) return "O-";
  if (s.startsWith("A-")) return "A-";
  if (s.startsWith("B-")) return "B-";
  if (s.startsWith("AB-")) return "AB-";

  return "Unknown";
}

function normalizeSex(v){
  const s = String(v || "").toLowerCase();
  if (s === "male" || s === "m") return "Male";
  if (s === "female" || s === "f") return "Female";
  return "";
}

function normalizeDonorCategory(v){
  const s = String(v || "").toLowerCase();
  if (s.includes("new")) return "New";
  if (s.includes("repeat")) return "Repeat";
  if (s.includes("lapse")) return "Lapse";
  return "";
}

function normalizeBagCode(v){
  const s = String(v || "").toLowerCase().trim();
  if (!s) return "S";
  if (s.includes("quad")) return "Q";
  if (s.includes("triple")) return "T";
  if (s.includes("double")) return "D";
  if (s.includes("single")) return "S";
  if (s === "4" || s === "q") return "Q";
  if (s === "3" || s === "t") return "T";
  if (s === "2" || s === "d") return "D";
  if (s === "1" || s === "s") return "S";
  return "S";
}

function bagCodeToColumnObject(code){
  return { S: code === "S" ? 1 : 0, D: code === "D" ? 1 : 0, T: code === "T" ? 1 : 0, Q: code === "Q" ? 1 : 0 };
}

function addBagCounts(target, source){
  target.S += source.S;
  target.D += source.D;
  target.T += source.T;
  target.Q += source.Q;
}

function sumBagGroup(obj){
  return Number(obj.S || 0) + Number(obj.D || 0) + Number(obj.T || 0) + Number(obj.Q || 0);
}

function getPreparedComponentsFromBag(r){
  const code = normalizeBagCode(r.bloodBagType || r.bagType || r.bag || r.bagConfiguration || "");
  if (code === "Q") return { "450 cc":0, "PRBC":1, "FFP":1, "PC":1, "CRYO":1 };
  if (code === "T") return { "450 cc":0, "PRBC":1, "FFP":1, "PC":1, "CRYO":0 };
  if (code === "D") return { "450 cc":1, "PRBC":0, "FFP":0, "PC":0, "CRYO":0 };
  return { "450 cc":1, "PRBC":0, "FFP":0, "PC":0, "CRYO":0 };
}

function createBloodTypeCounter(){

    "Unknown":0
  };
}

function parseNumericAge(value){
  if (value == null || value === "") return null;
  if (typeof value === "number" && isFinite(value)) return value;
  const match = String(value).match(/(\d{1,3})/);
  if (!match) return null;
  const age = Number(match[1]);
  return isFinite(age) ? age : null;
}

function getAge(r){
  const directAge = parseNumericAge(getAgeValue(r));
  if (directAge != null && directAge >= 0 && directAge <= 120) return directAge;

  const birthday = parseDate(getBirthdayValue(r));
  const donation = parseDate(getDonorDate(r));

  if (!birthday || !donation) return null;

  let years = donation.getFullYear() - birthday.getFullYear();
  const m = donation.getMonth() - birthday.getMonth();
  if (m < 0 || (m === 0 && donation.getDate() < birthday.getDate())) years--;
  return (years >= 0 && years <= 120) ? years : null;
}

function getAgeGroup(age){
  if (age == null) return null;
  if (age <= 17) return "16-17";
  if (age <= 20) return "18-20";
  if (age <= 30) return "21-30";
  if (age <= 40) return "31-40";
  if (age <= 50) return "41-50";
  if (age <= 60) return "51-60";
  if (age <= 65) return "60-65";
  return "66 & above";
}

function getAgeGroupPicture(age){
  if (age == null) return null;
  if (age < 18) return "Under 18";
  if (age <= 24) return "18-24";
  if (age <= 44) return "25-44";
  if (age <= 64) return "45-64";
  return "65 & above";
}

function formatDateForDisplay(raw){
  const d = parseDate(raw);
  if (!d || isNaN(d)) return "";
  const mm = String(d.getMonth() + 1).padStart(2, "0");
  const dd = String(d.getDate()).padStart(2, "0");
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

function applyDonor(s, r){
  s.totalDonors++;

  const donorDate = parseDate(getDonorDate(r));
  const donorParts = getDateParts(donorDate);
  if (donorParts.year && donorParts.month && donorParts.day) {
    const dayKey = `${donorParts.year}-${String(donorParts.month).padStart(2, "0")}-${String(donorParts.day).padStart(2, "0")}`;
    s.dailyCounts[dayKey] = (s.dailyCounts[dayKey] || 0) + 1;
  }

  const donorType = normalizeDonorType(getDonorType(r));
  const partnerName = getPartnerName(r);
  const mapping = getBestMapping(partnerName);
  const smartName = mapping ? (mapping.partnerName || partnerName || "Unspecified") : smartGroupDisplayName(partnerName || "Unspecified");
  const smartPlace = mapping && mapping.place ? mapping.place : getPartnerPlace(r);

  const bt = normalizeBloodType(
    r.bloodType ||
    r.bloodtype ||
    r.aboRh ||
    r.group ||
    r.blood_group ||
    r.bloodGroup ||
    ""
  );

  const bagCode = normalizeBagCode(
    r.bloodBagType ||
    r.bagType ||
    r.bag ||
    r.bagConfiguration ||
    ""
  );

  const bagCounts = bagCodeToColumnObject(bagCode);

  s.bloodType[bt] = (s.bloodType[bt] || 0) + 1;
  if (!s.bagTypeBloodType[bagCode]) s.bagTypeBloodType[bagCode] = createBloodTypeCounter();
  s.bagTypeBloodType[bagCode][bt] = (s.bagTypeBloodType[bagCode][bt] || 0) + 1;

  if (donorType === "MBD") {
    addBagCounts(s.fieldDonation["Total MBD"], bagCounts);
    const category = mapping ? (mapping.category || "Unmapped") : "Unmapped";
    if (!s.fieldDonation[category]) s.fieldDonation[category] = { S:0, D:0, T:0, Q:0 };
    addBagCounts(s.fieldDonation[category], bagCounts);

    const detail = {
      name: smartName,
      place: smartPlace || "",
      date: formatDateForDisplay(getDonorDate(r)),
      rawDate: getDonorDate(r),
      totalDonors: 1,
      "450 cc S": bagCounts.S,
      "450 cc D": bagCounts.D,
      "450 cc T": bagCounts.T,
      "450 cc Q": bagCounts.Q
    };

    if (category === "Group") s.fieldDetails.group.push(detail);
    else if (category === "RC143 / BRGY Base") s.fieldDetails.rc143.push(detail);
    else if (category === "Pledge 25") s.fieldDetails.pledge25.push(detail);
    else s.fieldDetails.unmapped.push(detail);
  } else if (donorType === "Walk-in") {
    addBagCounts(s.officeBleeding["Walk-in"], bagCounts);
  } else if (donorType === "Patient Directed") {
    addBagCounts(s.officeBleeding["Patient Directed"], bagCounts);
  }

  const prep = getPreparedComponentsFromBag(r);
  Object.keys(prep).forEach(component => {
    const qty = Number(prep[component] || 0);
    s.components[component] += qty;
    if (qty > 0) s.componentBloodType[component][bt] = (s.componentBloodType[component][bt] || 0) + qty;
  });

  const sex = normalizeSex(r.sex || r.gender || "");
  if (sex === "Male" || sex === "Female") s.sex[sex]++;

  const donorCategory = normalizeDonorCategory(r.donorCategory || r.typeOfDonor || r.donorStatus || "");
  if (donorCategory === "New") s.frequency["First-time donors"]++;
  else if (donorCategory === "Lapse") s.frequency["Repeat non-regular"]++;
  else if (donorCategory === "Repeat") s.frequency["Repeat regular"]++;
  s.frequency["Total"]++;

  const age = getAge(r);
  const ageGroup = getAgeGroup(age);
  if (ageGroup) {
    s.age[ageGroup] = (s.age[ageGroup] || 0) + 1;
    s.age["Total"]++;
  }

  const agePictureGroup = getAgeGroupPicture(age);
  if (agePictureGroup) {
    s.agePicture[agePictureGroup] = (s.agePicture[agePictureGroup] || 0) + 1;
    s.agePicture["Total donations"]++;
  }

  if (age != null && age >= 16 && age <= 25) {
    if (sex === "Male") s.youth1625Sex["Male"]++;
    if (sex === "Female") s.youth1625Sex["Female"]++;
    s.youth1625Sex["Total"]++;
  }
}

function normalizeRequestComponent(v){
  const s = String(v || "").toUpperCase().trim();
  if (s === "WB" || s === "WHOLE BLOOD" || s === "450CC" || s === "450 CC" || s === "450S" || s === "450 S") return "450 cc";
  if (s === "PRBC") return "PRBC";
  if (s === "FFP") return "FFP";
  if (s === "PC" || s === "PLATELET CONCENTRATE") return "PC";
  if (s === "CRYO") return "CRYO";
  return "";
}

function pushPanelItems(items, p){
  if (p.WB != null) items.push({ component:"WB", quantity:p.WB });
  if (p.wb != null) items.push({ component:"WB", quantity:p.wb });
  if (p.PRBC != null) items.push({ component:"PRBC", quantity:p.PRBC });
  if (p.prbc != null) items.push({ component:"PRBC", quantity:p.prbc });
  if (p.FFP != null) items.push({ component:"FFP", quantity:p.FFP });
  if (p.ffp != null) items.push({ component:"FFP", quantity:p.ffp });
  if (p.PC != null) items.push({ component:"PC", quantity:p.PC });
  if (p.pc != null) items.push({ component:"PC", quantity:p.pc });
  if (p.CRYO != null) items.push({ component:"CRYO", quantity:p.CRYO });
  if (p.cryo != null) items.push({ component:"CRYO", quantity:p.cryo });
}

function getRequestedItemsOnly(r){
  const items = [];
  if (Array.isArray(r.requests)) {
    r.requests.forEach(x => {
      items.push({
        component: x.component || x.product || x.type || x.name || "",
        quantity: x.quantity || x.qty || x.units || x.count || x.value || 0
      });
    });
  }
  if (r.requestedPanel && typeof r.requestedPanel === "object") pushPanelItems(items, r.requestedPanel);
  if (r.requestedBlood && typeof r.requestedBlood === "object") pushPanelItems(items, r.requestedBlood);
  if (r.bloodRequest && typeof r.bloodRequest === "object") pushPanelItems(items, r.bloodRequest);
  if (r.request && typeof r.request === "object") pushPanelItems(items, r.request);
  return items;
}

function applyRequestedOnly(s, r){
  const items = getRequestedItemsOnly(r);
  items.forEach(item => {
    const key = normalizeRequestComponent(item.component);
    const qty = Number(item.quantity) || 0;
    if (!key || !qty) return;
    s.requests[key] += qty;
  });
}

function getFilteredDonors(){
  const y = document.getElementById("filterYear").value;
  const m = document.getElementById("filterMonth").value;
  const q = String(document.getElementById("searchText").value || "").trim().toLowerCase();

  return donorRecords.filter(r => {
    if (!isVisibleTrackingRecord(r)) return false;

    const d = parseDate(getDonorDate(r));
    const p = getDateParts(d);
    const partner = String(getPartnerName(r) || "").toLowerCase();
    const donorType = String(getDonorType(r) || "").toLowerCase();
    const smartGroup = smartGroupDisplayName(getPartnerName(r) || "").toLowerCase();

    if (y !== "ALL" && String(p.year) !== y) return false;
    if (m !== "ALL" && String(p.month) !== m) return false;
    if (q && !partner.includes(q) && !donorType.includes(q) && !smartGroup.includes(q)) return false;
    return true;
  });
}

function getFilteredReleasing(){
  const y = document.getElementById("filterYear").value;
  const m = document.getElementById("filterMonth").value;
  return releasingRecords.filter(r => {
    const d = parseDate(getReleaseDate(r));
    const p = getDateParts(d);
    if (y !== "ALL" && String(p.year) !== y) return false;
    if (m !== "ALL" && String(p.month) !== m) return false;
    return true;
  });
}

function sumVals(obj){
  return Object.values(obj).reduce((a,b)=>a + (Number(b)||0), 0);
}

function sumDetailField(rows, field){
  return (rows || []).reduce((a,b)=>a + (Number(b[field])||0), 0);
}

function sumBagTypeColumn(s, code){
  return Number(s.officeBleeding["Walk-in"][code] || 0) +
         Number(s.officeBleeding["Patient Directed"][code] || 0) +
         Number(s.fieldDonation["Total MBD"][code] || 0);
}

function num(v){
  return Number(v || 0).toLocaleString();
}

function csvEscape(v){
  const s = String(v ?? "");
  if (s.includes(",") || s.includes('"') || s.includes("\n")) return `"${s.replace(/"/g, '""')}"`;
  return s;
}

function escapeJs(str){
  return String(str ?? "")
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")
    .replace(/"/g, '\\"')
    .replace(/\n/g, "\\n")
    .replace(/\r/g, "");
}

function escapeHtml(str){
  return String(str ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function combineSmartGroupRows(rows){
  const map = {};
  rows.forEach(r => {
    const key = normalizeAliasKey(r.name || "");
    const display = key || (r.name || "");
    if (!map[key || display]) {
      map[key || display] = {
        name: display,
        place: r.place || "",
        date: r.date || "",
        "450 cc S": 0,
        "450 cc D": 0,
        "450 cc T": 0,
        "450 cc Q": 0,
        totalDonors: 0
      };
    }
    map[key || display]["450 cc S"] += Number(r["450 cc S"] || 0);
    map[key || display]["450 cc D"] += Number(r["450 cc D"] || 0);
    map[key || display]["450 cc T"] += Number(r["450 cc T"] || 0);
    map[key || display]["450 cc Q"] += Number(r["450 cc Q"] || 0);
    map[key || display].totalDonors += Number(r.totalDonors || 0);
    if (!map[key || display].place && r.place) map[key || display].place = r.place;
    if (!map[key || display].date && r.date) map[key || display].date = r.date;
  });
  return Object.values(map).sort((a,b) => a.name.localeCompare(b.name));
}

function flattenMonths(grouped){
  const rows = [];
  Object.keys(grouped).sort((a,b)=>b.localeCompare(a)).forEach(year => {
    Object.keys(grouped[year]).sort((a,b)=>b.localeCompare(a)).forEach(key => {
      rows.push(grouped[year][key]);
    });
  });
  return rows;
}

function getMonthLabel(meta){
  return `${MONTHS[(meta.month || 1) - 1]} ${meta.year || ""}`.trim();
}

function buildDailyDropdown(monthKey, s){
  const dailyCounts = s.dailyCounts || {};
  const keys = Object.keys(dailyCounts).sort((a,b) => a.localeCompare(b));

  if (!keys.length) {
    return `
      <div class="daily-dropdown-wrap">
        <button type="button" class="daily-dropdown-btn" onclick="toggleDailyDropdown('${escapeJs(monthKey)}')">
          <span>Daily Count of Donors</span>
          <span id="dailyArrow-${escapeHtml(monthKey)}">▼</span>
        </button>
        <div id="dailyDropdown-${escapeHtml(monthKey)}" class="daily-dropdown-content">
          <div class="daily-empty">No daily donor counts found.</div>
        </div>
      </div>
    `;
  }

  const rows = keys.map(dayKey => {
    const d = parseDate(dayKey);
    const label = d ? `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}` : dayKey;
    return `
      <div class="daily-row">
        <div class="daily-row-date">${escapeHtml(label)}</div>
        <div class="daily-row-count">${num(dailyCounts[dayKey])}</div>
      </div>
    `;
  }).join("");

  return `
    <div class="daily-dropdown-wrap">
      <button type="button" class="daily-dropdown-btn" onclick="toggleDailyDropdown('${escapeJs(monthKey)}')">
        <span>Daily Count of Donors</span>
        <span id="dailyArrow-${escapeHtml(monthKey)}">▼</span>
      </button>
      <div id="dailyDropdown-${escapeHtml(monthKey)}" class="daily-dropdown-content">
        <div class="daily-dropdown-list">${rows}</div>
      </div>
    </div>
  `;
}

function renderMonthlySummary(grouped){
  const years = Object.keys(grouped).sort((a,b)=>b.localeCompare(a));
  const el = document.getElementById("summaryGrid");

  if (!years.length) {
    el.innerHTML = `<div class="empty">No monthly summary found for the selected filter.</div>`;
    return;
  }

  el.innerHTML = years.map((year, yi) => {
    const monthKeys = Object.keys(grouped[year]).sort((a,b)=>b.localeCompare(a));

    return `
      <div class="summary-year-block">
        <div class="summary-year-head" onclick="toggleNext(this)">
          <span>${escapeHtml(year)}</span>
          <span>${monthKeys.length} month${monthKeys.length === 1 ? "" : "s"}</span>
        </div>
        <div class="summary-year-content ${yi === 0 ? "open" : ""}">
          <div class="summary-year-grid">
            ${monthKeys.map(key => {
              const s = grouped[year][key];
              const monthKey = `${s._meta?.year || ""}-${String(s._meta?.month || "").padStart(2, "0")}`;

              return `
                <div class="summary-box">
                  <div class="label">${escapeHtml(getMonthLabel(s._meta || {}))}</div>
                  <div class="value">${num(s.totalDonors)}</div>
                  <div class="sub">Total Donor Entries</div>
                  <div class="sub">Office: ${num(sumBagGroup(s.officeBleeding["Walk-in"]) + sumBagGroup(s.officeBleeding["Patient Directed"]))}</div>

}

function aggregateSearchRows(details, query){
  const q = String(query || "").trim().toLowerCase();
  const all = [
    ...(details.group || []),
    ...(details.rc143 || []),
    ...(details.pledge25 || []),
    ...(details.unmapped || [])
  ];

  const map = {};
  all.forEach(row => {
    const name = String(row.name || "").trim();
    const nameLower = name.toLowerCase();
    if (q && !nameLower.includes(q)) return;

    const dateDisplay = row.date || "";
    const key = `${normalizeAliasKey(name)}__${dateDisplay}`;

    if (!map[key]) {
      map[key] = {
        name,
        date: dateDisplay,
        rawDate: parseDate(row.rawDate || row.date),
        totalDonors: 0
      };
    }
    map[key].totalDonors += Number(row.totalDonors || 0);
  });

  return Object.values(map).sort((a,b) => {
    const at = a.rawDate ? a.rawDate.getTime() : 0;
    const bt = b.rawDate ? b.rawDate.getTime() : 0;
    return bt - at || a.name.localeCompare(b.name);
  });
}

function buildStatistics(){
  try{
    const donors = getFilteredDonors();
    const releases = getFilteredReleasing();
    const grouped = {};

    donors.forEach(r => {
      const d = parseDate(getDonorDate(r));
      const p = getDateParts(d);
      if (!p.year || !p.month) return;
      const y = String(p.year);
      const k = `${p.year}-${String(p.month).padStart(2, "0")}`;
      if (!grouped[y]) grouped[y] = {};
      if (!grouped[y][k]) grouped[y][k] = emptyStats();
      grouped[y][k]._meta = { year:p.year, month:p.month };
      applyDonor(grouped[y][k], r);
    });

    releases.forEach(r => {
      const d = parseDate(getReleaseDate(r));
      const p = getDateParts(d);
      if (!p.year || !p.month) return;
      const y = String(p.year);
      const k = `${p.year}-${String(p.month).padStart(2, "0")}`;
      if (!grouped[y]) grouped[y] = {};
      if (!grouped[y][k]) grouped[y][k] = emptyStats();
      grouped[y][k]._meta = { year:p.year, month:p.month };
      applyRequestedOnly(grouped[y][k], r);
    });

    groupedCache = grouped;
    renderMonthlySummary(grouped);
    renderMonthlySexTable(grouped);

    const q = String(document.getElementById("searchText").value || "").trim();
    if (q) renderSearchGroupReport(grouped, q);
    else renderReport(grouped);

    setStatus("Statistics loaded successfully.", "ok");
  }catch(error){
    console.error(error);
    document.getElementById("reportContainer").innerHTML = `<div class="empty">Failed to build statistics: ${escapeHtml(error.message || String(error))}</div>`;
    document.getElementById("summaryGrid").innerHTML = `<div class="empty" style="grid-column:1/-1;">Failed to build monthly summary.</div>`;
    document.getElementById("sexMonthlyContainer").innerHTML = `<div class="empty">Failed to build male / female monthly table.</div>`;
    setStatus("Failed to build statistics.", "error");
  }
}

async function saveGroupCategory(){
  const partner = (document.getElementById("mapPartnerName").value || "").trim();
  const category = document.getElementById("mapCategory").value;
  const place = (document.getElementById("mapPlace").value || "").trim();

  if (!partner) {
    alert("Please enter a partner / group name.");
    return;
  }

  try{
    const normalized = normalizeAliasKey(partner);
    const existing = categoryMappings.find(x =>
      normalizeAliasKey(x.partnerName || x.name || "") === normalized
    );

    if (existing) {
      await fs.collection("donorGroupCategories").doc(existing.id).update({
        partnerName: smartGroupDisplayName(partner),
        category,
        place,
        normalizedKey: normalized,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await fs.collection("donorGroupCategories").add({
        partnerName: smartGroupDisplayName(partner),
        category,
        place,
        normalizedKey: normalized,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }

    inlineEditingMappingId = null;
    clearMappingEditor();
    await loadCategoryMappings(initializeVersion);
    renderMappings();
    buildStatistics();
    alert(existing ? "Group category updated successfully." : "Group category saved successfully.");
  }catch(error){
    console.error(error);
    alert("Failed to save mapping: " + (error.message || error));
  }
}

function populateFilters(){
  const yearEl = document.getElementById("filterYear");
  const monthEl = document.getElementById("filterMonth");
  const keepYear = yearEl.value || "ALL";
  const keepMonth = monthEl.value || "ALL";

  const years = [...new Set(
    donorRecords
      .map(r => parseDate(getDonorDate(r)))
      .filter(Boolean)
      .map(d => String(d.getFullYear()))
  )].sort((a,b) => b.localeCompare(a));

  yearEl.innerHTML = `<option value="ALL">All Years</option>`;
  years.forEach(y => yearEl.innerHTML += `<option value="${y}">${y}</option>`);
  if ([...yearEl.options].some(o => o.value === keepYear)) yearEl.value = keepYear;

  monthEl.innerHTML = `<option value="ALL">All Months</option>`;
  MONTHS.forEach((m, i) => monthEl.innerHTML += `<option value="${i+1}">${m}</option>`);
  if ([...monthEl.options].some(o => o.value === keepMonth)) monthEl.value = keepMonth;
}

function exportCSV(){
  if (!groupedCache) {
    alert("No statistics available yet.");
    return;
  }

  const rows = [[
    "Year","Month",
    "Walk-in S","Walk-in D","Walk-in T","Walk-in Q",
    "Patient Directed S","Patient Directed D","Patient Directed T","Patient Directed Q",
    "MBD S","MBD D","MBD T","MBD Q",
    "450 cc","PRBC","FFP","PC","CRYO",
    "Male","Female",
    "16-17","18-20","21-30","31-40","41-50","51-60","60-65","66 & above"
  ]];

  Object.keys(groupedCache).sort((a,b)=>b-a).forEach(year => {
    Object.keys(groupedCache[year]).sort((a,b)=>b.localeCompare(a)).forEach(key => {
      const s = groupedCache[year][key];
      rows.push([
        year,
        MONTHS[(s._meta.month || 1)-1],
        s.officeBleeding["Walk-in"].S,
        s.officeBleeding["Walk-in"].D,
        s.officeBleeding["Walk-in"].T,
        s.officeBleeding["Walk-in"].Q,
        s.officeBleeding["Patient Directed"].S,
        s.officeBleeding["Patient Directed"].D,
        s.officeBleeding["Patient Directed"].T,
        s.officeBleeding["Patient Directed"].Q,
        s.fieldDonation["Total MBD"].S,
        s.fieldDonation["Total MBD"].D,
        s.fieldDonation["Total MBD"].T,
        s.fieldDonation["Total MBD"].Q,
        s.components["450 cc"],
        s.components["PRBC"],
        s.components["FFP"],
        s.components["PC"],
        s.components["CRYO"],
        s.sex["Male"],
        s.sex["Female"],
        s.age["16-17"],
        s.age["18-20"],
        s.age["21-30"],
        s.age["31-40"],
        s.age["41-50"],
        s.age["51-60"],
        s.age["60-65"],
        s.age["66 & above"]
      ]);
    });
  });

  const csv = rows.map(r => r.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "donor-database-statistics.csv";
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
</script>
