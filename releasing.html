<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database-compat.js"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    text-align:center;
    padding:18px 15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
}

header h2{
    margin:0;
    font-size:26px;
    letter-spacing:0.5px;
}

.container{
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    text-align:center;
}

button{
    width:100%;
    padding:14px 12px;
    margin-top:12px;
    border:none;
    border-radius:8px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
    transition:transform 0.15s ease, opacity 0.15s ease;
}

button:hover{
    transform:translateY(-1px);
    opacity:0.95;
}

.entry{background:#ff9800;}
.tracking{background:#e65100;}
.stats{background:#00897b;}
.facility{background:#2e7d32;}
.settings{background:#6a1b9a;}
.back{background:#444;}

#loadingScreen{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,0.96);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:9999;
}

.loaderBox{
    background:white;
    border-radius:12px;
    padding:24px 30px;
    box-shadow:0 4px 18px rgba(0,0,0,0.12);
    text-align:center;
    min-width:240px;
}

.spinner{
    width:42px;
    height:42px;
    border:4px solid #ffe0b2;
    border-top:4px solid #ff9800;
    border-radius:50%;
    margin:0 auto 14px;
    animation:spin 1s linear infinite;
}

.loadingText{
    font-size:15px;
    color:#444;
    font-weight:bold;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

.hidden{
    display:none !important;
}

@media (max-width:600px){
    .container{
        margin:20px 12px;
        padding:22px 16px;
    }

    header h2{
        font-size:22px;
    }

    button{
        font-size:14px;
        padding:13px 10px;
    }
}
</style>
</head>

<body>

<div id="loadingScreen">
    <div class="loaderBox">
        <div class="spinner"></div>
        <div class="loadingText">Checking access...</div>
    </div>
</div>

<header>
    <h2>Blood Releasing Module</h2>
</header>

<div class="container hidden" id="mainContainer">
    <button class="entry" onclick="goEntry()">ENTRY</button>
    <button class="tracking" onclick="goTracking()">TRACKING</button>
    <button class="stats" onclick="goStats()">STATISTICS</button>
    <button class="facility" onclick="goFacility()">FACILITY MANAGER</button>
    <button class="settings" onclick="goSettings()">SETTINGS</button>
    <button class="back" onclick="goBack()">BACK TO DASHBOARD</button>
</div>

<script>
var firebaseConfig = {
    apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
    authDomain: "galloners-club.firebaseapp.com",
    databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "galloners-club",
    storageBucket: "galloners-club.appspot.com",
    messagingSenderId: "213049860421",
    appId: "1:213049860421:web:4156aaa52b945f48711e2c",
    measurementId: "G-XYXJH9JNXJ"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

var auth = firebase.auth();
var db = firebase.database();

var loadingScreen = document.getElementById("loadingScreen");
var mainContainer = document.getElementById("mainContainer");

function showMainContent(){
    loadingScreen.classList.add("hidden");
    mainContainer.classList.remove("hidden");
}

function denyAccess(){
    alert("Access denied.");
    window.location.href = "dashboard.html";
}

auth.onAuthStateChanged(function(user){
    if(!user){
        window.location.href = "index.html";
        return;
    }

    db.ref("userRoles/" + user.uid + "/role").once("value")
        .then(function(snapshot){
            var role = snapshot.exists() ? snapshot.val() : null;

            /* 
               FIX:
               Before, missing role = limitedEncoder automatically.
               Now, only explicitly saved limitedEncoder is blocked.
            */
            if(role === "limitedEncoder"){
                denyAccess();
                return;
            }

            showMainContent();
        })
        .catch(function(error){
            console.error("Role check error:", error);

            /* 
               Fail-safe:
               If role checking fails, still allow page to load
               so authorized users are not blocked unnecessarily.
            */
            showMainContent();
        });
});

function goEntry(){
    window.location.href = "releasing-entry.html";
}

function goTracking(){
    window.location.href = "releasing-tracking.html";
}

function goStats(){
    window.location.href = "releasing-statistics.html";
}

function goFacility(){
    window.location.href = "facility-manager.html";
}

function goSettings(){
    window.location.href = "releasing-settings.html";
}

function goBack(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
