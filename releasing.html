
<!DOCTYPE html>
<html>
<head>
<title>Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#ff9800;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0px 3px 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#ff9800;
color:white;
font-weight:bold;
border-radius:5px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<div class="container">

<input type="text" id="patientName" placeholder="Patient Name">

<select id="bloodType">
<option value="">Select Blood Type</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<input type="number" id="bags" placeholder="Number of Bags">

<input type="text" id="hospital" placeholder="Hospital">

<input type="date" id="releaseDate">

<button onclick="saveRelease()">Save Releasing</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "YOUR-API-KEY",
authDomain: "YOUR-PROJECT.firebaseapp.com",
databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId: "YOUR-PROJECT",
storageBucket: "YOUR-PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveRelease = function(){

const patientName = document.getElementById("patientName").value;
const bloodType = document.getElementById("bloodType").value;
const bags = document.getElementById("bags").value;
const hospital = document.getElementById("hospital").value;
const releaseDate = document.getElementById("releaseDate").value;

push(ref(db,"releasing"),{
patientName,
bloodType,
bags,
hospital,
releaseDate
});

alert("Release Recorded");

}

</script>

</body>
</html>
