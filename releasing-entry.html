<!DOCTYPE html>
<html>
<head>

<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#ff9800;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.row{
display:flex;
gap:10px;
margin-top:5px;
}

.row select{
flex:2;
}

.row input{
flex:1;
}

button{
width:100%;
padding:12px;
margin-top:20px;
border:none;
border-radius:5px;
background:#ff9800;
color:white;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<div class="container">

<label>FACILITY</label>
<input type="text" id="facility">

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>

<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>

<input type="number" id="issuedQty" placeholder="Qty">
</div>

<button onclick="saveData()">SAVE</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey: "YOUR-API-KEY",
authDomain: "YOUR-PROJECT.firebaseapp.com",
databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId: "YOUR-PROJECT",
storageBucket: "YOUR-PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData = function(){

const facility=document.getElementById("facility").value;
const surname=document.getElementById("surname").value;
const firstname=document.getElementById("firstname").value;
const age=document.getElementById("age").value;
const sex=document.getElementById("sex").value;
const bloodtype=document.getElementById("bloodtype").value;
const orNumber=document.getElementById("or").value;

const request=document.getElementById("request").value;
const requestQty=document.getElementById("requestQty").value;

const issued=document.getElementById("issued").value;
const issuedQty=document.getElementById("issuedQty").value;

push(ref(db,"releasing"),{

facility,
surname,
firstname,
age,
sex,
bloodtype,
orNumber,
request,
requestQty,
issued,
issuedQty

});

alert("Releasing saved successfully!");

document.querySelectorAll("input").forEach(i=>i.value="");

}

</script>

</body>
</html>
