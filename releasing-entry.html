<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:900px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:10px;
    align-items:flex-end;
    margin-top:5px;
    flex-wrap:wrap;
}

.row > div{
    flex:1;
    min-width:120px;
}

.row select{flex:2}
.row input{flex:1}

.row button{
    width:auto;
    min-width:45px;
    padding:10px;
    margin-top:0;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#ff9800;color:white}
.facilityBtn{background:#2e7d32;color:white}
.trackingBtn{background:#1565c0;color:white}
.back{background:#444;color:white}
.addBtn{background:#2e7d32;color:white}
.removeBtn{background:#c62828;color:white}
.discountBtn{background:#1565c0;color:white}
.waivedBtn{background:#6d4c41;color:white}
.smallBtn{
    width:auto !important;
    min-width:120px !important;
    padding:10px 14px !important;
}

.topButtons{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:8px;
}

.topButtons button{
    flex:1;
    min-width:200px;
    margin-top:0;
}

.searchWrap{
    position:relative;
    margin-top:10px;
}

.searchResults{
    display:none;
    position:absolute;
    top:100%;
    left:0;
    right:0;
    background:#fff;
    border:1px solid #ddd;
    border-top:none;
    max-height:260px;
    overflow:auto;
    z-index:50;
    box-shadow:0 6px 18px rgba(0,0,0,0.12);
    border-radius:0 0 8px 8px;
}

.searchItem{
    padding:10px 12px;
    border-bottom:1px solid #eee;
    cursor:pointer;
}

.searchItem:hover{
    background:#fff3e0;
}

.searchItem strong{
    display:block;
    color:#333;
}

.searchMeta{
    font-size:12px;
    color:#666;
    margin-top:4px;
}

.inline5{
    display:grid;
    grid-template-columns: 1.4fr 1.4fr 0.8fr 0.9fr 0.9fr;
    gap:10px;
    align-items:end;
}

.inline5 > div{
    min-width:0;
}

.sectionSpacer{
    margin-top:8px;
}

/* BLOOD AUGMENTATION */
.augmentationToggle{
    position:fixed;
    right:15px;
    top:120px;
    width:auto;
    padding:12px 16px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    z-index:1000;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.augmentationPanel{
    position:fixed;
    top:0;
    right:-520px;
    width:500px;
    height:100%;
    background:white;
    box-shadow:-3px 0 12px rgba(0,0,0,0.2);
    transition:right 0.3s ease;
    z-index:999;
    overflow:auto;
    padding:20px;
    box-sizing:border-box;
}

.augmentationPanel.open{
    right:0;
}

.augmentationHeader{
    background:#1565c0;
    color:white;
    padding:12px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
    margin-bottom:15px;
}

.augmentationCard{
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
    margin-top:15px;
    background:#fafafa;
}

.innerBox{
    border:1px solid #ddd;
    border-radius:6px;
    padding:10px;
    margin-top:10px;
    background:white;
}

@media (max-width: 860px){
    .inline5{
        grid-template-columns:1fr 1fr;
    }
}

@media (max-width: 600px){
    .container{
        margin:20px 12px;
        padding:20px;
    }

    .inline5{
        grid-template-columns:1fr;
    }

    .topButtons button{
        min-width:unset;
    }
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<button class="augmentationToggle" onclick="toggleAugmentation()">BLOOD AUGMENTATION</button>

<div class="container">

<div class="topButtons">

<label>LIVE SEARCH FROM RELEASING TRACKING</label>
<div class="searchWrap">

<label>FACILITY</label>

<div class="sectionSpacer"></div>

</div>

<label>7. REQUEST</label>
<div id="requestContainer">

<label>8. ISSUED</label>
<div id="issuedContainer">

        <select class="issuedType">
            <option>WB</option>

            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="issuedQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addIssued()">+</button>
    </div>
</div>

<label>6A. BOX CONTAINER</label>
<input type="number" id="boxContainerQty" placeholder="Qty">

<label>6. OR</label>
<input type="text" id="or" required>

<label>9. AMOUNT PAID</label>
<div class="row">
    <input type="number" id="amountPaid" readonly>

</div>

<div id="waivedSection" style="display:none;">

            <div>

                <select class="waivedComponent">
                    <option value="">Select</option>
                    <option>WB</option>
                    <option>PRBC</option>
                    <option>PC</option>
                    <option>FFP</option>
                    <option>CRYO</option>
                    <option>BOX CONTAINER</option>
                </select>
            </div>
            <div>
                <label>WAIVED UNIT</label>
                <input type="number" class="waivedUnit" placeholder="Unit">

</div>

<div id="discountSection" style="display:none;">

    <input type="number" id="discountPrice">

    <label>DISCOUNT %</label>

</div>

<button class="save" id="saveBtn">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<!-- BLOOD AUGMENTATION PANEL -->
<div id="augmentationPanel" class="augmentationPanel">
    <div class="augmentationHeader">BLOOD AUGMENTATION</div>

    <label>DATE</label>
    <input type="date" id="augDate">

    <label>FACILITY</label>
    <input type="text" id="augFacility" list="facilityList" placeholder="Type facility name" required>

    <label>BOX CONTAINER</label>
    <input type="number" id="augBoxContainerQty" placeholder="Qty">

    <div id="augmentationBloodTypeContainer"></div>

    <button class="addBtn" type="button" onclick="addAugmentationBloodType()">+ ADD BLOOD TYPE</button>

    <label style="margin-top:15px;">AMOUNT PAID</label>
    <div class="row">
        <input type="number" id="augAmountPaid" readonly>
        <button type="button" class="discountBtn smallBtn" onclick="toggleAugDiscount()">DISCOUNT</button>
    </div>

    <div id="augDiscountSection" style="display:none;">
        <label>DISCOUNTED PRICE</label>
        <input type="number" id="augDiscountPrice">

        <label>DISCOUNT %</label>
        <input type="number" id="augDiscountPercent">

    <button class="facilityBtn" type="button" onclick="saveAugmentation()">SAVE BLOOD AUGMENTATION</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain: "galloners-club.firebaseapp.com",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club",
  storageBucket: "galloners-club.firebasestorage.app",
  messagingSenderId: "213049860421",
  appId: "1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId: "G-XYXJH9JNXJ"
};

let componentPrices = {
  WB: 0,
  PRBC: 0,
  PC: 0,
  FFP: 0,
  CRYO: 0,
  BOXCONTAINER: 0
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const facilityList = document.getElementById("facilityList");
const saveBtn = document.getElementById("saveBtn");
const liveSearchInput = document.getElementById("liveSearch");
const searchResults = document.getElementById("searchResults");

const urlParams = new URLSearchParams(window.location.search);
const editId = urlParams.get("id");

let authReady = false;
let currentReleasingPriceSnapshot = null;
let currentAugmentationPriceSnapshot = null;
let allReleasingEntries = [];
let selectedLoadedId = editId || null;
let waivedActive = false;

function buildPriceSnapshot(){
  return {
    WB: Number(componentPrices.WB) || 0,
    PRBC: Number(componentPrices.PRBC) || 0,
    PC: Number(componentPrices.PC) || 0,
    FFP: Number(componentPrices.FFP) || 0,
    CRYO: Number(componentPrices.CRYO) || 0,
    BOX: Number(componentPrices.BOXCONTAINER) || 0
  };
}

function normalizePriceSnapshot(snapshot){
  return {
    WB: Number(snapshot?.WB ?? snapshot?.wb) || 0,
    PRBC: Number(snapshot?.PRBC ?? snapshot?.prbc) || 0,
    PC: Number(snapshot?.PC ?? snapshot?.pc) || 0,
    FFP: Number(snapshot?.FFP ?? snapshot?.ffp) || 0,
    CRYO: Number(snapshot?.CRYO ?? snapshot?.cryo) || 0,
    BOX: Number(snapshot?.BOX ?? snapshot?.box ?? snapshot?.boxContainer) || 0
  };
}

function setTodayDate(){
  const today = new Date().toISOString().split("T")[0];

  const mainDate = document.getElementById("date");
  if(mainDate && !mainDate.value) mainDate.value = today;

  const augDate = document.getElementById("augDate");
  if(augDate && !augDate.value) augDate.value = today;
}

function loadFacilities(){
  onValue(ref(db, "facilities"), (snapshot) => {
    facilityList.innerHTML = "";

    if (!snapshot.exists()) return;

    snapshot.forEach((child) => {
      const data = child.val();
      const option = document.createElement("option");
      option.value = data.name || "";
      facilityList.appendChild(option);
    });
  }, (error) => {
    console.error("Facility load error:", error);
  });
}

async function loadComponentPrices(){
  try{
    const snapshot = await get(ref(db, "settings/releasingPrices"));

    if(snapshot.exists()){
      const data = snapshot.val() || {};

      componentPrices = {
        WB: Number(data.wb) || 0,
        PRBC: Number(data.prbc) || 0,
        PC: Number(data.pc) || 0,
        FFP: Number(data.ffp) || 0,
        CRYO: Number(data.cryo) || 0,
        BOXCONTAINER: Number(data.boxContainer) || 0
      };
    }else{
      componentPrices = {
        WB: 0,
        PRBC: 0,
        PC: 0,
        FFP: 0,
        CRYO: 0,
        BOXCONTAINER: 0
      };
    }

    computeIssuedTotal();
    computeAugmentationTotal();
  }catch(error){
    console.error("Price load error:", error);
    componentPrices = {
      WB: 0,
      PRBC: 0,
      PC: 0,
      FFP: 0,
      CRYO: 0,
      BOXCONTAINER: 0
    };
  }
}

function safeUpper(value){
  return String(value || "").toUpperCase();
}

function normalizeCompare(value){
  return safeUpper(value).replace(/\s+/g, " ").trim();
}

function isSimilarText(a, b){
  const first = normalizeCompare(a);
  const second = normalizeCompare(b);

  if(first === "" || second === "") return false;
  if(first === second) return true;
  if(first.length >= 4 && second.length >= 4 && (first.includes(second) || second.includes(first))) return true;

  return false;
}

function findSimilarReleasingEntry(entryData){
  return allReleasingEntries.find(item => {
    if(selectedLoadedId && item.id === selectedLoadedId) return false;

    const sameAge = normalizeCompare(item.age) === normalizeCompare(entryData.age);
    const sameSex = normalizeCompare(item.sex) === normalizeCompare(entryData.sex);
    const sameBloodType = normalizeCompare(item.bloodtype) === normalizeCompare(entryData.bloodtype);
    const sameOr = normalizeCompare(item.or) === normalizeCompare(entryData.or);
    const similarSurname = isSimilarText(item.surname, entryData.surname);
    const similarFirstname = isSimilarText(item.firstname, entryData.firstname);

    return similarSurname && similarFirstname && sameAge && sameSex && sameBloodType && sameOr;
  }) || null;
}

function focusNextField(currentField){
  const focusableFields = Array.from(document.querySelectorAll('input:not([type="hidden"]):not([readonly]), select, button'))
    .filter(el => !el.disabled && el.offsetParent !== null && !el.classList.contains("augmentationToggle"));

  const currentIndex = focusableFields.indexOf(currentField);

  if(currentIndex > -1 && currentIndex < focusableFields.length - 1){
    focusableFields[currentIndex + 1].focus();
  }
}

function bindEnterMoveToNextBox(){
  document.addEventListener("keydown", function(e){
    if(e.key !== "Enter") return;
    if(!e.target.matches("input, select")) return;

    e.preventDefault();
    focusNextField(e.target);
  });
}

function renderSearchResults(matches){
  if(!matches.length){
    searchResults.innerHTML = `<div class="searchItem">No matching record found.</div>`;
    searchResults.style.display = "block";
    return;
  }

  searchResults.innerHTML = matches.map(item => `
    <div class="searchItem" data-id="${item.id}">
      <strong>${safeUpper(item.surname)}, ${safeUpper(item.firstname)}</strong>
      <div class="searchMeta">
        DATE: ${item.date || "-"} | FACILITY: ${safeUpper(item.facility)} | BLOOD TYPE: ${item.bloodtype || "-"} | OR: ${safeUpper(item.or)}
      </div>
    </div>
  `).join("");

  searchResults.style.display = "block";

  searchResults.querySelectorAll(".searchItem[data-id]").forEach(el => {
    el.addEventListener("click", () => {
      const found = allReleasingEntries.find(x => x.id === el.dataset.id);
      if(found){
        loadEntryIntoForm(found.id, found);
        liveSearchInput.value = `${safeUpper(found.surname)}, ${safeUpper(found.firstname)} | ${found.date || ""}`;
        searchResults.style.display = "none";
      }
    });
  });
}

function performLiveSearch(keyword){
  const term = safeUpper(keyword).trim();

  if(!term){
    searchResults.style.display = "none";
    searchResults.innerHTML = "";
    return;
  }

  const matches = allReleasingEntries.filter(item => {
    const haystack = [
      item.date,
      item.facility,
      item.surname,
      item.firstname,
      item.bloodtype,
      item.or,
      item.sex,
      item.age
    ].map(v => safeUpper(v)).join(" ");

    return haystack.includes(term);
  }).slice(0, 20);

  renderSearchResults(matches);
}

function bindLiveSearch(){
  liveSearchInput.addEventListener("input", (e) => {
    performLiveSearch(e.target.value);
  });

  document.addEventListener("click", (e) => {
    if(!e.target.closest(".searchWrap")){
      searchResults.style.display = "none";
    }
  });
}

function loadTrackingSearchData(){
  onValue(ref(db, "releasing"), (snapshot) => {
    const rows = [];
    if(snapshot.exists()){
      snapshot.forEach(child => {
        rows.push({
          id: child.key,
          ...(child.val() || {})
        });
      });
    }

    allReleasingEntries = rows.sort((a,b) => {
      const aDate = a.date || "";
      const bDate = b.date || "";
      return bDate.localeCompare(aDate);
    });
  }, (error) => {
    console.error("Tracking search load error:", error);
  });
}

window.addRequest = function(){
  const container = document.getElementById("requestContainer");
  const row = document.createElement("div");
  row.className = "row requestRow";
  row.innerHTML = `
    <select class="requestType">
        <option>WB</option>
        <option>PRBC</option>
        <option>PC</option>
        <option>FFP</option>
        <option>CRYO</option>
    </select>
    <input type="number" class="requestQty" placeholder="Qty">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove()">-</button>
  `;
  container.appendChild(row);
};

window.addIssued = function(){
  const container = document.getElementById("issuedContainer");
  const row = document.createElement("div");
  row.className = "row issuedRow";
  row.innerHTML = `
    <select class="issuedType">
        <option>WB</option>
        <option>PRBC</option>
        <option>PC</option>
        <option>FFP</option>
        <option>CRYO</option>
    </select>
    <input type="number" class="issuedQty" placeholder="Qty">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove(); computeIssuedTotal();">-</button>
  `;
  container.appendChild(row);
};

window.addWaived = function(){
  const container = document.getElementById("waivedContainer");
  const row = document.createElement("div");
  row.className = "row waivedRow";
  row.innerHTML = `
    <div>
        <label>WAIVED COMPONENT</label>
        <select class="waivedComponent">
            <option value="">Select</option>
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
            <option>BOX CONTAINER</option>
        </select>
    </div>
    <div>
        <label>WAIVED UNIT</label>
        <input type="number" class="waivedUnit" placeholder="Unit">
    </div>
    <button type="button" class="removeBtn" onclick="this.parentElement.remove(); computeIssuedTotal();">-</button>
  `;
  container.appendChild(row);
};

window.toggleDiscount = function(){
  const section = document.getElementById("discountSection");
  section.style.display = section.style.display === "none" ? "block" : "none";
};

window.toggleWaived = function(forceState = null){
  waivedActive = forceState === null ? !waivedActive : !!forceState;

  const waivedSection = document.getElementById("waivedSection");
  const waivedBtn = document.getElementById("waivedBtn");

  waivedSection.style.display = waivedActive ? "block" : "none";
  waivedBtn.textContent = waivedActive ? "WAIVED ON" : "WAIVED";

  if(!waivedActive){
    resetWaivedRows();
  }

  computeIssuedTotal();
};

function resetWaivedRows(items = null){
  const waivedContainer = document.getElementById("waivedContainer");
  waivedContainer.innerHTML = "";

  if(items && Array.isArray(items) && items.length > 0){
    items.forEach((item, index) => {
      const row = document.createElement("div");
      row.className = "row waivedRow";
      row.innerHTML = `
        <div>
            <label>WAIVED COMPONENT</label>
            <select class="waivedComponent">
                <option value="">Select</option>
                <option ${item.component==="WB" ? "selected" : ""}>WB</option>
                <option ${item.component==="PRBC" ? "selected" : ""}>PRBC</option>
                <option ${item.component==="PC" ? "selected" : ""}>PC</option>
                <option ${item.component==="FFP" ? "selected" : ""}>FFP</option>
                <option ${item.component==="CRYO" ? "selected" : ""}>CRYO</option>
                <option ${item.component==="BOX CONTAINER" ? "selected" : ""}>BOX CONTAINER</option>
            </select>
        </div>
        <div>
            <label>WAIVED UNIT</label>
            <input type="number" class="waivedUnit" placeholder="Unit" value="${item.unit || ""}">
        </div>
        <button type="button" class="${index===0 ? "addBtn" : "removeBtn"}" onclick="${index===0 ? "addWaived()" : "this.parentElement.remove(); computeIssuedTotal()"}">${index===0 ? "+" : "-"}</button>
      `;
      waivedContainer.appendChild(row);
    });
  }else{
    waivedContainer.innerHTML = `
      <div class="row waivedRow">
          <div>
              <label>WAIVED COMPONENT</label>
              <select class="waivedComponent">
                  <option value="">Select</option>
                  <option>WB</option>
                  <option>PRBC</option>
                  <option>PC</option>
                  <option>FFP</option>
                  <option>CRYO</option>
                  <option>BOX CONTAINER</option>
              </select>
          </div>
          <div>
              <label>WAIVED UNIT</label>
              <input type="number" class="waivedUnit" placeholder="Unit">
          </div>
          <button type="button" class="addBtn" onclick="addWaived()">+</button>
      </div>
    `;
  }
}

function getIssuedComponentQty(componentType){
  if(componentType === "BOX CONTAINER"){
    return Number(document.getElementById("boxContainerQty").value) || 0;
  }

  let qty = 0;

  document.querySelectorAll(".issuedRow").forEach(row => {
    const type = row.querySelector(".issuedType").value;
    const rowQty = Number(row.querySelector(".issuedQty").value) || 0;
    if(type === componentType){
      qty += rowQty;
    }
  });

  return qty;
}

function computeIssuedTotal(){
  let total = 0;

  document.querySelectorAll(".issuedRow").forEach(row => {
    const type = row.querySelector(".issuedType").value;
    const qty = Number(row.querySelector(".issuedQty").value) || 0;

    if(componentPrices[type]){
      total += componentPrices[type] * qty;
    }
  });

  const boxContainerQty = Number(document.getElementById("boxContainerQty").value) || 0;
  total += componentPrices.BOXCONTAINER * boxContainerQty;

  if(waivedActive){
    const usedPerComponent = {};

    document.querySelectorAll(".waivedRow").forEach(row => {
      const componentEl = row.querySelector(".waivedComponent");
      const unitEl = row.querySelector(".waivedUnit");

      if(!componentEl || !unitEl) return;

      const waivedComponent = componentEl.value;
      const enteredWaivedUnit = Number(unitEl.value) || 0;
      const issuedQtyForComponent = getIssuedComponentQty(waivedComponent);
      const alreadyUsed = usedPerComponent[waivedComponent] || 0;
      const remainingAllowed = Math.max(0, issuedQtyForComponent - alreadyUsed);
      const validWaivedUnit = Math.min(enteredWaivedUnit, remainingAllowed);

      if(String(unitEl.value).trim() !== "" && enteredWaivedUnit !== validWaivedUnit){
        unitEl.value = validWaivedUnit;
      }

      const pricePerUnit = waivedComponent === "BOX CONTAINER"
        ? (componentPrices.BOXCONTAINER || 0)
        : (componentPrices[waivedComponent] || 0);

      total -= pricePerUnit * validWaivedUnit;
      usedPerComponent[waivedComponent] = alreadyUsed + validWaivedUnit;
    });
  }

  total = Math.max(0, total);

  document.getElementById("amountPaid").value = total.toFixed(2);
  computeMainDiscountFromPercentOrPrice();
}

function computeMainDiscountFromPrice(){
  const original = Number(document.getElementById("amountPaid").value) || 0;
  const discounted = Number(document.getElementById("discountPrice").value) || 0;

  if(original <= 0){
    document.getElementById("discountPercent").value = "";
    document.getElementById("discount").value = "";
    return;
  }

  const discountAmount = original - discounted;
  const percent = (discountAmount / original) * 100;

  document.getElementById("discountPercent").value = percent.toFixed(2);
  document.getElementById("discount").value = discountAmount.toFixed(2);
}

function computeMainDiscountFromPercent(){
  const original = Number(document.getElementById("amountPaid").value) || 0;
  const percent = Number(document.getElementById("discountPercent").value) || 0;

  const discountAmount = original * (percent / 100);
  const discounted = original - discountAmount;

  document.getElementById("discountPrice").value = discounted.toFixed(2);
  document.getElementById("discount").value = discountAmount.toFixed(2);
}

function computeMainDiscountFromPercentOrPrice(){
  const discountPrice = document.getElementById("discountPrice").value;
  const discountPercent = document.getElementById("discountPercent").value;

  if(discountPrice !== ""){
    computeMainDiscountFromPrice();
  }else if(discountPercent !== ""){
    computeMainDiscountFromPercent();
  }else{
    document.getElementById("discount").value = "";
  }
}

function loadEntryIntoForm(id, entry){
  selectedLoadedId = id || null;
  currentReleasingPriceSnapshot = entry.priceSnapshot ? normalizePriceSnapshot(entry.priceSnapshot) : null;

  document.getElementById("date").value = entry.date || "";
  document.getElementById("facility").value = entry.facility || "";
  document.getElementById("surname").value = entry.surname || "";
  document.getElementById("firstname").value = entry.firstname || "";
  document.getElementById("age").value = entry.age || "";
  document.getElementById("sex").value = entry.sex || "";
  document.getElementById("bloodtype").value = entry.bloodtype || "";
  document.getElementById("or").value = entry.or || "";
  document.getElementById("boxContainerQty").value = entry.boxContainerQty || "";
  document.getElementById("amountPaid").value = entry.amountPaid || "";
  document.getElementById("discount").value = entry.discount || "";

  const waivedItems = Array.isArray(entry.waivedItems) && entry.waivedItems.length > 0
    ? entry.waivedItems
    : (entry.waivedComponent || entry.waivedUnit
        ? [{ component: entry.waivedComponent || "", unit: entry.waivedUnit || "" }]
        : null);

  resetWaivedRows(waivedItems);

  toggleWaived(!!entry.waived);

  const original = Number(entry.amountPaid || 0);
  const discountAmount = Number(entry.discount || 0);

  if(discountAmount > 0){
    document.getElementById("discountSection").style.display = "block";
    document.getElementById("discountPrice").value = (original - discountAmount).toFixed(2);
    document.getElementById("discountPercent").value = original > 0 ? ((discountAmount / original) * 100).toFixed(2) : "";
  }else{
    document.getElementById("discountPrice").value = "";
    document.getElementById("discountPercent").value = "";
    document.getElementById("discount").value = "";
    document.getElementById("discountSection").style.display = "none";
  }

  fillRequestRows(entry.requests);
  fillIssuedRows(entry.issued);
  computeIssuedTotal();
}

async function loadEditEntry(){
  if(!editId) return;

  try{
    const snapshot = await get(ref(db, "releasing/" + editId));

    if(snapshot.exists()){
      loadEntryIntoForm(editId, snapshot.val());
    }
  }catch(error){
    console.error("Load edit error:", error);
    alert("Failed to load entry");
  }
}

saveBtn.addEventListener("click", async () => {
  if (!auth.currentUser) {
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  const facilityValue = document.getElementById("facility").value.trim();
  if(facilityValue === ""){
    alert("Facility is required.");
    document.getElementById("facility").focus();
    return;
  }

  const orValue = document.getElementById("or").value.trim();
  if(orValue === ""){
    alert("OR is required.");
    document.getElementById("or").focus();
    return;
  }

  const requests = [];
  document.querySelectorAll(".requestRow").forEach(row => {
    const type = row.querySelector(".requestType").value;
    const qty = row.querySelector(".requestQty").value;
    if(qty !== ""){
      requests.push({ type, qty });
    }
  });

  const issued = [];
  document.querySelectorAll(".issuedRow").forEach(row => {
    const type = row.querySelector(".issuedType").value;
    const qty = row.querySelector(".issuedQty").value;
    if(qty !== ""){
      issued.push({ type, qty });
    }
  });

  const waivedItems = [];
  if(waivedActive){
    document.querySelectorAll(".waivedRow").forEach(row => {
      const component = row.querySelector(".waivedComponent").value;
      const unit = row.querySelector(".waivedUnit").value;
      if(component !== "" && unit !== ""){
        waivedItems.push({ component, unit });
      }
    });
  }

  const priceSnapshotToSave = currentReleasingPriceSnapshot || buildPriceSnapshot();

  const entryData = {
    date: document.getElementById("date").value,
    facility: facilityValue.toUpperCase(),
    surname: document.getElementById("surname").value.toUpperCase(),
    firstname: document.getElementById("firstname").value.toUpperCase(),
    age: document.getElementById("age").value,
    sex: document.getElementById("sex").value,
    bloodtype: document.getElementById("bloodtype").value,
    or: orValue.toUpperCase(),
    boxContainerQty: document.getElementById("boxContainerQty").value || 0,
    requests: requests,
    issued: issued,
    amountPaid: document.getElementById("amountPaid").value,
    discount: document.getElementById("discount").value || 0,
    waived: waivedActive,
    waivedItems: waivedItems,
    waivedComponent: waivedItems[0]?.component || "",
    waivedUnit: waivedItems[0]?.unit || 0,
    priceSnapshot: priceSnapshotToSave
  };

  const similarEntry = findSimilarReleasingEntry(entryData);
  if(similarEntry){
    alert(`Very similar record found. Entry was not saved.\n\nExisting: ${safeUpper(similarEntry.surname)}, ${safeUpper(similarEntry.firstname)} | AGE: ${similarEntry.age || "-"} | SEX: ${similarEntry.sex || "-"} | BLOOD TYPE: ${similarEntry.bloodtype || "-"} | OR: ${safeUpper(similarEntry.or)}`);
    return;
  }

  try {
    if(selectedLoadedId){
      await update(ref(db, "releasing/" + selectedLoadedId), entryData);
      alert("Updated successfully!");
      window.location.href = "releasing-tracking.html";
    }else{
      await push(ref(db, "releasing"), entryData);
      alert("Saved successfully!");
      resetForm();
      liveSearchInput.value = "";
    }
  } catch (error) {
    console.error("Save entry error:", error);
    alert("Failed to save entry");
  }
});

window.saveAugmentation = async function(){
  if (!auth.currentUser) {
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  const augFacilityValue = document.getElementById("augFacility").value.trim();
  if(augFacilityValue === ""){
    alert("Facility is required.");
    document.getElementById("augFacility").focus();
    return;
  }

  const cards = document.querySelectorAll(".augmentationCard");
  const bloodTypes = [];

  cards.forEach(card => {
    const bloodType = card.querySelector(".augBloodType").value;

    const requests = [];
    card.querySelectorAll(".augRequestRow").forEach(row => {
      const type = row.querySelector(".augRequestType").value;
      const qty = row.querySelector(".augRequestQty").value;
      if(qty !== ""){
        requests.push({ type, qty });
      }
    });

    const issued = [];
    card.querySelectorAll(".augIssuedRow").forEach(row => {
      const type = row.querySelector(".augIssuedType").value;
      const qty = row.querySelector(".augIssuedQty").value;
      if(qty !== ""){
        issued.push({ type, qty });
      }
    });

    if(bloodType !== ""){
      bloodTypes.push({
        bloodType,
        requests,
        issued
      });
    }
  });

  const priceSnapshotToSave = currentAugmentationPriceSnapshot || buildPriceSnapshot();

  const augmentationData = {
    date: document.getElementById("augDate").value,
    facility: augFacilityValue.toUpperCase(),
    boxContainerQty: document.getElementById("augBoxContainerQty").value || 0,
    bloodTypes: bloodTypes,
    amountPaid: document.getElementById("augAmountPaid").value,
    discount: document.getElementById("augDiscount").value || 0,
    priceSnapshot: priceSnapshotToSave
  };

  try{
    await push(ref(db, "bloodAugmentation"), augmentationData);
    alert("Blood augmentation saved successfully!");
    currentAugmentationPriceSnapshot = null;
    document.getElementById("augDate").value = new Date().toISOString().split("T")[0];
    document.getElementById("augFacility").value = "";
    document.getElementById("augBoxContainerQty").value = "";
    document.getElementById("augmentationBloodTypeContainer").innerHTML = "";
    document.getElementById("augAmountPaid").value = "";
    document.getElementById("augDiscountPrice").value = "";
    document.getElementById("augDiscountPercent").value = "";
    document.getElementById("augDiscount").value = "";
    document.getElementById("augDiscountSection").style.display = "none";
    toggleAugmentation();
  }catch(error){
    console.error("Augmentation save error:", error);
    alert("Failed to save blood augmentation");
  }
};
