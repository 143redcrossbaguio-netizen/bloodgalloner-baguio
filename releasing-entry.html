<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:650px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:10px;
    align-items:flex-end;
    margin-top:5px;
}

.row select{flex:2}
.row input{flex:1}

.row button{
    width:auto;
    min-width:45px;
    padding:10px;
    margin-top:0;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#ff9800;color:white}
.facilityBtn{background:#2e7d32;color:white}
.back{background:#444;color:white}
.addBtn{background:#2e7d32;color:white}
.removeBtn{background:#c62828;color:white}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input type="text" id="facility" list="facilityList" placeholder="Type facility name">
<datalist id="facilityList"></datalist>

<button class="facilityBtn" onclick="goFacilityManager()">OPEN FACILITY MANAGER</button>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>MALE</option>
<option>FEMALE</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div id="requestContainer">
    <div class="row requestRow">
        <select class="requestType">
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="requestQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addRequest()">+</button>
    </div>
</div>

<label>8. ISSUED</label>
<div id="issuedContainer">
    <div class="row issuedRow">
        <select class="issuedType">
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="issuedQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addIssued()">+</button>
    </div>
</div>

<label>9. AMOUNT PAID</label>
<input type="number" id="amountPaid">

<label>10. DISCOUNT</label>
<input type="number" id="discount">

<button class="save" id="saveBtn">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const facilityList = document.getElementById("facilityList");
const saveBtn = document.getElementById("saveBtn");

const urlParams = new URLSearchParams(window.location.search);
const editId = urlParams.get("id");

/* LOAD FACILITIES */
onValue(ref(db, "facilities"), (snapshot) => {
  facilityList.innerHTML = "";

  if (!snapshot.exists()) return;

  snapshot.forEach((child) => {
    const data = child.val();
    const option = document.createElement("option");
    option.value = data.name || "";
    facilityList.appendChild(option);
  });
});

/* ADD REQUEST ROW */
window.addRequest = function(){
  const container = document.getElementById("requestContainer");
  const row = document.createElement("div");
  row.className = "row requestRow";
  row.innerHTML = `
    <select class="requestType">
        <option>WB</option>
        <option>PRBC</option>
        <option>PC</option>
        <option>FFP</option>
        <option>CRYO</option>
    </select>
    <input type="number" class="requestQty" placeholder="Qty">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove()">-</button>
  `;
  container.appendChild(row);
};

/* ADD ISSUED ROW */
window.addIssued = function(){
  const container = document.getElementById("issuedContainer");
  const row = document.createElement("div");
  row.className = "row issuedRow";
  row.innerHTML = `
    <select class="issuedType">
        <option>WB</option>
        <option>PRBC</option>
        <option>PC</option>
        <option>FFP</option>
        <option>CRYO</option>
    </select>
    <input type="number" class="issuedQty" placeholder="Qty">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove()">-</button>
  `;
  container.appendChild(row);
};

/* LOAD ENTRY FOR EDIT */
if(editId){
  get(ref(db, "releasing/" + editId)).then((snapshot) => {
    if(snapshot.exists()){
      const entry = snapshot.val();

      document.getElementById("date").value = entry.date || "";
      document.getElementById("facility").value = entry.facility || "";
      document.getElementById("surname").value = entry.surname || "";
      document.getElementById("firstname").value = entry.firstname || "";
      document.getElementById("age").value = entry.age || "";
      document.getElementById("sex").value = entry.sex || "";
      document.getElementById("bloodtype").value = entry.bloodtype || "";
      document.getElementById("or").value = entry.or || "";
      document.getElementById("amountPaid").value = entry.amountPaid || "";
      document.getElementById("discount").value = entry.discount || "";

      const requestContainer = document.getElementById("requestContainer");
      const issuedContainer = document.getElementById("issuedContainer");

      requestContainer.innerHTML = "";
      issuedContainer.innerHTML = "";

      if(entry.requests && Array.isArray(entry.requests) && entry.requests.length > 0){
        entry.requests.forEach((item, index) => {
          const row = document.createElement("div");
          row.className = "row requestRow";
          row.innerHTML = `
            <select class="requestType">
                <option ${item.type==="WB" ? "selected" : ""}>WB</option>
                <option ${item.type==="PRBC" ? "selected" : ""}>PRBC</option>
                <option ${item.type==="PC" ? "selected" : ""}>PC</option>
                <option ${item.type==="FFP" ? "selected" : ""}>FFP</option>
                <option ${item.type==="CRYO" ? "selected" : ""}>CRYO</option>
            </select>
            <input type="number" class="requestQty" placeholder="Qty" value="${item.qty || ""}">
            <button type="button" class="${index===0 ? "addBtn" : "removeBtn"}" onclick="${index===0 ? "addRequest()" : "this.parentElement.remove()"}">${index===0 ? "+" : "-"}</button>
          `;
          requestContainer.appendChild(row);
        });
      } else {
        requestContainer.innerHTML = `
          <div class="row requestRow">
              <select class="requestType">
                  <option>WB</option>
                  <option>PRBC</option>
                  <option>PC</option>
                  <option>FFP</option>
                  <option>CRYO</option>
              </select>
              <input type="number" class="requestQty" placeholder="Qty">
              <button type="button" class="addBtn" onclick="addRequest()">+</button>
          </div>
        `;
      }

      if(entry.issued && Array.isArray(entry.issued) && entry.issued.length > 0){
        entry.issued.forEach((item, index) => {
          const row = document.createElement("div");
          row.className = "row issuedRow";
          row.innerHTML = `
            <select class="issuedType">
                <option ${item.type==="WB" ? "selected" : ""}>WB</option>
                <option ${item.type==="PRBC" ? "selected" : ""}>PRBC</option>
                <option ${item.type==="PC" ? "selected" : ""}>PC</option>
                <option ${item.type==="FFP" ? "selected" : ""}>FFP</option>
                <option ${item.type==="CRYO" ? "selected" : ""}>CRYO</option>
            </select>
            <input type="number" class="issuedQty" placeholder="Qty" value="${item.qty || ""}">
            <button type="button" class="${index===0 ? "addBtn" : "removeBtn"}" onclick="${index===0 ? "addIssued()" : "this.parentElement.remove()"}">${index===0 ? "+" : "-"}</button>
          `;
          issuedContainer.appendChild(row);
        });
      } else {
        issuedContainer.innerHTML = `
          <div class="row issuedRow">
              <select class="issuedType">
                  <option>WB</option>
                  <option>PRBC</option>
                  <option>PC</option>
                  <option>FFP</option>
                  <option>CRYO</option>
              </select>
              <input type="number" class="issuedQty" placeholder="Qty">
              <button type="button" class="addBtn" onclick="addIssued()">+</button>
          </div>
        `;
      }
    }
  });
}

/* SAVE ENTRY */
saveBtn.addEventListener("click", async () => {
  const requests = [];
  document.querySelectorAll(".requestRow").forEach(row => {
    const type = row.querySelector(".requestType").value;
    const qty = row.querySelector(".requestQty").value;
    if(qty !== ""){
      requests.push({
        type: type,
        qty: qty
      });
    }
  });

  const issued = [];
  document.querySelectorAll(".issuedRow").forEach(row => {
    const type = row.querySelector(".issuedType").value;
    const qty = row.querySelector(".issuedQty").value;
    if(qty !== ""){
      issued.push({
        type: type,
        qty: qty
      });
    }
  });

  const entryData = {
    date: document.getElementById("date").value,
    facility: document.getElementById("facility").value.toUpperCase(),
    surname: document.getElementById("surname").value.toUpperCase(),
    firstname: document.getElementById("firstname").value.toUpperCase(),
    age: document.getElementById("age").value,
    sex: document.getElementById("sex").value,
    bloodtype: document.getElementById("bloodtype").value,
    or: document.getElementById("or").value.toUpperCase(),
    requests: requests,
    issued: issued,
    amountPaid: document.getElementById("amountPaid").value,
    discount: document.getElementById("discount").value
  };

  try {
    if(editId){
      await update(ref(db, "releasing/" + editId), entryData);
      alert("Updated successfully!");
    }else{
      await push(ref(db, "releasing"), entryData);
      alert("Saved successfully!");
    }

    window.location.href = "releasing-tracking.html";
  } catch (error) {
    console.error("Save entry error:", error);
    alert("Failed to save entry");
  }
});

/* NAVIGATION */
window.goFacilityManager = function(){
  window.location.href = "facility-manager.html";
};

window.goBack = function(){
  window.location.href = "releasing.html";
};
</script>

</body>
</html>
