<!DOCTYPE html>
<html>
<head>

<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#ff9800;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.settings{
position:absolute;
right:20px;
top:15px;
font-size:22px;
cursor:pointer;
}

.container{
max-width:650px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.row{
display:flex;
gap:10px;
}

.row select{flex:2}
.row input{flex:1}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.save{background:#ff9800;color:white}
.back{background:#444;color:white}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
width:700px;
margin:60px auto;
padding:20px;
border-radius:8px;
max-height:80vh;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#f0f0f0;
}

td[contenteditable]{
background:#fffbe6;
}

textarea{
width:100%;
height:150px;
padding:10px;
border-radius:5px;
border:1px solid #ccc;
margin-top:10px;
}

.saveFacilities{
background:#1565c0;
color:white;
}

.closeBtn{
background:#444;
color:white;
}

</style>
</head>

<body>

<header>

<h2>Blood Releasing Entry</h2>

<div class="settings" onclick="openSettings()">⚙</div>

</header>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input list="facilityList" id="facility">
<datalist id="facilityList"></datalist>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="issuedQty" placeholder="Qty">
</div>

<button class="save" onclick="saveData()">SAVE</button>

<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<!-- SETTINGS -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<h3>Facility Manager (Unlimited Excel Style)</h3>

<p>Paste from Excel OR edit the grid below.</p>

<textarea id="facilityBulk" placeholder="Paste Excel column here..."></textarea>

<button onclick="pasteFacilities()">PASTE FACILITIES</button>

<table>

<thead>
<tr>
<th>#</th>
<th>Facility Name</th>
</tr>
</thead>

<tbody id="facilityBody"></tbody>

</table>

<button class="saveFacilities" onclick="saveFacilities()">SAVE TO DATABASE</button>
<button class="closeBtn" onclick="closeSettings()">CLOSE</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* SAVE ENTRY */

window.saveData=function(){

push(ref(db,"releasing"),{
date:date.value,
facility:facility.value,
surname:surname.value,
firstname:firstname.value,
age:age.value,
sex:sex.value,
bloodtype:bloodtype.value,
or:or.value,
request:request.value,
requestQty:requestQty.value,
issued:issued.value,
issuedQty:issuedQty.value
})

alert("Saved successfully")

}

/* FACILITY AUTOCOMPLETE */

const facilityList=document.getElementById("facilityList")

onValue(ref(db,"facilities"),snapshot=>{

facilityList.innerHTML=""

snapshot.forEach(child=>{
let option=document.createElement("option")
option.value=child.val().name
facilityList.appendChild(option)
})

})

/* SETTINGS */

window.openSettings=function(){

document.getElementById("settingsModal").style.display="block"
createRow()
loadFacilities()

}

window.closeSettings=function(){

document.getElementById("settingsModal").style.display="none"

}

window.goBack=function(){

window.location.href="releasing.html"

}

/* CREATE ROW */

function createRow(value=""){

const tbody=document.getElementById("facilityBody")

let row=document.createElement("tr")

let index=tbody.children.length+1

row.innerHTML=`
<td>${index}</td>
<td contenteditable="true">${value}</td>
`

tbody.appendChild(row)

/* auto add new row when typing */

row.children[1].addEventListener("input",function(){

if(row===tbody.lastChild){

createRow()

}

})

}

/* LOAD FACILITIES */

function loadFacilities(){

const tbody=document.getElementById("facilityBody")
tbody.innerHTML=""

onValue(ref(db,"facilities"),snapshot=>{

snapshot.forEach(child=>{
createRow(child.val().name)
})

createRow()

},{onlyOnce:true})

}

/* PASTE FROM EXCEL */

window.pasteFacilities=function(){

const text=document.getElementById("facilityBulk").value
const lines=text.split("\n")

lines.forEach(line=>{
let name=line.trim()
if(name!==""){
createRow(name)
}
})

document.getElementById("facilityBulk").value=""

}

/* SAVE FACILITIES */

window.saveFacilities=function(){

remove(ref(db,"facilities"))

const rows=document.querySelectorAll("#facilityBody tr")

rows.forEach(row=>{

let name=row.children[1].innerText.trim()

if(name!==""){

push(ref(db,"facilities"),{name:name})

}

})

alert("Facilities updated")

}

</script>

</body>
</html>
