<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:650px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

.row{
    display:flex;
    gap:10px;
}

.row select{flex:2}
.row input{flex:1}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#ff9800;color:white}
.facilityBtn{background:#2e7d32;color:white}
.back{background:#444;color:white}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input type="text" id="facility" list="facilityList" placeholder="Type facility name">
<datalist id="facilityList"></datalist>

<button class="facilityBtn" onclick="goFacilityManager()">OPEN FACILITY MANAGER</button>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>MALE</option>
<option>FEMALE</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="issuedQty" placeholder="Qty">
</div>

<label>9. AMOUNT PAID</label>
<input type="number" id="amountPaid">

<label>10. DISCOUNT</label>
<input type="number" id="discount">

<button class="save" id="saveBtn">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const facilityList = document.getElementById("facilityList");
const saveBtn = document.getElementById("saveBtn");

/* LOAD FACILITIES FROM FACILITY MANAGER */
onValue(ref(db, "facilities"), (snapshot) => {
  facilityList.innerHTML = "";

  if (!snapshot.exists()) return;

  snapshot.forEach((child) => {
    const data = child.val();
    const option = document.createElement("option");
    option.value = data.name || "";
    facilityList.appendChild(option);
  });
});

/* SAVE ENTRY */
saveBtn.addEventListener("click", async () => {
  const entryData = {
    date: document.getElementById("date").value,
    facility: document.getElementById("facility").value.toUpperCase(),
    surname: document.getElementById("surname").value.toUpperCase(),
    firstname: document.getElementById("firstname").value.toUpperCase(),
    age: document.getElementById("age").value,
    sex: document.getElementById("sex").value,
    bloodtype: document.getElementById("bloodtype").value,
    or: document.getElementById("or").value.toUpperCase(),
    request: document.getElementById("request").value,
    requestQty: document.getElementById("requestQty").value,
    issued: document.getElementById("issued").value,
    issuedQty: document.getElementById("issuedQty").value,
    amountPaid: document.getElementById("amountPaid").value,
    discount: document.getElementById("discount").value
  };

  try {
    await push(ref(db, "releasing"), entryData);
    alert("Saved successfully!");

    document.getElementById("date").value = "";
    document.getElementById("facility").value = "";
    document.getElementById("surname").value = "";
    document.getElementById("firstname").value = "";
    document.getElementById("age").value = "";
    document.getElementById("sex").value = "";
    document.getElementById("bloodtype").value = "";
    document.getElementById("or").value = "";
    document.getElementById("request").value = "WB";
    document.getElementById("requestQty").value = "";
    document.getElementById("issued").value = "WB";
    document.getElementById("issuedQty").value = "";
    document.getElementById("amountPaid").value = "";
    document.getElementById("discount").value = "";
  } catch (error) {
    console.error("Save entry error:", error);
    alert("Failed to save entry");
  }
});

/* NAVIGATION */
window.goFacilityManager = function(){
  window.location.href = "facility-manager.html";
}

window.goBack = function(){
  window.location.href = "releasing.html";
}
</script>

</body>
</html>
