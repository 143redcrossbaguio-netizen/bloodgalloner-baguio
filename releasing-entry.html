<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:650px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

.row{
    display:flex;
    gap:10px;
}

.row select{flex:2}
.row input{flex:1}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#ff9800;color:white}
.back{background:#444;color:white}

</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input list="facilityList" id="facility">
<datalist id="facilityList"></datalist>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="issuedQty" placeholder="Qty">
</div>

<label>9. AMOUNT PAID</label>
<input type="number" id="amountPaid">

<label>10. DISCOUNT</label>
<input type="number" id="discount">

<button class="save" onclick="saveData()">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔑 Replace with your Firebase config
const firebaseConfig={
    apiKey:"YOUR-API-KEY",
    databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
    projectId:"YOUR-PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Autocomplete facility from Firebase
const facilityList = document.getElementById("facilityList");
const facilityRef = ref(db,"facilities");

onValue(facilityRef, snapshot=>{
    facilityList.innerHTML="";
    snapshot.forEach(child=>{
        const option = document.createElement("option");
        option.value = child.val().name;
        facilityList.appendChild(option);
    });
});

// Save entry
window.saveData = function(){
    push(ref(db,"releasing"),{
        date: date.value,
        facility: facility.value.toUpperCase(),
        surname: surname.value.toUpperCase(),
        firstname: firstname.value.toUpperCase(),
        age: age.value,
        sex: sex.value.toUpperCase(),
        bloodtype: bloodtype.value.toUpperCase(),
        or: or.value.toUpperCase(),
        request: request.value.toUpperCase(),
        requestQty: requestQty.value,
        issued: issued.value.toUpperCase(),
        issuedQty: issuedQty.value,
        amountPaid: amountPaid.value,
        discount: discount.value
    });
    alert("Saved successfully!");
    // Clear form
    date.value=""; facility.value=""; surname.value=""; firstname.value=""; age.value="";
    sex.value=""; bloodtype.value=""; or.value=""; request.value="WB"; requestQty.value="";
    issued.value="WB"; issuedQty.value=""; amountPaid.value=""; discount.value="";
}

// Back button
window.goBack = function(){
    window.location.href="releasing.html";
}

</script>

</body>
</html>
