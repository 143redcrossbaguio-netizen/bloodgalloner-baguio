<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Entry</title>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
    position:relative;
}

.settings{
    position:absolute;
    right:20px;
    top:15px;
    font-size:22px;
    cursor:pointer;
}

.container{
    max-width:650px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input,select,textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#ff9800;color:white}
.back{background:#444;color:white}

.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
}

.modal-content{
    background:white;
    width:500px;
    margin:80px auto;
    padding:20px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
<div class="settings" onclick="openSettings()">⚙</div>
</header>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input list="facilityList" id="facility">
<datalist id="facilityList"></datalist>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>
<input type="number" id="issuedQty" placeholder="Qty">
</div>

<label>9. AMOUNT PAID</label>
<input type="number" id="amountPaid" placeholder="Amount Paid">

<label>10. DISCOUNT</label>
<input type="number" id="discount" placeholder="Discount">

<button class="save" onclick="saveData()">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<!-- SIMPLE SETTINGS MODAL -->
<div class="modal" id="settingsModal">
<div class="modal-content">
<h3>Facility Manager</h3>
<p>Type or paste one facility per line:</p>
<textarea id="facilityBulk" placeholder="Enter or paste facilities here..."></textarea>
<button class="save" onclick="saveFacilities()">SAVE TO DATABASE</button>
<button class="back" onclick="closeSettings()">CLOSE</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

/* SAVE ENTRY */
window.saveData=function(){
push(ref(db,"releasing"),{
date:date.value,
facility:facility.value.toUpperCase(),
surname:surname.value.toUpperCase(),
firstname:firstname.value.toUpperCase(),
age:age.value,
sex:sex.value.toUpperCase(),
bloodtype:bloodtype.value.toUpperCase(),
or:or.value.toUpperCase(),
request:request.value.toUpperCase(),
requestQty:requestQty.value,
issued:issued.value.toUpperCase(),
issuedQty:issuedQty.value,
amountPaid:amountPaid.value,
discount:discount.value
})
.then(()=>{
alert("Saved successfully!");
// Clear inputs
date.value=""; facility.value=""; surname.value=""; firstname.value="";
age.value=""; sex.value=""; bloodtype.value=""; or.value="";
request.value="WB"; requestQty.value=""; issued.value="WB"; issuedQty.value="";
amountPaid.value=""; discount.value="";
})
.catch(err=>{console.error(err); alert("Error saving data!");});
}

/* FACILITY AUTOCOMPLETE */
const facilityList=document.getElementById("facilityList")
function loadFacilityList(){
    onValue(ref(db,"facilities"),snapshot=>{
        facilityList.innerHTML=""
        snapshot.forEach(child=>{
            const option=document.createElement("option")
            option.value=child.val().name
            facilityList.appendChild(option)
        })
    })
}
loadFacilityList()

/* SIMPLE SETTINGS */
window.openSettings=function(){ document.getElementById("settingsModal").style.display="block"; loadFacilityList(); }
window.closeSettings=function(){ document.getElementById("settingsModal").style.display="none"; }
window.goBack=function(){ window.location.href="releasing.html"; }

/* SAVE FACILITIES */
window.saveFacilities=function(){
const text=document.getElementById("facilityBulk").value.trim()
if(text===""){ alert("No data to save"); return; }
const lines=text.split("\n").map(l=>l.trim()).filter(l=>l!=="")
const facilityRef=ref(db,"facilities")
remove(facilityRef).then(()=>{
    lines.forEach(line=>{
        push(facilityRef,{ name:line.toUpperCase() })
    })
    alert("Facilities saved permanently!")
    loadFacilityList()
})
}
</script>

</body>
</html>
