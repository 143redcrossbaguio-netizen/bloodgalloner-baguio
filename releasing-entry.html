<!DOCTYPE html>
<html>
<head>
<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

header{
    background:#ff9800;
    color:white;
    padding:15px;
    text-align:center;
}

.container{
    max-width:650px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
    font-weight:bold;
    margin-top:10px;
    display:block;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

.row{
    display:flex;
    gap:10px;
    align-items:flex-end;
    margin-top:5px;
}

.row select{flex:2}
.row input{flex:1}

.row button{
    width:auto;
    min-width:45px;
    padding:10px;
    margin-top:0;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}

.save{background:#ff9800;color:white}
.facilityBtn{background:#2e7d32;color:white}
.trackingBtn{background:#1565c0;color:white}
.back{background:#444;color:white}
.addBtn{background:#2e7d32;color:white}
.removeBtn{background:#c62828;color:white}
.discountBtn{background:#1565c0;color:white}
.smallBtn{
    width:auto !important;
    min-width:120px !important;
    padding:10px 14px !important;
}

/* BLOOD AUGMENTATION */
.augmentationToggle{
    position:fixed;
    right:15px;
    top:120px;
    width:auto;
    padding:12px 16px;
    background:#1565c0;
    color:white;
    border:none;
    border-radius:8px;
    font-weight:bold;
    z-index:1000;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.augmentationPanel{
    position:fixed;
    top:0;
    right:-520px;
    width:500px;
    height:100%;
    background:white;
    box-shadow:-3px 0 12px rgba(0,0,0,0.2);
    transition:right 0.3s ease;
    z-index:999;
    overflow:auto;
    padding:20px;
    box-sizing:border-box;
}

.augmentationPanel.open{
    right:0;
}

.augmentationHeader{
    background:#1565c0;
    color:white;
    padding:12px;
    border-radius:8px;
    text-align:center;
    font-weight:bold;
    margin-bottom:15px;
}

.augmentationCard{
    border:1px solid #ccc;
    border-radius:8px;
    padding:15px;
    margin-top:15px;
    background:#fafafa;
}

.innerBox{
    border:1px solid #ddd;
    border-radius:6px;
    padding:10px;
    margin-top:10px;
    background:white;
}
</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<button class="augmentationToggle" onclick="toggleAugmentation()">BLOOD AUGMENTATION</button>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input type="text" id="facility" list="facilityList" placeholder="Type facility name">
<datalist id="facilityList"></datalist>

<button class="facilityBtn" onclick="goFacilityManager()">OPEN FACILITY MANAGER</button>
<button class="trackingBtn" onclick="goTracking()">GO TO TRACKING</button>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>MALE</option>
<option>FEMALE</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>6A. BOX CONTAINER</label>
<input type="number" id="boxContainerQty" placeholder="Qty">

<label>7. REQUEST</label>
<div id="requestContainer">
    <div class="row requestRow">
        <select class="requestType">
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="requestQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addRequest()">+</button>
    </div>
</div>

<label>8. ISSUED</label>
<div id="issuedContainer">
    <div class="row issuedRow">
        <select class="issuedType">
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="issuedQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addIssued()">+</button>
    </div>
</div>

<label>9. AMOUNT PAID</label>
<div class="row">
    <input type="number" id="amountPaid" readonly>
    <button type="button" class="discountBtn smallBtn" onclick="toggleDiscount()">DISCOUNT</button>
</div>

<div id="discountSection" style="display:none;">
    <label>DISCOUNTED PRICE</label>
    <input type="number" id="discountPrice">

    <label>DISCOUNT %</label>
    <input type="number" id="discountPercent">

    <label>10. DISCOUNT</label>
    <input type="number" id="discount" readonly>
</div>

<button class="save" id="saveBtn">SAVE</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<!-- BLOOD AUGMENTATION PANEL -->
<div id="augmentationPanel" class="augmentationPanel">
    <div class="augmentationHeader">BLOOD AUGMENTATION</div>

    <label>DATE</label>
    <input type="date" id="augDate">

    <label>FACILITY</label>
    <input type="text" id="augFacility" list="facilityList" placeholder="Type facility name">

    <label>BOX CONTAINER</label>
    <input type="number" id="augBoxContainerQty" placeholder="Qty">

    <div id="augmentationBloodTypeContainer"></div>

    <button class="addBtn" type="button" onclick="addAugmentationBloodType()">+ ADD BLOOD TYPE</button>

    <label style="margin-top:15px;">AMOUNT PAID</label>
    <div class="row">
        <input type="number" id="augAmountPaid" readonly>
        <button type="button" class="discountBtn smallBtn" onclick="toggleAugDiscount()">DISCOUNT</button>
    </div>

    <div id="augDiscountSection" style="display:none;">
        <label>DISCOUNTED PRICE</label>
        <input type="number" id="augDiscountPrice">

        <label>DISCOUNT %</label>
        <input type="number" id="augDiscountPercent">

        <label>DISCOUNT</label>
        <input type="number" id="augDiscount" readonly>
    </div>

    <button class="facilityBtn" type="button" onclick="saveAugmentation()">SAVE BLOOD AUGMENTATION</button>
    <button class="back" type="button" onclick="toggleAugmentation()">CLOSE</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, push, onValue, get, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyByh0YJ11ZpbRV7EoDoLnqgFxe1r68efPI",
  authDomain: "galloners-club.firebaseapp.com",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club",
  storageBucket: "galloners-club.firebasestorage.app",
  messagingSenderId: "213049860421",
  appId: "1:213049860421:web:4156aaa52b945f48711e2c",
  measurementId: "G-XYXJH9JNXJ"
};

let componentPrices = {
  WB: 0,
  PRBC: 0,
  PC: 0,
  FFP: 0,
  CRYO: 0,
  BOXCONTAINER: 0
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const facilityList = document.getElementById("facilityList");
const saveBtn = document.getElementById("saveBtn");

const urlParams = new URLSearchParams(window.location.search);
const editId = urlParams.get("id");

let authReady = false;
let currentReleasingPriceSnapshot = null;
let currentAugmentationPriceSnapshot = null;

function buildPriceSnapshot(){
  return {
    WB: Number(componentPrices.WB) || 0,
    PRBC: Number(componentPrices.PRBC) || 0,
    PC: Number(componentPrices.PC) || 0,
    FFP: Number(componentPrices.FFP) || 0,
    CRYO: Number(componentPrices.CRYO) || 0,
    BOX: Number(componentPrices.BOXCONTAINER) || 0
  };
}

function normalizePriceSnapshot(snapshot){
  return {
    WB: Number(snapshot?.WB ?? snapshot?.wb) || 0,
    PRBC: Number(snapshot?.PRBC ?? snapshot?.prbc) || 0,
    PC: Number(snapshot?.PC ?? snapshot?.pc) || 0,
    FFP: Number(snapshot?.FFP ?? snapshot?.ffp) || 0,
    CRYO: Number(snapshot?.CRYO ?? snapshot?.cryo) || 0,
    BOX: Number(snapshot?.BOX ?? snapshot?.box ?? snapshot?.boxContainer) || 0
  };
}

function setTodayDate(){
  const today = new Date().toISOString().split("T")[0];

  const mainDate = document.getElementById("date");
  if(mainDate && !mainDate.value) mainDate.value = today;

  const augDate = document.getElementById("augDate");
  if(augDate && !augDate.value) augDate.value = today;
}

function loadFacilities(){
  onValue(ref(db, "facilities"), (snapshot) => {
    facilityList.innerHTML = "";

    if (!snapshot.exists()) return;

    snapshot.forEach((child) => {
      const data = child.val();
      const option = document.createElement("option");
      option.value = data.name || "";
      facilityList.appendChild(option);
    });
  }, (error) => {
    console.error("Facility load error:", error);
  });
}

async function loadComponentPrices(){
  try{
    const snapshot = await get(ref(db, "settings/releasingPrices"));

    if(snapshot.exists()){
      const data = snapshot.val() || {};

      componentPrices = {
        WB: Number(data.wb) || 0,
        PRBC: Number(data.prbc) || 0,
        PC: Number(data.pc) || 0,
        FFP: Number(data.ffp) || 0,
        CRYO: Number(data.cryo) || 0,
        BOXCONTAINER: Number(data.boxContainer) || 0
      };
    }else{
      componentPrices = {
        WB: 0,
        PRBC: 0,
        PC: 0,
        FFP: 0,
        CRYO: 0,
        BOXCONTAINER: 0
      };
    }

    computeIssuedTotal();
    computeAugmentationTotal();
  }catch(error){
    console.error("Price load error:", error);
    componentPrices = {
      WB: 0,
      PRBC: 0,
      PC: 0,
      FFP: 0,
      CRYO: 0,
      BOXCONTAINER: 0
    };
  }
}

window.addRequest = function(){
  const container = document.getElementById("requestContainer");
  const row = document.createElement("div");
  row.className = "row requestRow";
  row.innerHTML = `
    <select class="requestType">
        <option>WB</option>
        <option>PRBC</option>
        <option>PC</option>
        <option>FFP</option>
        <option>CRYO</option>
    </select>
    <input type="number" class="requestQty" placeholder="Qty">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove()">-</button>
  `;
  container.appendChild(row);
};

window.addIssued = function(){
  const container = document.getElementById("issuedContainer");
  const row = document.createElement("div");
  row.className = "row issuedRow";
  row.innerHTML = `
    <select class="issuedType">
        <option>WB</option>
        <option>PRBC</option>
        <option>PC</option>
        <option>FFP</option>
        <option>CRYO</option>
    </select>
    <input type="number" class="issuedQty" placeholder="Qty">
    <button type="button" class="removeBtn" onclick="this.parentElement.remove(); computeIssuedTotal();">-</button>
  `;
  container.appendChild(row);
};

window.toggleDiscount = function(){
  const section = document.getElementById("discountSection");
  section.style.display = section.style.display === "none" ? "block" : "none";
};

function computeIssuedTotal(){
  let total = 0;

  document.querySelectorAll(".issuedRow").forEach(row => {
    const type = row.querySelector(".issuedType").value;
    const qty = Number(row.querySelector(".issuedQty").value) || 0;

    if(componentPrices[type]){
      total += componentPrices[type] * qty;
    }
  });

  const boxContainerQty = Number(document.getElementById("boxContainerQty").value) || 0;
  total += componentPrices.BOXCONTAINER * boxContainerQty;

  document.getElementById("amountPaid").value = total.toFixed(2);
  computeMainDiscountFromPercentOrPrice();
}

function computeMainDiscountFromPrice(){
  const original = Number(document.getElementById("amountPaid").value) || 0;
  const discounted = Number(document.getElementById("discountPrice").value) || 0;

  if(original <= 0){
    document.getElementById("discountPercent").value = "";
    document.getElementById("discount").value = "";
    return;
  }

  const discountAmount = original - discounted;
  const percent = (discountAmount / original) * 100;

  document.getElementById("discountPercent").value = percent.toFixed(2);
  document.getElementById("discount").value = discountAmount.toFixed(2);
}

function computeMainDiscountFromPercent(){
  const original = Number(document.getElementById("amountPaid").value) || 0;
  const percent = Number(document.getElementById("discountPercent").value) || 0;

  const discountAmount = original * (percent / 100);
  const discounted = original - discountAmount;

  document.getElementById("discountPrice").value = discounted.toFixed(2);
  document.getElementById("discount").value = discountAmount.toFixed(2);
}

function computeMainDiscountFromPercentOrPrice(){
  const discountPrice = document.getElementById("discountPrice").value;
  const discountPercent = document.getElementById("discountPercent").value;

  if(discountPrice !== ""){
    computeMainDiscountFromPrice();
  }else if(discountPercent !== ""){
    computeMainDiscountFromPercent();
  }else{
    document.getElementById("discount").value = "";
  }
}

function resetForm(){
  currentReleasingPriceSnapshot = null;

  document.getElementById("date").value = new Date().toISOString().split("T")[0];
  document.getElementById("facility").value = "";
  document.getElementById("surname").value = "";
  document.getElementById("firstname").value = "";
  document.getElementById("age").value = "";
  document.getElementById("sex").value = "";
  document.getElementById("bloodtype").value = "";
  document.getElementById("or").value = "";
  document.getElementById("boxContainerQty").value = "";
  document.getElementById("amountPaid").value = "";
  document.getElementById("discountPrice").value = "";
  document.getElementById("discountPercent").value = "";
  document.getElementById("discount").value = "";
  document.getElementById("discountSection").style.display = "none";

  document.getElementById("requestContainer").innerHTML = `
    <div class="row requestRow">
        <select class="requestType">
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="requestQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addRequest()">+</button>
    </div>
  `;

  document.getElementById("issuedContainer").innerHTML = `
    <div class="row issuedRow">
        <select class="issuedType">
            <option>WB</option>
            <option>PRBC</option>
            <option>PC</option>
            <option>FFP</option>
            <option>CRYO</option>
        </select>
        <input type="number" class="issuedQty" placeholder="Qty">
        <button type="button" class="addBtn" onclick="addIssued()">+</button>
    </div>
  `;

  computeIssuedTotal();
}

async function loadEditEntry(){
  if(!editId) return;

  try{
    const snapshot = await get(ref(db, "releasing/" + editId));

    if(snapshot.exists()){
      const entry = snapshot.val();

      currentReleasingPriceSnapshot = entry.priceSnapshot ? normalizePriceSnapshot(entry.priceSnapshot) : null;

      document.getElementById("date").value = entry.date || "";
      document.getElementById("facility").value = entry.facility || "";
      document.getElementById("surname").value = entry.surname || "";
      document.getElementById("firstname").value = entry.firstname || "";
      document.getElementById("age").value = entry.age || "";
      document.getElementById("sex").value = entry.sex || "";
      document.getElementById("bloodtype").value = entry.bloodtype || "";
      document.getElementById("or").value = entry.or || "";
      document.getElementById("boxContainerQty").value = entry.boxContainerQty || "";
      document.getElementById("amountPaid").value = entry.amountPaid || "";
      document.getElementById("discount").value = entry.discount || "";

      const original = Number(entry.amountPaid || 0);
      const discountAmount = Number(entry.discount || 0);
      if(discountAmount > 0){
        document.getElementById("discountSection").style.display = "block";
        document.getElementById("discountPrice").value = (original - discountAmount).toFixed(2);
        document.getElementById("discountPercent").value = original > 0 ? ((discountAmount / original) * 100).toFixed(2) : "";
      }

      const requestContainer = document.getElementById("requestContainer");
      const issuedContainer = document.getElementById("issuedContainer");

      requestContainer.innerHTML = "";
      issuedContainer.innerHTML = "";

      if(entry.requests && Array.isArray(entry.requests) && entry.requests.length > 0){
        entry.requests.forEach((item, index) => {
          const row = document.createElement("div");
          row.className = "row requestRow";
          row.innerHTML = `
            <select class="requestType">
                <option ${item.type==="WB" ? "selected" : ""}>WB</option>
                <option ${item.type==="PRBC" ? "selected" : ""}>PRBC</option>
                <option ${item.type==="PC" ? "selected" : ""}>PC</option>
                <option ${item.type==="FFP" ? "selected" : ""}>FFP</option>
                <option ${item.type==="CRYO" ? "selected" : ""}>CRYO</option>
            </select>
            <input type="number" class="requestQty" placeholder="Qty" value="${item.qty || ""}">
            <button type="button" class="${index===0 ? "addBtn" : "removeBtn"}" onclick="${index===0 ? "addRequest()" : "this.parentElement.remove()"}">${index===0 ? "+" : "-"}</button>
          `;
          requestContainer.appendChild(row);
        });
      } else {
        requestContainer.innerHTML = `
          <div class="row requestRow">
              <select class="requestType">
                  <option>WB</option>
                  <option>PRBC</option>
                  <option>PC</option>
                  <option>FFP</option>
                  <option>CRYO</option>
              </select>
              <input type="number" class="requestQty" placeholder="Qty">
              <button type="button" class="addBtn" onclick="addRequest()">+</button>
          </div>
        `;
      }

      if(entry.issued && Array.isArray(entry.issued) && entry.issued.length > 0){
        entry.issued.forEach((item, index) => {
          const row = document.createElement("div");
          row.className = "row issuedRow";
          row.innerHTML = `
            <select class="issuedType">
                <option ${item.type==="WB" ? "selected" : ""}>WB</option>
                <option ${item.type==="PRBC" ? "selected" : ""}>PRBC</option>
                <option ${item.type==="PC" ? "selected" : ""}>PC</option>
                <option ${item.type==="FFP" ? "selected" : ""}>FFP</option>
                <option ${item.type==="CRYO" ? "selected" : ""}>CRYO</option>
            </select>
            <input type="number" class="issuedQty" placeholder="Qty" value="${item.qty || ""}">
            <button type="button" class="${index===0 ? "addBtn" : "removeBtn"}" onclick="${index===0 ? "addIssued()" : "this.parentElement.remove(); computeIssuedTotal()"}">${index===0 ? "+" : "-"}</button>
          `;
          issuedContainer.appendChild(row);
        });
      } else {
        issuedContainer.innerHTML = `
          <div class="row issuedRow">
              <select class="issuedType">
                  <option>WB</option>
                  <option>PRBC</option>
                  <option>PC</option>
                  <option>FFP</option>
                  <option>CRYO</option>
              </select>
              <input type="number" class="issuedQty" placeholder="Qty">
              <button type="button" class="addBtn" onclick="addIssued()">+</button>
          </div>
        `;
      }

      computeIssuedTotal();
    }
  }catch(error){
    console.error("Load edit error:", error);
    alert("Failed to load entry");
  }
}

saveBtn.addEventListener("click", async () => {
  if (!auth.currentUser) {
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  const requests = [];
  document.querySelectorAll(".requestRow").forEach(row => {
    const type = row.querySelector(".requestType").value;
    const qty = row.querySelector(".requestQty").value;
    if(qty !== ""){
      requests.push({ type, qty });
    }
  });

  const issued = [];
  document.querySelectorAll(".issuedRow").forEach(row => {
    const type = row.querySelector(".issuedType").value;
    const qty = row.querySelector(".issuedQty").value;
    if(qty !== ""){
      issued.push({ type, qty });
    }
  });

  const priceSnapshotToSave = currentReleasingPriceSnapshot || buildPriceSnapshot();

  const entryData = {
    date: document.getElementById("date").value,
    facility: document.getElementById("facility").value.toUpperCase(),
    surname: document.getElementById("surname").value.toUpperCase(),
    firstname: document.getElementById("firstname").value.toUpperCase(),
    age: document.getElementById("age").value,
    sex: document.getElementById("sex").value,
    bloodtype: document.getElementById("bloodtype").value,
    or: document.getElementById("or").value.toUpperCase(),
    boxContainerQty: document.getElementById("boxContainerQty").value || 0,
    requests: requests,
    issued: issued,
    amountPaid: document.getElementById("amountPaid").value,
    discount: document.getElementById("discount").value || 0,
    priceSnapshot: priceSnapshotToSave
  };

  try {
    if(editId){
      await update(ref(db, "releasing/" + editId), entryData);
      alert("Updated successfully!");
      window.location.href = "releasing-tracking.html";
    }else{
      await push(ref(db, "releasing"), entryData);
      alert("Saved successfully!");
      resetForm();
    }
  } catch (error) {
    console.error("Save entry error:", error);
    alert("Failed to save entry");
  }
});

window.toggleAugmentation = function(){
  document.getElementById("augmentationPanel").classList.toggle("open");
};

window.toggleAugDiscount = function(){
  const section = document.getElementById("augDiscountSection");
  section.style.display = section.style.display === "none" ? "block" : "none";
};

function computeAugmentationTotal(){
  let total = 0;

  document.querySelectorAll(".augIssuedRow").forEach(row => {
    const type = row.querySelector(".augIssuedType").value;
    const qty = Number(row.querySelector(".augIssuedQty").value) || 0;

    if(componentPrices[type]){
      total += componentPrices[type] * qty;
    }
  });

  const augBoxContainerQty = Number(document.getElementById("augBoxContainerQty").value) || 0;
  total += componentPrices.BOXCONTAINER * augBoxContainerQty;

  document.getElementById("augAmountPaid").value = total.toFixed(2);
  computeAugDiscountFromPercentOrPrice();
}

function computeAugDiscountFromPrice(){
  const original = Number(document.getElementById("augAmountPaid").value) || 0;
  const discounted = Number(document.getElementById("augDiscountPrice").value) || 0;

  if(original <= 0){
    document.getElementById("augDiscountPercent").value = "";
    document.getElementById("augDiscount").value = "";
    return;
  }

  const discountAmount = original - discounted;
  const percent = (discountAmount / original) * 100;

  document.getElementById("augDiscountPercent").value = percent.toFixed(2);
  document.getElementById("augDiscount").value = discountAmount.toFixed(2);
}

function computeAugDiscountFromPercent(){
  const original = Number(document.getElementById("augAmountPaid").value) || 0;
  const percent = Number(document.getElementById("augDiscountPercent").value) || 0;

  const discountAmount = original * (percent / 100);
  const discounted = original - discountAmount;

  document.getElementById("augDiscountPrice").value = discounted.toFixed(2);
  document.getElementById("augDiscount").value = discountAmount.toFixed(2);
}

function computeAugDiscountFromPercentOrPrice(){
  const discountPrice = document.getElementById("augDiscountPrice").value;
  const discountPercent = document.getElementById("augDiscountPercent").value;

  if(discountPrice !== ""){
    computeAugDiscountFromPrice();
  }else if(discountPercent !== ""){
    computeAugDiscountFromPercent();
  }else{
    document.getElementById("augDiscount").value = "";
  }
}

window.saveAugmentation = async function(){
  if (!auth.currentUser) {
    alert("You are not logged in.");
    window.location.href = "index.html";
    return;
  }

  const cards = document.querySelectorAll(".augmentationCard");
  const bloodTypes = [];

  cards.forEach(card => {
    const bloodType = card.querySelector(".augBloodType").value;

    const requests = [];
    card.querySelectorAll(".augRequestRow").forEach(row => {
      const type = row.querySelector(".augRequestType").value;
      const qty = row.querySelector(".augRequestQty").value;
      if(qty !== ""){
        requests.push({ type, qty });
      }
    });

    const issued = [];
    card.querySelectorAll(".augIssuedRow").forEach(row => {
      const type = row.querySelector(".augIssuedType").value;
      const qty = row.querySelector(".augIssuedQty").value;
      if(qty !== ""){
        issued.push({ type, qty });
      }
    });

    if(bloodType !== ""){
      bloodTypes.push({
        bloodType,
        requests,
        issued
      });
    }
  });

  const priceSnapshotToSave = currentAugmentationPriceSnapshot || buildPriceSnapshot();

  const augmentationData = {
    date: document.getElementById("augDate").value,
    facility: document.getElementById("augFacility").value.toUpperCase(),
    boxContainerQty: document.getElementById("augBoxContainerQty").value || 0,
    bloodTypes: bloodTypes,
    amountPaid: document.getElementById("augAmountPaid").value,
    discount: document.getElementById("augDiscount").value || 0,
    priceSnapshot: priceSnapshotToSave
  };

  try{
    await push(ref(db, "bloodAugmentation"), augmentationData);
    alert("Blood augmentation saved successfully!");
    currentAugmentationPriceSnapshot = null;
    document.getElementById("augDate").value = new Date().toISOString().split("T")[0];
    document.getElementById("augFacility").value = "";
    document.getElementById("augBoxContainerQty").value = "";
    document.getElementById("augmentationBloodTypeContainer").innerHTML = "";
    document.getElementById("augAmountPaid").value = "";
    document.getElementById("augDiscountPrice").value = "";
    document.getElementById("augDiscountPercent").value = "";
    document.getElementById("augDiscount").value = "";
    document.getElementById("augDiscountSection").style.display = "none";
    toggleAugmentation();
  }catch(error){
    console.error("Augmentation save error:", error);
    alert("Failed to save blood augmentation");
  }
};

document.addEventListener("input", function(e){
  if(
    e.target.classList.contains("issuedQty") ||
    e.target.classList.contains("issuedType") ||
    e.target.id === "boxContainerQty"
  ){
    computeIssuedTotal();
  }

  if(e.target.id === "discountPrice"){
    computeMainDiscountFromPrice();
  }

  if(e.target.id === "discountPercent"){
    computeMainDiscountFromPercent();
  }

  if(
    e.target.classList.contains("augIssuedQty") ||
    e.target.classList.contains("augIssuedType") ||
    e.target.id === "augBoxContainerQty"
  ){
    computeAugmentationTotal();
  }

  if(e.target.id === "augDiscountPrice"){
    computeAugDiscountFromPrice();
  }

  if(e.target.id === "augDiscountPercent"){
    computeAugDiscountFromPercent();
  }
});
