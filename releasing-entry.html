<!DOCTYPE html>
<html>
<head>

<title>Blood Releasing Entry</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#ff9800;
color:white;
padding:15px;
text-align:center;
position:relative;
}

.settings{
position:absolute;
right:20px;
top:15px;
font-size:22px;
cursor:pointer;
}

.container{
max-width:650px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:5px;
}

.row{
display:flex;
gap:10px;
}

.row select{flex:2}
.row input{flex:1}

button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.save{background:#ff9800;color:white}
.back{background:#444;color:white}

/* SETTINGS MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.modal-content{
background:white;
width:400px;
margin:120px auto;
padding:25px;
border-radius:8px;
}

</style>

</head>

<body>

<header>

<h2>Blood Releasing Entry</h2>

<div class="settings" onclick="openSettings()">⚙</div>

</header>

<div class="container">

<label>DATE</label>
<input type="date" id="date">

<label>FACILITY</label>
<input list="facilityList" id="facility">
<datalist id="facilityList"></datalist>

<label>1. SURNAME</label>
<input type="text" id="surname">

<label>2. FIRST NAME</label>
<input type="text" id="firstname">

<label>3. AGE</label>
<input type="number" id="age">

<label>4. SEX</label>
<select id="sex">
<option value="">Select</option>
<option>Male</option>
<option>Female</option>
</select>

<label>5. BLOOD TYPE</label>
<select id="bloodtype">
<option value="">Select</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>6. OR (Optional)</label>
<input type="text" id="or">

<label>7. REQUEST</label>
<div class="row">
<select id="request">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>

<input type="number" id="requestQty" placeholder="Qty">
</div>

<label>8. ISSUED</label>
<div class="row">
<select id="issued">
<option>WB</option>
<option>PRBC</option>
<option>PC</option>
<option>FFP</option>
<option>CRYO</option>
</select>

<input type="number" id="issuedQty" placeholder="Qty">
</div>

<button class="save" onclick="saveData()">SAVE</button>

<button class="back" onclick="goBack()">BACK TO RELEASING</button>

</div>

<!-- SETTINGS MODAL -->

<div class="modal" id="settingsModal">

<div class="modal-content">

<h3>Add Facility</h3>

<input type="text" id="newFacility" placeholder="Enter facility name">

<button onclick="addFacility()">ADD FACILITY</button>

<button onclick="closeSettings()">CLOSE</button>

</div>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { 
getDatabase,
ref,
push,
onValue
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


const firebaseConfig = {

apiKey: "YOUR-API-KEY",
authDomain: "YOUR-PROJECT.firebaseapp.com",
databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId: "YOUR-PROJECT",
storageBucket: "YOUR-PROJECT.appspot.com",
messagingSenderId: "XXXX",
appId: "XXXX"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);



/* SAVE RELEASING DATA */

window.saveData=function(){

const date=document.getElementById("date").value;
const facility=document.getElementById("facility").value;
const surname=document.getElementById("surname").value;
const firstname=document.getElementById("firstname").value;
const age=document.getElementById("age").value;
const sex=document.getElementById("sex").value;
const bloodtype=document.getElementById("bloodtype").value;
const orNumber=document.getElementById("or").value;

const request=document.getElementById("request").value;
const requestQty=document.getElementById("requestQty").value;

const issued=document.getElementById("issued").value;
const issuedQty=document.getElementById("issuedQty").value;


push(ref(db,"releasing"),{

date,
facility,
surname,
firstname,
age,
sex,
bloodtype,
orNumber,
request,
requestQty,
issued,
issuedQty

});

alert("Saved successfully");

document.querySelectorAll("input").forEach(i=>i.value="");

}



/* LOAD FACILITY LIST */

const facilityList=document.getElementById("facilityList");

onValue(ref(db,"facilities"),snapshot=>{

facilityList.innerHTML="";

snapshot.forEach(child=>{

let option=document.createElement("option");
option.value=child.val().name;

facilityList.appendChild(option);

});

});



/* ADD FACILITY */

window.addFacility=function(){

const name=document.getElementById("newFacility").value;

push(ref(db,"facilities"),{

name:name

});

alert("Facility added");

document.getElementById("newFacility").value="";

}



/* SETTINGS */

window.openSettings=function(){

document.getElementById("settingsModal").style.display="block";

}

window.closeSettings=function(){

document.getElementById("settingsModal").style.display="none";

}



/* BACK BUTTON */

window.goBack=function(){

window.location.href="releasing.html";

}

</script>

</body>
</html>
