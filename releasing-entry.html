<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Releasing Entry Fixed</title>
<style>
body{font-family:Arial;margin:0;padding:0;background:#f4f4f4;}
header{background:#ff9800;color:white;padding:15px;text-align:center;position:relative;}
.settings{position:absolute;top:15px;right:20px;font-size:22px;cursor:pointer;z-index:1000;}
.container{max-width:650px;margin:40px auto;background:white;padding:20px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
button{margin-top:10px;padding:10px;width:100%;border:none;border-radius:5px;color:white;font-weight:bold;cursor:pointer;}
.save{background:#ff9800;}
.back{background:#444;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:500;}
.modal-content{background:white;width:700px;max-height:90vh;margin:30px auto;padding:20px;border-radius:8px;display:flex;flex-direction:column;position:relative;}
.table-container{flex:1;overflow:auto;border:1px solid #ccc;border-radius:5px;margin-top:10px;}
table{width:100%;border-collapse:collapse;}
th,td{border:1px solid #ccc;padding:5px;}
th{background:#eee;}
td button{background:red;color:white;border:none;padding:2px 6px;cursor:pointer;}
td[contenteditable]{background:#fffbe6;}
.modal-buttons{margin-top:10px;display:flex;justify-content:flex-end;gap:5px;}
.saveFacilities{background:#1565c0;}
.closeBtn{background:#444;}
.hidden-textarea{position:absolute;left:-9999px;width:1px;height:1px;opacity:0;}
</style>
</head>
<body>

<header>
<h2>Releasing Entry</h2>
<div class="settings" onclick="openSettings()">⚙</div>
</header>

<div class="container">
<label>FACILITY</label>
<input list="facilityList" id="facility">
<datalist id="facilityList"></datalist>

<button class="save" onclick="saveData()">SAVE ENTRY</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>
</div>

<!-- SETTINGS MODAL -->
<div class="modal" id="settingsModal">
<div class="modal-content">
<h3>Facility Manager (Paste from Excel)</h3>
<div class="table-container">
<table id="facilityTable">
<thead><tr><th>Facility</th><th>Delete</th></tr></thead>
<tbody></tbody>
</table>
</div>
<div class="modal-buttons">
<button class="saveFacilities" onclick="saveFacilities()">SAVE TO DATABASE</button>
<button class="closeBtn" onclick="closeSettings()">CLOSE</button>
</div>
<textarea id="pasteSink" class="hidden-textarea"></textarea>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Autocomplete load */
function loadAutocomplete(){
    const list = document.getElementById("facilityList");
    onValue(ref(db,"facilities"),snap=>{
        list.innerHTML="";
        snap.forEach(child=>{
            const opt = document.createElement("option");
            opt.value = child.val().name;
            list.appendChild(opt);
        });
    });
}
loadAutocomplete();

/* Save releasing entry */
function saveData(){
    const f = document.getElementById("facility").value;
    if(!f){alert("Enter facility"); return;}
    push(ref(db,"releasing"),{facility:f}).then(()=>alert("Saved!"));
}

/* Back button */
function goBack(){window.location.href="releasing.html";}

/* Settings modal */
function openSettings(){
    document.getElementById("settingsModal").style.display="block";
    document.getElementById("pasteSink").focus();
    loadTable();
}
function closeSettings(){document.getElementById("settingsModal").style.display="none";}

/* Load table */
function loadTable(){
    const tbody = document.querySelector("#facilityTable tbody");
    tbody.innerHTML="";
    onValue(ref(db,"facilities"), snap=>{
        tbody.innerHTML="";
        snap.forEach(child=>{
            const tr = document.createElement("tr");
            tr.innerHTML=`<td contenteditable="true">${child.val().name}</td><td><button onclick="this.closest('tr').remove()">X</button></td>`;
            tbody.appendChild(tr);
        });
    }, {onlyOnce:true});
}

/* Paste from Excel into hidden textarea */
const pasteSink = document.getElementById("pasteSink");
pasteSink.addEventListener("paste", e=>{
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData("text");
    const lines = text.split(/\r?\n/);
    const tbody = document.querySelector("#facilityTable tbody");
    lines.forEach(line=>{
        if(line.trim()==="") return;
        const tr = document.createElement("tr");
        tr.innerHTML=`<td contenteditable="true">${line.trim()}</td><td><button onclick="this.closest('tr').remove()">X</button></td>`;
        tbody.appendChild(tr);
    });
});

/* Save facilities to Firebase */
async function saveFacilities(){
    const rows = Array.from(document.querySelectorAll("#facilityTable tbody tr"));
    if(rows.length===0){alert("Nothing to save"); return;}
    await remove(ref(db,"facilities"));
    for(const tr of rows){
        const val = tr.querySelector("td").innerText.trim();
        if(val) await push(ref(db,"facilities"),{name:val});
    }
    alert("Facilities saved!");
    loadTable();
    loadAutocomplete();
}
</script>

</body>
</html>
