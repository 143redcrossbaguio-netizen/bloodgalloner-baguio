<!DOCTYPE html>
<html>
<head>
<title>Releasing Entry</title>
<meta charset="UTF-8">

<style>
body{font-family:Arial;background:#f4f4f4;margin:0}
header{background:#ff9800;color:white;padding:15px;text-align:center}
.container{max-width:500px;margin:40px auto;background:white;padding:30px;border-radius:10px}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#ff9800;
color:white;
border:none;
border-radius:5px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h2>Blood Releasing Entry</h2>
</header>

<div class="container">

<input type="text" id="patient" placeholder="Patient Name">

<select id="blood">
<option value="">Blood Type</option>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<input type="number" id="bags" placeholder="Bags Released">

<input type="text" id="hospital" placeholder="Hospital">

<input type="date" id="date">

<button onclick="saveData()">SAVE</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

apiKey:"YOUR-API-KEY",
authDomain:"YOUR-PROJECT.firebaseapp.com",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT",
storageBucket:"YOUR-PROJECT.appspot.com",
messagingSenderId:"XXXX",
appId:"XXXX"

};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData=function(){

const patient=document.getElementById("patient").value;
const blood=document.getElementById("blood").value;
const bags=document.getElementById("bags").value;
const hospital=document.getElementById("hospital").value;
const date=document.getElementById("date").value;

push(ref(db,"releasing"),{

patient,
blood,
bags,
hospital,
date

});

alert("Release saved");

}

</script>

</body>
</html>
