<!DOCTYPE html>
<html>
<head>
<title>Facility Manager</title>
<meta charset="UTF-8">

<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}

header{
background:#2e7d32;
color:white;
padding:15px;
text-align:center;
}

.container{
max-width:500px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:5px;
color:white;
font-weight:bold;
cursor:pointer;
}

.save{background:#2e7d32;}
.back{background:#444;}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#f0f0f0;
}

td button{
margin-right:5px;
padding:5px 8px;
}
</style>
</head>

<body>

<header>
<h2>Facility Manager</h2>
</header>

<div class="container">

<input id="facilityInput" placeholder="Enter facility name">

<button class="save" id="saveBtn">SAVE FACILITY</button>

<button class="back" onclick="window.location.href='releasing-entry.html'">
BACK TO RELEASING
</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Facility</th>
<th>Action</th>
</tr>
</thead>

<tbody id="facilityTable"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const facilityRef=ref(db,"facilities");

const input=document.getElementById("facilityInput");
const saveBtn=document.getElementById("saveBtn");
const table=document.getElementById("facilityTable");


// SAVE FACILITY
saveBtn.addEventListener("click",()=>{

let name=input.value.trim();

if(name===""){
alert("Enter facility name");
return;
}

push(facilityRef,{
name:name.toUpperCase()
});

input.value="";

});


// SHOW LIST
onValue(facilityRef,(snapshot)=>{

table.innerHTML="";

let i=1;

snapshot.forEach(child=>{

let data=child.val();
let key=child.key;

table.innerHTML+=`

<tr>
<td>${i}</td>
<td>${data.name}</td>

<td>

<button onclick="editFacility('${key}','${data.name}')">
EDIT
</button>

<button onclick="deleteFacility('${key}')">
DELETE
</button>

</td>

</tr>

`;

i++;

});

});


// EDIT
window.editFacility=(key,oldName)=>{

let newName=prompt("Edit facility:",oldName);

if(newName){

update(ref(db,"facilities/"+key),{
name:newName.toUpperCase()
});

}

}


// DELETE
window.deleteFacility=(key)=>{

if(confirm("Delete facility?")){

remove(ref(db,"facilities/"+key));

}

}

</script>

</body>
</html>
