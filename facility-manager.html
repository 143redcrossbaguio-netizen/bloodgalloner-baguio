<!DOCTYPE html>
<html>
<head>
<title>Facility Manager</title>
<meta charset="UTF-8">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f4f4;
}

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:600px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}

.save{background:#2e7d32;color:white}
.back{background:#444;color:white}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#eee;
}

.action button{
width:auto;
padding:6px 10px;
margin-right:5px;
}

</style>
</head>

<body>

<header>
<h2>Facility Manager</h2>
</header>

<div class="container">

<input id="facilityName" placeholder="Enter facility name">

<button class="save" onclick="saveFacility()">SAVE FACILITY</button>

<button class="back" onclick="goBack()">BACK TO RELEASING</button>

<table>

<thead>
<tr>
<th>#</th>
<th>Facility</th>
<th>Action</th>
</tr>
</thead>

<tbody id="facilityList"></tbody>

</table>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


/* FIREBASE CONFIG */

const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-ID-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT-ID"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const facilityRef=ref(db,"facilities");

const list=document.getElementById("facilityList");


/* SAVE FACILITY */

window.saveFacility=function(){

let name=document.getElementById("facilityName").value.trim();

if(name===""){
alert("Enter facility name");
return;
}

push(facilityRef,{
name:name.toUpperCase()
});

document.getElementById("facilityName").value="";

};


/* DISPLAY FACILITIES */

onValue(facilityRef,(snapshot)=>{

list.innerHTML="";

if(!snapshot.exists()){
list.innerHTML="<tr><td colspan='3'>No facilities saved</td></tr>";
return;
}

let i=1;

snapshot.forEach(child=>{

let data=child.val();
let key=child.key;

let row=document.createElement("tr");

row.innerHTML=`
<td>${i}</td>
<td>${data.name}</td>

<td class="action">
<button onclick="editFacility('${key}','${data.name}')">EDIT</button>
<button onclick="deleteFacility('${key}')">DELETE</button>
</td>
`;

list.appendChild(row);

i++;

});

});


/* DELETE */

window.deleteFacility=function(key){

if(confirm("Delete facility?")){
remove(ref(db,"facilities/"+key));
}

};


/* EDIT */

window.editFacility=function(key,name){

let newName=prompt("Edit facility name",name);

if(newName){

update(ref(db,"facilities/"+key),{
name:newName.toUpperCase()
});

}

};


/* BACK BUTTON */

window.goBack=function(){

window.location.href="releasing.html";

};

</script>

</body>
</html>
