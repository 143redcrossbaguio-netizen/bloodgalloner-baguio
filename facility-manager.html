<!DOCTYPE html>
<html>
<head>
<title>Facility Manager</title>
<meta charset="UTF-8">
<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#ff9800;color:white;padding:15px;text-align:center;}
.container{max-width:700px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
input{width:100%;padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:12px;margin-top:15px;border:none;border-radius:5px;font-weight:bold;cursor:pointer;background:#1565c0;color:white;}
ul{margin-top:20px;padding-left:0;list-style:none;}
li{background:#f0f0f0;padding:10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center;border-radius:5px;}
.deleteBtn{background:#e53935;border:none;color:white;padding:5px 10px;cursor:pointer;border-radius:3px;}
</style>
</head>
<body>

<header>
<h2>Facility Manager</h2>
</header>

<div class="container">

<label>Enter Facility</label>
<input type="text" id="facilityInput" placeholder="Type facility name here">
<button onclick="addFacility()">Save Facility</button>

<h3>Saved Facilities</h3>
<ul id="facilityList"></ul>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// 🔑 Replace with your Firebase config
const firebaseConfig={
apiKey:"YOUR-API-KEY",
databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
projectId:"YOUR-PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const facilityRef = ref(db, "facilities");

const facilityListEl = document.getElementById("facilityList");

// Load and display facilities
function loadFacilities(){
    facilityListEl.innerHTML="";
    onValue(facilityRef, snapshot=>{
        facilityListEl.innerHTML="";
        snapshot.forEach(child=>{
            const li = document.createElement("li");
            li.innerText = child.val().name;
            const delBtn = document.createElement("button");
            delBtn.innerText = "Delete";
            delBtn.className = "deleteBtn";
            delBtn.onclick = ()=> remove(ref(db,"facilities/"+child.key));
            li.appendChild(delBtn);
            facilityListEl.appendChild(li);
        });
    });
}
loadFacilities();

// Add new facility
window.addFacility = function(){
    const input = document.getElementById("facilityInput");
    const name = input.value.trim();
    if(name===""){ alert("Enter facility name"); return; }
    push(facilityRef, {name: name.toUpperCase()});
    input.value="";
}
</script>

</body>
</html>
