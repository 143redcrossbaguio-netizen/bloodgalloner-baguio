<!DOCTYPE html>
<html>
<head>
<title>Facility Manager</title>
<meta charset="UTF-8">
<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#2e7d32;color:white;padding:15px;text-align:center;}
.container{max-width:600px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
input{width:100%;padding:12px;margin-top:10px;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:12px;margin-top:12px;border:none;border-radius:5px;color:white;font-weight:bold;cursor:pointer;}
.save{background:#2e7d32;}
.back{background:#444;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:10px;text-align:left;}
th{background:#f0f0f0;}
.action-btn{width:auto;padding:5px 10px;margin-right:5px;}
</style>
</head>
<body>

<header>
<h2>Facility Manager</h2>
</header>

<div class="container">

<input id="facilityName" placeholder="Enter facility name">

<button class="save" id="saveBtn">SAVE FACILITY</button>

<button class="back" onclick="goBack()">BACK TO RELEASING</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Facility</th>
<th>Action</th>
</tr>
</thead>
<tbody id="facilityList"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "YOUR-API-KEY",
  databaseURL: "https://galloners-club-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "galloners-club"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const facilityRef = ref(db, "facilities");
const facilityInput = document.getElementById("facilityName");
const saveBtn = document.getElementById("saveBtn");
const facilityList = document.getElementById("facilityList");

saveBtn.addEventListener("click", async () => {
  const name = facilityInput.value.trim();

  if (name === "") {
    alert("Enter facility name");
    return;
  }

  try {
    await push(facilityRef, {
      name: name.toUpperCase()
    });
    facilityInput.value = "";
  } catch (error) {
    console.error("Save error:", error);
    alert("Failed to save facility");
  }
});

onValue(facilityRef, (snapshot) => {
  facilityList.innerHTML = "";

  if (!snapshot.exists()) {
    facilityList.innerHTML = "<tr><td colspan='3'>No facilities saved</td></tr>";
    return;
  }

  let i = 1;

  snapshot.forEach((child) => {
    const data = child.val();
    const key = child.key;

    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${i}</td>
      <td>${data.name || ""}</td>
      <td>
        <button class="action-btn" onclick="editFacility('${key}', '${(data.name || "").replace(/'/g, "\\'")}')">EDIT</button>
        <button class="action-btn" onclick="deleteFacility('${key}')">DELETE</button>
      </td>
    `;

    facilityList.appendChild(row);
    i++;
  });
});

window.editFacility = async function (key, oldName) {
  const newName = prompt("Edit facility name", oldName);

  if (newName && newName.trim() !== "") {
    try {
      await update(ref(db, "facilities/" + key), {
        name: newName.toUpperCase()
      });
    } catch (error) {
      console.error("Edit error:", error);
      alert("Failed to edit facility");
    }
  }
};

window.deleteFacility = async function (key) {
  if (confirm("Delete facility?")) {
    try {
      await remove(ref(db, "facilities/" + key));
    } catch (error) {
      console.error("Delete error:", error);
      alert("Failed to delete facility");
    }
  }
};

window.goBack = function () {
  window.location.href = "releasing.html";
};
</script>

</body>
</html>
