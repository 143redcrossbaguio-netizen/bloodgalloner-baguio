<!DOCTYPE html>
<html>
<head>
<title>Facility Manager</title>
<meta charset="UTF-8">
<style>
body{margin:0;font-family:Arial;background:#f4f4f4;}
header{background:#2e7d32;color:white;padding:15px;text-align:center;}
.container{max-width:500px;margin:40px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 3px 10px rgba(0,0,0,0.1);}
input{width:100%;padding:10px;margin-top:10px;border:1px solid #ccc;border-radius:5px;}
button{width:100%;padding:12px;margin-top:12px;border:none;border-radius:5px;color:white;font-weight:bold;cursor:pointer;}
.save{background:#2e7d32;}
.back{background:#444;}
table{width:100%;border-collapse:collapse;margin-top:15px;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#f0f0f0;}
td button{margin-right:5px;padding:5px 8px;}
</style>
</head>
<body>

<header>
<h2>Facility Manager</h2>
</header>

<div class="container">

<input type="text" id="facilityInput" placeholder="Enter facility name">
<button class="save" onclick="addFacility()">SAVE FACILITY</button>
<button class="back" onclick="goBack()">BACK TO RELEASING</button>

<table>
<thead>
<tr><th>#</th><th>Facility Name</th><th>Actions</th></tr>
</thead>
<tbody id="facilityTableBody"></tbody>
</table>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Firebase config
const firebaseConfig = {
  apiKey:"YOUR-API-KEY",
  databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
  projectId:"YOUR-PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const facilitiesRef = ref(db,"facilities");

const facilityInput = document.getElementById("facilityInput");
const facilityTableBody = document.getElementById("facilityTableBody");

// --- Load and display facilities ---
function loadFacilities(){
    facilityTableBody.innerHTML = "";
    onValue(facilitiesRef, snapshot => {
        facilityTableBody.innerHTML = "";
        let i=1;
        snapshot.forEach(child=>{
            const key = child.key;
            const name = child.val().name;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${i}</td>
                <td>${name}</td>
                <td>
                    <button onclick="editFacility('${key}','${name}')">EDIT</button>
                    <button onclick="deleteFacility('${key}')">DELETE</button>
                </td>
            `;
            facilityTableBody.appendChild(tr);
            i++;
        });
    });
}

// --- Add a facility ---
window.addFacility = function(){
    const name = facilityInput.value.trim();
    if(name==="") return alert("Please enter a facility name");
    push(facilitiesRef,{name})
      .then(() => {
          facilityInput.value = "";
          loadFacilities(); // refresh list immediately
      })
      .catch(err => alert("Error saving: "+err));
}

// --- Edit a facility ---
window.editFacility = function(key, oldName){
    const newName = prompt("Edit Facility Name:", oldName);
    if(newName && newName.trim()!==""){
        update(ref(db,"facilities/"+key),{name:newName.trim()});
    }
}

// --- Delete a facility ---
window.deleteFacility = function(key){
    if(confirm("Delete this facility?")){
        remove(ref(db,"facilities/"+key));
    }
}

// --- Back to releasing ---
window.goBack = function(){
    window.location.href="releasing-entry.html";
}

// --- Initial load ---
loadFacilities();

</script>

</body>
</html>
