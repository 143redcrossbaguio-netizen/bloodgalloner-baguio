<!DOCTYPE html>
<html>
<head>
<title>Facility Manager</title>
<meta charset="UTF-8">
<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}
header{
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
}
.container{
    max-width:600px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}
input{
    width:70%;
    padding:10px;
    margin-right:10px;
    border:1px solid #ccc;
    border-radius:5px;
}
button{
    padding:10px 15px;
    border:none;
    border-radius:5px;
    font-weight:bold;
    cursor:pointer;
}
.addBtn{background:#2e7d32;color:white;}
.backBtn{background:#444;color:white;margin-top:10px;}
table{
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ccc;
    padding:8px;
    text-align:left;
}
th{
    background:#f0f0f0;
}
td button{
    margin-right:5px;
    padding:5px 8px;
}
</style>
</head>
<body>

<header>
<h2>Facility Manager</h2>
</header>

<div class="container">
<input type="text" id="facilityInput" placeholder="Enter facility name">
<button class="addBtn" onclick="addFacility()">ADD FACILITY</button>

<table>
<thead>
<tr>
<th>#</th>
<th>Facility Name</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="facilityList"></tbody>
</table>

<button class="backBtn" onclick="goBack()">BACK</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// --- Firebase Config ---
const firebaseConfig={
    apiKey:"YOUR-API-KEY",
    databaseURL:"https://YOUR-PROJECT-default-rtdb.firebaseio.com",
    projectId:"YOUR-PROJECT"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const facilityRef = ref(db,"facilities");

// --- DOM Elements ---
const facilityListEl = document.getElementById("facilityList");
const facilityInput = document.getElementById("facilityInput");

// --- Add Facility ---
window.addFacility = function(){
    let name = facilityInput.value.trim();
    if(name==="") return;
    push(facilityRef, {name});
    facilityInput.value="";
}

// --- Load Facilities from Firebase ---
onValue(facilityRef, snapshot=>{
    facilityListEl.innerHTML="";
    let i=1;
    snapshot.forEach(child=>{
        const key = child.key;
        const data = child.val();
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td>${i}</td>
            <td>${data.name}</td>
            <td>
                <button onclick="editFacility('${key}','${data.name}')">EDIT</button>
                <button onclick="deleteFacility('${key}')">DELETE</button>
            </td>
        `;
        facilityListEl.appendChild(tr);
        i++;
    });
});

// --- Edit Facility ---
window.editFacility = function(key, oldName){
    const newName = prompt("Edit Facility Name:", oldName);
    if(newName && newName.trim()!==""){
        update(ref(db,"facilities/"+key), {name:newName.trim()});
    }
}

// --- Delete Facility ---
window.deleteFacility = function(key){
    if(confirm("Are you sure you want to delete this facility?")){
        remove(ref(db,"facilities/"+key));
    }
}

// --- Back Button ---
window.goBack = function(){
    window.location.href="releasing-entry.html";
}
</script>

</body>
</html>
